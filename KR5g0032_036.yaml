body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編水火錬度品錬度之儀古法來立雖盛於近世然自古經誥之中修真之士莫不服符請氣內錬身神故劉混康先生謂生人服之可以錬神而鬼魂得之亦可度化是錬度之本意也混康即宋朝三茅山宗師觀妙沖和先生乃華陽道士大觀二年再赴解化於闕下是以錬度之符莫非法師自錬度之法今乃不然不據源流不分品格諸法衆經之中兼收並取悉以錬度更不究其來歷是致無所經據之符近又不計其數也若夫水火之本真隂陽之正氣天地之所以肇人物之所以生茫不考也甚者以南極北極為水火殊不知金木之相見果配合為南極北極乎如此則北極屬隂南極屬陽矣往往徒見有南斗陶魂北斗鑄魄之說遂以此取求水火於二極耶北斗乃是中斗南斗是二十八宿中斗宿正在東北之角南斗亦非南極也夫南極乃與北極相對為天之樞紐北極出地三十六度出於地上矣南極入地三十六度為地所遮故世不可見天有三百六十五度四分度之一半出地上半隱地下北極之去地上也再三十六度爾於是世人望之正在北方以周天言之北極乃天中之中此非坎位也南極亦非正南也若正北之方乃自危宿十五度至虛宿十度四分之一此則坎位也若正南之方自張宿十六度至星宿七度此則離位也此始是南北之正方坎離之位若南方丹天界朱陵火府乃南方之天亦不稱南極蓋有以也孰謂水火而出於南極北極乎此等主行齊醮著書立言其說頗礙如路真官玉堂齊法只請氣於太陽太隂其說雖若淺近而未至礙理以至奏木公金毋以為隂陽之宗則內丹外藥俱通而金隂木陽有地人得之可以成真鬼魂得之可以返生錬度可行則不可知得其氣與不得其氣則在人能感召之間且使上不失天度下可近取諸人身矣然匹配隂陽未嘗去水火也而木乃火之根金乃水之母至於丹成藥就則㑹四象於中宫藉黃婆而媒合木與火皆陽也金與水皆隂也用水火必取諸坎離之位求木金則不越震兊之宫此仙經之定說古今之通論指中天紫微垣帝庭以為坎宫而請水亦謬甚矣於齊中預拜木公金母表或於錬度當拜表從便施行所有先行召魂已見神虎品次則沐浴呪食錬度不必别立其所合於道場內上帝之前可也其錬度官將當俟散壇併行醮設是醮真靈之義也或專設錬度醮則從近世之儀可也錬度醮科亦當撰述以舊來師尊所行只於上帝前行事是以不敢編入此法沐浴科書朝真讃導呪食白文并正薦傳戒科並行重撰編條列左正薦沐浴儀呪則用諸方通行者引魂赴浴室啓白伏以肉敗形摧質巳歸於壞滅神離氣散魂乃屬於虛無初馳垢穢之可除大抵神明之自淨第恐沉淪或久升陟未期長夜之鄉陽輝寥絶至幽之境隂氣溟濛況志念著於世緣類多牽戀魂識零於泉府易致塵昏惟一性之不純故百神之難復是用降九霄之生氣召兩曜之晶華浴幻芒而廣大無窮變凡水而清涼普浹斷百情之內垢明一念之真根亡過某當知不滅者初非色身長存者乃為本性在世有形之穢今以成空歸隂未淨之懷正宜自滌然後沐兹澄水濯彼靈資望闕恭朝赴壇受度特吟仙梵請就浴幃慈悲接引天尊伏以水之妙用德為至深齊二象以分靈冠五行而潤下方圓隨所凝泮以時惟造化之密符故塵勞之可滌況於降九天之正氣誦三洞之靈章德能被於幽隂功乃遷於沉滯亡魂某澄清淨念悟性超凡沾灑蘭湯以時灌沐奉為亡靈上資往生仙界念沐浴蕩穢呪天澄氣清五氣髙明日月吐輝濯錬身形神精內盥香湯錬津光景洞耀煥映上清氣不受塵五臟納靈罪滅三途禍消九冥五根斷絶福慶自生今日大願一切告明身受開度升入帝庭奉為亡靈上資往生仙界念沐浴錬真呪太上髙真九靈之精使魂飛仙上登紫庭沐浴華池身神澄清精通太虛萬氣自然伏以身為患本情乃妄根因此身而起七情由六欲而生百慮萬緣俱動衆垢咸臻身若不存垢亦隨滅第恐臨終染穢在世沾塵魂雖歸空疑終未釋良由戀體遂至迷真今者仗以真文開以本性布三光之正氣陶二象之生津斷彼妄根釋諸疑想奉為亡靈上資往生仙界念沐浴錬度呪龍漢蕩蕩無形無名渺渺億劫黃道開清神澄朗耀九魂吐清玉虛澄輝太霞髙明元始開化諸天齊臨三元道養二象攝生未度者度未成者成巳死即化巳枮即榮蠢動蜎息一切冥靈懷胎含孕咸得受形亡者命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天神地祗及諸河源五嶽四濆及諸名山洞玄洞虛洞空洞仙無極大聖至真尊神無窮無極普鑒度生地拫斷絶玄都記名衆神普應一切咸聽伏以困緣報封理在不誣輪轉升沉悉由宿業報對自有休咎豈無惟其一念以沉迷雖歷千生而滯礙今巳澡鍊神宇整聚真元惟夫重濁之形軀壤滅既久沖虛之性識清淨常存然後捨舊從新回情易慮奉為亡靈上資往生仙界念沐浴東井呪天河灌東井石景水毋糈圓光拂靈耀玄虛營高明元始披重夜天人逐月生沐浴蘭池上龍負遍長庚金童灑香水玉女灌五星冠帶濯王津鍊度五仙形體香萬真降乘景登高明伏以舊障巳除煩塵滌盡茫茫攻態有似夢中肅肅仙容獲承玄䕃遷神非冕返生有期奉為亡靈上資往生仙界念録字回年呪天地洞清洗穢除塵鍊化九道返彤太真百關納靈節節受新清虛鑒映內外敷陳日吉時良度命回齡玉童玉女為汝執巾玄靈紫盍冠帶汝身使其長生天地同根伏以氣織既清形神巳復披仙衣而束體嚴冠履以朝真再誦靈章化陳羽服奉為亡靈上資往生仙界念金池冠帶呪金真降真普天氣清錬化金池沐浴身形三光耀煥我道日明飛仙羽衣上升玉京五濁巳清八景巳明今日受錬罪滅福生長與五帝齊真上靈伏以靈機罔測神化無窮幻成羽袂以蹁蹮復彼天姿而整潔即從導引前遂參朝奉為亡靈上資往生仙界念清水度魂呪巍巍道德尊功德巳圓齊降身來接引師寶自相携慈悲灑法水以用洗群迷永度三清岸長辭五濁泥伏以澡濯既終嚴裝事畢表裏俱淨識想咸恭敬詣靈壇仰朝天闕衆行引導共舉仙音道衆誦中篇引魂朝謁表白引讃伏以天人有間精念慮則可潜通幽顯雖殊聚形神則能吻合況於玄壇崇建妙範恢張衆真列仗以臨軒上聖流光而照陛期乃轉禍為福之日實為首愆謝過之辰今亡靈正當盡念傾心陳詞列欵歸身歸神皈命禮道禮經禮師夫道為天地之根宗經乃顯幽之典式然非師何以宏教非聖何以傳經萬世之所欽崇三才之所𠃔賴幽魂歸依則超度世人修奉則仙飛象外寰中常當敬仰人間天上不可暫離亡靈盡念一心䖍恭朝禮志心稽首禮太上無極大道志心稽首禮三十六部尊經志心稽首禮玄中大法師恭以至真大道無上尊經玄中法師宗壇上聖乃隂陽之樞紐實造化之本源亡靈既獲皈依自此永當悟解勿流於邪道毋惑於異端念念常存心心不轉三界十方而無礙六天九地以俱空佇俟玄恩以時度化再行導引請赴靈筵聽法聞經享食受供諷經引亡歸位呪食伏以乾坤旋斡生化莫窮數運推移輪回不息惟消長之倚伏故出沒之乘除既自始而有終本非異事然入幽而隔顯豈不慘懷生而形神處乎陽死而尸魄墜乎地五帝三官之府善惡兼書六洞十宫之曹顯幽並録使其清修而居人世未免考校而詣冥司第其功行之淺深隨其因緣而生化是以幽顯杳冥之境罔測升沉焄蒿悽愴之情敢忘追奉仰惟至道大啓真科盡存殁以霑恩極幽冥而蒙福今者奉為亡故某恭修妙典䖍叩上穹拔度魂儀祭陳靈席雖供饌具於人世而神章出乎仙經召五方之靈芽降三晨之妙氣沾濡飲食化天厨之餐灌濯神形變真元之體初心煥徹本性開明悟幽顯以俱空歷存亡而無礙然後南宫錬魂東極朝真返胎易質而隂消聚氣生神而仙化奉資冥福恭演真文奉為亡靈上資往生仙界念玉清慧命啓請呪稽首冥慧虛無尊稽首皈命重玄主裁成天地無德稱悉為衆生作恃怙慈悲五道轉輪回哀救三途地獄苦皈命金闕天中尊皈命六道慈悲父皈命玉清無上尊巳離生死長綿綿出有入虛無所待能令枯朽變成仙千劫萬劫難一遇為衆廣說業因緣回骸起死永長存使其形神無變遷伏以生生之境形質易以純全寂寂之鄉魂識苦於散蕩祭者想之如在呪以招其復來聚彼虛無慰兹追慕既以望玊闕而啓聖次將煥幽府以遷神宣開化之靈章誦升天之祕呪庶使亡靈聚魂而復命精念以還真無間存亡享凡世勤勤之祭終歸道化朝大羅渺渺之庭靜念告祈精誠宣演奉為亡靈上資往生仙界念天尊說遷神呪茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲旙定慧清蓮花上生神永安奉為亡靈上資往生仙界念天尊升天呪功德金色光微微開幽關華池流真香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寶㫖自在天堂逰奉為亡靈上資往生仙界念三光流精呪妙道生一氣氣中分隂陽凝化日月星燦然流三光九華合九道八色怡八房煥爛洞真體流精歸大芒下生淵泉宫上列無何鄉縱體復非迹歘然都相忘七寶流精結混沌雜華房咽眼九雲散此樂殊未失奉為亡靈上資往生仙界念玉陽法食呪玉陽正真氣妙道三景分元和唱靈音八㑹敷瓊文五老咽丹澤飄飄乘景雲大聖諸天衆駕就飲玉三五定生籍遊戲太上京華晃朝無際携手朝玉宸伏以靈章演奧品物化形香有返魂之功花見山林之蘂果成火棗飲變太和天降於靈光水還於金液食之而神錬享之而仙飛乃妙道之玄功實上真之神化謹依科式普用施陳奉獻諸天無價名香返魂名香返生名香妙洞具香天寶名香蘇合名香嬰谷名香七寶名香香氣氤氲用之無盡周流十方以用供養奉獻諸天上妙竒華金色連華閬苑竒華碧蘂金華瓊玉艷華鳳林仙華大妙竒華小妙竒花七色蓮華華氣芬芳用之無盡周流十方以用供養奉獻諸天瓊林珍果空洞靈爪萬歲仙桃金紫文梨元光素奈赤靈謂棗飛丹紫榴食之無盡周流十方以用供養奉獻諸天四種香飯酆山香飯龍山香飯浮山香飯太和香飯香氣布豐食之無盡周流十方以用供養奉獻諸天七種寶漿日精寶漿月華寶漿星精寶槳甘露寶漿金液寶漿靈光寶漿玉匱寶漿香氣布酆食之無盡以用供養伏以仙華異果香飯靈漿假經呪以資熏召魂靈而祀享想承遷拔盡得霑濡故有合景神真揖三靈而制七魄雲宫妙呪整三部而養七經返氣聚神錬形易質更兹聽法前即朝真奉對靈儀再伸演誦奉為亡靈上資往生仙界念天尊說三光呪回首仰元羅合景挹靈芒拘魂制七魄思臍定中央行住履虛無寢息宴玄房飢餐黃蘖華渴飲瓊林漿神旌命大魔合體鍊真光復照觀大空長在空中遊圓通泯波際真華靡終期杳杳無終始行者當明知寂寥忘理教應運蕆弘規鑑道不自超要當先所施㑹歸無二處隨心白合離奉為亡靈上資往生仙界念生魂育魄呪靈之無根衆妙之原中凝七魄上結三魂二十四真出入無門杳冥之內恍愡元精隨劫存亡逐氣而生外凝混朴內養七真五神植華三台敷榮紫霞表童反胎歸嬰騰雲而升跨霧浮空中有玉真號曰神功左挾無英右衛白元玄獸遏後丹禽擁前上浮翠蓋下擁金蓮香雲凝空甘露無窮用之無盡尋源不終伏以靈寶為萬法之宗度人乃三洞之要深出乎衆典妙極於中篇造化以之推移劫運因之保制凡夫修之得道幽爽仗之成人塵世通津九天寶笈敬伸諷誦專用薦資諷大梵隱語回向上來呪供香羞關宣祕典歸投妙道資薦神儀伏願獲聽