  text: 上清靈寶大法卷之四十靈四
  hash: sha256:85cb84f72cdd3527b9abdbdd8a6993446deffe7b5936b28ee657ba7fa0c95785
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_039-001a, image: hfl/0972/0972-004.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金允中編散壇設醮品下黃籙大齋醮謝真靈三百六十分位並略敘在上卷矣其班次髙下並以羅天醮圖及宣和間頒下醮位參考排列非以世俗𥝠意撰集如上真名號亦隨元來出處及有前後朝廷册上尊號方敢收用如三界五帝大魔王十方飛天神王皆係靈寶中最關涉之司故當專位設之如五老天君見於道典又有五方五帝古今之論不一蓋道經中注釋多總謂之五帝不加分别愈重疑惑度人經中五老啓途羣仙翼轅李少微注中引本行經謂東方安寶華林青靈始老號曰青帝姓閻諱開字靈威仰南方梵寶昌陽丹靈真老號曰赤帝姓洞浮諱炎字赤熛怒西方七寶金門皓靈皇老號曰白帝姓上金諱昌開字耀魄寶北方洞隂朔單欎絶五靈玄老號曰黑帝姓節諱靈會字隱侯局中央玉寶元靈元老號曰黃帝姓通班元氏字含樞紐其後青帝護魂白帝侍𩲸赤帝飬氣黑帝通血黃帝中主萬神無越嚴東注云東方青帝靈威仰南方赤帝赤熛怒西方白帝白招矩北方黑帝叶光紀中央黃帝含樞紐李少微於此又注云此名五老上帝各領受赤書符命在天中則主鎮五方神仙在地則主領五嶽在人則主領五臟此説雖近之而未能析其理也今按天文太微垣中有五星乃一星居中四星挾之名曰五帝座即太微之帝也晉天文志云是東方蒼帝靈威仰南方赤帝赤熛怒西方白帝白招矩北方黑帝叶光紀中央黃帝含樞紐而紫微垣中又有五星曰五帝內座天文志云帝所居也五星則東歲星於時主春於物屬木於人為貌於五常為仁南方熒惑於時主夏於物屬火於人為視於五常為禮西方太白於時主秋於物為金於人為言於五常為義北方辰星於時主冬於物為水於人為聽於五常為智中央鎮星於時主四時於物為土於人為思於五常為信儒書止於天文所見者言之道典則有五老上帝又益之姓諱然五老上帝道典既以為靈威仰等五神而帝座天文中又以為靈威仰等五神此皆以名號紛紜而未臻於理也若儒書道典而通定於理則五老上帝者五氣之根宗五行之本始也及其見於天文者則為五星或為五帝座天地既分則凝質具體遂為五嶽既成山嶽必有神司是為五嶽之帝成歲而建四時有神以司其令者為五帝下至於物為金木水火土於事為五帝於人為五臟皆此五氣也而所屬不同不可拘於名號而混為一也林侍宸玉格中謂五嶽帝則天帝也令人上奏稱臣與天地一體其意亦以五氣同源欲以五嶽為五天帝一等也林侍宸髙逹之士所見偶適偏爾五老則五氣之根在天中乃妙有妙無之門與天尊同體及其為山嶽之主宰謂之嶽神而巳使同此五神則在天頒稱五老在山稱五嶽可也且如生民以至萬物莫不同稟元始祖氣分此一氣以𢌿性受靈而巳直以人為元始天尊則不可也蓋五帝之肇其源者無二致五氣之見於用者互不同故齋科中臨壇存五嶽五帝兵馬又存五方五帝兵馬若五老上帝豈是統率兵馬之神所以齋壇只稱五帝幕古不稱五老幕者蓋以紀録功過考校罪福恐非天中五老之職從其簡而無礙則齋壇只稱東方青帝南方赤帝西方白帝北方黑帝中央黃帝有何不可使此五帝則是五老今只稱為五帝又何害乎使五帝與五老不同則只稱五帝又其當也何必執泥一説哉以理言之莫若隨五氣之所寓而稱在天中則稱五老上帝在天文則稱五帝座及五方五星在神靈則稱五方五帝在山嶽則稱五嶽聖帝在人身則稱五臟神君豈不通理而易行若欲總歸一源則五臟神君稱五老上帝三尺之童亦知其不可也巳於六幕啓謝品略言之矣而此醮位中既列五方五帝又列五方五帝恐後人不知其説故詳陳之此事先儒通論之甚衆亦少有定説同學之士更加詳考儻有所見則為一定之論以解後世之惑尤其幸也此外上真稱呼邇來亦有以天師攺正一天君許旌陽攺天樞使相此類甚多誣罔褻瀆無所不至此徒不足責博洽之士冝共斥之古法黃籙大齋散壇設醮儀古者未有排列道場之儀止於壇上行事故設醮則於壇外用青綃絳座備時果醮饌拜表投龍之後便降神設醮後世雖於壇上行事而復設像立位鋪置道場壇以設醮竟就道場內排列供饌若行古法則於壇上行事拜表之後便降神設醮壇上行科道場內三獻行禮亦可或於拜表投龍之後復爐出户退靖所少息然後再入户升壇上香宣科降神設醮還戒納職三途五苦頌旋壇出户送神焚燎畢事亦可然後解壇散席今於三途五苦頌旋壇之際擾擾以下門榜大非儀也備置壇場法天象地立門列榜以示儀式齋中醮畢併壇撤之何獨急急於下榜哉混亂威儀交雜進止實為非便況三途五苦頌中之辭無非陳罪福以崇經教而巳又非下門榜之儀幸深詳之師前立班髙功上香唱道讃入地户升天門上十方香御案香本位香各禮師存念如法宣五星呪鳴法鼓發爐各稱法位稱法位臣姓某等今故燒香願以是功德上為宗廟先靈今朝皇帝文武官屬卿輔庶僚及修齋弟子某七世九玄見存眷屬臣等三師九祖天下人民一切衆生幽途暗爽歸身歸神歸命十方無極太上靈寶天尊乞賜原赦前代及今生死重罪免罹三惡之道十苦八難九厄之中身得道真飛行虛空白日升天侍衛道君逍遙無上金闕七寶自然宫殿永與道合所啓玄感上御至真無極道前禮十方懴悔臣法衆等志心歸身歸神歸命十方無極大道太上靈寶天尊懴悔宗廟先靈今朝皇帝諸王卿輔文武百僚及修齋弟子與臣等三師九祖內族外親存亡兩途姻緣眷屬幽曹主宰地府苦魂飛爽幽靈沉魂滯𩲸有情含識一切生靈自徙曠劫以來至于今日或身業所犯四肢舉措動違戒律不依經典或心業所犯注念不專情浮意動馳騁不息或口業所犯善惡交論綺語飾非華詞惑衆三業大罪積若丘山十惡之愆深盈巨海因今懴謝並乞蕩除伏冀宗廟尊靈道遙紫極聖圖延永國祚安寧皇帝壽等五山明齊二景王侯卿佐文武職僚允贊帝猷敷揚道化齋官某家及臣等九玄七祖四友三師蛻質南宫濯魂丹霍三途六道盡出幽沉咸登福岸臣等身入至仙會道合真神歸𡨋寂洞入自然性命合道玄會無為稽首禮謝無上至真三寶禮經三啓三禮旋行收真文衆官隨聲誦和髙功執真文熏香上叩齒十二通呪如專薦亡靈書中篇安鎮則宣此呪無上至真大聖髙尊布化運氣三十二天八會九光自然成文安鎮天地保制劫年元始符命普告三元下敕九地上關三天中告海嶽名山大川今日上告萬神咸聞修齋行道拔度亡魂三官九府削滅罪根永度三魂五苦之源世世受福記名丹篇神生天堂錬化自然生死開度億劫長存九天告命風火驛傳衆官再拜隨真文表焚之如為國為民康時保世禳災度厄兼濟死生用赤書安鎮則宣此呪元始上天三光髙明四景照耀四方朗清運度所衝激揚流星五分錯越三統失寧五斗總神七星明靈真君大魁厥諱玉精夫人皇妃字曰育嬰總御玄關回轉諸天今有某災玄告不祥請以真文赤書上呈散髮謝過披露丹誠乞垂玄鑒回復天經氣不橫越災不橫生焚燒真文散煙玉庭上景監度普告萬靈氣清三關災滅九冥隂陽調和國土太平請以金龍風火驛傳衆官再拜真文隨表焚之再稱法位稱法位臣某與合壇官衆等謹重誠上啓太上無極大道元始天尊太上道君太上老君無上玄老十方靈寶天尊巳得道大聖衆至真諸君丈人三十六部尊經玄中大法師天師真君上相上宰四司五帝五嶽靈宫名山洞府三界官屬一切真靈臣等夙以道緣躬逢正化天尊演教三洞宣行寶訣靈圖濟家康國獲參真妙許以稟修惟在立功普及幽顯冝弘聖訓廣度天人凡有投誠不容寢絶今奉詞旨敢不上聞散壇青詞謹當宣奏宣詞按如詞言實惟虔切理冝關奏冀獲感通臣等同運丹誠輒相携率考靈仙典格披黃籙簡文奉為齋官某人於某州縣某處設玄科之式法象二儀以所齎燈燭香華金龍繒綵本命之信證質丹誠以某曰某時啓齋為首燒香行道懴悔玄冥然燈續明照耀三界下通九地上及諸天濟存拔亡普為家國三日五夜行道轉經以某日亥時功成事竟蓮燈息焰玉磬收聲仙馭返於上玄法流分於下界金龍騰影上奏齋功聖澤宣慈開度幽爽酬功行賞遍及靈司臣身中所佩內外真官三洞兵吏及日月星宿五帝五嶽三河四海兵馬騎乘侍香金童散華玉女五帝直符傳言奏事飛龍騎吏等並有功勞今當别拜黃繒朱表言功舉遷臣等學法未備俯仰失格進止犯科不合儀式恐為四司所紏五帝所執千愆萬過乞蒙原赦哀貸未悟不見罪罰臣等建齋之始奉請智慧上品十戒法事既竟謁還天宫臣所修齋功成事竟重明功德進拜黃繒朱表一通在臣玉案之上請省表文露表御前以龍頭刀鎮聖位之左朱筆鎮聖位之右宣表髙功就本位跪封表封畢遣官謹遣臣身中五體真官官一小吏十二書佐重敕功曹使者飛龍騎吏嚴裝顯服冠帶垂纓磨硯點筆簮劒理録為臣及時操黃素朱表上詣天曹隨表進奏若有謬誤之字脫漏言詞到錯不相比次者傳言書佐習事小吏操龍頭書刀長毫利筆隨誤正定無令上官典者有所遣却閉氣升表徑上三天無極大道太上御前愼勿稽停左官歷關右官次啓諸官君以次分别當令所請者下所拔者逹所召者到所理者愈所誅者滅所宣者通所遷者進所願者應所求者得若有下官故氣邀截臣表文不使上逹者收付所在近獄依律定罪以明天憲臣伏待玄恩報應髙功以表授道衆以所收真文置章几上同焚之監齋送表文法事引至天門上焚舉焚詞頌髙功伏表存念如章式起稱以聞宣山簡髙功捧簡香上熏叩齒九通宣山簡呪玄上開明元始監真上帝五老赤書丹文天地本始總領三元攝氣召會催促舉仙髙上符命普告十方日月星宿五嶽靈山天上地下冥靈大神監生主録南上三門關領玉簡勒名丹篇削落罪目上輔帝臣齋主某人歸慿至道建齋立功拔贖九祖一切苦魂行道事竟謹依靈山請投玉簡乞削罪名皆蒙解脫無有𡨚親去離三惡魂升九天生死開度億劫長存今日上告萬神咸聞謹以龍簡關盟真官乞如所告金龍驛傳次宣水簡髙功熏簡如前宣水簡呪元始五老上帝髙尊十方至真太華靈仙赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝冥靈大神今日上告萬願開陳齋主某人建齋行道普為存亡請贖七祖宿對罪根謹投玉簡乞得上聞記名水府過去升天生死開度萬神咸聞謹以龍簡告明水官請如所陳金龍驛傳次宣土簡髙功熏簡如前宣土簡呪天地開張萬氣分靈三元洞符十方朗清五老上帝主領死生丹書赤文元始上精普告天下九土皇靈今曰上告萬仙定生齋主某人建齋行道普為存亡我願我仙請投玉名土府太皇勒除罪刑奏簡上宫刋簿華清身得飛騰天地同靈九祖種親腐骸更榮魂升南宫受化仙庭今日告命萬神咸聽謹以白簡表明至誠請如所告金龍驛傳舉投龍頌祈真登紫府髙功入科設醮臣等謹重誠上啓太上無極大道元始天尊太上道君太上老君無上玄老十方靈寶天尊巳得道大聖衆至真諸君丈人三十六部尊經玄中大法師三界應感一切真靈臣等伏聞黃籙簡文玄都品格靈章祕重威禁崇嚴上消天災下禳地禍惠安家國保鎮帝王無外之功有生被福臣等欽承齋欵虔露禱祈列象陳儀舒壇蕆事關行巳畢蒙佑誠多邦國同休寰區共慶幽途苦趣承齋福以昭蘇夜府寒庭沐慈恩而開泰今齋官某懷恩至渥效報無從敢因壇席之終輒奉醮修之敬仰謝真靈之垂憫少酬將吏之宣勤瞻望靈光重伸請降臣與齋主等無任瞻天望聖之至謹當奏請請聖朝謁進茶初獻法事臣謹重誠上啓大道髙尊萬霄上帝十方大聖天地靈仙日月帝君四司五帝三台北斗嶽瀆神祇靈寶衆真三界官屬醮筵列位一切真靈臣等夙承餘慶得誕今生叨佩靈文稟修玄教功輕塵露過重丘山誠冝束身以自修檢而法許開度佐國立功凡有歸投理難抑絶今齋官投誠瀝悃結願修齋拔度亡靈昭蘇幽夜祈恩請宥謝過消愆上福邦家普資動植兹以齋功成就魔障不生悉賴應感真靈齋壇聖衆內外官屬法籙吏兵成此洪休副其丹禱然而朝修之戾格崇建之失儀齋物有虧壇規未備動靜越度俯仰不經干冒真靈犯違科禁因斯醮謝悉用首陳乞下有司告行合屬削其罪目釋此過愆敢憑孚佑之恩請降將來之福幸衆真之在御進二酌以陳誠輕瀆威靈不勝危懼臣與齋官等無任戰兢稽首再拜亞獻法事臣謹重誠上啓無極大道上聖髙真嶽瀆冥曹隂陽主執三界官屬一切威靈臣聞三清上聖五帝尊神天地真靈玄司上宰裁成造化孕育生靈體洽無為功先覆載神機不測德被幽明潛佑邦家幽贊群品無災不解無厄不禳凡有啓祈必蒙監佑伏願證明修奉紀録齋功庶使齋官某人七祖九玄五姻六族先亡往逝係薦亡魂升入朱宫逍遙碧落不經苦惱衣食自然臣等四友三師俗姻法眷往者登真度品存者證果成仙次冀齋官某舉族親緣見存眷屬凶災蕩散罪纍消除真氣內滋靈官外護年齡延逺福壽增新出入遊行神明保衛北宫落化南斗上生所在地司常加警佑上願帝王萬壽社稷興昌天下太平兵戈戢息九幽長夜咸得生天率土含靈同躋壽域臣學法未備修真未成恐犯玄科奏陳難徹伏願青請未表速御九天真文靈章遍濟幽壤玄風普暢惠澤下臨幽顯沾榮存亡開泰啓謝巳畢應感斯須醮禮有終敢陳三獻臣與齋官無任懷恩激切之至稽首再拜終獻法事宣疏狀臣等謹重誠上啓三界髙真十方衆聖醮筵列位一切真靈臣等齋直事成醮修禮畢請陳失次薦獻菲儀冀垂寬佑之恩曲赦狂愚之罰福流群品澤被萬方塵世凡微難稽仙仗至真杳邈髙邁瑶宫上境天真俾升宫闕嶽瀆主宰各返靈司法籙真靈三界兵馬謁言天府進職敘勳里域地祇城隍典祀承兹齋福悉被玄休拜首天階同誠恭送臣等無任攀戀皈依激切之至送神頌渺渺空無象次還戒頌旋行都講位天尊大慈悲説戒度衆生次唱還戒三禮納職依次於御案前投職簡三禮退位納官臣建齋之始以及拜進章詞所出臣身中功曹使者三五真官百節神吏並還臣身中從衆妙門而入在𡉄還左在右還右直使功曹主領檢押各復本位毋令差互後召復到一如故事復爐各三禮旋行詠三途五苦頌八首旋壇三周如步虛三才及萬物云云大賢愼兹戒云云罪福不由他云云淫嫉為禍首云云宿命有信然云云人命巳消盡云云學仙行為急云云大賢樂經戒云云次解壇頌大空包有象降天門出地户出壇法事至師幕前致謝宣箋舊儀送師未立白文於科書內今恐臨時言語無序今撰六幕監齋前致辭等文于左蓋欲全一宗之用或其文未盡善請自攺易先至西三幕首詣監齋前上香髙功與齋官各拜長跪致辭具法位臣某謹拜手投誠上啓靈寶監齋大法師真君臣濟度天人莫先於齋福恢宏教法實藉於師恩幸兹修建之誠皆出包容之賜私忱獲遂靈貺無涯但以臣等魯昧之資迷謬之學列欵謄詞之粗畢背科爽格之誠多輒奉箋文自陳過目不慚纍瀆謹用披宣仰冀慈憐特垂省録讀箋上來箋文冒干真聽願矜後學俯渙寬恩越五日而終九朝纍千愆而成萬過悉祈湔滌盡賜原除紀勒善功布流靈佑科終事竟斂席散壇仙仗莫停巳整霓旌於層漢靈驂既駕難隨鶴馭於長空法衆稱揚同誠拜送舉修齋送師頌雲輿次詣天師前致詞具法位臣某謹拜手投誠上啓三天扶教輔玄大法師真臣伏以齋忱普格適壇席之圓成道澤遐霑實師尊之芘佑自念狂愚之僣仰蒙憫濟之深惟是臣等退鈍之資孤陋之學敢不臨壇而勉力終虞失格以成愆乃負愧而莫逃輒陳詞而自訟具有箋牘敬用披宣恭望師慈曲垂省録宣箋上來箋文巳行陳啓願矜末學曲貸深愆頒行紏察之司消除過籍關告校量之所紀勒齋功載德由中酬恩無地緬想靈光之如對巳瞻法從之飛空壇衆稱揚同誠拜送舉修齋同前次詣五帝幕致辭具法位臣某講拜手投誠上啓東方青帝南方赤帝西方白帝北方黑帝中央黃帝臣伏以祈天告地爰祗按於科條蕆事修齋實仰關於校録奉九朝之成禮普萬彚以蒙休曲濟善緣實由宸眷強顔有愧俯首知歸但以臣等血肉之資口耳之學踐齋壇而行教昧真典以違科雖崇建之巳終慮罪愆之難逭敢陳丹愫敬貢箋文干冒聖聰仰祈省録宣箋披讀箋文巳塵睿監願貸謬違之罰俯停考察之威紏非録事之曹乞行削籍紀善勒功之府庶可標名法席既終乘輿將駕從屬車而莫及想清蹕以徒遙法衆稱揚同誠拜送舉修齋同前次至東三幕先詣三師前致辭具法位臣某謹拜手投誠上啓上古靈寶經師君靈寶籍師君靈寶度師君臣伏以科教之宏敷本由明授齋修之成就實出保全誠格干天恩歸有地束骸知幸刻骨無窮但以臣等朴野之資迂踈之學冒列宣謄之職獲終濟度之儀事雖圓成過則深重輒憑箋牘以謝愆非謹用宣陳仰祈省録宣箋上來箋文敬攄哀悃願扶科教曲宥罪瑕落過籍於三元勒齋功於九極仙科徹奏梵響收音雲輿難駐於人寰羽蓋將升於天路凡軀莫舉真馭以遙法衆稱揚同誠拜送舉修齋同前次詣三官幕致辭具法位臣某謹拜手投誠上啓上元天官帝君中元地官帝君下元水官帝君臣伏以紀善録功允屬三元之府修齋設醮幸終五日之規凡兹善果之圓成實藉恩休之普博自非大造豈遂凡私但以臣等萎萃之資荒蕪之學惟聞見之不廣故行用之多非粗畢善因恐罹冥譴欲祈原貸專用首陳披露箋文恭祈省録宣箋上來箋文幸陳真聽乞少寬於玄憲願咸前於罪書敕彼仙曹勒兹齋福宏道恩而廣覆覃沖廕以無窮既徹瑶壇難稽玉輦計將升於霄漢徒瞻望於瑶穹法衆稱揚同誠拜送次詣玄師前致辭具法位臣某謹拜手投誠上啓玄中大法師臣伏以玄綱肇舉幸齋直之告成靈蔭誕孚普幽明而均慶靖惟僥冒實藉生成但以臣等么麼之資淺近之學雖扶持而畢事必謬戾以違科俯首懷慚束身請宥輒具箋牘僣以陳聞仰冀真慈曲垂省録宣箋上來凡愫巳徹淵聰願恢大宥之恩普貸無窮之罰勒善功於三界流齋福於十方塵濁之途難稽仙仗穹玄之境將邁靈驂雖依戀之誠深念攀從之莫及叨恩至渥陳悃莫窮法衆稱揚同誠拜送次至監臨神祝白具法位某謹焚香上白監壇某神伏以翊贊教網籍典祀有神之力肅嚴壇界資地祇列職之勤適大齋之告成幸仙儀之禮畢周旋衛護召命宣通皆出維持重勞駐劄除巳言功於天闕上祈進於仙階已竟沖科難稽神馭合還所屬悉復靈司後有修齋更祈臨賁法事至焚燎所化錢馬疏狀焚詞頌向來表白回向伏以赤書演妙濟世莫窮黃籙玄科度人無量以今齋官某刻心濟度勵志修齋啓建無上靈寶黃籙大齋五晝夜祈天告地拜表上章燒香然燈轉經行道保安家國利佑存亡設醮謝恩解壇散席巍巍善果蕩蕩良因幸遂圓成並巳周畢伏願邦國寧謐寰宇安平九祖先靈登升善域六親家眷被沐垂休庶俾係薦亡魂某承此齋功自知宿命永脫沉迷之境徑登清淨之鄉以至三途罷謫役之勞九地釋拘纏之苦含親抱識咸遂昭蘇賦性植形悉臻利濟為上因緣念大聖元始天尊太上道君太上老君十方靈寶天尊不可思議功德髙功回靖上香交賀慶齋圓成退位滿散恭聞道不可得而名因經而立教經不可得而備隨運而開祥元始一氣分三是為玄元始三氣玄氣為清微天曰玉清境元始以龍漢之效説洞真經一十二部於此天中出書是名天寶也元氣為禹餘天曰上清境元始以延康之劫説洞玄經一十二部道君於此天中出書是名靈寶也始氣為太赤天曰太清境元始以赤明之劫説洞神經一十二部老君於此天中出書是名神寶也及至開皇之餘敷揚三洞下化人間上皇以後群經衆典流布無窮三洞之經乍隱乍顯或存或亡自非玄都玉京之上不得備足三十六部之全總計一百八十四萬四千二百餘卷凡世有此而闕彼後降而前隱天地開闢教法興行之後人間未嘗三洞周足秦末三茅真君修存上道洞真之教巳萌其端至東晉哀帝興寧年間南嶽魏夫人以大洞衆經付楊司命以次流傳東吳葛仙翁受經於徐來勒而洞玄之典大布正一天師遇老君於鶴鳴而洞神之教宏敷是其大源也此外或見於他書或付於史册或因人而特降或應運而荐傳出沒不常隱顯無定宋齊之間陸簡寂以靈秀之姿振虛皇之教大敷道典廣闢真源分九清三洞之殊列五法四輔之異區别真偽研究精粗而經誥之存者𦆵一萬八千卷後世稱三十六部萬八千篇者乃陸簡寂校之目也其後南北紛擾典籍散亡後周武帝立通玄觀收聚道典尚及萬卷隋室之末四方兵戈中原板蕩或焚或毀經教淩夷暨唐開元天寶之間天下無事玄宗稍加收葺止得七千餘卷唐有瓊經綱首是此時也未幾大盜侵逼天子蒙麈道館琳宫所至凋弊厥後廣成先生又值艱難之際極力搜尋收亡輔遺校開元之目不及其半既按三洞之經遂參以陸簡寂張清都所編齋科酌量今古審訂事冝重編黃籙齋科四十卷備極允當不爽古規蓋見時經籍雖巳多亡不若今日之甚也當時書成之後露剌告天特昭玄應逮今將四百載罔敢擬議前後按儀修奉莫不感格顯得報應者不可勝計自唐以後五代亂離道格之亡嘗七八四方割據之地亦有崇廣經誥之地或起琳宫或見道藏多隨偏方所有之經編排而入訛雜尤多宋朝統一之後天下平安真宗命宰臣王欽若校正道典其中精粗莫别真偽混殽已不能免宣和之際徽宗主張科法教門大興於一時而經籍正典終不能一一淳正靖康以後駐畢錢塘南北間關道家經籍尤甚不備若廣成先生編集齋科之時身居翰苑任兼執正朝廷典籍省府圖書兩街道官二京祕藏悉可指索皆得搜揚所以著書立言各有經據天下後世無不遵行今之諸方道藏可以數計而經籍不訛者甚少況於私家相傳里閭集寫實難據依然世人或得數卷之經自尚真偽莫辨謂人莫巳若憑壓同輩攻訐古人至於出言主論亦將廣成先生齋科輒行去取雖未能明言其非乃多暗起議論擅作更攺意謂自己傳得祕經便可髙出廣成之上殊不知廣成編校之時藉朝廷之力以搜訪豈不勝於區區一家之所有哉陸簡寂編科書乃在宋齊之際張清都亦在廣成之前而廣成書中未嘗遺二君之説自執一已之見故其多敘某處張清都已述某處則依據陸簡寂之科可謂洪纎悉舉具細兼收矣至於今日後學之士乃欲議之恐其説未必可以久行也私家所收之經未必如當時也今所編靈寶則一遵古法黃籙則悉從廣成之科固未能隨順於世俗實可以不愧於鬼神所是散壇設醮一節與浙間俗儀小異以至蔣氏黃籙立成儀多主古科亦引經典出處其間又或參以近世之式如先行散壇撤席之後再發請醮狀牒别行設醮乃近世之規爾蔣氏儀中從浙東風俗而用之却不言此格出於某經中古來科法拜言功宣表告山水土三簡即降神設醮一併送師徹席惟路真官以正一科品奉行黃籙却是設醮之後方拜表散壇一併送師徹席正一之宗所主不同而路君之意亦以古儀而定式也江東西行之不以異用古法於浙東與世俗相違而蔣氏立成儀刋行巳出且其説與浙俗相符人必是彼者衆此書為天下之公器不敢用此變古異時他日豈無髙古博洽之士公議未易泯也醮後送師謝過等語乃髙功口啓之辭古科不載此等瑣細却是臨壇之不可闕者允中謹巳撰定在前隨法備用免致臨時言語失次而巳此又非用近世儀而雜古典也宿啓建壇正齋九朝一應科文並見廣成先生齋科此不再録上清靈寶大法卷之四十
