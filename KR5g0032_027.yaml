body:
  text: 洞玄靈寳法師南曹執法典者權童𥘉府右翊治金𠃔中編第二次奏玉清上清太清昊天北極天皇地祇東極次申天樞院引進天省玄師三官三師五府地府水府東嶽牒九州社令當郡城隍法中官將奏玉清狀具法位臣姓某右臣乆玷靈司素無善行軄在宏教理合濟時敢貢凡忱上干宸聽臣謹據某等投詞乞崇建黄籙大齋保國安家拔幽濟顯來詞勤篤不敢遜辭巳於某月日預期奏聞天闕外切縁黄籙科法事極崇嚴臣么麽微軀昬愚陋質未明炁候謬主齋修慮魔障之莫除致顯幽之難濟況普度䰟爽實爲深切若非先次頒行尚恐冥關拘滯須至録狀上奏虚无自然元始天尊玉陛下恭望道慈曲垂憫録先次原赦臣夙世今生深罪重過俾無魔障許以敷宏仍乞下泰玄都省照臣申請亟賜頒降施行臣干冐道威無任戰慄待罪之至謹狀太歳年月日具法位臣姓某狀上清太上道君洞玄靈寳天尊玉陛下太清太上老君洞神道德天尊玉陛下昊天太上開天執符御曆含眞體道昊天玉皇上帝玉陛下北極中天紫微北極大帝玉陛下天皇勾陳星宫天皇大帝玉陛下地祇承天効法厚德光大后土皇地祇闕下度師云三清玉帝奏可用引進狀若北極天皇乃是星界后土乃是配天者屬地界此三狀不當發三天門下此亦金先生一時失詳也右七狀並同式用引進狀申天樞院可漏子上簽聖位方函上簽黄並云奏狀上詣三天門下天樞院進奏奏東極具法位臣姓某右臣同玉清狀須至録狀上奏東極青宫太乙救苦天尊陛下恭望道慈俯垂憫録特宏誓願廣煥慈光普燭三界十方天牢地獄隂境冥曹應干昬衢夜府咸令開霽仍乞分遣飛天神人先次責勒冥司主宰將一應執對非䰟日下疾速結絶䟽出應度之衆發詣齋壇及乾坤之中九州分野遊神飛爽有主無親五道三途一切䰟識並令逐處拘集一併俟候九龍符命到日遣至齋壇領沾道澤施行臣干冐道威下情無任戰慄待罪之至謹奏方函奏狀謹上詣東極青宫具法位臣姓某謹函封再告申天省具法位臣姓某右臣猥以庸資叨承大化未明炁候胃列班行夙夜戰兢罔知自効誓勒利濟或報毫分臣比據入意臣據詞䖍切不敢抑違謹爲祇按典章擇日修建巳於某月幾日預期申告外切縁黄籙齋法事極崇嚴而臣肉質凡夫庸才淺學謬當重任力豈能勝兼欲修篆應干符籙及先次行下有司證結罪䰟以時遣發若非取㫖施行豈得早遂感通須至再具申聞者右謹具申三天門下泰玄都省主宰髙眞㳟望眞慈特與敷奏天闕取㫖行下三界十方天牢地獄隂境冥曹應干合屬去處責勒有司將見係薦執對一應罪䰟日下疾速結絶䟽出應度之衆發詣齋壇及九州分野五道三途一切孤䰟並令逐處城隍主者社令里域等神拘集前来伺候開度施行臣千冐眞威不勝惶懼謹狀再告申五府具法位臣姓某臣猥以庸資云同省狀右謹具申三天扶教輔元大法師眞武靈應佑聖眞君翊聖儲慶保德眞君天猷副元帥眞君天蓬都元帥眞君同省狀申玄中大法師申靈寳度師眞君靈寳籍師眞君靈寳經師眞君申下元水官帝君中元地官帝君上元天官帝君巳上三申狀並同天省狀式再告申地府靈寳大法司當司據入意本司據詞難抑除巳録奏天闕施行外照得黄籙明科事關幽顯理冝廣度庶成善功須至録狀申聞者右謹具申北隂酆都大帝伏望聖慈特與行下六天十洞五嶽九幽泉曲冥關黄泉隂獄中元地府四十二曹應干合屬去處責勒有司將執對罪䰟日下疾速取證結絶䟽出應度之衆及九州分野飛爽遊靈五道三途四生萬類有主無親昔亡往化一切孤䰟並仰逐處城隍社令里域主者各行拘集部送前來祗領天澤以副上帝生成之恩謹狀太歳年月日具法位姓某録狀再告水府靈寳大法司當司據入意云同地府狀須至録狀申聞者右謹具申水府扶桑東霞大帝伏望聖慈特與行下九江四瀆八海五湖水國龍庭溪源潭洞溟泠水獄下元三府四十二曹應干合屬去處云同地府狀再申東嶽靈寳大法司當司據云同地府狀須至録狀申聞者右謹具申東嶽天齊仁聖帝云同地府結尾牒社令靈寳大法司牒某州社令當司據入意來詞誠切理合奉行除巳節次録奏天廷外照得齋法崇嚴眞科隆重合關三界依應施行須至移文牒請詳事理即與轉牒關告天下城隍典者古跡靈坵社稷冥司隂宮神館郊源道路村谷山林應干合屬去處責勒所𨽻主者將沉滯幽途拘留里域尚應考録執對未除一切罪爽並要日下疾速取證結絶䟽出應度之衆及浮遊四野飛爽遊䰟五道三途四生萬類應干孤䰟滯𩲸伺候文移到日悉行拘集逓發前來承領齋功以時升度事畢具奏依格叙勲謹牒太歳年月日牒當郡城隍靈寳大法司牒上某州府城隍主者當司據入事同前牒請詳事理即與行下管内縣鎭村墟山林溪谷古跡靈壇社稷典祀應千合屬去處皆同前牒牒官將靈寳大法司牒上靈寳官屬童初府官將當司據入意同社令牒牒請詳事理依準洞玄靈寳經科即與部帯吏兵一合前赴齋所駐劄奉宣天令翻布符章攝𩲸召䰟謄章進表旁周三界上極九霄地府水府隂曹冥域文移所及隨事感通齋事圓成奏勲如律謹牒右件上境奏申則關上界直符日直主者地府嶽府申牒則關中界功曹同逐處里域等神水府申狀則關下界直符逓發黄籙再告之例大畧如此若請命天廷告聞齋事則止奏上境則不必申聞中下界亦可儻齋期尚逺則告之後又三告可也今立第三告奏檢以備行用或齋期己近擇日巳定則不必用前件再告文移只預告之後便以第三告之檢作再告申發更詳事體重輕齋期逺近臨事斟酌務令適中乃爲盡善或資觀美廣列文移繁冗太過則徒費爾髙識之士更從長行之第三次奏玉清上清太清昊天北極天皇后土東極申天樞院引進泰玄都省童𥘉五府玄師三師三官牒官將奏三清三狀同式具法位臣姓某右臣先據入意郷貫某人投詞稱某親年月日時生於某年月日時在某處身故乞行崇建無上靈寳黄籙大齋幾晝夜朝眞行道備物陳儀上福邦家保安寰宇旁資含識普度孤䰟集兹善功專用薦拔亡過某䰟起生度化謹取今月某日於州縣某處舒壇蔵事恭爲關行臣擬告行元始符命金籙白簡長生靈符救苦眞符破地獄眞符拔幽䰟眞符九龍符命太上敕赦生天寳籙靈寳本科諸眞符命混元神虎玉札遍下十方三界地獄冥曹原赦三途五道十類四生應度一切孤䰟及某人家九玄七祖内族外親與係薦某䰟出離幽境悉赴齋壇顯現形儀以時受度謹再録狀昧死上奏虚无自然元始天尊玉陛下恭望道慈𠃔臣奏請所有前件符命容臣奉行仍祈道炁廣覃特俾幽冥開泰臣干冐道威下情無任戰慄待罪之至謹奏奏昊天北極天皇后土四狀並同具法位臣姓某右臣先據入意同前謹再録狀昧死上奏太上開天執符御曆含眞體道昊天玉皇上帝玉陛下恭望天慈允臣所奏特降敕命告下十方三界應干合屬去處普行赦宥係薦亡爽及各家宗祖親姻三途萬類一切幽䰟赴壇受度所有前件符命容臣便冝書篆次第宣行臣干冐天威下情無任戰慄待罪之至謹奏奏東極具法位臣姓某右臣先據入意同前謹再録狀上奏東極青宫太乙救苦天尊玉陛下恭望道慈允臣所奏特敕飛天神人下九龍符命遍詣十方三界地獄幽關云寫皆同昊天狀式第三次申天樞院引進狀同前𥘉式第三次申泰玄都省具法位臣姓某臣猥以庸資叨承大化未明炁候冐列班行夙夜戰兢罔知自效誓勤利濟或報毫分臣先據某郷貫某人投詞穪某親某年月日時生於某年月日時身故乞建黄籙大齋福國康時拔幽濟顯集兹善果資薦前件亡䰟臣謹祗率法流於某處舒壇立纂列像陳儀以某日爲始宿啓建壇攝召幽䰟修齋啓事於某日昧爽以後三日九時朝眞懴謝行香誦經廣施無礙斛食普度十類幽䰟併係薦某䰟請炁錬度傳符受戒俾遂超生至某日修設三界髙眞清醮三百六十分位昭答天恩今者齋事有期臣擬告行元始符命金籙白簡長生靈符救苦眞符出離生死眞符東極青宫九龍符命太上敕赦生天寳籙靈寳本法元始符命諸品靈符混元神虎玉札遍下十方三界地獄冥曹赦宥亡䰟某及其家九玄七祖徃逝宗親四海九州三途五道十類四生幽䰟滯𩲸出離隂境悉赴齋壇須至再具申聞者右謹具申三天門下泰玄都省主宰髙眞恭望眞慈允兹申請特與敷奏天闕取旨告下三界隂曹主録亡䰟應干合屬去處悉令依應開扄啓閉釋宥罪䰟仍乞差降三洞四輔經籙法中官將吏兵法中官將吏兵靈寳官屬神虎追䰟攝𩲸將吏臣所行諸法中追攝官將十方飛天神人玄都金龍驛㬰茭龍驛吏三界四直傳奏直符功曹玉童玉女監齋直使千乗萬騎眞靈付臣行司頒命宣符追䰟攝𩲸傳神達悃營衞齋壇俾遂感通以福幽顯臣干冐眞威不勝惶懼之至謹狀第三次申五府具法位臣姓某臣謹據入意同省狀式右謹具申天師眞武翊聖天猷天蓬云同省狀第三次申玄師具法位臣姓某臣謹據入意同省狀式右謹具申玄中大法師恭望師慈云同省狀式第三次申三師臣伏覩黄籙齋法䇿役萬靈苟有謬違莫逃譴罰如臣者塵途下士季世晚生匪仗師恩委難昭格臣先據云入意同前式須至再具申聞者右謹具申靈寳度師眞君靈寳籍師眞君靈寳經師眞君恭望師慈云同前狀第三次申三官具法位臣姓某臣夙籍微因乆承眞䕃冐膺法籙之職獲居利濟之司誓盟之初退墮有譴再申衷愫荐瀆靈慈臣比據入意至超生道境臣據詞度切理合關行臣謹柢率同齋之士恭就某處舒壇列象備物陳儀尅取某日宿啓建壇至某日修齋行事除巳再行録奏天闕告下符命拔度召攝施行外須至録狀申聞者右謹具申下元水官帝君中元地官帝君上元天官帝君恭望眞慈允臣申請特與行下十方三界三元九宫二十七府百二十曹應干合屬去處悉令依格照應符命所至根攝亡䰟疾速放停考對不得拘留隨召赴壇霑領齋薦仍乞原宥臣與同齋法衆等宿生今世萬罪千愆許容奉行俾無魔障善縁成就幽顯蒙恩實出生成之賜臣干冐眞威不勝惶懼之至謹狀第三告牒官將靈寳大法司牒上靈寳官屬童初五府官將當司據入意同前三官狀除巳録奏天闕告行符命外今來齋事屇期合要急行拘集天下一應孤䰟滯𩲸根攝係薦亡過某䰟儀依時赴壇報應須至移文牒請詳巳行請降事理即與關告三洞四輔經籙法中官君將吏攝召鍊度傳符逹奏十方三界五嶽四瀆監齋直事兵馬萬神分靈布炁駐劄行司通逹文移營衞齋事傳符宣令上表謄章攝𩲸召䰟關聞幽顯周旋齋果事畢言功録奏天廷一如玄律牒至幸疾速依應施行謹牒恭覩三境天尊號曰虚无自然洞眞元始天尊曰太上道君洞玄靈寳天尊曰太上老君洞神道德天尊只得如此蓋三炁則大道也本不可名聚而成形故謂之天尊乃不得巳而强名也至於太上道君太上老君之稱則見於古來經典及其立教則有洞眞洞玄洞神之分是以三尊之號極止於此近世天心正法中則稱王清上帝上清大帝太清大帝此則以世法尊之以主宰言之謂之帝此外以意杜撰好竒尚異未免褻瀆矣黄籙正奏及關申三界合屬去處玉清上清太清昊天北極天皇后土東極南極木公金毋九天上帝三十二天上帝五老天君巳上並係奏狀申師𥙷軄童初府祈晴畫一申天省北斗日宫月府九皇夫人五星二十八宿南斗玄師童初五府葛仙翁許眞君天官地官五帝監齋採訪使者救苦大惠二眞人九天司命九天司馬三界魔王黄籙院南昌上宫三元將軍天樞院引進狀五帝大魔王巳上並係申狀牒神王緫牒將吏前項奏申牒文並關上界功曹日直時直主者酆都東嶽上卿五嶽帝君泰山府洞天福地靖治九壘紂絶隂天宫泰殺諒事宗天宫明晨耐犯武成天宫恬照罪炁天宫宗靈七非天宫敢司連宛屢天宫泰素妙廣眞君隂德定休眞君洞明普靜眞君玄德五靈眞君最勝耀明眞君寳宿昭成眞君神變萬靈眞君無上正度眞君飛魔演慶眞君五化威靈眞君酆都髙明司直酆都東明眞公酆都西明眞公酆都南明眞公酆都北明眞公鬼官北斗酆都大禁晨酆都中禁晨酆都侍帝晨酆都鬼官司命酆都丈人宫酆都北都宫巳上並係申狀酆都變生府酆都五道都府酆都泉曲府酆都北天修門郎酆都北彈方侯酆都南彈方侯酆都溟泠大神酆都西明郎已上並係牒文前項申牒關付中界功曹九州社令州縣城隍太歳土府蒿里丈人已上牒文引付逐處沿路土地傳逓水府暘谷漢江水帝楚江水帝湘江水帝淛江水帝吳江水帝楊子江水帝川江水帝松江水帝荆江水帝巳上並係申狀東海淵聖廣德王南海洪聖廣利王西海通聖廣潤王北海沖聖廣澤王江瀆廣源王河瀆靈源王淮瀆長源王濟瀆清源王馬當山上水府採石山中水府金山下水府青草湖大神彭蠡湖大神丹陽湖大神謝陽湖大神太湖大神巳上並用牒二項狀牒並關下界功曹玉清狀上七御狀具法位臣姓某右臣胎生濁質末學庸資幸承宿慶之深叨佩靈章之寵功能未著罪戾巳彰惟有濟顯拔幽庶可立功𥙷過是以不量微賤輙瀆穹髙況奉誠詞豈容抑絶臣謹據某郷貫某人投詞乞行崇建無上靈寳黄籙大齋祝君康時保國安家拔度九先六族普資五道三途集諸善因專伸追薦亡過某等䰟及保安某家見存眷屬臣除巳節次上聞外今來謹爲祗率法流按儀修建尅取某月幾日宿啓建壇自某昧爽爲始三日正齋九時朝奏攝召係薦亡䰟及九州四海萬𩔖四生五道三途沉䰟滯𩲸享食受鍊證品超生滿散修設清醮三百六十分位昭答恩庥庶俾幽關無沉溺之䰟斯民躋壽㡽之域謹再昧死録狀上奏虚无自然洞眞元始天尊玉陛下恭望道慈容臣開度頒下合屬眞司照應施行請降恩光證明修奉臣干冐道威下情無任戰慄待罪之至謹奏上清太上道君洞玄靈寳天尊王陛下太清太上老君洞神道德天尊玉陛下巳上三狀同式太上開天執符御曆含眞體道昊天玉皇上帝中天紫微北極大帝勾陳星宫天皇大帝承天効法厚德光大后土皇地祗巳上四狀並同三境狀式三帝攺云天慈后土攺云宸慈申天樞院引進狀如前式東極狀方函上詣東極青宫具法位臣姓某右臣去同三境狀式謹再録狀上奏東極青宫太乙救苦天尊玉陛下恭望道慈允臣奏請特與申敕十方无極飛天神人救苦童子合千官將吏兵遵照巳行請降九龍符命事理遍詣十方三界夜府幽扄考治之司執對之所應千合屬去處開關啓閉赦罪釋𡨚拔度係薦衆䰟以至四海九州三途萬𩔖遊神飛爽一切孤䰟出離苦趣悉赴齋壇領霑宸休以時升度臣干冐道威下情無任惶懼待罪之至謹奏南極狀方函上詣南極帝闕具法位臣姓某右臣㐲念德薄罪深自悲濁陋豈期昌運獲被玄津未際眞師無門效報敢勤濟度少補夙愆臣謹據入事同三境狀須至録狀上奏南極長生大帝陛下恭望天慈允臣所奏特與告下南方丹天世界朱陵火府差降錬度官君將吏下赴齋壇治錬所度亡䰟及五道三途四生萬𩔖一切幽䰟上登朱宫流火之庭名書紫䇿度化更生庶使齋福普覃幽明均慶萬方康泰衆𩔗昭蘇臣干冐宸威下情無任惶懼待罪之至謹奏木公金毋各一專狀世稱木公爲東華丹林大帝者别是一位非木公也金毋有稱丹皇道君者亦别是一位男眞之極尊者稱道君女眞之極尊者稱元君又或稱萬炁祖毋元君此雖是女眞亦别是一位非金毋也古來羅天醮位可考此經誥䟽出不宜以世俗更易之金木者乃隂陽之根宗鍊度之所𨽻也木公狀方函上詣東華上相宫具法位臣姓某右臣輙忘微賤僣冐穹髙尚祈寛恩免加誅譴臣謹據入事同前須至昧死録狀上奏東華上相木公青童道君陛下恭望道慈允臣所奏憫憐未學成就齋功庶使澤及幽明福周寰宇臣尅以某日建壇爲始錬度䰟儀欲乞宻降乾象之英華特布眞陽之生炁治録係薦亡䰟等及三途五道萬𩔖四生一切幽䰟即使九竅重開百關再造表裏洞徹内外光明返性聚神知根復命超登善境共陟仙郷以至幽夜昭蘇乾坤寧謐臣干冐道威下情無任惶懼待罪之至謹奏金毋狀方函上詣西靈龜闕具法位臣姓某右臣云同前式須至昧死録狀上奏白玉龜臺九靈太眞金毋元君闕下恭望睿慈允臣所奏憫憐末學成就齋功臣以某日建壇爲始錬度䰟儀欲乞潜布西闕之靈津特降眞隂之妙炁冶錬係薦亡䰟等及五道三途四生萬𩔖一切幽䰟即使九竅重開百關再造表裏洞徹内外光眀反性聚神歸根復命超登善境共陟仙郷以至幽夜昭蘇乾坤寧謐臣干冒道威下情無任戰慓待罪之至謹狀九天上帝狀具法位臣姓某右臣輙瀝丹𠂻上千霄鑒臣凡愚穢質叨佩靈文軄在宣謄教當濟拔凡有披訴敢不上聞臣謹據入事同前須至録狀上奏鬱單無量壽天帝陛下恭望天慈允臣所奏特與告下合屬眞司照應即使齋功成就魔障不生福被寰區澤覃家國乞降帝眞胞命元元一黄演之炁下布齋壇灌錬所薦亡䰟某等及五道四生三途萬𩔗一切孤䰟即使回骸生炁立影聚神得沐玄津重資道性知根復命咸遂生成臣干冐天威下情無任戰慄之至謹奏右九天九狀並同式只攺聖位及某炁依生神章寫三十二天帝用三十二狀聖位照依度人經上寫具法位臣姓某右臣輙伸塵悃上瀆叢霄伏念臣季世駑材靦顔覆育叨承大法德薄罪深妄意宣宏冀圖補復臣謹據入事同前須至謹録狀上奏太皇黄曽天帝陛下恭望天慈允臣所奏特賜恩光俯燭鑒映齋壇給降洞玄法籙所𨽻官童將吏靈寳官屬依科受事成就齋功仍乞敷靈寳之慧光法乾坤之造化爲係薦亡䰟某等及五道三途四生萬𩔖含情抱識一切幽䰟蕩除昬翳含哺除陽溟涬生津立根受祖恍惚有象感炁凝神庶使幽途無沉滯之䰟人世迪丕平之慶恩周家國澤被華夷臣干冒天威下情無任戰慄之至謹狀太歳年月日具位臣姓某狀上清靈寳大法卷之二十八
