body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金𠃔中編第二次奏玉清上清太清昊天北極天皇地祇東極次申天樞院引進天省玄師三官三師五府地府水府東嶽牒九州社令當郡城隍法中官將奏玉清狀具法位臣姓某右臣久玷靈司素無善行職在宏教理合濟時敢貢凡忱上干宸聽臣謹據某等投詞乞崇建黃籙大齊保國安家拔幽濟顯來詞勤篤不敢遜辭巳於某月日預期奏聞天闕外切緣黃籙科法事極崇嚴臣么麼微軀昏愚陋質未明氣候謬主齊修慮魔障之莫除致顯幽之難濟況普度魂爽實為深切若非先次頒行尚恐冥關拘滯須至録狀上奏虛無自然元始天尊玉陛下恭望道慈曲垂憫録先次原赦臣夙世今生深罪重過俾無魔障許以敷宏仍乞下泰玄都省照臣申請亟賜頒降施行臣干冒道威無任戰栗待罪之至謹狀太歲年月日具法位臣姓某狀上清太上道君洞玄靈寶天尊玉陛下太清太上老君洞神道德天尊玉陛下昊天太上開天執符御曆含真體道昊天玉皇上帝玉陛下北極中天紫微北極大帝玉陛下天皇勾陳星宫天皇大帝玉陛下地祇承天效法厚德光大后土皇地祇闕下度師云三清玉帝奏可用引進狀若北極天皇乃是星界后土乃是配天者屬地界此三狀不當發三天門下此亦金先生一時失詳也右七狀並同式用引進狀申天樞院可漏子上簽聖位方函上簽黃並云奏狀上詣三天門下天樞院進奏奏東極具法位臣姓某右臣同玉清狀須至録狀上奏東極青宫太乙救苦天尊陛下恭望道慈俯垂憫録特宏誓願廣煥慈光普燭三界十方天牢地獄隂境冥曹應干昏衢夜府咸令開霽仍乞分遣飛天神人先次責勒冥司主宰將一應執對非魂日下疾速結絶疏出應度之衆發詣齊壇及乾坤之中九州分野遊神飛爽有主無親五道三途一切魂識並令逐處拘集一併俟候九龍符命到日遣至齊壇領沾道澤施行臣干冒道威下情無任戰栗待罪之至謹奏方函奏狀謹上詣東極青宫具法位臣姓某謹函封再告申天省具法位臣姓某右臣猥以庸資叨承大化未明氣候胃列班行夙夜戰兢罔知自效誓勒利濟或報毫分臣比據入意臣據詞䖍切不敢抑違謹為祇按典章擇日修建巳於某月幾日預期申告外切緣黃籙齊法事極崇嚴而臣肉質凡夫庸才淺學謬當重任力豈能勝兼欲修篆應干符籙及先次行下有司證結罪魂以時遣發若非取㫖施行豈得早遂感通須至再具申聞者右謹具申三天門下泰玄都省主宰髙真恭望真慈特與敷奏天闕取㫖行下三界十方天牢地獄隂境冥曹應干合屬去處責勒有司將見係薦執對一應罪魂日下疾速結絶疏出應度之衆發詣齊壇及九州分野五道三途一切孤魂並令逐處城隍主者社令里域等神拘集前來伺候開度施行臣千冒真威不勝惶懼謹狀再告申五府具法位臣姓某臣猥以庸資云同省狀右謹具申三天扶教輔元大法師真武靈應佑聖真君翊聖儲慶保德真君天猷副元帥真君天蓬都元帥真君同省狀申玄中大法師申靈寶度師真君靈寶籍師真君靈寶經師真君申下元水官帝君中元地官帝君上元天官帝君巳上三申狀並同天省狀式再告申地府靈寶大法司當司據入意本司據詞難抑除巳録奏天闕施行外照得黃籙明科事關幽顯理冝廣度庶成善功須至録狀申聞者右謹具申北隂酆都大帝伏望聖慈特與行下六天十洞五嶽九幽泉曲冥關黃泉隂獄中元地府四十二曹應干合屬去處責勒有司將執對罪魂日下疾速取證結絶疏出應度之衆及九州分野飛爽遊靈五道三途四生萬類有主無親昔亡往化一切孤魂並仰逐處城隍社令里域主者各行拘集部送前來祗領天澤以副上帝生成之恩謹狀太歲年月日具法位姓某録狀再告水府靈寶大法司當司據入意云同地府狀須至録狀申聞者右謹具申水府扶桑東霞大帝伏望聖慈特與行下九江四瀆八海五湖水國龍庭溪源潭洞溟泠水獄下元三府四十二曹應干合屬去處云同地府狀再申東嶽靈寶大法司當司據云同地府狀須至録狀申聞者右謹具申東嶽天齊仁聖帝云同地府結尾牒社令靈寶大法司牒某州社令當司據入意來詞誠切理合奉行除巳節次録奏天廷外照得齊法崇嚴真科隆重合關三界依應施行須至移文牒請詳事理即與轉牒關告天下城隍典者古跡靈丘社稷冥司隂宮神館郊源道路村谷山林應干合屬去處責勒所𨽻主者將沉滯幽途拘留里域尚應考録執對未除一切罪爽並要日下疾速取證結絶疏出應度之衆及浮遊四野飛爽遊魂五道三途四生萬類應干孤魂滯𩲸伺候文移到日悉行拘集遞發前來承領齊功以時升度事畢具奏依格叙勳謹牒太歲年月日牒當郡城隍靈寶大法司牒上某州府城隍主者當司據入事同前牒請詳事理即與行下管內縣鎮村墟山林溪谷古跡靈壇社稷典祀應千合屬去處皆同前牒牒官將靈寶大法司牒上靈寶官屬童初府官將當司據入意同社令牒牒請詳事理依準洞玄靈寶經科即與部帶吏兵一合前赴齊所駐劄奉宣天令翻布符章攝𩲸召魂謄章進表旁周三界上極九霄地府水府隂曹冥域文移所及隨事感通齊事圓成奏勳如律謹牒右件上境奏申則關上界直符日直主者地府嶽府申牒則關中界功曹同逐處里域等神水府申狀則關下界直符遞發黃籙再告之例大略如此若請命天廷告聞齊事則止奏上境則不必申聞中下界亦可儻齊期尚逺則告之後又三告可也今立第三告奏檢以備行用或齊期己近擇日巳定則不必用前件再告文移只預告之後便以第三告之檢作再告申發更詳事體重輕齊期逺近臨事斟酌務令適中乃為盡善或資觀美廣列文移繁冗太過則徒費爾髙識之士更從長行之第三次奏玉清上清太清昊天北極天皇后土東極申天樞院引進泰玄都省童𥘉五府玄師三師三官牒官將奏三清三狀同式具法位臣姓某右臣先據入意鄉貫某人投詞稱某親年月日時生於某年月日時在某處身故乞行崇建無上靈寶黃籙大齊幾晝夜朝真行道備物陳儀上福邦家保安寰宇旁資含識普度孤魂集兹善功專用薦拔亡過某魂起生度化謹取今月某日於州縣某處舒壇藏事恭為關行臣擬告行元始符命金籙白簡長生靈符救苦真符破地獄真符拔幽魂真符九龍符命太上敕赦生天寶籙靈寶本科諸真符命混元神虎玉札遍下十方三界地獄冥曹原赦三途五道十類四生應度一切孤魂及某人家九玄七祖內族外親與係薦某魂出離幽境悉赴齊壇顯現形儀以時受度謹再録狀昧死上奏虛無自然元始天尊玉陛下恭望道慈𠃔臣奏請所有前件符命容臣奉行仍祈道氣廣覃特俾幽冥開泰臣干冒道威下情無任戰栗待罪之至謹奏奏昊天北極天皇后土四狀並同具法位臣姓某右臣先據入意同前謹再録狀昧死上奏太上開天執符御曆含真體道昊天玉皇上帝玉陛下恭望天慈允臣所奏特降敕命告下十方三界應干合屬去處普行赦宥係薦亡爽及各家宗祖親姻三途萬類一切幽魂赴壇受度所有前件符命容臣便冝書篆次第宣行臣干冒天威下情無任戰栗待罪之至謹奏奏東極具法位臣姓某右臣先據入意同前謹再録狀上奏東極青宫太乙救苦天尊玉陛下恭望道慈允臣所奏特敕飛天神人下九龍符命遍詣十方三界地獄幽關云寫皆同昊天狀式第三次申天樞院引進狀同前𥘉式第三次申泰玄都省具法位臣姓某臣猥以庸資叨承大化未明氣候冒列班行夙夜戰兢罔知自效誓勤利濟或報毫分臣先據某鄉貫某人投詞稱某親某年月日時生於某年月日時身故乞建黃籙大齊福國康時拔幽濟顯集兹善果資薦前件亡魂臣謹祗率法流於某處舒壇立纂列像陳儀以某日為始宿啓建壇攝召幽魂修齊啓事於某日昧爽以後三日九時朝真懴謝行香誦經廣施無礙斛食普度十類幽魂併係薦某魂請氣錬度傳符受戒俾遂超生至某日修設三界髙真清醮三百六十分位昭答天恩今者齊事有期臣擬告行元始符命金籙白簡長生靈符救苦真符出離生死真符東極青宫九龍符命太上敕赦生天寶籙靈寶本法元始符命諸品靈符混元神虎玉札遍下十方三界地獄冥曹赦宥亡魂某及其家九玄七祖往逝宗親四海九州三途五道十類四生幽魂滯𩲸出離隂境悉赴齊壇須至再具申聞者右謹具申三天門下泰玄都省主宰髙真恭望真慈允兹申請特與敷奏天闕取旨告下三界隂曹主録亡魂應干合屬去處悉令依應開扄啓閉釋宥罪魂仍乞差降三洞四輔經籙法中官將吏兵法中官將吏兵靈寶官屬神虎追魂攝𩲸將吏臣所行諸法中追攝官將十方飛天神人玄都金龍驛㬰茭龍驛吏三界四直傳奏直符功曹玉童玉女監齊直使千乘萬騎真靈付臣行司頒命宣符追魂攝𩲸傳神達悃營衛齊壇俾遂感通以福幽顯臣干冒真威不勝惶懼之至謹狀第三次申五府具法位臣姓某臣謹據入意同省狀式右謹具申天師真武翊聖天猷天蓬云同省狀第三次申玄師具法位臣姓某臣謹據入意同省狀式右謹具申玄中大法師恭望師慈云同省狀式第三次申三師臣伏覩黃籙齊法䇿役萬靈苟有謬違莫逃譴罰如臣者塵途下士季世晚生匪仗師恩委難昭格臣先據云入意同前式須至再具申聞者右謹具申靈寶度師真君靈寶籍師真君靈寶經師真君恭望師慈云同前狀第三次申三官具法位臣姓某臣夙籍微因久承真䕃冒膺法籙之職獲居利濟之司誓盟之初退墮有譴再申衷愫荐瀆靈慈臣比據入意至超生道境臣據詞度切理合關行臣謹柢率同齊之士恭就某處舒壇列象備物陳儀尅取某日宿啓建壇至某日修齊行事除巳再行録奏天闕告下符命拔度召攝施行外須至録狀申聞者右謹具申下元水官帝君中元地官帝君上元天官帝君恭望真慈允臣申請特與行下十方三界三元九宫二十七府百二十曹應干合屬去處悉令依格照應符命所至根攝亡魂疾速放停考對不得拘留隨召赴壇霑領齊薦仍乞原宥臣與同齊法衆等宿生今世萬罪千愆許容奉行俾無魔障善緣成就幽顯蒙恩實出生成之賜臣干冒真威不勝惶懼之至謹狀第三告牒官將靈寶大法司牒上靈寶官屬童初五府官將當司據入意同前三官狀除巳録奏天闕告行符命外今來齊事屇期合要急行拘集天下一應孤魂滯𩲸根攝係薦亡過某魂儀依時赴壇報應須至移文牒請詳巳行請降事理即與關告三洞四輔經籙法中官君將吏攝召鍊度傳符逹奏十方三界五嶽四瀆監齊直事兵馬萬神分靈布氣駐劄行司通逹文移營衛齊事傳符宣令上表謄章攝𩲸召魂關聞幽顯周旋齊果事畢言功録奏天廷一如玄律牒至幸疾速依應施行謹牒恭覩三境天尊號曰虛無自然洞真元始天尊曰太上道君洞玄靈寶天尊曰太上老君洞神道德天尊只得如此蓋三氣則大道也本不可名聚而成形故謂之天尊乃不得巳而强名也至於太上道君太上老君之稱則見於古來經典及其立教則有洞真洞玄洞神之分是以三尊之號極止於此近世天心正法中則稱王清上帝上清大帝太清大帝此則以世法尊之以主宰言之謂之帝此外以意杜撰好竒尚異未免褻瀆矣黃籙正奏及關申三界合屬去處玉清上清太清昊天北極天皇后土東極南極木公金毋九天上帝三十二天上帝五老天君巳上並係奏狀申師𥙷職童初府祈晴畫一申天省北斗日宫月府九皇夫人五星二十八宿南斗玄師童初五府葛仙翁許真君天官地官五帝監齊採訪使者救苦大惠二真人九天司命九天司馬三界魔王黃籙院南昌上宫三元將軍天樞院引進狀五帝大魔王巳上並係申狀牒神王總牒將吏前項奏申牒文並關上界功曹日直時直主者酆都東嶽上卿五嶽帝君泰山府洞天福地靖治九壘紂絶隂天宫泰殺諒事宗天宫明晨耐犯武成天宫恬照罪氣天宫宗靈七非天宫敢司連宛屢天宫泰素妙廣真君隂德定休真君洞明普靜真君玄德五靈真君最勝耀明真君寶宿昭成真君神變萬靈真君無上正度真君飛魔演慶真君五化威靈真君酆都髙明司直酆都東明真公酆都西明真公酆都南明真公酆都北明真公鬼官北斗酆都大禁晨酆都中禁晨酆都侍帝晨酆都鬼官司命酆都丈人宫酆都北都宫巳上並係申狀酆都變生府酆都五道都府酆都泉曲府酆都北天修門郎酆都北彈方侯酆都南彈方侯酆都溟泠大神酆都西明郎已上並係牒文前項申牒關付中界功曹九州社令州縣城隍太歲土府蒿里丈人已上牒文引付逐處沿路土地傳遞水府暘谷漢江水帝楚江水帝湘江水帝浙江水帝吳江水帝楊子江水帝川江水帝松江水帝荆江水帝巳上並係申狀東海淵聖廣德王南海洪聖廣利王西海通聖廣潤王北海沖聖廣澤王江瀆廣源王河瀆靈源王淮瀆長源王濟瀆清源王馬當山上水府採石山中水府金山下水府青草湖大神彭蠡湖大神丹陽湖大神謝陽湖大神太湖大神巳上並用牒二項狀牒並關下界功曹玉清狀上七御狀具法位臣姓某右臣胎生濁質末學庸資幸承宿慶之深叨佩靈章之寵功能未著罪戾巳彰惟有濟顯拔幽庶可立功𥙷過是以不量微賤輒瀆穹髙況奉誠詞豈容抑絶臣謹據某鄉貫某人投詞乞行崇建無上靈寶黃籙大齊祝君康時保國安家拔度九先六族普資五道三途集諸善因專伸追薦亡過某等魂及保安某家見存眷屬臣除巳節次上聞外今來謹為祗率法流按儀修建尅取某月幾日宿啓建壇自某昧爽為始三日正齊九時朝奏攝召係薦亡魂及九州四海萬類四生五道三途沉魂滯𩲸享食受鍊證品超生滿散修設清醮三百六十分位昭答恩庥庶俾幽關無沉溺之魂斯民躋壽㡽之域謹再昧死録狀上奏虛無自然洞真元始天尊玉陛下恭望道慈容臣開度頒下合屬真司照應施行請降恩光證明修奉臣干冒道威下情無任戰栗待罪之至謹奏上清太上道君洞玄靈寶天尊王陛下太清太上老君洞神道德天尊玉陛下巳上三狀同式太上開天執符御曆含真體道昊天玉皇上帝中天紫微北極大帝勾陳星宫天皇大帝承天效法厚德光大后土皇地祗巳上四狀並同三境狀式三帝攺云天慈后土攺云宸慈申天樞院引進狀如前式東極狀方函上詣東極青宫具法位臣姓某右臣去同三境狀式謹再録狀上奏東極青宫太乙救苦天尊玉陛下恭望道慈允臣奏請特與申敕十方無極飛天神人救苦童子合千官將吏兵遵照巳行請降九龍符命事理遍詣十方三界夜府幽扄考治之司執對之所應千合屬去處開關啓閉赦罪釋𡨚拔度係薦衆魂以至四海九州三途萬類遊神飛爽一切孤魂出離苦趣悉赴齊壇領霑宸休以時升度臣干冒道威下情無任惶懼待罪之至謹奏南極狀方函上詣南極帝闕具法位臣姓某右臣伏念德薄罪深自悲濁陋豈期昌運獲被玄津未際真師無門效報敢勤濟度少補夙愆臣謹據入事同三境狀須至録狀上奏南極長生大帝陛下恭望天慈允臣所奏特與告下南方丹天世界朱陵火府差降錬度官君將吏下赴齊壇治錬所度亡魂及五道三途四生萬類一切幽魂上登朱宫流火之庭名書紫䇿度化更生庶使齊福普覃幽明均慶萬方康泰衆類昭蘇臣干冒宸威下情無任惶懼待罪之至謹奏木公金毋各一專狀世稱木公為東華丹林大帝者别是一位非木公也金毋有稱丹皇道君者亦别是一位男真之極尊者稱道君女真之極尊者稱元君又或稱萬氣祖毋元君此雖是女真亦别是一位非金毋也古來羅天醮位可考此經誥疏出不宜以世俗更易之金木者乃隂陽之根宗鍊度之所𨽻也木公狀方函上詣東華上相宫具法位臣姓某右臣輒忘微賤僣冒穹髙尚祈寬恩免加誅譴臣謹據入事同前須至昧死録狀上奏東華上相木公青童道君陛下恭望道慈允臣所奏憫憐未學成就齊功庶使澤及幽明福周寰宇臣尅以某日建壇為始錬度魂儀欲乞密降乾象之英華特布真陽之生氣治録係薦亡魂等及三途五道萬類四生一切幽魂即使九竅重開百關再造表裏洞徹內外光明返性聚神知根復命超登善境共陟仙鄉以至幽夜昭蘇乾坤寧謐臣干冒道威下情無任惶懼待罪之至謹奏金毋狀方函上詣西靈龜闕具法位臣姓某右臣云同前式須至昧死録狀上奏白玉龜臺九靈太真金毋元君闕下恭望睿慈允臣所奏憫憐末學成就齊功臣以某日建壇為始錬度魂儀欲乞潜布西闕之靈津特降真隂之妙氣冶錬係薦亡魂等及五道三途四生萬類一切幽魂即使九竅重開百關再造表裏洞徹內外光眀反性聚神歸根復命超登善境共陟仙鄉以至幽夜昭蘇乾坤寧謐臣干冒道威下情無任戰慓待罪之至謹狀九天上帝狀具法位臣姓某右臣輒瀝丹𠂻上千霄鑒臣凡愚穢質叨佩靈文職在宣謄教當濟拔凡有披訴敢不上聞臣謹據入事同前須至録狀上奏鬱單無量壽天帝陛下恭望天慈允臣所奏特與告下合屬真司照應即使齊功成就魔障不生福被寰區澤覃家國乞降帝真胞命元元一黃演之氣下布齊壇灌錬所薦亡魂某等及五道四生三途萬類一切孤魂即使回骸生氣立影聚神得沐玄津重資道性知根復命咸遂生成臣干冒天威下情無任戰栗之至謹奏右九天九狀並同式只攺聖位及某氣依生神章寫三十二天帝用三十二狀聖位照依度人經上寫具法位臣姓某右臣輒伸塵悃上瀆叢霄伏念臣季世駑材靦顔覆育叨承大法德薄罪深妄意宣宏冀圖補復臣謹據入事同前須至謹録狀上奏太皇黃曽天帝陛下恭望天慈允臣所奏特賜恩光俯燭鑒映齊壇給降洞玄法籙所𨽻官童將吏靈寶官屬依科受事成就齊功仍乞敷靈寶之慧光法乾坤之造化為係薦亡魂某等及五道三途四生萬類含情抱識一切幽魂蕩除昏翳含哺除陽溟涬生津立根受祖恍惚有象感氣凝神庶使幽途無沉滯之魂人世迪丕平之慶恩周家國澤被華夷臣干冒天威下情無任戰栗之至謹狀太歲年月日具位臣姓某狀上清靈寶大法卷之二十八
