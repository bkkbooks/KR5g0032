front:
  text: 上清靈寶大法卷之三獸四
  hash: sha256:a71ffac4c98facc71bc45cd5f35066019ac3a56aef4e1ba9eaa681c4c3cf0e54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_003-001a, image: hfl/0963/0963-102.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金允中編元始無量度人上品妙經洞玄章第二十元始洞玄靈寶本章上品妙首十回度人百魔隱韻離合自然凡二十四字赤文章第二十一皆是本章經共六十四字生氣真呪混合也混洞刀洞天也赤文無無上真元始祖劫化生諸天開明明大道也三景是為天根上無復祖唯道為身五文開廓普植神靈無文不光無文不明無文不立無文不成無文不度無文不生中指中節大梵章第二十二是為大梵大洞體也天中之天鬱羅蕭臺玉山上京蕭臺是七寶玄臺有九層髙參太空之上天上極無上大羅玉清渺渺劫刃若亡若存三華離便大有妙庭金闕玉房森羅淨霐淨霐乃三清殿下兩池也梵氣章第二十三六十四字治百病吞服大行梵氣艮上識者同道此大洞旨周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人今日校録諸天臨軒於赤明劫中在浮黎國中開圖校録之日校是比校罪福輕重録是記録功過淺深此二句係在招真章招真章第二十四東方無極飛天神王長生大聖無量度人震上南方無極飛天神王長生大聖無量度人離上西方無極飛天神王長生大聖無量度人兊上北方無極飛天神王長生大聖無量度人坎上東北無極飛天神王長生大聖無量度人艮上東南無極飛天神王長生大聖無量度人巽上西南無極飛天神王長生大聖無量度人坤上西北無極飛天神王長生大聖無量度人乾上上方無極飛天神王長生大聖無量度人中指甲下資薦用下方無極飛天神王長生大聖無量度人中指中節使者攝召用此十位神王功力甚大凡有事告神王遣飛天使者當誦神王內諱十方至真飛天神王長生度世無量大神並乘飛雲丹輿緑輦羽蓋瓊輪參駕朱鳳五色玄龍辰上治肝病書吞之建九色之節十絶靈幡前嘯九鳳齊唱後吹八鸞同鳴獅子白鶴嘯歌雍雍治肺出聲五老啓途中指中節羣仙翼轅億乘萬騎浮空而來傾光回駕四指四節書吞之監真度坐寅上催生吞之諸天丞相丞氣相氣南昌上宫韓司主録監生大神寅上催生吞之執籙把符齊到帝前隨所應度嚴校諸天普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源河源十二月月度於東井上解某人祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼羣中指中白誥道告三界黃紙墨書計四十八字行法用元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超陵三界逍遙上清一如符命金龍驛傳凡六十四字後書九幽符外青紙朱書年月日具法位臣某吉時告下寶諱章第二十五上清之天天帝玉真無色之境梵行梵行者道中之道天中之天出入無門真空無礙也故云三界之上逍遙上清升天右劵元始升天寶券文篆劵大洞法也用青紙朱書六十八字背書真文太皇黃曽天帝鬱繿玉明太明玉完天帝須阿那田清明何童天帝元育齊京玄胎平育天帝劉度內鮮元明文舉天帝醜法輪上明七曜摩夷天帝恬懀延虛無越衡天帝正定光太極濛翳天帝曲育九昌赤明和陽天帝理禁上真玄明恭華天帝空謡醜音耀明宗飄天帝重光明竺落皇笳天帝摩夷妙辨虛明堂曜天帝阿栁婁生觀明端靖天帝密羅千玄明恭慶天帝龍羅菩提太煥極瑶天帝宛黎無延元載孔升天帝開真定光太安皇崖天帝婆婁阿貪顯定極風天帝招真童始皇孝芒天帝薩羅婁王太皇翁重浮容天帝閔巴狂無思江由天帝明梵光上揲阮樂天帝勃勃監無極曇誓天帝飄弩穹隆皓庭霄度天帝慧覺昏淵通元洞天帝梵行觀生太文翰寵妙成天帝那育醜瑛太素秀樂禁上天帝龍羅覺長太虛無上常容天帝總監鬼神太釋玉隆騰勝天帝眇眇行元龍變梵度天帝運上玄玄太極平育賈奕天帝大擇法門巳上劵裏文背每兩句作一行天名用朱書帝諱用墨書三十二天三十二帝諸天隱諱諸天隱名天中空洞天帝金闕玉房空洞謂大洞也自然靈章二章諸天隱韻天中之音天中之尊上帝天中之神太一司命以下天中大魔天中之靈九和十合變化上清無量之奧深不可詳敷落神真普度天人受度章第二十六今日欣慶受度歷關諸天辰上請滅三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門辰上得道之鬼蒙天尊賜劵出符告得三界魔王舉到天門不得拘執佩之修行法為之關計二十八字欲開通五道也東斗主算卯上西斗記名酉上北斗落死子上南斗上生午上中斗大魁總監衆靈中指中節保生護命呪符或書吞之青帝護魂卯上白帝侍𩲸酉上赤帝養氣午上黑帝通血子上黃帝中主萬神無越中指中節呪之治身上走㾏疼痛手揉之則安衛真章第二十七青天魔王巴元醜伯卯上赤天魔王負天擔石午上白天魔王反山六目酉上黑天魔王監醜朗馥子上黃天魔王橫天擔力五帝大魔中指中節祛邪治痛書而吞之萬神之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神功受命普掃不祥八威吐毒猛馬四張午上八威吐毒酉上一切毒蟲所傷書貼天丁前驅中指中節大帥仗幡辰上辟邪祟擲火萬里寅上流鈴八衝敢有干試拒遏上真道之至人蓋衆邪金鉞前戮中指甲下書貼辟邪巨天後刑四指根屠割鬼爽風火無停千千截首萬萬剪形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清三十二字神公所受之命也大事用之玉曆章第二十八元洞玉曆龍漢延康眇眇億劫混沌之中上無復色下無復淵風澤洞虛金剛乘天天上天下無幽無冥無形無影無極無窮溟涬大梵寥廓無光赤明開圖運度自然坎上此靈寶正經計六十四字凡呪水用此呪十遍流化章第二十九元始安鎮子上治騖悸書吞之敷落五篇赤書赭石書之玉字八威龍文保制劫運使天長存梵氣彌羅萬範開張此三十二字法天也可呪安宅書為大將升玄章第三十元綱流演三十二天輪轉無色周回十方旋斗歷箕回度五常五星也三十五分總氣上元八景𡨋合氣入玄玄西龜之山一曰龍山乃九天之根紐黃氣之淵府在天西北之角周回千萬里與玉清連界東南接通陽之霞上承清宫神虎之門西北則寒穴之野上通金闕神仙之庭南則極於太丹浮黎之鄉氣協洞陽之光北則正於勾陳交關華蓋氣踐廣陵中央直衝玉京八逹交風山嶺平天三萬里湧金為墻結玉為門金臺玉樓十二神宫上有自然流精紫闕金華之宫瓊瑶之室傍通九竅之洞自生紫氣之雲交帶鳳文九色落陳崖生紫桂秀嶺瓊林結瑚為條植玉為根騫樹含實赤子白環三華耀葩於朱景反香流芳於太玄八氣扇飆以長鼓玉籟空唱而成音龍嘷雲樓鳳嘯絶岑毒獸萬羅長蛇千尋神宫堂堂靈仙紛紛巍巍元館觸類吐津蓋元始之妙化實天元之靈根也契玄章第三十一玄中太皇上帝髙真泛景太霞嘯詠洞章金真朗郁流響雲營玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙成真章三十二千和萬合自然成真凡和合用此書吞二指中莭真中有神長生大君無英公子白元尊神太一司命桃康合延執符把籙保命生根上遊上清出入華房八𡨋之內細微之中下鎮人身泥丸絳宫中理五氣混合百神十轉回靈萬氣齊仙凡一章作布氣呪念十遍吹患處二指中莭挹華章第三十三仙道貴生無量度人上開八門飛天法輪罪福禁戒宿命因緣普受開度死魂生身身得受生上聞諸天諸天之上各有生門中有空洞瑶歌之章魔王靈篇辭參髙真第一欲界飛空之音人道眇眇仙道莾莾鬼道落兮當人生門仙道貴生鬼道貴終仙道常自吉鬼道常自凶髙上清靈爽悲歌朗太空唯願仙道成不欲人道窮北都泉曲府中有萬鬼羣但欲遏人算斷絶人命門阿人歌洞章以攝北羅酆束送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道日興隆第二色界魔王之章落落髙張明氣四騫梵行諸天周回十方疊篆作大符鎮宅無量大神皆由我身我有洞章萬遍成仙仙道貴度鬼道相連天地眇莾穢氣氛氛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩龍漢蕩蕩何能别真我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故為歌音第三無色界魔王歌曰三界之上眇眇大羅上無色根雲層峨峨唯有元始浩劫之家部制我界統承玄都有過我界身入玉虛我位上王匡御衆魔空中萬遍穢氣氛葩保真者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何此三界之上飛空之中魔王歌音音參洞章誦之百遍名度南宫誦之千遍魔王保迎萬遍道備飛升大空過度三界位登仙翁有聞靈音魔王敬形勑制地祇侍衛送迎拔出地戶五告八難七祖升遷永離鬼官魂度朱陵受錬更生戌上巳上三十二字黃𥿄黑書勑當處土地地祇等神是謂無量普度無窮有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁天寶章第三十四道言此二章並是諸天上帝及至靈魔王隱祕之音皆是大梵之言非世上常辭言無韻麗曲無華宛故謂玄奧難可尋詳上天所寶祕於玄都紫微上宫依玄科四萬劫一傳若有至人齎金寶質心依舊格告盟十天然後而付焉普護章第三十五道言夫天地運度亦有否終日月五星亦有虧盈至聖神人亦有休否末學之夫亦有疾傷凡有此災同氣皆當齊心修齋六時行香十遍轉經福德立降消諸不祥無量之文普度無窮隂錬章第三十六道言夫末學道淺或仙品未充運應滅度身經太隂臨過之時同學至人為其行香誦經十過以度尸形如法魂神徑上南宫隨其學功計日而得更生轉輪不滅便得神仙保鎮章第三十七道言夫天地運終亦當修齋行香誦經星宿錯度日月失昏亦當修齋行香誦經四時失度隂陽不調亦當修齋行香誦經疫毒流行兆民死傷亦當修齋行香誦經師友命過亦當修齋行香誦經夫齋戒誦經功德甚重上消天災保鎮帝王下禳毒害以度兆民生死受賴其福難勝故曰無量普度天人至言章第三十八道言凡有是經能為天地帝主兆民行是功德有災之日發心修齋燒香誦經十過皆諸天記名萬神侍衛右别至人尅得為聖君金闕之臣諸天記人功過毫分無失天中魔王亦保舉爾身得道者乃當洞明至言也大洞章第三十九諸天中大梵隱語無量音道君撰元始靈書中篇亶婁阿薈無惒觀音須延明首法攬菩曇稼那阿奕忽阿流吟華都曲麗鮮菩育臻答落大梵散煙慶需飛灑玉都明魔上門無行上首回跖流玄阿陀龍羅四象吁員南閻洞浮玉眸詵詵梵形落空九靈推前澤洛菩臺緑羅大千眇莾九醜韶謡緣邅雲上九都飛生自騫那育郁馥摩羅法輪霐持無鏡攬姿運容馥朗廓奕神纓自宫刀利禪猷婆泥咎通宛藪條色大眇之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿繿郁笁華莫延由九開自辨阿那品首無量扶蓋浮羅合神玉誕長桑柏空度仙玃無自育九日導乾坤毋東覆形攝上玄陀羅育邈眇氣合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自真元梵恢漠幽寂度人感應章第四十道言此諸天中大梵隱語無量之音舊文字皆廣長一丈天真皇人昔書其文以為正音有知其音能齋而誦之者諸天皆遣飛天神王下觀其身書其功勤上奏諸天萬神朝禮地祇侍門大勳魔王保舉上仙道備尅得遊行三界升入金門此音無所不辟無所不禳無所不度無所不成天真自然之音也故誦之致飛天下觀上帝遙唱萬神朝禮三界侍軒羣魔束首鬼精自亡琳琅振響酉上書此四字吞之治聾十方肅清河海靜默山嶽吞煙萬靈振伏招集羣仙天無氛穢地無妖塵冥慧洞清大量玄玄也玄上書以開心也允中切惟靈寶之經則洞玄部也一十二部悉總於中乘度人之一卷義理幽玄故謂上聖巳成真人能悉其章然教因時以顯法應運而行學者雖未能賾隱索微第經文譯以世字又非釋氏胡語之不可辨者秖隨正理而詳審亦足以洞其大略故經法自初及中分而四十章章各有其義義各有所主此則靈寶出法之始也行持之士進洞玄之仙職備靈寶之法僚可不先於此究心哉允中以為冝深徹分章之本意然後七經八緯之可通學者能精思詳究自得無窮之至天台之書亦編入法中於其間小有增攺且易其名曰大經訓解夫訓解則注釋之義度人經至齊而有嚴東至唐而後有薛幽棲輩相繼注釋自後訓解甚衆而未可謂之法也四十章之用乃法之始天台却以為大經訓解此故不得不以實名而入品非欲故謂異同也上清靈寶大法卷之三
