  text: 上清靈寳大法卷之五獸六
  hash: sha256:329ddc4c7de38196d3c591ef7f48f1efa487e52351fb0c44774a65afe8878039
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_005-001a, image: hfl/0964/0964-004.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金𠃔中編三界宫曹品上界無上大羅天玄都玉京玉清境上清境太清境九天大帝九天上帝三炁丈人三寳君三天門下天樞院泰玄都省種民四天無色界四天色界十八天欲界六天係三十二天大福世界八梵天五老上帝宫東極青宫東華上相宫南極長生大帝西靈龜闕四極眞王北極紫微垣天帝垣太微垣丹靈上宫韓司火府上清童初府北魁玄範府三界魔王宫五帝魔王宫太陽宫太隂宫北斗七元宫上元天官宫清靈左宫元皇中宫洞白右宫上元九府三十六曹三宫中界中嶽崑崙山十大洞天三十六洞天三百六十名山九壘北都羅酆山北太帝君宫紂絶隂天宮泰殺諒事宗天宫明晨耐犯武城天宫恬昭罪氣天宫抜眞誥所載六宫名數内第四宫名恬眧不知恬昭是也恬照是也後人更冝詳考宗靈七非天宫敢司連宛屢天宫十王眞君洞隂金闕北都府司命府五道府泉曲府丈人宮鬼官北斗四明眞公府變生府溟泠大神東嶽帝宫泰山府乃東嶽分治所中元地官宫中元九府共四十二曹三宫下界東霞扶桑宫䁑谷神王府蓬萊宫蓬萊都水司方諸青童宫十洲九江水帝宫四海龍王四瀆源王五湖王者十二河源下元水官宫下元三宫九府四十二曹𠃔中切聞天眞司於上境鬼神主於幽𡨋固非世人所可測然而行持之士亦須少逹天地之正理粗曉教法之源流旣不通古今又不考經典妄以己見測度迷悞後世可不哀哉靈寳之法因應世而列科條奏申所及祈請所關有所據而言之可也台山靈寳法中以三清上帝列爲三師救苦天尊爲眞師又稱玄師法中續添言辭皆以玄師冠其首不知後世增廣之書與舊典不同又立修用仙曹品以經中一句作一司且如不得拘留逼合鬼羣經中本意自謂應度之䰟出離幽境不得復行拘留而逼合於鬼群之中是承上文之義爾却取以爲不得拘留司逼合鬼羣司如無所不辟無所不禳無所不度此言大梵隱語之功用能如此今却不同經意取以爲無所不辟司無所不禳司無所不度司今日欣慶受度歷關諸天魔王監舉無拘天門却除去今日二字取以爲欣慶受度司歷關諸天司魔王監舉司無拘天門司此言經之功用感著今日欣慶受度之後歴關諸天則魔王保舉無拘天門爾乃斷章破句悉以爲司且有修用仙曹施用仙曹赫奕仙曹三界所向仙曹等例牽合誕妄無所不至如三界所向之字初不出於經中赫奕二字則經中自號赭奕諸天齊功乃稱天中魔王之威德初不及其他亦非有此曹局今却取經中名列太玄等語三十餘句以爲赫奕仙曹與經中之義了不相關似此不止二百司其法者書以爲將吏軄位及臨壇呼召不識正理不知慚愧三洞四輔經典數千萬卷若皆以經中一句爲一司則經誥典章乃盡爲司局之名深機奥義皆莫得聞王升卿所編靈寳大法考證甚多其以經句爲司處亦有數條失於刪去巳爲不當而台山排聮補綴礙理極甚如掌醮司降聖司之𩔖是也自宋齊唐洎于宋朝所設羅天醮三千六百位則包總備具亦無此等司治天樞院居三天門下詳見拜章科典乃攺稱南極天樞院猶悞也自北極爲中天過北極方至天門南極則入地三十六度與北極相對今却顚倒錯謬不知南北憑此關申得不違科失格耶𠃔中今立玄穹主宰品以明三清三帝三炁之源繼之以三界宫曹品以備關申之目祈禳升度拔幽濟顯巳足備事恐學者反謂此書之略或輕易增入謬妄名司貽害無窮故不得不爲之辯朝元入靖品夫靖室者不雜塵穢不交世事建立壇墠法地象天稱家之有無隨舍之廣狹耶排列聖位望闕朝元内外莊嚴身心同潔交眞靈於肹蠁㑹至道於洪濛非在妄立名稱以欺世罔俗也在宫觀則設三境至眞諸天上帝位次或居俗舍則中建三寳傍列衆眞遇朝謁望闕存思而巳今具聖位之略云玉清聖境元始天尊上清眞境靈寳天尊太清仙境道德天尊昊天上帝北極大帝天皇大帝后土皇地祇長生大帝青華大帝東華木公青童道君白玉龜臺九靈太眞金母元君東極太乙救苦天尊已上正列不立位則口啓九天上帝三十二天上帝五福十神太一眞君上清十一曜星君北斗七元星君天地水三官大帝北極四聖元帥眞君靈寳五師眞君日宫孝道仙王月宮孝道明王太極仙翁葛眞人都仙大史妙濟眞君南極長生大君度世司馬大神好生韓君丈人司命司録尊神延夀益筭度厄尊神三界大魔王五帝大魔王五天魔王十方無極飛天神王南昌上宫主宰髙眞北隂酆都大帝東霞扶桑大帝五嶽五天聖帝酆都六天十洞主宰暘谷神王九江水帝十二河源聖衆洞天福地主録仙眞崑崙上宫三百六十名山仙衆童初府蕭閑堂易遷舘眞仙聖衆三五功曹左右官使者左右龍虎君侍香金童傳言玉女五帝直符直日香官巳上共三十七位清旦澄神定志整具冠褐先立户外臨目存思身神羅列叩齒九通乃微呪曰大明靈神九度鬱青朝霞藏輝濯錬五神宣駕六合七神調平結節散釋胎根肅清臨壇符法品中云凡入户先左足岀户則先右足此品却云舉右足入戸未審是非切記用心於諸經法中參考辯證續見眞誥中載云入靖戸先前右足著前後進左足令與右足齊畢乃趍行如故使人陳啓通逹上聞方知臨壇品中錯誤再叩齒九通念朝入戸呪四明功曹通眞使者傳言玉童侍香玉女爲我通逹道室正神上元生炁入臣身中令所奏章關逹上聞舉右足先入户至聖前烈火豐香平心定炁存香官使者左右龍虎君侍香金童傳言玉女夾侍香案日月去面各九寸北斗蓋頭魒向前三炁蓊鬱身在炁中然後閉炁定神對席心拜或端簡三拜叩齒依儀奏啓因心所祝存誠上逹使徑御九天也閉炁出地户念朝出户呪出隂入陽萬神開張關啓事畢請閉黄房侍香玉女明備神宫凡入靖燒香朝眞切勿反顧出戸亦莫回視將行事時不得與人言語并足蹈戸下不得以口囓香不可用竈火燒香如遇戊辰戊戌日并疾風暴雨大雷急電之時皆須暫停俟天炁稍靜方可朝修已上皆是法中禁戒違者獲罪落景入靖精念九神下應帝席叩齒九通呪曰七星玄眞𩲸靈皇君流輝內映浹御斗䰟三台耀華七液纒津金璫虎籙備衞生門神化洞虚攝輪紫庭次叩齒念夜入户呪四上功曹龍虎使者正一生炁侍香素女夜有所啓願得開明童子太玄少女與我俱入黄房之理通逹所啓皆使上聞餘如清旦儀夜出户呪玄上太隂八窻開明夜有所啓少女通靈事畢復位萬神咸寧或於靖中端坐存念隨平日所得功用宻行尤佳或參行諸法别有儀範者自依本條眞誥云凡入室燒香皆當對席心拜叩齒隂祝隨意所陳惟使精專必獲感應𠃔中謹按眞誥云奉道之家當精治靖舍蓋欲屏除妖穢祛斥外務而爲朝修之所也初不曽稱有名東漢正一天師内修眞行外立殊功周歷名山惠及萬彚然尚未敢僣立名稱妄自尊大至順帝漢安元年感降老君面承道㫖曰吾昔降蜀山立二十四治上應二十八宿下實隂景黒簿之司分掌世人生死罪福近有鬼邪侵奪枉害生民遂命天師攝邪歸正復興此治至唐避髙宗御諱世人遂攺稱二十四化故今總稱治化是乃肇基於古而天師復興之六十甲子生人分𨽻其間於是都功籙中隨本命用爲治印天師亦因道運興行一整諸治建立福庭而巳晉許旌陽夙質仙資久修上道年四十有餘棄官東歸時道行巳著與吳眞人遊於嵩陽聞金陵丹陽縣黄堂靖有女師諶母徃叩道妙母遂出蘭分所留銅符鐵劵金丹寳經諸階祕訣孝道明王之教盡付許君母又飛茆於西山之南許君尋得其所遂建祠宇亦以黄堂名之今號崇眞觀𥘉眞君徃訪飛茆路傍伐除妖恠明日登山巔指山腰之泉罅曰是有異物藏焉後將爲孽遂立壇靖以鎭之今號龍城觀曁還豫章郡城誅海蜃巨蛇遂留壇井鎭弭後患其熱布若斗星之狀即進化靖節奏靖丹符靖華表紫陽靖霍陽靖列眞靖也是凡此之𩔖尚多今多爲宫觀乃眞君立靖之本意也鎭奠靈山降伏妖異名與乾坤而並久功齊天地以無窮德重勲髙拔宅升舉亦非世俗符水之人私居輒立名號者德不齊漢天師豈應與復治化功不並許旌陽不當建立靖名此外别無經據實天下之通論近世行靈寳之人皆自矯妄僣立靖名不揆輕重不知退遜跨越於漢天師並駕於許旌陽且云黙坐存神金光之中現岀靖名吁豈非欺天耶若坐中金光可覩面接天書乃上仙地位難乆稽於人間矣何其罔人以非其道也行持之士冝稍安分守僣妄如此誠非善後之計儻塵中上士物外髙人或居宫觀或處家庭當治靖舍以備朝修遊歷四方客寄他境則随寓望空朝竭亦可以感徹上玄正不必輒立靖名詐稱神授以肆妖妄也移申發奏從舊制則稱三天門下南曹爲額據所行之法則用靈寳大法司有何不可切不得隨順世俗以助欺罔若有力之家置立道院而揭其名或建堂舘而榜其額此則世間臺榭之名號而不施之天地鬼神之前者自徙其便誦持存思品欲行道誦經當預備香湯沐浴今只用桃白皮淡竹葉煎湯舊用五香湯即青木香甘松丁香沉香白芷五件共煎湯天台法中令人用薰陸香非也道家所忌之物非古法也先存三晨照盆視湯呪曰太玄眞液錬炁生靈沐浴蒼華誦詠洞經七祖飛仙我騰上清解髪就浴呪曰神宫振天黒雲散開流全火鈴煥擲無邊使我通眞遊行諸天無量度人招靈命仙解衣呪曰五斗配衣龍虎侍眞開明三景上登玉晨解衣成仙使我長生就浴呪曰霐池玉泉灌我身形内錬五藏外通九門使炁開通尸穢蕩清萬徧保舉入登帝庭戴冠呪曰雲㑹碧玄使我通眞冠髻召仙五炁揖眞神華發光上升帝庭取桃竹湯一盞先飲呪曰齋科中則先飲後浴經法中則先浴後飲黄神守關青帝護䰟天騶咆哮萬魔喪精尸血盡滌青虫滅形七𩲸錬化紫雲自生遊宴太元髙眞併襟著衣呪曰神童侍衣玉女燒香登拜經室玉音琳琅度我七祖除穢禍殃延年長存寳漿雲根入室平坐思空玄之中青霄紫雲之上三十二天上帝冕服端圭正立隨方環列森然如象黍珠中朝元之式然後叩齒一通心拜一天帝則爲簡當别一法乃存三十二天金樓玉殿天帝各居其中然後心拜亦可但覺樓殿宫闕存思繁瑣而勞耳定以東向誦經心拜自太皇黄曾天始次存青黄白三色雲炁自三丹田出蓊𡨋滿室上接三境天中玄元始三炁混合天地徧覆十才蓋三炁者皆從一炁而生今居三炁之中以表學人存三守二之道次存青龍從肝出左白虎從肺出右朱雀從心岀前玄武從賢出後獅子自下丹田出白鶴兩眉後出各六羅列于左右眉後兩小穴中爲六合之府日月出其中日紫色赤光九芒月黄色白光十芒去面各九寸光霞徧徹室内燦然金碧光芒回入鼻中浹腦後四寸金華宫項生圓象大如車輪光眀煥照十方如此分明於是宻呪曰口言而耳不聞聲爲宻呪無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人此數句只是宻呪外别無呪下文云云女經旨所載各存思森然環立至几前畢引炁三十二過以口吸引之非引出也又法以鼻引之自黄㑹天姑入復徹形洞浹内外東向者是長生之方諸天所尊重也焚香正巳注心歷目徹聲吟詠若宜爾念誦則無益也或有誤錯耶却上三十字讀之勿使急速苟貪徧數翻爲徒勞調聲詠誦令神和𩲸暢室中常使香炁綿綿不絶初徧讀從序至末次則自元始洞玄靈寳本章起周十過爲一徧若有急事暫起稍久存思讀序如法十過旣周整神靜念精思納功曹玉女等曰臣誦經巳訖向來所出身中三五功曹左右官使者侍香金童傳言玉女五帝直符宜日香官各三十二人悉還金房玉室在左還左在右還右無令差互後召復到一如故事𠃔中嘗開誦經乃錬神之道清修之首要在乎先究經之大意次明誦之存思讀其文而解其義遵其法而澄其神行之於外可以濟物而立功修之於内可以登眞而度世神而明之存乎其人儻口誦而心違言貞而行穢經誥之聲不絶險惡之念盈懐自㓜及老持念無成又安可責報應於萬徧之間哉且經中之奥理上古巳成眞人始洞其章或者因此出竒經中行道之日皆當香湯沐浴至項生圓象光映十方如此分明宻呪曰此蓋爲存思巳定然後宻啓無上玄元太上道君召出臣身中功曹將吏蓋宻呪不欲耳聞使心念精百神森衞乃其陳清堂修行誦經之意以𦤺上徹徑御三十二天引炁三十二過皆宻呪時行用之事也其理昭然初無疑侣乃於此妄増宻呪一段且編入經法中其呪文與經中之義略不聮屬理難存用如本經自太皇黄曽天帝鬱繿玉明太極平育賈奕天帝大擇法門乃諸天隱諱諸天隱名故能普度天人功用如此是第一章也第一欲界飛空之音至其欲轉五道我當復柰何此則三界之上飛空之中魔王歌音誦之萬徧則魔王保迎以至泄慢則禍及七祖是第二章也次方總云此二章並是諸天上帝及至靈魔王隱祕之音蓋諸天上帝是指前一章三十二天諱也至靈魔王隱祕之音是指三界魔王歌也故云皆是大梵之言夫皆是者亦總二章而共言之也文意聮讀詞㫖貫接豈容増損而或者却云此二章之前乃是缺文自有其辤不在經内因别撰二章以誑後學愚者以多信之増添宻呪與僞作二章却菲天台法中續添者乃起自劉漢間今其說巳流布江之東西然流言止於智者髙見逹識之士必能共加排斥免𦤺異論滋熾則善也凡誦經存念皆以内而應外一炁分三是爲玄元始三炁夫一炁之始無形無名三炁之分是爲三尊天以此炁而肇造乾坤人禀此炁而生育軀體故出身中之三炁羅絡一室上感天中之三炁彌滿六合存内眞而外眞自應澄神而天地皆歸久而與道合眞成仙易質非專外亦非不内不外也學者其詳之劉漢乃五代時也上清靈寳大法卷之五
