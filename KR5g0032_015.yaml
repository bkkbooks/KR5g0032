front:
  text: 上清靈寶大法卷之十五畫六
  hash: sha256:53619678e17e1d12301f6a4c9315fe8c951bc58005f75dfbed769dc4d98d27a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_015-001a, image: hfl/0965/0965-160.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治全允中編裂字為符品道言酉文治百病始當詣座子午斗催生安胎妙行真人上清訣辟邪流精玉光玄文治夢鬼五色鬱勃酉文治少氣神風靜默山嶽藏雲子文治氣急天無浮翳四氣朗清中指中治耳病五色獅子玄座空浮中指中吞之鎮宅治心氣不足五色玄龍辰文治肝病嘯歌雍雍酉文治肺病五老啓途中指中治脾病群仙翼轅寅上催生護身監生大神監生度世卯酉文催生救産厄西斗記名酉文煞北斗落死子文度厄中斗大魁總監衆靈子午斗辟惡鬼治百病巴元醜伯王清訣治瘡疾反山六目玉清訣治目疾自號赫奕諸天齊功上清訣遣邪神功受命普掃不祥玉清訣治鬼祟天丁前驅護身擲火萬里燒怪流鈴八衝玉清訣治魔鬼屠割鬼爽治病千千截首萬萬剪形斬妖八威吐毒治毒勑制地祇召役土地等神阿陀龍羅祛邪怪四象吁員治隂魅元始安鎮敷落五篇鎮宅鎮宅大符右符法並以硃書重疊成符面東南方想符光吸氣吹筆書成念大梵隱語一遍再取氣吹之依每日當直遣飛天神王下使者隨符前去治虛呪符右符水下三道治眼漫符右符水洗之治復連符右符以火燒病人前治瘟疫符右符佩帶貼鎮亦吞服治邪符右符可佩可服治橫逆符右符佩服治百邪符右符服佩治祖先為禍符右符燒與之治病符右符平補氣治精神不旺符右符宜佩之治所主星辰照臨符右符宜佩之治神少符右符服七元治百邪符右符宜佩服却百邪符右符宜服之治百病符右符宜吞之禱雨符右符用鐵札書投龍潭萬神畏伏符右符安鎮之制伏魔鬼符右符宜佩之治百精符右符以桃木書釘鎮之治百精符右符以桃木書釘鎮之治耳聾符右符宜服之治瘖不能言符右符服之原本在末立獄符右符追鬼立至治疫疾符右符鎮貼服之祈晴符右符焚之治風疾符右符宜服之巳上諸符則於中篇之內取字天篆成符本無符名自服則以正字救治他人則以上符取氣吹而給之允中謹按靈寶之用因經而出經法故以經中之文而為呪以經中之字而為之符初也必審詳義理始製而為用其間亦有義理可見者亦有不可曉者允中參之諸家莫不相似只云某字治某事不曽置立符文大約五十餘條若得其妙理用之有餘若不徹其機雖纍數萬言亦為徒設若以古法為例則度人一經字字皆可為符而所用乃不多想古人自有深意天台法中四十二品皆取四字為符名條目頗多如碧落空歌符神風靜默符之類深失本㫖蓋經中之上下相貫各有理後世謂經雖譯以凡書以為天中之靈音尚可威伏至隂之妖異故書以禁治實非當時元有名天降此符民可使由之不可使知之況於人治鬼尤宜謹密今疊字成符多隱其體出此名稱機緘剖露矣甚其條目不同乃天台自成一家與舊法及天下衆本並不相合允中只述古典及世之所共者甘受天台諸郡之謗毀却免得罪於天下後世惡之者必少樂之者必衆惡之者私心樂之者公論如此而被謗毀又何害焉上清靈寶大法卷之十五
