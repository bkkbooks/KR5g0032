  text: 上清靈寶大法卷之三十六仙九
  hash: sha256:2c2b32f8722017334db26db68b32fdc46e5e5bae4d3b75b5a50039ea8f6cb460
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_035-001a, image: hfl/0970/0970-160.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右相治金允中編神虎攝召品靈寶太赤金科曰青陽之君生氣之府有東斗主算君丹靈之君養光之府有西斗記名君元氣之君赤炎之府有南斗上生君太淵之君鬱絶之府有北斗落死君中和之君北魁玄範府有中斗大魁總監衆靈君自禀受太微一氣司命定算注録勒籍大曰壽小曰算一算三日一百二十算為一壽一十二壽為一紀大功大德則以增壽小善小行則以增算大惡大罪則為奪壽小惡小非則為減算增延奪減算壽各有九等並皆東斗君主之屬陽明宫貪狼星君總之司馬命章敬諾恭順之後男女分形之始標名雕字善惡功過皆西斗君記之屬中元宮巨門星君主之分神降氣聖毋衛房化生分定貴賤貧富化外中土生於所地皆南斗君主之屬隂精宫祿存星君總之平生功過一切罪業年齡天促直至祿盡命終魂歸大夜皆北斗落死君主之屬北極宫文曲星君總之自生而始記名主算上生落死莫不總監於中斗大魁府也主定十方世界四生六道魂魄神識府有七元神虎太一夫人主其職焉下有七玉女掌管簿籍司其死生總領魂魄也第一提魂攝魄倒生玄司玉女蔣第二主風癩顚癎蠱痢瘴瘧死魂玉女張第三主勞瘵癱瘓死魂玉女趙第四主瘟疫時行死魂玉女李第五主驚弔刀刑自縊赴水投火自殘死魂玉女徐第六主毒藥厭魅刀兵劫掠王法禽獸所害死魂玉女卜第七主百病身亡死魂玉女應右七玉女主定疾病橫死亡人魂魄名字姓氏别有玄司神虎大聖收留魂魄放留生死皆主其職雄左玉曹主魂玄伯何雌右武鸞主魄主吏喬右二大聖各有攝魄攝魂吏一萬二千人主者之首有追魂使者三人齎持北魁玄命太一玉札追取十方三界九地一切重隂病橫死魄諸獄囚苦憶曽萬祖先亡後化一切魂魄立侍大聖部下上部追魂俠者俟中中部追魂俠者魏下下部追魂使者張上昔西山真人劉根遇太一玉女受傳三使者功成遺龍虎山壁魯洞中于今存焉自正一天師三天外館受玄元金闕之㫖録於部下再銘洞中銘曰篆文四十二字青紙丹書焚神虎司亡魂見形正文銘曰天一北祚神虎書太一紫文寶章符北魁玄範在龍虎得者當尋西壁魯提魂攝魄乃玄司生死去留職付汝日星之光照耀八方鐵跡金晃寶光臺章威光爍爏洞朗三天坎水離火蕩隂易陽魂魄返嬰神氣貫常八門通幽勿遇死傷魂靈召到不得隱藏鐵跡臺光之章右章乃鬼神之祕寶得之生形為天仙神魂隨光赴壇開隂離業欲召無間魂魂以青素丹書七寸方同茯神茯苓各二十四銖水一升煎數沸安八門召魂壇中舉召魂幡歌斗章而召之八門召魂壇斗章隂陽推運兮劫數更遷生死周流兮孰愚孰賢輪轉無窮兮上玄造化未出三界兮拘於神變魁𩲃東斗兮𩳐魒西轉𩵄䰢南辰兮魓𩳐北面隂靈隂靈兮茫茫沒沒陽魂陽魂兮碌碌幽幽天地明兮萬鬼潜天地晦兮萬鬼爽隂陽運兮鬼神享太一召兮何遲遲先至後至兮律有賞感此倣徨兮赴我幡賜汝靈書歸上清右手持召魂幡左手搯天皇印望東北方歌斗章舉幡召魂不以遍數良久幡重垂地其魂來矣魂靈見臺光之章爭入其壇欲哺師即以柳枝灑淨為度魂識霑此章津解脫苦惱生形化肌靈識變通灼然語質分明召魂幡面符大魁總監符右幡以曰紳中央分為二幡各幅截一尺五寸為蓋二尺為身三尺五寸作手足造幡二首面書前太一返形符朱書下書亡人姓氏背書大魁總監符下書三魂七魄名上部使者符中部符中部侯使者紫繡衣紅抹額黃絹上書缺符中部使者符下部符下部魏使者紅繡衣黃抹額緋絹上畫缺符下部使者符上部符上部張使者緑繡衣紅抹額青絹上畫缺符右三部追魂使者符以青繒紅繒黃繒各九寸上以五彩繪畫使者形容下書真形符並朱書姓氏同混元玉札及關引烈火一處焚之此使者持符上入九清下入九壘以至十方三界羅酆北都九幽諸獄洞府仙官開關通道追取亡魂徑赴法㑹無所不逹臨遣步入斗呪曰太一紫元君天一北祚勑神虎㦸飛運招搖一統隨玉札所至處十方精光都一吸右呪畢七次噀水一口以扇扇灰往十方祝白使者某人速赴生方死路追取某人魂魄速赴法㑹領受靈寶升度功德北斗太一玄冥神虎玉札式又一式於星前具齊意至生方臣據詞難抑除已依式冝行今則齊壇肅備攝召有期合薦衆魂理冝追取所有玉札須至告下者却於星下不書亡人名字年月隨亡人所屬星下書姓名年月日時死生度無間之衆可書某等天一北祚符命太一紫元神文玄冥混元玉札告下三界十方天曹地府山川河嶽泉曲冥關北都羅酆六洞十官三元九府百二十曹鬱絶之鄉幽隂之境諸大地獄九州分野城隍社令里域丘墟黃泉蒿里十二河源主宰魂魄應干合屬去處追取上件亡過某等魂魄精神徑離所部速到靈寶玄壇朝謁上帝領受殊恩神虎奉行萬神敬聽大歲年月朔日時告下具法師銜位臣姓某告行右札朱書白素玉札文姓氏封皮並黑書內封皮神虎玉札追取亡某魂魄具位臣姓某謹封方函神虎混元玉札告下具位臣姓某謹重封十方三界生死之方七玉女符右七玉女真符乃北魁玄範府追攝玉女貴賤生死簿書乃蔣仁貴為首領也其餘一同陽耀壇使者胡緋袍緑靴牟黃巾玉杖陽耀通關壇黃紙朱書於獄心書符呪提魂攝魄飛捷急急如律令右主攝先亡祖考億曽萬祖近化姻親一切眷屬魂魄隂一靈壇使者劉皂袍緑靴卿子牟黃巾玉帶執杖隂靈攝魄壇青紙朱書安壇心書符呪神虎攝付身急急如律令右主攝病死橫夭自傷破殘囚繫久沉冥司一切魂魄二壇以新淨沙土二石布於地上方六尺或三尺六寸細節勻淨沙土以左手搯天皇印右手搯玉清訣以中指依樣書之立監獄使者名位中立獄名於前以神虎攝魂符沉西流水中噴噀其一切亡魂立見真形與生世之人交通言語歷歷可問若生人悲哭則逺矣若欣喜則亡魂盡見其質與生人無異萬目共覩往來如常仍加敬重所召所遣如影如響報應在於頃刻尤忌嗔怒非私心妄召餘無所戒矣神虎攝魂符神虎大聖勑攝魂現形神虎攝魂吏一十五人地方陷隅攝付此獄化元聿白星飛睪監獄使者劉急急令現形使者張信魏達侯迪追赴魂神合形神虎神君勑左右衛聖追魂神吏引魂童子遵奉神虎勑急急如律令右符黑書白素天皇印玉清訣北氣吹水中噴噀壇中及一室四面即立見形神虎幽寂符左神虎大聖勑將令右神虎大聖勑神虎追魂使者何昌喬荀侯迪魏逹張信神虎玉女七人內玄司玉女蔣仁貴禀符奉行使者劉付身來神虎㦸飛運招搖一統隨化元聿白星飛睪合形急力神虎攝㘂覆付身形急急如律令右符朱書黃素沉於流水中師先吞一道次行用立驗若死亡在近化三年者可書符燒灰手內擎之呪祝某人家亡魂吹柱東北方次以前符水噴於壁上其亡魂立見又有死期未至卒然奄謝或悟中惡鬼狂神忤追遽終或卒病而夭大命未竭而死未及三日者以等身緋繒幡被尸將此符朱書白繒七寸火化於人中之下仍依前告玉札不移時神魂再返元尸立得更生如天年算終問訖復遣若非此限啓奏上帝以劾不正素非得邁古化道契真風者天不負兆三感之外不神也所謂回尸起死無量度人天皇訣以二指搯大指根却以大指搯中指中文餘三指開闊勢屈向後如斗標前如斗口中有二尊帝星以印呼雷役電止雨召龍禁勑雷霆之怒收攝虎豹之獰役神攝鬼皆用此印神虎罡立芻身升度法先以淨草隨男女形狀作一生前身軀著生前衣服腹中安大梵隱語頭上載升天大劵以稱架一具芻身安稱鈎上懸空不著地先令稱平置之門外居魂壇中仍以小兒持白繒召魂幡法師歌斗章召魂來赴芻身忽然墜下稱鈎重於常時其魂幡亦墜竿稍重乃知亡魂巳至即取臺光章所煎香湯以楊柳枝灑盡次請道衆諷大梵隱語引亡魂赴浴訖詣三寶前聽受符戒并齊供事竟髙功即令先治一室可及三間安建攝魂壇先於四面籬壁并以白紙泥飾使無一㸃瑕痕離後壁三尺四寸以淨黃土建陽耀通關壇隂靈攝魄壇其二壇勻淨法師左手搯天皇印右手玉清訣依符樣以中指畫訖於壇中心立白紙位牌各一上寫監獄使者又於壇前各立黃位牌一箇各書壇名次於二壇之前立洞案之上設攝魂將吏聖位已具于壇幕式品中用時花淨茶酒果香燭供養三獻訖法師令二小童子執幡赴壇以幡安壇心法師先將幽寂符自吞又以一符燒灰吹於壇所祝請神虎官將玉女追攝合干將兵只今引領一切亡魂並赴法壇分明顯見形魂次以攝魂符沉水中噴噀四向及二壇之中次燒監獄使者關文又燒神虎將吏錢馬文牒等法師焚攝召一應符命以青幕閉少時令親人漸次入壇中四向壁上逺視亡魂見形與生存形容無二至升度之時却令二小童執幡引出壇歸位法師用紫楓木雕神虎印方一寸九分五色囊貯之佩手肘後然後呼召行事神虎二大聖並如古者王侯氊冠淡紅袍朱履珮劔錦綬執簿七玉女並紫袂衣環髻鳳冠朱履羽裙珂珮手執生死簿上部使者紫服中部使者紅服下部使者緑服並繡紋袍朝天腳幞頭紅抹額玉束帶魚尾刀緑靴告玉札祝將三獻儀道衆法事灑淨髙功焚符變神召將靈寶大法司以今火急關召神虎雄左追魂何將軍雌右主魂喬將軍主魂七司玉女三部追魂張侯魏三使者追魂大將馬將軍陽耀通關隂靈攝魄神吏聚魂對魂整魂提魂神將諸司追魂攝魄將吏玄都茭龍驛吏六道功曹三界召魂使者引領亡魂童子黃泉蒿里丈人九州社令神君土地里域正神監臨衛壇官將疾速赴壇奉宣天命存至上來關召傳符追攝官將吏兵既辱來臨幸承關告伏聞始青天上黍米珠中十遍說經萬真禀命玄範以之昭布大法由是宣行出茭龍傳令之規立神虎攝魂之典白簡頒而三界遵奉赤書降而九地開光歷劫度人隨時濟物況承精禱理合宣謄本司今據入意除已録奏天廷申聞地府關告城隍社令移文嶽瀆靈司以今翻布符章告行玉札普詣幽冥之界俱通考對之曹須藉神靈庶遷滯爽既辱雲驂之俯降特陳菲禮以奉誠恭對神光用伸初獻初獻酒伏以元始上帝開妙藴於赤明之初中斗大魁總靈樞於玄範之府雄左雌右能達於三界九幽陽耀隂靈可攝於千魂萬魄是以澤覃無外請大宥於三天律示有經昭洪禧於萬㝢欲顯幽之並濟宜符札以兼行用仰神車載陳亞獻亞獻酒伏以傳令泉宫驛吏禀符而遍下召魂隂府紫文頒令以感通五嶽四瀆之冥司罷除考對十地六天之夜府開煥光明有召必臻無逺弗届若非威神之特達豈得報應之昭彰儻獲曲濟於沉淪敢不奏陳於勳牘難滯衆靈之馭敬周三酌之儀畢此精𠂻各惟享鑒終獻酒伏以教存規式法有典章欲攝魂儀須憑文檄仗至靈之捷疾庶可宣通取亡爽於幽冥立期響答追召公牒逐一披陳尚冀衆神當壇領受宣關牒符札髙功步神虎罡行持上來公文巳行敷示神靈可接必與奉承伏以九極垂科十方被化爰遵典格用拯沉淪追召隂魂出離幽境上極三界下至九泉百二十曹考録之司三十六地校量之所城隍里域分野名山嶽瀆靈真神庭祀典記録罪福主領魂神蒿里黃泉溟泠水界應干去處合屬有司所至根尋依時攝見須神靈之佐𦔳俾幽顯以昭融火急施行亟切報應送神向來回向發神虎催召文檄道衆法事髙功望闕啓白具位臣姓某謹再拜焚香奏啓三清上境八極天中大羅浩劫無上慈尊三十六天無色世界天帝髙真東極救苦天尊玉輔上宰天省列真中天北斗星君三官四聖靈寶五師恭望天恩俯垂鑒録臣聞靈風被物實利濟以無窮真教流光故升遷之有格事當披訴敢不上聞臣先據某貫開建道場薦資亡過某返生善境臣自慚麈陋謬玷靈班既奉誠詞爰稽真典巳奏聞於霄極恭請降於符章普下幽冥追尋魂爽今則事期巳至攝召届時合要亡靈赴壇受度兹當再敷文檄催督吏兵庶使地司咸遵天律欲望玄慈荐頒天㫖嚴勑將吏遍告有司遵巳降之符章禀今來之號令開關啓道釋罪放魂疾速來臨火急報應儻幽關之無阻則玄貺之咸霑臣干冒天威不勝惶懼之至謹言關請將吏以今焚香奉請神虎何喬二大元帥追魂七司玉女三部追魂提魂攝魂吏兵聚魂對魂神將追魂大將馬將軍隂關攝魂追魂二使者追魂攝魄隂陽官將諸司追攝吏兵黃泉蒿里丈人五道將軍功曹使者土地里域正神伏願靈仗飛空神驂御景出北魁之仙府遵靈寶之玄科咸造壇前奉行文檄須㬰顯應倐忽感通引領太虛即希來降舉散花髙功再白伏以金科崇重玉格昭明遵玄律以精修録凡情而關告聞奏九清三境頒命六洞九幽拔度係薦之魂脫離沉冥之境況於真符巳降玉札荐敷律令宣行文移昭布事關幽壤法有靈司將啓隂途須勞神力催促應干之曹局嚴督合屬之吏兵照㑹姓名契勘鄉井搜聚魂魄整對形神極三天九地之中遍六合四維之內悉與追攝佇俟前來所有牒文謹當宣示宣牒焚燎伏以天廷杳漠雲路渺茫雖瞻望之莫通惟精誠之可格上來文牒巳見披宣諒爾至神必回昭格仗神威之迅速攝魂魄於須㬰顯示條章嚴宣號令讃揚善化成就齊功即令係薦之魂火急赴壇報應錢馬奉化風火驛傳表白回向上清靈寶大法卷之三十六
