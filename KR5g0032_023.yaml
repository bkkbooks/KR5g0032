  text: 上清靈寶大法卷之二十四彩六
  hash: sha256:e6a2be96c01509a48116b1addf9f6e9ddfd39167939d18aab087c7aaf81e5692
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_023-001a, image: hfl/0968/0968-004.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金允中編章詞表牘品救苦表上清靈寶法籙職位臣姓某誠惶誠恐稽首頓首再拜上言臣今月某日為某府州某縣某處姓名開建無上黃籙大齋幾晝夜薦拔亡某等係薦男女等魂仍設斛食普度孤魂者臣聞旋四不息惟大化之機緣救度無窮乃弘慈之警願敢依靈宥輒露凡悰臣誠惶誠恐稽首頓首臣伏以死生大變未免而有始有終臧否業因於是而或升或墮况身經太隂之後魂歸長夜之中冥冥永隔於陽光寂寂難超於隂府所賴慈悲之教主普遷黑壤之沉魂惟是臣罔洞至真自慚蒙陋謬列宣謄之職誓殫利濟之勤爰録誠祈上干極度恭惟東極青宫慈悲太乙救苦天尊陛下道均覆載澤被幽明開至真接引之門闡大化裁成之教宸輝所浹遍九地以清寧玄廕誕敷盡十方而昭泰恭望流恩酆部垂祐泉臺專遣飛天神人特勑救苦童子下九龍之符命開六地之冥關萬類幽靈三途滯爽悉承殊貺同陟仙鄉拔兹係薦之魂儀脫彼多生之障難咸蒙錬化永遂逍遙謹奉表上進以聞臣誠惶誠恐稽首頓首再拜謹言年歲次月日具位臣姓某上表請隂陽正氣錬度表上清靈寶法籙職位臣姓某誠惶誠恐稽首頓首再拜上言臣今月某日為某府州某處信某官姓名開建無上黃籙大齋以今某日夜錬度在會普度衆魂及三途萬類一切孤魂以某日夜錬某人魂儀者臣聞立根賦命乃氣化而形分喪本迷真故釁成而報至欲離苦趣須仗善功輒陳迫切之情上冒穹髙之聽臣誠惶誠恐稽首頓首臣切惟質摧神往魂散魄沉既經於太隂慮纏於苦網不假正真之氣莫遷𡨋昧之靈臣猥以庸才謬當首職懼不明於玄奧誠難冀於感通今信官某并在壇士民等虔啓清場恭開法席祈天告地列像陳儀露哀罄之𠂻瀝薦資之悃爰念九泉之滯爽不悟一性之本源仗此微因明其宿命恭惟白玉龜臺九靈太真金毋元君東華木公上相青童道君玉陛下二氣之祖萬有之宗立極先天流祥育物隨機濟度應念哀矜恭望曲軫洪慈廣推大宥魂靈魄識獲承金木之神輝本始根源咸復隂陽之正性九幽罷對萬類蒙休臣無任祈恩激切之至奉表上進以聞臣誠惶誠恐稽首頓首再拜謹言年歲次月日具位臣姓某上表九天上帝表上清靈寶法籙職位臣姓某誠惶誠恐稽首頓首再拜上言臣今月某日為某府州某處某官某姓名開建無上黃籙大齋幾晝夜拔度各人先逺宗親同超善境普度九州萬類一切孤魂以某日夜錬度在會係薦男女衆魂及正薦某魂儀者臣聞一元肇始凝二象以分靈九氣結形俾萬生而立命若非歸根返本豈能復性聚真敢冒沖科恭攄凡愫自知越分實負戰兢臣誠惶誠恐稽首頓首伏念臣塵濁庸材昏蒙陋識不明氣候濫叨濟物之靈司未習典章冒攝靈壇之首職念人死而為鬼藉陶鎔始遂還生度鬼復以成人非冶錬豈能受質木輝金潤爰資合氣之功隂極陽回須賴生神之廕恭惟九天上帝陛下上翊三境髙拱重霄無為而庶物自繁不言而十方被澤曲憫沉淪之苦特頒養育之恩布九極之生津胎全十月授五行之粹氣體備百神俯拔隂靈徑超陽境三途滯爽咸停謫役之勞萬類孤魂同遂更生之樂臣無任祈恩激切之至謹奉表上進以聞臣誠惶誠恐稽首頓首再拜謹言年歲次月日具位臣姓某上表允中切見章文乃古格其來尚矣允中今編黃籙合用五章亦古儀也其間請禱之辭猶遵師傳也散壇朱表一通乃廣成先生之體格也而略增法中所請官將而巳至於天帝之前而上表則中古以後世法而為之故合守古今朝廷之典式允中所列救苦表錬度表九天帝表皆從師旨其辭則允中冒昧撰述者非敢自以為當蓋取其與洞玄靈寶錬度行用不相背馳髙逹之士更能以雄偉之文而易之但不違科典又其善也九天上帝分作九通專表尤為詳盡然須九表各自命矣以九氣之次序而為之乃佳允中不才豈應悉備其事當俟後之作者以成垂世之規青詞黃籙大齋專位拜詞則合用七通曰玉清上清太清此三通則大道也次則昊天北極天皇此則上應三氣乃天中之主也地祇則昊天之配也至尊至上盡於此矣若齋醮事體稍小不專位拜詞則從章格書大道階也此外黃籙齋醮有南極大帝救苦天尊皆拜詞者各有所見自從師授隋唐以後朝廷青詞皆列聖位宋朝亦因之今録真宗皇帝景德間內醮青詞一首存此參照及今之詞格于左真宗朝內醮青詞維某年歲次某甲子某月某朔某日某甲子嗣天子臣某謹遣入內內殿頭某代拜於大內朝元殿開啓黃籙大齋一月日散日恭設羅天大醮一座二千四百分位謹謹頓首上啓元始天尊太上道君太上老君三清聖衆十極髙真北極星君九曜星君南北二斗星君天地水三元帝君玄中大法師三界官屬一切真靈伏以叄天兩地於覆載以無𥝠隂慘陽舒實生成而莫測總萬靈而上列甄庶物以下臨順之則昭應禎祥逆之則比生災異先王所以祗畏前聖由是範圍臣纂紹祖宗撫綏億兆莫不觀髙穹而取法循先憲而守成今以邊陲克安歲時茂稔伊何涼德協比慶圖敢忘馭朽之心以奉臨深之戒將酬神貺恭啓醮筵伏冀錫慶邦家垂休動植二氣罔生於疪癘八紘永息於干戈十曜臨天無差於順度四溟紀地靡覩於揚波黔首咸安品彚斯泰朝廷凝於庶績寰宇逭於三災顒叩玄靈伏切丹愫臣無任瞻天望聖之至謹詞黃籙青詞式維某年歲次某甲子某月某朔某日某甲子某府州縣某處住坐奉道某官姓某謹投某經籙法師某於某處啓建無上黃籙大齋幾晝夜上資邦國普福羣生開升七祖魂靈廣度九幽孤爽集兹善果專用薦度亡故某魂超生善境謹謹頓首投詞上啓太上無形無名虛無自然至真大道無上元尊金闕玉陛下臣伏以入文臣無任瞻天望聖激切屏營之至謹詞黃籙散壇設醮青詞維某年歲次某甲子某月某朔某日某甲子某府州縣某處住坐奉道某官姓某謹投某經籙法師某人於某處啓建無上黃籙大齋幾晝夜上資邦國普福羣生升度先亡廣拔孤爽集茲善果追薦某人魂儀超生福境齋事圓成謹用修設三界髙真清醮三百六十分位昭答天恩臣謹頓首投詞上啓太上無形無名虛無自然至真大道無上元尊金闕玉陛下臣伏以入文至臣無任瞻天望聖激切屏營之至謹詞此詞聖位乃徑拜大道則不復三境天尊詞矣蓋三氣即三境三境則大道此一階位兼總三氣包統一元無不盡矣今若具洞玄靈寶階行靈寶法而章用太清階則越格甚矣理亦不通如正一法師諸章既用太清階則青詞亦止得同章而用或分作三境天尊位也今總以大道階則不拜三境詞或有分位則玉清曰虛無自然元始天尊上清曰太上道君洞玄靈寶天尊太清曰太上老君洞神道德天尊近有人用虛皇上帝於天尊之下者非也虛皇上帝别自是一位至於以道君為妙有上帝以元始為妙無上帝者亦不逹至道之人為之也夫天尊則氣也則道也一氣分三是為三境同生一氣以言其有則不可名以言其無則不可泯均處於妙無之間是三境同體也今以一尊為妙有以一尊而妙無則有者不可使之無無者不可使之有豈非去道逺矣此等出竒好異三境天尊聖位亦戾古撰述多違科典乃浙東諸人為之允中足迹所歷江湖亦為稍廣他處之好譎者不如是之衆也正一章太清階曰太清玄元無上三天無極大道太上老君太上丈人天帝君天帝丈人九老仙都君九氣丈人百千萬重道氣千二百官君太清玉陛下此階則專於太清而全屬洞神部矣正一齋醮青詞若用此階則合别拜玉清上清詞可也故不若作三境天尊拜詞矣外昊天詞則曰太上開天執符御曆含真體道昊天玉皇上帝北極則曰中天紫微北極大帝天皇則曰勾陳星宫天皇大帝地祇則曰承天效法厚德光太后土皇地祇此外杜撰不典之言母得汚瀆上天也非我法眷不在此限允中稽考古式齋醮自始及終皆備詞關申是髙功措辭者獨青詞乃齋主之情旨髙功之所據慿科所謂謄詞者也青詞代剖肝丹書象瀝血所以形容齋主之誠切其辭貴簡而不尚繁貴質而不尚麗傾心露膽求哀於上帝也近世能文之士則專肆浮華強記之人則多引故事儒家程文尚不得引史以證經况於混元未判大道先天而史傳記載乃世間塵迹豈應取以質證於先天上帝之前近代詞賦多愛斷章用事而於青詞置謎語有同兒戲亦敢為謄奏良可哀也若用道家經典切冝詳審道藏所蓄經文近來真偽混雜未易分别如天台桐柏崇道觀乃五代之末吳越王錢氏所建藏中諸經拘集道童及僧寺行者衆共抄録以實其中碧𥿄銀書悉成卷軸當時四方割據錢氏處於偏方隨其境內所有之書一時欲應限數故其間顚倒錯謬不可勝記有脫字漏句全不可讀有言辭鄙俚昭然偽撰者于今幾三百年更數世之後不知始末則謂道典果有此等經文髙識之士自能剖決是非淺學之人執為正典或者取而引用可乎允中所見諸方經教混淆不失於天台况允中足迹所不經行之地耳目所未涉歷之書尤多遐方僻郡道館琳宫經籍失正者甚衆學者所當深加詳酌不冝一例輕用如應世諸雜經中人多取其全句入章詞中絶有礙理者俗人之見每於薦度則力稱亡者之德行備述生前之勤勞豈是告天請宥之意耶人子孰不愛其親若欲稱其行義當求大手文筆以為墓志行狀及祭文挽章之類可詳書之此詞非此例也矜耀死者之所長以誇於天下乎謂亡者而天不知乎禱病禳災之詞亦不能悔愆引咎反行怨天尤人或取經史中語以為請福之辭或希求爵祿或僥望壽祉極口形容不識退遜彼以天為何物耶古今印行青詞極其浩博文章偉麗者甚多體合科格者至少前輩主行之士皆預取青詞遂字參訂不違科格始為申謄允中諸師尊多通古今剛介不奪雖大貴人請行齋醮亦將青詞契勘未嘗順俗録奏豈畏齋主之誚也士大夫髙上之人其文有違道家典式者自可以理商議或世俗無知之輩輒陳猥陋之旨又豈當為其拜詞哉邇來世態澆漓巳甚主行之士曲意趨時廉耻道盡惟恐齋主之不見用也何論詞旨之當否其間未諳科教不通義理冒昧行科者固不足責此等關奏未必上逹而天真亦應原其無知春秋責備賢者錬逹典章之士心知其非乃敢徇情順意不畏考罰拱手聽命於俗輩録其俚語而土奏其罪當如何哉青詞之首曰維國號某年古今巳定近有人謂維字犯天諱而易曰時夫時字之義乃題梁書壁記序中之格謂書此之時年月使後人讀之知其為當時之事故也今青詞書於壇中即時焚奏又非隔年異代而後行用却書時字於其首是誠何義也紫微夫人謂天中之書非世俗穢濁之迹若諸天隱諱之類悉是天中之字世不可識經文逐時下降譯以世書遂有凡世之字諸天之名列真之諱於大道至尊之前不應回避自天而道無名無名諸天隱諱乃天地以分經籍既降世方有之今世俗之維字而指為大道名諱縱有經據亦不可行自唐以後纍朝上天帝尊號前後一應玉册皆曰維某年而陳隋以來百數年間亦止用維字何獨近來上天方有此諱在朝廷不用皇其皇者大也天子稱臣於天不應自稱而朝廷不用國號者以下文有宋嗣天子之銜故不重疊也臣下詞於天子則曰維皇帝某年乃古今之通義有石刻中或謂維字犯天諱者亦不可據也今録景德間青詞一首於前及蔣氏立成儀亦載唐朝青詞一首前後體制相類也朝廷則總列聖位乃從古式民間獨位拜詞則三清三函昊天北極天皇后土各一函共拜七函江東尋常設醮或專拜昊天一函以其天之主宰事所𨽻也有三境總以太上大道之階則只作一函也夫拜詞乃露誠切者也朝廷青詞自上帝而列至三界官屬者乃普行祈禱也故北斗醮中亦上青詞但言辭冝别重輕而不稱奏也又有妄人誑世稱青詞上上於天帝而斗星或用白𥿄或用黃𥿄青詞能於𥿄中分别髙下却稱奏與上天一同何其謬哉夫豈知青素丹書乃剖肝瀝血之義爾在天則稱進稱奏在列真則曰申曰上而已詞中言辭大冝斟酌不得與天同等凡青詞之前巳具鄉貫姓名於某處建某齋為某事至詞中却敘哀祈之情而巳若有將一雨聮形容建壇行道燒香然燈之意則理涉重復其文切在簡當一念萌於胸次萬靈鑒於空中但不可不致辭以伸懇禱而已又何待繁文盈牘而後動天乎允中尋常齋醮不預主行之時每承士友委撰青詞僣易應命者頗多第一末學之文不應傳逺故不欲收聚入法中姑敘世俗之弊然此事全在髙功該貫古今精考科典謄奏之時嚴加詳酌儻有違戾則齋官不為無罪而髙功罰倍餘人可不戒哉可不謹之允中每厠迹齋壇一備貟首職既當主行則青詞不應自撰所承詞旨縱有毫髮違礙必白齋官削易以用而士夫亦未嘗而不見聽也全不合典格者決不謄奏允中之窮逹悉歸之分定何須諂侫施士以苟求微利此實師尊之訓而允中賦性尤不敢諛齋士而瀆上帝也所有黃籙建齋至散壇方行設醮謝恩此隨齋之醮以其營衛壇場傳逹誠悃功成事竟醮謝真靈者也與四十二等專醮之義不同故齋中青詞則求哀請宥述建齋之所禱也至於醮謝青詞則敘齋修有闕祈請蒙恩陳謝之辭也如曰齋事慶成懼典儀之違謬亡靈獲度沐恩造之宏深此乃謝恩醮中青詞意也常俗齋官或非自已撰述詞文率多委之他人而士人用力於功名未免專心舉業又不復辭以不能往往齋中青詞祈一次醮中青詞又請祈一次間有善於作文者不過形容齋之與醮而巳彼又安知道家齋後設醮之本旨治經之人於詞中而狀其事多類經義破題治詞賦之人則又多似世人之啓箚如薦父母則用經句曰生我劬勞此詩隨寓之詞𥘉非對君上之語豈可遽執其説而對天稱我可乎又有曰母兮鞠我皆此類也士大夫青詞自敘曰自踰知命之年屢玷觀風之節夫五十而知天命孔子自述之語施於人前可也若以知命五十歲亦藏頭語爾施於天可乎追薦青詞曰居諸云邁哀悼何窮其意謂日居月諸儻用日月云邁則太熟出於其麗然除去日月字而獨稱居諸是何物也是何義也又如日豈期一夢之不還俄見八旬之甫及夫以一夢而形容其死施於挽章雜文可也又不用曰字而獨稱八旬是八十日乎八十年乎如曰遽染河魚之疾旋興隙駟之嗟此尤無禮以河魚而作㵼痢之隱語以隙駟為人死之謎言况人生若白駒之過隙乃譬喻爾祈上帝而用之可乎如曰玉京金闕步八景之雲霞圎嶠方壼住三山之樓觀拔度亡魂而所請如此上帝可以施行乎如曰朝露既晞悲風徒切此用事之間語爾然朝露易晞以言其出處則喻人之性命易損若斷章止用此四字隨尋常之理言之則朝露既晞不過日出而巳又何可用之天乎若夫詩詞之格有藏頭有歇後有隱語有雙關其句而去其上一字或二字謂之藏頭蘇東坡有戲語詩曰聖善方當而立歲乃翁巳及者稀年上句以三十而立言其母三十歲也下句以俗諺有七十者稀言其父巳七十歲是乃藏頭也用其句而去下二字或一字謂之歇後有人作石詩曰天漢支機罷仙人捧膞餘蓋有天漢支機石仙人捧膞石又東坡有詞曰斷送一生惟有破除萬事無過蓋他人有全句斷送一生惟有酒破除萬事無過酒東坡各去一字而取為詞正歇後體唐末有鄭綮多為此等諧語當時號作歇後鄭五是也狀其事而不言其名則謂之隱語如近代有詩曰蕭蕭出屋千尋玉當空一炷雲乃上句言竹也下句言香也即隱語體也用其句之義在此而寄意於彼謂之雙關東坡有詞曰日出西山雨無晴又有晴此本晴雨之晴而暗用作無情中有情此即雙關格也此等皆詩詞雜文之體至於書啓則用於平交勢均位等之人可也或上大貴人及朝廷表箋已不可用而近時有青詞用藏頭隱語者甚多求哀請命於天乃用變格異體以肆褻瀆於心安乎此特摘其略耳此外不識避忌者尚衆至於違戾道典格者皆是也不知考究而但欲主行齋事髙功之職豈易為哉無知者既不足責有識者又不敢言貪施利而媚齋官順俗情而罔造物良可驚也章詞之用所係不輕髙功若不自加參究廣覽求其至當而臨事略無去取咎將誰歸允中不足道也慮天之不可侮不免陳兹萬分之一有志之士必察之區區之用心無知之輩未必不因此等正論反興謗諾吁允中之論為髙識之士而發也異時豈無知此意者亦教門之一助上清靈寶大法卷之二十四
