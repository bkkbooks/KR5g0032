body:
  text: 洞玄靈寳法師南曹執法典者權童𥘉府右翊治金𠃔中編登齋科範品古者行持之士德行𠑽於内精誠動於中立壇以朝奏爲先行事以精思爲首故自投詞告齋之後次則陞壇按科而行及至今世之威儀率繁於古人之典式然諸方襲行旣乆難於一旦除之惟其所増多是請祝之詞若不大造經誥者非可盡去但世之所用者頗無倫序或行正一法籙科品之格或兼用諸家雜法之辭道衆欲備用於一時未免兼收而並録不知源流旣殊措辭亦異况髙功之啓白尤冝深切於事情𠃔中所編洞玄靈寳本科實難泛取而混用縁廣成先生編集止於齋科而已啓祝之辭奏告之語舊典不載故今從本法之㫖重行修述一宗關告之文非敢以此而自眩蓋欲不戾洞玄之科條爾不行此法之士或取而用諸他𣲖大覺違失本意亦猶此法中不可雜他書而並用也發奏儀先立玄中大法師正一天師位若巳舒六幕則就玄師前將所發文檄悉用淨箱盛置列于師前髙功齋官各上香設拜次高功長跪致詞請牒此式諸方多獨温台二郡不用之居其所者自從習俗此書乃通行之文不專爲一隅設也祝香如式具位某恭謹焚香再拜上啓玄中大法師三天扶教輔元大法天師正一靜應眞君靈寳經師眞君靈寳籍師眞君靈寳度師眞君仗此眞香敬伸供養香乃玉華散景九炁凝烟香雲宻羅俓衝九天當願侍香金童傳言玉女傳臣啓奏上聞帝前令臣所啓咸乞如言臣聞混元未肇潛一炁以凝眞五太爰分發三乗而立敎道由敎而乃顯敎非師而莫傳况齋法之有儀實師尊之上隷伏念臣乆叨玄廕謬沗眞班應有來詞理難寢抑臣先據某人投詞乞就某處開建無上黄籙大齋上資邦國下福群生普度幽沉廣恩冥漠回兹善果薦㧞亡故某魂超生陽境以致三𡍼息役六趣咸休臣謹祗率法流同脩齋直盟天告地按格行科顧惟末學之塵微難俾齋誠之通逹欲祈天監須仗師恩恭帷靈寳五師眞君學洞顯幽功齊造化分形下敎弘正道以接人立願康時出玄科而濟物凡崇善果仰屬眞師應有請祈俱由省録况今典儀將肅齋事届期敢慿申奏之文移用告隂陽之主宰上聞齋悃普逹哀𠂻恭望曲賜矝憐俯垂憫念特頒眞㫖告下玄曹差降法籙合屬將兵勑遣傳奏應干神吏齋持文檄導逹悃忱歴啓萬眞號令不違於頃刻遍聞三界感通待報於斯須所有奏申合行關遣即祈眞㫖俾遂凡忱臣干冒師嚴下情無任不勝惶懼祈恩激切之至謹言道衆同捧所發文字華夏引至功曹位所列文字于前知磬舉法事道衆一員吟香偈諸方有不用處隨常例次吟水偈洒凈髙功變神歩罡焚符召將諸方皆用表白宣三獻白文於召將之後三獻畢髙功發遣或有髙功自宣白文者各隨其俗召將畢祝白𥘉獻酒伏聞三炁資始混茫於龍漢之𥘉三號爰分昭煥於赤明之後陶鎔清濁肇毓坎離慈周法界而劫劫度人德被遐荒而方方設敎闡三乗之妙典列四輔之冲科慶襲顯幽澤均今古是以三清十極悉當按格以謄詞三界十方可以依儀而移檄於是備關申之職列傳奏之司嚴道法之紀綱逹士民之懇禱事當敷告今具啓聞本司今據入意以今專録來詞敬行關發功曹使者傳奏吏兵土地衆神里域主宰任當受事職在宣傳旣辱臨壇用伸𥘉獻齋官上香拜舉散花一首亞獻酒伏聞道廣運以無𥝠天不言而善應雖精神之可格非牋牘以難通况三洞赤書啓萬途而濟世十方正典弘衆法以度人旣有司存合嚴科式今列文移而將發幸兹神馭以來臨畧備菲儀用攄至悃物則甚陋心惟克誠神其領之敬伸亞獻三獻酒伏聞飛雲走馭駕景乗空示現靡常威靈素著升騰雲漢上徹於寥陽出入幽𡨋遍馳於隂境傳上玄之命今逹人世之請祈符檄藉之宣通表狀資於關奏十方𠃔頼三界依慿輔天翊教而效專懃導敬逹誠以昭勲績職惟至要禮則冝處終厥彛科以陳三獻白文伏以天之髙也可以誠通神之幽矣乃容心感故天人之相際雖幽顯以何殊一念旣精萬眞垂監惟關申之將徹恐神馭之難稽薦獻巳終文移合發遣造關牒謹用宣呈宣關牒宣錢馬狀上來公文已行宣示即請騰雲叱馭整轡浮空金闕玉房通信誠於頃刻神庭幽府逹文檄於須㬰九天六地之眞司三界萬方之主宰髙極太空之上俯窮無底之中隨所詣而齎傳按關大而逓發母延時刻火急奉行急去速來立待報應知磬舉向來向來發奏功德上資邦國普及顯幽同頼善功證無上道一切信禮表白回向發奏功德無限良因專爲開建大齋奏陳誠悃伏願萬眞垂監列聖流光齋直無魔善功成就爲上因縁念十方靈寳天尊不可思議功德發奏事畢衆官復位告符命儀衆官於道場内上帝前序立知磬舉天尊號髙功出班上香跪奏臣聞因辭逹悃託物寓誠假兹清靜之香仰徹虚無之境道香德香無爲香無爲清淨香清淨自然香妙洞眞香靈寳慧香超三界香三境眞香以今焚香奏啓虚無自然元始天尊上清眞境洞玄靈寳天尊太清仙境洞神道德天尊昊天玉皇上帝紫微北極大帝紫微天皇大帝東極青宫太乙救苦天尊金闕玉陛下仗此香雲遥伸上奏香乃玉華散景九炁凝烟香雲宻羅俓衝九天當願侍香金童傳言玉女傳臣啓奏上聞帝前令臣所啓咸乞如言具位臣某謹昧萬死輙貢愚𠂻仰覬天恩曲垂玄聽臣乆叨妙䕃幸沗法僚爰領世詞遂弘眞典巳於今月某日備録奏聞爲某人崇建無上黄籙大齋依按科條合頒符命巳入靖書篆次當取㫖吿宣今乞容臣告下元始符命金籙白簡救苦眞符破地獄眞符校幽魂眞符太上勑赦生天寳籙東極青宫救苦九龍符命太乙玄冥混元神虎玉札遍下十方三界六洞九幽嶽瀆名山城隍社令應干合屬去處開關赦罪釋放係薦亡故某及十𩔗幽魂三𡍼苦爽悉離所部盡赴齋壇霑被宸休以時昇度伏念符式則雲章鳯篆法容假手於人然而令行乃道㫖天音誓當請命于帝恭望至仁廣度大造垂憐赦愚臣狂僣之誅憫萬𩔗沉𡨋之苦特降合干將吏按勑宣行普告三界攸司依科遵奉臣即今敷告拱俟頒恩臣干冒天威無任待罪激切屏營之至謹言髙功存念如式道衆於帝前捧符命行華夏引至告符所先備香燭酒果供養如發奏之儀道衆一員吟偈洒淨髙功變神焚符召將靈寳大法司焚香關召十方飛天神王玄都茭龍驛吏地道功曹使者九州社令神君神虎何喬二將主魂七司玉女三部追魂張候魏三使者監獄使者劉將軍聚魂功曹張將軍盧將軍整魂對魂神將追魂大將馬將軍陽耀隂靈召魂二使者本司所行法中追魂攝魄合干官將吏兵黄泉蒿里丈人當處土地里域正神火急赴壇急急存至舉修齋奏請神將吏兵降臨壇所齋官上香拜獻茶髙功啓白或表白宣白𥘉獻酒伏以靈寳立升遷之典下元彰開度之儀紫虚鬱秀以成文赤玉光芒而結篆萌於上境爲安天鎭地之基降於人寰弘度死超生之路祈天請命許以宣行闡事敷齋先當關告本司先據入意除巳謄詞列款進拜章文外今望取㫖告下元始符命金籙白簡救苦眞符破地獄眞符拔幽魂眞符太上勑赦生天寳籙東極青宫九龍符命太乙玄𡨋神虎混元玉札遍詣十方三界九壘重隂十洞六天泉䑓夜府洞天福地嶽瀆靈司社令𡨋曹黄泉蒿里三元九府百二十曹掌録魂魄之司一切天牢地獄合屬去處開關赦罪釋對除愆普召沉魂領霑天貺今請官君將吏合屬衆神遵元始上帝之敎言守太上道君之律令一如始青天中之約並從洞玄靈寳之規火急奉行依時報應壇有常儀禮合薦陳齋官投誠用伸𥘉獻齋官上香拜舉散花一首亞獻酒伏以齋功至重流大宥於𡨋關道力無邉渙洪思於幽壤降玄都驛吏頒救苦眞符勑飛天神人下九龍符命以至太一玄冥之典傳攝鬼之章神虎大將之靈受召魂之職昭昭天憲敢不遵行赫赫神威所宜聽領雲驂巳降使騎來臨祭則有儀合陳亞獻齋官上香拜舉散花終獻酒伏以神文秘篆可以䇿役萬靈蘂笈瓊章由是敷弘衆法旣列齋修之式遂開濟度之門白簡丹書遣茭龍而遍詣紫文玉劄命神虎以專行律令昭於十洞九幽攝召盡乎三𡍼五道悉資神力上闡天休况今壇墠巳陳典儀旣肅合要亡魂而報應普召苦爽以來臨事非可停禮分有式敬陳三酌少畢精誠同前白文伏以九極靈章三天告命疾速宣布火急頒行攝召魂靈立祈響應齋壇文檄謹用宣陳宣關牒狀上來公文巳行宣示衆神承領各詣𡨋司伏以上帝垂科萬神聽令仰遵典格下救幽沉拔度亡魂出離苦趣上極三界下及九幽分野名山城隍里域校量罪福之所主領魂魄之曹所至宣行依時攝現須神靈之佐助俾道法以昭彰雲騎速馳立希報應錢馬給散風火驛傳投詞告齋古者齋法崇嚴而事無繁𤨏後世精誠不逮於古人而行用漸増於舊典廣成先生科以投詞告齋在立幕之際請玄師之時於師前序立先一人讀職狀訖齋官繼上香投詞之後即對玄師白齋意次則升壇宿啓此蓋古人止於拜章未有發奏預告等事故於齋中受詞近者蔣氏立成儀則於靖室投詞髙功升座次令一人讀詞然後下座結盟退詣齋次方行立幕請師仍於玄師前再依古科投詞頗成重復𠃔中師授之格一遵廣成科法今於靖室髙功正席立先僉定職榜齋官上香次則表白長跪致詞請法師升壇詞意乃謂法師巳主領齋事奏告畢今大齋届期請師升壇行齋而巳不復作齋官懇請此乃正奏之後也便引髙功出靖室旋行立幕序立於玄師前即依古式齋官自述齋意捧詞函投之髙功致詞則謂崇建大齋巳蒙録奏上玄關申三界今當升壇宿啓請法師按科行事而巳庶合事情免成煩瀆况未議齋期未發預奏請法師主行之𥘉巳投詞預告正奏之後髙功主領其事巳逹三界臨壇之時非投請師之狀乃繳青詞也𠃔中所編實遵師授非好爲異或主行之士不能從此或者自隨時俗奉行可也各依本宗而巳髙功齋官道衆名於靖室序立次法師上香居髙功位正立表白宣職榜髙功巳下僉榜書名表白長跪致詞請髙功行事具位充齋壇表白某再拜上啓伏聞赤書闡敎黄籙垂文鎭地安天上可扶持於劫運寧家福國下能濟度於顯幽乃中乗之偉功實洞玄之妙㫖儻非宿資善慶豈能立此殊因要須素藴靈機庶可弘兹眞典恭惟靈寳大法師某君先生道鍾神秀天俾清淵玉檢瓊篇結蟠於胷次雲章鳯篆飛走於筆端惟其德行之内潜是以感通之外應以今齋主勵志法衆盟心共修至上之良縁以廣無邉之巨福旣蒙主領巳荷關申今兹崇建於瑶壇正當展揚於法事伏願畧攄素藴大闡靈風開幽顯之迷途作人天之矜式俯從衆請即整仙儀振舉條綱建陳壇席某等無任懇禱激切之至髙功答曰伏聞洞玄之上法黄籙之冲科自簡寂先生標三洞之殊遂弘齋法迨清都張君考千古之式重董典章由世間漸有師承而敎綱未至全備曁乎廣成先生歴探三乗之典籍旁稽四輔之源流著成黄籙之科文以崇洞玄之品格莫不逐事詮舉衆目條陳作萬代之範模爲十方之依頼付於有道之士以弘無上之齋壇自古今稱爲重事如某者山林晚學雲水孤蹤冒居法籙之班未習敎科之奥勉從齋主之請輕主大縁姑遵師授之書僣當首職幸巳聞奏不許退辭然尚冀齋主之始終益堅誠敬全仗壇官之調恊同賜扶持庶俾齋醮之圓成廣流恩於萬𩔗更冀過尤之消殄逃譴責於三官拱聽仙音共敷齋事次書齋狀或不用隨例舉四結願願大道興行經法流演至心稽首正眞三寳願今上皇帝聖壽無疆明齊二景至心稽首正眞三寳願師尊父母亡者生天見存安樂至心稽首正眞三寳願一切含生免罹諸苦同證無爲至心稽首正眞三寳次舉金闕化身天尊威儀引行出靖立幕髙功詣監壇神前祝白齋意請神監衛壇席齋官上香拜髙功不拜監臨神前白文具位某焚香上白監臨某神伏聞眞科昭著齋法崇嚴三界欽承萬靈遵奉况今玄壇巳肅羽蓋將臨所合振勵紀綱斥除妖異巳嘗移牒輕屈神驂旣辱俯從幸垂少駐惡徒異𩔖母使入壇穢氣塵氛悉令屏跡導千眞而降駕盡六合以霑恩齋事告終奏功遷賞尚祈留聽以就善縁謹白詣玄師幕序立髙功齋官上香請師舉修齋奉請玄師降臨壇所知爐舉雲輿巳降鶴駕來臨齋事周圓還當奉送獻茶齋官回身長跪捧詞函向髙功投之髙功受詞置簡上長跪白齋意告齋繳青詞狀式郷貫姓某右某先於今月某日具狀披投乞行開建無上靈寳黄籙大齋追度亡過某人巳蒙謄奏上玄關申三界以今齋期旣届壇席敷陳齋捧青詞須至再録狀申靈寳大法師某君先生伏乞告齋登壇依式宣行謹狀年月日姓某狀髙功受詞跪白具位臣姓某謹稽首再拜上啓玄中大法師恭望師慈曲垂省録臣聞上帝慈愍沉淪遂弘開度之典聖師流傳科式乃垂齋直之門萬法恢張三乗敷布善而能應感而遂通不揆塵微爰孚悃愊臣先據某人投詞入意其巳於某日録奏三天金闕申牒合屬眞司及兹巳届齋期再據齋官某人投詞乞行告齋登壇闡事伏念臣季世下材胎生穢質乆叨師廕獲參佩於天章謬列玄班僣備貟於法任知道愈逺豈諧通逹於幽冥寡過未能乃復浮沉於俗網修巳尚謬接人實難蓋以教在敷揚法當利濟臣雖微陋仰依大道之至慈齋或可行實頼聖師之原庇伏願謄誠九極流宥三𡍼容臣奉行願始終之無障赦其違式俾章奏之上聞齋事圎成師恩罔極啓壇牋牘謹用陳聞伏匃玄慈俯垂炳鍳宣牋宣關焚化向來牋牘謹以上聞伏乞玄慈特垂省覧流光法席駐仗齋壇成就善功弘敷眞廕儻從凡禱實荷師恩臣與齋官無任祈恩激切之至詣三官幕髙功齋官上香拜請三官修齋行道奉請水官降臨壇所修齋行道奉請地官降臨壇所修齋行道奉請天官降臨壇所知爐舉雲輿巳降天駕來臨齋事周圓還當奉送獻茶髙功長跪告齋具位臣某頓首再拜上啓天地水三官帝君臣聞肇混茫於五太分氣象於三光宰制者百二十曹君臨乎二十七府功過兼録齋醮仰關敢瀆慈仁用陳誠切臣先據某伏念臣行無片善識乏寸長冒主齋盟僣當壇職儻非靈庇難就殊功啓壇牋文敢伸敷露宣牋宣關上來牋牘巳具披陳伏乞眞慈特垂孚鍳少停仙駕畧駐齋壇矜覆愚蒙圓成齋直庶顯幽之共濟俾罪戾之咸消儻遂禱祈實由眞廕臣與齋官無任祈恩激切之至詣三師幕髙功齋官上香拜請三師修齋行道奉請度師降臨壇所修齋行道奉請籍師降臨壇所修齋行道奉請經師降臨壇所知磬舉雲輿巳降鶴駕來臨齋事周圓還當奉送獻茶髙功長跪告齋具位臣某謹頓首再拜上啓靈寳經籍度三師眞君臣聞玉篆金書實髙眞開於大敎琅函蘂笈惟聖師肇於靈基接引十方陶鎔千古敢希洪造敬露丹𠂻臣先據入意伏念臣乆叨訓育素昧進修濫忝玄班僣司冲敎非假師尊之覆佑難期齋事之圓成啓壇牋文敬伸敷露宣牋宣關上來牋牘巳罄敷宣伏乞師慈特垂省録俯臨壇墠少駐旌旄庇晚學以逃辜就善縁而弘福願終齋直皆自恩𥝶臣與齋官無任懐恩激切之至詣五帝幕髙功齋官上香拜請五帝修齋行道奉請青帝降臨壇所修齋行道奉請赤帝降臨壇所修齋行道奉請白帝降臨壇所修齋行道奉請黒帝降臨壇所修齋行道奉請黄帝降臨壇所知磬舉雲輿巳降鸞駕來臨齋事周圓還當奉送獻茶髙功長跪告齋具位臣姓某謹頓首再拜上啓五方五帝臣聞太極凝眞列五方而拱御𣑽元分炁録四序以司時三界功過之兼書十方神人之並録敢因齋禱上冒神嚴臣先據入意伏念臣末學庸資叨承化育濫當壇職恐冒修爲匪籍甄陶曷能就事伏願暫迂仙仗俯届人寰大霈慈恩廣恢弘宥鍳觀壇席削其違謬之愆成就齋功拔彼沉冥之苦啓壇牋牘敬用敷陳宣牋宣關上來牋牘僣巳敷陳伏乞聖慈特垂憫濟暫迂鸞駕曲駐靈場矜宥愆辜敷弘福祉儻得顯幽之俱利實由造化之深恩臣與齋官無任激切之至詣天師幕髙功齋官上香拜請天師修齋行道奉請天師降臨壇所知磬舉雲輿巳降鶴駕來臨齋事周圓還當奉送獻茶髙功長跪告齋具位臣姓某謹頓首再拜上啓三天扶教輔元大法師正一靜應眞君伏聞金書演妙洞神之教弘敷玉局流光正一之風大闡立古今之典則開幽顯之津梁旣結齋盟實由主宰臣先據入意伏念臣法非練逹學未弘深輙藉玄恩冒當首職教科崇重慮有隨於善縁師造慈憐願曲矜於齋悃啓壇牋牘謹用敷宣宣牋宣關上來牋牘巳罄披陳伏乞師慈特垂監察暫迂鶴駕少駐雲驂成齋事於始終敷善功於幽顯願消魔障實在帡幪臣與齋官無任祈恩激切之至詣監齋大法師幕髙功齋官上香拜請監齋修齋行道奉請監齋降臨壇所知磬舉雲輿巳降聖駕來臨齋事周圓還當奉送獻茶髙功長跪告齋具位臣姓某謹頓首再拜上啓靈寳監齋大法師臣伏聞靈寳開圖洞玄御運大弘濟度之格爰開齋直之門教有司存事關典録臣先據入意伏念臣資凡品下性昧識昏僣棲眞教之中謬列壇官之首欲俾齋功之浩博實資師造之帡幪壇有牋文敢伸敷露宣牋宣關上來牋牘巳用宣陳伏乞師慈特垂炳鍳俯臨壇席暫駐輪輿全善果以無魔廣齋功而慱浹儻如所禱實自眞恩臣與齋官無任激切之至次少歇退入靖室或俓引入道場所開啓上清靈寳大法卷之十九
