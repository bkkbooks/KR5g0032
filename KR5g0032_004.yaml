body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編七經八緯品元始大定神光湛然七日七夜洞觀百靈徹視十方玉札洞視內解採錬祖氣生聖胎法身訣未降五行正氣內錬黍米寶珠神變積而成丹訣夫降中理五氣混合百神訣未降巳上謂之七經流精玉光隂陽丹訣未降內包九鼎外合九色洞陽符大開圖訣未降梵氣流行合於太陽流演十方訣未降三宫修誦洞照幽微五品隂功濟生陽德升度無間巳上謂之八緯允中竊謂靈寶之道洞玄之品肇於洪濛之始演於億劫之先及其應運流光因經立教皆不出於七經八緯但其科法有敘録入編者有未降人間者巳逐事疏出於本品終不敢牽強而為之説也台山靈寶中謂之修誦緯品其一曰太一含華玉露迎珠存之誦之不待萬遍而登真名寶珠玄化緯其二曰司命化生降而復升存誦萬遍馳雲駕龍白日上登太空名獅子威神緯其三曰帝宫分身三元功成萬遍足備舉身升仙名上宫妙乘緯其四曰丹臺內座中禁成真六千積功德同九真名中禁證真緯其五曰丹谷潛老神氣俱存三千下行名籍玉京名下元初學緯其六曰三氣生三上合三天造兆一身分形十天形同天師儀範自然坐御獅子在於空玄日光寶珠五文宗元十過周回應感玄變名立應神通緯其七曰內服外誦三十二音心存玉尊泥丸帝宫神誦玉章俯仰元君萬遍巳畢無所不成名玉音萬靈緯其八曰三界七元百千萬遍三界可度仙翁雲軿名三界拓靈緯此其八緯也自有靈寶大法以來諸家編敘甚衆其他雖互有得失莫不以七經八緯為之宗本錬行纍功登真度世以致神機道妙多隱其中今台山上以修錬存思分為八緯與世傳略不相同却於經緯儀範品中略出七經之名而不載七經之條往往其人未覩全書於是以意逆料遂立此品用之修誦固不為礙理但一失古法七經八緯之目皆經中之事也由網之捨網使學者不知發足動步之蹊徑而覬升堂入室不其難乎元綱流演品元網則元氣之路九天之根在西北之角與玉清連界東南則接通陽之霞上承清官神虎之門西北則寒穴之野上通金闕神仙之庭南極於大丹浮黎之鄉氣協洞陽之光北則正於勾陳交關華蓋氣踐廣陵中央直衝玉京八逹交風即西龜之山乃天之根也詳見分章釋用品允中考詳元綱者乃天之根紐氣之經纒道源未判元綱巳肇此乃天地之大體妙氣之靈樞羅絡乎三十二天之中貫通於二十八宿之分形於上者謂之道流於下者謂之教行之內則配合於身施之用則旋回有法此乃因天地之自然象人之體用也且人之幻身結形穢濁受質胚胎一毫一毛非塵腐之物獨我之一靈與天地相為終始是均稟祖氣也故頭圓似天足方似地目如日月體象乾坤氣息周流密應天度人能修此以應彼則可以與天長存超然不泯矣昧者不悟其真不考其用乃中曰身備有天地不假外求非也內錬之法散而為三千六百傍門要在金丹正訣其始也追二氣於黃道會三性於元宫而其成也隂𩲸消蹤陽神契道隨其功業之輕重第其資品之崇卑效職仙曹受書洞府終不謂我身有天地而外無天地內有形神而外無鬼神得一末術便以為有內而無外何其謬哉近者亦有知此論之非者矣所恨不逢師旨揣量莫得其要既不全內又不專外乃自謂之説曰謂之不內不外是又去理逺矣且蒼蒼在上天也日月星辰天之文也博厚無根地也山川河嶽地之理也人之一身四肢五體乃天地間之一物而性靈於餘物耳戴天履地而言外無天地可手允中今此所敘元綱之體乃天之經常也次則敘人身取法天地配合隂陽言其象也天以剛健而不息故天得以長存也人能會道而澄神人亦可以不泯也此非身中自為天亦非不內不外未免誤天下後世矣故不得不明辨之元綱者升神之要路天階之絶景道源既判神天崆洞之上非言可盡非見聞可窮悟其真者因真修真而外真自應識其妙者因妙得妙而外妙自臻推神天之象則元綱之位其逺其近舉可知也人之有元氣開通骨脈肶穴上逹於頂一如天上元綱之路人之魂𩲸在身一如氣在天中知出入則長生飛騰不知則庸愚之夫不審術業未曉仕宦官聮之次而求見君也夫元氣融聚魂𩲸所養爰有真精真精本根於右腎右腎為命門在脊骨之窮其下有太骨骨中之髓透尻骨其穴名龜尾其身為王毋面南而治事因帝所向而言之則謂之西龜之山道家託諭為名也又為之金闕以其居西也右為金闕左為玉房言玉在山而木潤居東方也又玉水之所本陽精之化精之所著名曰淨霐此乃元綱之氣根本之所發也寶圖之設髙壇起於此鬱羅蕭臺基於北臺之中尊直當於心所謂靈臺也上清之境太清之上際則心之下也心之懸垂其下為肝肝之下二分北斗七星居之其氣逹心其源上通舌下名曰湧泉其氣下逹右賢之氣泄者以湧泉之氣不禁謂之交鋒交鋒者言斗之罡星大魒所照之地其性肅殺其神即欲界也如知其道者以舌拄上㬽直運其氣循脊而上以脊通頭頭上者玉京之要路所謂西龜山與玉京為鄰界也今人不知便以為西龜山在腦然西龜去玉清之氣四千萬重居中氣直逹在天則火星最低氣先及也又心屬火言上逹而相感夫日月與火星齊故遊日月參之一身則兩乳與心齊兩乳者眼之根源也人之二乳藏精以養目也故老氣衰目昏乳無汁賢無精箕斗在天之東北為天之關楗艮之位也於人則右手肩井穴也人之氣脈以右為始天道之行以西北為姓由西行而至牛宿則天事畢矣然未有發生故造化於此起焉言重入火星也入氣雖一周而消息係焉重入心中也由火木水金而行者天度也由心肝腎肺者氣俞也即背脊之穴也取脊穴而觀則上下左右見矣求其妙而推其喉環通於頂門所以為玄玄之妙難以言而盡不可指而名也無色之界在心之下空洞之中斗魁之左也復自斗口則以舌拄上㬽名曰天橋則超上清而至玉清矣如此則玉清之景頭也上清之景絳宫也太清之景丹田心為靈臺則靈臺之説可見矣於是而守守之在心於是而朝朝之在頭此三華離便大有之庭也故天中之天無英白元之會於心也自然成真會於頭也修靈寶之道於身中至此而事畢矣不可得而容聲矣允中切論元綱流演之於天者巳敘於前體合於人身者存録於此學者冝深知此身之所以貴重者可以為真仙可以配天地可以錬形神可以會道妙乃道家因物象以設比喻法天地以立名稱隨已育之身而立有為之法自有為而至於無為以有形而升入無形然後夀齊天地與道合真其事始於身中而不止於身中也元綱流演圖允中按真誥中諸論五星圖所布常南面也以太白位在西歲星位在東按而施之所以爾者五星隱伏縱橫無常不如北斗列象常在故一以定位於五方不得隨星之所在也允中考之天文五星並無定位或如連珠或聚東井留伏逆順𨇠度不齊按圖行事合從五行所屬以定方而已是真誥中所論亦如此當知此圖為行事設也如二十八宿上貫三十二天之氣則所屬互相不同今只以三十二天環列四方二十八宿亦從天文定位以正方隅以便朝謁而已非以一宿而應一天之氣也若取某天之氣而下貫某宿則方隅錯雜矣難於行用故也謁三十二天自太皇黃曽天始至平育賈奕天終然後回謁二十八宿每宿十二步箕起而斗終於斗宿旋身回至箕却望斗魒而至謁五星如法詳見淨明經法升神上境入北斗之中三台六星蓋頂而行步斗一座次六步應三台而出左環四十九步犯火星又東行入十一步至太陽謁孝道仙王復右行六十四步自北入西至太隂謁孝道明王左旋而出左行復右行凡七返如環此無色界定想見無色界諸仙真來往於是周歷十方謁三十二帝二十八宿每宿丁罡十二步以回共三百三十六步至斗宿即借箕星之罡以行直環望北斗大魒之次及交風之山右旋南嚮四十九步重入火星經於太隂三十六步謁水星由水東行至于太陽之側右行六十四步成木東向謁木星再回而行借水星罡復出太隂之傍八十一步成金西向謁金星東行逹于斗口三十五步而入中謁土星反行再入金水木之宿直望北方玉京金闕乃八步而進再拜長跪具法位臣姓某臣幸因宿慶獲際真風入靖凝神恭朝天闕身外之身冒扺玉京臣無任瞻天望聖惶懼屏營之至再拜重啓云臣凡骨性頑理難超舉幸因師授使遂飛神不避誅夷敢披丹悃入事意臣無任祈恩俟命之至謹言再拜退復元路神入頂門呪曰蛇蟬蛇蟬脫殼離塵吾今朝真上謁青雲欲使神人閉債封形舉步以去祕訣靈靈急急如律令右元綱流演之圖乃梵行諸天之路也始於飛神躡斗終於謁帝朝元若能精思按行出入既熟登對不亂可以上章奏事役使鬼神以致脫殼升真混合梵氣錬形之術朝元之方莫先乎此每於三元入節甲子庚申入靖焚香面北平坐臨目靜思凝神定想氣息綿綿神風不鼓聳身出頂如蟬之脫殼升步空玄如法行事自微至著由想念而及成真則存乎其人矣允中謹按此條乃法中之要用章奏之本源如金丹之成身外生身事非小補近世天台靈寶法中多教人止於身中作用由不及上極於泥丸二十八宿三十二天三境十方千真萬象環於泥丸之中其元綱飛步乃收神入腦有如集身神朝元之法又類補腦還精之術甚至上章啓事飛神告謁皆以此為不傳之妙彼但見傍門法中有此等功用頗多便執以為祕訣既於靈寶不得要領遽假此以行之又慮見議於識者故其徒自想神異不言於人豈知元綱流演於三十二天之中經二十八宿之分乃天中之根樞也人身象之爾存身中之百神定神中之一念馳誠上境會道朝真非止專力於泥丸而巳存內真而外真自應知身度而天度可窺若想念專純久則錬神易質無足疑者儻還神於身內注意於腦中則非矣學者冝深詳究此機平心勿泥庶徹正真之理共超清靜之鄉玄穹主宰品髙真上聖總録穹玄妙有妙無不可窺測經典一出漸露其機三洞正科其理淵深自大唐以後經誥散失逐時輔綴真偽混淆有識之士能别其源悉其理始可指其萬分之一爾元始天尊萬化之源道之玄氣不可擬議然散而為氣聚而成形其中有神強名天尊居玉清聖境靈寶天尊道之元氣以教言之元始為洞真則至此為洞玄居上清真境道德天尊道之始氣以教言之自元始至此為洞神居太清仙境昊天上帝自三氣化生髙出乾坤之表生萬物而不載也三才肇立氣清髙澄積陽成天萬彚之源豈應無主故以形象言之謂之天以主宰言之謂之帝出治於玄氣之下而尊於三界之上是為天主北極大帝則紫微垣中帝座是也按天文志云南極入地三十六度北極出地三十六度天形倚側蓋半出地上半還地中萬星萬氣悉皆左旋惟南北極為之樞紐而不動故天得以運轉也世人望之在北而曰北極其實正居天中為萬星之宗主三界之亞君次於昊天上應元氣是為北極紫微大帝也台山靈寶法中却云紫微北極大帝乃三界萬神萬煞之帝欺罔凡世褻瀆上玄深可驚畏學者所當深戒天皇大帝乃北極帝座之左有星四座其形聮綴微曲如鈎是名勾陳其下一大星正居其中是為天皇大帝也其總萬星位同北極却為樞紐而天皇亦隨天而轉上應始氣三氣之下萬天之上三界之中莫尊於此三帝矣允中竊惟三清三境天尊人孰不知其為玄元始三氣但氣之聚則為形散則復為氣是萬化之源三才之祖天地之根不可得而名議赤明啓運大道流光或火錬太空或皇人按筆真文降世三洞宣行故有洞真洞玄洞神之部天寶靈寶神寶之稱中古以後遂立科法三洞各有經籙故謂之三乘九等也道之隱者不可知道之用者故立教台山靈寶法中却敘云元始天尊乃道中之主太上道君乃法中之主太上老君乃教中之主吁三洞四輔法籙之源九品三乘互相通貫而以為三清各主其一其為誣罔可勝言哉想其不知三清之為何物也可為瞽者指路於其前盲者繼蹤於其後其説如此而欲行其法以拔幽濟顯敢望其感格耶台山法中又云紫微上宫天皇大帝則紫微垣中勾陳之下者是也可以言紫微垣或言勾陳宫可也若稱紫微上宫乃是玄都玉京山非紫微垣也一字之羌别利害甚重昔唐朝尊老君為聖祖天皇大帝此乃唐室一時尊祖之典又非紫微垣之天皇大帝也不識古今妄稱名號罪不容貸矣內有聖祖天尊位號辨論今世既不設此位不復書入矣非漏落也此聖位乃宋朝之始祖以元天大聖后為配耳只今之九天司命真君也上清靈寶大法卷之四
