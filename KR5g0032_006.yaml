  text: 上清靈寳大法卷之六獸七
  hash: sha256:e4eea11384829d53e99109e0dab1ee2e4f96dee753f7e4ab9d7cf9712b294315
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_006-001a, image: hfl/0964/0964-036.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊金𠃔中編玉札靈章品魁𩲃𩵄䰢魓𩳐魒䰡魑𩲕尚蝕尚餎尚尚尚尚尚餦尚霐防中表徳右四十九字朱書輕黄𥿄上入室靜念或剪爲細圓或燒灰水調宻啓太上淨水服之口表臣某言臣地界行尸塵途陋質幸承宿運獲被眞風所當内錬形神外祛邪妄輔乾坤之大化翊道德之元綱然而茅塞凡心未能識通炁候伏覩靈寳玉札可以録炁聚神以今清堂行持服符請炁恭惟太上無形無名至眞大道肇隂陽之根本立天地之胚胎俯憐後學之愚蒙溥降先天之正炁灌注四體百骸之内熏蒸五藏六府之中庶俾徹視無所不通執法而行有妖皆剪三灾不及百順咸臻早遇至人亟逢眞授謹拜口表上進以聞臣誠惶誠恐稽首頓首再拜謹言謹述玉礼之略不過乎此蓋大道之宗不可言宣不可理測妙有妙無豈存形跡然而旣立科法於是譯此靈音以行眞化故符書字書所不可無别本所載𩴹天地諱𩲞日月諱曜道技正薈條將軍梁髙蹇爽日月帝皇内諱闊閏騑閶開玉皇君諱魑𩲕南斗諱魁𩲃𩵄䰢魓𩳐魒北斗諱三台諱霐三天内諱𡙎众三天隱諱防中表德三天眞諱三師眞諱翹光音三師諱眞式諱天猷諱五嶽諱三塗諱𩴑六丁諱六甲諱𩴮神虎夫人内諱何喬侯魏張劉蔣仁貴神虎大聖諱尚蝕尚餎尚尚尚尚尚餦尚崔樞旋盧機權鄧衡文竇陽光一名陽言置諱太一天眞太初天眞眞仙眞人三眞諱洞玄潜北極諱天命長人桓寧上帝諱務猷收太一諱雷雨諱巳上計一百六十五字爲玉札且有黙表一通却録于第二品似覺言辤淺近未知大道之本眞如魁至魒七字在玉篇及天文中以爲星名外如三天内諱三天隱諱諸天隱名之義天中之音非世之字合天之音亦感召之理夫天地乃道之形元炁乃道之本一元未判無形無名天地初分書契未立及其在天成象在地成形天之主宰止稱上帝暨乎靈章漏祕火錬太空結炁成文符圖漸出中古立教譯以世書於是天眞有號星宿有名天文有經地理有别故經中有諸天隱名是天中帝眞之名號也今總而直言天名𩵄地名則以不可名之體而立别名雖有所據亦不冝䟽出必見譏於髙識之士矣今編出古靈寳法中四十九字乃天地旣分之後經誥巳出之餘星一象神物之名爾法書經籍中稍易考者儻言天地有姓有名則如泰宻之戲論矣又古法中有内錬之法朱書玉札四十九字安小瓶中以淨土七合宻封平旦誦呪取五方炁吹瓶中以甲子日爲始至第二甲子取瓶中玉札燒服古法中名内錬寳藏今旣拜口表服玉札故於此一條不復别出亦以太拘形跡非徑易之道然古書旣有不敢缺失故附序其條目於此三晨芒曜品日月麗天玄斗中建恊平五緯調正隂陽總理元綱輝映六合三才因之以立萬彚資之以生惟人禀受中和結直形體若能養錬神炁節逸性情外靜内澄動符天度然後可以採服暉耀召挹靈芒納諸身中百神澡錬施之宇内兆庶蒙休若云布炁書符特餘事耳儻炁之清者不存於胷襟情之昏者横塞於靈府雖得神文祕呪面接三晨亦云徒勞矣髙上靈寳虚皇之祕始於積一生三心與道俱則躋靈寳之閫域若其次者三晨之光爲靈寳之機要也此段可知金先生得道矣其言甚妙東卿司命神君曰先生王君昔見授太上明堂玄眞上經清齋休粮存日月在口中晝存日夜存月令大如環日赤色有紫光九芒月黄色有白光十芒存咽服光芒之液常宻行之無數若不修存之時令日月還住面明堂中日居左月居右令二景與目童合炁相通也此道可以攝運生精理和䰟神六丁奉侍天兵衞護此上眞道也太上玄眞經先盟而後行行之然後可聞玉珮金璫之道耳季偉茅君之弟諱昔長齋三年始成竭單思乃能得之於是神光映身然後受書爾此玄眞之道要而不煩吾常寳祕藏之囊時故相示有愼宻者也玄眞上經未降世太虚眞人南嶽赤君内法曰毎以月五日夜半子時存曰象在心中日從口入也使照一心之内與日共光相合㑹畢當覺心暖霞輝映臉良乆呪曰大明育精内錬丹心光輝合映神眞來尋祝畢咽液九過到二十五日二十九日復作如上使人開明聰察百關解徹面有玉光體有金澤行十五年太一遣寳車來迎登太霄行之務欲數不必此數日作也此一條出太上消魔經東華眞人服日月之象上法男服日象女服月象旦不廢使人聰明朗徹五藏生華䰟𩲸制錬六府安和長生不死之道日象月象南嶽夫人曰大方諸宫青君常治處也其上人皆天眞髙仙太極公卿諸司命所在也有服日月芒法雖已得道爲眞猶有服之直存心中有象大如錢在心中赤色又存日有九芒從心中上出喉至齒間而光芒迴還胃中如此良久臨目存見心胃中分明乃吐炁漱液三十九過止一日三爲之行之一年疾病頓除五年身有光彩十八年必能得道身行日中無影辟百鬼千惡灾氣常存日在心月在泥丸中夜服月華存月白色十芒從腦中下入喉芒亦不出齒間而回入胃如服日法右此方諸眞人法出大知慧經上中篇常能用之保見太平又曰行此日在心月在泥丸之道謂省易可得者若行無中廢絶者除身三尸百疾千惡錬䰟制𩲸之道也日月常照刑中則鬼無逃形青君今故行之吾則其人也告今以子子可宻示有心者耳行此道亦可行寳書日月法也兼行亦善也即紫文中日十六字月二十四字也仙人一日一夜行千事初不覺勞明勤道之至生不可失矣此乃天人告楊真人語凡人常存識已之形軀使髣髴對坐我前使面上帝有日月之光洞照一形日在左月在右去面九寸存畢三叩齒微呪曰元始上眞雙景二玄右拘七𩲸左抱三䰟令我神明與神常存祝畢叩齒三七過咽液七過此爲帝君錬形拘䰟制𩲸之道使人精明神仙長生不死上清紫文吞入炁法一名赤丹金精石景水母玉胞經其法常以日初出時東向叩齒九通微呪日䰟名日中帝字曰日䰟朱景照韜緑映回霞赤童玄飈炎象呪此十六字畢握固存日中五色流霞來接一身日光流霞俱入口中上清紫書吞月精法其法常於月初出時西向叩齒十通微呪月𩲸名月中夫人字曰月䰟曖蕭芳艶翳寥婉虚靈蘭鬱華結翹淳金清瑩炅容素標呪此二十四字畢暝目握固存月中五色精光俱入口中又見月光中有黄炁大如目童名曰飛黄月華玉胞之精能修此道則奔日月之仙也巳上數條出於上經及眞誥諸事中乃髙眞事業上道之門儻心未清靜神未安定則無覬於靈驗也力未及此則從其次者存神請炁近同常法行之精專亦足以𦤺眞感靈未免以形跡求之者也䟽於下條飲斗光法毎月初七十七二十七日夜日月明朗天地瑩潔黄昏望斗焚香掐斗訣戌至辰叩齒七通一叩一誦星君魁𩲃𩵄䰢魓𩳐魒先吐濁三口次呪曰威武靈靈神光七星内外利貞與我合并急急如律令呪畢存星光七道下注口吸飲七口急漱液送下定神再拜呪曰神光灌注五臓六腑存眞去穢急急如律令久行之有驗則夢見日月星辰或龍虎之象或雷電光耀則得其梯階也服日光法平旦日未出時焚香東向定炁存神伺日初升再拜臨目具法位上啓日中帝君日宫神仙乞降靈芒灌注臣身願得五藏生華身有光明宻念日䰟十六字引光吞服使滿腹中再拜而退引光吸咽無正限數服月光法昏黄月將出望月光定炁存神再拜臨目具法位上啓月中皇君月宫神仙乞降靈芒灌注臣身願得五藏生華身有光明宻念月𩲸二十四字吸月中白光入口吞服充滿再拜而退自始生明至望止望後太隂减光理不再服翌月如初𠃔中未學不足以知奥義苐聞師友之餘論窺教門之典章似有所悟不容緘口惟思與同學之士共之夫三晨又曰三光亦曰天之三竒即日月星是也星曜衆多不可備言帝座之外獨中斗總髙列宿調正天經生化之源喉舌之任爲星中之機要並日月爲三光且太極旣肇清炁爲天華炁之明以爲日月星辰惟斗斡旋於天中下而五嶽四瀆九州分野人物生齒山川草木莫非藉此以植因斯而生天捨是則不足以正乾綱人捨是則不能以陶形質上學之士宻炁冲虚則明玄中之玄而悟道中之道合元炁而爲一固不待挹暉採炁矣是乃非世人常行之論於法術生焉何術不資於三光何法可離於中斗幾乎上道者則靜坐存神引芒納炁雖成眞之後尚當勤行其次者則焚香瞻象誦呪光雖形跡之尚拘而精專之可應此外求炁之法則太陽以十二時移一度太隂以五日移兩宫積其分抄筭其盈閏也斗罡則以河魁臨戌天罡指辰月將加時毎月定以中炁筭之魒之所指然後望方引吸是雖曲盡其妙然未可倚斯爲得法之徑路是非上經之所重也天心正法以三光爲主應世除妖之軄立功宏化之端前後其法中所用三光皆不可捨方隅向背手掐足歩之法蓋爲學有序罔得越陞合從詳悉之法門以資符水之行用得其機要者亦有功之人矣不可謂其常說而輕之又在乎用心一與不一也至如日月呪而用梵語者後世流傳之久而有之上經無梵音前軰多辯之矣近世之行靈寳者只欲自成一家不肯與正一法籙同其說故於靈寳中略去三光之論惡其名與天心雷同不足以賣竒於嗣法弟子殊不知靈寳又其可捨三光哉乾蓋之穹隆非不髙也星辰之昭煥非不逺也人居其間豈不寥絶以勢言之欲得其炁則難矣以理推之則有可得者在物有之矣螺蚌之吸月久乃精光透殻産珠而明犀牛瞻星月終焉暈入兩角或爲星象或爲月形彼蟲獸而無知亦得三晨之精耀豈其有呪訣方隅而得之也蓋其心無思無慮不撓不雜見月則吸月覩星則望星惟精惟一故非髙非逺矧人爲萬物之靈反蟲獸之不若哉爲其靈惟汨於事物之間心智流於機謀之域以至學道之士又多好竒恠用心愈雜報應益遥良由𦤺力於未妄其本不能專精而泥於術得術不由於哲匠未免萬劫而徒勞存思祝請不可無也要須澄其念慮定其精神存念於三晨之輝耀專心於一念之精誠期於能感能通全在母退母墮詳考諸家採服之法多萃今之所編皆可按行但考筭方隅度量節炁之類不復編入應有可以𦤺驗之術何憚其繁亦非欲天心法中分别蓋靈寳之教貫乎上道前之諸法格當施用故不應下而泛取也天台靈寳經緯修用第十八品備載存神參斗之法謂能割移死籍乃以竹爲棚架懸鏡爲斗形步斗然燈仍用緋絹七尺書斗諱包於額下結之腦後仗劒噀水以劒斫盞四十九下吸斗星之炁要見斗口二星可以不死又於毎月三七日玄時入室置香鑪頂上如鍊頂之狀存煙上升而朝斗次方習出神朝元以爲緋絹包頭架棚懸鏡然香頂上旣𩔖厭蠱之術又成妖巫之狀况於求仙之道禮法爲先靈寳乃孝道明王之教以孝弟爲主忠直孝敬自可動天地感鬼神至於住世留形延年却死亦須内精修鍊外立功勤際君得時則爲天下興大利除大害宏恩於萬彚加惠於四方未會風雲則收光歛跡謹身退藏力之所及尚當積功立德隨心而濟物因事而利人施藥施符斥邪拯厄歸至眞之道參純正之師昭格皇天名聞玉闕當是之時死籍可割生名可書今乃教人妖邪巫覡之態夜爲厭禱不正之術旣非齋醮壇席之格又非奏章朝修之儀僥倖以此割死籍上生名亦愚之甚矣仰惟虚皇之正教乃冲素之宗風不泯古之典刑故寛求於簮弁旣入科典於是星冠羽服執簡舒壇入靖焚香朝元啓事如恭對君父如面覿天威進趨有儀朝修有法從容不迫定炁存神交眞靈於恍惚之中馳一念於太虚之上及其𦤺辤必先祝國君之萬夀次祈九祖之升遷惟孝惟忠遵守禮法是科教之本也大道之門户至正無邪又安有紅繒包首操刃斫器之事哉以斯而謂之參斗誤人顧不甚歟却以紫文中曰䰟朱景一十六字月𩲸曖簫二十四字及斗星名魁至魒皆令人對象請炁編入祈恩謝過第四十一品中號爲靈寳開明三景之道謂之三境眞炁旣不考來歴又欲避三光三晨之名以爲異也日月星之炁而稱三境眞炁可乎其第十八品中參斗之後又有朝元法存神如拜章之儀不當連於參斗也及載升度剛風符三天朝元畢天曹建邸崇立靖名每日㑹仙曹入靖分神治事等說極其恠誕所叙西龜山圖即經法中源綱流演之義所述多失本源自存神參斗已下其法中指爲靈寳七經非也本經中七經八緯𠃔中己從舊格條目編入今作第六品學者冝平心考訂邪正自分切不可以彼之說而混雜此書庶可依據經㫖耳五行正炁品魁𩲃𩵄䰢魓𩳐魒服斗星名右法朱書黄素以黄蠟和爲七九一日一服清心淨水吞下七七日外智慧目明日誦萬言開口不忘魑𩲕六字治病法右法朱書黄上治百病𩴑服字内注六丁法右法於上六日午時朱書黄上毎二字作一符六字作三符至上七日五更後睡覺取上二字淨水吞之候聽聞初有人作聲吸炁咽之中下一七日同此名曰内注六丁一月受持足日自此之後凡見有邪鬼纒惑之者心念一徧閉目良久六丁告於心神意中所出言語皆是鬼邪作禍之由至於服色人數一一皆合其驗此六丁名也六甲遣妖法右法凡小末妖䰟作過朱書同金錢火化其邪立被六將遣岀海中夢異報此六甲名也尚蝕尚餎尚尚尚尚尚餦尚入符治每法右法應是毒物所傷癰腫丹瘤五藏大小之疾書於病所或内吞外貼不過三字即安霐晦日服字法右法晦日要誦及十萬徧奏章立達三天報應經下凡世防中表徳朔日誦字法右法於月朔日要誦一萬編三月有應一切灾厄默念三十二徧其灾厄自然解散甞聞太極旣判一生二而二生三三生萬物萬物旣植於是五炁生成肇於虚無之上則五老上帝爲五炁之根宗昭於乾象之中則五星爲經常之上曜於地則五嶽以奠寰區於物則金木水火土以爲五行於人則心肝脾肺腎以成軀體於事則仁義禮智信以開國成家以四十九字宻符造化黙契五行故服之於已則澄神鍊炁施之於人則却疾除妖是由方諸之召水陽燧之引火以内應外感激之道耳儻内無本眞而覬外眞之應自泪五行而求五炁之充恐報應難矣天台靈寳法中以玉札五行正炁爲一品乃以四十九字入於他卷却以五嶽持身呪及移景通光等法雜諸其中使五行之經不復可見故今止從古法而不敢増易也上清靈寳大法卷之六
