front:
  text: 上清靈寳大法卷之三十二仙五
  hash: sha256:8a7129c12d4c69c54f88586524549fb8cfc0b2aa099add7d9a73be41b29a74b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_031-310559a, image: sjb/31/310559a.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金𠃔中編昇度符誥品救苦簡符玉誕長桑栢空度仙丹華曜日照破九泉五嶽五帝紅杏墨黒磨針襪臘靈寳三官九府百二十曹幽都北府九幽地獄二十四地獄三十六皇獄五帝考官五嶽掾吏司功司殺司命司録四明眞公三界大魔九億鬼王三界衆魂抜出地户九陽光曜照煥重泉萬罪蕩除𡨚仇和釋九祖同昇億劫罪魂脫離三塗永辭長夜覩見光明九幽罷對黄簡白簡金光自然安鎭寒泉永劫長存魂升九天無拘天門急急如元始上帝律令聚形誥文元始符命黄籙白簡救苦眞符告下十方無極世界三官九府百二十曹五帝考官巨天力士九幽地獄執罰神兵司録司命司功司殺牛頭獄卒三界大魔拔度亡故某人靈魂出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乗此九龍度命功德上生天堂一如告命風火驛傳太歳年月日於三寳前告下救苦符可漏式謹金籙白簡救苦眞符吿下十方無極世界具位臣姓某封長生簡符元始符命普告三界无極神郷泉曲之府北都羅酆三官九府十二河源上解祖考億劫種親疾除罪簿落滅惡根上天度人嚴攝北鄷今日欣𢊤受度歷關請天請滅三惡斬絶地根飛度五户名列太玄魔王監舉無拘天門魂度朱陵受錬吏生普度無窮登眞度命錬形濯質書名紫䇿随品受生返生福堂天尊告命敢不敬聽急急如律令聚形誥文元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上宫長生大君韓君司馬司命司録延壽益筭度厄尊神廻骸起死監生大神超度亡過某人靈魂上登朱宫流火之庭玉眸錬質黄華蕩形書名紫䇿受化更生承此金籙度命功德時刻昇遷一如告命太歳年月日於三寳前吉時吿下長生符可漏式金籙白簡長生靈符告下謹南方丹天世界真位臣姓某封茭龍驛吏符按册命云茭龍驛吏馳送應謂不用文引只以符傳付也今之行者若未能感通玄虚可作請關符篆於尾庶克達命於玄司也或取新茭縛龍吏納其符於草人身中使負簡文亦須别䟽狀告齋酆都不可不啓上眞不召驛吏直以私意率易宣此符正猶人間赦命非臣下之敢專故須大醮天地方可告行也玄都茭龍驛吏一十二萬人傳命泉宫開光幽府凡告救苦眞符當啓元尊玉帝召關此吏一人也凡書符時搯玉帝訣引北極星光黄紙黒書驛吏隨降篆符紙當以槐黄紙黒書驛吏屇前也北極星光非北斗第六武曲北極乃天皇之右北極乃天樞也救苦眞符自非大醮天地不可告行也儻有投詞但當詠禮玄文散燈念道使回光九地輝破八冥所薦逝魂亦獲升度當先置一燈於天尊前拜跪焚香乞降晨光汎燭九夜乃執炬分燈令暉散一輪作一輪如車子大小三級上下三疊然燈四十九盞立十方洞靈天尊聖號開衆生五累果門假此回光銷鎔五累也金龍驛吏符世有救恤貧之濟度天人奉戒修齋供養三寳或錬眞養神功未充足命窮滅度經遊太隂者方曲行赦命救苦眞符外别以栢木簡作長生靈符告下南方丹天世界使擢簡帝堂錬神火府如罪䰟無功於天人者不可濫受登眞之籙但得覩神輝更生陽界則幸矣故於大醮之初不告長生靈符其符簡尺寸同救苦符式玄都金龍驛吏二十五萬人領符命啓魔道馳信令凡告長生靈符預關一人符用青紙丹書搯玉帝訣引太尊星芒繞筆拂簡畢同符命焚青煙中太尊星自南而望北斗則太尊星在中台下台分中微北向是也太尊星北有四星勢如軍井南有少微北是也少微在亢宿其星黄色而明要在天璇天璣二星正南以鼻引其芒繞簡筆也炁芒各𩔖清濁異歸凡取三光五星之炁當以鼻引而口吐也生旺雲烟之炁當以口吸而隨吐也引吸之時勿使耳聞耳聞則炁芒不降又不可長引長引則喘息失度要在精傾注念御意合神於杳冥之間則吸隨念感降自然也若服御明暉行吐納之道則非此限也右符面朝正東思東極天中金樓玉殿之中見太一救苦天尊衣九色雲霞羽服乗九頭獅子玉蓮寳座左執甘露碧玉淨瓶右執空青枝從大惠救苦二眞人青玄童子八十一靈官頂中岀白毫相光如刀劒在赤日圓光中一一分明即宻奏因依左右結三塗五嶽印吸慧光咽了心念聖號四十九徧再吹筆書不以多了再存取炁吹之變化此符則九州億萬窮魂俱獲昇仙更生如度一二亡魂止可用此符靈感無極也九龍符告文東極青宫救苦九龍符命空符右符告下三官九署五嶽九州酆都六洞十宫九幽河源泉曲五道都府城隍社令冥關幽扃一切主者咸領符命救度亡過某人并係薦靈魂洎六道四生孤魂滯魄等衆俓出幽翳永離幽冥地獄消苦開泰泉扄火翳滅𤔵刃毒摧傾下明黒暗上生朱陵超度三塗宿對停輪一如告命風火驛傳太歳年月日吉時告下具法位臣姓某告行方函式東極青宫救苦九龍符命告下十方三界天牢地獄主者具法位臣姓某謹封玉清寳籙破地獄眞符符告文普告三界無極神郷泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得狗留逼合鬼群元始符命時刻昇遷北都寒池部衞形䰟制魔保舉度品南宫死䰟受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超淩三界逍遥上清一如告命風火驛傳年月日吉時告下具法位臣姓某告行内封式玉清寳籙破地獄眞符具法位臣姓某謹封方函式玉清寳籙破地獄眞符吿下三界十方冥曹主者具法位臣姓某謹封玉清寳籙拔幽䰟眞符符告文元始符命時刻昇遷同前至逍遥上清年月日吉時告下具法位臣姓某人告行右二符並以黄素丹書黒書告文内封外封通用黄素墨書造二十道以十道告下十方九道告下九州分野内各一道專用度有姓亡䰟下元登眞度命出離生死靈符符告文赤文玉清上通紫庭天慈赦宥亡過某及億曽萬祖苦爽遊精削除罪簿落滅惡根速赴生方炁識咸寧上登天堂澄神鍊質眞心洞明蕩除隂翳入道登眞一如告命風火驛傳年月日時告下具法位臣姓某告行可漏式謹登眞度命出離生死靈符告下九幽十方三界主者具法位臣姓某封右符以栢木造長九寸九分闊三寸厚五分簡文背書五行歳月一行共六行爲式拔度民庶用之太上敕赦生天寳籙式无上玄元太上生天寳籙敕勘郷貫某人投詞伏爲亡故某人元命年月日時受生於某年月日時命終以今崇建某齋用伸追薦除已録奏天闕請命施行須至出給符籙告下者書寳籙符形度人不死之神南極長生之君度世司馬大神好生韓君丈人右奉大上敕赦生天寳籙告下三界天曹地府山川河嶽泉曲冥關北都羅酆六洞十宫三官九府百二十曹鬱絶之郷幽隂之境諸大地獄九州分野福地名山城隍社令神物司臨之所仙曹典録之墟校量罪福考察功過一切天牢地獄主者感領符命應亡䰟累劫宿世以至今身所作諸惡根衆罪一切𡨚愆承此太上慈恩並與疾除罪簿落滅惡根不得拘留俓出地府永離幽冥皆證妙果如擔沙負石連汲溟波之衆驅雷役電掃山穿地貫天引水之徒並與斷地逮役永使逍遥即令亡䰟從今已去七氣成眞六儀成體五靈續絶二曜扶衰旋綱躡空飛歩靈宫胚胎有始塵劫無終金城錬質玉洞凝神眞氣内養以成眞人上入玉虚下洞幽泉雲宫寳闕中有眞䰟岀入福郷周旋生門咀嚼靈芝灌潄金泉甘露川流玄澍丹田紫霞朝映三氣凝烟瓊室化仙安座金蓮眞容掩日塵劫爲年一如告命年月日時告下如大齋可於此列六軄位具髙功法位臣姓某告行右先望天門宻奏訖即將墨筆書赦敕文畢望天門宻呪曰無上玄元太上道君教臣行符照破諸嶽或言幽獄死魂出離急急如太上律令敕呪七徧用朱書南斗形寫眞諱於其下存天門方有玉童一人乗金光持黄牒下降唵炁書四字了逐一字念四字四徧合形如法施用寳籙符篆並黄素黒書内外封並用黄紙可告二十道十道告下十方世界見道告下九州一道專度列位有姓名亡魂讀訖烈火焚化則得赦宥萬罪消釋千愆魂神内鍊自生俓得上升仙界内封式位同無上玄元太上敕赦生天寳籙告下具法位臣姓某謹封十方三界天牢地獄主者具法位臣姓某謹重封切謂告符命以拔幽靈所藉者符文出於科典及其臨壇行事則奏啓玄穹頒行九地此古法也而近世庸妄之徒專意誣罔世俗故符命不問重輕不究是非悉言自天而下至於印記亦多取二天太上道君玉印之類以印符告殊不知世間朱砂黄紙成於凡人之手而且欲欺詐矯稱天降其爲巧計不亦踈乎生天寳籙者如世人宗壇之義符文呪訣出於太上齋盟奏告然後按行故於籙尾具高功位告行言告之於天而行也或者攺爲承誥奉行則失本㫖逺矣甚至於其間顯言手弒君父不孝二親此事其可赦哉旣爲人當知逆順殺父弒君豈忍形之言辭而欲免其罪則天地鬼神爲之不容雖經科中有時載之今奉行科法不應顯書而行況世間罪目萬狀千條亦豈得一一盡述只畧言諸惡衆罪使其符文可以免罪則不具罪目亦可升度若其符不可行則累牘盈編詳書過咎悉成虚語爾年月之後妄立天相以擬朝廷赦命此於憲章巳自非使兼上天寥邈不可理測不可臆量乃自撰名位以人間朝班而品排上眞以罔人求利恐未足贍其軀獲罪以殞軀多不得享其利近又有全取朝廷赦書以爲告文者其間有巳發覺未發覺等語此又罪不容誅學者能捫心詳思之凡事近厚稍存正理從其平易可行之格非爲一身免受禍於人間亦可使九祖獲逃罪於幽壤又不悞人於無窮之福報度六道四生籙式太上生天寳籙超度六道孤魂滯魄出離幽夜隨果往生主者遵依符命施行年月日時告下具法位臣姓某告行元始符命符告文元始符命時刻昇遷北都寒池部衞亡過某人形魂制魔保舉至逍遥上清一如告命年月日時告下具法位臣姓某告行普告三界符符告文普告三界無極神郷至逼合鬼群一如告命風火驛傳年月曰時告下具法位臣姓某告行歷關諸天符符告文歴關諸天請滅亡過某人三惡斬絶地根至無拘天門一如告命風火驛傳年月日時告下具法位臣姓某告行敕制地祇符符告文敕制地祇侍衞送迎至受錬更生一如告命年月日時告下具法位臣姓某告行右四符若薦度亡魂只專書其中一符只用簡書如救苦簡式若崇建大齋則諸符普告只用黄紙朱書方函如式用之允中甞考元始符命歷關諸天敕制地祇四符皆出於靈寳度人經法中自古有之因經立法故符不外於經其說謂嗣受靈寳弟子合關昇九祖過度一身是以傳度之式給告此符别有行用以之薦拔亡爽則以經中之辭爲告文終不越違其本㫖天台四十九品中旣不修入此法書而其徒臨事却行施用或於本文之上加玉清等事或一符而稱靈寳告命或以一符而稱靈寳符命此語上多不知其意欲更攺其名以罔俗耶或不失出處而妄用耶皆不可續撰名稱也四鎭合同符昇玄籙中本好此符又名金文玉劵東一分朱書黄素焚付天門吏南一分朱書白璧投名山福地巖穴洞天之中西一分朱書青繒付亡魂收執之北一分雕金魚之背流之水中並書刻齋意此乃天上人間證質齋功超昇亡爽也允中恭按古科四鎭合同分爲四分證質三界仍給付亡魂是承齋功出離幽境欲天上人間悉資善功所至逍遥其說甚長其格甚古近世所傳四鎭合同符將一角謂之靈寳符命用普告三界爲告文取一角謂之元始符命用時刻昇遷爲告文取一角爲玉清寳籙用歴關諸天爲告文取一角謂之靈寳誥命用敕制地祇爲告文乃於錬度之時焚於火池中且錬度之時存亡魂在前方行錬度旣非追取亡魂又非超度亡魂水火與皆在壇而焚四片合同符何說也合同之義安在也其誑妄之源流波未泯台山且有文過之語云所度亡魂巳自升天不必合同於三界此禺弄俗人可也自古黄籙埋簡以告齋於三界使齋功無所不及也況亡殁罪魂一經薦度錬除隂翳得脫重泉之中或得隨品受化巳是大幸便欲使俓上九天可乎四鎭合同給一片付亡魂則髙功自揆巳之功德行業未能通逹幽冥縱使髙眞垂憐悉可其奏尤未明能審亡瑰所詣故四鎭之符分詣三界俾亡魂所向合契昇遷隨品受化免爲罪魂斯其意也豈可以爲亡魂上天去了不必分三界如此則亦不必焚之錬度所也大意其源流專以欺罔爲事其行用誑妄毋足怪也昇天大劵此劵以黄素方一尺六寸中絶夾合面書三界洞章背書告文盛卷以黄繒付亡魂佩之即得精炁魂魄神識全出地司受化更生天人告文今日欣慶歷關諸天至無拘天門太歳年月朔日時告下具法位臣姓某告行靈寳昇天左劵亶婁阿薈無惒觀音須延明首法攬菩曇每行四句靈書共一十六行末尾書告文云元始靈書中篇升度亡故某人上登道境魂神受度更生自然一如告命風火驛傳太歳年月日同前具法位臣姓某告行三皇内文六十八字書於左劵背三皇内文不録在此自有别本凡昇天左劵背文外書亡魂數目靈寳昇天右劵面書三十二天帝背三皇内文於右朱書亡魂數目太皇黄曽天帝鬱藍玉明太明玉完天帝須阿那田每天二句八天計一十六句一方八天作四行書四方共三十二天共作一十六行書左劵偶數右劵竒數如上式末後書告文云無色之境天帝玉眞𣑽行帝諱三界天名隱音隱韻天中空洞自然靈章天中之尊天中大魔天中之靈九和十合變化上清无量之奥深不可詳敷落神眞普度天人亡魂某承此功德上登道境一如告命風火驛傳年月日時告下具法位臣姓某奉行背書文三皇内文不録在此左右劵並以青素丹書中央横截一半用栢木匣盛宻封付天門吏一半付男魂一半付女魂首領者宻封如今執付天門驗契若無此劵地司土府不與全神而去五嶽不與名籍而去火官不與靈光全明而去天門遏不使進前若有此劵則得俓入天門上生福堂外函内函靈寳昇天右劵具法位臣姓某謹封靈寳昇天某劵告下天門守衞衆神具法位臣姓某謹重封允中切詳靈寳左右劵青素丹書中間横截斷之一半用狀封付天門神吏一半給付亡魂之首某魂得此劵亡魂得之三界不復拘留可免沉滯非獨爲昇入天門而巳使其功行未該朝謁上帝則在中界亦爲身寳度化更生而巳行教之士冝審用之可也上清靈寳大法卷之三十二
