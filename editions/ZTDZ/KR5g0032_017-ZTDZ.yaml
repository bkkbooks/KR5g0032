body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金允中編颺旛科式品建齋之始近齋壇空隙地立長竿預期颺旛啓聞穹厚普告萬靈亦將建善功之期信也故顯幽共覩鬼神遥瞻寓物備儀不在繁雜古法旛有二式爾遷神寳旛絳繒七尺或四十九尺造旛一首以朱砂雌黄合研書日月斗形於旛首書旛名於旛身左手書三天内諱右手書三天隱諱亡魂覩此則得罪障解脫神遷南宫回耀靈旛以白素黄繒造旛長二十四尺或四十九尺旛身書青玄全號左足書太微回黄旗無英命靈旛右足書攝召長夜府開度受生魂左手書茫茫酆都中云云右手書功德金色光云云以長竿懸於壇下任風吹颺十方幽魂覩此靈旛一念皈依則夙生罪障應時消滅以至塵勞大罪皆得原除上生南宫地獄開泰死魂更生又三途經云或造小旛十首懸諸林木山川之中亦獲其果颺旛儀髙功祝白道香德香無爲香無爲清淨香清淨自然香妙洞眞香靈寳慧香超三界香三境眞香以今焚香奏啓玉清聖境元始天尊上清眞境靈寳天尊太清仙境道德天尊三界萬靈虚空衆聖普同供養香乃玉華散景九炁凝煙香雲宻羅俓衝九天當願侍香金童傳言玉女傳臣啓奏上聞帝前令臣所啓咸乞如言具位臣姓某不量微陋僣瀆玄穹願賜慈憐曲垂省緑臣無功待罪久列班行有願濟時敢謄詞悃臣昨據郷貫某人請建無上黄籙大齋上資邦國普福群生關陞七祖九玄拔濟三途十𩔖集兹善果用薦亡故某靈魂超生善境臣巳行備録來悃具狀奏聞移檄諸司關申三界以今齋事有日謹當肇颺靈旛蓋以黄籙沖科緫萬靈而關九府洞玄上品道四輔而貫三乗惟福利之無邊乃修崇之有格靈音寳號降九天十極之晨輝色縷紋繒敷五道三途之妙廕含情受度幽爽蒙休抑覬天造垂矜道恩流宥特施善救曲鑒微𠂻舉旛呪文謹當宣演黄籙開度三界十方四生六道同列道塲生神遷魄萬劫不忘旛之爲體隨風飛揚風之所被各從其方重隂之府九夜之郷地獄餓鬼旁生無鞅皆得解脫上生天堂知磬舉靈旛赦罪天尊上來颺旛功德無量勝因普薦三途廣資萬𩔖莫不覩光輝而消障惱瞻形影而脫罪縁解免牽纏原停逮役九幽夜府因遂開明六趣迷塗悉歸清泰伏願皇圖綿永海宇丕平風雨順而五榖登災沴消而萬民樂昆蟲草木咸遂生成鱗介羽毛俱辤夭横集兹微善奉爲齋主某人資薦亡故某人靈魂自悟宿因早超𡨋界𡨚讎解釋罪垢蠲除乗此齋功俓登道岸爲上良因念三清無上天尊不可思議功德允中粗閱諸家靈寳法中大體皆同所載旛圖止有兩式其一曰遷神寳旛其二曰回黄靈旛别無異品惟天台靈寳與諸家不同而法中載旛圖亦止二式但却以遷神旛爲回耀旛其製小異近世有立告盟旛者多書玉皇睿號而蔣氏立成儀則書太上無極大道三十六部尊經眞文寳符十方上聖等字皆啓吿齋盟之意也而靈寳古法無之雖别有經據難雜於上清靈寳本法故也只彼蔣氏齋科中則可隨俗而行之此外邇來旛式甚衆其間雖無所出而於理稍通者尚可用之至如有命靈旛之𩔖則失當礙理其意篕以九天生神章有太微回黄旗無英命靈旛之語因撰此旛殊不知無英乃神名也命者召用之義也靈旛者神靈之旛也謂無英之神命此靈旛以攝召也今却以命靈二字爲旛之名大失本㫖儻以此例而取之則度人經中有天丁前驅大帥仗旛今立師仗旛可乎生神九章度人一經最爲玄古大師所仗之旛後世不可覩其髣髴無英所命之旛亦難考其製度大抵建齋立事旛花圖像以備儀式不可無爾又何待多立名號乃可感通哉若有力之家多造旛蓋或書經呪或標天尊睿號亦以寓誠供飬然此等事亦不必過多矣二旛之式出靈寳法中揚旛科文近世翟叅政甞述壹本巳見蔣氏立成儀並不𨽻廣成古科也近諸方亦有増呪三四叚者今不遍録掲旛之初禮雖啓祝固不繁辭允中謹隨陋見撰述掲旛之文于右姑以備用爾其有主行之士好詳善之文者自别易之鎭信威儀品廣成先生科曰質信効心以財爲首財旣可捨心亦隨之聖善𡨋通隨適心意髙天厚土玄聖上眞非信不通非心不感感通之至在乎信焉金龍一十三枚各重一兩長三寸六分以十枚鎭十方案三枚隨簡叚之科曰天子皇后用上金公卿用次金庶人銀或銅塗金夫龍者乃上天之驛騎也傳達通感龍騎爲先負簡即謄信三官效誓則告盟十極鎭信之法以龍爲首缺者考屬隂官曹鎭綵一十一叚十叚鎭十方一叚命信東方青九南方絳三西方白七北方黒五上方碧三十二下方黄三十二四維黄各一十二緫十方之數共一百三十六天子疋數諸侯丈數庶人尺數本命紋繒天子諸侯紫色士庶以本命納音色疋丈尺數各隨年外加一以表延生之信命綵置之中央案上科曰紋繒者顯五行之色象十方之炁降十天致五帝通眞効信請命祈靈不可缺也缺者考屬天官玄都曹紙筆墨硯十副鎭十方每方紙各用一十二幅科曰建齋行道或救拔億曽萬祖先後亡靈或請福析恩消災謝過則四司五帝三界十方紀録善功校定罪名當以紙筆墨爲録功紀善之籍質信於十方不可缺也缺者則十天五帝不録其功九幽三官不除其考缺者考屬三官曹香華十梓鎮十方科曰香者以通感爲用隔氛去穢花者以鮮潔爲美表端効珍請福祈眞香花爲本香以沉箋降眞花以香潔木生者若無花可用五綵剪成以鎭十方不可缺也缺者考屬陽官曹鎭米二斛四㪷科曰米以質信天官増加品禄缺者考屬天官曹鎭油二㪷四升科曰油者隂𩔖也隂中生陽以油鎭隂官續陽景缺者考屬隂官曹鎭炭一百二十斤科曰炭者陽𩔖也陽中生隂以炭鎭陽官資隂炁缺者考屬陽官曹鎭錢二萬四千科曰鎭錢二萬四千以代上金之信質心三界告盟十天缺者考屬玄都曹槿木簡三面各長一尺二寸闊二寸四分厚二分科曰簡者記也告也記世之功告盟上眞上下正方天子以玉爲之玉有九德禮天地之信也餘皆槿木爲之或栢木丹界五行丹書國號年月建齋之所及法師姓名投於名山大洞靈泉龍穴及齋壇之中告天地水三官使著明齋事奏于上境缺者考屬地官九都曹玉璧一十三枚十枚鎮十方各徑二寸四分厚二分圓形虚其中心外三枚投龍簡天官用蒼璧圓形地官用黄璧方形水官用玄璧六出形皆虚其中各亦徑二寸半科曰玉以貞潔之德可以盟感上眞故以爲信若投龍簡當以青絲金紐纏而副之青絲以代割髮金紐以代㰱血上吿三官也缺者考屬地官九都曹金紐二十七枚徑九分如環之狀毎簡用九枚天子用金餘用銀塗金以青絲纏之同龍簡投之毎簡用九紐者見於靈寳經法中餘並從廣成科書後世不敢增易惟書簡則廣成科不載符上眞書其一面而經法則書篆文於一面用與不用各從師授合用壇外威儀節一對五色絲爲之上下五層懸竿頭上金龍㘅綬帶幢一對珠蓋珠網八角一層懸竿木胎左龍右虎㘅綬帶旌一對以節無龍鳯綬帶三層五色絲爲之懸竿珠旛一對珠錦玉珮金鳯㘅之懸竿五明扇一對以木刻成金綵裝飾上列日月星中列五嶽下繪海瀆立以木竿鶴羽一對木刻成鶴翅立以硃竿巳上威儀並按廣成科章函權木爲之長一尺二寸八分闊二寸八分正中上下開三印池案副之章案長二尺二寸髙八寸仍須曲脚以梓木栢木爲之違科奪算龍頭書刀刃長六寸古鐵爲之以銀半兩製龍頭形於其柄拜表鎭章用不可缺香爐几案裀褥二十副三寳一副十方十副髙功都講奏案各一副六幕六副壇外香案一副此是齋壇所需之數他處所用不在此數内允中恭考古典鎭信威儀皆有定式今悉從廣成科法諸方亦無大叚殊别只有三簡符篆則多不同允中所受經師髙君之法乃依古法本儀其告文並同古式簡背篆文則從師傳之法矣傳此法者當遵此而行非正傳此法而别有源流者自依所受儻三簡别有符而不見顯然出處則毋輕用也須考證來歷爲善壇圖幕式品科曰禮天地通眞靈當建壇以申至敬壇層格各有等差今專敘黄籙齋壇故不泛及壇外之燈從眞仙品禮祝之法共計一百五十九燈蓋古者二十八宿只用二十八燈是以數簡今有力之家將二十八宿在天之象而依様然燈尤佳二十八宿星圖亦列于左壇外燈圖二十八宿經星圖東方七宿自角至箕計三十二宫北方七宿自斗至璧計三十五宫西方七宿自奎至參計五十一宫南方七宿自井至軫計六十四宫井宿之前一星曰列鉞故共六十四宫也凡二十八宿緫計一百八十二宫此圖從天文志及渾天儀中式也與近來刋行齋壇圖子不同蓋逐時易板雕刻日漸失眞今故合從渾天儀爲定然止從毎宿一燈則共㸃一百五十九燈若依星象而㸃燈則二十八宿併壇中諸燈共三百十三燈豐儉隨力大抵燒香然燈齋功之首其餘浮費或有㓕損法天象地乃於燈燭宜從厚爾故考天文而出其圖於此主行之士幸深詳之齋壇或壘以寳甎或砌以文石或竹木暫結或築土創爲務合䂓矩以崇朝奏之禮或露三光之下以達至誠或以天寳之臺取法上境建齋行道以爲先於中列太上三尊之象如朝㑹玉京山也壇上下四重欄楯天門地户飛橋等務在精好纂作瑞蓮之狀或八十一或七十二或六十四隨壇廣狹設之竹木爲之束茅表像亦可爲延眞之所也外壇用長纂八枚門牓八裀褥席十六副纂上安壹榜也此乃十炁故不用雙纂成門止於巽上開一門餘皆欄斷正東卯地震宫洞清之炁青書黄牓東南巽上巽宫𣑽行之炁黄書黒牓正南午地離宫洞陽之炁朱書白牓西南坤上坤宫𣑽陽之炁黄書黒牓正西酉地兊宫少陽之炁白書青牓西北乾上乾宫𣑽通之炁白書黒牓正北子地坎宫洞陽之炁黒書赤牓東北艮上艮宫𣑽元之炁黄書黒牓中壇用長纂八枚門牓四枚以二纂中間安一牓爲門也短纂二十枚裀席二十副亥上天門青書黒牓巳上地門黄書赤牓申上月門黄書白牓寅上日門黄書青牓右四牓長短纂列中壇之外只開地户天門内壇用長纂一十八枚門牓十枚亦以二纂中間安牓爲門短纂十枚裀席十副東方卯地青華元陽之門朱書青牓東南辰地始陽生炁之門白書黄牓下方巳地九靈皇精之門黄書赤牓南方午地洞陽太光之門黄書赤牓西南申地元皇髙晨之門白書黄牓西方酉地通隂金闕之門黒書白牓西北戌地九仙梵行之門白書黄牓上方亥地大羅飛𣑽之門青書黒牓北方子地隂生廣靈之門青書黒牓東北寅地靈通禁上之門白書黄牓右十牓長纂十八枚短纂十枚列於内壇之外十牓當用長纂二十枚今用十八者以兩角有門毎二門共一處柱故用長纂十八也壇三級此法用纂六十四枚長纂三十四枚各長一丈三尺短纂三十枚各長一丈門牓二十四枚七黒五黄三白三青四赤用五色裝之雕木爲額畫飛仙雲炁之形務取精巧纂三重用青䋲絳䋲各五百尺縻之護淨隔凡止開東南一門而已三官帳於壇之東三師帳於壇之西各作帳幄備圖像几案供養如式三官主三元考校之籍證録齋功三師爲開度之宗經籍度三師也師資存念之㫖各宜列位齋壇左右也九祖位在壇之東南遷抜九幽洗滌玄祖宜設位遥對壇所也五帝位古儀在五方案上壇内窄狹就三師位比别設帳幄與三官比玄中法師相對各設几案供養亦爲便也監齋大法師位次三師之南土地位在壇之西南關召敷奏傳感上玄凡建齋壇土地爲首亦宜設位遥對壇所也右廣成先生法也舊儀中壇廣三丈二尺内壇廣二丈四尺外壇又居中壇之外今之修建當隨地之闊狹爲之列纂則廣成科大爲約長纂則可定如短纂則隨壇之大小施之爾廣成科中若五帝座勢不可安於五方案上未免於壇前設幕爲便則是五帝一幕三官一幕玄中法師一幕經籍度師一幕監齋大法師一幕近世増以正一天師一幕則合爲六幕而廣成科之說則五帝居壇之西一玄中法師居壇之東一三官居壇之東二三師居壇之西二監齋法師居壇之西三増入天師則居三官之次則是五帝居西一玄中法師居東一天師居西二三官居東二三師居東三監齋法師居西三悉從廣成古科則經籍度三師不居天門無正一天師幕此蓋龍虎山正一宗壇尊崇祖師之義而曰先生因之行齋故有圖子雕行𣸸正一三師一幕而經籍度三師居天門也實非古儀矣況以靈寳法而行齋合守廣成古科九祖位此則齋主之九祖薦拔亡魂合先昇度九祖若衆建黄籙則各列九祖位古科欲遥對壇所或含宇窄未必可以安頓則隨事宜可也土地位古者玄壇啓事以禮告天故禮簡而事嚴壇外須别設土地以爲關告之首今人崇壇之外又别設道塲列法中將吏里域衆神則時遷事異非如古者是土地巳在列位中不必别設也監臨位古者建齋請降兵馬營衞壇塲朝奏感通交於肸蠁後世旣繁簡不同而儀式文移俱宻是以牒請城隍主者或近境祀典正神監臨宜於廊廡或門間别設位而日易酒果供養解壇一併言功旣不出古儀則真位隨宜安設也神虎堂此靈寳大法之科式也後世攝召魂儀務見報應故有此格宜潔淨室宇依科建立中列聖位北斗玄𡨋夫人太乙紫元夫人神虎雄左玉曹何將軍神虎雌右武鸞喬將軍提魂攝魄七司玉女上部追魂侯使者中部追魂魏使者下部追魂張使者監獄使者劉將軍聚魂功曹盧將軍整魂神將太一軍對魂神將劉將軍神虎追魂大將馬將軍追魂攝魄合屬官將吏兵右列聖位供養茶湯酒果務在豐潔左立陽耀通關壇右立隂靈攝魂壇中建召魂八門壇不令雜人出入臨壇依法行事壇式敘在神虎攝召品錬度堂廣成先生編撰科儀乃唐大順間是時未行錬度之儀近世此科方盛故聖位及堂宇之式難以立爲定制浙中多别立一堂排列聖位設醮後方行錬度與道塲中了不相干江東有數郡只於道塲内上帝前奉行又一式則於道塲内恭對上帝行事廊筵相對只列錬度官仍設醮筵俓對上帝行事如木公金毋九天上帝諸位帝眞皆已列位於道塲内故不别設此等事古無定格今當遵從師傳此書乃靈寳法也此一法合於道塲内兩畔設錬度官將位次設醮行科如拜表請炁只對上帝前也或别立一室自居一所則中間合設帝眞位矣古者朝奏之䂓以壇爲重今旣立壇以行齋而建置道塲舒設圖像正爲行事而備若於道塲之外又别置錬度堂大爲繁冗且以人而錬度幽魂誠爲難事所資者祈告眞靈請降二炁或可少資幽沉符乃召炁之信呪乃天中之音然後運一元之神炁合二象之生津此其本也儻專務華飾日増怪竒多方排整壇塲撰造圖局悉爲無益今止於上帝之前道塲之内左設火池右設水池法師定炁存神依科行事有何不可豈待變詐百出而後可行哉宫觀尚有寛狹不齊況人家宅宇安得廣有去處逐一别所爲之其地不能精潔反成䙝瀆只就道塲内爲便或堂宇寛閑可以施設却自隨宜也神虎欲攝召行事須别立堂却與錬度不同錬度聖位東方青帝君南方赤帝君西方白帝君北方黒帝君中央黄帝君度人不死尊神度世司馬大神好生韓君丈人司命司録君延壽益算君度厄上生君陶魂鑄魄君朱陵火府官將吏兵南昌受錬官君將吏龍威丹天大神復相反身大神皓華玄英大神返形超化大神九光火鈴童子東井黄華玉女火池主者火錬官將水池主者水錬官將靈寳大法司官君將吏黄籙院升度官君將吏九天監生官將吏兵品命度生官君將吏誦經堂此齋中之最重事也古法入靖對齋誦經爲首或三十六日或四十九日先集道衆誦經中設三寳位靖室中設髙功座仍供養天師或齋法之祖師道衆列兩傍法師什持存念書篆符文悉就此矣茭郭設斛之所以備風雨或以茭草或以淨茅用之幽靜之地不欲人物喧雜隨地之闊狹以寛廣爲上造立草屋如郭城之狀中安斛食四傍或列齋饌供養惟在精潔先度衆魂則所薦之靈儀獲福齋官多不暁此理髙功又不達齋修之本源反隨順齋官之意常汲汲用力於正薦之魂而於普度之事良不如意何其愚哉此浙東尤於此事踈略學者其深思之齋供時新果實切宜精潔舊儀建齋則逐日易之不用石榴甘蔗之𩔖及穢泥之物枝上淨果爲佳上帝三寳前列茶湯果實供養如法六幕并將吏神祇前備齋饌淨食之𩔖供陳之上及薦獻神眞下及道衆飲食並須潔淨不用酥乳醍醐酢酪等物皆爲葷或六畜皮毛爪甲母墮飲食中禁猫犬禽獸之畜汚犯壇中正齋毎朝發爐時進茶大謝後獻湯今多不用湯矣更隨宜審量之請師之詳法服品格巳見廣成黄籙科中不必重敘允中經師髙君自京南渡紹興之初化行江淮間所行上清靈寳大法乃古書也自唐末五代時流傳者髙君歸老于新安前後主行黄籙難計其數莫非一遵古典非後世私意更易之儀其法則主於度人一經其齋則遵廣成之科先籍師唐君受傳以付劉副觀劉君受傳以付金允中冒昧嗣行悉從成典故今壇圖幕式皆先經師髙君之定法也與廣成之科則一同而近世印行田先生黄籙壇圖則有少異蓋六幕不同則宗壇崇本遂増正一天師三師而廣成科未有也壇外燈圖只隨金籙禮燈儀布之若無禮祝之法則不設燈此一髙君從杜廣成科而行也允中度師劉君再行奏受齋法於正一宗壇蔣君九思奏法於田君居實度師劉君面承蔣君戒曰某受法於田先生奏告盟誓悉從廣成古法允中今遵此而行乃髙君之定法也而田先生付授之㫖也雕行壇圖雖曰田君名重蓋一時爲宗壇設爾旣告天盟受使從古科今不敢以圖子廢舊式乃是叛正理以累師也永嘉蔣先生叔輿編黄籙立成儀則六幕皆用杜廣成科而其次序又有小異乃天師與三師皆居三官之上而廣科云三官居壇之東三師帳居壇之西又云五帝座舊在五方案上或壇内窄狹就三師位北别設帳與三官比玄中大法師對如此則是五帝幕居壇之西一玄師幕居壇之東一夫壇則座北而南向今言五帝居三師幕北與玄師相對則三官幕合在壇之東二三師幕合在壇之西二分明矣後世増以正一天師則合居三官之下三師之上而天師却與三官相對三師却與監齋相對無可疑者自後唐以後羅天醮儀及宋宣和間朝廷印行三千六百聖位圖則五師班次在三官四聖之下甚逺又有靈寳三百六十位醮儀亦宣和刻石于浮光天慶觀則三官之班次亦在五師之上古今皆然玄中法師今與五帝對者乃從廣成科天師居三官之上則恐未安允中所編壇圖從髙君舊式不敢移易後之行者或别有經據則自從所授可也允中考之古典與夫師傳皆合縱有小異於近世之儀終不敢戾古背師以趨時也他人不此例髙君姓名巳著卷末矣上清靈寳大法卷之十七
