front:
  text: 上清靈寳大法卷之三十五仙八
  hash: sha256:9eac24c24ec507592f4dd2bbdbaac0e7ba3609a3cde1a2f4c68ec48d061266fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_034-310571b, image: sjb/31/310571b.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金允中編然燈破獄品破獄之科本不與然燈連續但唐廣成先生科有九幽燈則後世之九巵燈也大則八十一盞亦可九盞其古法科中文辭正以照燭九幽獄其行用則與禮燈之法相似故今以然燈㸃於獄前請道衆宣科而髙功存思行用也道衆列班於獄燈前髙功啓白先祝香如式謹焚寳香一心奏啓虚無自然元始天尊太上道君太上老君昊天玉皇上帝紫微北極大帝勾陳天皇大帝后土皇地祇東極青官慈悲救苦天尊九天上帝三十二天上帝東華上相木公青童道君白玉龜臺九靈太眞金毋元君萬天上帝恭皇天恩流慈鑒映玉華散景九炁凝烟香雲宻羅逕衝九天侍香金童傳言玉女爲臣通奏上聞帝前今臣所啓咸賜如言稱法位臣姓某夙籍善因獲承道䕃叨膺符籙忝綴班行僣主齋修謬當首軄以今切慮所薦亡過某等及九州四海五道三途抱識含靈一切幽爽下元罪魂自棄幻身多罹隂境牽纒地府執係冥曹非憑上帝之頒恩豈得幽都之奉令伏願降度魂之勑命下破獄之眞付六天十洞之曹開扄啓閉五嶽九幽之境放罪釋愆庶使係薦之亡魂以至九州之滯識超離苦趣瞻覩慈光符命下頒以時報應臣恭對天闕依格奉行無任祈恩俟命之至髙功存變行持道衆一人行科伏聞天地八方有九幽地獄考謫罪魂皆由生世之時造諸惡業身殁之後淪滯三途受報終天無由解脫冥冥長夜不覩光明若非大聖垂慈善縁開度長居黒暗億劫難原所以天尊玄科者然燈之品繼明西日昭映窮泉流光所臨沉魂息苦神輝所燭幽爽停酸然燈之功獲福無量以今齋官某切慮亡過某倐謝日寰竟歸夜府或罹牽執未遂升遷謹用依教祈恩修齋行道焚符破獄按格然燈伏願九獄消簡對之文三途罷謫役之苦靈光所燭黒壤開明恭對燈壇關行法事舉法事弟子某人謹然九幽神燈上照東方無極諸天福堂之内陽光煥赫照徹東方中照震宫之位青帝之野清蕩凶災掃除氛翳下照東方風雷地獄破除幽暗開諸光明一切幽魂乗茲妙利震雷霹靂息難停威克獲生天逍遥自在法衆䖍誠稱揚讃詠衆諷中篇旋遶弟子某人謹然九幽神燈上照南方無極諸天福堂之内陽華洞煥徹照無窮中照離宫午位赤帝之野消平災異掃蕩氛邪下照南方火翳地獄破除幽暗開諸光明一切幽魂乗兹福利吞火食炭克獲清涼普得生天逍遥快樂法衆䖍誠稱揚讃詠衆諷中篇旋遶弟子某人謹然九幽神燈上照西方无極諸天福堂之内眞光洞徹照耀重泉中照兌宫酉位白帝之野消蕩兇惡掃滅邪氛下照西方金剛地獄破除幽暗開諸光明一切幽魂乗兹福利金槌鐡杖化成蓮華溥得生天逍遥快樂法衆䖍誠稱揚讃詠衆諷中篇旋遶弟子某人謹然九幽神燈上照北方无極諸天福堂之内祥光照灼朗徹無邊中照坎宫子位黒帝之野蕩除邪穢洗滌災凶下照北方溟泠地獄破除幽暗開諸光明一切罪魂乗兹福利冰㦸霜刃楚毒頓除普得生天逍遥快樂法衆䖍誠稱揚讃詠衆諷中篇旋遶弟子某謹然九幽神燈上照東北方无極諸天福堂之内靈光洞煥照映虛空中照艮宫寅位丑寅之野掃清災沴摧蕩凶邪下照東北方鑊湯地獄破除幽暗開朗光明一切幽魂乗兹福利鐵义煑漬息苦停酸早獲生天逍遥快樂法衆䖍誠稱揚讃詠衆諷中篇旋遶弟子某謹然九幽神燈上照東南方无極諸天福堂之内光華普照煥耀無涯中照巽宫巳位辰巳之野蠲消邪惡摧滅災凶下照東南方銅柱地獄破除幽暗開朗光明一切罪魂乗兹福利免其焦爛内外清涼獲生天堂逍遥自在法衆䖍誠稱揚讃詠衆諷中篇旋遶弟子某謹然九幽神燈上照西南方无極諸天福堂之内流光洞徹照耀無窮中照坤宫申位未申之野掃除隂沴清蕩凶邪下照西南方屠割地獄破除幽暗開朗光明一切罪魂乗兹福利免經屠割業報蠲除盡得生天逍遥快樂法衆䖍誠稱揚讃詠衆諷中篇旋遶弟子某謹然九幽神燈上照西北方无極諸天福堂之内光華煥徹朗映太虚中照乾宫亥位戌亥之野掃清妖惡蕩滅凶災下照西北方火車地獄破除幽暗開朗光明一切幽魂乗兹福利停輪息燄清淨宿根離苦生天逍遥快樂法衆䖍誠稱揚讃詠衆諷中篇旋遶弟子某謹然九幽神燈上照中天福堂之内光明煥徹輝映萬方中照中宫神州境域災凶殄息妖惡潜消下照中央普掠地獄破除幽暗開朗光明一切幽魂乗兹福利刀山劒樹永斷攀縁離苦生天逍遥快樂法衆䖍誠稱揚讃詠衆諷中篇旋遶向來然燈破獄無限良因伏爲九幽地獄无量罪魂以至十𩔖四生三途五道九州分野苦爽沉靈无量无邊含情抱識有主無主若𡨚若親墮此獄中受諸罪報或先身作釁此世爲愆或三業六情或宿纏徃對當生之日不悟善縁自作自爲違天負地命過之後幽係地司五苦互煎衆惡備受諸罪未盡難獲託生展轉三途輪廻六趣動經億劫出離無由一失人身永垂賢路自非大道遷拔至聖垂慈長夜沉沉何由超脫因今然燈懴謝咸覩光明集此善因奉爲齋宫薦拔亡過某一性昭融萬罪消滅乗兹善果託化更生爲此因縁志心稱念十方救苦天尊不可思議功德髙功望闕謝恩髙功存念行持法於道衆未宣科先宻啓上眞具陳齋悃次執䇿杖用破獄符九道半幅薄紙書之不用誥文毎同中篇眞文一幅共捲法師袖中執杖化身爲救苦天尊歩罡一座出罡向東方地獄燒符文一道存青黄白三色之炁隨灰散布光芒照徹下入地中萬丈下見此方地獄等處不計數目千曹萬局考對之司悉皆望闕領受符命毀鎖開張盡放罪魂隨光來詣道場焚符念本方梵唱呪想成再燒酆都山形一本吹散其灰隨炁以杖撥開獄燈見上極髙天下窮厚地内外洞明地獄空閑九獄皆同都畢法師回身望闕上香謝恩而退破獄符見别品中九清梵唱破獄呪東方九炁青華光曜風雷玉寳慈尊摧戈毀戟扶晨通照䰟昇太微神識受度福享無期南方三炁丹華光徹火㬾萬福慈尊蠲災火池化成青圃甘涼瑩肌苦魂受恩逍遥无爲西方七炁素華照耀金剛太妙慈尊摧鋒滅鋩刀化騫林劒變栢桑魂魄升度與日同光北方五炁蒼華光徹溟泠玉晨慈尊冰雪池温温生寒廓毒汁消清魂獲妙樂飛昇香林東北方梵炁晨華徹照鑊湯度仙上聖威感無方沸湧停息以化甘漿亡魂生形俓昇天堂東南方生炁之華下照東南銅柱破裂火𤔵息閑好生度命普濟無間苦爽解脫昇度玉壇西南方黄華月輝透降坤維除釋鋒鋩屠割摧威虚皇慈尊保度沉黎罪魂澄甦刀劒悉摧西北方天元景色祥華敷光无量慈尊塗毒消亡火車摧轂皆化青蓮焦骨爛肢再生清涼上方玉光金眞流精降暉火坑天牢悉變死灰玉虚玄尊普度无爲魂昇天堂受福巍巍中央三晨玄景洞照普掠眞皇慈尊除落考掠金鎚鐵杖應時消鑠萬苦停酸罪魂快樂破獄罡式九獄燈圖謹遵師傳上稽舊格破獄行用悉著于編關燈之文出廣成先生黄籙齋科其式只如禮燈之法亦不諷經古本上稱九幽燈而巳後世九巵燈則每方諷生神章其文亦少異今用於獄壇仍令齋官禮燈而道衆宣演如法以𦔳髙功行用如禮東方燈髙功則至東方行持破獄所以諷中篇旋遶以應髙功存念也道衆方宣文禮第二方燈旋詠如初九獄皆然庶使髙功神炁安平與祝燈之辭語意相合免致紊亂存想如近世九獄燈文乃關燈之中每方舉偈子一首言辭不能典雅且與破獄事體全不相合所以汨溷髙功之耳又無益於事也若九幽神燈然於道場諸處則關祝之科自從世法但破獄之義本爲普度而設齋修之建雖隨齋主之力凡有三朝啓壇散壇奉行齋法並合隨冝備置斛食廣及三途悉行度化然後請符頒命破獄行持庶其有理今齋詞之中上不祝君主而及寰區下不度九祖而及五道用心窄隘專意於所薦三位亡魂如此則上帝不應爲一人而設特降符章悉開九獄必無此理也地獄未必可盡孤魂未皆可度而我之立意無一毫及物之心豈太上垂科之本意也施食普度不拘多寡隨力輕重以恢善意則破獄故事始可舉行專薦而無一語及衆生者止可然燈宣讀足矣破獄之科不必用也識者以爲然否今之求用於齋主者不敢喘息此說吾當自行之可也上清靈寳大法卷之三十五
