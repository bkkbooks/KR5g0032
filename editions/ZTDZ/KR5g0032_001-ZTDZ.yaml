front:
  text: 上清靈寳大法卷之一獸二
  hash: sha256:8e6f5b5958340f7e31fa1c04f6fc4fea126ef30fb53fc5345a882d8610ddb4cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_001-310356a, image: sjb/31/310356a.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金𠃔中編并論義本法戒律品十戒一曰執心平等不得自欺二曰忠事君師孝敬天地父母三曰慈仁及物貧儉節身四曰清靜端直不得阿黨五曰敬遵上法深信修身六曰敬重鬼神不得輕侮七曰凡所衣食皆是元始祖氣不生外想八曰灰水蕩穢不用修飾九曰口誦心拜母使形勞十曰七日大定神光湛然見玉清聖境十二善不殺不害不嫉不妬不淫不盗不貪不慾不憎不𡜍言無華綺口無惡聲𠃔中嘗謂飾躬謹行之士所當爲何獨志於奉法行科而後方能遷善逺罪耶蓋修仙之道非止於盡世法而巳欲得内貞外潔表裏洞然始可進道法之階梯甚至髙眞上聖尚齋戒累功故戒律者養成德性檢束身心學者所當先務聖人治世之法必始於修身齊家然後可以治國平天下莫不由中而及外也今以本法戒律爲第一品若使行之不修身之失正則居不能令妻子出不能信朋友又其可對越上帝以交神明哉道典戒律散諸經誥中條目繁多不應悉録靈寳本法合隨經入戒也其十二善有一本除去言無華綺口無惡聲外以不殺不害等爲十戒又舊本於其條下悉加註解者蓋此十二事本爲修眞法子而設只據正義而行有何不可固不必詳加訓𥼶或議論稍失本㫖反𦤺迷誤後人故今刪去專存本文爾七事區實品一明元始祖氣從何先化玉字而後發生萬物二明生育混沌陶冶萬物三明靈寳自然生成圖書總括萬象爲三才機紐四明靈寳爲三洞祖教出生一切聖人五明人身體法元始造立混沌聖胎法身六明元始祖氣無形之先作何比擬降質成氣化生萬寳今世作何體狀復採錬此氣爲丹餌之登眞七明得靈寳之道上則白日登晨次則長生度世或得尸解及經中備有萬法𠃔中切詳靈寳雖爲中乗之道實貫通三洞總備萬法端本澄源學者當知其始終道之未形先天先地自然祖氣化肇萬生及其結氣成文凝雲作篆於是圖書焉立教垂科度人接物以法爲用但法出於經而經涵道妙豈獨區區於齋修禁呪之間而巳哉儻能深徹玄機稍窺靈奥要須因法以知經固經而悟道知道中之道則超三界六極之外矣我之一靈本不蒙昧我之一氣自合道眞後世狂妄之徒多爲虚無誕謾之說使人不能測矯僞萬狀惑亂世人自汨其眞自戕其性可不惜哉故今先以戒律開其端次明七事以先知經之體用然後考四譯成書之㫖是法之門户也此何行中編經法之次序云四譯成書品第一玉字生於虚無之先神文隱於混沌之内至赤明開圖元始宣演祕諱係第一譯爲大梵玉字第二道君標叙玉字祕諱天真皇人書其文爲第二譯號諸天八㑹之書第三道君撰次靈寳成經爲第三譯號雲篆光明之章是也内王母下受黄帝龍威丈人授大禹靈寳五符並在經内而於經之本文無所更易故不謂之譯昔黄帝問道於峩嵋親見皇人再蒙指授及太極眞人授道於左仙翁亦非譯經故亦不謂之譯第四漢元封元年七月十五日西王毋以此經下授漢武帝帝不曉大梵之言遂攺天書玉字爲世書號第四譯𠃔中考詳靈寳度人一卷自古經法傳記皆以爲四譯而成書理甚明白不容附㑹臆說也虚無之先無光無象赤明之後玉字方彰此第一譯也天眞皇人書爲正音此第二譯也道君撰次成經此第三譯也王毋下授漢武帝方易以成世書此第四譯也自兹以後經傳人世不復更有増損矣而天台却獨立一家之說見其經緯儀範第十七品増作五譯旣偁妙行眞人集符圖於中盟籙又稱妙行眞人三洞經爲靈寳大法此則妄矣太極眞人徐來勒傳靈寳之道付葛仙翁猶天師傳正一之科三茅二許受洞眞之緒此乃三洞傳教之宗師而非度人經中之第五譯也且譯之爲義謂傳言一也𥼶彼之文爲此之字如譯人辯四方之音亦此義也若度人經降世之後初不㑹有五譯豈敢甘心以從矯僞之論故止據古書編叙經文序例品藏金玉以鎭五嶽投龍璧於海淵鑄九鼎以安九州右三條上爲帝王行道安鎭國祚之例也天地運終星宿錯度日月失昏四時失度隂陽不調如此五條上消天灾之例也除病謂經法以康和也解毒害謂消禳分野刑害之炁也度尸謂九錬之法以遷升也如此三條下禳毒害之例也上升朱宫飛升金闕飛升南宫遊宴玉京遊行太空度上南宫飛升上清逍遥上清度品南宫飛升太空䰟度朱陵遊行三界如此一十三條升度之例也咸得長生全其本年皆得度世却死門户興隆曽祖受度便得神仙延夀長年尸解得爲九宫眞人國祚太平位登仙翁魔王敬形太隂錬形爲聖君金闕之臣萬神朝禮魔王保舉如此一十七條功德應感之例也齎金寳質心告盟十天如此一條傳度之例也𠃔中按舊書以齎金寳効心盟天而傳及依玄科四萬劫一傳又告盟十天而傳分爲三條蓋在經序則言上天所寳不傳下世至士齎金寳効心盟天而傳乃謂受傳合應如此至經中則言依玄科四萬劫一傳若有至人齎金寳質心依舊格告盟十天然後而付焉此正言傳度之格也不應别出今止存一條身則被殃殃及九祖泄慢墮地獄如此三條獲罪之例經内明大道元氣之母生根祕諱玄眞玉女之妙具有禮樂器用之物形名度數兵革五常之道先天以備天眞皇人循體之也中古述作治世之教大道於是乎隱不知其源出於先天也經中大梵隱語六十四句出於大梵開圖之先有數之始呼吸之息契合隂陽息之數見於脉故一呼三寸一吸三寸推而至於丈尺於是積分爲寸累寸爲尺以見於物律曆度量權衡五緯七政八卦九宫二十四氣自茲而生聖人則之故制器之道因財爲尺因指爲寸經内備有萬法隂丹陽丹天文禁戒吉凶像影占徃知來之術濟幽拔顯招眞𦤺靈福國寧家康時阜物鎭禳保度悔謝請祈莫不備焉西靈龜母譯以世書而授漢武帝故經中多從漢制𠃔中切詳靈寳大法總録奧妙備載條科蓋其𩔖例不離於經一事一訣皆隱經内今略出大槩爲法之張本序例後一叚總說經之體用天台只増其言舜作宗師宻告第四十九品彼旣不深詳義理又不廣覽衆編遂敢妄稱宗師宻告不知乃叙事之舜爾又非行用之訣其人見書不博遂自以爲奇祕今止依經以爲序例而巳不敢作宻告以罔人學者旣於此見經之大略然後進歩於經之施用是亦爲學之序爾上清靈寳大法卷之一
