front:
  text: 上清靈寳大法卷之四十一靈五
  hash: sha256:ef1ae6d5d62904cff47b313caaeaa0302fa469aee1df338349cd33c35373df8b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_040-310626b, image: sjb/31/310626b.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童𥘉府右翊治金允中編投龍送簡品下元黄籙簡文靈仙品曰拔度罪根威儀修齋都畢依赤書玉訣以丹書玉札金龍一枚金紐九隻青絲纏之以關靈仙五嶽升度之信封於絶巖之中又曰關五帝威儀畢當以丹書玉札金龍一枚金紐九隻青絲纏石投之三江以關水帝升度之信一依玉訣眞文又曰關水帝威儀畢即以丹書玉札金龍一枚金紐九隻青絲纏之埋於壇所以告盟地官一如科文王匱明眞科云修靈寳黄籙當以上金三兩鑄三龍龍各一兩國家用上金公侯大臣用次金士庶以銀塗金副以簡文題修齋所爲及太歳年月日法師姓名投奠方所名山大洞靈泉龍宂及齋壇中以告盟天地水府使鑒證齋功闕者考屬地官九都曹科曰龍者乗雲炁御隂陽合則成體散則成章變化不測入地升天故三十六天極陽之境可以驛傳信命通達玄靈者其由龍乎龍者陽畜故天用龍是以天上以龍爲驛騎往來人間矣金者五金之最堅剛不渝天地所寳通靈合神故以上金鑄之取法龍形投之洞府告盟二元也洞府眞官所司僚屬傳告龍信簡文録其善功以奏言於上聖感應之報猶影之隨形修齋之士不可闕也簡者告也札者紀也紀世之善告於上眞法長一尺二寸象十二辰廣二寸四分法二十四炁厚二分法二儀上下方正法日之方景正直通達無所避讓國家以玉爲之玉有九德可以爲禮天神地祇之信故用玉焉公侯臣庶通用槿木以其潔白纎緻可以比玉矣明尊卑之殊也璧者禮天地山川之寳也以玉爲之投山簡用蒼璧圓形徑二寸虚其中山簡爲九天之信故用蒼璧以法天地也投水簡用六出之璧其色黒徑三寸虚其中水簡爲九江水官之信故用玄璧水之色也六出水之數也投土簡用黄璧正方徑二寸虚其中土簡爲九地之信黄者土之色也方者地之形也璧與龍副於簡封之外以青絲纏之科曰投三簡之法當用金紐九𨾏以副於簡三簡用二十七紐也金紐代㰱血青絲代割髪通盟逹誠最爲重也故以青絲纏紐璧以附於簡及龍而後投之也紐國家用金臣用銀塗以金徑九分圓其外如環之形也科曰修齋畢别卜良日或齋潔之辰備醮饌法師衆官及齋主某或泛舟以詣水洞或梯陸以登山間於洞府之外薙草掃灑潔淨敷列醮席酒果饌殽當鹿脯湯茶等國家六十分臣庶二十四分一如醮儀乃盛服澡漱朝謁法事備遵科式所在地司靈官監察將吏當爲關啓洞中仙曹通達告齋之簡如此則福善立應却不得都無關啓直爾投於洞中不達眞靈反獲罪考矣若山水之洞稍逺師衆不可俱行難於澄泛者當選壇内法軄一二人與弟子齎簡以詩洞所設醮關告扶奠一如本儀若國家投龍五嶽諸山具有金籙科式與此常禮繁簡不同不得藏匿簡文因循持乆所在地司録奏獲罪不細切冝謹之簡三片槿木爲之長一尺二寸闊二寸四分厚二分金龍三放毎龍用銀一兩塗之以金璧三片玉爲之蒼璧圓形黒璧六出形黄璧方形各虚其中徑三寸金細二十七𨾏銀爲之塗以金徑九分如環形虚其中山簡告文併年月日作五行具位臣某今謹有某州縣某上爲家國下及存亡或入意亦可於某處修建黄籙大齋五晝夜行道事訖投簡靈山願仙長生度世飛行上清五嶽眞人至神至靈乞削罪籍上名九天請詣靈山金龍驛傳太歳年月朔日具住臣姓某於某處告文山簡符水簡告文并年月日共五行具位臣某今謹有某州某縣某人上爲家國下及存亡請福祈恩首愆謝過於某處修建黄籙大齋五晝夜行道事訖投簡水府願神願仙九江水帝十二河源江河淮濟溟泠大神乞削罪籍上名九天請詣水府金龍驛傳太歲年月朔日具位臣姓某於某處告文水簡符土簡告文并年月日共五行具位臣某今謹有某州某縣某人上爲家國普及存亡入意添亦可於某處奉修黄籙大齋五晝夜行道事訖投簡靈壇中黄九地戊己黄神土府五帝乞削罪名請詣中宫勒簡太玄金紐白信金龍驛傳太歳年月朔日具位臣姓某於某處告文土簡符投簡醮位某洞府神仙列位三十六部尊經都講太上無極大道酒果香燭齋主拜位玄中大法師髙功日直切曹土地等洞門外選平地掃灑潔淨以醮位或潭澤就岸上平處或舟上以淨席數領鋪地縫布爲座席須新者五果茶酒等二十四分或三十六分香燭獻之並如醮法陳列皆畢命道士一員敕水淨醮髙功行科請聖不恭其事考罰尤深投山簡醮儀敕壇上香啓堂頌各禮師存念如法思存如齋法宣五方呪五星列照煥明五方水星却災木德致昌熒惑消禍太白辟兵鎭星四㨿家國利享名刋玉簡字録帝房乗飈散景飛騰太空出入冥無遊宴十方五雲浮蓋招神攝風役使萬靈上衛仙翁和與道合眞鳴法鼓二十四通無上三天玄元始三炁太上道君太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散華玉女五帝直符直日香官合三十六人出出者嚴裝顯服冠帯垂纓關啓此間土地山川正神臣今正爾燒香奉爲投簡意其諸誠欵具載簡文願得太上十方至眞道炁靈寳瑞光下降流入臣身中令臣所啓速逹俓御太上無極大道崑崙上宫五嶽靈山洞府神前請稱法位具位臣某與合壇官衆等謹同誠上啓无極大道元始天尊太上道君太上老君三十六部尊經玄中大法師天曹主宰洞府眞仙崑崙上宫名山福地五嶽眞君青城丈人廬山使者北部幽隂冥靈神衆某處靈山主録仙聖虚空鑒察靈司三界官屬一切威靈臣等伏聞寳訣靈圖出濟世康時之典赤書玉字示安天鎭地之文籠萬法以爲宗統三元而紀善況於靈壇告罷齋福巳成冀勒善以消愆敢祈眞而降聖伏願靈光下燭仙仗遥臨臣等俯伏投誠謹伸奏請請聖太上三尊五師五帝日月星辰某處洞府仙眞當境正神香官日直功曹土地等先列牌位依次請上初獻茶酒具位臣某重誠上啓无極大道太上三尊至眞諸君丈人三十六部尊經玄中大法師九極髙眞日月星宿崑崙上宫名山洞府得道仙眞五嶽眞君潜霍眞君青城丈人廬山使者鍾山欎結西玄墉臺三官北部六洞幽司天下地上冥靈衆神監生注籍南上三門至神至靈一切神仙臣胎誕塵濁瞽闇無知萬劫善縁依承道化奉宣慈訓佐國立功濟物度人弘道賛法自投簡修仙則可去下一叚以今齋主上爲家國普及存亡於某日就某處修建黄籙大齋五晝夜行道事竟投簡靈山乞削罪録願神願仙仰扣神眞用伸關吿臣與齋主無任祈恩激切之至謹稽首再拜亞獻具位臣某謹重誠上啓三境天尊十方上聖三官九府五帝靈司洞府眞仙名山聖衆醮筵列位一切威靈臣等恭詣靈山奉修醮禮爲黄籙齋主某人修建事畢投簡關盟所冀勒善書勲除愆宥過解釋齋主九玄七祖六族種親先亡後化拔贖惡根免脫酆都岱宗二十四獄五嶽之府九幽之中魂覩光明永蒙開度更生受化逍遥福門安穩墳墓注訟不興舉家蒙福一切荷恩妖精殄滅善瑞日生修道叅眞永諧仙品臣與齋主無任依歸之至再拜終獻宣簡吿文封簡以玉文金龍金紐青絲纏於簡上仍入匣内香熏叩齒九通念玄上開明元始監眞呪以簡投洞中投龍領祈眞登紫嶽吿命詣靈山玉女摇梵響金童奏香煙書名通九地列字上三天永享無期壽克成髙上仙再入科臣謹重誠上啓髙眞上聖山嶽神仙五帝尊神三界主宰醮筵列位一切威靈臣等告簡禮終投龍事畢仰蒙成就曲荷鑒觀髙眞巳返於上玄列聖各還於仙府功曹將吏悉復靈司土地衆神咸安所部功書三界澤被十方臣與齋主無任依歸之至稽首拜送舉送神頌復爐香官使者左右龍虎君侍香諸靈官當令臣向來建壇行事之所自然生金液丹碧芝英百靈衆眞交會在此香火爐前當願十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹俓御太上无極大道崑崙上宫五嶽靈山洞府神前學仙頌焚燎向來回向投水簡醮式排列醮位法事如山簡式无上三天玄元始三炁至當召此間江海潭澤正神土地眞官速出關啓臣今正爾燒香奉爲宣簡意至俓御太上无極大道晹谷神王水府水帝神前各稱法位具位臣某合壇官衆等謹同誠上啓无極大道太上三尊十方巳得道大聖衆至眞諸君文人三十六部尊經玄中大法師日月星宿北斗七元日窟常晹洞隂神仙扶桑大帝暘谷神王三河四海九江淮澤九府水帝十二河源溟泠大神靈湫泉澤下元水界一切威靈臣等伏聞泛地浮天浩浩之源莫測聚流積勢沉沉之際難窮隱神龍於洞府之淵司罪福於幽明之境況以仰依玄典幸終黄籙之齋修紀録善功恭按赤書之品格敬趣潭澤或云江海敷啓靈眞伏願仙斾臨軒雲輿按轡鑒瞻壇席省録醮修臣與齋主無任祈恩望聖之至謹當拜請降聖初獻茶酒重稱法位具位臣某與合壇官衆等謹重誠上啓无極大道太上髙尊日月星眞十方上聖水宫主宰江海神祇冥靈大神河源聖衆醮筵列位一切威靈臣等誕身下土禀軄凡微宿以道因遭逢聖運靈寳垂化大法度人佐國立功奉弘慈訓以今齋主某上爲家國普及存亡祇按仙科奉修黄籙九時行道五日修齋解席散壇功成事畢謹齎龍簡恭詣靈泉願神願仙消愆消罪仰扣靈眞以伸關告謹陳亞獻用寓丹𠂻臣與齋主無任祈恩激切之至稽首再拜亞獻臣謹重誠上啓三境髙尊十方上聖河源主宰江海眞靈暘谷扶桑水宫仙衆醮筵列位威靈臣等恭詣靈泉奉修醮禮爲黄籙齋主某修齋事竟投簡關盟所冀紀善録功除愆宥過爲齋主某解釋𡨚仇増延壽禄脫落死籍注上生名蠲除愆過賜以自新九玄七祖解拔苦根出離暘谷幽夜寒郷沐浴錬度超升天堂塜墓安吉殃注不興舉家受福神炁清寧學識聦朗志慧圓明闡揚正法消伏姦兇三界證度功滿行充帝王安鎭國祚興隆謹以啓聞乞如所陳臣與齋主無任禱祈之至謹稽首再拜終獻宣簡告文封簡以龍璧紐絲纏袋入匣香熏叩齒九通念元始上眞呪以簡投水中投龍頌天尊留戒律太上演眞經奉法須勤志功德貴精神䖍心啓三寳焚香告百靈書名投水府功勲逹上清再入科具位臣某謹重誠上啓髙眞上聖江海神仙水國軄司下界主宰醮筵列位一切威靈臣等告簡禮終投龍事畢仰蒙成就曲荷監觀上境髙眞巳還天闕水宫仙聖各返靈司將吏功曹悉歸所治土地主者咸就元班三界紀勲萬方被澤臣與齋主無任依歸之至稽首拜送送神復爐學仙頌焚燎回向投土簡醮儀土簡埋之壇前地中若能預辦則先於地户中開坎深三尺候言功拜表後宣告三簡畢先以土簡入袋封之青絲纏附金龍金紐即埋之則不必再醮告矣或散壇之夜辦不及則别行關盟可也然醮不可闕故併録出備用醮位排列節次並同山水簡用式無上三天至當召此間土地里域社稷等神至俓御太上无極大道九土皇靈地府大帝神前各稱法位具位臣某與合壇官衆等謹同誠上啓元極大道太上三尊十方巳得道大聖衆至眞諸君文人五老上帝三十六部尊經玄中大法師日月星眞天曹主宰酆都大帝九府三宫泉曲主司无極世界九土皇靈中皇戊已黄神土府五帝三界官屬土地里域眞官一切威靈臣等伏聞九地九郷淵深難極六天隂境博厚無垠上列五嶽之神眞下有萬靈之冶軄以至洞天福地仙域名山開校量罪福之司分主録生靈之府況以奉修齋直理合關盟恭就靈壇上干沖鑒伏願天輝下映神馭遐臨勒此齋功録兹丹禱臣與齋主無任祈恩望聖激切之至稽首再拜謹當奉請請聖初獻茶酒重稱法位具位臣某與合壇官衆等謹重誠上啓無極大道太上髙尊日月星眞十方上聖上司主宰地府冥官九上髙皇神仙治軄醮筵列位一切威靈臣等禀炁凡愚叨因宿運得遇真法與善因縁值靈寳開光赤書宣化許以庸穢恭奉正眞佐國爲時六功行教今爲黄籙齋主某修建黄籙大齋上資邦國普濟存亡請福祈恩消殃謝罪齋終五日禮畢九朝解席散壇功成事訖謹齎龍簡恭就靈壇輙露精𠂻仰祈靈鑒敢陳亞獻以薦克誠臣與齋主無任祈恩激切之至稽首再拜亞獻具位臣某謹重誠上啓三境髙眞十方上聖地司主宰九土髙皇醮筵列位一切眞靈臣等恭就靈壇奉修醮禮爲黄籙齋主某修齋事畢投簡告盟伏願紀善録功除愆宥過爲齋主解消災咎蠲免𡨚讎乞削地簡除其罪書願度願生保濟形身九老仙都玉曆記名九祖父母胞元種親先亡後逝咸享福縁出離九幽之下八門之郷殃注消釋塜宅清寧惡根斷絶上生福堂臣等學業圓就功行盛明生死同福永保無傾帝王受福天下和平乞如所願謹以告盟臣與齋主無任惶惧之至稽首再拜終獻宣簡告文封簡以龍璧紐絲纏於簡袋入匣香熏叩齒九通念天地開張呪以簡投土埋之壇中取月建上開坎埋簡投龍頌齋功巳成就符命告靈壇玉璧書誠悃金龍信驛傳䖍心仰中府歸命拱黄圓生死皆快樂會當禮天顔再入科具位臣某謹重誠上啓髙眞上聖九地神仙土府軄司山嶽主宰醮筵列位一切威靈臣等告簡禮終投龍事畢仰蒙成就曲荷鑒觀萬眞巳舉於瑶空衆聖各還於中界將吏復位里域回班恩被有情澤覃無外臣與齋主無任依戀懷恩之至謹當奉送送神頌復爐學仙頌焚燎回向右投三簡之法本爲佩受中盟及學士求仙削罪投簡以告三元也如受籙自用之則三簡之科除去奉爲齋主某修建黄籙等一叚却續云臣某年月謹詣三洞法師某受靈寳五老眞文赤書靈篇三部八景諎天内音神仙二籙八威䇿文五帝符杖中盟衆經傳受事畢投簡靈山水簡云投龍清泉土簡云投簡中宫金龍驛傳乞削罪籍餘並同科修道之士三元八節謝罪祈眞投五老赤書簡文出眞文玉訣亦於簡上具位及某年月日時生命属某帝名係某嶽願神願仙長生度世飛行上清五嶽眞人至神至靈乞削罪籍上名九天請詣靈山金龍驛傳太歳年月朔日於某處告文外土簡水簡一如黄籙簡文只於前具位及生命其封題龍璧紐絲並如前法於其所醮告投之第一次投簡則毎簡用金紐九第二次第三次投只用龍簡而無紐道士投簡之詳依經編出巳見玉文眞篆品此不再叙廣成先生科中叙黄籙齋主土簡言功之後宣讀巳訖至明旦便可埋於壇中不俟别更關告今以張承先法師儀内三簡啓奏眞位不同故再録於此三簡科文在前若修齋壇内只以言功醮時呪告文便投可也此乃宣讀之後即時埋也其山水二簡雖言功之時宣讀已畢若至洞所設醮當依此次第再讀封呪然後投之庶爲周備不可以壇中告了至山洞處直爾便投所在眞靈恐不關領善功不逹所失六多又曰欲度諸天民善男善女咸得離三惡五道八難之中得過三惡世世與道相值當八節甲子之日投三玉簡除宿罪之簿言功上天事事三過諸天三官九府更相關告上天右别萬神敬護五帝侍衞三界司迎門户清肅天地神祇日月來朝千魔萬精不敢妄干至願堅固觸向咸成七祖父母即得解脫三塗五苦升上天堂生死福善影響相酬三官九府書人功過其理甚明世世因縁毫分無遺若有至士爲國主帝王土地官長一切人民九祖父母長夜三塗修黄籙大齋三日三夜告盟九天投簡三元福利廣大不可勝言諦聽奉行勿爲懈怠魔壤爾身道士張承先曰登壇受靈寳中盟訖依自然經科投金紐十口投龍清泉爲求仙之道重登壇受五老赤書二籙䇿杖恩微定志等依盟眞科文即投三龍二十七紐以山水宅三處爲求仙之信然後依玉訣别以九龍二十七紐以八節日投山水宅求除黒簿言名上天又黄籙齋竟亦投龍簡只依三元簡文故撰此三處關告文各指告其仙司必蒙削罪記名九玄即拔家門荷榮又曰大道以一炁化生三才陶钧萬有故分三元之曹以主張罪福即天地水三官實司於三元也人之生死壽夭罪福善惡吉凶莫不係焉三籙文亦三元之典功也修齋之法當投三簡以告三元故山一投諸天洞府奏天官上元也水簡投靈白水府告水官下元也土簡投於壇宅告地官中元也詳簡文之中眞靈位號事顯理明矣切以元始安鎭敷落五篇故五老上帝受赤書眞文安天之根鎭地之源下鎭五嶽以奠五方斯實靈寳之根宗度人之極紐上學之士希道求仙傳中盟之經佩靈寳之籙皆以赤書眞文朱篆於槿木之簡面書告文投之山川及住宅關盟三界削落罪根及於五嶽投簡送龍滅過消愆乃其本㫖也事見眞文玉訣諸經中若修齋建黄籙壇解壇事訖則告山土水三簡金龍金紐玉璧附所以紀勒齋功關告三元也其法實本諸赤書而用之自唐張承先法師編叙齋科巳詳言之矣至廣成先生編集黄籙齋科則備述赤書之本末投簡之典格可謂昭然明白無可疑者近世多於三簡之後各篆一符且各人所傳法書不同符形亦異豈知投簡之本意捨赤書其可行之故山簡呪曰玄上開明元始監眞上帝五老赤書丹文天地本始緫領三元水簡呪曰元始五老上帝髙尊十方至眞太華靈仙赤文告命無幽不關土簡呪曰天地開張九炁分靈三元洞府十方朗清五老上帝開眞領生丹書赤文元始上清三呪之首皆明指五老亦書也今投簡而易以他符則與本㫖異矣況呪文全不相合故今一依經㫖告文則從古式簡後眞文並用五老赤書以義取文用爲投簡之信此乃出於正經而非後世私師經籍之比倘法書各有師傳而凡格決不可易投簡正渉三官之府罪福甚重尤當謹審所有投簡關啓科書悉本廣成先生齋科但其書流布日乆傳寫之間多行減節故於首尾略具節目只存啓祝之辭而巳其本法一如醮儀似此寫未成科使髙功隨口致白増益首尾則臨事必是謬誤今未免詳録次序及宣呪發爐上啓降神三獻復爐並從醮禮可以俓行寫作科書易於宣讀不致失禮而巳其言辭則並遵廣成先生之文也上清靈寳大法卷之四十一
