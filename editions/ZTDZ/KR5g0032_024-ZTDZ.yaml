front:
  text: 上清靈寳大法卷之二十五彩七
  hash: sha256:3d5501f1149f852387c453709ecb7710690774195c5de6fb9ce11903f1a4ec6e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_024-310499c, image: sjb/31/310499c.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童𥘉府右翊治金𠃔中編上章科格品三洞垂科五文開煥自古以肇其機惟洞眞之道降流雖乆戰國之末三茅眞君始開祥於句曲遂立宗壇其後如許長史許逺遊楊司命郭眞人諸君相繼不絶無非精練上道修誦洞經教出玉清繁文不立洞眞科格本無章奏之規至東漢正一天師應運挺生科條荐布於是齋修之典章表儀之燦然昭煥斯爲洞神之道正一之宗東呉左仙翁玄受靈寳洞玄科品於是傳上章謁帝之科元綱飛歩之訣至晉許旌陽行孝道明王之教遂有驅妖馘毒之法濟世立功之文悉皆洞玄之道靈寳之宗自古至今不可誣也夫靈寳拜章之法乃洞玄禁祕之文自太極仙翁内行飛神謁帝之妙外傳上玄境域之祥可以修眞而煉形豈止謄章而啓事傳之非類殃考一身不奏妄傳禍鍾九祖若章中官將即隂陽神決吏剛風騎置吏驛馬上章吏飛龍騎吏等官須與正一章同用蓋剛風騎置之司無兩途也校章定章諸從事等職以學者先佩都功諸籙故行兼用除去亦可至於功曹玉女印篆法階屏炁存神躡罡飛步朝元肇事㑹道通眞則專本洞玄之品靈寳本科上不僭用玉清大洞之儀下不雜行正一洞神之訣道有本源如精金美玉苟有一毫駁雜無非僞物惟精惟一始可感通仙翁修之而得道成眞司馬承禎獲聞其祕嘗隱於少室山中以此洞玄章法流傳於世遇之者切須保祕儻非盟天告地臨壇付授謹勿輕用非此宗𣲖尤不冝行用也寧可指以爲非棄而弗取乃至漏慢爾平居閑暇之時先當習定夫定者非釋氏所謂寂滅頑空之義也惟儒家顔子心齋坐忘之道則近之矣内念不出外想不入湛然靜空綿綿若存靜中有動法術生焉擁三炁而内𠑽聚一神而中峙立此妙本身世雨忘漸覺此神輕浮冉冉離世乗虚馭炁飄飄而上依法飛歩其訣巳散在法中學者當自得之始於人之共知而終也非人所可知不用術數而功自隆不待吹嘘而形自煉不出神而神自出不俟修眞而眞自成施之章奏剪除妖妄殄滅精邪超度存亡禳郤災難萬道歸一簡而不繁實靈寳之樞機眞仙之徑路也上章沐浴凡遇拜章先淨外穢沐浴更衣用香湯先沐後浴即易新衣入靜室夫身不㓗則神不居則法不靈法不靈則難格天矣煎湯方桃皮半斤茒香半斤藿香半兩香白芷半兩苓陵香半兩右爲麤末同煎服符以淨内穢呪曰天地運用日月之精光徹四海能斷邪精斬妖去病身有光明神水漑作萬禍滅形急急如律令誦呪書符燒灰淨水調服仍以一道安章格案下勿令人見常服符篆凡拜章之士尋常當持誦靈文飡服符篆感㑹靈炁濯煉身神庶可臨事有應常服之符具存法中欲於此䟽出恐見者忽畧忘義故不立爲定格但能以平時行用有驗之符逐時自服足矣服章告心神法凡臨壇拜章於三日之前先畧具章中事意用十分輕薄𥿄二寸半細書却入靜存神以章吞服此拜章之作用也若靈寳有心章之格乃告急宻切之條與此大畧近世有聞其名而得其傳者乃曰心章長三寸三分即是告心神章也邇來多以此爲心章製度告天差謬甚矣所服章格巳臨壇盟受此不再叙上章燒符香爐中此常用符也又名都匠符古儀於拜章臨伏時燒之御案香爐中不可以其名稱常熟而忽之章前後空𥿄正一章用一十二小印自再拜至太𡻕後皆印之有一家印有弦如印式有一家小印不用弦只如符用之故正一章太玄都前不空行洞玄之科則章前後各空𥿄悉依式書符不用一十二小印於年月上只用通章印而巳世人但見神霄籙内載通章印遂遽稱此印玉清屬洞眞部殊不知神霄之教未興而洞玄章法自五代以前並用此印而通章印文乃靈寳升天大劵但去其下文耳生人用之以爲升章入天廷之質證而巳夫印者誌也信也正此義也洞玄章法用通章印則是靈寳本科或者見此等行用以一符一印稍渉他書便稱玉清靈寳非也升天大劵自古及今昭然屬洞玄部給付亡人則以九玄使者字下有召魂升等字生人用以爲印則去下文豈應便以爲屬洞眞部神霄籙中自編入備用耳其籙與法亦未嘗力指謂此印不係洞玄靈寳之品目蓋神霄當時以爲天壇萬法俱緫是以靈寳有一二符編入籙中未可以此便易古之綱目也靈寳拜章儀髙功立靖服符存念本科排酒果三十六分列兩廡備威儀詣靖引髙功詣師幕啓事竟升外壇至地户念入户呪升天門上十方香御案上香焚香符上本位香髙功移科案居壇右靣西北次存四靈衛巳日月照形去靣各九寸北斗蓋頭魒向前禮師如齋法存三將軍自天門降上元左腎黒炁中元右腎黒炁下元心赤炁存朱衣吏兵翊衛壇所都講舉各禮師存念如法髙功宣呪呪曰大始元眞五老髙尊太常皓映無幽不均上御九天中制鄷山下鎭江海十二河源八威神呪靈𠕋五篇召龍浮水收炁聚雲萬精摧落所誅無蠲日月五星此斗七元諸天諸地諸水諸山天王遊宴五帝仗旛天丁前驅金虎後奔钁天猛獸羅閉四門所呼立至所召趍前赤書豁落風火無閑有所攝言金龍驛傳都講舉鳴法鼓二十四通無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人岀岀者嚴裝關啓此間土地里域社稷正神臣今正爾燒香奉爲入意其諸情悃具載章文願得太上十方正眞生炁下降流入臣身中令臣所啓速逹俓御至眞無極大道昊天玉皇上帝御前各稱法位具法位臣某與合壇官衆等謹同誠上啓無極大道上帝髙眞日曺太陽帝君月府太隂皇君北斗七元星君天地水三元帝君北極四聖元帥眞君五方五徳星君四方二十八宿星君玄中大法師正一靜應眞君靈寳經籍度三師眞君太極左仙翁冲應眞君九州都仙太史髙明大使神功妙濟眞君古今傳教眞師三洞宗壇上聖靈寳經籙中神仙洞玄科法中聖衆十方飛天神王三元唐葛周三眞君監齋直事靈寳官屬章中千乗萬騎一切眞靈臣聞上帝髙眞玄極至尊之主玉京金闕紫清無上之天仰之而杳邈難窮瞻之而穹窿無際勢豈容於言接形非可以階升自惟髙下之殊途亦且聖凡之異轍然而科列關謄之職教宏飛謁之規雖天人交通於肹蠁之間實師資接引於思存之頃蓋出其神得以朝帝而㓗其躬許容格天騰翥須㬰感通倐歘將列封章而上逹先期眞馭以下臨召出身神恭迎天吏願堅𥘉誓曲軫玄慈稽首投誠謹當上請請章官位上香獻茶𥘉獻法事重稱法位具位臣某謹同誠上收無極大道上帝髙眞日月星斗上聖三官四聖五師眞君三洞經籙神仙三元將軍章中官吏咸望眞慈俯曰洞鑒臣聞洞玄啓運大宏章奏之儀靈寳重科廣示齋修之格眞風普浹玄化誕敷由眞師開曲濟之門乃上聖闡無窮之惠萬方仰頼千古攸遵豈地界晚學可以賛揚實上境聖師俯加接引尚祈憫濟終賜提携臣所據某人勵志精勤投詞激切乞貢章文而上逹欲祈穹極之垂慈然臣俗網凡夫地行賤質昌當職位叨任關宣未能恩氣以輕身豈遂飛雲而謁帝惟遵定格徒按成規非仗師恩難聞天聽恭望玉京教主金闕師尊降日時功曹勑章奏官吏赴壇傳悃依式升章庶顯教科俾昭報應敢伸菲薦用罄愚𠂻稽顙致恭謹陳亞獻上香法事臣謹重誠上啓無極大道上聖師尊三元唐葛周三眞君三天門下上章詞表靈官引進眞官上官典者法中飛章從事促炁功曹驛亭令丞四部監功謁者察姦執正諸君吏齎章進章諸從事三五功曹左右官使者五帝直符日時主者直日香官太𡻕官君十干當直將吏山川溪谷海嶽洞天靈官將吏章中千乗萬騎一切眞靈伏以蒼蒼上極非人可親翼翼小心惟神能格欲竭存思之妙全慿傳奏之靈以今某遵奉科儀投詞啓事貢謄章牘願徹髙尊若非天吏以通傳安得塵詞而洞逹恭陳薄薦延降神驂鑒此微𠂻鍚諸靈貺𦔳人神之存想指雲路以衝升引進眞官導迎前後上官典者評省通呈俾茲懇切之忱即遂昭通之應敢終三酌以畢醮儀讀錢馬狀謹白五體眞官八景神吏金堂玉室一切尊神伏以首列九宫宗奉泥丸之上帝中理五炁混合身内之百神欲造眞機冝通妙用又况傳經授籙裂劵分環凡有請祈法當利濟今陳章牘上逹丹閽出一身正炁之神奏三境髙眞之御從凡入聖自地升天先度罡風荐浮空界歷角亢而治氣旋箕斗以護形謁兩曜之神宫度五常之星府欲界色界無色種民上通金闕之髙朝奏玉京之聖啓陳事竟還復身中謹按科條關出將吏長跪岀官謹出臣身中五體眞官功曹上三天執法開化隂陽功曹消災散禍解厄君吏各一十二人出治中建節監功大將軍前部効功後部効殺驛亭令驛亭丞四部監功謁者法中飛章從事促炁功曹三五功曹左右官使者五帝直符玉童玉女隂陽神决吏岀出者嚴裝顯服冠帶垂纓整其威儀功曹弁朱陽之幘冠通天之冠衣皂紈單衣腰帶龍頭之劍捧持謁簿使者弁玄隂之幘冠九徳之冠衣絳章單衣腰帶虎符齎執玉版直使功曹住立四方三五功曹住立中央治病功曹營衛臣身左官使者建節在前右官使者持幢在後陽神决吏立左隂神决吏立右上部功曹住立上方中部功曹住立身中促炁功曹催促十方上部使者逺望上天中部使者逺瞻八方都官使者匝繞臣身天騶甲卒狼吏虎賁察姦勾騎都官僕射天丁力士治正執正吏收神食神吏収鬼食鬼吏收炁食炁吏收毒食毒吏收精食精吏誅符破廟吏罡風騎置吏驛馬上章吏飛龍騎吏等官並皆屯駐臣左右前後咸受臣所宣詞語分别關啓此間土地里域正神監察考召左右都平君二十八治三十六靖廬七十二福地三百六十名山崑崙上宫洞天海嶽道上二玄三元四始二十四炁十二時神皇天后土今年太𡻕某太隂六十甲子諸官君風炁注炁里邑社四面八方東九夷胡老君南八蠻越老君西六戎氐老君北五狄𦍑老君中央三秦倉老君玄元正炁二萬六千神仙川源溪谷山林孟長十二溪眞根源本始本地之主社稷靈官將吏謹同誠上啓太上無形無名虚無自然至眞大道太上道君上清玉陛下臣幸以宿縁叨奉教法告盟之日約以流通誓願敷賛眞風振揚道妙永扶國祚普濟生靈凡有投誠理冝關奏今謹有某投詞入意齎持法信求拜章書臣謹爲伏地拜奏章文今在素案之上伏願上官典者垂神省理以時上逹請省章文捧章露於御案龍頭書刀鎭左硃筆魚鴈鎭右宣章副本按舊儀先遣章後乃封章但未封先遣官則封後不復啓祝頗爲未順今以封章在前遣官在後儻欲自從舊儀隨便道衆捧章文及章函面印絨線糊黏等就髙功案髙功捧章函宻念開函呪函不先開以章安函外舊用蠟塡印池上用蠟印而蠟實不㓗今止用絨線繫畢以糊黏印在池上用印之紙亦不用蠟傳言書佐開函小吏手執書刀開發函軌章文上御開通道理所奏速逹臣獲終始次以章於香上度過宻念熏章呪五色之煙衝章上天五色之炁衝章逹帝下官故炁不得妄干封章法師自入函章表道士授線以糊黏印池髙功安貼𥿄印次宻祝勑章呪臣筆靈靈勑此上清仙童玉女開發龍函令臣關奏速逹天庭急急如律令又宻呪遣章威儀及時關奏祕印心傳靈章宻授朱煙起夜雲路通晝仰望玄恩濳垂福祐髙功封章畢捧于簡上長跪遣官謹遣臣身中五體眞官官一小吏十二書佐三五功曹左右官使者促炁功曹飛章從事五帝直符飛龍騎吏等官嚴裝顯服冠帶垂纓佩劍持籙爲臣及時操持章文俓上詣三天合屬曹治隨章進對臣幸以夙因謬膺玄職不逹正眞未明炁候資品凡陋識見愚庸所進章文或違科禁文字不整詞旨差訛脫落乖違語言䙝瀆請章中從事書佐小吏以時削治俾遂進呈無令上官典者有所譴却臣屏息隨章俓上太上無形無名虛無自然至眞大道太上道君上清玉陛下謹勿稽停左右歷關吏章中諸靈官以次分别當令所請者下所召者到所治者愈所濟者度所誅者滅所遷者逹若有下官故炁於空界之中邀截臣章文使不上逹者即請録付合屬天獄依律治罪以明天憲所有章牘必使上聞臣俯伏御右恭俟天恩乞垂報應髙功以章授道衆置章几上知磬舉法事監齋隨章引至焚燎所焚章用烈火焚之宣官將關壇中舉焚章詞頌髙功送章出隨即拜伏存思行用如式壇四角安香爐四方燒符髙功伏章起稱以聞焚章頌畢宣科臣謹重誠上啓無極大道太上眞師玄中大法師三天大法師正一靖應眞君靈寳經籍度三師眞君此極四聖元帥眞君太極左仙翁冲應眞君九州都仙太史髙明大使神功妙濟眞君三洞宗壇上聖萬古傳教宗師十方巳得道神仙三元唐葛周三眞君三天門下上章詞表靈官引進眞官章中功曹玉女從事直符虚空雲路翊衛仙僚五體眞官身中萬神臣聞存眞念道冀通㭝炁之髙拜表謄章未徹教中之妙徒按彞章而就事深知凡骨以非仙輙藉恩𥝠以二十四神而飛章紫極仰依覆育由三十五分而緫炁上玄但以想念不精薦陳爽禮仰攀霞仗幸沐俯臨恭戀雲輿誠難後從願曲原其狂僭冀終鍚以生成所請所祈能通能應懷恩實切俛首知歸引領天衢再拜奉送送聖頌高功長跪納官臣奏章事竟所出身中五體眞官功曹使者各從衆妙之門而入在左還左在右還右彌綸天地直使功曹主領檢押各歸本位安穩金堂玉室母令差互後召復到一如故事十二願復爐香官使者左右龍虎君侍香諸靈官當令臣拜章之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令臣學道得道求仙得仙齋官受福天下蒙恩亡靈受度幽爽升遷十方仙童玉女侍衛香烟傳臣所奏所啓之言速逹俓詣至眞無極大道昊天玉皇上帝御前出户下壇師幕稱謝退入靖室章官醮位上元道化唐眞君中元定志葛眞君下元護正周眞君三天門下上章詞表靈官三天門下引進仙官上官典者治中建節監功大將軍治中炁中官將呈章通章從事録章校章從事定章剌章從事印章禦章從事齎章從事章中官將法中飛章從事促炁功曹三五功曹左右官使者五帝直符玉童玉女香官驛吏四部監功謁者驛亭令丞察姦執正諸官君收邪食炁諸君官將隂陽神决吏科車赤符吏罡風騎置吏驛馬上章吏傳言玉女書佐官吏三元四始二十四炁神君天門引進神吏守衛官君六十甲子諸官君今年某太𡻕尊皇君十干當直功曹將吏童子十二時直主者三界四直功曹傳奏直符監察考召諸司官將洞天福地靖廬治化靈官將吏山林孟長山川溪谷靈官將吏九州分野社稷正神當境城隍社令根源本始神司等神當境土地里域正神章中千乗萬騎一切眞靈𠃔中師授章法乃洞玄靈寳之道兼章出於古科有如正一之宗世所常行與靈寳之品其官將吏兵大同而小異至於飛神謁帝存想施爲則靈寳與正一全不相𩔖非對天盟授不容顯宣如玉清之品洞眞之部不出章奏之格古今之所共知近世天台法中却謂心章之𩔖玉清合用通章印此其見神霄籙内載通章印遂創此說不知印文乃靈寳昇天大劵也又謂洞玄部合用九靈飛步章奏印夫九靈飛歩乃拜章之作用爾古無司局立此印名指爲洞玄部則非矣又爲洞神部用黄神越章印此印亦非專主正一之宗蓋彼不考其詳也蔣氏立成儀則謂齋法出於靈寳而章奏始於正一蓋其源流嗣法於正一之宗壇而天師合從本科上章故不旁考靈寳也從立成儀之論須不用靈寳本科且不失正一章奏之式是刻鵠也亦爲稍穩儻不考洞眞部本無章式從天台而自分三洞拜章恐不免違戾教典是爾世有謂三五飛歩爲正一章法九靈飛歩乃洞玄部之行用至有取神霄官將吏兵混同拜章者須神霄之教盛於宋朝宣和間而神霄未行之先靈寳之科降世乆矣元不與神霄相雜故近世叅行大洞益以神霄却行靈寳遂謂之玉清靈寳者似覺詳盡而古來未見此格也夫洞玄靈寳拜章之法當行功於平居閑暇之時習炁鍊神升虚入妙在内則謂之十轉回靈在拜章則謂之元網飛歩臨壇之際不復紛紜舉措手搯足行惟令道衆以香爐四枚安於拜壇之四角皆烈火豐香𦆵候髙功拜伏即以四符焚於四角香爐内高功遣官畢捧章授道衆齎章徃焚燎髙功隨即㐲章所謂寂然不動感而遂通當致力於平時也此則與正一存想飛神大不同矣惟傳此宗沠受此法衘書此章式以此聖位用此印記習此功法自始及終從表至裏悉成一家始有感徹若𥨸此一二行用以増益舊學或以傳法之士耻於見從其印篆文移章式衘位不伏攺定却取元網飛歩之名以詐世俗則道有常憲不可欺上清靈寳大法卷之二十五
