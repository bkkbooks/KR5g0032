  text: 上清靈寳大法卷之十八晝九
  hash: sha256:c21eb74bf01d63c575cc410d6ce942e411c8daadd05e50a6863e1a6f260f8250
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_018-310443c, image: sjb/31/310443c.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童𥘉府右翊治金允中編玉文眞篆品經曰赤明開圖運度自然元始安鎭敷落五篇赤書玉字八威龍文保制劾運使天長存此乃是元始天尊大梵祖炁化生玉字出書度人也而靈書中篇在開圖之初謂之中者中和之炁融而成書故曰中篇孝道明王主之五炁分而列五位於是赤書玉字五篇敷落故五老上帝主之所以中篇著於末者取生物首下之義故赤書先之然而眞文呪訣出於古書後之學者難可施行故髙上著筆以解曲滯開演古文微妙元辭諸天尊披誦玉音十方遥唱上帝設禮神魔降伏安天鎭地功用無窮其如季葉眞道易潜至理用晦世俗之習溺於先見故多以先得者爲貴世俗貴異又以常有者爲賤偶得者爲寳世俗貴難復以難得者爲竒易得者爲輕所以世師有得其妙者多不以及人盲師罔世各立異論迷迷相續遂誤後人今審夫仙經叅之上法務爲簡要少存玄網云東方青帝靈寳赤書玉篇眞文東方九炁始皇青天碧霞鬱壘中有老人緫校圖籙攝炁舉仙二十四字書九天元臺主召九天上帝校神仙圖籙歳星輔肝角亢鎭真氐房心尾日景迴旋箕主七辰正斗明輪承炁捕非掃除災群三十二字書紫微宫東華殿主召星官正天分度東山神呪攝召九天赤書符命制㑹酆山束魔送鬼所誅無蠲悉詣木官敢有稽延三十二字書東華司靈之舘主攝鬼魔正九天炁下制河源海水東神大劫洪災蛟龍負身水府開道通逕百千北帝赦文風火無間三十二字書于九天東北玉闕丹臺主攝東海水帝大劫洪災召蛟龍及水神事右合一百二十字皆元始自然之書一名生神寳眞洞玄章一名東山神呪一名青帝八威策文東方安寳華林青靈始老帝君所掌也南方赤帝靈寳赤書玉篇眞文南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三炁勅光神仙受命應運太陽三十二字書九天洞陽之舘主九天神仙圖籍金名熒惑輔心井鬼守房柳星張翼統御四郷軡緫七宿迴轉天常召運促㑹正道驛行赤文命靈三十六字書三炁丹臺主召星官明數正天分度北攝酆山東送魔宗符教所討明列罪源南山神咒威伏北方群妖滅爽萬試摧亡三十二字書於西南玉闕主制北酆以正鬼炁南河水帝太伯龍王神呪流行普掃不祥洪水飛災止召蛟龍開除水逕千道萬通敢有干訖攝送火宮赤書所告莫有不從四十八字書西南正陽玉闕主南海水帝大劫運交洪水四出主召蛟龍水神事右合一百四十八字皆元始自然之書一名南雲通天寳靈袊一名九天神呪一名赤帝八威策文南方梵寳昌陽丹靈眞老帝君所掌也中央黄帝靈寳赤書玉篇眞文中央緫靈黄上天无始生五老中皇尚尊攝炁監眞緫領群仙興籙玄圖宿簡玉文催運上炁普告萬神四十字書太玄玉寳玄臺主神仙玉簡宿名緫仙炁也鎮星輔脾廻度北兀魁𩲃主非截邪斬根𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛傳四十字書玄都玉臺主攝星官正天度數勑攝北帝遏塞鬼門剪除不祥莫有當前一十六字書玄都玉臺主攝北帝正天炁檢鬼精中山神呪召龍上雲制㑹黄河九水河源不得怠從善惡悉分千妖萬奸上對帝君莫有子試太陽激燌赤書玉字宣告普聞四十八字書玄都玉臺主攝中海水帝四泉之水洪災湧溢之數召水蛟龍事右合一百四十四字皆元始自然之書一名寳劫洞清九天靈書一名黄神大呪一名黄帝威靈䇿文中央元靈元老帝君所掌也西方白帝靈寳赤書玉篇眞文西方素天白帝七門金靈浩映太華流芬白石峩峩七炁氤氲上有始生皇老大神緫領肺炁主校九天檢定圖籙制召上仙四十八字書九天素靈宫北軒之上主召仙炁舉仙道也太白檢肺奎婁保魂胃昴畢觜立制七七關參緫斗魁受符北元畫九十二二十四字題金闕玄牎主攝白帝星官正明天度赤書玉字九天正又攝召萬炁普歸帝君一十六字題金闕三圖舘主攝六天鬼炁行此法也西山神呪八威七傅符水上龍召山送雲在所校得同到帝門輔衞上眞斬滅邪源若有不祥截以金關赤書符命風火驛傳四十八子題金闕三圖舘主攝西海水帝及水中萬精召雲龍以防水災之事右合一百三十六字皆元始自然之龍書一名金眞寳明洞微篇一名西山神呪一名八威召龍䇿文西方七寳金門皓靈皇老帝君所掌也北方黒帝靈寳赤書王篇眞文北方玄天五炁徘徊中有黒帝雙皇太微緫領符命仙錬八威青裙羽䙱龍文鳯衣上帝所舉制到玉階四十字出鬱丹玄元紫微臺北軒之上主諸天眞人神仙圖北辰輔腎斗牛衞扉女虛危室豁落四開壁緫七星執凶紏非却災掃穢明道動輝三十二字是天北元玄斗中書也主北方星官正天炁北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅槯二十四字書北方朔單鬱絶之臺主攝天魔北帝萬鬼事九河傾訖鳥母群飛蛟龍通道水伯洞開赤文玉書驛龍風馳二十四字赤書北方朔單鬱絶之臺主北海水帝制水中萬精召蛟龍以負身右合一百二十字皆元始自然之書一名元神生眞寳明文一名北山神呪一名八威制天䇿文北方洞隂朔單鬰絶五靈玄老帝君所掌也元始赤書五篇眞文上清自然之靈書九天始生之玄𣑽空洞之靈章成天立地開張萬眞安神鎭靈生成兆民匡御運度保天長存上制天機中檢五靈下策地祇嘯命河源運役隂陽召神使仙此至眞之文妙應自然致天髙澄使地固安五嶽保鎭萬品存焉右法凡行赤書須先關告若不關告而便爲之無所益也古者修眞之士以五篇赤書鎭禳攝制或投之名嶽洞淵以削罪籍上名九天即此是也凡投簡如告水帝削除罪簿即硃書銀木簡上以青紙褁青線纏之負以金龍一輔以金紐九匣簡以投三河之淵如告五嶽靈山亦硃書銀木簡金龍金紐悉如前法埋於本命之嶽或福地名山若告九地土皇亦如斯式埋於所住之中宫簡上書法師位姓某年月日時生願神願仙長生不死如水府則續之曰九府水帝十二河源江海淮澤溟泠大神乞削罪名上聞九天謹詣水府金龍驛傳其首同式其末别作一行書太歳某年月日時於某處告下各以簡之背書眞文却以簡之陽面書告文用本法印印之投簡之際發爐啓告宣呪投簡復鑪如式或以文置之五方則五嶽仙官至若長齋百日精思不輟則天眞下降但專佩此文亦得屍解硃書五色石上災殃自滅凶殘自消不及五嶽之山則所居之地取四方之山亦可備五嶽但本命之方則爲命嶽取象以招靈炁神無所徃而不在也然梵炁開煥出圖度世無文不光無文不明無文不成無文不度無文不生故百魔隱韻離合自然因時以治事隨事以用文故五書之赤文中篇之祕篆皆可離合而用之矣水府呪北向叩齒三通讀簡文訖法師執簡念呪元始五老上帝髙尊十方至眞太華靈僊赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝溟泠大神今日上告萬願開陳謹投玉簡乞削罪名千曾萬祖九族種親罪相連累及傳我身普蒙削除絶滅種根記名水府上言帝前七祖父母去離八難上登九天衣食自然我罪釋散萬神咸聞謹以金紐關盟水官請如所陳金龍驛傳嶽府呪東向叩齒九通讀簡畢法師奉簡念呪玄上開明元始監眞上帝五老赤書丹文天地本始緫領三元攝炁召㑹催促舉僊髙上符命普告十天日月星宿五嶽靈山天上地下𡨋靈大神監生主録南上三門開領玉簡勒名丹篇削落罪書上𥙷帝臣歸憑至道脩立齋功抜贖九祖一切苦魂行道事竟謹依靈山請投玊簡乞削罪名皆蒙解脫無有𡨚親去離三惡魂升九天死生開度億劫長存今日上告萬神咸聞謹以金紐關盟地官請如所告金龍驛傳土府呪中庭向壬叩齒十二通讀簡畢法師奉簡念呪天地開張九炁分靈三元同符十方朗清五老上帝開眞領生丹書赤文元始上精普告天地九土皇靈今日上告萬僊定生脩齋行道普爲存亡我願我仙請投玊名土府太皇削除罪形奏簡上宫刋簿華清身得飛騰天地同靈九祖種親腐骸更榮魂升南宫受化仙庭今日告命萬神咸聽謹以金紐表盟至誠請如所告金龍驛傳五嶽靈山投簡呪毎遇本命日甲子日立春日寫東方赤書自東方起至舉仙凡二十四字立夏日寫南方赤書自南方起至太陽凡三十二字二分二至日寫中央赤書自中央起至萬神凡四十字立秋日寫西方赤書自西方起至上仙凡四十八字立冬日寫北方赤書自北方起至玉階凡四十字依方色書白剌上記姓名月日如投簡儀則九年五方仙官到使青腰赤圭黄素太素太玄玉女來皆見叩齒十二通呪曰玄上髙靈元始尊神大聖徘徊萬聖臨軒三景敷輝慶雲四陳上告較圖推算九天今日啓願投剌靈山丹書赤字自然眞文上告五帝記名玉篇萬神監映日月明言願度願生願神願仙天地星宿互照我身三官九府五帝大神普告無窮削除罪根元始大開莫不納言九祖幽魂受福自然三途五苦永離八難得與三景同輝紫宸轉輪不滅身得飛仙宣呪畢讀剌了投於絶巖之頂便散花靈山之上又叩齒三通向本命方呪曰元始監映仙名巳書三官九府罪業蠲除散花五帝告盟太虚請如所陳萬劫常居安鎭星宿禳度天災法呪五方赤書主召其方星官天文分度及天災安鎭則方而息東方自歳星起寫至災群凡三十二字以青紙硃書露中庭九日九夜依法以火燒散灰於青煙之中并刻石書於青石上埋之南方自熒惑起至命靈凡三十六字以青紙硃書露中庭三日三夜依前法焚并刻石書赤石埋之中央自鎭星起至驛傳凡四十字以青紙硃書露中庭十二日夜依前法焚并刻石書黄石埋之西方自太白起至北元凡二十四字以青紙硃書露中庭七日七夜依前法焚并刻石書白石埋之北方自北辰起至輪輝凡三十二字以青紙硃書露中庭五日五夜依前法焚并刻石書黒石埋之皆東面散髮叩齒十二通呪曰元始上天三光髙明回景照耀四方朗清運度所衝激揚流星五分錯越三統失寧五斗緫辰七宿明靈眞君大魁厥諱玊精夫人皇妃字曰育嬰緫御玄關回轉天常今日客災玄告不祥謹以眞文赤書上呈散髮謝愆披露丹誠惟垂玄鑑回復天經炁不横越災不横生焚燒靈文散煙玉庭上景監明普告萬靈炁消三關災滅九𡨋隂陽調和國土太平謹以金龍風火驛程呪畢露眞文於中庭各安方所以金龍鎭之隨日而焚之又依方色數刻石埋鎭用燈照及紋繒安鎭爲信攝召法呪凡受上法宜先攝伏魔鬼魔精降伏神明自至東方即自東山至稽延凡三十字硃書青木剌南方即自北攝至摧亡凡三十二字黄書赤木剌中央自勑攝至當前凡一十六字白書黄木剌西方自赤書至帝君凡一十六字黒書白木剌北方自北山至滅摧凡二十四字青書黒木剌凡念呪皆向東北而東九次南三次中央十二次西七次北五次俱叩齒三十六通閉息炁九口而仰念呪曰三元閉明回轉天常運推數終百六乗剛大劫交㑹萬妖爭行北酆不拘放逸鬼宗群魔縱肆祅閉天光上帝有命普告十方演明天度法教開張正道治民掃除不祥有何小妖群聚爲殤赤書玉文統攝鬼郷北酆三官速明傳行千魔束爽萬鬼送形流鈴交煥激炁太陽金虎四邀天丁捕亡大小齊到不得匿藏元始所告列奏上蒼召龍天水神止水度水等法呪天地大劫之災洪水四出此符可以禳止或使蛟龍爲通路開水逕以度身東方自下制至無間凡三十二字黄書青紙投水中南方自南河至不從凡四十八字中央自中山至普聞凡四十八字西方自西山至驛傳凡四十八字北方自九河至風馳凡二十四字皆如東方叩齒五通閉炁二十五息存巳身心中生火出頭頂燒四方山林草木及巳身都盡形體皆成灰塵一時飛翔入青煙之上無所復遺思大水浩蕩除天下巳身化爲蛟龍隨水而流因又叩齒二十五通呪曰上炁回靈開明九元天推地轉三炁流傳五行相促運度機關隂陽否激結成災衝大劫傾訖蕩除妖氛九河受對洪流激川水毋徘徊鳥烏合群日月冥㑹三景停關上選種臣排較玉文棄惡貴善清濁永分我係帝簡名列九天大災四㑹赤書所蠲是日告命萬神咸聞日月五星照明我魂五嶽靈山浮度我身九河水府溟泠大神開深水逕通利河津蛟龍應符攝山送雲負我度我驚馳四奔丹書赤字元始眞文金龍驛程時刻無停立須奏御上對帝君呪畢引炁二十五咽須㬰自當有水神開道在山則山自浮在水則水自開可謂臨厄而自濟儵歘之頃也群國有水災之時亦可建齋精心行之矣天尊於億劫之始運元炁眞精化生靈文以制御劫運保國安民宿有福慶與善因縁得值斯文上古之人淳和抱朴與道混同不俟齋戒行之立應代末時澆人心散壞宗正者寡違眞者多欲行其法須依三元簡文立齋行道精心思念𡨋契玄聖乃致感通不爾者魔試所干徒爲之耳可選精潔之士於絶塵之地名山靈跡以期通應以彰大道濟度之慈太上救物之澤弘化之士其勉之哉廣成先生論眞文昔在元始天尊混元旣判三炁開圖以大道元精眞一之炁化爲靈寳赤書凝結爲文降於五方以鎭安天地招命眞靈故云天地得之以安鎭日月得之以光明鬼神得之以開度人民得之以長生眞文傳於世上消天災保鎭帝王下禳毒害以度兆民制伏神鬼拯拔沉淪無所不爲也經云無文不明無文不光無文不立無文不成無文不度無文不生也又云赤書玉字八威龍文保制劫運使天長存此靈寳五篇眞文之妙用也故能鎭天分度調和隂陽開度飛爽保衞帝王拯淪濟溺通幽達明和𡨚釋咎却死延生生死之苦無不救之當建齋之時以眞文玉字安鎭五方解壇事畢収而焚之散灰青煙之中具如玉訣之法或學士脩眞自祈度世記名仙品永離鬼官當以三元八節甲子本命之日書文玊簡投諸名山除宿世罪簿言名上天事事三過諸天三官九府記其善功上天友别萬神敬護五帝侍衞三界司迎千魔萬精不敢妄干經曰志願堅固觸向咸成七祖父母上生天堂生死福慶影響相酬也廣成先生再敘中篇說黄籙齋拯救幽靈遷拔飛爽開度長夜升濟窮泉固其大㫖也然驅災致福謝過希恩人天普脩家國兼利功無不被矣所鎮靈寳五老赤書眞文詳其所爲祗通四種一則求仙受道自東方九炁下二十四字二則禳制星辰自歲星輔肝下三十二字三則摧伏鬼魔自東山神呪下三十二字四則蠲消九害自下制東河下三十二字五篇之用於期畢矣西京清都觀張萬福天師儀軌云諸天隱語八㑹玉文元始天尊於香林園中爲上智童子所說下拔五苦遍濟九幽於遷神儀中刻石行用今則黄籙遷抜當用此文吉凶合儀銓量充當庶夫永劫可以流通呪祝焚燎與眞文同其有成法共弘之焉靈書中篇大梵隱語又曰三十二天隱語東方八天南方八天西方八天北方八天中央本法無此中央符别本収入於此本上靈寳大羅之天自然玉字黄帝一炁天文散壇夜隨方讀文訖弟子捧文香煙上法師叩齒十二通呪曰晝九三十無上至尊大聖髙尊布化運炁三十二天八㑹九光自然成文安鎮天地保制劫年元始符命普告三元下勑九地上關諸天中吿海嶽名山大川今日上告萬神咸聞修齋行道拔度幽魂三官九署削滅罪根永度三途五苦之源世世受福記名丹篇神生天堂錬化自然生死開度億劫長存九天告命風火驛傳允中恭惟元始天尊啓眞機於劫運之先開靈圖於天地之始赤書玉字敷落五篇肇育乾坤主張造化因時而降世應運以流行故上可以調正天經恊平炁候中可以綏寧邦國保鎭帝王下至學士求仙入道則驅滅魔試成就善功以之安鎭方隅則壇塲淨肅投之山川河嶽則削罪記仙此乃玉訣中之元科上經中之本㫖及夫齋法旣興之後則以五書鎭壇而修齋立事功成事畢則投簡山川土府願其紀勤齋功削除過籍黃籙之投三簡蓋本諸此近世妄人更不考究源流乃多撰造符文書之簡背或又分時節而改易其符不經甚矣豈知五篇之妙靈書之功可以離合而用無所不禳無所不度也況赤書玉字合居靈寳大法之篇首至於齋科之中編入者庶俾行齋之士將知安鎭之儀投簡之式實本諸此固不宜隨俗撰符以妄用也若夫散齋投簡則全屬齋科詳見投龍送簡品矣散壇告簡投龍三呪宜熟味之其可用他符於簡後耶上清靈寳大法卷之十八
