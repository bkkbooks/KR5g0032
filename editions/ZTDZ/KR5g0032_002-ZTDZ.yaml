front:
  text: 上清靈寳大法卷之二獸三
  hash: sha256:2bb34cc904a0ffcbfc927195cb2fad384d364a5030d7e4990f98ff25235953ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_002-310358c, image: sjb/31/310358c.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童𥘉府右翊治金𠃔中編分章𥼶用品太上靈寳無量度人上品妙經叙玄章第一道言酉上此二字治卒喑昔於始青天中玉隆騰勝天也碧落空歌大浮黎帝諱見隱語中土受元始度人無量上品啓運章第二元始天尊當說是經週回十過以召十方當說者謂此劫運開圖出教也眞應章第三自然以下大洞世界始當詣座子上至午上挑發催生安胎書吞天眞大神上聖髙尊妙行眞人中指上節疊書巳上辟邪鬼無鞅數衆乗空而來飛雲丹霄緑輿瓊輪羽蓋垂䕃流精玉光亥上流精玉光是九色主腎圓象也治夢交五色鬱勃酉上少氣書吞洞煥太空定極章第四七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜黙山海藏雲子上治氣急吞天無浮翳四炁朗清自七日下止此治眼目等疾書燒印上吞之一國地土山川林木緬平一等無復髙下土皆作碧玉無有異色衆眞侍座中指中節安宅動土作呪土用之還元章第五元於五行生數立於五行成數玄座者法身所御也元始天尊玄坐空浮五色獅子之上午上治心不寧心病瘧疾吞說經一水徧諸天大聖同時稱善是時一國男女聾病耳皆開聰說經二火徧盲者目明說經三水徧喑者能言說經四金徧跛痾積逮皆能起行說經五土徧久病痼疾一時復形說經六水徧髪白反黒齒落更生說經七火徧老者反壯少者皆強說經八木徧婦人懐姙鳥獸含胎已生未生皆得生成說經九金徧地藏發泄金玉露形說經十土徧枯骨更生皆起成人是時一國是男是女莫不傾心皆受護度咸得長生行其道則長生不死重玄章第六道言是時元始天尊乾上凡燒香先召十方無極然後入意說經一徧東方無極無量品至眞大神無鞅之衆浮空而至說經二徧南方無極無量品至眞大神無鞅之衆浮空而至說經三徧西方無極無量品至眞大神無鞅之衆浮空而至說經四徧北方無極無量品至眞大神無鞅之衆浮空而至說經五徧東北無極無量品至眞大神無鞅之衆浮空而至說經六徧東南無極無量品至眞大神無鞅之衆浮空而至說經七徧西南無極無量品至眞大神無鞅之衆浮空而至說經八徧西北無極無量品至眞大神無鞅之衆浮空而至說經九徧上方無極無量品至眞大神無鞅之衆浮空而至說經十徧下方無極無量品至眞大神無鞅之衆浮空而至十徧周竟十方無極天眞大神一時同至一國男女傾心歸仰來者有如細雨宻霧無鞅之衆迮國一半土皆偏陷非可禁止於是元始懸一寳珠大如黍米乃赤黍也收之念六梵隱語四十九徧祝之吞一粒可治一切病苦想衆眞入珠中艮上在空懸之中去地五丈入珠中黍米法也天眞大神上聖髙尊妙行眞人十方無極至眞大神無鞅數衆倶入寳珠之中天人仰看唯見勃勃從珠口中入旣入珠口不知所在國人廓散地還平正無復欹陷國土偏陷寳珠乃懸旣入珠口地還平正元始即於寳珠之内說經都竟衆眞監度以受於我當此之時喜慶難言難言所謂内諱法事粗悉諸天復位倐忽之間寂無遺響是時天人遇值經法普得濟度全其本年無有中傷傾土皈仰先因傾心後乃傾仰咸行善心連下上太平治呪詛解和同之意不殺不害不嫉不妬不淫不盗不貪不慾不憎不𡜍言無華綺口無惡聲齊同慈愛異骨成親國安民豐欣樂太平有如上十二善行方契齊同慈愛異骨成親之道也演梵章第七經始出教一國以道預有至心宗奉禮敬皆得度世宗奉禮敬四字行一皆得度世宣祕章第八道言元始天尊說經中所言並是諸天上帝内名隱韻之音亦是魔王内諱百靈之隱名也非世之常辭上聖章第九此是元始天尊感應功德上聖巳成眞人通玄究微能悉其章誦之十過諸天遥唱萬帝設禮諸天遥唱萬帝設禮所以爲大洞經也河海靜黙山嶽藏雲日月停景璇璣不行羣魔束形鬼精滅爽回尸起死白骨成人日月下乃是空法定中可以自見一切無道之鬼見身聞之皆滅如功未就未可制禦也未有定力則可用後洞視法至學章第十至學之士誦之十過則五帝侍衞三界稽首魔精喪眼鬼妖滅爽濟度垂死絶而得生所以爾者學士穢氣未消體未洞眞召制十方威未制天政德可伏御地祇束縛魔靈但却死而己不能更生勸道章第十一輕誦此章身則被殃供養尊禮門户興隆世世昌熾與善因縁萬灾不干神明護門讃玄章第十二尊妙獨歩玉京之上故曰大洞眞經斯經尊妙獨歩玉京度人無量爲萬道之宗巍巍大梵德難可勝大羅天上有玉京之山紫微上宫有玉京之殿三十六座再座髙虚廣萬里軒簷五千五百里修誦章第十三道言凡誦是經十過諸天齊到億曽萬祖幽䰟苦爽皆即受度上升朱宫格皆九年受化更生得爲貴人而好學至經功滿德就皆得神仙飛升金闕遊宴玉京也好學之人明功德重於誦者上學章第十四上學之士修誦是經皆即受度飛升南宫世人受誦則延夀長年後皆得作尸解之道䰟神暫㓕不經地獄即得反形遊行太空暢微章第十五此經微妙普度無窮一切天人莫不受慶無量之福生死蒙惠有科條格效盟章第十六至學輕泄殃逮玄祖世人皆不得傳之禁脫有漏慢豈止此耶寳祕則億曽齊功上天所寳不傳下世至士齎金寳效心盟天而傳輕泄漏慢殃及九祖長役鬼官前次輕誦故殃及其身後以泄慢乃累其祖玄局章第十七九宫二十四炁神皆在身中侍經五帝玉童玉女各二十四人營衞神文中指中節保護受經者身一日佩符呪二日通行炁脉用吞營衞神文四字立效侍經五帝玉童玉女各二十四人共二百四十人從帝行也三元章第十八道言正月長齋誦詠是經爲上世亡䰟斷地逮役度上南宫七月長齋誦詠是經身得神仙諸天書名黄籙白簡削死上生十月長齋誦詠是經爲國王帝主君臣父子安鎭國祚保天長存世世不絶長爲人君安鎭其方民稱太平八節之日誦詠是經得爲九宫眞人戴九履一左三右七二四爲肩六八爲足五居中宫以爲實腹此乃豁落斗也本命之日誦詠是經䰟神澄正萬氣長存不經苦惱身有光明三界侍衞五帝司迎萬神朝禮名書上天功滿德就飛升上清中指上節此是定心神况上清中都也按龍蹻經云四梵以上次有三清之天第一太清十二天九仙所居次上清十二天九眞所治次玉清十二天九聖所居共三十六天玉清乃最上天也行道章第十九凡誦經行道行法各依式存想口傳心授口誦心拜並依艮上至一指甲下桃發道言行道之日皆當香湯沐浴齋戒入室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黄白三色雲氣之中内外蓊有青龍白虎朱雀玄武四聖將也獅子白鶴羅列左右日月照明洞煥室内項生圓象光映十方三氣者玄氣青元氣黄始氣白是三氣也皆從一氣而生令居三氣之中以表學人存三守一之道乃氣之母也斯眞常之道矣如此分明宻呪曰無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝宜符直日香官各三十二人呪日授之關啓所言今日吉慶長齋清堂修行至經無量度人臣及甲乙謂臣及某人同轉是經以求長生之道也如止自誦當向木德之方朝太陽取青黄白三氣而誦之臣及甲乙也大洞内章回風混合之旨云東方扶桑之宫有若木太陽一出若木有光青黄白三氣蓊鬱其頂宫中仙人於此時誦經行道以奉帝德今所誦經故冝向甲乙之方甲乙乃東方也故經云東向誦經轉經受生願所啓上徹俓御無上三十二天元始上帝至尊几前畢引氣三十二過東向誦經東方長生之方諸天所尊重也書符大洞口訣東向於十月行道也上清靈寳大法卷之二
