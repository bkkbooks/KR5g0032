  text: 上清靈寳大法卷之三十
  hash: sha256:21bc5d770af2b4840c7c0dc39fdf76c5bba95717182c4c8ed03f540bd4e8d35b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_029-310539c, image: sjb/31/310539c.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金允中編奏申文檄品五老上帝狀方函上詣餘四狀函東方青靈天君官並同式具法位臣姓某右臣輙瀝丹𠂻上干宸聽伏念臣久膺軄任竟乏功勤冀贖愆瑕輙思利濟臣謹據入事同前謹録狀上奏東方青靈始老天君陛下恭望道慈允臣所奏持與流光壇席鑒録齋忱成就善功提携幽顯庶俾恩覃家國惠浹寰區仍乞宻錫五炁之生津陶鑄萬途之滯爽咸令生化各遂昭蘇臣干冒道威下情無任不勝戰慄之至謹奏申師𥙷六軄狀方函謹詣靈寳五師宫或稱門下具法位臣姓某臣不避褻瀆之誅荐冐至眞之靈伏念臣措身濁境馳識靈途存念乖違朝修簡墮未能寡過苟活餘生尚荷寛恩特容𨽻軄欲宏大教莫先度人臣比據入事來詞誠篤當濟幽明義合申謄理難抑絶臣自揆三掠之罪識難蘇九夜之迷䰟非仗哀憐豈能就事臣謹按古儀齋法出於靈寳今得叅佩洞玄部法籙之人方可臨壇𥙷軄今來未能盡皆如格是以六軄之内未免權用正一諸品法籙弟子備員任事切恐有虧成典謹具權冝𥙷列壇官法軄姓名在前須至申聞者右謹具申靈寳度師眞君靈寳籍師眞君靈寳經師眞君三天扶教輔元大法師正一靜應眞君玄中大法師几前恭望眞慈特加省録許以權冝備事庶幾幽顯蒙恩仍乞敷奏天廷請命頒下三官五帝合屬眞司照應施行臣干冒師威下情無任不勝寒慄之至謹狀申五府祈晴狀方函上詣元應太皇府具法位臣姓某臣身居塵網名玷玄司徒佩靈文未逢眞授累干沖聽罪不容誅尚冀洪慈委曲原宥臣昨據某人等投詞取某日就某處啓建黄籙大齋福國康時拔幽濟顯而臣末學道淺仙品未充黽勉開壇事多違失下戾妖穢之未滌上恐風雨之無時以至今來建壇之所或境藏邪恠或地匿妖祥非仗師慈難全善果須至録狀申聞者右謹具申三天扶教輔元大法師正一靖應眞君北極眞武佑聖靈應眞君翊聖保德儲慶眞君天猷副元帥眞君天蓬都元帥眞君聖前恭望眞慈俯垂矜允特與敷奏天闕取㫖吿下雷霆霹靂風雨雲電合屬眞司至期収歛雲霧止雨停風掃蕩妖氛肅清天地三光煥耀四炁澄清仍冀差降解穢應干將吏一合下降監勒某處里域社稷等神併力同心掃清塵垢祛蕩氛穢整肅齋壇鎭安境域如有妖精犯觸邪恠干侵即仰所差將吏以時収繫押赴天獄治罪施行庶使齋功成就魔障不生臣干冒師威不勝寒慄之至謹狀天省劃一申狀方函上詣三天門下泰玄都省右以正奏劃一申天省狀大畧如此更冝臨期詳酌而行或有修建事體不同可以隨事増入具法位臣姓某臣不避再三之瀆上犯斧越之誅惟冀寛恩曲加矜宥臣比據某郷貫某人投乞崇建無上靈寳黄籙大齋福國康時拔幽濟顯超度九先七祖廣資五道三途集兹善功追薦亡故某克遂超生保安見存眷屬除巳祗率法流恭爲修建以今齋期巳定須至逐一申聞者一謹尅某日告齋始事宿啓建壇於當日某時進拜素車白馬章是夜某時進拜破酆都拔罪章吿頒元始符命金籙白簡救苦眞符太上破地獄眞符太上拔幽䰟眞符太上敕赦生天寳籙靈寳本法元始符命混元神虎玉札吿下諸天諸地隂陽主司三界十方冥關幽路天牢地獄應干合屬去處依準符命赦宥係薦亡䰟及五道三途四生萬𩔖一切沉靈滯爽風劫罪愆累生執對咸從原釋遵禀玉札追攝赴壇報應受度施行一某日正齋三時朝眞誦經行道是日午時進拜通天救苦朱表開通道路章靜夜破獄召攝係薦某人等䰟及五道四生三途萬𩔖一切孤䰟沐浴朝眞享食受供一某日正齋第二日三時朝眞誦經行道是日某時進拜沐浴鍊度章當夜鍊度三途五道十𩔖四生一切孤䰟傳符受戒度化超生一某日正齋第三日三時朝眞誦經行道當某日時進拜昇度亡䰟章是夜鍊度係薦某人等䰟傳符受戒度化超生一某日進拜言功朱表修設三界髙眞清醮三百六十分位昭答恩庥解壇散席投龍奠簡紀勒齋功右謹具申三天門下泰玄都省主宰髙眞恭望眞慈俯垂矜允特與敷奏天闕取旨告下諸天諸地日月星辰三界三元洞天海嶽冥關幽壤典祀神庭應干合屬去處疾速施行庶俾號令徧通精誠上徹更祈三光煥耀四炁朗清萬聖翼轅千眞扈䠋即使天澤浹於寰宇齋福被於幽明六極均休四生咸泰臣干冒眞威罪當萬坐謹狀申北斗狀方函謹詣中天北斗星宫具法位臣姓某臣輙罄愚𠂻上干眞聽臣叨行大法徒歷歳時學未通幽無階自効敢勤利濟以報恩休臣謹據入事須至録狀申聞者右謹具申中天大聖北斗九皇眞君恭望眞慈允從所告特與敷奏天闕告下三界合屬眞司依法照應施行庶使齋功成就澤被顯幽仍乞行下北魁玄範府差降神虎主吏何喬二使者侯魏張三部追䰟使者七司玊女追攝合干官將吏兵一合下降赴臣行司齎持玊札徧詣冥關幽路應干合屬去處根攝所薦亡過某人等䰟及五道三途四生萬𩔖一切沉靈滯爽依時赴壇報應削除罪籍落滅惡根聽法聞經以時升度恭冀雲車俯降證録齋誠臣干冐眞威不勝惶懼謹狀日宫狀方函上詣大陽日宫具法位臣姓某臣輙瀆重明願回淵鑒伏念臣受資塵陋冐忝班行自揆罪深敢思神過況承䖍愬敢不上聞臣謹據入事須至録狀申聞者右謹具申日宫太陽帝君恭望眞慈特垂矜允暫迂仙仗俯盻齋壇監録禱祈曲全齋事庶使恩周寰宇澤被幽明臣以某日鍊度五道三途四生萬𩔖以某日鍊度係薦某人等䰟欲乞敷布靈芒降流眞炁匹配水火和合隂陽各回性識以清明盡出幽沉而度化臣干冒眞威不勝惶懼謹狀月宫狀方函上詣太隂月官月官太隂皇君狀同日宫式北斗九皇夫人狀方函謹詣北斗九皇夫人門下具法位臣姓某臣不揆誅夷冒干平省深知僣越尚冀寛容伏念某蕞爾微生叨行大法無功可録有罪足書願濟顯幽少圖補復凡有披告敢不上聞某謹據入事須至録狀申聞者右謹具申北斗九皇夫人恭望眞慈特垂矜允俯賜差降神虎主吏何喬七司玉女三部追䰟使者追攝合干官將吏兵赴某行司齎持玉札徧詣十方三界地獄冥關千眞萬靈治軄冥曹應干合屬去處追攝五道四生三途萬類一切孤䰟滯𩲸及係薦某人等䰟出離隂境悉赴玄壇顯見形儀昭示報應仍乞暫迂仙仗俯降齋壇成就善功證明修奉某干冒眞威不勝惶懼謹狀五德星君狀如各一狀則方函詣東方木德星宮具法位姓某臣輙伸丹悃仰瀆髙明敢冀大慈曲垂恩佑臣謹據入意須至録狀申聞者右謹具申東方木德歳星眞君恭望眞慈俯垂矜允特迂仙仗暫降齋壇鑒録禱祈證明修奉庶使福周寰宇澤被乾坤臣以正齋某日夜鍊度五道三途四生萬𩔖一切孤䰟某日夜鍊度係薦某人等䰟欲望大啓慈仁廣推巨澤布五行之正炁合二象之生津冶鍊亡䰟復其性識領諸善果升入朱宫臣干冒眞威不勝惶懼謹狀南方火德熒惑星眞君西方金德太白星眞君北方水德伺晨星眞君中央土德鎭星眞君巳上四狀並同東方狀式方函隨方言之二十八宿狀與五星狀同式右謹具申角宿星君恭望眞慈俯垂矝允特迂仙仗暫降齋壇鑒録禱祈證明修奉庶使福周寰宇澤被乾坤願闡仁慈曲加拯濟悉度赴壇之䰟爽盡承齋福以超生役罷三途獄開九地飛沉遂性動植昭蘇某干冒眞威不勝惶懼謹狀巳上自角宿起止軫宿共二十八狀並同式方函詣角宿星宫餘並同隨宿名上詣外只斗宿一狀巳别具于後蓋斗宿在二十八宿則爲斗宿又爲之南斗道典有南斗六司星君即此是也正在東北之間欲知其詳自以渾天儀考之可見矣世人但知南斗又取與北斗相對竟不考此星在何所良可笑也若不能毎宿專狀則皆除去亦可却專申斗宿而巳南斗狀方函詣斗宿星宫狀並同前式右謹具申南斗六司星君恭望眞慈俯垂矜允特迂仙仗俯降齋壇成就善功證明修奉庶使福周寰宇澤被顯幽所有道場内錬度五道三途四生萬𩔖一切沉䰟滯𩲸及係薦某人等䰟敢冀恢育物之深功垂錬䰟之巨澤俱返乆沉之性普全巳蕩之神再毓隂陽重資造化悉升朱府俱陟仙郷某干冒眞威不勝惶懼謹狀玄師狀方函謹詣玄中大法師門下具法位臣姓某臣處露丹𠂻上干眞聽載惟僣越懼速靈誅伏念臣染俗素深眞心易昧力小任重德淺軄崇日夕憂惶罔知所措是敢留心於濟度或可小贖於愆瑕蓋以黄籙科條事體嚴重非師尊之覆育豈愚陋之敢行全仗慈憐或能成就臣所據某人投詞乞建黄籙大齋除巳節次上聞外今以某日爲始建壇蕆事具黄籙節次在前須至録狀申聞者右謹具申玄中大法師恭望師慈始終矜允荐行備詞敷奏請命頒下三界有司照應敢祈雲輿下邁暫駐齋壇俾章詞上徹於三清齋直圓成於七日幽明同慶寰宇霑恩仍乞申敕三洞四輔法籙中官將吏兵三界五嶽兵馬營衞齋事通逹悃誠布令頒符追䰟攝𩲸拔萬𩔖四生之滯爽釋三途九夜之罪䰟即使係薦之靈咸陟沖虚之界臣干冒師威不勝惶懼謹狀三師狀共一狀與玄師状同式靈寳經師眞君靈寳籍師眞君靈寳度師眞君五府狀方函謹詣上清童𥘉府具法位臣姓某臣不避誅譴累瀆靈慈伏念臣蒙陋行尸生逢道化叨恩覆育𨽻役眞司誓畢此生共揚大教敢祈矜宥終始帡幪臣比據某人投詞請建黄籙大齋臣節次上聞外今以某日建壇始事臣以便冝書行洞玄靈寳本法應干符命及五元素府眞符秘篆拔幽濟顯輔教康時役召神靈圓成齋事但臣性昏學淺德薄罪深非仗師恩難期通感須至録狀申聞者右謹具申元素元輝府三天扶教輔元大法天師正一靜應眞君元和遷校府眞武靈應佑聖眞君元照靈虚府翊聖儲慶保德眞君元景丹天府天猷副元帥眞君元應太皇府天蓬都元帥眞君恭望眞慈矜憫後學特與照詳臣前後申請事理再與請命天闕頒吿諸司依法照應敢冀雲車下邁暫駐齋壇容臣宣告符章頒行號令仍冀申敕三洞四輔經籙法中官童將吏三界十方五嶽四瀆兵馬衆靈監齋直事靈寳官屬直月五將十二時直主者五府合屬將兵臣所行法中官君將吏追䰟攝𩲸等神應時感降隨召來臨營衞齋壇宣傳符檄謄詞章於九域布號令於諸司成就善功普福幽顯即使係薦亡䰟某人等及五道四生三途萬𩔖一切沉䰟滯爽咸離隂境悉詣齋壇承領天恩登升善域飛沉遂性動植昭蘇臣干冐眞威不勝惶懼謹狀右此狀非行五府正法之人自可攺易專狀申天師一狀共申北極四聖元帥府亦通葛仙翁狀方函前詣太極左仙翁門下具法位臣姓某臣乆竊眞庥獲聮法軄未能寡過豈敢有言蓋以輔賛之勤利濟爲首敢謄凡愫仰冐淵聦臣謹據入事除巳録奏天闕外緑臣資庸品下學淺行輕莫能通達於幽冥竊恐難期於感徹惟祈師尊之祐庶成濟度之功須至録狀申聞者右謹具申太極左仙翁沖應眞君恭望師慈允從申請不違初誓益振玄風特與敷奏天廷申敕洞玄部經籙法中官君將吏靈寳官屬玉童玉女天將仙兵併力同心營衞壇墠謄詞布令錫命頒符成就齋功廣敷靈䕃庶使福霑寰宇澤被幽明拔度所薦亡䰟某人等及九州分野五道三途四生萬𩔖一切應度沉靈滯爽出離冥夜承領善功證性知根超生度化仍乞雲車俯降證録齋修臣干冐師嚴不勝惶懼謹狀許眞君狀方函謹詣高明大使君門下宋政和年間上尊號曰神功妙濟眞君旣奉玉册又係徽宗上表稱臣若九州都仙大史髙明大使即天爵也具法位臣姓某臣顓蒙塵質乆被陶成雖𨽻玄門未探眞奥惟思自効以報殊恩臣謹據入事但以臣學不過人法非達妙謬當首軄豈能動天非藉師恩難全齋事須至録狀申聞者右謹具申九州都仙太史髙明大使神功妙濟眞君恭望眞慈允從申請益堅宏誓大闌沖科念兹未學之愚庸成此建齋之善果敢冀擲火流鈴之仗俯臨修齋行道之壇鑒録誠祈證明修奉仍乞謄詞天闕頒命諸司申敕三洞四輔經籙法中官童將吏靈寳官屬玉童玉女十方三界兵馬衆神隨召來臨以時感降翊衞壇墠通達齋誠進表謄章頒符錫命即使國安民阜物泰時康拔濟係薦亡過某人等䰟及五道三途四生萬𩔖一切沉靈滯爽出離幽夜霑領天恩自知宿命以清寧永釋前愆而解脫存亡俱慶幽顯咸休臣干冒師嚴不勝惶懼謹狀三官各狀天官方函詣上元天官宫具法位臣姓某臣塵途濁質愚陋無知謬玷仙階濫陶眞化束躬懷懼豈敢有言盍以禱請精誠不容抑止仰祈原宥曲省丹𠂻臣謹據入事須至録狀申聞者右謹具申上元天官帝君恭望眞慈曲垂矜允特迂仙仗俯駐齋壇鑒録誠祈證明修奉即使恩周寰宇福被顯幽仍乞敷奏天闕告下上元天界三宫九府三十六曹應干合屬去處依法遵從符命拔度係薦亡䰟某人等及五道四生三途萬𩔖一切沉靈滯爽蠲消罪對解釋拘纏出離冥關登升善境華夏俱慶動植咸休臣干冐眞威不勝惶懼謹狀中元地官方函上詣中元地官宫具法位臣姓某臣庸鄙受資昏蒙賦性冐承恩覆獲被陶容雖法籙之乆膺念功勤之莫著尚祈矜宥少録愚𠂻臣謹據入事須至録狀申聞者右謹具申中元地官帝君恭望眞慈曲垂矜允特迂仙仗俯駐齋壇鑒録誠祈證明修奉即使恩周寰宇福被幽明仍乞敷奏天闕告下中元地界三宫九府四十二曹合屬去處云同天官狀式下元水官方函詣下元水官宫具法位臣姓某臣駑鈍不才受軄過分日懼誅譴𥙷復無階適領詞陳理冝拯濟敢祈寛假特賜矜容臣謹據入事須至録狀申聞者右謹具申下元水官帝君恭望眞慈曲從申請特迂仙仗俯駐齋壇鑒録誠祈證明修奉即使恩周寰字福被顯幽仍乞敷奏天闕告下下元水界三宫九府四十二曹應干合屬去處同前五帝狀方函上詣東方青帝宫具法位臣姓某臣猥以么微濫霑化育備眞法軄乆乏功勤欲逭譴訶莫先濟度況承䖍愬敢不上聞臣謹據入事須至録狀申聞者右謹具申中央黄帝君北方黒帝君西方白帝君南方赤帝君東方青帝君恭望聖慈曲垂平省特迂鸞駕駐蹕齊壇憫末學之庸愚釋臨壇之過失免書罪籍成就善功庶俾寰宇霑恩顯幽蒙祐所有係薦亡故某人等䰟及五道三途四生萬𩔖一切沉靈滯爽悉祈原宥盡頼恩矜早離冥昧之郷俱陟清虚之境知根復性聚炁生神以致動植咸休飛沉俱泰臣干冒聖威不勝惶懼謹狀監齋狀方函上詣靈寳監齋大法師門下具法位臣姓某臣地行賤品季世凡資宿藉師恩獲承法軄自知冐越所合束身適領誠詞輙思自効尚祈覆育俯察凡私臣比據入事須至録狀申聞者右謹具申靈寳監齋大法師伏望師慈俯垂矜允特迂仙仗暫駐齋壇宏曠蕩之恩沛涵濡之澤保全末學成就善功庶使福被寰區恩覃幽顯仍乞拔度係薦某人等䰟及五道三途四生萬𩔖一切沉靈滯爽出離幽境升陟仙郷齋福所覃華夷俱秦干胃師嚴不勝惶懼謹狀採訪使者狀方函詣採訪使者門下採訪之軄甚衆故林侍宸醮格於上八位之旁只設此一位如廉使察官之任可謂要緊使者之稱亦不爲輕乃天中之名稱如是非可攺也如應元保運眞君則宋朝所上尊號爾近世者世人納諂於上眞乃除去者獨稱採訪使甚失禮也殊不知天中只有採訪使者不曽有採訪使俗輩以世法料度而尊之誠當革去雖一字之間礙理深矣具法位臣姓某臣輙冐不原之誅仰瀆至眞之軄惟祈憫濟省録微忱謹據入事須至録狀申聞者右謹具申九天採訪使者應元保運眞君恭望眞慈俯垂矜允特迂仙仗俯眄齋壇録其精禱以上聞畧此違科而普宥曲加成就力賜提携庶幾齋福被於寰區玄津浹於幽顯拔度亡過某人等䰟及五道三途四生萬𩔖一切沉靈滯爽永辭長夜超出重隂録本聚神返生證性以致考停於九地役息於三途動植均庥飛沉咸泰某干冒眞威不勝偟懼謹狀救苦大惠二眞人狀方函詣大慈大悲救苦眞人門下具法位臣姓某臣竊惟科教之設利濟爲先某雖愚蒙敢忘効軄況奉䖍禱理合敷陳某比據入事須至録狀申聞者右謹具申大慈大悲大惠眞人大慈大悲救苦眞人恭望眞慈持垂敷奏東極青宫請降道㫖普敕三界頒告諸司專遣飛天神人遍下九龍符命分靈救苦應念施仁釋冥府之拘囚燭夜臺之隂翳拔度係薦亡故某人等䰟及五道三途四生萬𩔖一切沉靈滯爽解除𡨚對開度沉迷聚本生神知根復性早陟生生之境長辭寂寂之郷即使齋福被於寰區玄澤覃於幽顯以至舍情抱識賦質立形咸遂昭蘇悉歸康樂仍冀靈驂下邁俯駐壇場成就善功以全齋事某干冒眞威不勝惶懼謹狀九天司命狀方函詣九天司命官具法位臣姓某某仰恃寛恩輙攄凡愫某謹據入事須至録狀申聞者右謹具申九天司命眞君伏望眞慈曲垂矜允特迂眞馭暫降瑶壇少鑒眄於齋修特保全於愚陋俾無魔障成就善功即使福被幽冥澤周寰宇所有係薦亡故某人等䰟及五道三途四生萬𩔖九州分野一切孤䰟俱頼陶成盡祈憫濟上聞九極潜降百神特下命章由三元而肇粹齊唱恭諾受九炁以結形再造隂陽重資性識盡陟化生之境並超沉滯之郷某干冒眞威不勝惶懼謹狀三界魔王狀方函詣無色界魔王宫具法位姓某某濫綴法僚乆依靈䕃尚祈寛宥録此誠祈某比據入事須至録狀申聞者右謹具申慾界大魔王色界大魔王無色界大魔王伏望聖慈曲垂矜允特迂幢節暫届壇場成就善功證明齋禱仍乞請命差降飛天神王大神靈寳官屬玉童玉女三五功曹左右官使者五帝直符監齋直事洞玄靈寳法籙中合干官將吏兵下赴齋壇輔佐行持營衞壇界謄章進表錫命頒符拔度係薦亡故某人等䰟及五道三途四生萬𩔖一切孤䰟滯爽悉加保舉度品南宫幽爽承恩俾盡超於沉滯生靈蒙祐庶咸迪於壽康某干冒聖威不勝惶懼謹狀五帝魔王狀方函詣青天魔王宫並同三界魔王狀式右謹具申中央黄天魔王北方黒天魔王西方白天魔王南方赤天魔王東方青天魔王黄籙院狀方函詣下元黄籙院具法位姓某某濫以庸資乆臂上法幸蒙覆育獲被軄司敢頼優容輙伸披愬某比據入事須至録狀申聞者右謹具申下元黄籙院主宰髙眞伏望眞慈曲垂矜允特迂仙仗俯降齋壇成就善功保全末學仍乞敷奏天闕取㫖差降黄籙院合干官將吏兵下赴行司宣傳符命謄達章詞拔度係薦亡故某等䰟及五道三途四生萬𩔖一切幽䰟滯爽出離隂境祗赴道場省悟沉迷蠲除報對返生善境永沐眞休即使齋福被於幽顯玄澤周於動植十方清泰萬𩔖昭蘇某干冒眞威不勝惶懼謹狀南昌上宫狀具法位姓某某庸謬不才冐昧忝職功微過重𥙷復無階恬非輔賛眞風豈能少酬素志輙披丹愫上瀆髙聦某比據入事除巳依科崇建外今以建齋第二日夜普行錬度三途五道萬𩔖四生一切應度幽䰟至第三日夜錬度係薦某等䰟各遂超生咸祈度化某一體効誠不敢妄分輕重但以凡愚末學未能深洞靈機従籍符章慮難通感須至録狀申聞者右謹具申朱陵火府南昌上宫主宰髙眞恭望眞慈曲垂矜允特迂仙仗俯眄齋壇成就齋修普行濟度仍乞申命官童將吏合屬衆神布炁分靈依期下降將到壇係薦某等䰟及五道三途四生萬𩔖一切應度沉䰟滯𩲸特加整育普賜陶鎔聚二炁以重和肇五行而再造知根復性返本還元永斷執迷成臻生化庶九野無幽沉之鬼三徒罷謫役之勞動植均休顯幽共慶臣干冒眞威三元眞君狀狀謹申上上元唐眞君門下具法位姓某臣謹據入事今取某日某時進拜某章逐一開寫謄諸誠悃上祈玄應但以某早霑靈澤乆綴法曹雖粗習於奉教行科未深明於飛神謁帝慮章文之難御致齋事之有虧爰𨽻司存理須禱請須至録狀申聞者右謹具申下元定志同眞君中元䕶正葛眞君上元道化唐眞君伏望眞慈允兹申請特迂仙仗俯降齋壇統率章奏衆神關告剛風上吏掃清雲路通達章文升某凡神上朝帝闕庶使齋誠母壅天貺廣覃萬𩔖昭蘇六天清泰某干冒眞威上清靈寳大法卷之三十
