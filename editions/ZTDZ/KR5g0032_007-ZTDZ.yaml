front:
  text: 上清靈寳大法卷之七獸八
  hash: sha256:af4c2c192c59cc019f9805301063e6c500819173de7b9699de0cdfbc64a6b5b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_SJB_007-310382a, image: sjb/31/310382a.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金𠃔中編五芽内鍊品五芽者五炁也在天爲五老上帝在經則炁結成文是爲五芽眞文在五方則五常即東方青帝靈威仰南方赤帝赤熛奴西方白帝白招矩北方黒帝叶光紀中央黄帝含樞紐是也在乾象則爲五星在地理則爲五嶽在事則爲五常在物則爲五行在人身則爲五藏修靈寳之道洞房之法餌五方正眞之生炁以錬凡軀也五芽之法請五帝五童降身及佩眞文使其神居五藏之中爲𦤺五芽之精當於四音而行之常以立春之日雞鳴入室東向九拜平坐叩齒九通思青帝五方之五帝也青帝以其司春主東方之生炁故也長九寸頂青玉冠九炁青羽衣駕蒼龍之輦建頴旂從甲乙胡老之官九十萬人來降須㬰化生青炁如雲貫覆己身從己口入直下肝府又思木星煥明在東方照己身便開目念呪九徧吞東方眞文一十二字呪曰九炁青天元始上精皇老尊神衣服羽青役御天官煥明歲星散輝流芳陶漑我形上飡朝霞服引木精固養青芽保鎭朽齡臟腑充溢玉芝自生延年億紀顔返童嬰五炁混合天地齊并東方眞文一十二字東方青芽服食青芽飲以朝華常以立夏之日雞嗚入室南向三拜平坐叩齒三通思赤帝南方赤帝司夏主南方之生炁後方並與前同長三寸頂赤玉冠衣三炁赤羽衣駕丹龍玉輿建米旂從丙丁越老之官三十萬人來降須㬰化赤炁如雲貫覆己身從己口入直下心府又思火星煥明在南方照己身便開目念呪三徧吞南方眞文一十二字呪曰三炁丹天朱宫靈童元始上帝參駕赤龍丹羽飛衣錦帔光明驅䇿靈官運道隂陽三炁吐輝漑我絳宫赤子保鎭鍊芽飾容朝飡朱景玉芝滿充回停劫年朽骸及童長齡天地永享無窮身生水火變化百方南方眞文一十二字南方朱丹服食朱丹飲以丹池常以立秋之日入室西向七拜平坐叩齒七通思白帝理如前式長七寸頂白玉冠衣白羽衣駕白龍玉輿建素旂從庚辛玄老之官七十萬人來降須㬰化生白炁如雲俄覆已身從已口入直下肺府又思金星煥明在西方照己便開目念呪七徧吞西方眞文一十二字呪曰金雲七門浩映西華中有素皇元始之家參駕白龍七炁峨峨徘徊玉門散精朱霞金星吐輝芳芝滂沱玄奥我身養我素芽明石鮮光萬劫不殂服以流泉飡以太和九天上帝給以玉華保年駐白顔景敷羅長存天地三光同遐西方眞文一十二字西方明石服食明石飲以靈液常以立冬之日雞鳴時入室北方向五拜叩齒五通思黒帝長五寸頂玄玉冠衣碧羽衣駕黒龍玉輿建皁旂從壬癸羗老之官五十萬人來降須㬰化生黒炁如雲似流星之光覆已身從口入直下腎府又思水星煥明在北方照已身便開目念呪五徧吞北方眞文一十二字呪曰北方玄天五炁散靈上有大神始老元精駕龍建旂遊冥上京是曰元吉慶雲敷榮飛芝流灑滂沱四盈玉女玄奥漑我身形腎宫充鎭朽芽堅生五府納眞上通神明五老降接仙道早成變化水火衣服羽青飛行太空遊造紫庭夀同三景萬劫長齡北方眞文一十二字北方玄滋服食玄滋飲以玉飴常以二分二至曰入室向五方十二拜叩齒十二通思黄帝長一尺二寸頂黄玉冠衣五色羽衣駕黄龍玉輿建黄旂從戊已蒼老之官十二萬人來降須㬰化生黄炁如雲覆已身從口入直下脾府又思土星在中央照我身便開目念呪十二徧中央眞文十六字呪曰中央大山元炁徘徊上有元老總統四靈參駕黄龍五色羽衣運道九天輪轉璇璣煥明七星流光散輝玉英芳芝流溢回飛淘漑我身肺府光開養芽飡精萬神總歸檢䰟制𩲸仙鍊八威表裏洞清常生不衰通眞達靈升入大微中央眞文一十六字中央戊己昻昻太山服食精炁飲以醴泉右呪畢各以方數取炁咽津便服眞文常服法毎以雞鳴陽光始分東方向叩齒如其方數摩兩手掌令熱以手摩拭面目如其方數念呪自東方起一周而止東方青芽服食青芽飲以朝華便以舌撩上齒之裏舌底唇三過嗽口令玉泉滿口而咽之九過又引青炁九咽令鎭肝中南方朱丹服食朱丹飲以丹池便以舌撩下齒之裏舌䑛唇三過嗽口令玉芝滿口而三咽之又引赤炁三咽令鎭心中中央戊已昻昻太山服食精炁飲以醴泉便以舌撩上下齒表裏舌䑛唇嗽口令玉泉滿口而咽之又引黄炁一十二咽令鎭脾中西方明石服食明石飲以靈液便以舌撩齒上之表舌䑛唇嗽口令玉芝滿口而七咽之又引白炁七口令鎭肺中北方玄滋服食玄滋飲以玉飴便以舌撩下齒之裏舌䑛唇三過嗽口令玉芝滿口又引黒炁五口咽之令鎭腎中右畢叩齒三十六通咽炁三十五過又念都呪白石巖巖行泉源湧洞似玉漿飲之則長生夀命延長呪畢以舌獠上下中央令玉芝滿口而三咽之引炁二十五過拯炁而咽之其道都畢甞觀靈寳之道隱於洪濛之始肇於溟涬之𥘉蘊奥難窮妙莫能測中古以降方立教垂文正經之中備有萬法及其功成事著則由學者自得之五芽之法採五方之生炁錬五藏之英華炁之渺茫未易有得於是服眞文以召之炁結成文以此引彼也建齋設醮拜表謄章布炁書符祛妖却妄以斯爲首錬除隂翳消隂育陽與三晨之輝相須而用人身之五藏實穢物耳至若存肝出青炁肺出白炁之類乃存錬之法而非五芽也降東方之生炁挹木宫之朝華下浹兆身鎭錬肝腑乃五芽之義以五方之五炁錬五藏之五神久假而不歸烏知其非有也積錬之久人之炁合天之炁人之神合道之神亦錬神之道也今所編五芽眞文悉皆祕在上經不同常術學者深洞其旨則可勤而行之天台法中祈恩謝過第四十一品乃爲之說曰靈寳有赤文祖炁天之靈寳也入人身生五色靈芝乃𥼶之曰東方青芽者肝也南方朱丹者心也西方明石者肺也北方玄滋者腎也中央戊巳者脾也以舌捲津分方而咽之謂首爲太山終焉以十二時咽炁名換骨易形之法旣不載祝辤又無眞文竊取五芽之義轉其說於他𡵨乃稱服咽炁液火應水朝爲子毋夫婦之圖取丹經中之餘論而不全者也旣稱天之靈寳又直指五芽爲五藏是說即皆不可爲法也三宫修誦品度人上品鬱秀光芒上消天灾下禳地禍外濟庶物内錬百神行用之門以專精爲首修誦之法以存念爲先故使炁息調平音聲和暢想三炁之蓊鬱㑹百神之森羅於是可以内錬其躬外浹於物若語不出口耳不聞聲謂之黙誦自始及終存念並依古法也入靖焚香定心平炁收光内視萬慮不干端坐直身毋倚側毋僂背俾牛車之路不屈龍虎之炁綿綿然後誦經各以其事之重輕所用之内外有神誦心誦炁所謂上中下三田也此外有意誦並有所主或爲人度厄消灾或爲巳祈恩謝過以𦤺調平炁候保福帝王祈雨禱晴濟時拯物遷升滯爽普度幽䰟凡有緊切悉當入室黙誦神文方行章醮存思次第詳具誦持存思品悉合如法初一徧誦序第二徧止自經始十徧爲一過誦畢納官百神守位宻陳情悃出宅升神也係第四緯𠃔中所編靈寳毎品中相關渉處巳略叙之矣獨天台法書中内誦編在度厄消灾第四十品末乃以太乙司命桃康無英白元尊神等各書靈書千徧又一說則分三田内誦乃是聞其名而不得其理却云正月於上田七月於中田十月於下田又云萬神俱誦以𦤺齋醮禱祈書于䟽狀直稱内誦洞經一千卷以獻眞薦亡殊不知大洞眞經三十九章毎章有二符此經乃屬洞眞部度人經法中四十章是釋度人經之用爾古者以爲度人一卷内隱洞經之妙非徑以度人爲洞經而爲上帝之前指度人經中之文爲洞經可乎又一說其至玄至妙弟子傾家資以奉師而後得者其徒以爲世莫得聞自稱上道者也其法之略曰想巳身爲枯木大火焚蕩和氣化成眞人收神上田入太淵宫中歩斗作用於是誦元始祖炁洞經至於錬度只以上田爲天帝之居肺爲東井頭中赤天出火腎爲眞水九曲之暢爲九幽千䰟萬𩲸皆於此度化所謂元始洞經傳出他郡者止於度人經中取一叚而爲之天台祕而自行者乃如𥼶氏梵語呪四十八句計一百七十六字泥丸中啓奏上帝等事皆不出身中以𦤺朝眞不拜謂天帝不離泥丸故也不知古法中有不叅紫神之法本意爲行坐功而不睡者言之行科奉教非此例也又况未離世網其傾倒泥丸有甚於拜者矣黙誦一節古法有之今攺稱内誦非也且云萬神誦之事出無據三田各有所主彼分爲七月正月十月則非也彼不知心誦炁誦神誦口誦理旣不同存神念眞亦非天台所謂萬神也古法黙誦皆全誦本經其中包羅甚衆澄神錬炁可交眞靈也今若獨取經中一叚以備黙誦亦不必易名稱洞經也迨至捨本經正文而撰出梵音胡證則妄之甚也按度人經肇於古初天眞皇人書其文以爲正音内譯而用世書亦在漢武帝時及明帝夢金人而𥼶氏之典方入中國於是始有梵語今以𥼶氏胡音稱爲度人經中祖炁之文雖三尺童子亦將失笑矣其臨壇行事則端坐内觀云金光之中現出天書多只一字法師自稱只見一字不曉所謂亦不敢漏泄事過之後却以此一字隨己應之事解其吉凶皆不出㸃畫之中有數十字例皆如此縁其法書初焉稱光中現出靖名等說其妖妄恠誕治於内誦經之覩光中則見字終至於㑹鬼神入靖治事吁履霜堅冰之漸也一念之萌出於不正千途萬徑歩歩歸邪恐其下流無所不爲矣然後誦之訣事當禁祕不可輕宣若全隱其機恐學者不得其門復入流邪僞之域故寓其奥於此以俟學者之自得也上丹田泥丸也中丹田絳宫也下丹田也玄關也其法有神誦心誦炁誦也口出言辤耳聞聲韻是明誦也口不出言耳不聞聲是黙誦也黙誦旣有心炁之不同又有意誦之名例悉存身爲元始坐空浮五色獅子洞明内外如居赫日光中依法誦之皆有所主調正乾度上消天灾保鎭帝王延洪國祚以𦤺爲父母延年益筭請福消愆是一例也爲人爲已謝過祈恩保命延生禳灾度厄是一例也上資九祖普及衆䰟濟拔幽隂一切追薦是一例也召攝施用收治行爲是一例也此外非可盡述矣洞照幽微品此係八緯中第五緯靈寳玉鑑全書另載紅杏墨黒磨眞襪臈靈寳興生轉獨𨽻遷可韓明功都成切角正聚䰟攝都功聚䰟招八方捷疾使者天地神祇萬靈同歸合天地勑先結三塗五苦訣念呪取東南方炁吹鏡上了以筆自乾方㸃一㸃八方計八㸃呪曰謹請乾坎艮震巽离坤兊收攝八方無道邪鬼入吾鏡中見形急急右取八方炁吹十日共覩日月受持不勞神炁來者其中見形移景通光照元始律令道君勑文召日光童子月光童子星光童子開光童子運三光玄斗日月之精化爲六通神光照徹十方世界萬景千眞移日面前見形占人卜物未來未兆通神應靈勑古念呪取三光中一炁吹筆或手指筆用朱指用麻油於手中冩符一道原闕符令吹炁再念呪取炁吹如此三次見光一道洞見幽明及未然之事仙曹按局洞玄寳鑑紅杏墨黒磨眞襪臈靈寳右先念呪於空中書本師心印一箇以左手望空撮入手中五方炁吹令人吹了再壓如此三次令見赤黄白三色了又呪曰謹請降眞召靈符使疾速下降又取天門炁吹見二符丹色見於掌中符在臨壇符法品又呪曰神風鼓吹玉字琳琅又取東南炁吹見二符揺動又呪曰謹請東方啓道童子爲吾速降五方並同又取五方炁吹見五方童子方可一一召攝依法施行靈寳洞玄照天地降炁日月合形天上地下某某某處見形右天地炁吹如常法速度亡䰟訣凡臨壇按治鬼邪務在存亡俱獲利濟先爲破獄呪曰無上玄元太上道君教臣行符照破幽獄罪䰟出離急急如律令勑右呪出九清梵唱經中面天門黙誦九徧次召亡䰟即速得亡䰟離苦先念水錬呪曰巳枯復榮已滅復生得生天上更禀太靈九天之勑反復胎嬰穢累蕩除𩲸尸反生右以水一器正北叩齒九通思玉童三人玉女七人咽津七口呪之七徧灑其䰟即火錬呪曰日月光華徘徊洞陽流火入器錬化隂芒尸穢消滅萬炁混康徑離五苦飛升天堂右以火一器正南叩齒三通如前思想呵炁三口呪九徧取酆都山眞形火化成灰呪曰元始符命制魔奉行保舉亡䰟度品南宫酆山消燼三官解刑赦縛𥼶業受化更生隨品度錬上登福庭呪訖以舌拄上腭存身爲元始天尊㸃誦隱語一徧存金光滿口雙指玉清訣吹紙徃東北方放訣其䰟立得上生朱宫隨品受鍊乃生福庭𠃔中自本法戒律啓並依古書編次至元綱流演品朝元入靖品誦持存思品玉札靈章品三晨芒耀品五行正炁品五芽内錬品三宫修誦品皆行持之士修存服餌𦤺眞召靈之本源也内功旣足則外當及人愈疾除邪拔幽濟顯爲立功之先務近人不知體格乃爲靈寳大法專至開度復别𥙷法階以備祛治豈知靈寳爲中乗之要法兼濟死生之徑途何事不關無施不可然顯幽一理人鬼無殊受詞之初竊須審量事體酌詳輕重或妖恠精邪横侵生𩔖逆天無道情在不原固冝録奏上玄關聞合屬滅形絶𩔖誠不爲慘其有幽䰟滯爽抱恨衘𡨚餓鬼窮䰟失依之嗣沈迷而超生無路託附荏苒生民隂炁襲人灾痾或作冝先究患身之形氣以至受祟之根源非市道魔禱姦僞之徒妄意揣量故繼之以照召之法考其實跡鞠其姓名毋信僞辤必窮始末如情在可憫䰟𩲸幽沈合依古儀用速度亡䰟之法存神靜志黙誦靈文如式開度然後焚化酆山眞形或告行一二超度符命差官將吏兵合屬曹局隨業受生尤其盡善矣抵有力之家大建善功廣崇齋直然而召攝鮮驗超度難期今於行持頃刻之間欲遽度亡䰟於一經一呪之内豈不難哉夫建齋啓事移檄召䰟未易輕也先要髙功練逹科教洞明正理次則移箋奏不礙舊章又在齋心堅切内外一志立壇蕆事不缺典儀更得所度亡䰟靈識生前修檢罪戾不深庶幾祈告感通見形受度或一二事之窒礙則報應寥邈矣今鬼祟至於纏及生人若非抱恨不伸必是無依失祀報對旣以結證隂府不復拘留儻識見之非髙多迷蒙而未覺浮遊爲厲散蕩興妖於此之時法官能開悟以理訓戒以道更假上眞之教典副以端黙之精誠呼吸之間幽䰟獲度誠非虚妄生者可免疾患之纒死者遂脫沈滯之苦若家非匱乏而未度靈者難從此科自依式修崇可也天台編靈寳玉鑑一節入五行正炁品又以雜呪混於其中乃無速度亡䰟之目使古法中之美意不復可見故今從舊格而盡剖其端緒當知古人治病祛邪欲顯幽俱利也學者所當留心耳上清靈寳大法卷之七
