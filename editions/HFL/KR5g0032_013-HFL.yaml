  text: 上清靈寳大法卷之十三畫四
  hash: sha256:743327a2b64b009ab9f74b3165a2e3bd8ea7e2065f17814bca396e457e721c0f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_013-001a, image: hfl/0965/0965-088.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金𠃔中編濟錬幽䰟品謹按中乘之法洞玄九眞之道乃太上大道君以延康劫初禹餘天上所出其經則洞玄一十一部至漢靈帝光和二年太極眞人徐來勒以上清寳經三十六卷靈寳勸戒等經三十七卷授付仙翁葛玄後世稱太極左仙翁者是也洞玄之品靈寳之道至斯而大昭於世仙翁實爲傳教之師眞也而近者傳行祭錬之法皆稱葛仙翁祭鍊或者又去仙翁字而止稱太極祭錬者尤爲礙理夫無極然後太極則天地之始非可以爲法書之名若言太極眞人則徐君也若言太極左仙翁則葛君也若無仙翁眞人稱則太極二字決不可獨用於此及觀諸家所稱仙翁祭錬之文諸方皆以生天寳籙爲主其言辭科法悉是今人之體格而徑以仙翁之古科則不然矣徃徃世人問仙翁甞以祭鬼而立功遂採其名而編集成書殊不知仙翁生於東漢其文辭體格與今不侔然今之所存依法中典格敘述而用之有何不可又豈特立異名而後可以利濟哉人能澄清志慮整肅形神䖍恪奉行則隨誠報應或臨事慢易存念乖違雖親奉天尊之玉音亦難弘恩於幽壤前後記載所傳耳聞目覩因此書成功者甚衆學者可以究心允中所見祭錬之書不止數十本雖大體相類而其祝辭白語多駁雜其聲音不比臨事難讀今所編符呪行用皆出靈寳諸法中受天心正法以下皆可通行而啓祝行用之言辭則允中之撰集也乃所以廣其事而不至拘執若初行而欲奏聞上帝關告冥司則直辭具述欲發願祭錬孤䰟而巳儻云奉行仙翁祭錬大法等語皆渉無根縁此乃法中一事爾行持之士散施符藥以濟生民祭錬鬼神以資幽爽所當爲者唯在精專久而已近世行持此者甚多銳於初而怠於終者皆是也或遇三元八節四赦庚申甲子生辰旦望上七等日爲之者甚佳但萬一其間一二有不可免之事奪之則因此而敗美意亦有至期之夜鬼神守待於其地致人驚懼而廢初志者有之若欲持久而可常莫如不拘日分隨時修爲或一月而行一次或二三次或有暇而併爲之或偶遇良日亦爲之並不爲定格則在已無失期不滿之念在鬼無徯望待哺之期兩皆無拘其功愈重不執不滯乃可久行或者不以此說爲然欲剋日候期者自可從便今毎行而不用申奏文移貴其簡易應大建斛食普度沉魂合從本科非此例也造斛毎用米一升或二升至數升皆隨力製爲淨飯切忌葷穢乗熟裝成一小斛不必用麪食之類有力者自從其厚於其日晚間方造合用符三道降召符眞文五幅酆都山形三五本靈書中篇十本生天籙十道紙錢三五貼淨水燭或燈隨力香已上合用之物愈多愈好若隨力建功當用前件也遇行祭錬須於其日晨興盥沐終日齋潔昧爽預行口奏先祝香道香德香無爲香清淨自然香妙洞眞香靈寳慧香超三界香三境眞香滿瓊樓玉京徧周天法界以今恭謹焚香供養三清三境天尊昊天上帝北極大帝東極青宫慈悲太乙救苦天尊南極長生大帝東華木公上相青童道君白玉龜臺九靈金毋元君度人不死尊神九天好生韓君丈人眞君九天司馬大神南上司命司録延壽益筭度厄尊神靈寳五師眞君南方丹天世界朱陵火府南昌上宫主宰髙眞錬度官君將吏北魁玄範府神虎攝召官君玉女神將吏兵恭望天慈曲垂省録玉華散景九炁凝煙香雲鬱羅逕衝諸天侍香金童傳言玉女上聞帝前令臣關啓咸得如言具法位姓某輒伸凡愫上瀆天聦伏念臣濯質清時叨承道䕃無功及物有罪積躬僣欲濟度於幽明或可超昇於沉滯謹於今日夜就某處備置淨食祭施三塗五道十類四生一切孤䰟臣擬書行太上生天寳籙水火眞符印給酆都山形普行錬化用濟沉䰟但臣夙禀凡資未明眞理仰祈矜貸庶可感通恭望天慈俯流生炁容臣書篆許以頒行仍乞天㫖告下城隍社令隂境𡨋關典祀神庭黄泉蒿里掌録魂魄應干神道主執曹僚悉令依應開扄啓閉放釋罪魂定於今日夜亥時來赴壇筵享祀受錬仰霑玄澤以返本眞拱俟天恩特垂昭報臣誠惶誠恐稽首頓首謹言如行天心正法即除去神虎將吏却入太玄本際童子六甲開道使者統兵助法神將吏兵至夜起告亦同次白將吏靈寳大法司如行天心正法可云北極驅邪院以今關告執職萬神下元黄籙院開度官君將吏南昌受錬官君將吏北極玄範府何喬二大將七眞玉女三部使者追攝吏兵當處里域土地社稷正神疾速赴壇有事啓白存將吏至諸司官將悉以來臨當職恭佩靈章奉行大法立功爲本濟度當勤見取今日夜就某處備置食筵薦資孤爽除已啓聞上帝髙眞告行符章外今請諸司官將衆神遍詣冥關幽獄夜府隂宫嶽瀆靈墟城隍社令黄泉蒿里主録亡魂應干合屬去處拘集三塗十𩔖五道四生及郊野無歸遊魂飛爽有祀無祀善終惡终一切應度孤䰟等衆剋於今日夜亥時悉赴某處伺候祭錬正品超生火急奉行亟切昭報澤覃鬼趣皆自神功急急奉行次書篆符太上生天寳籙此籙誥文式任意冩於後或於籙下開度五道四生孤魂滯魄出離幽暗隨果徃生主者遵依符命奉行太歳年月日告下具法位臣姓某告行端坐存思救苦天尊在懸空之中大慈大悲大惠眞人救苦眞人左右侍立次想南斗蓋頂化身爲眞人狀然後見天尊遣玉女乗寳光持寳籙下至面前低聲誦中篇一徧便落筆書篆將唵吽吒唎四字重疊書之口念呪曰无上玄元太上道君教臣行符照破幽獄死魂出離急急如律令毎用十道毎道皆依式書篆之次書水火符各一道並畢再誦中篇三五徧以符篆香上熏過奉安淨所至夜用請眞火符太陽炁離訣黄紙硃書日䰟呪日䰟珠景照韜緑映迴霞赤童玄炎飊象急急如律令請眞水符太隂炁坤訣黄紙黒書月魄呪月魄曖蕭芳艶翳寥婉虚靈蘭鬱華結翹晝四六淳金清瑩炅容臺標酆都山眞形符巳見於錬度品中次持誦靈書中篇三十徧有暇多誦尤佳變食符淨夜行事於空逈處安斛食其斛食邊不用燈燭却安卓子於數丈之外有隙地稍逺尤善卓上却安香爐浮水燈燭行持蓋以食祭鬼不宜人氣及燈燭逼近今人多置閙隘燈燭之中大爲非便次法師焚香臨案行事啓聖祝香啓聖位並如清旦式云恭望天慈證盟開度玉音攝炁靈風聚煙紫虚鬱秀輔翼萬仙執籙把籍齊到帝前令臣關啓咸得如言具法位臣姓某不避靈誅冒干宸聽願垂鑒映遥賜證盟伏念臣猥以凡資濫司至化輙忘微賤敢有披陳靖惟三途九地之中沉滯十𩔖四生之衆善功罕遇玄澤難霑寂寂幽關欲自新而無路茫茫苦海念超脫以何由固其夙習之所招實在迷途而可憫自非皇天眷宥大道慈憐曷俾沉䰟得離隂境臣謹依眞教䖍備食筵告行超生錬化之符章持誦大梵靈書之祕典用資萬𩔖普度四生聊輸懃懇之誠少拔幽沉之衆恭望道慈省録天造矜容特降兩曜之英華宻布五行之正炁付臣冶錬許以宣行煥幽暗以開明拯沉淪而升度臣某下情無任祈恩俟報之至誠惶誠恐稽首頓首再拜退復本位次焚召符及眞文變神召將存想行持靈寳大法司關告將吏如清旦式添五道大神當處土地里域社稷正神黄泉蒿里一切主者火急赴壇請詳照本司巳行啓奏上帝及先來關告事理即今拘集九州分野五道三途十𩔖四生孤䰟滯𩲸疾速赴壇祗受祭錬霑領天恩證品超生以時昇度急急如上帝律令次變食用眞文五道於斛之四畔隨力燒之存五方生炁下注斛食燒符望空吹散於斛上須早變成天廚異饌斛食廣博崇髙或不行靈寳法則用變食符代眞文用之毎方微聲誦中篇一徧法師逺立行攝召如自行則宻吟太微迴黄旗無英命靈旛攝召長夜府開度受生魂謹伸召請天道之衆神道之衆人道之衆地獄道之衆餓鬼道之衆畜生道之衆胎生之衆卵生之衆濕生之衆化生之衆普天之下六合之中有主無親合靈抱識三途九夜萬狀千形或男或女之身逺化近亡之衆沉靈滯爽一切孤魂普召來臨受兹薦拔伏聞妙道隱沉運隂陽而立極至神恍愡鼓造化以分形旣奠兩儀而生萬物普出陶鎔之内或歸覆燾之中然而民物漸繁俗非朴厚洪荒巳逺世益澆漓冨貴貧賤之變遷爲修異習禍福盛衰之倚伏奔走硃途爲萌善惡之分遂有升沉之别今古遥遥而旣隔幽莫寂寂以無窮倘未能隨業受生終不免任縁淪滯故登渉之流常少退墮之輩頗多是以貧賤異倫死生同等生𠔃旣極於富貴殁也當脫於沉淪若非效職於仙曹則必返躋於貴胄其奈功分厚薄德有淺深或稽舊洛之遊尚駐幽都之駕若乃職分帥閫位列戎行惟知奮力於忠勤豈顧身膏於草野妻兒巳逺祭祀不聞形質無歸精魂何托或遺家就學或挾篋㝷師干禄求名偶乖素志懷才抱藝未副初心豈知日月之流不覺限期之及間有身騰仕路位列朝班或功名已極而身危或爵禄未隆而數至或出使於他國或受任於異郷偶致身命之難全或亦妻孥而莫保固有絶塵而披羽褐削髮而入空門以期玄籍之書欲冀性宗之悟其如進修有分安能一一俱成未免延駐無由又恐茫茫失托或棲巖隱谷晦迹消名避世以無求窮居而獨善豈謂年華易度光景難留蕙帳還空歎山人之巳徃松牎旣寂嗟處士之何歸幸有生于富貴之家出自膏粱之族貨財燔已聲色逼人事過成空回首悉非我有數窮必逝留形難假人謀有因身口相縈遂爲貨財所役或商或賈忙忙毫髮之徒勤以病以亡寂寂郷關之永隔惟人以食爲命故農以耕爲生沾體塗足之甚勞東作西成而粗給倘妻兒温飽雖老死而葬祭以時偶骨肉孤寒因淪落而魂靈不祀以至功居一藝業在九流役役以度朝昏紛紛以歸輪轉棲遲故里或得正終飄泊異郷多成客死或昧於擇術居屠宰之行或偶然失身於倡優之部及至今日之幻化寧知前路之升沉況林林而生緫緫而衣或鰥夫寡婦或獨老孤兒或足斷手殘或目昏耳聵或口瘂而語言莫辯或性愚而菽麥不分或服毒不救而亡或生産未分而死或遭時疾或䧟國刑或因殺闘而客主遽傷或因呪詛而彼此不利或赴水赴火或自縊自刑或石壓樹摧或蛇傷虎噬生𠔃萬𩔖死也百端丘隴森森前之朽者莫辯墳塋疊疊後之來者何多青山莾莾爲誰家白日昭昭非我晝露冷月明之夜寂寞孤墳風悲雨暝之郷淒涼空谷或巳焚尸柩散蕩遺骸未悟死生浮遊孤爽人世音容之巳逺泉郷愁苦以無窮啾啾之聚哭何悲漠漠之幽沈未度與夫精怪魑魅魍魎隂靈鳥獸蟲魚胎卵濕化三途十類五道四生普天六合之中四海九州之内聲述不盡品𩔖未詳一切孤䰟萬𩔖鬼爽伏願仰承道力恭仗眞科整肅儀刑扶携而來就食精專念慮率勵以共朝眞受兹祭錬之良縁赴此㓗誠之法㑹普伸告召想巳來臨呪施食斛奉爲孤䰟上資雲路徃生仙界念玉清惠命呪稽首明慧虚無尊稽首皈命重玄主裁成天地无德稱悉爲衆生作恃怙慈悲五道轉輪回哀救三途地獄苦皈命金闕天中尊皈命六道慈悲父皈命玉清无上尊巳離生死長綿綿出有入虚無所待能令枯朽變成仙千劫萬劫難一遇爲衆廣說業因縁回骸起死永長存使其形神無變遷破獄呪茫茫酆都中重重金剛山靈寳無量光洞照炎池煩七祖諸幽魂身隨香雲輿定慧清蓮花上生神永安昇天呪功德金色光微微開幽關華池流眞香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寳㫖目在天堂遊咽喉呪浩晶生法氣氤氲凝天中兩曜共澄徹五緯交相通三光煥巳明寳炁盈三宫帝郷㑹九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫壽無窮三光流精法食呪妙道生一氣氣中分隂陽凝化日月星燦然流三光九華合九道八色怡八房煥爛洞眞體流晶歸大芒下生淵泉宫上列無何郷縱體復非迹歘然都相忘七寶流精結混沌雜華房嚥服九雲散此樂殊未央玉陽法食呪玉陽正眞炁妙道三景分元和唱靈音八㑹敷瓊文五老嚥丹澤飄飄乗景雲大聖諸天衆駕龍飲玉津三五定生籍遊戯太上京華晃朗无際携手朝玉宸加持法食呪回首仰元羅合景挹靈芒拘魂制七𩲸思臍定中央行住履虚无寢息宴玄房飢飡黄碧花渇飲瓊林漿神旌命大魔合體鍊眞光復照觀太空長在空中遊圓通泯波際眞花靡終期杳杳無終始行者當明知寂𡪹忘理教應運蕆弘䂓鑑道不自超要當先所施㑹歸無二處隨心自合離生魂育魄呪靈芝無根衆化之原中凝七魄上結三魂二十四眞出入無門杳𡨋之内恍惚元精隨劫存亡逐炁而生外凝混朴内養七眞五神植華三台敷榮紫霞素童返胎歸嬰騰雲而升跨霧浮空中有玉眞號曰神功左挾无英右衞白元玄獸遏後丹禽擁前上浮翠蓋下擁金蓮香雲凝空甘露无窮用之无盡㝷源不終髙功再白上來呪施法食演誦靈文想被殊恩悉皆飽滿今請澄清一念整聚本眞各赴壇前受兹錬化次變火池焚眞文符入香爐中可燒烈火豐香誦中篇一徧存身中絳宫赤炁騰出漸盛徧滿身外注入爐中化成眞火宻啓東華上相木公青童道君曰宫太陽帝君伏乞特降正眞陽火下錬孤䰟存絳宫自空而下注入爐中化成廣大火池烈炎竟天謹召南昌受錬司錬度官君將吏火池主者火錬神將吏兵一合下降引領到壇五道四生一切孤䰟並入火池依法冶錬便存符使引䰟入錬火錬呪炎神炎神火鈴火鈴上通紫微下徹黃冥却穢錬䰟赤帝之靈炎精二神三台流光錬胎易質魄錬魂康穢炁殂落乗煙飛揚隂炁消息陽氣混康精神益滿洞入火郷混合九炁緫契虚皇昊天有勑流金振芒九元煥落利貞無疆須㬰見衆魂出火巳成全潔之身次變水池焚真水符入水盂中誦中篇一徧存下田黒炁騰出漸盛徧身注入盂中化成眞水宻啓白玉龜臺九靈太眞金母元君月宫太隂皇君伏乞特降正眞隂水下錬孤䰟存眞水自天而下徑入盂中化成廣大水池謹召錬度官君水池主者水鍊神將吏兵引領孤魂等衆並入水池如法濯錬存將吏引魂入錬念水錬呪龍漢蕩蕩无形无名渺渺億劫黃道開明神清朗耀九炁吐精玉虚澄輝太霞髙明玉皇開化溥度天人三元道飬二象攝生朽樹故根巳枯使榮蠢動蜎息長生化形懐胎含孕俱得生成亡者命過魂歸三清魄受錬度南宫飛升今曰大𠮷皆得光明五帝鑒映普告萬靈天神地祗及諸河源五嶽四瀆及諸名山洞玄洞虚洞空洞仙無極大聖至眞尊神無窮無極普監度生惡根斷絶玄都記名衆眞班列咸聽帝言經是帝勑保誦持人至度道岸無使災侵我奉帝命一切咸聽須㬰見無數衆魂出水悉成玉質仙姿端淨瑩潔此乃先火後水從舊科法錬也或學者依師所授及别有經據或以先水後火各從其便無拘執水火之源一法用肝肺爲金母之氣以應木公金母請降隂陽之正炁爲水火也或心賢之炁於身中則請降曰精月華皆以應之並可行也允中不敢執爲定式聽學者自擇理長之說而行之近有用南極北極以爲水火之源則於理難通巳論其詳於錬度品内髙功再白孤䰟等衆冶錬旣畢仙化成人望闕謝恩皈依三寳第一皈依无上道第二皈依无上經第三皈依无上師孤䰟等衆三皈依畢朝謝禮周自今巳後心歸正道母忘善念毋墮邪徑天上人間須持戒律謹當演說永久堅持九眞妙戒一者敬讓孝飬父母二者克勤忠於君主三者不殺慈救衆生四者不淫正身處物五者不盜推義損已六者不嗔兇怒凌人七者不詐謟賊害善八者不驕傲忽至眞九者不二奉戒專一孤魂等衆旣承戒律沾被天恩今謹焚化生天寳籙酆都山形靈書中篇冥財等用各請當壇祗領執詣受生合屬曹局證品超生施行赴壇魂爽受錬鬼神遇此因縁當生警省盡悔昔時之失快登今日之雲便須脫離鬼群正好㝷求道妙身爲外物生存巳非本眞神乃性根亡殁豈能壊滅惟了悟於本始又何礙於死生本性無時而不存至靈著物而自昧幻身有質貴賤緫亦成空隂魄無形飢寒安能相累良由貪戀祭祀是致自取愚迷儻明一性湛然幽路冥關而解脫萬縁不著人間天上以逍遥有遺者乃可成眞自沮者多爲下鬼令兹善念旣發從前惡障咸消洗塵垢以皆空整形神而俱妙更在旣悟者勸其未悟先知者覺於後知巳徃之跡難追舊事不須回首方通之衢可渉前程切要留心對闕恭辤離筵好去若凡若聖以次前行奉送雲程伏惟珍重焚燎存孤魂皆成仙姿妙體騰空散去次端簡上香謝聖具法位臣姓名謹重誠奏啓三清三境天尊如清旦式恭望髙眞俯垂省覽臣不量愚昧僣假符章祭錬孤魂關行事竟施爲戾格念慮失眞萬罪千愆悉祈原宥以今回兹淨供普施衆生胎卵濕化之倫飛動沉浮之𩔖羽化鱗介畜獸蟲魚共沐天恩同霑道䕃或值網羅鈎餌永脫横傷償逢䧟穽弓刀自逃苦趣身辤異𩔖炁返故根臣巳荷寛恩更祈終宥集兹微善先伸上資社稷尊靈祖宗神識翺翔瓊舘遊宴王京今朝皇帝壽永萬春惠加四海禾稼登而人民樂邊境靜而兵甲寧瑞應自臻疪癘不作次冀臣等九玄七祖四友三師内族外姻昔亡徃逝普超陽界俱陟仙郷臣尚願身得道眞學逢至士俗門眷屬凡世塵蹤盡依覆育之恩以迪安全之慶攝召官將錬度衆神委績勤勞乞行記録臣不勝感幸無任懷恩之至爲此因縁念十方靈寳天尊不可思議功德次白云本司萬神攝召錬度官將有勞神力祭錬周圓功德漸隆進升眞秩各還所部悉復元班後召須來一如故事允中撰集祭錬科文符呪出於諸法中但取其簡易可行之條爾施食諸呪年來頗多亦有異同今只取前件八叚乃諸方皆用者庶可通行若彼有而無此言辭各别互以爲是非者未免省去如其啓祝告遣之辭乃允中區區管見僣行撰述若欲詞章典麗文氣瑰竒則作者自更易之外有每日要出一掬之飯而祭祀者亦佳但旦旦爲之頗不易行雖食葷後盥洗畢誦淨口呪亦可爲或能勤力遇夜呪施不復啓奏如儀只行其捷徑科法今列于後先祝香具法位臣姓某以今焚香供養東極宫中慈悲太乙救苦天尊大慈大悲大惠真人大慈大悲救苦眞人恭望道慈俯垂鑒念臣以今䖍抽淨食普施孤魂欲乞恩光特垂開度變茲凡饌普濟無窮臣下情無任祈恩激切之至次念中篇一徧存此食廣大豐足便召魂謹伸召請九州分野五道四生三途十𩔖一切孤魂赴此食前享今淨供呪食諸呪品見前上來宣說靈章呪施法食三途五苦盡得沾濡十𩔖四生悉皆飽滿即超隂境共陟仙郷爲此因縁念太乙救苦天尊不可思議功德允中不量猥陋冒綴此文蓋以祭錬之功誠爲弘博所望同志永堅善心行之益厪造物者必録其功也但前後撰此科文者非不多皆未詳究蓋雖盡善兼其間又有減口施食之𩔖語皆鄙俚以致效學釋典參雜混同悉誤後人舊有一本刋行者施食告戒發遣之後却令人誦天蓬呪一徧此尤不可行也蓋其意恐孤魂滯𩲸留因爲妖異自古及今以美意而薦鬼神縱有𡨚對亦可由兹解釋豈應無故及我爲讎天地亦不容之何須自起疑心不終善意故機心一萌鷗鳥翔而不下況於鬼神乎至念精純獲無涯之福慶意外之防正不足慮而今之所集非好沽名也務守教綱庶顯幽之俱利畧通義理期道俗之共行察允中之用心者則不防備施用之萬一惡允中之正論者則未免招謗毀之百端有毫髮利濟於冥途雖遭紛紜是非於人世皆不恤也乾坤之廣生民之衆又安得人人皆不取之耶諸方祭錬以生天籙爲主而浙東所傳祭錬諸科以黄炁陽精符爲主又名丹陽錬度符參考上清靈寳古法内不載獨世稱仙翁祭錬者乃有之今來允中所編者專𨽻洞玄本部事屬靈寳合在法中之條乃立功之事故在濟生陽德之後也所有丹陽錬度一符近來法中雖已漸盛然而從古式不敢編入本法允中巳廣此靈寳祭錬一書與衆共之或專行祭錬自欲益此符者更請攷詳從便増用也上清靈寳大法卷之十三
