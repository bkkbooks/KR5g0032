  text: 上清靈寳大法卷之二十彩二
  hash: sha256:e8873507b1380d21a66575a3a337118c7ff54be7258868c6d41c812546d24ae4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_020-001a, image: hfl/0967/0967-048.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金允中編登齋科範品表白開啓髙功齋官上香拜臣聞因言而宣意祈精禱之潜通寓物以將誠冀清熏而上格普聞三界上叩重霄道香德香無爲香無爲清淨香清淨自然香妙洞眞香靈寳慧香超三界香三境眞香恭謹焚香奏啓供養虚無自然元始天尊上清眞境洞玄靈寳天尊太清仙境洞神道德天尊昊天玉皇上帝紫微北極大帝勾陳星宫天皇大帝后土皇地祇東極青宫太乙救苦天尊東華上相木公青童道君南極長生大帝白玉龜䑓九靈太眞金母元君九天上帝五老天君三十二天上帝五福十神太乙天君上清十一曜星君中天北斗九皇星君南斗六司星君四方二十八宿星君天地水三官大帝北極四聖眞君玄中大法師正一靜應眞君太極左宫仙翁冲應眞君九州都仙大史神功妙濟眞君靈寳經籍度三師眞君三天門下泰玄都省主宰髙眞上清天樞院聖衆三洞四輔經籙法中髙眞上聖周天三百六十五𨇠度星眞三元唐葛周三眞君風雲雷雨電主執聖衆地府玄天北隂酆都大帝水府東霞扶桑大帝五嶽五天聖帝五嶽佐命眞君地府玄天主者十宫眞君鬼官聖衆四明眞公酆都宫洞曹僚聖衆洞天福地名山靖治主録仙眞水府暘谷神王九江水帝四海龍王三河主宰四瀆源王蓬萊都水使者十二溪女仙眞隂境飛雷電吏國朝祀典聖衆州縣城隍主者九州社令神君黄泉蒿里丈人靈寳官屬法籙中靈官將吏三界官屬一切威靈悉仗眞香普同供養香乃玉華散景九炁凝烟香雲宻羅俓衝九天當願侍香金童傳言玉女傳臣啓奏上聞帝前令臣所啓咸乞如言以今開建道場恭崇法席奉爲鄕貫某人伏爲亡過某生於某年某月某日某時受生不幸於某年某月某日身亡今經幾時謹投靈寳法籙弟子某就某處崇建靈寳黄籙太齋幾日幾夜燒香然燈朝眞行道告行符命攝召魂儀轉誦眞經施食普度先伸上祝祖宗神御社稷尊靈騰景九清升神十極今上皇帝乗乾繼聖法道體天延壽曆以無疆綿皇圖而永奠寰區昭泰邉鄙謐寧兆民永樂豐登萬物不生疵癘三塗苦趣停謫役以清閑十𩔖沉魂脫拘迷而昇度集兹善果無上良因專爲齋主資薦亡過某湔滌愆非解除𡨚對超神北府錬魄南宫回保家門同増亨利以今玄壇崇建齋事將陳次第關行先伸啓告伏願萬靈垂鍳衆聖流光俾功德之圎成庶顯幽之利濟願頒報應拱俟感通拜手清場關行法事次分燈先然一燈於玉清天尊前或就壇上則於三寳前舊式並合用陽燧俟日正中取太陽之火以然玉清前燭髙功却以分燈慧光符撚作𥿄燈執在手中仍請道衆兩貟各執符燭於髙功本位左右侍立髙功長跪奏啓畢方進上帝前以𥿄燭請光在手回本位祝白却分與二侍者以次散㸃此所謂請光也近有人於道場内並不然燭髙功却先明一撚於手中方行奏啓乃以燈付侍者祝白詣上帝前㸃之如此則是進燈於帝所非自道前而請光矣理大不通其立說亦有碍兹故及之分燈儀髙功回本位長跪奏啓具位臣姓某再拜上啓虚無自然元始天尊上清眞境洞玄靈寳天尊太清仙境洞神道德天尊恭望道慈俯垂省録臣聞九極雲霄之上昭融不間於晨昏二儀寰宇之中顯晦遂分於晝夜陽輝潜耀世尚溟濛隂氣凝根境尤幽昧是以繼明西日眞科莫重於然燈接景北都流宥實先於破暗敢祈慈愍曲允奏陳伏念臣委靡凡資塵容陋品雖幸聮於班列乆未積於功勤固當退自省循豈敢進而請禱蓋以法先濟物教在利人况受誠詞難抑來悃臣據入意已行録奏於髙穹兹合恭開於法席蘭膏繼夜先祈輝散於一壇靈耀燭幽所冀恩周於三界願頒生炁曲拯沉迷恭望道慈俯垂玄應臣干冒道威不勝戰慄待罪之至誠惶誠恐稽首頓首謹言表白舉十方靈寳天尊髙功進入三寳前如在道場内則入玉清元始天尊前臣聞道運莫窮隨機而示應天輝無外寓物以流光是敢仰叩重玄冒聞霄極恭望特攄大宥曲煥深仁矜此凡忱録兹丹切玉清宸闕鍚道炁以頒恩清微天中布生津而育物客臣請命許以分光煥六極而惠十方昭萬天而輝九地臣俯躬持念以俟流恩元始一炁演化敷光空洞混合幽寥延康苦魂九夜乗晨希陽惡根應化合精桃康萬眞順諾生炁汪洋知磬舉三清無上天尊髙功存念如式以符撚於玉清前㸃之請光入手退本位執𥿄撚於左手道衆二貟各執一未然𥿄撚於髙功左手右立髙功再白臣聞混洞一元一生二而爲體凝澄二炁二肈三以爲宗天地萬形乃成乃立隂陽品物以育以生孕此靈樞莫非祖炁是用歸誠反本請炁分輝伏願自一分三並三晨之明耀由三及萬流九極之生津體大道生物之神功結元始開天之妙化天上地下永居不夜之郷人世幽都悉變純陽之境存亡被福隱顯蒙恩髙功以燈分㸃左右二燭皆然三人執燭燈並立宣呪赤明開圖運度自然開明三景億劫之先今日大願沉魂受錬重昏幽暗永閉寒泉欲請慧光照燭𡨋關氷池温和爐炭息熖刀山劒樹永斷攀縁回光十方照耀諸天和消五累業除勾連三晨同輝永劫元元開光童子承恩上仙三光玉女請如斯言髙功宻呪道生一一生二二生三三生萬物普燭幽沉臣請炁分輝曲承道廕流祥錫慶上煥天休清衆同誠遍然燈燭二侍者各持燭分與道衆遍㸃壇席周足却以諸燈聚於玉清前燒之臣謹按冲科仰祈玄佑請光布耀煥暗燭幽伏願大道髙尊玄穹上聖普覃靈廕大霈慈休昭映十方顯明三界人消疵癘魂脫幽沉十𩔖遷升群生寧泰爲上因縁念十方靈寳天尊不可思議功德分燈儀近世於上帝前請光之後再詣天師前啓祝宣飄飄帝師駕五列玄上門九光騰煥耀三界普光明金符書玉簡鎮響出虚間太微回黄旗無英命靈旛攝召長夜府開度受生魂此乃是路眞官玉堂齋法所用之格洞神正一之崇應行事悉以天師爲主與古齋靈寳本科不同後之洞玄法師奉行古法乃亦取此呪雜入其中或再詣師前分光悉爲失格兼齋法自有宗本不可混同輕用兼靈寳舊法中只有赤明開圖運度自然呪一段而巳今於此呪外増入元始一炁演化敷光呪乃是祝請之辭巳出於詳宻矣自上帝前而再回師前之禮誠不可増蔣氏立成儀分燈又添一呪曰九陽玉清三光道明洞玄靈寳古法中不用今合隨宗𣲖不敢泛取續増矣蓋請光之儀以陽燧對日火光然一燭於玉清前然後髙功致詞再拜進前請光在手回本位分與二侍者以次散㸃是請之於大道也而浙東有數郡却亦先㸃一燈在髙功手中長跪致詞道衆却受之以進入三清天尊前逐位宣白文㸃之方行分光如此則是髙功進燈光於上帝前非請慧光以燭三界也理大不通故今止從舊格金鐘玉磬儀臣聞眞文隱妙藏萬化而莫形空洞生神肇一靈而有象是以五篇敷落三洞弘開道之教也旣彰教之儀而大備惟典則之具列故制度之聿陳取法隂陽金主剛而玉貴潤配合天地鐘應上而磬徹幽况齋盟已逹於瑤宫衆聖將臨於寳席整嚴班列遥瞻仙馭於虚徐振肅規儀仰睇粹容於杳靄故即噐而陳禮異以聲而感神虎躍龍騰瑞氣充盈於法界鸞翔鳯翥靈風鼓振於珂竒肸蠁交通斯須感格臣等東躬請命拜手投誠荐瀆靈威不勝寒慄振金鐘二十五聲伏以崇體弘聲範澤金而定質懸角隆篆振鉦鐩以成音配陽德而上昭肅玄綱而悉舉上極無上隨梵響以凌空眞中之眞浹靈輝而布祉召陽神呪恭對敷宣元範恢漠九霞映空丹靈顯著五緯交通眞陽激切韻合玄宫元始徘徊群仙敬從萬炁齊仙隱微降𠂻道生自然變化無窮擊玉磬三十下伏以浮材潤質惟清緩以揚音廣古修端以倨方而示象法坤體鎭感隂㑹靈逸響琳琅宻格四維之表精𠂻昭徹潜通六極之幽均五炁以𡨋和集五靈而允鑒召隂神呪恭對披宣髙上太虚瓊宫紫房玄壇制噐玉磬琳琅霞霄振舉乾坤合張隂生梵唱流演元綱慶雲生門升度沉亡克成髙仙永處福郷鐘磬交擊三十六下伏以隂召陽凝妙用潜於罔測金鐘玉磬清韻徹於無窮雖坎實以離虚乃水升而火降感激之道自然而然應和之功當舉而舉則剛柔而製噐調音律以迎禧鳴厥磬鐘格于上下逹靈神呪恭對披宣混合二炁表隂著陽金和動瑞玉潤靜昌交感上下格于十方杳振玄宫環佩鏘揚靈符所告嚴肅壇場祕範重宣萬神開張振金鐘九聲擊玉磬六下伏以乾蓋上浮坤輿下奠森羅萬象杳冥莫接於形嚴周回十方磅礴難窮於境域然㓗齋以事帝豈髙下之散殊惟至誠以感神宜天人之相際兹以壇場將肅鐘磬交鳴韻奏鈞天髣髴神遊於帝所音髙梵唱依稀境類於玄都益勵衆誠同行讃詠次舉法事旋遶出壇引髙功入靖勑水道衆在壇續之預請有威儀道士一人行禁壇法事禁壇儀存三師在西存絳衣眞官乗斗而下水盂劔安于地户上上香啓白具位臣姓某誠惶誠恐稽首頓首再拜上啓聖位臣聞一炁之𥘉運隂陽而立極二儀之始肇清濁以開天旣育群生爰彰衆化是以五篇敷落禀爲經籍之宗三洞宣行大啓教科之緒保制劫運鎭奠乾坤福國康時下禳毒害抜幽濟顯普度天人臣等幻僞結形昏庸受質幸被正眞之化獲聮道法之階未能歛巳以潜蹤僣欲宣勞而効職謄詞列款逹凡世之請祈設醮修齋闡虚皇之典格深知越分惟兾垂恩敢陳迫切之情上瀆穹髙之聽臣等謹據入意其諸誠悃具載章詞臣等祇按明科恭開法席九清道境祈一念之感通三界眞司願衆靈之鍳映蓋以卑凡之域無非塵俗之區是恐厭汚之妄干或致凶邪之未斥惟假天輝之浹庶令妖祲之消伏願上帝髙尊俯矜奏啓天眞大聖曲省辭陳特勑有司給遣官將注靈光於法水寓威耀於神鋒五炁氤氲水從呪而蕩祛氛穢七星煥爛劔隨罡而殄滅魔精十方肅清萬神侍衛號令頒而無逺弗届詞章逹而有感皆通臣謹復簡存神拱俟天恩報應臣某誠惶誠恐稽首頓首再拜謹言次復簡瞑目左手上帝訣右手劔訣次握固於脇下存想三歩九跡召四靈青帝分靈聚眞震位修體千尋蒼鱗呈瑞質肇青龍降兇掃穢來立吾左赤帝分靈離宫聚炁晶熒丹彩璀璨赤趐形現朱雀焚滅妖異來立吾前白帝分靈凝眞於兊皓姿素質吼動天籟厥狀白虎誅邪剪怪來立吾右黒帝分靈坎宫育質丹蛇蒼龜隂陽配合是名玄武鎭肅壇界來立吾後四靈將軍隨召速臨禀勑受命電掣風奔次近案前就水劔白仍取水劔在手夫劔乃宣威而布令水能蕩濁以流清况誦呪召靈存神請炁故得精邪滅跡厭穢消蹤恭按冲科顯宣天令次以劔横水盂上取炁謹請東方青天魔王降眞炁入臣水謹請南方赤天魔王降眞炁入臣水謹請西方白天魔王降眞炁入臣水謹請北方黒天魔王降眞炁入臣水謹請中央黄天魔王降眞炁入臣水五帝大魔萬神之宗麾幢鼓節遊觀太空自號赫奕諸天齊功各降眞炁入臣水中臣某奉宣上帝勑吾之劔足濟水火體法乾坤堅剛勵百錬之鋒雪刄涵七星之象指天而妖星殞晦召雷而紫電飛騰吾今仗握叱妖氛三界鬼神皆指攝一揮萬里緫澄清地境邪精俱絶滅噀水一口吾之水止流隨勢凝泮以時地六成潤下之功天一生至桑之性渙雨露而發生無外變霜雪而肅殺有常吾今用以滌壇場普召五天鐘正炁一噀六極俱無塵地土緬平成碧王噀水一口次念天蓬呪噀水一口次誦呪行至東方結界謹請東方無極靈寳官屬飛天神王使者吏兵浮空而來降臨壇所行神布炁捜索邪精驅除鬼賊有罪無赦吾從地户結界至東方急急如律令謹請南方無極靈寳官屬飛天神王使者吏兵浮空而來降臨壇所行神布炁搜索邪精焚燒鬼賊有罪無赦吾從東方結界至南方急急如律令謹請西方無極靈寳官屬飛天神王使者吏兵浮空而來降臨壇所行神布炁搜索邪精誅斬鬼賊有罪無赦吾從南方結界至西方急急如律令謹請北方無極靈寳官屬飛天神王使者吏兵浮空而來降臨壇所行神布炁搜索邪精飄蕩鬼賊有罪無赦吾從西方結界至北方急急如律令謹請中央無極靈寳官屬飛天神王使者吏兵浮空而來降臨壇所行神布炁搜索邪精埋藏鬼賊有罪無赦吾從北方結界至中央急急如律令次横劔水上召兵馬謹請天僊兵馬地僊兵馬飛僊兵馬眞人兵馬神人兵馬日月星宿兵馬九宫五帝兵馬三河四海兵馬五嶽四瀆兵馬城隍社令兵馬列陣於壇場内外守衛壇界如有伏屍故炁土木石精於道不順者收付魁罡之下入地千丈無動無作急急如律令以至鬼門以劔劃地書鬼字卓劔挿鬼心誦呪噀地收劔九天有命普告萬靈促召天眞俱㑹帝庭太一下觀𩀱皇翊形鍳察禦邪理炁攝生若有不祥干試神明青帝之道勑整神兵七神秉越天鋒右征揮劔前驅煥擲火鈴激命甲騶虎卒天丁風火齊戰伐邪絞精上威六天下攝魔靈旣威旣攝萬兇滅形神戈電掃姦邪母生仙皇秉節有命敢停拒節違命是誅是刑各敬各謹保茲黄寧九天誥命萬神敬聴急急如上帝律令次還本位復水劔再執簡稽首而退次升壇宿啓行事各如本科出靖室詣師幕一應節次並見黄籙次序三十五品其宿啓建齋科書並在廣成先生科内更不重叙所有登壇存想出户入户髙功作焚符宻呪等訣並巳詳載於臨壇符法第四十二品外登齋之科悉見於此矣上清靈寳大法卷之二十上清靈寳大法巻之二十一彩三洞玄靈寳法師南曹執法典者權童初府右翊治金允中編臨壇符法品凡開建齋壇於正奏之前或十日七日内先青繒硃書降眞召靈二符並立位列備香火燈燭淨茶時果供養法師旦夕上香持誦中篇精祝符使或用髹牌開刻符形供養亦可登壇朝謁攝召錬度請神召將並篆二符先燒然後行事並用靈寳大法司印降眞符召靈符右二符硃書青繒上以香花祭二符使者七日之外可降千眞檄召萬靈如黄籙大齋建壇及追魂錬度之時朱書黄素燒灰吹布十方千眞萬靈俱集壇所所感玄通學不篤信五嶽試人大齋無此符文則眞靈不降徒勞施用錬度追攝無此則三官拘執無顯應也凡建壇洞視以二符爲首乃九天太霞神文祕於玄宫不傳下世有泄此道魂沉北府永無仙冀三晨慧光符右用黄𥿄九寸闊三寸硃書三道香上薫過符搯玉帝訣存元始天尊降流慧光下浹符中請光之時撚作𥿄燭髙功與道衆共三人各執其一髙功請光入手復本位却分與左右二道衆以次散㸃之早入户呪四眀功曹通眞使者傳言玉童侍靖素玄爲臣通逹道室正神上元生氣入臣身中令臣啓白皆得上聞出户呪出隂入陽萬神開通關啓事畢請閉黄房侍靖素女明備神宮夜入户呪四上功曹龍虎使者正一生氣侍靖素女夜有所啓願得開明童子上元少女與我俱入黄房之中通逹所啓皆得上聞出户呪玄上太隂八䆫開明向有所陳少女通靈事畢復位萬神潜寧左足右足詳見朝元入靖品中凡入户皆先右足出户則先左足臨入户存思香官使者左右龍虎君夾侍香案晨朝則兼存四明功曹通眞使者各一人侍靖玉童傳言玉女各二人共六人羅列左右夜則存四上功曹侍靖素女開明童子上玄少女各一人龍虎使者二人共六人羅列左右入户者入地户也令升壇則於地户之左存想宻呪出户則存官將玉女傳逹齋誠各各散去應三洞經科中玉女出户入户皆此呪近者有淺識之士見正一指要中應朝修皆用此呪遂稱洞玄法籙行别易此好異之甚不可據也陞壇凡陞壇先上六幕香次則手爐一人知磬一人前導讃引法師登壇風儀及道衆並分左右序對立壇前未入壇内髙功先行入地户陞内壇道衆隨之近有人只如常旋行髙功居道衆之後入巽户至外壇之後方揖髙功先行入地户道衆却立髙功攙越而過大不嚴肅故蔣氏立成儀亦云凡陞壇則髙功居前出壇則髙功居後乃合古科大爲允當髙功宻呪入地户道衆倶入壇中都講旋至中壇之東面西立六職於正中壇之西面東立髙功與齋官同陞天門入内壇上十方香日以東爲始夜以北爲始次上御案香髙功焚香宻呪存思如式齋官上香畢再出天門左旋至中壇面北立髙功回本位上手爐香宻呪次按科行事至復爐知磬舉學仙頌先行道衆次之髙功自内壇出天門至中壇最居道衆後出地户念呪次旋行出巽户詣師幕回向入靖室如常儀壇外諸門皆攔斷只留巽户中壇則自地户出入内壇皆自天門出入近有中壇與内壇皆自地户入却自天門出者悉非也廣成先生科及陸簡寂科法皆曰入地户升天門上十方香蓋自古皆然不可從俗内壇法天故自天門出入中壇象地故由地户出入不可易也清旦存思思青雲之炁匝滿齋堂青龍獅子各八數與經中存思之義同以壇爲正而守衛備守前後天仙地仙日月星宿五帝兵馬九億萬騎監齋直事三界官屬羅列左右按此乃登壇之後先存太上三尊在天寳䑓中左經右師儼然如對然後群仙侍衛萬神備守巳成玄䑓仙局以次行事三朝皆然惟氣不同又思青氣從肝中出如雲之升青龍獅子在青氣之中天仙地仙飛仙五方五帝兵馬匝覆齋官家大小之身此乃先存天中之青炁自上而垂巳之青炁自身而出混合充滿蓋夜氣方收陽光未照木德王盛青炁自生天仙地仙飛仙則建壇之始所謂仙眞兵馬此也所謂五帝乃東方青帝南方赤帝西方白帝北方黒帝中央黄帝是也此乃司五方之正炁主四時之候序統緫兵馬翊衛齋壇是其職也故章官有道上二玄三玄四始皆節候之神與此相表裏又思五藏五嶽五帝眞炁從鼻中出覆巳身彌滿一壇之内光明洞煥照徹十方項生圎象如日月之明身作金色洞見内外此五嶽不在外也乃身中五臟所配丹經中有圖前叚所謂五嶽兵馬則嶽瀆之神皆遣兵馬來護齋壇故自存天之青炁而便及兵馬此乃在外而不在内也凡此行用悉是内外相應而中間一叚又言五方五帝則是四時炁候之神巳見於前矣此之所謂五帝者乃身中之氣氣靈則生神如大洞眞經中有五帝見於存思者是也以洞經屬天寳而此以靈寳之法故不敢常引也五臟則見黄庭内景可詳考之登壇行齋未免從簡易之法不過思肝出青氣肺出白氣脾出黄氣心出赤氣腎出黒氣先盛於身中擁從鼻出如雲上騰五炁之中各有一帝皆冕旒之服服隨方色炁滿齋壇而我身隨炁之輕浮内外煥然不復血屍穢質光生項後狀若日輪照徹十方光映我身成金色也午朝存想思黄雲之炁匝滿齋堂麒麟獅子如前備守前後天仙地仙悉如清旦之式又思黄炁從脾出如雲之升五臟五嶽五帝眞炁從鼻中出當於己時登壇至午時四刻後下壇蓋日景將中陽炁方盛脾土分旺四時而乗離而乃生於南方乃火生土也上應元炁之下孚不可過午時之中炁存思與時不合大爲之夫格落景存思思白雲之炁匝滿齋堂白虎獅子如前又思白炁從肺中出如雲之升白虎獅子在白炁中皆如前式又思五臟五嶽五帝眞炁從鼻出亦如清旦之法晚朝當於日未入時登壇使炁未全隂白炁方盛上應始炁以合存思也夫始炁在身則屬下丹田而肺乃水之毋肺炁盛於昏時是水將生也故肺出白炁上應而混合也𠃔中竊覩廣成先生杜君編黃籙齋科中叙曰按金籙古儀及黄籙舊法宿啓之夜及言功之時皆先作自然朝然後行齋故啓齋儀云相率先行自然朝至三禮後即告齋𥙷職說戒宣禁此法自陸先生宼天師相傳至今頗歷年代皆以齋法出於靈寳自然朝爲齋之祖宗故先行自然朝示不忘本也近有愚庸之士不逹古賢之情此乃張雲光之謬致使後人逐其波先於玄師前𥙷置六職定科授簡然後升壇乃云備簡寂先生齋法寡識無知一至於此尚有其黨相傚行之不惟獲亂法之愆抑亦受謗賢之罪逹教君子宜共斥之舊法之中相傳錯誤者啓齋言功之時自然朝内合禮靈寳天尊不相傳禮玉寳皇上天尊號此稍失自然朝之本㫖恐是年代綿逺書冩舛謬今於此儀巳爲攺正非敢臆度惟禮所歸此杜君所叙也凡陸簡寂張清都科中有毫髮之異同莫不逐事考證𥘉非遺去舊文而杜君自爲一家之論也論青黄白三色至如早朝存青炁午朝存黄炁晚朝存白炁又注釋曰此乃天地相源之始祖也故生神經云青黄白三炁爲三境三宫乃萬代之本始則當時與陸簡寂科書别無差異是以明言三朝存青黃白三色之炁也近者陸君科書多零散不全𠃔中須見數本亦頗相似獨至浙東有人餘傳者皆攺午朝作赤炁其利害甚重且青炁在天則屬玉清境在人則屬上丹田其炁根於肝也黄炁在天則屬上清境在人則屬中丹田其炁根於脾也白炁在天則屬太清境在人則屬下丹田其炁根於肺也此乃出於正經之中是以存身之炁合天之炁各以其時也世人自以傳得科書所載稍異便指爲簡寂之定說恐於此理未安况杜廣成先生於陸科中有異同處非不具言是在唐時簡寂之書於此事未有易也後世傳録之乆謬誤甚多非至一節兼元科小節不同廣成一暴白其源流所有午朝存炁之色乃是齋中重事若陸簡寂科中午朝存赤炁而廣成先生亦以黃炁當時安得不叙其同異之詳廣成之科奏啓上玄盟告天地後世行用昭昭報應非一蔣氏立成儀所謂考證經典過於廣成博覽古今復於前哲故其建壇散壇幷九朝科書須用杜君之文而其典格事情或參用杜君之辭或不取杜君之論立成儀首尾類多如此因其恃髙出前軰超卓不羣然旣逐事重行參究自加去取使成一家之學所冝倂廣成科書文辭悉不必用盡行重撰使無駁雜不淳之弊自立垂世之規乃爲盡善旣是不用其說却用其文恐未免璧微瑕千慮一失矣今午朝存黄炁正出杜廣成建壇及九朝等科書中所載立成儀取其文以備用却於午朝自存赤炁易去一朝之存是杜說非也其說旣非其文又豈應編入𠃔中曽係度師奏授杜廣成科法故不敢易而𠃔中諸師尊之說則曰混茫之首雜二象而莫形大道之源涵三炁而未肇及其一元旣判三靈爰分所以陶育乹坤匠成萬彚道爲之基實萬炁之祖自一分三斯爲玄元始三炁合而言之謂之大道析而稱之謂之三炁形而名之謂之太上三尊且天失此炁則不能運地失此炁則不能奠人失此炁則不能生夫三炁者經中又曰三素雲也是爲天地神靈萬有之祖六合内外皆道炁也道之所在三素居之虚極則靈至靈生神故齋壇中只立無極大道者是緫三炁而言之一炁化三炁𥘉不可名亦不可形聚而成形故有太上三尊也教因經而立經以師而傳故列經與師也以致行事則禮師威儀經先存天寳臺中太上三尊左有三十六部尊經右有玄中大法師此經中之說也自經而師以至千眞萬靈皆道炁也太上三尊炁之祖也齋科經法非師不傳故禮師也如此則我與彼道也經也了不相干於是以氣合氣以神召神交通之機感激之道也至此則術數生焉消息盈虚休囚生旺各應炁候人之身中亦有三炁而汨於一形不能自靈非先假道之炁不能神我之炁非澄巳之神不能感道之神故早午晚三時不差是成生炁使我身之炁充盈也青炁在人身則屬上丹田其炁根於肝木旺於寅卯之間故取未晨之際是乗木旺也齋壇則先存青雲之炁匝滿齋壇此則天中之玄炁也又思青炁從肝中出如雲之升則身中之玄炁也則是天之炁與身之炁混合然後諸仙兵馬千眞萬神拱衛齋壇是感通之義也黃炁在人身則屬中丹田而其炁根於脾土則寄旺於四季本非專旺於子也五行之中惟土居中宫亦無正生之時其生則出於火火旺於午故土乗毋之生炁而盛也是以午朝先存黃雲之炁匝滿齋壇此則天中之元炁又思黄炁從脾中出如雲之升此則身中之元炁也則是天炁與人炁混合然後諸仙兵馬千眞萬靈拱衛齋壇是感通之義也白炁在人身則屬下丹田而其炁根於肺也金旺於申酉間日入之時故乗金旺也晚朝則先存白雲之炁匝滿齋壇此則天中之始炁也又思白炁從肺中出如雲之升此則身中之始炁也則是天炁與人炁混合然後諸仙兵馬千眞萬靈拱衛齋壇是感通之義也三炁之屬三田而三炁出於肝脾肺皆杜科引經格也肝脾肺者炁之根也上中下三田炁之舎也夫木與火皆陽也金與水皆隂也土則於五行之中主火爲土之毋故借火以爲生旺之候肝屬木木能生火三體皆爲陽故青炁雖根於肝而屬上田者乃陽也肺屬金金能生水二體皆爲隂故白炁雖根於肺而屬下田者乃隂也惟脾出黄炁以應土者天五與地十合於中宫而生土居天地之極數爲隂陽之根基其源則在中田隨母而旺於已午也故旦以青午以黄晚以白上合玄元始之三炁以至鍊凡成聖證度通眞亦本諸此非可以言辭盡端修用之法散在經中炁之象色不同者亦多則非此功法也齋壇所用青黄白三炁備存諸經衆典之内而杜廣成所編齋壇存念青黄白三炁則依據威儀自然經也外靈寳諸經甚廣惟度人一經緫包萬法元始所授而道君叙傳爲中乗之機要雖天地再造此經亦不可得而廢也齋法岀於靈寳今古之所共知行齋則以靈寳大法爲宗度人經曰入室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐于青黄白三色雲炁之中内外蓊冥有青龍白虎朱雀玄武獅子白鶴羅列左右此道君所叙之訣也誦經則緫三而修存者以誦詠經文可以自早至暮本無定時故不得不備玄元始三炁所謂内外蓊𡨋者亦以人炁合天之炁人天感通之道炁中生象故有四靈之𩔖也齋壇朝修則三時一定不可移易各乗生旺者以人身中之炁遇時而盈庶可上感然先存雲炁覆滿齋堂及思身中之炁如雲之升與經中感通之道一也炁盈成象故早存青龍獅子午存麒麟獅子晚存白虎獅子與經中所用一同也誦經則緫而想之齋壇則分存之無二說也杜君本旣諸威儀自然經而靈寳法中施用又宗太上道君之經格也主行之士可不深考之存念之法是平居之時冝修其所當修臨壇之際庶可感其所難感若午朝易赤炁出於心而午時火旺其說甚通但先存赤雲之炁覆擁齋堂者若是天中之炁自古衆經之中未常言三境之内有赤炁也與杜君所主皆不同近有妄自尊髙之人專談曠蕩虚無之禮欲効莊列而不至亦以欺世而盗名故於行齋設醮之間悉以大言髙論而覆護其短學者不究其淺深被其愚瞽者多矣至於玄元始三炁亦㝷未分之始而言之自九炁而爲三炁緫三炁而爲一炁元故不論玄元始之化三尊不究青黄白之分三色是又以誇談之說而罔人也三炁之爲青黄白三色也亦見於三元品誡經中謂炁之始凝結青黄白三炁置在上元三宫中則青陽之炁也左則元黄之炁右則洞白之炁天官主之此皆𨽻玉清而緫於上元也則玄元始三炁之分而結成也及其黄炁之下析則結元洞混靈之炁凝極黄之精遂立中元三宫地官主之白炁之下析則結混澤之炁凝神皓之精遂立下元三宫水宫主之乃三炁之分三元此經中之大畧也若身中三炁居三田者非以人身直爲天地蓋人法天地以成形身中備有三炁也夫天則純陽結輕清之炁以上凝爲天天雖非木火之炁然五行之中火則炎上純陽而無疑火因木而生木乃火之母木之本體生於地則聳致之水則浮金水土皆實於木火位居東南安得不倶屬陽哉全陽則在上乃青炁居上田以象天也用其母而子從之是炁出於肝者則身中青炁之根矣天以青陽之炁結上元三宫身中青炁所以舎於上田也水則全隂禀至柔之資以俯潤五行之中水性就下致之於地則滲激之在髙則流萬變無窮終居土下水之純隂亦無疑以水因金而生金乃水之母金之本體出於土堅實沉墜土水火皆輕於金水而金水位居西北安得不俱屬隂哉全隂則在下乃白炁居下田以象水也水舎於下田不爲黒炁而爲白炁者亦用其母而子從之是炁出於肺也身中白炁之根矣水以神皓之炁結下元三宫身中白炁所以舎於下田也若地則濁厚其根鎭二儀之中地爲坤而屬隂然地即土爲之體正位於中宫黄炁居中田以象地也且中田乃絳宫也不出赤炁而出黄炁者蓋以炁岀於脾而舎於所生之地亦子之隨母也猶青炁之不居肝而居上田白炁之不居肺而居下田是三田者皆三炁之舎也按大洞經黄庭經所載兩眉間却入三寸爲上丹田心名絳宫爲中丹田臍下三寸爲炁海爲下丹田存身中三田三炁取法三元三宫則道之絳炁之分而見於身中之體用也存天中青黄白三色之雲乃玄元始之三始則道之宗炁之源也若理五炁於身不捨五行之用金木相見水火降升必索黄婆媒合於中宫乃合四象爲大藥是金水爲隂木火爲陽以土爲基也所以青黄白之三炁爲萬法之本始萬化之根源肇六極而奠八方生三才而育萬物大包天地細入毫芒何所徃而非青黄白三炁耶歴代齋科所行旣已悠乆自古經典所載又皆明白若一旦以爲黄爲赤非獨正理難通恐天理亦不順也行齋而存青赤自三炁决不可指作玄元始三炁明矣在身中乃木火金之源而肝心肺生之也金木水火土五行皆一等而乃去水土而用木火金於理安乎心肝脾肺腎五臟同一體乃去脾腎而用肝心肺必有的說也儻以隂陽言之則木火屬陽金專屬隂三炁之中未免二陽而一隂又重輕不等旣非上合三境又不通丹經内藥縁齋壇存用早朝先則思青雲之覆次思身中青炁如雲之升午朝以黄晚朝以白例皆如此乃身中三宫之炁上合天中三境之炁也次則繼之以兵馬仍降五方正炁也又明言思五臟五嶽五帝眞炁從鼻中岀周覆已身彌滿一壇是五臟配五行正用金木水火土五色之炁矣若前來有青黄白三炁出於身中者使不合玄元始三炁則身中五炁之用豈非各有所主乎除此數說之外或欲以天中玄元始三炁易以爲青赤白三色雖辨證於元始天尊之前𠃔中之論必不屈也古今正理決難亂也縱有𥝠家收藏經文所載亦難據也故𠃔中不敢遵從其說陸簡寂科書近來被人更易頗不可考第陸君分三洞之源列四輔之目區别眞僞考證是非髙絶古今非後世自眩自矜者之比凡前來二三說得理至甚必非出陸君之手其書自宋齊至今將歴千載傳録差誤不一杜廣成齋科於大唐旣考三洞經科又叅以陸儀爲準使其元有此說杜君安得不叙其詳悉於書中其他末節異同尚且逐言之豈應於此畧去是陸君之書在唐時尚未訛舛𠃔中所覩者已互有不同今以此等事而未出於陸君則有成廣成之說非惟得亂教之愆亦獲謗賢之罪矣𠃔中冒昧行用巳二十年一遵廣成定格凡從遊同學之士受此書而行之自可安心若是午朝存黄炁而有差謬則是杜廣成輕用威儀自然經而靈寳大法遵太上道君所叙度人經用青黄白三炁亦不當爲非𠃔中之罪也若是三寳之位太上無極大道不當存爲三尊及玄中大法師之位當増太上三尊則禮師威儀經所載存念之法爲不當矣尤非𠃔中之罪也𠃔中從經籍度三師所授而先師乃本杜廣成杜乃本於前諸經青黄白三炁最爲度人經存念之本雖别經之中或有異同尤不應捨度人經之本源而行齋也飛天十部妙經緫三十六卷其中大半係互相傳録抄寫之本亦有數卷彫印者乃是後世鏤版之書於内度人經一卷其來至古不容差謬靈寳大法以度人一經為宗本存念之要青黄白三色之炁爲根源設醮修齋自背靈寳之宗本乃旁引曲證不可行也杜君齋科世間遵用已四五百年後人不可更易者乃以其卷帙尚全非若陸科歴時悠乆篇帙零散而可以昏亂之也不爲近人又僞入太上三尊之别號𣸸辭三寳之三章天下之衆本可考諸人之𥝠意姑混淆於一時事乆而眞僞自彰也同學之友奉行此書自可泰然無慮不妨奏告上帝直言所存青黄白三炁於三朝行用乃金𠃔中今遵行杜先生齋科庶可不疑或有失當則非爲杜君之誤後丗而三炁存思實出於太上道君經格也允中又何慮焉上清靈寳大法卷之二十一
