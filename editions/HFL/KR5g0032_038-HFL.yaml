body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金𠃔中編散壇設醮品上齋法起於中古晉宋之間簡寂先生始分三洞之目别四輔之源䟽列科條校遷齋法又唐時張清都經理之餘尚末大備至廣成先生荐加編集於是黄籙之科儀典格燦然詳宻矣後世遵行莫敢越也但其本㫖謂黄籙兼緫生死人天同福下而兆庶上自帝王皆可修崇其功無際但以編帙稍多難以盡行編入法内行教之士冝自於全部中録出科書行用所有散壇設醮則元科分作兩卷臨時恐繕寫兼古科與世所行次序不同未免校正編出散壇設醮一節于左其餘科書畧具元來品目以便㝷閱可也廣成杜先生黄籙齋科合用下項叙事鎭信威儀壇圖合用投詞告齋禁壇行事法服品目建壇宿啓科文第一日清旦出官早朝科文都懴并二十方懴陞壇轉經儀正齋第一日中分落景行道朝科正齋第二日三時行道朝科正齋第三日三時行道朝科言功散壇告簡設醮送師禮燈并九幽燈儀投龍璧儀此外有遷拔黄籙齋三時行道朝科三元黄籙齋三朝科消災黄籙齋三朝科安宅黄籙齋三朝科有十方懴又安宅單朝科疾病黄籙齋朝科師友保病黄籙齋三朝科普度幽魂黄籙齋三朝科及諸品方懴五段懴朝廷爲臣下保安黄籙齋人臣爲國消災黄籙齋眞文儀式等緫計四十卷黄籙則幽顯兼司存亡𠃔頼今專以廣成齋科全書隨法傳行同志之士冝詳觀熟味然後知廣成先生深於古經致力於教門不淺淺也叙醮廣成先生曰醮者祭之别名也牲牷血食謂之祭蔬果精修謂之醮皆可延眞降靈河圖經品三洞之中也凡百二十四等與齋法相𩔖并諸雜醮法几五十六門皆前哲後賢隨機所感並能降眞祈福濟物利人輔佐王化孕育群生或以太上爲主次以北斗爲宗苟能禮物精豐心誠志罄何善不降何惡不除但延請乖儀俯仰失度不能感降爾由此言之則三洞旣有二十七品之齋三洞復有四十二等之醮庸妄之流乃爲建醮設齋而正一有醮或於齋後散壇却攺正一衘易正一服然後設醮尤其謬矣夫醮則三洞皆有之況散壇之醮乃齋事終畢酬謝眞靈豈冝攺衘易服别作一式行之其爲鹵莽好竒敗壞科典可勝言哉此實古今之正理天下之通論安可以私意亂之耶是致邇來散壇送師色色了畢却再請上眞重行設醮謂之專醮則可以爲齋後醮之義則大失本意矣若從古法不必請醮狀未送六幕即行言功一併設醮然後送師徹席事簡而理通不違古來之典格醮儀輦馬之𩔖聊以寓誠却專狀獻之可也古者拜章之外文狀尚少自上帝以至列眞隨冝修設故醮位不多後世文狀關牒干渉旣衆凡狀牒所至之曹並當醮謝謹䟽出黄籙齋三百六十分位謹隨文檄干渉去處而巳儻欲省節則於狀牒亦行簡約及酌量事體輕重其次則減損作一百六十分位路眞官正一科黄籙醮位亦一百六十分蓋下此則不能盡故也有如世人將上眞緫數位而作一分極爲礙理以至九天上帝作一位三十二天作一位十一曜作一位似此之𩔖大是褻瀆今上眞並合專設諸法中將吏員數難計未免以𩔖相從稍加緫括更能於將吏之前廣排酒果普行酬謝則不必計位尤善也主行之士更請詳度而行之黄籙大齋醮謝眞靈三百六十位虚無自然元始天尊太上道君洞玄靈寳天尊太上老君洞神道德天尊太上開天執符御曆含眞體道昊天玉皇上帝中宫紫微北極大帝勾陳星宫天皇大帝承天效法厚德光太后土皇地祇南極長生大帝東極青華太乙救苦天尊東華上相木公青童道君白玉龜臺九靈太眞金毋元君東方青靈始老天君南方丹靈眞老天君西方皓靈皇老天君北方五靈玄老天君中央元靈元老天君鬱單無量天帝上上禪善無量壽天帝梵監須延天帝寂然兠術天帝波羅尼宻不驕樂天帝洞元化應聲天帝靈化梵輔天帝髙虚清明天帝無想無結無愛天帝太皇黄曽天帝太明玉完天帝清明何童天帝玄胎平育天帝元明文舉天帝上明七曜摩夷天帝虚無越衡天帝太極濛翳天帝赤明和陽天帝玄明恭華天帝耀明宗飄天帝笁落皇笳天帝虚明堂曜天帝觀明端靖天帝玄明恭慶天帝太煥極瑶天帝元載孔昇天帝太安皇崖天帝顯定極風天帝始皇孝芒天帝太皇翁重浮容天帝無思江由天帝上揲阮樂天帝無極曇誓天帝皓庭霄度天帝淵通元洞天帝太文翰寵妙成天帝太表秀樂禁上天帝太虚無上常融天帝太釋玉隆騰勝天帝龍變梵度天帝太極平育賈奕天帝五福太一眞君君基太一眞君大遊太一眞君小遊太一眞君天一太一眞君地一太一眞君四神太一眞君直符太一眞君臣基太一眞君民基太一眞君紫微垣帝座星君太微垣帝座星君天市垣帝座星君南極長生大君南上好生韓君文人南上度人不死神君度世司馬大神南上司命司録君延壽益筭度厄尊神日宫太陽帝君孝道仙王月宫太隂皇君孝道明王木德歳星君火德熒惑星君土德鎭星君金德太白星君水德伺辰星君神首羅睺星君神尾計都星君天一紫炁星君太一月孛星君上台一黄星君中台二白星君下台三青星君北斗陽明貪狼星君北斗隂精巨門星君北斗眞人禄存星君北斗玄冥文曲星君北斗丹元廉貞星君北斗北極武曲星君北斗天關破軍星君北斗洞明左輔星君北斗隱元右弼星君北斗魁精玄上眞皇夫人北斗靈精上妃玄黄夫人北斗靈妃元皇九極夫人北斗上靈神妃華皇夫人北斗北上金蓋中皇夫人北斗安上晨華元皇夫人北斗玉華靈皇夫人北斗太帝左皇夫人北斗變靈右皇夫人南斗天府司命上相星君南斗天相司録上相星君南斗天梁延壽保命星君南斗天同益筭保生星君南斗天樞度厄文昌星君南斗天機上生大理星君角宿星君亢宿星君氐宿星君房宿星君心宿星君