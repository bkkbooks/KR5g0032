  text: 上清靈寳大法卷之三十八靈二
  hash: sha256:4049bded7b1cd93d987421e1826185f9c194fa4ad5b3e694718e093878e94db8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_037-001a, image: hfl/0971/0971-100.png}
body:
  text: 洞玄靈寳法師南曹執法與者權童𥘉府右翊治金𠃔中編施食普度品建齋之始先設茭廓於空地之上務令寛廣仍戒喧雜當普召則立香案髙功望天闕口奏次請道士一員普行攝請此是先移文三界及牒神虎將吏預行普召或臨事而髙功不欲再行啓告者亦從便也立香案茭廓前髙功上香望闕口奏具法位臣姓某謹拜手昧死奏啓虚無自然元始天尊太上道君太上老君昊天玉皇上帝紫微北極大帝勾陳星宫天皇大帝后土皇地祇十方靈寳天尊東極青宫太一救苦天尊恭望天慈曲垂鑒燭臣聞至道啓慈悲之教髙眞宏濟度之科俾凡夫得攝於化權使晚學獲聮於法軄蓋欲廣覃惠澤普浹宸恩動植咸歸化育之中幽昧悉在哀矜之内臣乆承明訓未立殊勲領户化民敢忘本軄拔幽濟顯少効微勤以今齋主某勵志修齋傾𠂻普度雖巳奏聞於天闕所當廣濟於冥途備置菲儀關宣祕典召六道之衆並赴齋筵攝萬𩔖之魂咸沾淨供恭望特頒天命並下冥司宥罪赦愆開關啓閉庶三界之幽魂悉集俾六合之沉爽同臻許其遷升容臣開度敢期昭應下副懇祈臣冒犯天威下情無任祈恩俟命之至謹言道衆舉旛歌斗章太微廻黄旗無英命靈旛攝召長夜府開度受生魂先召六道夫六道者則天道神道人道地獄道餓鬼道畜生道也關牒行移有普召六道三途也有召五道三途者三途則天途驅雷役電地途擔沙負石水途漣汲溟波五道則度人經中魔王歌曰其欲轉五道我當復奈何乃五苦之場所謂五道也行移之中用五道則本倣此或六道亦可然而濟拔苦爽或先於五惡道今臨召攝則聖凡普及髙下同沾是六道之文不可除去行移之中更自詳酌行之式說悉是自來有之非近世續爲之說其餘無所經據者力加刪斥不敢爲疑惑矣謹伸上請天道之衆夫天道者居三界之中列諸天之次宰制遂分於品秩稱呼莫得其後先盖由生禀竒姿夙鍾靈炁功全道備藥就丹成或證品仙階或受書洞府以至升騰霄漢軒翥空玄佐理隂陽賛扶造化善功愈積尊位漸登於是神變之莫窮威靈之罔測伏願暫離天府畧届塵寰即馭炁以下臨悉浮空而俯降接引五道之衆開化十𩔖之魂録此䖍誠證明修奉天道之衆願賜降臨謹伸召請神道之衆夫神道者幽微不測變現無窮司禍福於人間定吉凶於世表掌握山嶽統轄鬼神調風雨於四時理隂陽於九土隨心應感遇物施恩居幽理明安民濟衆緫權各異受軄散殊或聖帝名王或忠臣烈士或郷邦英俊或社稷明靈或立壇場或崇廟貌有功立祀受命爲神鎭境域以垂休護生靈而布祉功歸正道德賛玄猷伏願神化須㬰靈蹤頃刻來朝天闕悉赴齋壇鑒清淨之筵領塵凡之供神道之衆俯賜降臨謹伸召請人道之衆夫人道者受炁隂陽賦形天地得處五行之内故爲萬物之靈分男分女則有妍蚩列尊列卑則殊性識或貴或賤或賢或愚或托䕃中華或投胎外土或以文華而受邦之爵秩或運智爲謀而爪牙或塵途有凍餒之虞或蓬户有沉綿之厄顧兹等級實係修爲民庶繁多品𩔖衆雜均爲人道共禀靈津其奈壽夭有期存亡係數形骸非巳有魂魄屬虚無陽世不得長生幽府豈宜乆滯伏願澄清念慮整具形神悟道超凡知虚識幻來赴精誠之供仰沾開濟之恩聽法聞經朝眞領薦人道之衆及諸眷屬各請來臨謹伸召請餓鬼道之衆夫餓鬼道者或拘幽夜或墮昬迷或因宿世之所修或以累生之所作或罹報對或因徴呼或習性沉迷識見執着是致飄零魂魄散蕩神儀沉浮於六合之中困滯於九州之内薦資之罕及享祀之不沾超脫未期升騰乏路悽然何托邈爾無依若非識性而返眞豈遂出迷而入覺伏願上依眞䕃肅仗道恩相携而盡赴道場招集而同臻法㑹恭朝九清之上帝以離九地之拘纏聽宣三洞之靈章以㓕三塗之障難餓鬼道之衆及諸眷屬各請來臨謹神召請四生道之衆夫四生道者胎中受命殻内分形宂處巢居林藏石隱或産于江海陂池之内或養于重淵積水之中或感炁而生或隨物而變雜名殊𩔖萬狀千形飛走山源沉浮波浪雖禀炁之有異而貪生則本同或困於鈎餌網羅或傷於鋒刃弓矢固亦超利而避害甚則搦肉而强飡蠢蠢而生紛紛而逝雖爲異𩔖俱出至化陶鎔之中旣忝貪情悉在上帝憫憐之數伏願俱承淨供同赴善縁灌濯靈津永捨禽蟲之趣沾濡法雨終離毛角之群悟本知根還源復性四生之衆及諸眷屬各請來臨次召孤魂伏以一元運而循環不息二象凝而變化無窮禀炁分靈衆形乃肇殊資雜品庶𩔖以繁但成始必成終是有生固有死今古遥而時遷事異死生定而情均理同雖貴賤之不齊亦賢愚之各致生𠔃壽夭之莫測死也升墜之難知況厚朴之風漸離洪荒之世巳逺盛衰倚伏隆替相仍揖讓而君惟唐虞之莫繼戰爭而國自商周則攸同周末而兵革紛紜秦初而干戈繞擾漢魏以降南北屢分迭廢迭興或治或亂風俗由之而厚薄人物因之而盛衰或失正而見弃於明時或攄忠而不容於亂世或功成而釁起或貴極而身危以致握外閫之威秉出疆之命或偶然於䧟陣或竟殞於遐荒或負藝懷材棲遲而不遇或守常抱道廢斥以無聊居民旅而遭亂離處軍戎而死鋒鏑近來非一昔者尤多及夫士農工商巫醫小祝千門萬𩔖百家衆流處世之時榮枯不等亡身之後冥寂何殊有術至於長生其如得之者鮮無謀何以逭死未免視之爲常賢愚俱化塜中塵富貴亦爲泉下客眷言及此興悼何窮恭惟大道之垂慈特啓眞科而廣度爰稽教典嚴列壇場式陳無礙之筵普供有情之衆請降九龍之敕命昭蘇六地之沉魂欲望幽顯眞靈隂陽主宰逐處靈壇典祀天下郡邑城隍黄泉蒿里丈人地府溟泠主者水宫曹局嶽府軄司五道大神九州社令山林里域土地衆神咸遵太上之符章共禀青宫之特命釋拘纏於萬獄罷謫役於三途䟽理囚魂昇遷罪爽以至浮遊郊野淪滯幽隂有主無歸含情抱識九州六極萬𩔖四生一切孤魂無窮鬼趣悉行拘集盡遣來臨同沾勝妙之縁即度清寧之境俱頼至神之力以宏上帝之休攝召届時立祈報應以今焚香先伸恭請歴代帝王前朝君主或揖遜而有天下或開拓以立基圖或興利除害而垂萬世之功或撥亂反正而創一時之業惠加海宇德被生靈或今廟食於人間或以昇神於天闕終啓愛民之念不忘憫物之心接引迷途提携後世曲回睿鑒俯録凡忱以至繼體之君守成之主秉治安之政享太平之基累洽重熈康時保祚然而數傳之後累葉之餘未免泰極而否生運竒而變起或王綱之不振或太阿之倒持或權臣肆淩逼之虞或胡騎有冦攘之禍小而播遷郡邑大而傾覆邦家雖云德之或𧇊亦恐數之有定昔日鑾輿歸杳漠如今殿宇已坵墟儻英靈未陟於丹霄慮清蹕尚稽於黄壤伏望暫迂仗衛畧盻壇筵鑒茲開度之齋修宻悟希夷之隱奧當知富貴如夢成敗一空往事難追前途可勉仰祈宸慈俯賜降臨以今焚香奉請昔朝禁壼往古掖庭尊而后妃下而嬪御或望隆後苑或德重坤儀外佐聖明内閑典則雖古今之旣革必慈愛以如初仰冀在天之靈俯察由中之禱其或德分厚薄寵有盛衰雖金屋玉樓翻成寂寞長門邃宇徒困悲涼至如青塜之殯難歸馬嵬之變罔測或謝身於丹禁或白首於上陽遺恨未銷清魂無倚伏祈委鑒俯賜降臨當知富貴若風華榮華如石火俓登前路毋念舊蹤以今焚香奉請累朝宰輔歷代廟堂負楝梁之材展經綸之手内而鎭安有度外而綏集四方或西掖判華或北門視草或分郡邑之寄或列鵷鷺之行𦔳理化機共扶國計若大若小乃武乃文消禍亂於未萌致太平於無象及至數終壽夭身委寰塵或廟食於人間或軄參於仙府伏願特迂騎從俯降旌旄鑒此凡誠賜之景福其間富貴之莫永榮禄之易終或降出於無聊或竄流而不返甚而傾家失族或至服藥罹辜幽恨無窮驚魂何托當知去蹤莫救覆轍難回不須懐旣往之𡨚尚可爲將來之計一聽清虚之典咸除鬱結之情普冀來臨即垂𠃔赴以今焚香奉請千古英雄歴代將帥登壇授鉞拜命䇿勲或三箭而定天山或七擒而伏南虜或削平於僣亂或拯復於寰區嘉績濟時精忠貫日或盡節而没於王事或退老而終於天年或守正而罹害於一時或深入而䘮軀於萬里義之無失理則何傷或生不至於封侯或死于今而廟食伏願暫揚麾纛俯屇壇場享于克誠誕孚靈佑其有負可疑之勢挾不賞之功或自失於忠誠或偶生於嫌隙禍萌不測變起於形或放逐而終或誅鋤而逝或家門之廢墜或嗣息之凋零杳靄陣雲昔日之壯圖已謝沉昬夜府今朝之滯識猶迷願應召以來臨庶隨機而感悟不纏宿障咸濯生津以今焚香攝召戎門卒衆軍陣兵行歷代以來六合之内興廢不知其幾戰闘莫計其時或㓂盜猖獗於城中或夷虜腥羶於邦内不得已而征討終未免於殘傷身命殞於弓鎗血肉塗於草野或圍城而敗績或遇伏而䘮功或失援而懸軍或輕敵而餌毒勝者未能全壁敗者必將䧟師郡邑爲之荒涼生靈遭於屠戮雖云天數之或定其亦人情之至哀然奮義以効勤盡忠而死節若非返生人世則猶𨽻役冥司伏願畧駐劄於靈壇共賛扶於元化同沾利佑早遂升騰其間或缺於忠誠或失於疑二或陣未交而自潰或勢非急而就降或爽律而受誅或違伍而被罪恐一念之不正慮九地之尚留符命已頒拘纏必解所當悔懲昔咎灌洗前愆各承大宥之恩盡脱九沉之苦即希來赴同領善功以今焚香攝召文塲秀士學海儒生博通百氏之書深造六經之奥聲譽髙於庠序行義冠於郷閭以至身擢巍科名魁多士知顯逹之由分故出處以隨時以至未沾爵禄之榮自徹性命之理初不拘於得失亦何礙於死生千古英魂萬方靈爽伏願俯臨壇席即邁車輿華胥國内成名巳知夢覺白玉樓中作記即遂仙飛其有志徒切而天命乖學雖優而至理昧淩霄壯氣易以差池眩世辭華竟成委靡場屋屢困名器愈賖一息不流萬縁皆斷慮其未悟窮通之分莫明禍福之機生而事爽素心死恐魂稽泉曲伏願去離執着警省神情當知太上之眞科即是聖人之大道自冝黜聦明而屏志慮味道德而達死生盡屇法筵即超淨域以今焚香召請眞祠羽䙱琳館黄冠委塵俗以出家悅沖虚而入道深悟浮生之夢幻仰探至理之希夷白簡黄壇交眞靈之肹蠁青山緑水縱杖屨以徜徉或功髙而鍚召於玄都或丹就而受書於洞府伏願特矜晚學曲降飛車開化沉溺之幽魂或就齋功之善果其有宿因未厚羙意徒勞其學罔際於眞師内錬不逢於秘訣或修存而中輟或障難之横生鸞鶴不來空有青霄之望虎龍難偶遂爲黒壤之歸承今符命之招詣此薦資之㑹毋牽纏於宿念早湔濯於靈根一徹玄機即升仙籍以今焚香攝召山林逸士巖谷幽人視富貴若浮雲等功名爲外物竒峯碧嶂滿目烟霞木履青笻賞心泉右王公莫友天子難臣或遁跡於郊園或放浪於湖海髙資邁俗清氣逼人生𠔃旣能超羣死也自應無滯猿吟夜靜嗟蘭佩之難回鶴怨山空嘆蕙幃之巳寂瀟灑神識幸賜來臨清靜齋羞同垂享鑒其有身爲隱逸惟切志於功名或致北山之移文或爲仕途之捷徑不能堅羙節依舊入麈縁以願不滿於人間恐恨益深於泉下當知進退乃在生之計眷玆功業亦處世之謀冷巳無生是爲委世貴賤俱泯成敗兩忘承兹度化之休早遂返生之樂以今焚香攝召叢林大德列刹高僧秉智慧刀斷煩惱障方袍圓頂悟不空之空鐵心石腸修難修之果打透無生理深知不死機一性清靈雖乆而不墜六根了絶有召即遥聞剖破藩籬何用拘於道釋飛馳杖錫即俯降於壇場鑒此良因用歆淨供其有禪心未寂覺性猶迷五藴非空六賊尚熾或隨時以飄蕩或混俗以浮沉及其天數之告終不覺色身之永巳茫茫幽域杳杳泉臺自怜超脫以何時適此遷升之有路昨非今是咸資曠蕩之恩捨舊從新即上清虚之岸以令焚香攝召宫觀女冠寺院尼衆或悟眞而入道或因事而出家或歸西方寂滅之宗或慕太上沖虚之教緇袍素質巳祛脂粉之塵凡羽袂星冠不受鈆華之㸃汚禪心如止水還同佛性之圓明清氣薄浮雲終見仙蹤之超舉伏願俯從𢢽請不吝慈悲鑒此精修納兹薦獻其有道縁之尚淺宿慶之未深雖披出俗之冠裳莫竟脱塵之念慮或積功之易倦或見性之不明徒知世故之紛紜不覺大期之至止念幽都之寂寂慮飛爽之淒淒因此修崇悉祈來赴重資靈澤再作生涯以今焚香攝召累代富豪之士積年貴盛之家承閥閱之餘襲膏梁之舊府庫充溢箱篚豐盈廣厦崇堂歷暄涼而罔覺髙軒大蓋雖風日以難侵悅目將厭於珠珍服御乃賤夫羅綺能於此檢身而育物庶可乎善始以全終未免經於太隂必亦生於貴冑其或流而不返盛而愈奢過嗜聲色以無窮廣畜車馬而自縱生𠔃爲意之所欲死則盧魂之多迷伏望不躭世上之榮華毋念身前之翫習徑迂軒馭並造壇筵即悟靈機同臻善境以今焚香攝召九流之士雜藝之倫或通於易象壬占或達於天文地理或攷五行而知貴賤或稽一貌而驗吉凶或習推側而有識氣之能或辯疾患而施活人之手倘臻一術於至奥或兼衆善以俱亡故窮通莫得以汨其眞死生不足以累其性蓋術乃察事物之變理則徹造化之機生則精明死亦了悟存亡不惑隱顯無拘仰冀昭昭之靈俯鑒勤勤之禱其有名同實異習矣而不精藝淺識卑鬻之而苟利或挾斯而遊謁或因此以飄零或宿留於異郷偶成客死或覊棲於逆旅因至路亡惟其見理之不明深恐身亡而𩲸滯伏願収浮遊之識聚散蕩之魂屇此淨筵悟兹道妙一悛故性俱陟生郷以令焚香攝召雲水髙人江湖達友單瓢隻笠遍遊於福地名山五炁三華暗聚於崑峯蓬頂或調金石以精煆錬或驅草木以救疾傷或施符以濟時或布炁而愈患或徉狂而混俗或托醉以全眞或面壁以無爲或行功而有作及其丹成而事竟故能脱殻以升神伏願提拔玄門主張大教曲全齋薦同拯迷津欽佇雲輿即臨法席其有山川徒歴未逢出世之師功法雖繁莫有成眞之訣未免苟活於軀體蓋將空度於嵗時生而逐伴隨群死則飄神蕩識請回清慮早脫昬衢結兹無礙之縁再遂有生之樂以令焚香攝召街衢遊子市井閑徒擁蓋驅車遍章臺之綺陌臂鷹挾彈衝上苑之紅塵籠畜珍禽醪傾玉斚銀燭呼盧嫌夜促玉簫催拍怕筵終情雖適於少年事恐𧇊於厚德及至呉霜㸃鬢方驚往景之非空思楚館遺蹤巳覺衰顔之迫交遊滿目誰爲住世之謀情愛盈懷乃是䘮生之本惟有殯宫之寂爾遥知冥路之茫然伏願捨舊從新歸根復命來沾薦拔前遂升遷母着相於空花不留心於外物盡捐故態速進前程以今焚香攝召江上漁人溪頭釣叟掛網垂餌㡬翻秋月春風泛宅浮家到處雲濤雪浪千尺絲綸直下五湖烟水閑遊西塞山前望白鷗之㸃㸃富春灘上擁翠岫之層層惟見物外之蹤多遇箇中之友或潜修於至道或黙悟於眞機卓𠔃獨存超然不泯伏願暫離仙府畧降塵寰同開導於幽魂特圓成於齋事其有勤勤於網𦊙役役於鈎綸豈躭山水之清姑爲口體之計勞亦至矣時可留乎兩曜相催百年𣊬息數焉有限命也必終短棹長竿至此時而難顧風巾雨㡌嗟遺跡之空留岸邊之墓巋然舟上之人去矣伏願母拘昔習不着前縁徑出幽棲特臨齋次一聞妙道咸證生方以今焚香攝召耕稼之民農桑之衆爲庶政之先務居四民之最勞負耒挾耰冒寒暑而同輟沾體塗足淩風日以惟勤仰輸府育之艱遇豐穰而徂給東作西成之望遭凶歉則罹憂或衰老而善終或飢荒而困斃或遺體骸之零散或孤塜之尚序林莽凄凄魂神何托歳時寂寂享祀莫沾願招集以來臨請提携而並赴識破浮生之夢幻不淪鬼趣之沉迷承此善縁陟諸仙界以今焚香攝召川陸經商江湖販鬻汨没世縁之累奔赴貿易之途駕槖馳車逐旅程於無際張帆轉䑨泛波面以何窮多成異里之飄蓬乃至他郷之寓跡或幸得資基之豐厚或終身世網之荒涼或抱患於遐方或委軀於孤館或巳老而未止或尚少而早亡或逢盜以傾囊或覆舟而䘮命念遺骸之莫返痛逺魂以難招伏願來聽眞詮共登道岸貨財即身外之物難隨泉下之魂郷曲乃世上之居莫重生前之戀猛行棄捨必遂升騰以今焚香攝召伶人樂部徘客倡流語尚恢諧藝精絲竹曲折於舞群歌板豈其性之使然隨逐於馬跡車塵亦爲勢之所逼將欲圖温飽之計未免有迎送之勞然而聚苦浮雲散如流水年華向謝多非可托之人數限旣終恐作無歸之侣伏願塵緑不染舊念皆忘即相率以來臨領薦修而度化以今焚香攝召路岐市藝南北雜能或教習禽蟲或藏壓花果或刻木牽絲而使舞或騰烟凝焰以從輝或橫索以歩馳或環刃而飛度或以力角觝而分勝負或爲象影燭以效折旋此等之儕類甚多近世之技能尤衆但窺温飽亦人心之所同而身久道途乃其勢之不免豈皆樂爲此計亦恐他無良謀因循虚度年華悠乆難成基業生則聚散之不定死慮飄蕩之無歸伏願捨彼妄縁悟兹眞理聞經聞法明性明心旣沐玄津必生樂國以今焚香攝召今古有司係公胥吏奉行文墨助郡邑之承流遵守條章賛聖朝之宣化或能隨機而立善行或由𨽻役而積隂功家可保而嗣息繁昌身雖没而魂神不墮伏願鑒兹修建同作證明濯此靈休益増善業或者嗜財黷貨倚勢而爲姦縱暴行私侮文而致毒或入輕而出重或害物以傷時未免禍起於一朝或致身流於萬里或性命之不保或家業之敗亡雖陽罰之巳鍾慮隂愆之未脫承兹道澤普宥宿辜伏願悉詣道場均沾資薦投誠天闕悔巳往之非超識地關求再生之路以今焚香攝召割烹之衆宰屠之行或刲羊剌豕以爲生或屠狗解牛而謀息或炮炙以精滋味或豢養以供鮮𦘺乃由身口之榮遂爲衣食之計其事雖居世之難免而此業則擇術之良非慮殺意之云多恐慈心之終泯及其奄謝或致牽纏伏願洗滌舊懷發生善念來沾淨供即返人倫以今焚香攝召絶葷之衆喫菜之徒或傳二宗經或稱四果教或云白佛法或號金剛禪或歸二㑹子之師或習五來子之曲或雜聚男女或不祀祖宗或眩左道以爲功或𤑔乳香以爲禮日散其跡夜集其徒或即釋氏以爲名或引道教而掩僞外託幻變内事邪魔夫民生而俱禀良心惟性流而習歸邪教中人之性可上可下不根之說乃惑乃滋䧟其醜而欲脫無門殞其生而雖悔何及且斷葷而戒酒本是善基然叛道以遺親遂成惡果伏願絶其誑妄祛彼愚迷大回遷善之情毋啓好竒之想天地之内正理常存人鬼之中本眞不滅赴此潔誠之㑹濯兹清淨之風何必行其所難行自合悟其所當悟俯仰無愧超脫可期以今焚香攝召産死婦人孕亡人子或因結胎而受患竟以傷生或由育子以成艱終於殞命或子母不分而死或血液未靜而亡在常情已可驚疑於死魂必生迷執伏願返其本性悟彼天眞當知結穢濁以成身由清虚於禀識一靈越古今而不泯衆穢遂塵垢以俱消何拘産死孕亡亦受隂資陽錬滅諸障難往遂生成以今焚香攝召宼忀之軰劫掠之從或迫於飢寒或困於荒歉大則槌牛發塚小則穴壁踰墻閭里爲之不安郡邑從而掩緝或䧟誄殛或遭竄流或殞於狴犴之中或没於道途之上或孤骸之暴露或遺體之摧殘豈其資性之皆然亦爲習氣之所使生而不幸死也何歸承兹滂霈之恩悉悔牽仍之惡即超苦趣早出冥郷以今焚香攝召犯刑徒衆法死傷魂或肢解而臠分或身殘而首斷或重杖而斃或乆禁而終或流竄於要荒或誅夷於廛市或以殺人而抵罪或以不軌而伏辜䧟此極刑豈非宿分然旣已證結於陽案蓋將原免於隂曹幸被道恩必回本性宜知五體之雖壞當悟一靈之無傷悔艾前非沾濡大宥攺過而不復求度而可升舊屋宇不須回頭新根芽却須致念若得脫於六天九地宜不忘於三綱五常爲鬼爲人守禮守法永離惡道即度慈舟上來攝召三途之衆萬類之魂有識有情無依無倚具述不盡聲說難詳無極無窮無數無限無逺無近無姓無名或以壽終或以惡死或因癆瘵或被瘟㾮或墜馬而覆車或溺江而赴水或自刑自害或自縊自残或落澗墜崖或委溝䧟井或中蠱而殞或服毒而傷或死於家郷或終於道路或巳老而逝或尚少而亡或虎噬蛇傷或雷嗔電撃或受刀刃或被弓鎗或萬類人民或百工技藝或宫或吏或賢或愚或富或貴之流或貧或賤之軰或孤或寡或女或男或無資基或有家産或爲奴婢或䧟孤寒或患聾盲或困喑啞或腰身中疾或手足不全或少也奔馳或壯而遊蕩或乆絶嗣息或尚存子孫或尸柩已焚或墳墓猶在或浮遊郊野或執滯坵墟或繋隂獄地司或在嶽宫水府或拘城隍社令或沉嵩里黄泉或抱𡨚讎或懷忿怒或巳經證結或未盡報償或役電驅雷或擔沙負石或縈閉幽夜或漣汲溟波或末得遷升或不經濟度或往劫沉滯或近世淪亡或土石精靈或山林鬼怪或魑魅而處潜隱之地或魍魎而在恍惚之中一切幽靈無邊鬼爽想皆祗赴盡巳來臨幸不拘於等倫召齊同而慈愛毋以貴而淩賤無懷恨而挾𡨚毋啓忿爭毋生喧雜靜其念慮整其神儀值此良因可爲善遇將登齋次先就浴幃法衆稱揚前行引導舉大聖黄華蕩形天尊引至浴室宣沐浴斜髙功存變浴室請降生炁灌注身中伏以久辭人世荐處冥郷或隨五濁以飄流或墮三途而謫役或浮遊而神不返或散蕩而魂未全方脫昬衢恐罹隂翳若非澄神而滌慮豈能謁帝以朝眞是以廣闢清場嚴陳浴室仗髙玄之妙䕃資大道之神功變此凡區悉成妙域頃刻而大周六極恍惚而廣並二儀萬類鬼神悉能灌濯九州魂爽盡得清明衆慮俱清六塵咸淨欽承惠澤並浹玄津一切隂靈靜心就浴奉爲孤魂上資往生仙界念沐浴蕩穢呪天氣澄清五色髙明日月吐輝濯錬身形神津内盥香湯錬精光景洞耀煥映上清炁不受塵五府納靈罪㓕三塗禍消九冥身受開度昇入帝庭奉爲孤魂上資往生仙界念沐浴錬眞呪太上髙眞九靈之精使魂飛仙上登紫庭沐浴華池神身澄清精通太虚萬炁自生伏聞惟水可湔於根塵非呪莫消於宿障更須詳緩悉就蕩除再誦玄文以資濯錬奉爲孤魂上資往生仙界念沐浴錬度呪龍漢蕩蕩無形無名渺渺億劫黄道開清神燈朗耀九魂吐精玉虚澄輝太霞髙明元始開化諸天齊靈三元導養二象攝生巳度者度未成者成已死即化巳枯即榮蠢動蜎飛一切冥靈懷胎含孕咸得受形亡靈命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天神地祇及諸河源五嶽四瀆及諸名山洞玄洞虚洞空洞仙無極大道至眞尊神無窮無極普監度生地根斷絶玄都記名衆神並映一切咸聽奉爲孤魂上資往生仙界念沐浴東井呪天河灌東井石景水毋精圓光拂靈曜玄暉瑩髙明元始披重夜天人逐月生沐浴蘭池上龍負長庚瓶金童灑香花玉女流五星冠帶濯玉津錬度五仙形體香萬神降乗景登髙清伏以遊魂滯爽巳離幽昧之郷塵念欲根復被沖虚之澤神明整聚性識昭融奉爲孤魂上資往生仙界念録字回生呪天地同清五色髙明玄黄施化沐浴玄精三晨朗煥五緯交迎胞胎結節洗滌氛營光鮮萬炁靈漿自生玊樓金室祖炁流行惡對落滅寳梵雲征伏以冥識無依或稽留於隂境眞科有格用濟拔於幽途旣召來臨巳行就浴嚴裝冠帶恭詣道前給化仙衣再宣靈韻奉爲孤魂上資往生仙界念金池冠帶呪金眞降靈炁散玄黄沐浴丹池眞氣芬芳二景冠帶天爲隱藏左振玉佩右䇿金璫浣除詣穢遊行紫房雲霞鮮耀飛玄羽章九軿洞煥流金振芒伏以形神整復炁識開聦羽袂仙裳遂雲風而輕舉神章秘呪宏道䕃以廣覃更祈接引之恩便遂叅朝之樂奉爲孤魂上資往生仙界念清水度魂呪巍巍道德尊功德巳圓齊降身來接引師寳自相携慈悲惠法水用以洗愚迷永度三塗岸長辭五濁泥伏以諸塵旣淨六慾皆空永辭幽暗之郷髙陟光明之境所當識眞返本悟過思愆振肅精神嚴存識想恭赴齋席䖍詣靈壇瞻望金闕玄都朝禮玉京上聖祈天自列向道力陳是乃歸善之得門斯爲自新之有路不冝慢易所合䖍恭道衆諷經同行導引諷中篇伏以冥府幽都或未沾於玄澤沉魂滯魄恐難值於善縁今幸有此遭逢可謂非常慶㑹逺瞻玉闕拜手清都恭對齋壇馳神紫極衆等䖍誠朝禮以盡歸誠臣等志心稽首禮太上無極大道臣等志心稽首禮三十六部尊經臣等志心稽首禮玄中大法師伏以叅朝大道敬禮髙眞巳遂投誠所冝堅志旣知妙本且識根源毋得妄惑異端毋得輙信邪道巳流者至斯而返自執者於此而通念念無邪心心歸正陽境豈難托化隂府安得拘留退就斛筵相携受食引孤魂赴茭廓次第呪食如未呪食則云孤魂等衆朝眞獲畢望闕巳終當退就清場伺候薦餉爲此良因念十方靈寳天尊不可思議功德呪食文伏以眞機妙用可以潜通至道神功端由誠格況玄科之素著大法之宏張玉篆煥如雲雷寳誥昭如日月變化於頃刻應感於斯須今齋官潔備斛筵嚴陳供禮普資五道以及三途廣設九幽旁沾萬類然非秘呪安能化兹凡饌非道力何以度彼衆生孤魂旣巳悉臨法食當爲呪施道衆呪食髙功執眞文五道望天闕宻啓上帝次存想各方眞炁下灌斛筵毎方燒眞文逺立吹灰於空中存斛筵廣大可以遍逈無窮所是本法用眞文及存變之詳巳别出奉爲孤魂上資往生仙界念玉清惠命啓請呪稽首冥惠虚無尊稽首歸命重玄主栽成天地無德稱悉爲衆生作恃怙慈濟五道轉輪魂哀救三魂地獄苦皈命金闕天中尊皈命六度慈悲父皈命玉清無上眞以離生死長綿綿出有入虚無所待能令枯朽變成仙千劫萬劫難一遇爲衆廣說業因縁廻骸起死永長存使其形神無變遷奉爲孤魂上資往生仙界念淨酆都呪茫茫酆都申重重金剛山靈寳無量光洞照炎池煩七祖諸幽魂身隨香雲旛定慧青蓮花上生神永安奉爲孤魂上資往生仙界念甘露法食呪功德金色光微微開幽關華池流眞香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寳旨自在天堂遊奉爲孤魂上資往生仙界念三光法炁法食呪浩晶生法炁氤氲凝玄中兩曜共澄徹五緯交相通三光煥巳明寳氣盈三宫帝郷㑹九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫壽無窮奉爲孤魂上資往生仙界念三光流精法食呪妙道分一炁炁中分隂陽凝化日月星燦然流三光九華含九道八色怡八方煥爛洞眞體流精歸太茫下生淵泉宫上列無何郷縱體復飛跡忽然都相忘七寳流精潔混沌雜華芒咽服九雲散此樂殊未央奉爲孤魂上資往生仙界念三光陽玉法食呪陽玉正眞炁妙眞三景分玄和唱靈音八㑹敷瓊文五老宴丹宅飄飄乗景雲大聖諸天衆駕龍飲玉津三五定生籍遊戲太上賔華光朗無際携手朝帝宸奉爲孤魂上資往生仙界念玉清甘露法食呪囬首仰圓羅合景揖靈芒拘魂制七魄思審定中央行住禮虛無寢息宴玄房飢飡黄碧華渴飲瓊林漿神旌命大魔合體錬眞光復照觀大無恒在空中遊圓通泯波濟眞化靡中期窅眇無終始行者當明知寂寥忘理教應運闡宏規降道不自昭要當先所施會歸無二處隨心自合離奉爲孤魂上資往生仙界念玉清雲宫梵昌生魂育魄呪靈芝無根衆化之原中凝七魄上結三魂二十四眞出入無門杳冥之中恍惚元精隨劫存亡逐炁而生外凝混樸内養七經五神植華三台敷榮紫𨵗素童返形歸嬰騰雲而升騁霧浮空中有玉眞號曰神公左挾無英右衞白元玄獸遏後丹禽擁前上浮翠蓋下湧金蓮香雲凝空甘露無窮用之無盡㝷源不終次諷中篇以多爲度右諸方呪食所用呪互有不同此特叙其通用者爾回向上來施陳法食宣演靈章並祀冥途廣資幽爽諒承道力必享淨筵兹當端肅於形神澄清於識想一心向道萬念皆眞更兹濯錬之功前進登升之路爲上因縁念生天得道天尊不可思議功德上清靈寳大法卷之三十八
