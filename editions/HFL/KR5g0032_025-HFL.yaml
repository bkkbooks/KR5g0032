front:
  text: 上清靈寳大法卷之二十六彩八
  hash: sha256:c58ee970851cdd43957c56ec97041dffaa573ec2faec9d746dea8cfcd68ad3f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_025-001a, image: hfl/0968/0968-084.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童𥘉府右翊治金兊中編六幕啓謝品君前用表禮也太子諸王以至宰執大臣用箋用啓亦禮也此世法也道家古來立教之𥘉止有章詞中古以後體效世法遂有文檄表狀夫旣叅古典而約以禮經則六幕合用箋文舊格用表於師前戾乎禮法矣近者有用䟽者及考漢唐朝臣論事皆用䟽如宋之上殿劄子之𩔖今師前之䟽乃叙事於前而以排句四六之文作右語此又非古之䟽體故止從古者上太子諸王之例用箋於禮不悖乃爲適中謹按文選有晉梁箋九首内二首上太上箋則稱臣其首云臣某言其末云死罪死罪其餘與朝廷元輔并諸王皆不稱臣首末一同並無中謝若宋朝令格内箋式則與今之表相同只攺頓首爲叩頭却不稱臣𠃔中從師傳止於天帝前用奏牘上表其餘列具並用箋通考古今之式則體太子之例用箋稱臣儻依晉梁舊體以散文爲之或從今制則對偶排語亦從其便須更典則無𧇊不爲致君臣一等其中言詞却以簡切而無䙝瀆爲尚若務文詞華麗牽引故事如几世朝廷表箋體則於道典違科誠非以實應天之本意也𠃔中所述姑待一時之用非敢執爲定式髙才慱學練逹科教之士自以雄深雅徤之文而易之尤幸也啓六幕壇箋六式啓玄師臣某言臣今月某日爲某人修建某齋爲某事以今肅啓建壇者臣聞龍漢開圖包萬天之祖炁赤明啓運列三洞之明科旣宏濟度之端遂有齋修之格輙遵師訓仰叩天閽臣不揆么微濫司教典舒壇闡事庸罄竭於齋盟列欵謄詞以敷陳於哀愫况奉精虔之懇恭攄朝奏之儀儻非仰賴於師慈豈獲上通於帝闕恭惟玄中教主大法師靜老天尊道均天地化並隂陽陶鎔萬象而自不以爲功訓育三才而物皆被其澤俯察告齋之至願不違立教之𥘉心接引愚迷矜憐迫切冀章詞之上逹保齋直以無魔俾茲一念之忱上徹九重之聽謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋啓五帝臣某言臣今月某日爲某人修建某齋爲某事以今宿啓建壇者臣聞混茫資始分三炁以凝眞浩蕩裁形列五方而作鎭典功過之録籍司懲勸之權綱將賴帡幪敢攄情懇伏念臣生身麈濁受性昏庸偶藉夙縁獲依冲廕旣奉正眞之教敢宏濟度之科肅壇襌以朝修列詞章而關啓非仰干於鑒録豈能遂於感通恭惟中央黄帝天君北方黒帝天君西方白帝天君南方赤帝天君東方青帝天君毓妙劫𥘉融神化始佐乾坤而拱極秉造化以司方恩浹萬生利覃羣品專體精誠之禱俾成齋直之功悃誠上徹於九霄惠澤遐霑於六合百靈效職十地開光謹奉箋啓以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋啓三官臣某言臣今月某日爲某人修建某齋爲某事以今宿啓建壇者臣聞至仁闡教垂濟度之明科大道宣慈列齋修之教典人天同福幽顯均休輙録凡悰上陳淵鑒伏念臣蠢愚濁質瑣陋庸資夙際善因獲陶眞化愧才能之謭薄念識見之昏蒙行道建齋乃謬當於首職濟生度死慮難格於髙穹匪賴成全曷能就事恭惟下元水官帝君中元地官帝君上元天官帝君斡旋萬化掌握三靈羣生悉𨽻於統臨衆善咸歸於校録况屬齋盟之始敢干考察之司所冀謄啓九清關聞三界赦愆宥過俾齋直以無魔錬魄陶魂庶幽沉之獲度曲停仙仗俯察齋功謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋啓天師臣某言臣今月某日爲某人修建某齋爲某事以今宿啓建壇者臣聞運偶眞期播靈風而育物天開神化宏至道以垂文昭示典彛作成今古爰徼慈佑庸啓清場伏念臣宿藉善因早濡惠澤愧功能之未立念濟拔之當勤况承虔切之辭敢伸關告恭按典章之格用竭修崇實藉提携庶期感徹恭惟三天扶教輔元大法師正一靜度顯佑眞君禀資道粹分炁魁靈功拯世於萬方職侍宸於三境陶鎔末學接引將來益恢立教之恩俯録告齋之悃伏願謄詞天闕頒命地司降法籙三洞之官君勑經科十方之將吏禀符受令啓道開關俾齋直之圓成庶幽顯之昭泰謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年歳次月日具法職臣姓某上箋啓三師臣某言臣今月某日爲某人修建某齋爲某事以今宿啓建壇者臣聞運肇重玄列萬途而布化祥開三洞緫衆妙以流輝昭示典彛恢張矩範僭孚愚愫仰冒靈司伏念臣拯幽護明功莫先於齋福謄詞列𣢾事實𨽻於師垣况奉堅誠式稽舊典欲期感格須仗恩矜恭惟靈寳度師君靈寳籍師君靈寳經師君立教𥘉元垂科永劫惟經籍度之累洽傳道法籙之羣書曲軫深仁俯憐後學伏願特迂眞馭俯駐皇壇俾齋直之就成庶詞章之上御謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋啓監齋臣某言臣今月某日爲某人修建某齋爲某事以今宿啓建壇者臣聞道啓冲科遂列齋修之格教敷眞䕃乃分典領之司事仰𨽻於玄曹誠用攄於凡悃尚祈淵鑒俯録齋盟㐲念臣幻網結坯庸昏受質本無逹識冒玷玄班旣承齋主之傾𠂻恭勵法流而孚告祈顯幽之共濟庶遐邇以霑休匪仗鑒觀豈容成就恭惟靈寳監齋大法師眞君錬眞累劫宏化萬方恩普浹於迷途澤廣周於後學畧停仙仗千靈翊衛於玄壇少振典儀三炁𠑽盈於法界謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋謝六幕散壇六箋謝玄師臣某言臣今月某日昨爲某人崇建某齋巳遂圓成者臣聞天覆萬有塵愚俱頼於陶成教出九清幽顯悉蒙於開度遂令末學獲畢齋修敢罄凡悰荐干冲聽伏念臣建壇行道須仰籍於教科思神念眞實難全於典格臣等微行淺陋進止乖踈性愚識昏詞章䙝瀆幸關行之旣畢念違戾之誠多拊已自慚捫心有慊恭惟玄中教主大法師功超十極位列三天綱紀隂陽恩普霑於六合扶持造化教廣被於萬方遂令草芥之微𥨸冒師尊之庇伏願大垂矜憫曲賜慈憐原貸深愆削五帝四司之籍鑒昭凡悃超三途九獄之魂澤被無窮恩霑有識謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋謝五帝臣某言臣今月某日爲某人崇建某齋巳遂圓成者臣聞元𣑽萌輝靈機運化惟度人之無量故拯世之有經幸依典録之恩獲畢齋修之禮敢殫下悃荐瀆靈威伏念臣禀質卑微賦資愚鈍身濫膺於符籙學未逹於典章列款盟心難抑來誠之切謄詞展敬遂全法席之終慚無善之可書徒積愆之是懼非祈憫濟難冀原容恭惟中央黄帝君北方黒帝君西方白帝君南方赤帝君東方青帝君與道分眞隨天肇粹校萬靈之陞黜運五炁之循環塵凡悉在於矜包幽顯咸依於覆育願勒修齋之渺福曲寛戾格之深辜苦爽遷神昭六天而清泰含生遂性寧萬𩔖以安平謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋謝三官臣某言臣今月某日爲某人崇建某齋巳遂圓成者臣聞瑶壇崇啓旣霑鑒應之恩玉節旋回敢罄禱祈之悃奉彛章而荐愬仰靈眷之再孚伏念臣季世凡資塵勞末學一念無統莫知修進之階百過未消豈錬齋修之典徒按儀而就事慮違式以成愆深知譴罰以難迯敢露忱誠而自訟恭惟下元水官帝君中元地官帝君上元天官帝君尊臨九府攝制三元神人悉𨽻於校量幽顯咸資於陶鑄憫兹蠢昧賜以寛容赦失格之深辜宥同齋之衆過恩覃三界願紀勒於齋功澤被十方普超升於滯爽謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年嵗次月日具法職臣姓某上箋謝天師臣某言臣今月某日爲某人崇建某齋巳遂圎成者臣聞元綱啓藴開濟幽度世之科眞教垂文列闡事修齋之品遂令末學獲畢善功伏念臣體未洞眞才非格物誦經行道輙祗事於彛章犯禁失儀實有𧇊於成典惟籍師尊之宥庶寛凡陋之辜恭惟三天扶教輔元大法師正一靜應顯佑眞君天目誕靈雲臺錬秀感玉局再臨之駕傳琅函千軸之書願憫凡才益恢洪誓扶持隱顯曲行紀善以頒恩原宥愆非免俾因齋而獲罪曁諸有識同證無爲謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋謝三師臣某言臣今月某日爲某人崇建某齋巳遂圎成者臣聞妙本無言隨機而設教元樞著式應物以宣慈爰因典則之恢宏俾迪齋修之成就不慚累瀆再貢誠祈伏念臣猥以凡微叨承化育自顧謬庸之品僭班濟度之司建壇席而行香誦經奉章詞而濟幽度顯幸關宣之畢事愧終始之違科非仗師恩豈迯𡨋譴恭惟靈寳度師君靈寳籍師君靈寳經師君翊天典教宏道傳眞振清化而不窮播神休而罔極曲矜末學削罪籍而宥愆非俯録齋忱紀善功而昭惠澤十方均慶九夜蒙休謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋謝監齋臣某言臣今月某日爲某人崇建某齋巳遂圎成者臣聞立儀闡事爰遵齋直之規奉教行科實籍鑒觀之澤敢終愚悃荐冒靈慈伏念臣素之青才幸霑玄廕典章莫練濫居濟度之班存念未眞謬列關謄之職雖勉強以事竟驚違戾之愆深輙賴矜容亟伸悔謝恭惟靈寳監齋大法師眞君主權科範典録教綱巳蒙成就於善功尚冀原除於重譴伏願謄詞九極關告諸司勒齋福以無窮渙眞休而普浹合壇法衆咸消紀過之編率土含靈盡迪有生之樂謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年𡻕次月日具法職臣姓某上箋𠃔中依按杜廣成齋科列六幕次序叅酌古今典禮故用箋文惟五帝近世多以爲五老上帝遂列位作東方青靈始老天君之類但五炁在天中則爲五老上帝在天文則爲五星在地則爲五嶽在事則爲五常在物則爲五行在神則爲五帝是東方青帝威靈仰之𩔖是也在人則爲五臟夫五炁無徃而不在但五老上帝乃五炁之根宗天中之上帝若紏察凡人之功過典録世間罪福恐非天帝所當下臨故玄中法師主領教綱而三官五帝攷察功過此五帝實三界之有司而巳若東方青帝靈威仰南方赤帝赤熛怒西方白帝白招矩北方黒帝叶光紀中央黄帝含樞紐蓋舊來有經中注解即以此五帝爲五老巳恐不安而有青帝司春赤帝司夏之𩔖乃五方帝也此則當與三官同爲考察之司此外五帝之位尚不止此酌其事體則齋壇之位只用東方青帝南方赤帝西方白帝北方黒帝中央黄帝乃爲通義不必指五老上帝以爲定制况先儒論五帝古今未有酌義而司盟齋事乃三界有司之職故位在玄中之下而與三官同列是尤不可定爲五老上帝也貫通經教之士更詳考之又重序于醮謝聖位内矣上清靈寳大法卷之二十六
