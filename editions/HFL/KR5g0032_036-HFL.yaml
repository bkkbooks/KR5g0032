body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金允中編水火錬度品錬度之儀古法來立雖盛於近世然自古經誥之中修眞之士莫不服符請炁内錬身神故劉混康先生謂生人服之可以錬神而鬼魂得之亦可度化是錬度之本意也混康即宋朝三茅山宗師觀妙沖和先生乃華陽道士大觀二年再赴解化於闕下是以錬度之符莫非法師自錬度之法今乃不然不據源流不分品格諸法衆經之中兼収並取悉以錬度更不究其來歷是致無所經據之符近又不計其數也若夫水火之本眞隂陽之正炁天地之所以肇人物之所以生茫不考也甚者以南極北極爲水火殊不知金木之相見果配合爲南極北極乎如此則北極屬隂南極屬陽矣徃往徒見有南斗陶魂北斗鑄魄之說遂以此取求水火於二極耶北斗乃是中斗南斗是二十八宿中斗宿正在東北之角南斗亦非南極也夫南極乃與北極相對爲天之樞紐北極出地三十六度出於地上矣南極入地三十六度爲地所遮故世不可見天有三百六十五度四分度之一半出地上半隱地下北極之去地上也再三十六度爾於是世人望之正在北方以周天言之北極乃天中之中此非坎位也南極亦非正南也若正北之方乃自危宿十五度至虚宿十度四分之一此則坎位也若正南之方自張宿十六度至星宿七度此則離位也此始是南北之正方坎離之位若南方丹天界朱陵火府乃南方之天亦不稱南極蓋有以也孰謂水火而岀於南極北極乎此等主行齋醮著書立言其說頗礙如路眞官玉堂齋法只請炁於太陽太隂其說雖若淺近而未至礙理以至奏木公金毋以爲隂陽之宗則内丹外藥俱通而金隂木陽有地人得之可以成眞鬼魂得之可以返生錬度可行則不可知得其炁與不得其炁則在人能感召之間且使上不失天度下可近取諸人身矣然匹配隂陽未甞去水火也而木乃火之根金乃水之母至於丹成藥就則㑹四象於中宫藉黄婆而媒合木與火皆陽也金與水皆隂也用水火必取諸坎離之位求木金則不越震兊之宫此仙經之定說古今之通論指中天紫微垣帝庭以爲坎宫而請水亦謬甚矣於齋中預拜木公金母表或於錬度當拜表從便施行所有先行召魂已見神虎品次則沐浴呪食錬度不必别立其所合於道場内上帝之前可也其錬度官將當俟散壇併行醮設是醮眞靈之義也或專設錬度醮則從近世之儀可也錬度醮科亦當撰述以舊來師尊所行只於上帝前行事是以不敢編入此法沐浴科書朝眞讃導呪食白文并正薦傳戒科並行重撰編條列左正薦沐浴儀呪則用諸方通行者引魂赴浴室啓白伏以肉敗形摧質巳歸於壞滅神離炁散魂乃屬於虚无初馳垢穢之可除大抵神明之自淨第恐沉淪或乆昇陟未期長夜之郷陽輝寥絶至幽之境隂炁溟濛況志念著於世縁𩔖多牽戀魂識零於泉府易致塵昬惟一性之不純故百神之難復是用降九霄之生炁召兩曜之晶華浴幻芒而廣大无窮變凡水而清涼普浹斷百情之内垢明一念之眞根亡過某當知不滅者初非色身長存者乃爲本性在世有形之穢今以成空歸隂未淨之懷正宜自滌然後沐兹澄水濯彼靈資望闕恭朝赴壇受度特吟仙梵請就浴幃慈悲接引天尊伏以水之妙用德爲至深齊二象以分靈冠五行而潤下方圓隨所凝泮以時惟造化之宻符故塵勞之可滌況於降九天之正炁誦三洞之靈章德能被於幽隂功乃遷於沉滯亡魂某澄清淨念悟性超凡沾灑蘭湯以時灌沐奉爲亡靈上資往生仙界念沐浴蕩穢呪天澄炁清五炁髙明日月吐輝濯錬身形神精内盥香湯錬津光景洞耀煥映上清氣不受塵五臓納靈罪滅三途禍消九冥五根斷絶福慶自生今日大願一切告明身受開度昇入帝庭奉爲亡靈上資往生仙界念沐浴錬眞呪太上髙眞九靈之精使魂飛仙上登紫庭沐浴華池身神澄清精通太虚萬炁自然伏以身爲患本情乃妄根因此身而起七情由六欲而生百慮萬縁俱動衆垢咸臻身若不存垢亦隨滅第恐臨終染穢在世沾塵魂雖歸空疑終未釋良由戀體遂至迷眞今者仗以眞文開以本性布三光之正炁陶二象之生津斷彼妄根釋諸疑想奉爲亡靈上資往生仙界念沐浴錬度呪龍漢蕩蕩无形无名渺渺億劫黄道開清神澄朗耀九魂吐清玉虚澄輝太霞髙明元始開化諸天齊臨三元道養二象攝生未度者度未成者成巳死即化巳枮即榮蠢動蜎息一切冥靈懷胎含孕咸得受形亡者命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天神地祗及諸河源五嶽四濆及諸名山洞玄洞虚洞空洞仙无極大聖至眞尊神无窮无極普鑒度生地拫斷絶玄都記名衆神普應一切咸聽伏以困縁報封理在不誣輪轉昇沉悉由宿業報對自有休咎豈無惟其一念以沉迷雖歷千生而滯礙今巳澡鍊神宇整聚眞元惟夫重濁之形軀壤滅旣乆沖虚之性識清淨常存然後捨舊從新回情易慮奉爲亡靈上資往生仙界念沐浴東井呪天河灌東井石景水毋糈圓光拂靈耀玄虚營高明元始披重夜天人逐月生沐浴蘭池上龍負遍長庚金童灑香水玉女灌五星冠帶濯王津鍊度五仙形體香萬眞降乗景登高明伏以舊障巳除煩塵滌盡茫茫攻態有似夢中肅肅仙容獲承玄䕃遷神非冕返生有期奉爲亡靈上資往生仙界念録字回年呪天地洞清洗穢除塵鍊化九道返彤太眞百關納靈節節受新清虚鑒映内外敷陳日吉時良度命回齡玉童玉女爲汝執巾玄靈紫盍冠帶汝身使其長生天地同根伏以炁織旣清形神巳復披仙衣而束體嚴冠履以朝眞再誦靈章化陳羽服奉爲亡靈上資往生仙界念金池冠帶呪金眞降眞普天炁清錬化金池沐浴身形三光耀煥我道日明飛仙羽衣上昇玉京五濁巳清八景巳明今日受錬罪滅福生長與五帝齊眞上靈伏以靈機罔測神化無窮幻成羽袂以蹁蹮復彼天姿而整潔即從導引前遂參朝奉爲亡靈上資往生仙界念清水度魂呪巍巍道德尊功德巳圓齊降身來接引師寳自相携慈悲灑法水以用洗群迷永度三清岸長辭五濁泥伏以澡濯既終嚴裝事畢表裏俱淨識想咸恭敬詣靈壇仰朝天闕衆行引導共舉仙音道衆誦中篇引魂朝謁表白引讃伏以天人有間精念慮則可潜通幽顯雖殊聚形神則能脗合況於玄壇崇建妙範恢張衆眞列仗以臨軒上聖流光而照陛期乃轉禍爲福之日實爲首愆謝過之辰今亡靈正當盡念傾心陳詞列欵歸身歸神皈命禮道禮經禮師夫道爲天地之根宗經乃顯幽之典式然非師何以宏教非聖何以傳經萬世之所欽崇三才之所𠃔頼幽魂歸依則超度世人修奉則仙飛象外寰中常當敬仰人間天上不可暫離亡靈盡念一心䖍恭朝禮志心稽首禮太上无極大道志心稽首禮三十六部尊經志心稽首禮玄中大法師恭以至眞大道无上尊經玄中法師宗壇上聖乃隂陽之樞紐實造化之本源亡靈旣獲皈依自此永當悟解勿流於邪道毋惑於異端念念常存心心不轉三界十方而無礙六天九地以俱空佇俟玄恩以時度化再行導引請赴靈筵聽法聞經享食受供諷經引亡歸位呪食伏以乾坤旋斡生化莫窮數運推移輪迴不息惟消長之倚伏故出没之乗除旣自始而有終本非異事然入幽而隔顯豈不慘懷生而形神處乎陽死而屍魄墜乎地五帝三官之府善惡兼書六洞十宫之曹顯幽並録使其清修而居人世未免考校而詣冥司第其功行之淺深隨其因縁而生化是以幽顯杳冥之境罔測昇沉焄蒿悽愴之情敢忘追奉仰惟至道大啓眞科盡存殁以霑恩極幽冥而蒙福今者奉爲亡故某恭修妙典䖍叩上穹拔度魂儀祭陳靈席雖供饌具於人世而神章出乎仙經召五方之靈芽降三晨之妙炁沾濡飲食化天厨之飡灌濯神形變眞元之體初心煥徹本性開明悟幽顯以俱空歷存亡而无礙然後南宫錬魂東極朝眞返胎易質而隂消聚炁生神而仙化奉資冥福恭演眞文奉爲亡靈上資往生仙界念玉清慧命啓請呪稽首冥慧虚無尊稽首皈命重玄主裁成天地無德稱悉爲衆生作恃怙慈悲五道轉輪回哀救三途地獄苦皈命金闕天中尊皈命六道慈悲父皈命玉清无上尊巳離生死長綿綿出有入虚無所待能令枯朽變成仙千劫萬劫難一遇爲衆廣說業因縁回骸起死永長存使其形神无變遷伏以生生之境形質易以純全寂寂之郷魂識苦於散蕩祭者想之如在呪以招其復來聚彼虚無慰兹追慕旣以望玊闕而啓聖次將煥幽府以遷神宣開化之靈章誦昇天之祕呪庶使亡靈聚魂而復命精念以還眞無間存亡享凡世勤勤之祭終歸道化朝大羅渺渺之庭靜念告祈精誠宣演奉爲亡靈上資往生仙界念天尊說遷神呪茫茫酆都中重重金剛山靈寳無量光洞照炎池煩七祖諸幽魂身隨香雲旙定慧清蓮花上生神永安奉爲亡靈上資往生仙界念天尊昇天呪功德金色光微微開幽關華池流眞香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寳㫖自在天堂逰奉爲亡靈上資往生仙界念三光流精呪妙道生一炁氣中分隂陽凝化日月星燦然流三光九華合九道八色怡八房煥爛洞眞體流精歸大芒下生淵泉宫上列无何郷縱體復非迹歘然都相忘七寳流精結混沌雜華房嚥眼九雲散此樂殊未失奉爲亡靈上資徃生仙界念玉陽法食呪玉陽正眞炁妙道三景分元和唱靈音八㑹敷瓊文五老嚥丹澤飄飄乗景雲大聖諸天衆駕就飲玉三五定生籍遊戯太上京華晃朝無際携手朝玉宸伏以靈章演奥品物化形香有返魂之功花見山林之蘂果成火棗飲變太和天降於靈光水還於金液食之而神錬享之而仙飛乃妙道之玄功實上眞之神化謹依科式普用施陳奉獻諸天無價名香返魂名香返生名香妙洞具香天寳名香蘇合名香嬰谷名香七寳名香香氣氤氲用之無盡周流十方以用供養奉獻諸天上妙竒華金色連華閬苑竒華碧蘂金華瓊玉艶華鳳林仙華大妙竒華小妙竒花七色蓮華華氣芬芳用之無盡周流十方以用供養奉獻諸天瓊林珍果空洞靈爪萬歳仙桃金紫文梨元光素柰赤靈謂棗飛丹紫榴食之無盡周流十方以用供養奉獻諸天四種香飯酆山香飯龍山香飯浮山香飯太和香飯香氣布豐食之無盡周流十方以用供養奉獻諸天七種寳漿日精寳漿月華寶漿星精寶槳甘露寳漿金液寳漿靈光寳漿玉匱寳漿香氣布酆食之無盡以用供養伏以仙華異果香飯靈漿假經呪以資熏召魂靈而祀享想承遷拔盡得霑濡故有合景神眞揖三靈而制七魄雲宫妙呪整三部而養七經返炁聚神錬形易質更兹聽法前即朝眞奉對靈儀再伸演誦奉爲亡靈上資往生仙界念天尊說三光呪回首仰元羅合景挹靈芒拘魂制七魄思臍定中央行住履虚无寢息宴玄房飢飡黄蘖華渴飲瓊林漿神旌命大魔合體鍊眞光復照觀大空長在空中遊圓通泯波際眞華靡終期杳杳無終始行者當明知寂寥忘理教應運蕆弘規鑑道不自超要當先所施㑹歸無二處隨心白合離奉爲亡靈上資往生仙界念生魂育魄呪靈之無根衆妙之原中凝七魄上結三魂二十四眞出入無門杳冥之内恍愡元精隨劫存亡逐炁而生外凝混朴内養七眞五神植華三台敷榮紫霞表童反胎歸嬰騰雲而昇跨霧浮空中有玉眞號曰神功左挾無英右衞白元玄獸遏後丹禽擁前上浮翠蓋下擁金蓮香雲凝空甘露無窮用之無盡㝷源不終伏以靈寳爲萬法之宗度人乃三洞之要深出乎衆典妙極於中篇造化以之推移劫運因之保制凡夫修之得道幽爽仗之成人塵世通津九天寳笈敬伸諷誦專用薦資諷大梵隱語回向上來呪供香羞關宣祕典歸投妙道資薦神儀伏願獲聽靈音俓承道廕死生不惑衝飛流火之郷神識無停過度福堂之上更回餘澤普及後昆爲上因緑志心稱念十方靈寳天尊不可思議功德立錬度壇舊儀以火錬丹界天尊太乙救苦天尊九幽拔罪天尊朱陵度命天尊十方靈寳天尊法橋大度天尊金闕化身天尊寳華圓滿天尊逍遥快樂天尊環而爲壇却以法師九圓攝九天尊奉行九錬固是其儀甚乆而此格實非凡體所可代行勢難襲用至如天台靈寳法中則立九天尊之外又第一曰疾除罪簿司落滅惡根司第二錬曰斷地建役司上解祖考司拔出地户司永離鬼官司九錬中如此之𩔖凡三十餘司鳴呼度人上品妙經何其不幸如此也且經中所言謂十方至眞飛天神王長生度世无量大神並浮空而來以至諸天丞相主録衆眞皆詣帝前校録應度之魂告下三界泉曲羅酆合屬去處上解祖考億劫種親此蓋言其巳死之魂合行度化而上世祖考之延累億劫種親之未脫故當悉行原宥然後却與疾除罪簿落滅惡根是消其過籍赦其惡源也免爲罪魂出離鬼群承元始之符章仙化而成人矣理甚分明不可誣昧今乃云上解祖考司疾除罪簿司是何義也當時經文序述如此豈得取一句作一司眞謬之甚也巳於三界宫曹品巳詳論之然此事逐句取義壤亂典章聾𦗺世人罪不容貸今錬度品恐後人以天台邪說混雜故不得不申言之若鍊度止於道場内上帝之前則左置火右置水一器以備典式而巳固不必意外華飾一念感通則存乎其人髙功上香宻啓次昇座立祝香臣聞意無以自通乃因辭而達意誠難於上徹故假香以寓誠一捻上香供養太上无極大道以兹功德上資累朝先聖到廟皇靈證道登眞昇虚入妙今朝皇帝萬春永壽百順備躬廊廟粹於忠良海宇浹於聲教二捻上香供養三十六部尊經以兹功德奉爲齋主某資薦先亡宗祖巳逝姻親係薦靈魂受度神識伏願衆愆消解萬慮澄清沐斯再造之恩即復自然之性三捻上香供養玄中大法師以兹功德歸福齋主某等各家眷序見在親姻伏願天錫繁禧道垂妙䕃若男若女祈壽禄之増新乃子乃孫俾家門之隆永啓白臣聞三才肇立萬象爰分陶清濁以成人假隂陽而受質禀夫至粹是爲最靈及其炁降而習俗殊塗朴散而修爲異趣泰否旣萌於人世昇墜遂列於幽關考罪福以無遺校功過而莫逭況生死者人之不免而循環者理之固然形質難留終隨數而壤滅魂神未泯必任運以推移儻非大道之流慈豈得幽靈之受度尚頼天垂靈祐教蕆明科大布典儀宏彰格範發九清之寳藴用煥符章分三境之神光遂敷經籍能感召隂陽之正炁可呼吸水火之眞精幽魂得之則仙化而成人凡夫修之則見存而證道是以臣不量賤濁輙慕沖虚𨽻役玄司棲身大教敢按遵依典式願濟拔於幽隂旣巳崇建於齋修當謹依儀而度化以今齋主志勤追悼誠切禱祈用度亡靈早超善境恭望紫清上聖金闕元尊播命自天垂光燭地頒告東華上相宫西臺龜闕及朱陵火府受鍊眞司日月二宫隂陽主宰陶魂鑄𩲸舍屬有司降兩曜之英華布二儀之沖粹勑遣玉童玉女仙吏仙曹一合下降應時悉赴布流眞炁鍚以生津容其奉行特垂開度庶使沉魂復性幽爽生神恭俟天恩俯垂報應臣誠惶誠恐稽首頓首再拜謹言焚降眞召靈符就座召將十方靈寳天尊靈寳本章追拔亡魂上品妙首十回度人中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益筭度厄尊神回骸起死无量度人今日鍊度諸天臨軒傾光回駕監眞度生諸天丞相南昌上宫韓司主録監生火神執籙把籍齊到帝前隨所應度嚴校諸天上帝有命萬神咸聞謹召南方丹天世界朱陵火府南昌上宫鍊度衆眞鍊度大神木宫眞陽生炁主執靈眞旧宫炎光童子丹霞玉女日宫神仙火府玉童玉女火鈴童子火鍊官君將吏金宫眞隂正炁主執靈眞月宫圓光童子散輝玉女月宫神仙水鍊玉童玉女水鍊官君將吏鍊魂度魄聖衆靈寳官屬一切威靈速降壇所禀命奉行髙功存念行持次想五帝眞諱功都成午切角鎭酉興生轉卯獨𨽻遷中旨中功都聚魂攝東南炁剔坎鍊亡魂焚眞文再念紅杏持到卯嘿黒捷同子磨針計刀酉襪臘収成午靈寳萬物中指中文息利合通正一成法智益可眞取驛令下攝取五色炁存諸曹局功曹乗雲御炁浮空而下各爲係鍊亡魂収召魂神澄其性識使之受鍊誦攝魂都呪玉眞萬華宫髙仙藏帝經主圖九天表洞觀無衆生七轉召萬神五嶽一來庭三官招衆魂司録校所呈拔籍重泉曲記仙書上清七世解牢結穢血悉沉零返胎朱火室更受洞中生伯吏衞神軀令我保黄寧此呪出大洞三十六章死魂受鍊天尊變水池左手搯亥文右手執劒遥晝地成水池開天門放地户留人門通鬼路天門萬眞入亥人門眞炁入申地道萬隂空巳鬼道隂炁通寅誦淨天地呪一遍次玄水灑水池焚眞文宻啓白曰玉龜臺九靈太眞金毋元君乞布流隂炁下入池中化成廣大之池想眞水自西北角流入池中湛然澄清再取西北炁一口吹入池中次誦隱語一徧取北方炁吹池中噀玄水一口放訣焚請降眞水月魄符左手自子上剔出未上黙呪曰水帝君降七徧取北炁布水池焚十二河源符搯子文呪取北炁念十二徧吹水中想黄華神水无邊次厲聲祝曰南昌上宫受鍊官屬水池官將神吏鍊度玉童玉女引領亡魂詣水池受鍊想亡䰟入水池濯質焚眞水合同符取北方水炁與自巳腎中黒炁合吹入水池中呪曰北方之君黒帝之精辰星使者壬癸將軍玄武隂神肅肅清音五行造化萬物發生天帝有勑使者須聽攝召亡魂蕩濯身形急急如好生元君律令焚石景水毋東井黄華石景玉精飛玄水毋金體玉津滔滔源源不竭池亭九龍濯鍊三光重精仙人吐潤鍊度亡靈内外朗徹表裏