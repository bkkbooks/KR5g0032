藏府紫户自生仙數周衆眞㑹啓陽應感䌓玉女灌五香聖母慶萬年三界並歡樂稽首禮天尊謹上請帝眞靈府命元髙眞沖融之炁纏其六府使胃管生津以納和焚第六章符應聲無色界霄映冠十方回化輪無影冥期趣道場靈駕不待轡朗然生神章空洞諒無崖玄爽亦爲彊練胎返本𥘉長乗飛玄梁蘄畜䘮天眞散思候履常斬伐胞樹滯心遊超上京願㑹旣玄玄悟我理兼忘介福九天端交禮地辰良混化歸元一髙結元始王稽首儔靈運長謝囂塵張謹上請帝眞元府命元髙仙洞笈之炁纏其九竅使九竅開通心神朗清以開關焚第七章符玄㑹統無涯混炁歸梵輔務猷運靈化潜推無寒暑乗數構貞條振袂拂輕羽瓊房有妙韻汎登髙神所圓輪無停映眞仙森列序上上霄衢邈洞元深萬巨秀葉翳翠霞停䕃清泠渚遨翫怡五神繁想嘯明侣五難縁理去沖心自怡處爽魂隨本根亹亹空中佇七誦重關開豁滯非神武運通由中發髙唱稽首舉謹上請帝眞華府命元眞靈化凝之炁纏其八景使三部八景整具形神幽夜光明以防身焚第八章符清明重霄上合期慶雲際玉章散沖心孤景要靈會煥落景霞布神衿靡不邁玉條流逸響從容虚妙話靈音振空洞九玄離幽裔感爽無凝滯去留如解帶明識生神章髙遊無終敗玄景曜雲衢跡超神方外應感無方圓聊以運四大研心稽首誦衆聖共稱快謹上請帝眞嶽府命元自然玄照之炁纏其身使三關五藏六府九宫金樓玉室十二重門紫户玉閣三萬六千身神萬八千宫府三百六十機關根元本始一時生神令神布炁炁滿能聲聲尚神具毛髮生身諸天下臨以保其身焚第九章符无結固无情玄玄虚中澄輪化无方序數來亦回乗誰云無色平峩峩多丘陵冥心縱一往髙期清神徴良遇非年歳劫數安可稱浮爽縁故條返胎自有恒靈感洞太虚飛歩霄上冰津趣鼓萬流潜凝眞神登無愛故無憂髙觀稽首昇髙功再白夫三炁爲天地之尊九炁爲萬物之祖故三合成德九陽爲眞實天地之玄功乃隂陽之妙用今爲亡過某上請九天降炁五體聚神旣膺大道之殊恩當禀上眞之慈訓蓋九炁生其神三元育其質黄白致相混沌合形六甲周流五行結植法天象地含隂吐陽則地剛柔應天文分度千眞備列萬象森羅合道通眞旣尊且貴於是首爲崑崙髮爲星辰眉爲華蓋眼爲日月鼻爲天柱耳爲天窻口爲天門面爲天鏡五嶽四瀆八海九江一元二儀三光四象五行六律七元八景九宫十方三十六天三十六地莫不備焉皆大道之妙應神靈之所生也汝等若不能尊其炁貴其神省兹始末念其本眞以至躁動凡濁淫惡亂心則傷其神炁炁盡神逝魂沉五道魄殁三途業増九隂殃流七祖生生劫劫休息無期可不悲哉汝等自當清虚滅欲正念無反更生受形人道尤宜含純養素抱朴歸元於慧性中㑹正道是時則神仙可學天上可登故今神變之義是學仙錬神之門户開異時歸眞向道之良心於二儀育質九炁結形之後再行焚化玉嬰神變靈符汝等其深悉此意毋忘此時也焚玉嬰神變符上元眞一守固泥光中元眞一守神絳宫下元眞一守衞命門三元齊景保命益年招靈致炁生降自然變形錬骸骨化成仙毛羽飛輕騰翔帝前急急如律令次以水灑受度亡魂呪曰天澄炁清五色髙明日月吐渾濯錬身形神精内爽法火錬眞光景洞耀煥映上清炁不受塵五府納靈罪滅三途禍消九冥惡根斷絶福慶自生今日大願一切告盟身受開度昇入帝庭又呪北斗落死南斗上生萬靈侍衞諸天記名洞觀無礙元享利貞急急如律令放水盂祝白汝等亡魂受錬已畢躬身壇下承領功德託化人天逍遥自在次兩手煞文擎酆都形生天籙吹中天炁一口放籙上白呪元始符命時刻昇遷北都寒池部衞形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超淩三界逍遥上清說戒伏聞太極未判一炁混融自一分三元綱遂演髙澄乾蓋下奠坤輿孕毓粹沖以生人物惟人之身法象天地配合隂陽故獨靈於萬物夫一炁於本先地先天天地因兹以成覆載人物禀兹以生形質形質旣立於是有始有終人能識存亡之機達生死之變則死未足驚生非可樂身與我累世亦非眞富貴如浮雲恩愛等夢幻要須自能解悟回省眞源斷貪著心絶執迷念百慮俱消一性湛然生死去來本何牽係可以昇陟虚无蓋我禀兹一靈亦與天地相爲終始何以一死一生之爲累耶且人固非惡生而樂死也惟其拘纏世網沉昬愛縁念慮不純諸妄競起但縱情而无極豈悟生之有涯富貴燔身榮名在念貨財山積志亦未猒大數一來悉非巳有身謝之後貪戀益深寂寂幽途沉沉夜壑是知業縁報對尚有休期貪戀迷昬永無了日故太上啓沖虚之化大道開清淨之門拯此迷途岀諸疑網此則垂科立教之本意也今兹亡靈巳棄世縁魂未能整復雖數運自有反生之期而所不能超脫者亦由執迷之未釋貪戀之在懷故也當司巳爲祈告上眞請降符命布隂陽之正炁合水火之眞精復其神明錬其魄識重資混沌再立根基可爲累劫良縁千生慶幸然而猶在亡靈自加警省髙作達觀庶可永脫輪回長辭障惱切宜深悟死生之理徹透存亡之機當知世之金玉珠珍不足寳也綺羅錦繡不足竒也富貴華侈不足榮也粟帛財貨不足戀也至如夫妻父子固云義重大倫然生聚死散亦理之常豈能保其長且乆耶然此等皆人情之所不可免者今乃謂物不足惜恩不足戀是果何也蓋四大百骸人孰不自愛重及其所窮運盡形化神馳血尸肉質悉皆朽腐回顧一身尚不能有況貨財恩愛哉由此言之生則未免隨逐世縁死則不須迷戀恩愛所當省理者惟一靈本性劫劫生生未甞泯滅則知形容累我尸魄亂我財寳昬我恩愛惑我我之本眞固自清淨沖虚超出五行之外則罪福因縁𡨚讎報對亦將煥然冰釋天堂地獄悉成一空惟當認取未生我身以前一無所有方可知根識性悟本超凡則濯形太陽反生人道特餘事爾今則錬化巳畢昇遷有期若受質於人間當毋忘於修檢生生常歸正道世世不墮迷途太上三皈九戒謹當宣演人間天上母忘戒言宣告亡靈第一皈依无上道寳夫道寳者先天先地无形无名謂其无則孰爲造化之根源謂其有則難窺希夷之閫域生萬炁而罔能測其際立三才而不自以爲功或隱號而藏名或聚形而散炁澤流萬劫髙緫一元世世生生當遵道寳道寳讃宣告亡靈第二皈依无上經寳夫經寳者錬空成梵結炁爲文立極流祥隨機設敎開三乗之祕藴列四輔之靈書保劫運而奠乾坤接天地而扶造化廣涵眞奥永度迷津世世生生當遵經寳經寳讃宣告亡靈第三皈依无上師寳夫師寳者傳眞演法立教度人儀表古今提携幽顯玄中教主正一天師或列軄而在天或分身而降世三洞宗壇主宰十方得道仙眞拯訓方來昭明正化科垂有則惠浹无邊世世生生當遵師寳師寳讃上來宣告三皈依者乃古今之正教天地之眞宗當知萬化因此而生三才由此而立況於幽而爲鬼顯而成人三界之中隂陽之内須明逆順宜别正邪自今以還永歸正道毋得䧟於魔教母得惑於異端一念旣眞衆邪不入正理無雜大道坦夷亡靈旣巳徹於眞機更合明於戒律太上科條謹當宣示智慧頌宣九戒第一戒者敬讓孝養父毋第二戒者克勤忠於君主第三戒者不殺慈救衆生第四戒者不淫正身處物第五戒者不盗推義損巳第六戒者不嗔兇怒淩人第七戒者不詐諂賊害善第八戒者不驕傲忽至眞第九戒者不二奉戒專一奉戒頌上來九戒乃天尊垂訓若人常能持守身謝之後永不沉淪今亡靈在冥之日受度之時先須明此教條將來託化受身則忠孝爲首㢘謹自持舉措不失於䂓矩法度之中當此之際豈止根於天性而巳乃習熟於受生之前者也以致在幽在顯固應心心是道念念皆眞出殁去來不背正理一塵無著萬慮皆空是又豈在於戒律哉謹用告下金籙白簡長生靈符太上生天寳籙以爲仙化之憑亡靈諦聽謹用宣行宣符籙壇牒髙功立大聲白云假合隂陽聚本眞神明整復自生身萬縁不著輪廻脫髙歩烟霞謁帝眞下座法事結願表白度魂或普度同行錬化度橋亦可通用此儀專度正薦則專用之爲徍度橋科儀古來有之近世方用且於亭子四門各吟偈一首其辭甚陋而道家法事有讃有頌有歩虚詞白鶴詞之𩔖所有吟偈之格自古無所出勢難從俗雖送亡魂之際添入俗格不甚深害然蕆齋立事務合典儀不經之言豈宜對衆宣演故今除去偈子却易以白文然後舉天尊號續之且免於貽笑於識者伏以推移罔測生莫得以長存代謝匪常殁豈宜於乆滯端在明心見性要當悟正超凡沖寂玄宗虚无妙道天地因之而肇立隂陽由此以陶成所當自此皈依庶使前途際遇今兹齋功旣就善果克圎佩受符章沾領功德度法橋而徑往指雲路以髙昇法衆䖍誠稱揚奉送法橋大度天尊歩虚一首東方九炁天尊行至亭東伏以道恩善應齋福無窮幽昧得以昇遷隂爽悉無沉滯瞻望青華之帝闕朝謁長樂之天宫庶蒙接引之庥即被陶鎔之澤此爲徑路正好皈依直指青霄便期高步同誠奉送恭爲稱揚南方三炁天尊行亭南立伏以循環之機本無沉滯執著之見多自拘纏今旣得濯靈風自可悉明本性祈天望聖即昇流火之郷向道歸眞前赴錬魂之府一心求於度脫六欲捨於昬迷仰沐玄津以資仙化再宣聖號奉送雲程西方七炁天尊行至亭西伏以一眞自悟九地俱空然非兩曜之精華豈復五神之善識是以瞻白玉龜臺而稽首想金眞聖母以傾心仰冀生成以祈度化或隱或顯常樂道以逍遥明性明心永蒙恩而清淨切須正念更勿邪情同爲稱揚再三奉送北方五炁天尊行至亭北伏以望之在北乃是中天仰之彌髙斯爲霄極想穹窿之逺渺渺莫窮瞻閶闔之遥巍巍難際巳露塵情而上奏普祈幽爽之更生兹荷宸恩得圓齋事乗斯妙利更可滌慮澄神仗此善因即遂返眞證性旣無滯礙切莫遲回寳號再揚奉資進歩逍遥快樂天尊引至焚燎所極樂三清界向來回向伏以髙眞慈憫發三洞之祥光大道沖虚布十方之妙䕃恩極乎六天九地教覃於三界四維幽顯蒙庥死生同福垂情濟世无量度人齋主某罄竭精誠恭修齋直上資邦國普及生靈集此善功追薦亡過某靈魂超生善境伏願天恩普濟道澤宏敷善果圓成下脫萬縁之累眞符濟度上超三炁之天自明宿命之因縁永滅前途之障礙一靈自在與道同符回福見存流芳後葉三途九夜俱得清間萬𩔖四生皆䝉昇度爲上因縁志心稱念大聖元始天尊太上道君太上老君十方靈寳天尊不可思議功德靈寳本法錬度符命日魂符眞火合同符火鈴符錬身符月魄符眞水合同符十二河源符金液錬形符石景水毋符五芽眞文青芽朱芽素芽黒芽黄芽右五芽眞文其行用之詳巳見前五芽内錬品九天生神章符此符乃本章九天之炁也正屬上清洞玄靈寳本部非他法可雜若九陽梵炁九霄之符與此不同符見别本兹不再録玉孾神變符酆都山眞形錬度諸符大槩如此惟錬身一符亦出神霄但此符乃十干之字爾以人備五行而生今再資五行之炁以錬其魂此十二字甲乙則屬木丙丁則屬火戌己則屬土庚辛則屬金壬癸則屬水故其後召五方之靈芽則五行之炁也亦非專𨽻神霄而神霄法中自有錬度之式此靈寳本法鍊度皆用經中生神自錬之符若世之所用十二經絡符並不當收入蓋以隂陽正炁錬其魂魄聚其散蕩復其神明去其翳濁使亡靈明知尸形已壞者不足戀靈識再聚者可還生然後啓告九天上帝請降靈津俾九炁下鍾形神方復重資道性再立根宗若符十二經絡則託胎之後九炁結形九月神布炁滿能聲當是之時經絡自生故首以水火二錬終以九炁結形鬼魂反生之事畢矣玉嬰神變符亦修眞之士自服以錬神者故末後告行使其神而明之然後聽戒受符命俓超生路昭應雖然在天行之自宜有理近世錬度科格旣不同符命亦有異皆不可雜用混殽失宗且如酆都山眞形傳流乆矣未甞増損近浙東人於其側増黒池者浙西於側又增硤石地獄者似不必如此増益也夫増黒池者不知其意所據何說或者又以仙戒經所載有十八地獄而山形内只標一十七所遂以黒池湊成一十八所不知山形所標天帝宫鬼帝宫通天門之𩔖則其中之宫闕也上元六洞下元六宫之𩔖也則其中之曹局也共標一十七所乃宫闕有司爾獄則不可勝計也今以曹局而爲獄則大失經㫖况一曹一局之内所主之獄又不知其㡬所至如業報因縁經謂有三十六獄又三宫二十四獄所出互有不同山形之内未易増損或有經據則酆都山形其來甚古神仙上士未甞有加不冝於今日求異若硤石血湖之說專以恐脅生産之家出錢薦拔而爲之其謬妄不待言而可見所有齋科古儀以定壇外科書俗用者多不同今新撰易去世俗常用者庶切事情却非敢爲異也上清靈寳大法卷之三十七
