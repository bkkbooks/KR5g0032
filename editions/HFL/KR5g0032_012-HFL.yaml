front:
  text: 上清靈寳大法卷之十二畫三
  hash: sha256:ddffcfaf21e8a648be8806460bf9dbc202f089fe0e63f958660d005b5ae125ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_012-001a, image: hfl/0965/0965-074.png}
body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金允中編濟生陽德品此八緯中第七條生生之德大矣哉道好生也故生天地天地好生也故生萬物人惟旣生於是以生爲重神仙上士學道修眞反惡夫幻身之累我世人罔究其㫖便謂修行之士不貴乎生是不然也夫得道者不戀形體不染物欲本來一念湛然獨存故其留形也不逐世縁而蕩及其蛻質也不隨形體而亡神錬炁澄超凡入聖回顧眄之胚骸豈非累我老君曰吾有大患爲吾有身太極眞人頌曰外身而身存皆此義也若世人則異乎此身在則神在體存則誠存體質一傾魂神散亂或沉於幽暗或墮於杳冥如此之死不可復生巳生之生夫豈不樂貪生而惡死實古今之常情生生之不窮乾坤之正理是以上帝憫世垂教立科拯厄扶危除妖却妄拜章設醮請福延生皆所以廣大道生生之德而遂斯民生生之願也靈寳古法有濟生陽德品乃醮告斗星延生度命之行用也然非受來詞則事難關申雖爲救濟之善德而非可以隱祕是之謂陽德按古儀四十二等醮其第二十等曰北斗醮今此立玄樞靈壇中設北極帝座前列衆眞環以北斗南斗而其行用近乎北斗醮矣蓋夫斗之在天實爲權綱之主關係甚重延生請宥尤𨽻斗樞故也學者當深體濟生之本意以迪古人之用心則此科可行矣法曰下元有山川河海之内城邑郷塢之中水石禽獸之精五行不正之神下土强惡之鬼魑魅妖厭之䰟妄行妖孽擅作異端纏惑生人諸不能治或有北隂酆都之内血肉不正之神結連祖考昔亡近化内外親姻訟由冥曹延及生人復連殃害諸不能解以此三辰玄樞靈壇建於淨地所祈立報解治安寧玄樞壇又曰三辰壇擇潔淨宻室或曠野無人逈靜處取淨地建壇一所毎層髙一尺上層闊二尺當心中皇宫設北極大帝天皇大帝中層闊三尺列北斗九皇南斗三台日月皆依象然燈下層闊六尺列三元將軍十二支神當年太歳擎羊陀羅二使者四直功曹土地等神前列洞案書二斗名燒燈熖以五色線自斗口布至洞案下依儀關啓暗晝匿過深愆微生昧心隱慝和合年命禳解災厄人道肅清鬼怪戢息其應特異至誠至神或不及累土爲壇則用堊土畫地爲三級依儀修建然以常壇爲優飛斗用大紙雲馬於鞍上空處朱書南北二斗符毎位獻狀一通并馬一騎逐星獻之馬以奔走之狀雲作飛逸之勢或印板能如式則傭工繪之北斗和合年命符名育死局謹請五星靈應帝君和合某人年命急急如元始天尊勑却於符下書云某人某年月日時生上屬北斗某星君平生隂匿某罪願乞原赦作三行或五行燈焰上燒二斗星君魁𩲃𩵄䰢魓𩳐魒魑𩲕七元祕授符飛神先歩斗自斗柄入斗口至魒存斗罩身再歩入斗口三拜存思出神直入斗中呼四直使者具白醮意見其入斗次見擎羊陀羅二使者下降檢察醮筵復回啓報星眞法師立斗中候其回畢次入南斗復如北斗式見火鈴將軍六星童子檢察回報然後斗星乃降良久有紫雲異香或赤光入户乃二斗下降也忌僧尼孝子婦人雞犬見之先於壇前列案然燈燭仍時新五果醴酒異香不用檀香乳香或缺淨酒則酌以玄酒惟精潔依儀奏啓關告事畢獻狀錢馬以火燒化誠極其至萬厄皆除允中受傳靈寳大法乃中原舊文也今所編集悉遵師傳不敢改易大抵事若當於理何暇辨釋豈可言别𣲖之異同實縁天台一宗流布漸廣而其說戾古者多矣與其餘諸家大不相似遺之不考人必致疑罔知適從故不得已而述之衆書與天台不同處則敘其所以異天台與衆書近似處亦證其說不誣初非允中自無師授之文假天台之法以成書也況允中編集出行用古式多是天台法中所不載者玄樞祈告古來靈寳法中稱濟生陽德品今列于前者是其本文也自天台杜逹眞立璇璣法毎事好異旣不從伏古科稱北斗醮創置玄靈璇璣府印設察訪使之職又稱主管璇璣府事令世人受之此則玄科世法兩皆違犯天理人情兩皆不順允中已於緫序詳論之矣故只合遵依古法止稱北斗醮主行之人各從本法之銜用本職之印如行天心正法合用驅邪院印之類不應改換銜位變更印文若不稱北斗醮而别立一名則北斗之傍名號亦有隱僻而人罕見者皆足以爲異而欺世但未免有如曹娥碑隂黄絹㓜婦之語後世市井間流而爲猜謎者也變其正事令人以意逆之實兒戲爾以此䙝瀆上眞於心安乎及其文檄旣上奏於斗星與天帝同禮或者又簽其狀函曰狀奏九晨玉闕此尤僣亂天儀三清玉帝之天門可言玉闕斗星不敢當也且以星界言之則紫微垣已可考矣垣者圜屏之謂今兩畔各有七星環之上則華蓋覆之北極大帝天皇大帝居於垣中其前之缺處曰閶闔此則紫微垣之闕乃可稱帝闕如北斗則又居閶闔之前乃綱紀之星爲喉舌之要出納號令臨制四方世之尚書亦爲朝廷之喉舌夫斗則天之大有之司其職至要其權至重矣然終不可尊北斗爲天帝猶世之不可以尚書爲天子也北斗稱玉闕僣亂謬之甚矣杜公之門户其始貴於異俗尚竒而終焉大致違科失禮襲而傚之恐非謹厚之體格也若北斗又曰中斗如法中以南斗相對而醮之者蓋取南斗經中之說而爲之其實南斗乃二十八宿中之斗宿亦在大之東北自天文中亦稱南斗然終不可與中斗對也古法如此編入故不敢更易其舊上清靈寳大法卷之十二
