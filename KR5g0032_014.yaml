front:
  text: 上清靈寳大法卷之十四晝五
  hash: sha256:e34420b21e4d9eb8b588bc2f37f59590899896f29119c9631499a65ad32ac18c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_014-001a, image: hfl/0965/0965-136.png}
body:
  text: 洞玄靈寳法師南曹執法典者權晝初府右翊治金𠃔中編祛妖拯厄品靈寳大法之施用乃三界大魔王主之而十方飛天神王則法中之將神王下各有使者吏兵若其臨事収治則移牒神王關告召役嶽瀆典祀將吏差使事畢遣回本屬妄立將吏私岀名號臨事不神魔王之章裂爲救世符禁之法人道眇眇仙道莾莾鬼道樂𠔃當人生門天道貴生鬼道貴終仙道常自吉鬼道常自凶右符以五月五日雕成有患狐魅即令佩帶其鬼自出凡有人家素有妖異未終祛捉只令殊分不爲禍患搯鬼目第四指上節右念前呪七徧書符一道鎭之其怪永絶祛捉法凡人家精魔作楇百怪千邪遣之不去者搯酉文朱書此眞文一道連黏牒前移文神王及劄付嶽瀆將吏併力擒之黏眞文并用印並握訣如係宗親尋屬及有故㗸𡨚者須量事體不可輕用譯文髙上清靈爽悲歌朗太空惟願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人算㫁絶人命門阿人歌洞章以攝比羅酆束送妖魔精斬馘六鬼𨦟諸天炁蕩蕩我道日與隆靈寳大法司牒某方無極飛天神王當司據入詞意尋行契勘委是某邪作禍除巳啓聞上帝告行靈章須至專牒者牒請詳事理即仰統率吏兵一合下降前赴某處擒捕逆天爲禍害民鬼祟攝赴天獄依律治罪斷絶妖氛肅清境域牒至疾速報應施行故牒年月日時牒具法位姓名某押右用摺角實封牒召役有法牒付神王外於就近嶽瀆係勑正神典祀祠廟城隍主者並行移文㑹合収治用牒用劄隨其神位輕重審量事體施行召役法東方神王震文初一忽南方神王離文初八飛西方神王兊文初四菩北方神王坎文初五雲上西南神王坤文初六滌色東南神王巽文初三无鏡西北神王乾文𥘉七那郁東北神王艮文初二度仙上方神王中指甲上初九玃无下方神王中指中初十瑛右神王下各有使者吏兵自初一日至初十日毎方直一日周而復始唯小盡月則二十九日并用上下方次月一日如其神王輪降人間一切大事可牒神王小事則用使者禳鎭法凡人家宅不寧所求不遂作事屯蹇在身可以佩帶於家可以貼鎭落落髙章明炁四騫梵行諸天周回十方無量大神皆由我身呪七扁書符解度法凡有祖先爲福不可得而攝罪者書符燒之此經中遣鬼之用也空中萬變穢炁氛葩保眞者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何呢七徧書符遣用己上法五條與經法同三部符法上部三境眞符玉清聖境上天大帝上清眞境九天都官太清仙境提鬼將直玉皇大帝縛鬼將直五方五帝速降眞炁五方眞君炁隨符行聚形玉清訣天門炁右黄紙朱書筆行鬼神行筆住鬼神住謹請太上元皇妙道眞君九天丈人仙官僕射五嶽尊神速降眞炁入臣符中隨符所勑鬼死人安急急如三清眞符勑右符書成誦呪取五方炁吹入符中遣符再呪燒灰香湯調下一切疾病日進三服行之以誠立効中部輔翼眞符紫微北極大帝天蓬大元師煞天猷副元帥煞翊聖保德眞君攝煞佑聖眞武眞君攝煞天關大神煞地軸大神煞聚形北炁煞文書畢㸃目云開天徹地照破邪魔謹請九天雲路追捉將江翟趙徐四元帥一依符命隨符前後收捉鬼物治病安寧急急如上清元降律令勑右符黒書黄紙上毎用八道内大書一道同金錢火化大門内細書七道燒灰桃心煎湯調下非常報應下部五帝符青帝護魂東斗主筭青天魔王巴元配伯白帝侍魄西斗記名白天魔王反山六目赤帝養炁南斗上生赤天魔王負天擔石黒帝通血北斗落死黒天魔王監醜朗馥黄帝中主萬神無越中斗大魁緫監衆靈黄天魔王横天擔力五帝大魔萬神之宗飛行鼓從緫領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神功受命普掃不祥八威吐毒猛馬四張天丁前驅大師仗旛擲火萬里流鈴八衝敢有干弒拒遏上眞金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬剪形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清聚形玉清訣天門炁謹請五斗眞宰五方五帝直符二十二天上吏禀奉上帝勑命風火無停回尸注生返死還寧魂魄和柔萬神安平急急如律令右符朱書黄素淨水吞之無所不禳無所不治驗祟法凡受投詞未能洞視鬼神先用九宫之法依圖旋轉行起不用飛宫不用中宫男一歳起離左轉順行先一轉不用二宫女一歳起坎從右逆行先一轉不用八宫次則逐宫数之年上起月月上起日日上起時至止處以意推究神而明之存乎其人此爲未至通幽之士而設古書只云至某宫主某事而巳不曽有詩決後人欲便於背記故韻其語而爲詩以便暗誦之二七六九五一四三八乾宫患者命多災寒熱相乗病徃來祟是家親并外鬼欲求醮祭度泉臺墓殃塜注興西北舊願前盟神廣催更有惡終狂逝鬼薦修祛隔斷根荄坎宫患者弱昏沈隂祟玄衣及竈神寒熱有時多腹痛貌形短少産傷人天神有願違初志虎犬羊逢月分迍溺死家親帯河伯冥司越訴速催頻艮宫患者或狂言脹滿多迷寒熱煎香火神前稽素願竈君傷鬼互來纏月建忌逢巳酉丑精怪皆由東北邊短小傷魂面黄色行符起抜保安痊震宫患者多感疫耳閉面浮言語悲脚弱體疼因呪詛鬼魔天譴致危疑先亡尊長青衣鬼土地東廚結禍基病重且防七五夕過期方可給符醫巽宫患者痛連心病在腸中淨欲侵五道五通興諺語先亡魁偉眼眉深東南樹上妖神動井閉渠煙且細尋急醮髙眞祈覆護直須來意切丹襟離宫患者難思食心痛頭疼熱亦多土地竈神南上廟先靈形小恙紅酡赤衣婦人産中逝吐逆時加上盛痾更有陽䰟身帯血薦親却祟不差訛坤宫患者因腸胃㵼痢相仍體漸癯目病鬢稀瘟死鬼西南木祟樹揶榆天曹有願兼干土諸父宗親帶血膚無墓刑亡難度化細窮精怪遣靈符兊宫患者心瘢結夜卧多驚冷汗生父祖遣苛并少女土神干犯禍方成久年有願神來索曽向平時夢兆縈竈祟亦因乗間隙須將符法酌量行允中伏聞靈寳之法自古及今顯幽兼濟齋法升度所以拯拔幽魂符呪禁治所以救治生類近世法中乃有緫治幽冥三品大非本㫖且靈寳之道出法救世一字一言無非兼濟顯幽又不止乎靈寳而已道教之中三洞四輔之内凡有法守莫不皆然三綱五常之道乃天生民而立之君布化而治陽世也虚無自然之教乃道出世法而傳之師除邪而却幽隂也而於法中别立緫治幽冥之品則其餘之法不緫幽冥耶古書所載難以從俗此等議論爲博學髙識之士而言之若不辯邪正不通古今徒冒道法之名未脫猥俗之態者不足與語此若此等碌碌之輩毀以爲非允中尤不以爲重輕天下後世必有見知者其何可泯倘出私意而欲遏塞之恐井泉中之蛙不能致力於井之外也允中所編只叙來歷乃與近法所以不同若其法之正條則遵師傳但此法又非允中三師自立之文乃古書而傳付允中也有志之士徧歷江湖廣參博考方知允中之源流不謬矣若天台緫治幽𡨋上品所述符名甚多皆非出於本法只有九宫洞視訣却是古法其起例亦同旣合舊典豈敢故爲異論惟詩訣言辭不同意亦稍稍相似此一條自從允中師傳編入其緫治幽冥中品則載長生符救苦升天左右劵背文四鎭合同符並𨽻符誥品外有三官三簡拔度六道四生符其符文則靈寳本法並無出處神虎七玉女符陽耀通關壇隂靈攝魄壇並𨽻神虎品悉不應入此緫治幽冥下品有請眞水眞火𨽻錬度品如此即其三品乃撮諸法品中雜符以揍成之依古法而敘則與此三品況符其呪各其所𨽻假使欲増此名亦别無符法可𩔖此蓋急利之人要將法書零細傳授故立此名以逐時也浙東諸郡之外罕行天台靈寳之治此書自不應如是詳述但恐邪說易布異日他時有被其誤者故允中雖傳之别州縣不得不敘天台之始末素聞天台之說習熟未知自正論不出户庭而謂乾坤之窄自無定見而寄耳目於人是甕中天地爾上清靈寳大法卷之十四
