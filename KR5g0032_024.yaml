front:
  text: 上清靈寶大法卷之二十五彩七
  hash: sha256:a6c1fcbedfdbe52e37d25859e337f13fabec849a1fdc0dec1b6273a9ba9fcf01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_024-001a, image: hfl/0968/0968-042.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金允中編上章科格品三洞垂科五文開煥自古以肇其機惟洞真之道降流雖久戰國之末三茅真君始開祥於句曲遂立宗壇其後如許長史許逺遊楊司命郭真人諸君相繼不絶無非精練上道修誦洞經教出玉清繁文不立洞真科格本無章奏之規至東漢正一天師應運挺生科條荐布於是齋修之典章表儀之燦然昭煥斯為洞神之道正一之宗東吳左仙翁玄受靈寶洞玄科品於是傳上章謁帝之科元綱飛步之訣至晉許旌陽行孝道明王之教遂有驅妖馘毒之法濟世立功之文悉皆洞玄之道靈寶之宗自古至今不可誣也夫靈寶拜章之法乃洞玄禁祕之文自太極仙翁內行飛神謁帝之妙外傳上玄境域之祥可以修真而煉形豈止謄章而啓事傳之非類殃考一身不奏妄傳禍鍾九祖若章中官將即隂陽神決吏剛風騎置吏驛馬上章吏飛龍騎吏等官須與正一章同用蓋剛風騎置之司無兩途也校章定章諸從事等職以學者先佩都功諸籙故行兼用除去亦可至於功曹玉女印篆法階屏氣存神躡罡飛步朝元肇事會道通真則專本洞玄之品靈寶本科上不僭用玉清大洞之儀下不雜行正一洞神之訣道有本源如精金美玉苟有一毫駁雜無非偽物惟精惟一始可感通仙翁修之而得道成真司馬承禎獲聞其祕嘗隱於少室山中以此洞玄章法流傳於世遇之者切須保祕儻非盟天告地臨壇付授謹勿輕用非此宗𣲖尤不冝行用也寧可指以為非棄而弗取乃至漏慢爾平居間暇之時先當習定夫定者非釋氏所謂寂滅頑空之義也惟儒家顔子心齋坐忘之道則近之矣內念不出外想不入湛然靜空綿綿若存靜中有動法術生焉擁三氣而內充聚一神而中峙立此妙本身世雨忘漸覺此神輕浮冉冉離世乘虛馭氣飄飄而上依法飛步其訣巳散在法中學者當自得之始於人之共知而終也非人所可知不用術數而功自隆不待吹噓而形自煉不出神而神自出不俟修真而真自成施之章奏剪除妖妄殄滅精邪超度存亡禳郤災難萬道歸一簡而不繁實靈寶之樞機真仙之徑路也上章沐浴凡遇拜章先淨外穢沐浴更衣用香湯先沐後浴即易新衣入靜室夫身不潔則神不居則法不靈法不靈則難格天矣煎湯方桃皮半斤茒香半斤藿香半兩香白芷半兩苓陵香半兩右為粗末同煎服符以淨內穢呪曰天地運用日月之精光徹四海能斷邪精斬妖去病身有光明神水溉作萬禍滅形急急如律令誦呪書符燒灰淨水調服仍以一道安章格案下勿令人見常服符篆凡拜章之士尋常當持誦靈文餐服符篆感會靈氣濯煉身神庶可臨事有應常服之符具存法中欲於此疏出恐見者忽略忘義故不立為定格但能以平時行用有驗之符逐時自服足矣服章告心神法凡臨壇拜章於三日之前先略具章中事意用十分輕薄𥿄二寸半細書却入靜存神以章吞服此拜章之作用也若靈寶有心章之格乃告急密切之條與此大略近世有聞其名而得其傳者乃曰心章長三寸三分即是告心神章也邇來多以此為心章製度告天差謬甚矣所服章格巳臨壇盟受此不再敘上章燒符香爐中此常用符也又名都匠符古儀於拜章臨伏時燒之御案香爐中不可以其名稱常熟而忽之章前後空𥿄正一章用一十二小印自再拜至太歲後皆印之有一家印有弦如印式有一家小印不用弦只如符用之故正一章太玄都前不空行洞玄之科則章前後各空𥿄悉依式書符不用一十二小印於年月上只用通章印而巳世人但見神霄籙內載通章印遂遽稱此印玉清屬洞真部殊不知神霄之教未興而洞玄章法自五代以前並用此印而通章印文乃靈寶升天大劵但去其下文耳生人用之以為升章入天廷之質證而巳夫印者志也信也正此義也洞玄章法用通章印則是靈寶本科或者見此等行用以一符一印稍涉他書便稱玉清靈寶非也升天大劵自古及今昭然屬洞玄部給付亡人則以九玄使者字下有召魂升等字生人用以為印則去下文豈應便以為屬洞真部神霄籙中自編入備用耳其籙與法亦未嘗力指謂此印不係洞玄靈寶之品目蓋神霄當時以為天壇萬法俱總是以靈寶有一二符編入籙中未可以此便易古之綱目也靈寶拜章儀髙功立靖服符存念本科排酒果三十六分列兩廡備威儀詣靖引髙功詣師幕啓事竟升外壇至地户念入户呪升天門上十方香御案上香焚香符上本位香髙功移科案居壇右靣西北次存四靈衛巳日月照形去靣各九寸北斗蓋頭魒向前禮師如齋法存三將軍自天門降上元左腎黑氣中元右腎黑氣下元心赤氣存朱衣吏兵翊衛壇所都講舉各禮師存念如法髙功宣呪呪曰大始元真五老髙尊太常皓映無幽不均上御九天中制鄷山下鎮江海十二河源八威神呪靈册五篇召龍浮水收氣聚雲萬精摧落所誅無蠲日月五星此斗七元諸天諸地諸水諸山天王遊宴五帝仗幡天丁前驅金虎後奔钁天猛獸羅閉四門所呼立至所召趍前赤書豁落風火無間有所攝言金龍驛傳都講舉鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出出者嚴裝關啓此間土地里域社稷正神臣今正爾燒香奉為入意其諸情悃具載章文願得太上十方正真生氣下降流入臣身中令臣所啓速逹徑御至真無極大道昊天玉皇上帝御前各稱法位具法位臣某與合壇官衆等謹同誠上啓無極大道上帝髙真日曺太陽帝君月府太隂皇君北斗七元星君天地水三元帝君北極四聖元帥真君五方五德星君四方二十八宿星君玄中大法師正一靜應真君靈寶經籍度三師真君太極左仙翁沖應真君九州都仙太史髙明大使神功妙濟真君古今傳教真師三洞宗壇上聖靈寶經籙中神仙洞玄科法中聖衆十方飛天神王三元唐葛周三真君監齋直事靈寶官屬章中千乘萬騎一切真靈臣聞上帝髙真玄極至尊之主玉京金闕紫清無上之天仰之而杳邈難窮瞻之而穹窿無際勢豈容於言接形非可以階升自惟髙下之殊途亦且聖凡之異轍然而科列關謄之職教宏飛謁之規雖天人交通於肹蠁之間實師資接引於思存之頃蓋出其神得以朝帝而潔其躬許容格天騰翥須臾感通倐歘將列封章而上逹先期真馭以下臨召出身神恭迎天吏願堅𥘉誓曲軫玄慈稽首投誠謹當上請請章官位上香獻茶𥘉獻法事重稱法位具位臣某謹同誠上收無極大道上帝髙真日月星斗上聖三官四聖五師真君三洞經籙神仙三元將軍章中官吏咸望真慈俯曰洞鑒臣聞洞玄啓運大宏章奏之儀靈寶重科廣示齋修之格真風普浹玄化誕敷由真師開曲濟之門乃上聖闡無窮之惠萬方仰賴千古攸遵豈地界晚學可以贊揚實上境聖師俯加接引尚祈憫濟終賜提携臣所據某人勵志精勤投詞激切乞貢章文而上逹欲祈穹極之垂慈然臣俗網凡夫地行賤質昌當職位叨任關宣未能恩氣以輕身豈遂飛雲而謁帝惟遵定格徒按成規非仗師恩難聞天聽恭望玉京教主金闕師尊降日時功曹勑章奏官吏赴壇傳悃依式升章庶顯教科俾昭報應敢伸菲薦用罄愚𠂻稽顙致恭謹陳亞獻上香法事臣謹重誠上啓無極大道上聖師尊三元唐葛周三真君三天門下上章詞表靈官引進真官上官典者法中飛章從事促氣功曹驛亭令丞四部監功謁者察姦執正諸君吏齎章進章諸從事三五功曹左右官使者五帝直符日時主者直日香官太歲官君十干當直將吏山川溪谷海嶽洞天靈官將吏章中千乘萬騎一切真靈伏以蒼蒼上極非人可親翼翼小心惟神能格欲竭存思之妙全慿傳奏之靈以今某遵奉科儀投詞啓事貢謄章牘願徹髙尊若非天吏以通傳安得塵詞而洞逹恭陳薄薦延降神驂鑒此微𠂻鍚諸靈貺助人神之存想指雲路以衝升引進真官導迎前後上官典者評省通呈俾茲懇切之忱即遂昭通之應敢終三酌以畢醮儀讀錢馬狀謹白五體真官八景神吏金堂玉室一切尊神伏以首列九宫宗奉泥丸之上帝中理五氣混合身內之百神欲造真機冝通妙用又况傳經授籙裂劵分環凡有請祈法當利濟今陳章牘上逹丹閽出一身正氣之神奏三境髙真之御從凡入聖自地升天先度罡風荐浮空界歷角亢而治氣旋箕斗以護形謁兩曜之神宫度五常之星府欲界色界無色種民上通金闕之髙朝奏玉京之聖啓陳事竟還復身中謹按科條關出將吏長跪出官謹出臣身中五體真官功曹上三天執法開化隂陽功曹消災散禍解厄君吏各一十二人出治中建節監功大將軍前部效功後部效殺驛亭令驛亭丞四部監功謁者法中飛章從事促氣功曹三五功曹左右官使者五帝直符玉童玉女隂陽神決吏出出者嚴裝顯服冠帶垂纓整其威儀功曹辨朱陽之幘冠通天之冠衣皂紈單衣腰帶龍頭之劍捧持謁簿使者辨玄隂之幘冠九德之冠衣絳章單衣腰帶虎符齎執玉版直使功曹住立四方三五功曹住立中央治病功曹營衛臣身左官使者建節在前右官使者持幢在後陽神決吏立左隂神決吏立右上部功曹住立上方中部功曹住立身中促氣功曹催促十方上部使者逺望上天中部使者逺瞻八方都官使者匝繞臣身天騶甲卒狼吏虎賁察姦勾騎都官僕射天丁力士治正執正吏收神食神吏收鬼食鬼吏收氣食氣吏收毒食毒吏收精食精吏誅符破廟吏罡風騎置吏驛馬上章吏飛龍騎吏等官並皆屯駐臣左右前後咸受臣所宣詞語分别關啓此間土地里域正神監察考召左右都平君二十八治三十六靖廬七十二福地三百六十名山崑崙上宫洞天海嶽道上二玄三元四始二十四氣十二時神皇天后土今年太歲某太隂六十甲子諸官君風氣注氣里邑社四面八方東九夷胡老君南八蠻越老君西六戎氐老君北五狄羌老君中央三秦倉老君玄元正氣二萬六千神仙川源溪谷山林孟長十二溪真根源本始本地之主社稷靈官將吏謹同誠上啓太上無形無名虛無自然至真大道太上道君上清玉陛下臣幸以宿緣叨奉教法告盟之日約以流通誓願敷贊真風振揚道妙永扶國祚普濟生靈凡有投誠理冝關奏今謹有某投詞入意齎持法信求拜章書臣謹為伏地拜奏章文今在素案之上伏願上官典者垂神省理以時上逹請省章文捧章露於御案龍頭書刀鎮左硃筆魚鴈鎮右宣章副本按舊儀先遣章後乃封章但未封先遣官則封後不復啓祝頗為未順今以封章在前遣官在後儻欲自從舊儀隨便道衆捧章文及章函面印絨線糊黏等就髙功案髙功捧章函密念開函呪函不先開以章安函外舊用蠟填印池上用蠟印而蠟實不潔今止用絨線繫畢以糊黏印在池上用印之紙亦不用蠟傳言書佐開函小吏手執書刀開發函軌章文上御開通道理所奏速逹臣獲終始次以章於香上度過密念熏章呪五色之煙衝章上天五色之氣衝章逹帝下官故氣不得妄干封章法師自入函章表道士授線以糊黏印池髙功安貼𥿄印次密祝勑章呪臣筆靈靈勑此上清仙童玉女開發龍函令臣關奏速逹天庭急急如律令又密呪遣章威儀及時關奏祕印心傳靈章密授朱煙起夜雲路通晝仰望玄恩濳垂福祐髙功封章畢捧于簡上長跪遣官謹遣臣身中五體真官官一小吏十二書佐三五功曹左右官使者促氣功曹飛章從事五帝直符飛龍騎吏等官嚴裝顯服冠帶垂纓佩劍持籙為臣及時操持章文徑上詣三天合屬曹治隨章進對臣幸以夙因謬膺玄職不逹正真未明氣候資品凡陋識見愚庸所進章文或違科禁文字不整詞旨差訛脫落乖違語言褻瀆請章中從事書佐小吏以時削治俾遂進呈無令上官典者有所譴却臣屏息隨章徑上太上無形無名虛無自然至真大道太上道君上清玉陛下謹勿稽停左右歷關吏章中諸靈官以次分别當令所請者下所召者到所治者愈所濟者度所誅者滅所遷者逹若有下官故氣於空界之中邀截臣章文使不上逹者即請録付合屬天獄依律治罪以明天憲所有章牘必使上聞臣俯伏御右恭俟天恩乞垂報應髙功以章授道衆置章几上知磬舉法事監齋隨章引至焚燎所焚章用烈火焚之宣官將關壇中舉焚章詞頌髙功送章出隨即拜伏存思行用如式壇四角安香爐四方燒符髙功伏章起稱以聞焚章頌畢宣科臣謹重誠上啓無極大道太上真師玄中大法師三天大法師正一靖應真君靈寶經籍度三師真君此極四聖元帥真君太極左仙翁沖應真君九州都仙太史髙明大使神功妙濟真君三洞宗壇上聖萬古傳教宗師十方巳得道神仙三元唐葛周三真君三天門下上章詞表靈官引進真官章中功曹玉女從事直符虛空雲路翊衛仙僚五體真官身中萬神臣聞存真念道冀通𣓕氣之髙拜表謄章未徹教中之妙徒按彞章而就事深知凡骨以非仙輒藉恩𥝠以二十四神而飛章紫極仰依覆育由三十五分而總氣上玄但以想念不精薦陳爽禮仰攀霞仗幸沐俯臨恭戀雲輿誠難後從願曲原其狂僭冀終鍚以生成所請所祈能通能應懷恩實切俯首知歸引領天衢再拜奉送送聖頌高功長跪納官臣奏章事竟所出身中五體真官功曹使者各從衆妙之門而入在左還左在右還右彌綸天地直使功曹主領檢押各歸本位安穩金堂玉室母令差互後召復到一如故事十二願復爐香官使者左右龍虎君侍香諸靈官當令臣拜章之所自然生金液丹碧芝英百靈衆真交會在此香火爐前令臣學道得道求仙得仙齋官受福天下蒙恩亡靈受度幽爽升遷十方仙童玉女侍衛香煙傳臣所奏所啓之言速逹徑詣至真無極大道昊天玉皇上帝御前出户下壇師幕稱謝退入靖室章官醮位上元道化唐真君中元定志葛真君下元護正周真君三天門下上章詞表靈官三天門下引進仙官上官典者治中建節監功大將軍治中氣中官將呈章通章從事録章校章從事定章剌章從事印章禦章從事齎章從事章中官將法中飛章從事促氣功曹三五功曹左右官使者五帝直符玉童玉女香官驛吏四部監功謁者驛亭令丞察姦執正諸官君收邪食氣諸君官將隂陽神決吏科車赤符吏罡風騎置吏驛馬上章吏傳言玉女書佐官吏三元四始二十四氣神君天門引進神吏守衛官君六十甲子諸官君今年某太歲尊皇君十干當直功曹將吏童子十二時直主者三界四直功曹傳奏直符監察考召諸司官將洞天福地靖廬治化靈官將吏山林孟長山川溪谷靈官將吏九州分野社稷正神當境城隍社令根源本始神司等神當境土地里域正神章中千乘萬騎一切真靈允中師授章法乃洞玄靈寶之道兼章出於古科有如正一之宗世所常行與靈寶之品其官將吏兵大同而小異至於飛神謁帝存想施為則靈寶與正一全不相類非對天盟授不容顯宣如玉清之品洞真之部不出章奏之格古今之所共知近世天台法中却謂心章之類玉清合用通章印此其見神霄籙內載通章印遂創此説不知印文乃靈寶升天大劵也又謂洞玄部合用九靈飛步章奏印夫九靈飛步乃拜章之作用爾古無司局立此印名指為洞玄部則非矣又為洞神部用黃神越章印此印亦非專主正一之宗蓋彼不考其詳也蔣氏立成儀則謂齋法出於靈寶而章奏始於正一蓋其源流嗣法於正一之宗壇而天師合從本科上章故不旁考靈寶也從立成儀之論須不用靈寶本科且不失正一章奏之式是刻鵠也亦為稍穩儻不考洞真部本無章式從天台而自分三洞拜章恐不免違戾教典是爾世有謂三五飛步為正一章法九靈飛步乃洞玄部之行用至有取神霄官將吏兵混同拜章者須神霄之教盛於宋朝宣和間而神霄未行之先靈寶之科降世久矣元不與神霄相雜故近世參行大洞益以神霄却行靈寶遂謂之玉清靈寶者似覺詳盡而古來未見此格也夫洞玄靈寶拜章之法當行功於平居間暇之時習氣鍊神升虛入妙在內則謂之十轉回靈在拜章則謂之元網飛步臨壇之際不復紛紜舉措手搯足行惟令道衆以香爐四枚安於拜壇之四角皆烈火豐香𦆵候髙功拜伏即以四符焚於四角香爐內高功遣官畢捧章授道衆齎章往焚燎髙功隨即伏章所謂寂然不動感而遂通當致力於平時也此則與正一存想飛神大不同矣惟傳此宗沠受此法銜書此章式以此聖位用此印記習此功法自始及終從表至裏悉成一家始有感徹若𥨸此一二行用以增益舊學或以傳法之士耻於見從其印篆文移章式銜位不伏攺定却取元網飛步之名以詐世俗則道有常憲不可欺上清靈寶大法卷之二十五
