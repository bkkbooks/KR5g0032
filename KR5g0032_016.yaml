front:
  text: 上清靈寶大法卷之十六畫七
  hash: sha256:2331abeb070c7e30499d322828f839f1edc867b5809796c0b4c710d5872d6996
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_016-001a, image: hfl/0966/0966-004.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金允中編黃籙次序品虛皇之教起於古初妙道開光神文降世或隨時而化見或因事以付傳中古以還典章浩博至晉宋間簡寂先生陸君始明授受降出之源别三洞四輔之目考詳衆典撰次齊法儀自是遐邇宣行齊法昭布條陳經誥次序乃成暨則張清都萬福復加編集典式漸詳中乘以後廣成先生杜君光庭於是總稽三十六部之經詮傍及古今之典籍極力編校齊法大成雖其一字一法由始及終莫非出於經典所是古科二十四品之齊廣成之論謂黃籙兼總死生人天同福上至邦國下及庶人皆得修奉𨽻於下元宫中統攝萬靈並關九府功德深重利祐存亡於是撰集齊科四十卷雖其壇壝典儀朝修俯仰莫不古今一途而其科文嚴整典儀條暢發明古則昭示方來齊法至斯不可有加矣其科中第一卷敘壇官則曰法師當佩三洞之籙章其次則佩洞玄籙者可以行齊蓋齊法出於靈寶屬洞玄部也自告齊始事以至醮謝散壇則廣成科中無不備具自不必後世之紛紜齊科雖參三洞之衆經而多出於洞玄之十二部若奉行齊事符書呪訣關奏文移古科不載自唐以後則總于靈寶大法而法之本文又主以度人上品之一卷是謂上清靈寶大法經雖至簡而藴奧難窮經曰星辰錯度日月失昏亦當修齊行香誦經國主有災兵革四興亦當修齊行香誦經疫毒流行兆民死傷亦當修齊行香誦經師友命過亦當修齊行香誦經今廣成科中為國消災為民祈福拔濟師友普度孤魂請福三元關升九祖皆曰黃籙悉有科儀齊法出靈寶故所集來歷則關涉經典甚衆而行齊符法合在此書靈寶古法自奉持戒律淨明本經服氣存神收光內錬然後救世拯物輔正驅邪建德立功濟幽度沒至此則齊法當行是充其所藴以及天下者也亦施用次序廣成立科以黃籙為重靈寶舊法亦皆黃籙科品云序齊科曰遷拔亡爽功及幽隂宜選三元三㑹五臘之辰更符天恩天赦及亡者死日周期大祥逺忌等目尢良齊官備置質信躬造師門投詞三請舊儀臨壇投詞三請則預奏之後不應再行辭避遜今當投詞之初合先辭而後受臨事之際只致詞請法師升壇而巳初受詞訖即行啓告次録狀預奏前期三十六日設誦經堂及法師靖室率同齊之士入靖對齊不交世事精誠看誦度人上品妙經九天生神寶章道德二篇黃庭玉經近期則率壇衆習儀演事齊前十日或七日舒壇列纂立象陳儀竪建遷神寶幡回黃靈幡正奏三清玉帝北極天皇大帝垕土南極太乙慈尊九天帝君三十二天帝五老天君木公金毋泰玄都省日月北斗三官四聖五師九天採訪三界五帝大魔王酆都大帝槫桑五嶽上真五嶽聖帝雷霆主宰酆都曹僚洞天福地牒城隍祀典黃泉蒿里法籙中官將神虎官吏三界合屬真司宿啓之日齊官道衆備威儀至靖室致詞請法師升壇行事立幕上箋建壇開啓進拜素車白馬章至晚拜酆都拔罪章告下救苦符拔幽魂符九龍符生天籙次發玉札神虎將吏根攝係薦魂儀及一切孤魂禮燈行事正齊第一日三朝朝真誦經行道早朝進拜通天救苦表開通道路章靜夜破獄攝召正薦魂儀及一切孤魂歸位呪食引孤魂於茭郭斛筵廣行呪食聽法聞經伺候錬度正齊第二日朝真行道晚朝拜上沐浴錬度章錬度一切孤魂法師升座說戒傳符給籙度化登升第三日正齊朝真行道晚朝拜升度亡魂章錬度正薦亡魂說戒傳符度橋超化齊後拜言功朱表告下三簡降聖設醮謝恩醮畢還戒納職解壇散席送師徹幕投龍先就壇瘞土簡退入靖禮成交賀如式修齊節次齊官修寫投詞詣法師門下備禮服進謁上香致辭法師辭遜齊官致辭捧狀再詣法師再答齊官致辭三請法師允答受詞法師望天門設香案或有設象處於上帝再上香法師以投詞置簡上三拜齊官上香再拜髙功法師具事情口奏三拜而退齊官再拜各復位預告先設功曹使者將吏位次以酒果供養立五師位於堂上或殿廡間備香燭供養排列預告奏申文牒狀於師前各以淨箱置之以備捧行髙功於師前上香三禮齊官上香再拜髙功跪致辭請牒齊官道衆同捧所發文字知磬舉華夏道衆詠和而行道衆引至關發奏所髙功變神步罡焚符知磬舉香水偈灑淨髙功召將白事意三獻散花法事諸方之例多是髙功止於召將而巳表白念白文齊官上香致拜髙功再白表白宣關引髙功遣發齊官跪酹焚燎表白回向念善揚幡設香案於揚幡所髙功與齊官各上香設拜知磬舉法事髙功啓白有文宣揚幡呪表白回向念善退誦經此是齊前誦經之帝式道衆列班髙功齊官各上香知磬舉法事髙功開啓白齊意表白宣經疏知磬舉敷坐讃衆官平坐知磬唱詠表白白文舉請轉寶經誦經畢收經起立表白嘆經白文三聞經智慧頌表白回向念善發正奏齊期以屇則舒壇立纂鋪列道場敷陳六幕內外整備關發正奏文字詣師幕序立暫設像列位耳齊官上香拜髙功上香知磬舉法事髙功拜跪白齊意請牒餘如預告式已上並不係廣成先生齊科內二乃今世所通行之儀拜章素車白馬章破酆都拔罪章壇墠巳建中列三寶位只於外壇之外兩序列章中官將位或不升壇只於道場中拜章行事建壇之後並合於內壇上行事近有别立小臺拜章非也如宗壇傳度章亦多就道場中拜奏夫建壇所以為行齊科拜章表而設儻有壇而就别所則非本㫖矣髙功入靖服符存念如法道衆齊官備威儀詣靖知磬舉法事引髙功出靖詣師幕知磬唱道讃髙功啓白知磬舉華夏髙功登壇入户升天門如法上香畢舉啓堂頌都講舉各禮師存念如法髙功宣呪呪具拜章儀中都講舉鳴法鼓二十四通髙功發爐都講舉各稱法位髙功行科至謹當上請道衆兩員於左右序立請降章吏三獻三散花髙功三宣科都講舉衆官各長跪髙功靜默出官髙功出官有訣髙功開章付侍經或道衆接章跪受捧詣三寶前露章道衆一員宣章副本道衆捧龍頭書刀硃筆硯等列案前髙功念開函呪開章函熏章遣章封章以函付侍經道衆華夏至焚燎所表白宣關讀疏并焚之伏章如式道衆舉焚詞頌髙功伏起道衆唱章詞巳焚髙功宣科送聖頌髙功納官有訣十二願髙功復爐下壇出户如式至師前髙功密謝表白回向念善引髙功入靖知磬皈依正道表白云拜章事畢衆官復位符命玉札或先告符命别發玉札亦可仍備酒果三獻如儀符命玉札並列上帝前衆官詣上帝前列班舉法事髙功口奏請符道衆捧符命玉札旋行道衆華夏引至遣發所舉法事灑淨髙功變神焚符召將獻茶髙功三獻三散花三祝白表白宣關牒髙功發遣焚燎多置燥柴烈火焚符簡表白回向念善髙功至上帝前謝恩退入靖結齊投詞近有先就靖室投詞非古式道衆詣靖室序立髙功齊官各上香表白出班讀職榜髙功以下僉職榜髙功詣坐齊官上香表白致詞請髙功四結願書結齊狀道引出靖室立幕此下並遵廣成科衆具威儀詣靖室導引髙功至監壇神位前髙功上香啓白不拜詣玄師幕序立髙功齊官各上香請玄師下降請玄師頌齊官上香獻茶齊官上香捧詞函自述齊意回身捧函曰髙功投詞再拜髙功執函長跪啓師宣箋宣關焚箋髙功致拜餘五幕並同此式惟不投詞引至三官三師五帝天師監齊幕或先詣監齊幕自下而上猶尊也華夏至壇前序立上香祝白開啓有文請威儀道士一員勑水禁壇有文回向念善請光先明一燭於玉清前存念如法道衆詣壇前序立知磬舉法事齊官上香設拜髙功同侍香侍燈詣上清前髙功啓白宣呪髙功以慧光符撚詣道前㸃光在手宣呪髙功以手中紙撚付侍燈道衆各執一燭於侍燈手中㸃道衆遍㸃壇席燈燭舉天尊號存念如式回向念善金鍾玉磬儀宿啓廣成科法於請師前投詞道衆具威儀詣靖室齊官上香知磬舉金真演教天尊髙功詣六幕上香先五帝西三幕次自外東三幕末至玄師幕上香髙功默祝齊意唱華夏引導至壇所髙功先行入外壇旋繞地户威儀列壇前不入髙功密呪入地戶升天門六職各依位立都講中壇之東向西立髙功入天門升內壇齊官隨之上十方香早東為始夜北為始上御案香三寶前正案也古稱洞案上香焚符密呪齊官上香畢出天門退歸本位髙功上本位香就科案則本位也今以科案指作洞案非也啓堂頌都講舉各禮師髙功宣衛靈呪都講舉鳴法鼓二十四通髙功發爐都講舉各稱法位髙功宣科禮十方舉禮足各䖍誠皈命懴悔跪懴道士宣懴三啓頌三首各一拜禮三寶左行至東方敷露真文道衆隨聲和之四方各如式以金龍鎮之髙功還位都講舉重稱法位髙功宣科表白宣詞髙功再宣科智慧頌三首旋行髙功都講案立都講及衆官於壇前面北立都講唱衆官等各各首體投地心禮十方方各一拜從北為始衆官皆俯伏默禮禮畢唱白衆官平坐說戒威儀衆官於西方面東坐齊官壇前面北法師三上香說戒奉戒頌左旋一周都講唱奉戒三禮補職髙功以下各受職三禮宣禁都講唱監齊受罰簡受訖拜十二願髙功復爐學仙頌出堂髙功自天門出內壇與衆官自地戶出中壇右用空洞密呪出至玄師幕序立舉向來讃髙功小啓謝過有文都講舉監齊紏過監齊視衆官有過者紏華夏引至靖室知磬舉皈命至道表白舉建壇事畢衆官復位破獄廣成無此科係出靈寶法然燈燭立香案道衆序立關九獄燈髙功默啓告符執䇿杖破獄如式九獄畢回向正齊第一日清旦衆官詣靖室舉天尊引髙功出至六幕上香玄師前序立知磬唱道華夏高功上壇如式上十方香上御案香焚香密呪上本位香都講舉各禮師存念如法髙功宣衛靈呪都講舉鳴法鼓草四通髙功發爐都講舉衆官等各長跪髙功出官有科都講舉各稱法位獻茶髙功宣科表白宣詞髙功再宣科十方懴髙功隨方上香都講立天門望東髙功立鬼門望西都講舉各思九色圓像咽液命魔密呪髙功存思行事訖都講舉步虛旋繞三日九朝悉命魔密呪今人於早晚朝不命魔非古法也步虛十首散花每首一拜都講舉禮經如法三啓三首各一拜都講舉三禮都講舉重稱法位髙功大謝學仙頌出壇如式至師幕序立髙功小啓表白回向都講舉監齊紏過監齊紏過畢華夏引髙功復靖知磬皈依至道表白唱早朝事畢衆官復位中分晚朝不出官不用衛靈呪其餘並如早朝式靜夜拜章先上太一救苦表詣太一宮見表式拜開通道路章見章式攝召先發催召文儀黃籙以廣度為功主行之士正宜恢博用心庶使所薦之魂受惠所是正薦魂儀併十類孤魂當立兩幡一體攝召不必先後以别重輕用心不廣乃為所薦亡之類攝召之後却分幕就浴先引正薦亡魂朝真歸位請道衆一員呪食次别室沐浴孤魂引領朝真次赴茭郭享斛呪食如式且令徑日於正齊中聽法聞經次夜錬度其錬度之法亦不當與正薦分兩等孤魂得度則福歸亡者不宜痛加分别刻意重輕非上帝垂科之意也攝召有儀見施普度品正齊第二日早午晚三朝並同第一日只不出官午朝後或晚朝拜沐浴錬度章晚朝後上木公金毋表九天帝表靜夜錬度十類孤魂有儀髙功升座教戒鬼神傳授符籙度魂如式正齊第三日三朝並同第二日午朝後拜升度亡魂章靜夜錬度正薦亡魂髙功升座說戒傳符度橋送亡如式每日朝退少息却三時升壇誦經乃古法也散壇全係廣成科法衆官詣靖室引髙功出至六幕上香玄師前序立唱道華夏引登壇髙功先入壇如式上十方香舉各禮師宣衛靈呪舉鳴法鼓髙功發爐行靈寶自然朝禮十方懴悔三啓三禮收真文各於本方案上熏衆官同聲宣真文總執真文香上熏之宣詞表拜言功朱表遣表封表道衆棒青詞朱表於天門焚之表白宣關髙功伏表伏起衆舉表詞以聞三上香告山水土簡投龍頌上香重啓降聖設醮三獻法事送聖頌髙功升壇還戒舉還戒頌髙功長跪衆官納職髙功復爐舉旋行三塗五苦解壇頌學仙頌出堂詣六幕上箋謝入靖室衆官巳下謝髙功各展禮服而散已上節次乃古齊也廣成先生設醮其略曰黃籙簡文修齊既畢以壇中五綵散施同學及寒棲之人以作功德惟留命綵金龍於中壇三日之外設醮解壇投龍散席務令精勤始終耳近代以來相承皆亥時法事既畢明旦丑時言功設醮詳醮之設蓋以修齊之內召命神靈營衛壇場宣道關告往來勞役所以設此醮筵用此酬賞允中按此乃廣成先生考詳古式而敘之非自為之說也大唐以前既巳遵行且古㫖三日之外尚留金龍命綵以鎮壇中直後醮酬畢方納職解壇而廣成之格止於次早言功設醮亦俟醮畢方行納職解壇近世多於拜表便行納職散壇席之後方再發文字重行請師然後設醮了不干涉戾古甚矣而間有洞玄靈寶之法而行齊却易洞神之銜而設醮又失本㫖豈知黃籙謝恩醮乃齊後酬謝真靈之一事也未醮而除去壇墠預酬戒職以此醮别為一事大覺難行惟浙東有數郡行之習熟不以為疑爾故蔣氏立成儀凡事欲依經典於此一節亦不取廣成先生之說而用近規故今將近世之儀亦列于左使行之者知其始末之詳世俗近格散壇節次衆官詣靖室引髙功上六幕香詣玄師幕前序立髙功默啓齊意髙功衆官登壇髙功上香如式都講舉唱髙功發爐舉重稱法位髙功宣科禮十方懴三啓三禮收真文總呪如式重稱法位宣表露表遣表封表焚表納官還戒舉還戒頌告三簡舉投龍頌納職辭三寶古科無此復爐舉三塗五苦頌解壇送六幕髙功歸靖設醮發請醮文字華夏出靖禁壇上香髙功開啓舉各禮師宣衛靈呪發爐出官初獻宣詞亞獻終獻宣疏送聖頌納官復爐散如常式已上是近世規式遵古科者則不免異惟理所在當從古式允中按廣成先生科式自建壇散壇九朝懴謝轉經然燈等事各有成規如申奏文檄行用符法却乃於靈寶大法今之行齊次第除廣成先生古科之外者乃大為之約以輔本法但諸方之例近多不同古今之式尤有差殊允中蒙師尊付授約以遵承廣成古科故不敢攺易不行古法者自可從所受而行之矣修齊受詞品齊官初詞式具注位姓某無官者具鄉貫右某伏為某人年月日時生某年月日時某處身故今經幾時未測升沉謹瀝丹誠願備科式崇建無上黃籙大齊五晝夜於內三日正齊九時朝奏滿散修設三界髙真清醮幾分位上資邦國普福生靈廣度六道三塗拔濟九玄七祖集茲善果專用薦度亡故某靈魂超生淨界謹具狀申洞玄靈寶法師某君先生伏乞法慈矜允特與先次敷擇建壇開度施行謹狀年月日具位姓某狀若衆㑹則作某人等又别易其辭此蓋初請師之㫖也若臨壇請師行事而投詞則在奏之後不應如此言之别具後式矣齊官執詞上香口白法師黃籙大齊㑹首具位某輒露精誠上干清聽某伏聞洞玄中品總萬法之範模黃籙明科作群生之梯級古今允賴凡聖同遵功德普被於無窮利澤遍霑於有識獲承善果亶自宿因伏念某等生長塵途棲遲俗境汨沒愛河之浪難窺道域之垣欲消永劫之罪瑕宜拯至隂之苦趣上惟邦國下念存亡願超九祖之靈儀普度三塗之滯爽四維之內六合之中烈士忠臣亡身徇國順孫孝子殞命報親或流離凍餒以客終或疾患殘傷而橫夭或時逢兵運肝腦塗於戰場或數值凶年骨肉罹於災劫或溺水赴火或縊索銜刀或遭事受刑或懷𡨚服毒或罪戾深而難於超度或執對重而未遂消平幽路茫茫莫救萬塗之苦趣𡨋關杳杳難開九夜之光明痛念己親均哀庶類䖍叩洞玄之妙閫恭開黃籙之洪儀先資宗廟纍朝之靈仰祝帝王萬年之壽普度三塗十類廣拔九壘重隂集此殊休用行資度亡故某等魂解𡨚滌垢錬質澄神溥及含生同霑巨福茲為重事貴在得人恭惟靈寶大法師某君先生資禀清髙譽望昭著參習遍十方之界涵濡盡三洞之書願堅素心大濟群品録此專勤之至懇主兹度化之玄壇惠及人天功加幽顯敬陳迫切拱俟矜從法師答某蓬蓽寒生樗蒲陋質身膺符籙修崇幸積於歲年考訂經科參訪廣求於師友心之勤兮巳至分之簿也無成德素不充豈微才之足取法猶未備愧真授之難逢揣巳自量慮有辜於盛意强顔應命必終墮於齊功宜求出世之髙人以掌玄科之首職敬回詞幅不敢受行再請黃籙大齊㑹首具位娃某敢恃寬假荐有披陳某等伏聞正一真人未立功則不敢以事三境都仙太史因濟物而方能升入九霄雖神仙以內錬而成然髙真以外功為重況黃籙無邊之福乃靈寶至上之因仰祈邦國華夷之共安下使幽顯神人之咸慶伏願某君先生發胸中之素藴繼前哲之靈蹤開濟世之津梁作度人之矜式特回慈憫俯録丹衷力賜主領於齊盟先次關申於詞悃曲從䖍請幸免固辭法師再答某伏聞靈寶神經黃籙大範貫通三洞總録十方為三千善行之有功聚百萬琅函之奧㫖科禁至重恩德難窮宜求超卓之良才庶可主張於大事如某者積學雖久真理未明求師徒勤異人罕遇道未窺於隱祕德豈濟淤顯幽行故事而備典儀尚能勉力升陽神而朝穹極實非其人幸廣訪於福地名山庶可得於仙資道器母勞纍請願體誠辭三請具位某等不避三瀆之煩復罄一忱之切伏聞齊法隆重真科崇嚴遵格依儀福惠無極背常違式譴罰立臻某等刻骨舒誠盟心立願不使齊用有缺當令儀物精專儻有怠違甘從考罰尚望某君先生不忘初誓仰闡道恩主盟無上之善緣典領合壇之清衆千靈效職庶彚承休億萬斯年上祝帝王之壽八千封域普資寰宇之安三塗九地以清間十類四生而共慶庶俾某等所薦之魂爽各族之先靈承此善功早升仙界拱聽俞允即賜啓聞某等無任皈向䖍請之至法師允答某資凡識陋功淺德微幸叨佩於靈文謬參承於仙職深願普濟幽顯庶可少積勤勞尚慮學術之未精恐致齊修之有玷今既岡容辭遜於勉力欽承所賴齊主之始終母隳美意更冀壇官之共志不爽真科某敢不遵按典儀恪恭齊事先當瞻望天闕敷露來詞法師受狀置簡上望天門列香案上香致拜齊官上香再拜平立法師口奏道香德香無為香清淨自然妙洞真香靈寶惠香超三界香三境真香滿瓊樓玉京遍周天法界以今焚香奏啓虛無三境髙真金闕諸天上帝日月星辰諸列仙地水嶽陽十方聖三界萬靈六合真宰仗此真香普伸供飬玉華散景九氣凝煙香雲鬱羅徑衝諸天侍香金童傳言玉女上聞帝前令臣關啓咸得如言具法位臣某姓投詞乞建旡上黃籙大齊幾晝夜上資邦國下及宗親廣度六道四生普福九州十類集兹善果用薦亡故某出離隂境超陟仙鄉臣偶藉微因獲陶真化委職任之既久念功績之甚微所當束巳以省愆豈敢接人而闡教蓋以告盟之有約屬兹懇請以難辭尚賴天造矜包道慈憫濟容臣敷齊而普度許臣按式以宣行專録來詞别行聞奏上願纍朝先聖列廟尊靈升入天中之天早證道中之道今上皇帝壽齊嵩華福等滄溟萬國安平兆民康阜九幽夜府同承最上之因十類孤魂盡被無邊之澤集兹福利專為齊主某薦資亡故靈魂超神紫府鍊質丹天慶及後昆福流齊主冒犯天威某激切之至無任巳上繕寫奏牘申牒一宗文字擇日預告奏申移文總歸一卷易於行用此不重敘允中嘗見前輩臨事謹重不務苟簡受狀之際法師三辭然後口奏此先經師髙君之式也齊官精誠專篤則一念之頃有神物司之況黃籙之功顯幽共濟法師其可不重其事耶遜避而後受詞禮也豈無昭昭之鍳或諸方不能從此議者自隨時簡易可也上清靈寶大法卷之十六
