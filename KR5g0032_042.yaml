front:
  text: 上清靈寶大法卷之四十三靈七
  hash: sha256:52953541e7c6e299f1811bd887dd884d5d6b02debb0b1e0b52efeff36c0508d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_042-001a, image: hfl/0972/0972-146.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊冶金允中編傳度對齋品對齋設醮傳度科儀道士有威者一員禁壇敕水次醮筵內關斗燈華夏引髙功出靖詣師前立班髙功與弟子上香致拜次修齋請師玄師天師經籍度許葛舉雲輿髙功長跪啓白唱道讃華夏引髙功詣醮壇入地户升天門上十方香上御案香焚降召符密呪長跪上本位香表白開啓臣聞潛融一氣肇形於混沌之初判立三才資始於洪濛之劫玄恩普被道蔭咸包槖籥隂陽鈞陶人物故無幽而不燭是有禱以皆通恭焚道香德香無為清靜自然香奏啓虛無自然元始天尊太上大道君洞玄靈寶天尊太上老君洞神道德天尊昊天玉皇上帝紫微北極大帝句陳星宫天皇大帝十方靈寶天尊后土皇地祇東極青宫太一救苦天尊東華上相木公青童道君南極長生大帝白玉龜臺几靈太真金毋元君九天上帝五老天君三十二天上帝五福十神太一真君上清十一曜星君日宮孝道仙王月宫孝道明王中天北斗九皇星君天地水三元帝君北極四聖真君玄中大法師三天扶教輔元大法師正一靜應真君靈寶經籍度三師真君大極左仙翁沖應真人九州都仙太史髙明大使神功妙濟真君秦玄都省主宰髙真天樞院主宰上聖周天三百六十五度列宿星真三界五帝大魔王十方無極飛天神王某人本命元辰真官北隂酆都大帝水府東霞扶桑大帝五嶽真君五嶽五天聖帝靖廬治化仙官江海河源聖衆三洞經法籙中靈官將吏太歲宫君城隍典祀三界官屬一切威靈仗此香雲普伸供養玉音攝氣靈風聚煙紫虛欎秀輔翼萬仙執籙把籍同到帝前今臣關啓咸賜如言奏為鄉貫嗣法籙弟子某人投度師某人進傳上清靈寶大法巳行録奏天闕申牒三界合屬真司涓此剛辰恭就某處開壇傳度修設清醮一座延奉三天上帝九極髙真召三界以齊臨異萬仙而俯降容其傳度許以告盟證録禱祈鑒贍修奉醮筵巳肅壇墠粗嚴恭對髙真關行法事知磬舉啓堂頌都講舉各禮師髙功宣五方呪舉鳴法鼓發爐衆官等各長跪髙功出官謹出臣身中五體真官功曹將吏開化定道隂陽功曹消災散禍解厄君吏各十二人出某建節監功大將軍直使功曹隂陽神訣吏各二人出出者嚴裝住立營衛匝繞臣身中郎吏虎賁察姦勾騎吏都官僕射天丁力士治正執正吏收神食神吏收毒食毒吏收精食精吏收邪食邪吏誅符破廟吏剛風騎置吏驛馬上章吏飛龍騎吏等官並皆屯駐臣左右前後受臣詞語關啓此間土地里域正神治化靖廬名山洞天福地海嶽太歲官君法中將吏謹同誠上啓太上無形無名虛無自然至真丈道無上元尊金闕七寶玉陛下臣受法之日約以流通濟物是先接人為切今謹有某人謹為進拜詞文上祈玄感當今臣所啓者達所告者應折禳者却所濟者度功曹使者飛龍騎吏分别關吉以時上達列啓事竟各還臣身中復於宫室須召復到一如故事各稱法位具位臣某與合壇宫衆等謹同誠上奏啓虛無自然元始天尊無極大道太上道君大上老君昊天玉皇上帝紫微北極大帝十方靈寶天尊后土皇地祇南極長生大帝青華大帝九天上帝五老天君三十二天上帝十極天君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶瓊臺紫微上宫靈寶至真明皇道君上相上宰上保上輔四司五帝長生大君好生韓君丈人度世司馬大神日宮帝君月宫皇君五方五德星君四氣四曜星君北斗七元真君斗中帝座輔弼星君南上司命司録延壽益算度厄尊神三十六部尊經玄中大法師靈寶經籍度三師真君天地水三元帝君北極四聖真君太極仙翁沖應真君九州都仙神功妙濟真君泰玄都省髙真歷代傳經演法真仙三界五帝大魔王十方無極飛天神王天樞院主辛髙真二十八宿周天列曜星君本命元辰太歲尊神北隂酆都大帝東霞扶桑大帝五嶽正副真君五嶽五天聖帝靖廬治化仙官江海河源聖衆三洞四輔法籙中靈官將吏城隍典祀三界官屬一切威靈臣伏聞無形無名即玄真之妙賾有光有象乃聖化之靈機混成宇宙之前肇造乾坤之本分兹一氣育破三才宰制萬靈陶成庶類於是元綱啓藴立萬劫之根宗大梵發輝漏九清之祕奧三洞流布九品宣行本惟佐天化機亦以彰於道要因師尊之開度跨古今以欽承臣猥以庸鄙之資叨綴班行之末濫師至化叨眄靈文所冝隨力以宏科不敢因人而廢事既承潔己之進當開勤道之途授受不窮所以副大散作成之意繼成有格須祈求髙真鑒度之恩是用瞻碧霄界以投誠想白玉樓而稽首不慚塵陋之禮冒聞玄極之髙伏願五色卿雲擁擲火流鈴之仗三華黃道降飛龍唱鳯之車衆聖臨軒萬真就列臣等百神震惕一念精純拜首瑶壇敢伸降重初獻茶酒臣謹重誠上啓虛無自然三境至尊昊天玉皇上帝紫微帝座九極髙尊三天主宰三十六部尊經玄中大法師三天大法師靈寶經籍度三師真君三洞四輔法中主執聖衆靈官將吏三界官屬一切威靈臣聞道本無言因經科而立教化垂有作出法籙以度人九品三乘遞相通貫六書八體互以發明傳於天中為萬品指歸之路降乎人世開群生修進之門自非歷劫之良因安得一窺於正典故教剛精練始可為師志慮清髙乃容受法立功建事上以贊於玄猷勵行飾躬內以檢於凡質科條至重付度不輕如臣本匪良資實無逹識五芽三素豈知練習之源六欲七情徒逐沉迷之浪所當省巳安可接人蓋以立誓盟心登壇受質雖戒張皇而妄泄不許緘祕而失傳況承勤懇之詞願被正真之化豈以臣之不才終加抑絶幸其人之有志僣為申謄臣雖昧通真逹妙之機然不敢傳叛道罔人之法爰從尋典用蕆靈壇奉髙聖之回光仰至真之在御輒披凡愫上瀆宸嚴設醮青詞謹當宣奏宣詞焚詞按如詞言情誠堅切義當接引不敢遜辭伏以靈寶神章洞玄上品延康之始莫測其端龍漢之初漸彰其妙結飛玄之正氣成隱祕之靈音發五鎮之根宗經四譯而昭布寧家國而讃帝王之治調隂陽以輔造化之功上聖髙真莫不因兹而證道沉靈幽爽豈非假此以遷升實萬品之津梁乃千靈之規範雖巍巍之典傳度不輕然浩浩之功包容無外有若臣庸愚未學謬居師匠之階嗣法某人塵碌凡資僣受仙靈之職事俱越分理實愧心尚祈天造之慈憐更冀師恩之覆育許容傳度俾遂進遷赦原臣等九祖宿愆萬生重過罪籍先除於黑簡真階早紀於玄都臣等驚冒瀆之漸繁第醮儀之有式敢陳亞獻以薦克誠臣與嗣法弟子無任戰兢之至稽首再拜亞獻法事獻畢舉十方靈寶天尊嗣法弟子再拜啓白此作掌記寫或領贊引代念嗣行靈寶大法具位臣某誠惶誠恐稽首頓首再拜上啓三境髙真萬天上帝東方無極太上靈寶天尊南方西方北方東南方東北方西南方西北方上方下方無極太上靈寶天尊願賜矜憐俯垂鑒録臣千生慶幸一旦遭逢嗣法傳真遷階進職永堅素志不敢負心儻渝誓盟甘從譴罰今與師分環剖劵立誓飲丹伏望證明容臣受度臣元任望恩激切之至舉天尊號師與弟子回班對立髙功啓白宣戒恭聞靈寶之道洞玄之宗獨步玉京度人無量受之者功遷九祖修之者形陟九霄乃萬法之靈樞總十方之正教巍巍大範德難可勝受其法者固所當修戒其所必戒修為不替神仙可期對天發揚先明十戒第一戒者無忘八極忠者欽之極考者順之極齋者戒之極敬者禮之極寬者廣之極𥙿者樂之極容者和之極忍者智之極天以北辰為極地以五嶽為極屋以㨂為極天以有極則能聚衆氣地以有極則能聚衆形屋以有極則能聚衆木人有八極亦如是也故能聚衆善善立則道備道備則所見自然開渙所應自然調適此得靈寶度人之基也第二戒者無忘鑑水鑑者喻心水者喻性心清則萬法皆照性靜則五濁不歸道之在人圓通非蒙蔽可了亦非躁動可達託鑑水而悟心性此得靈寶度人之體也第三戒者無忘日録日録者所修檢善惡人之處世患不自知患不聞過患不聽言不自知則無所悟不聞過則無所攺不聽言則無益今以日録日録所為不可下筆處皆巳之非也攺之為貴則日録者不教之師不説之友不詔之君父不約之法度也不可忘之此得靈寶度人之想也第四戒者無忘追度安鎮人之所親不過父祖所尊不過君上君上父祖之德必報之者追度安鎮是也追者謂誦經行符上為父祖六親之過去者以資冥路度者謂誦經行符上為父祖六親之見存者以資福算安鎮者謂誦經行符上祝國王帝主聖壽安鎮四方召龍行雨驅妖馘毒保護民物禳度星躔皆其一也其或在家行祖父之志或居官分君上之職種種利益有可報稱皆即為之凡木之葉落尚糞其本根則歸根復命之義也人之根本反始不可不勉此得靈寶度人之冝也第五戒者無忘治救之術慈憫所先凡有病者為其行符誦經至誠禳却如巳至愛男女父毋凡有方便種種惠澤皆盡其心如蒞官行法務布隂功寬平設法三省而行再思而動其或修治橋梁當道種植有益於世者皆力行之夫人之有慈念木有根人而不仁逮於禽獸故猩猩活象義鶻搏蛇拔難有始此者可思之此得靈寶度人之由也第六戒者無忘服錬之術參同天地效法隂陽念念正真存存不缺劃然超脫變化無方今之蟲豸有外捨陸走而至飛翔地脈川遊而遂奔逸在物既爾於人當然此得靈寶度人之方也第七戒者無忘剛潔剛則有正不行非淫潔則戒行不慕非食不非淫則不損身之精神不非食則不殺物之性命見人妻女如巳尊親見物性命如巳所生自然精神全而𡨚對少此得靈寶度人之實也第八戒者無忘儉約凡所求物當知皆是元始祖氣化生灰水蕩穢不用修飾粟菽充飢不用𤤽庖此得靈寶度人之福也第九戒者無忘願約願者從初入道時發善心約者既入道後設誓夫地神明司之無輒中變科戒不可不守此得靈寶度人之念也第十戒者無忘師友師者所以教友者所以勸教者似父勸者如兄既為父兄可不欽重而委棄之乎此得靈寶度人之宗也上來十戒乃師尊付授發明古經夫經藴道之機法乃經之用欲遵正教修謹為先守之行之毋得中怠億曽萬祖幽魂苦爽皆即受度上升朱宫修之益勤學之不巳功滿得就皆得神仙飛升金闕遊宴玉京子其勉之次分環剖劵夫環劵者所以結誓三官告盟十天承永堅信度師不敢隱真出偽弟子不敢叛道背師分環永不渝盟裂劵永不負誓始勤終怠五帝録愆敬佩精修九天同福對聖披受終身寶持次弟子與度師共執朱筆章表以環劵各入袋度師云回筆指天弟子云上不負天我若負天七祖受刑天若負我日月不明度師云回筆指地弟子云我不負地我若負地身受刀兵地若負我草木不生度師云回筆指心弟子云我不負心我若負心合門不生心若負我道化不行次度師捧水盂執筆白云付度巳訖歃血重盟以丹代血各堅其心飲此丹華通真逹冥中理五氣混合百神十轉回靈萬氣齊仙師與弟子及道衆各回班還本位髙功再白對聖輔受公帖宣行表白對聖宣輔職帖弟子長跪章表以環劵并帖付弟子弟子執劵白云臣賦性昏愚植資凡下誤蒙天澤叨進仙階裂劵分環立盟結誓對天領職被寵實深臣敢不益勵素心永棲正教儻有違負一從玄科臣無任懷恩激切之至謹稽首禮謝髙功宣科臣謹重誠上啓三清上帝九極髙真三界靈司十方衆聖醮筵列位一切威靈臣聞道在人宏法因師度繼承不絶乃能敷暢於真風流布無窮可以恢彰於大教引後世於背暗向明之域躋生民於遷善逺罪之途將成輔正之功實以度人為切但臣稟資退鈍賦性愚蒙學未際於至人道不逢於真授僣當傳度大失典儀豈謂萬聖流慈衆真孚佑不遺么賤曲賜包𣶬乃容勉強以行科俾遂扶持而畢事分環破劵立誓結盟露剌對齋飮丹受職威儀粗備實荷垂恩所愧薦獻之誠不全豐潔醮修之禮罔極精嚴壇墠不崇請陳失格儻憐其愚則可赦若録其過則難逃願祈曠蕩之恩普宥狂愚之罰庶使臣與嗣法弟子早逢妙旨獲悟靈機進修無障難之侵符法契神靈之助呼吸有應關奏咸通身得道真名題丹簡下同駑纍俱賴恩私上願道法興行真科闡布天清地靜日麗月明社稷宗祧先聖騰駕於常晹之館遊神於大漠之庭福及皇圖慶流神嗣今朝皇帝乾坤薦祉嵩華齊齡億萬斯年永迪無疆之慶百千其葉終符過曆之祥海宇丕平邊陲寧謐五兵不試六氣均調禾稼滋豐人民康樂隱谷棲巖之士修真進道之人行就功成早拜九天之召升神錬質克為三境之臣次冀臣等宗祖先靈師資往識自知宿命長超冥昧之鄉早悟真宗徑陟逍遙之境以至六天十地三途九幽悉被宸輝盡沾沖廕罷停拷掠解釋𡨚纏遊靈飛爽之無歸沉魄迷魂之未度咸令警省普遂清間賦性立形含情受命羽毛鱗介草木昆蟲不逢橫傷並臻生理臣等深慚纍瀆難駐群真敢伸終獻之私少酢酬恩之至臣與弟子無任戰栗稽首再拜終獻法事臣謹重誠上啓大道髙真瑶空上聖臨壇監度一切威靈臣聞道虛善應天髙聽卑故兹傳度之壇特沐臨觀之澤惟是冒干天聽輕瀆靈威惶懼實深驚危失措尚祈寬宥曲賜矜原輔受事終醮修禮畢仙凡有間仗衛難停清蹕收音巳返瓊輿之駕紫雲斂綵難隨玉輦之蹤將吏還司真靈復位徒深戀慕陪切依歸注想天階百拜奉送送神頌納官復爐出堂詣師幕髙功長跪致謝師詞修齋雲輿焚燎向來酹酒念善謝師交賀退允中嘗聞道之難聞也久矣中古以後科教興行而大道隱晦世降愈下法術盛行流之多岐日以駁雜三洞之品自漢天師宏正一之宗而天心正法出焉當其受印劒於玉局蕩妖異於寰區法之濟時厥勳盛矣天心眷牘歷魏晉之變遷經南北之分治散失淪墜幾不可考五季之後有談先生饒先生相繼祖述而成書雖曰三符二印為宗而其名稱職位體格言詞悉非漢制及其天條鬼律遂有徒三年杖一百之刑按徒杖之名乃定於後周顯德之間亦非漢天師本文漢之刑曰笞三百笞二百之類與今不同也聞饒君頗通逹幽冥之事恐其欲以俗格而警勵世人或他有所見又於傳度之時給仙誥以輔職幽冥世法為之元妙宗遂因其式而編敘紹興之初路真官再編天心法則用世法以定之者尤衆路君髙才博達之士撰傳度科文又於其法十卷之首各作一敘極為精確超越古今惜其所見有偏升天師與上帝同列奏告尊崇之比僣天尊獨躋萬真之上失於礙理良可恨耳惟出給仙誥之事路君却不從舊例止給補帖而巳大為允當夫人世官爵受命於君故出給告身若大臣便冝補人以官亦不過給帖僣補非得君命不給告也矧傳法之規乃以科教有此典式依按而行初非面覿上帝顯奉天旨止於備録奏告依儀傳度皆補職帖而可雖宗壇亦止於給帖幽隂之事安可全用世俗格式擅作告命誠不可行此事獨於天心見之若靈寶大法自葛仙翁而經典宏敷至許旌陽而法法大備雖混元法亦以許君為宗而淨法祕法與靈寶分𣲖終未嘗有諸詭怪之狀紹興之後天台靈寶之法行於浙東於是混雜偽妄甚於天心矣如經中依格告盟十天蓋奉金寶以詣師啓十方而結誓言出諸口天不我欺欲重其事而不致輕慢乃經中之意金寶本無數目盟天立儀傳法則師與弟子對齋結盟分環破劵俾師不得隱真弟子不得背師此其義也天台靈寶法中印劵品乃以黃繒十片朱篆弟子某稽首東方玉寶皇上天尊十方皆依救苦經天尊聖號逐一朱篆於傳法之際以十方天尊之號當中分剖名曰告盟十天且如世間文字有干涉乘輿宫禁輦蹕之類皆平闕謂其近於君也豈有正篆天尊聖號而當心剖之乎又立劵式以經籍度師排書而順列於上以父毋三代逆書而倒列於下名曰三天文劵古者引九祖以告盟言禱之天臣若有達九祖同罰亦重其約也書劵而倒安於下可乎不知何人為此怪證彼不知天尊初非剖破之文父祖豈是顛倒之物是可忍也孰不可忍也其餘典格可以類見恐吉人善士不探源流陷身於逆故復深辨之分劵乃師弟子恐其相負也天尊何嘗負汝天尊不與世人分劵也劵上略為合同之誠有一符在剖開處而巳靈寶臨壇並啓十方天尊爾允中所編一遵古式給帖補職亦從舊儀帖尾之辭允中以法中之義撰述欲知文飾從便更易可也格例則非自立也法中將吏皆屬上玄非天心正法用嶽下將兵乃考召諸法可以交撥此乃臨事請降者也天台法中破壞經句以為將吏司局之名盡出附會臆説巳詳論於三界宫曹品次不可襲非蹈妄而用之帖中略具本法合召將吏以備典儀非交撥之例皆舊例也倣效朝廷私作告敕決不可行識者所當深戒天心正法久巳混淆靈寶神文豈冝隨俗至如傳受近來多增十天盟告雜儀頗衆諸方互有不同悉非本經舊典難以輕用及其傳度行科或用天心法傳度之文或以他醮之語參雜宣啓却與傳靈寶大法事體大不相侔古法中雖有其辭而科文未備允中今從舊典校正編撰並從本法之義免致於上帝前事屬此而口言彼也宗𣲖源流各有所主儻非傳度此宗之法而用允中科文之語尤其不切事情非此宗𣲖者自别為之乃善上清靈寶大法卷之四十三
