  text: 上清靈寶大法卷之二十二彩四
  hash: sha256:eeeddd7a0a0cf5eedec989b5468c66bc653cceef819866caf31cdd85c8d83fe2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_021-001a, image: hfl/0967/0967-124.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金𠃔中編臨壇符法品齊壇三寶位次太上無極大道中三十六部尊經左玄中大法師右右三寶所書牌位出廣成先生齊科諸方奉行元本並只如此共計一拾柒字即無異同亦不曽别有他字近有人妄行增易乃編入陸簡寂齊儀中如三捻上香願逹三境杜廣成科中亦無下文今益以太上三尊之號且以三寶繼之分𨽻三境輒行編入杜君齊科內始為此者罪豈容誅幽顯不容天人共忿謗賢亂教欺世罔人墮其一魂誠不足憫纍及九祖情實可憐罰重殃深流禍延惡播以償辜非道不慈惟人自取後之學者可不戒之三上香一捻上香願逹太清境二捻上香願逹上清境三捻上香願逹玉清境次恭身端簡密呪曰香乃玉華散景九氣凝烟香雲密羅徑衝九天侍香金童傳言玉女為臣通奏上聞帝前令臣所啓咸賜如言謹按廣成齊科一捻上香願逹太清境二捻上香願逹上清境三捻上香願逹玉清境如此而巳近者世傳雜科却云一捻上香願逹玉清境供養無上道寶二捻上香願逹上清境供養無上經寶三捻上香願逹太清境供養無上師寶或者相傳以為陸簡寂齊科所載殊不知陸君主張教法立萬代之範模考訂經典别千古之真僞身得度世名列仙階編撰科書所存雖少無非按據經典參合條綱後人不究其源凡有好竒尚異之事多委之簡寂齊科大唐之時巳有此弊但欺誑後學誣汚先賢厥罪惟深至如立成儀中則云一捻上香願逹玉清境供養妙無上帝自然元始天尊無上道寶二捻上香願逹上清境供養妙有大帝虛皇玉宸大道君無上經寶三捻上香願逹太清境供養至真大帝萬變混沌玄元老君無上師寶又於其下分明注曰出廣成先生齊科且廣成先生之書流傳至廣自古至今𥘉不見有此等語不知何所出如此况杜君四十卷之中二十三萬言其餘太上三尊並無此等聖號三寶亦未嘗分隸於三尊各主其一也蔣君博洽多聞精通科教若云此說出於僻書祕典之內則後學所不敢知若言出於杜君則杜君弘科演教立說措辭素無一毫竒詭之語觀其書讀其文可以想見其人不知何緣遽以此說誣執杜君也蔣君未必如是恐其書刻刋之誤耶或蔣君所傳杜儀為後人所傳失加考正耶杜科遍傳天下矣若獨以自收之書如此其餘安能家至户到逐處增益哉太上無極大道者萬氣之祖萬化之源天地象形萬生萬類無非出於大道也經則道之文師則道之臣亦出於道也所以齊壇既立無極大道左有三十六部尊經右有玄中大法師蓋以道本一氣無形無名一氣分三遂為玄元始三氣虛極生神故有太上三尊雖萬化萬生皆出於道而太上三尊乃道之宗主及其立教則龍漢劫出書號洞真部赤明劫出書號洞玄部上皇劫出書號洞神部此則三十六部之經也經出則教興經教因師而傳授故齊壇立經與師乃齊科之所自也太上三尊皆大道也三洞之書皆正經也三乘之教皆師傳也今以元始獨立主大道而作道寶是誠𠃔當矣然三氣三尊本同一體使道君老君不預此列則道君老君無道矣又以道君獨主經而作經傳經也今以為專𨽻上清則是元始與老君無經矣又以老君為人天之師遂以為專作師宗或又以玄中為老君化身此尤不可執泥也此事只見於老君實録諸書而巳使果如其說則老君為天尊則以為上帝既化身行教則以為玄中大法師而巳不應探其源而稱之也如禮師威儀經之說則存天寶臺中太上三尊左有三十六部尊經右有玄中大法師此蓋謂經則有象師則具形惟大道無形不可想念道既肇始主宰萬生為歷劫之宗祖作三才之根本故存太上三尊輔之以經侍之以師其理甚明安得以為道君專主經而老君專為師乎且三尊之號在經中只稱元始天尊太上道君太上老君其别號則曰天寶君靈寶君神寶君以三境之名而稱之則曰玉清上清太清以三洞之書而名之則曰洞真洞玄洞神如此而矣蔣氏儀中所立三尊之稱則廣成儀中何嘗有此等尊號杜君為崇元館大學士乃唐時之執政代臣唐室尊老君為祖遂上尊號曰聖祖金闕妙無天皇大帝杜君在唐時編集齊科豈敢輒去朝廷尊號而易以萬變混沌之說此蔣氏儀中謂三尊之聖號三寶之分𨽻皆出杜儀則不然也至於老君稱混元上德皇帝乃宋朝所尊號在唐朝亦未有也况太上三寶以一氣分三肇基成體本無輕重豈有異同妙無妙有之間不可思議實難分别今以元始為妙無上帝道君為妙有上帝其理大不可通杜廣成於廣明二年進三界混元圖於朝其中叙曰天尊者極道之宗元挺生自然消則為氣息則為形不無不有非色非空不終不始永存綿綿居上境為萬天之元居中境為萬化之根居下境為萬化之尊無名可宗強名曰天尊蓋世人尊之如天仰之則彌髙攀之則無階杳杳𡨋𡨋不可以理究不可以言筌不可以階升不可以壽紀生萬物而不為主宰御萬化而不為言至尊至極故曰天尊也此杜君之論也而混元圖自唐于今諸處刻石傳布世間人所共覩不可𥝠下增攺杜君之議論源流如此肯以元始為妙無道君為妙有哉如世之人物則有形有質謂之有可也隂之鬼爽則無形無體謂之無可也三境天尊謂之有則不可覩不可窮謂其無則生天地育萬物自古諸經衆典以至莊列諸子百家之書未嘗力指其有亦未嘗决稱其無兹以元始定為妙無則不可復有矣是元始天尊矣乃隂鬼爾又以道君定於妙有則不可復無矣是道君亦非天尊矣乃凡人爾竟不曉其意以三尊為何物且為此說出於杜科則以至愚至陋之輩視廣成先生矣蔣氏之書刋行已廣後學之士不覩杜君之全書則誤後世不其深乎儻有經典中而稱元始為妙無上帝道君是妙有大帝决非出於天尊之金口必是世人之僞辭始作僞者罪不容誅或無所據而輒以說此誣毀杜廣成則於心寧無愧乎又不知何人增於杜儀中蔣君亦為其所誤也至於齊壇書三寶牌位諸家所傳杜儀皆曰太上無極大道三十六部尊經玄中大法師如此三位而巳蔣氏立成儀於中則曰太上無極大道左則曰三十六部尊經真文寶符右則曰太上三尊十方衆聖玄中大法師蔣氏不注出處而世謂其說出於陸科及考陸科浙東亦有如此傳寫者他處衆本多與杜科一同且其科文年代深逺差誤甚多惟理之所在則無極大道太上三尊也故經曰上無復祖惟道為身是三尊也又曰三十六部尊經於左則真文寶符皆在經中似不必再增此四字矣此猶可也又於師位增太上三尊則無極大道非三尊乎是三尊之外别有大道乎且經乃三尊所演之書爾今經居左太上三尊在師位而居右是三尊在經之下也三尊降以為師則大道巳不復有主兼三尊之與大道非可分為二途若大道是此三尊而師位又如是三尊未免重復或師位之三尊非大道之三尊則兩箇太上三尊矣諸經衆典或别有所出儻不與道經師並列為三則以太上三尊十方衆聖皆為之師有何不可如出處不涉齊事則難錯雜引用也齊壇之內於中既立太上無極大道則師位不可再立太上三尊禮師威儀等經又明言先存天寶臺中太上三尊左有三十六部尊經右有玄中大法師即前所謂大道無形之可想故存三尊也輔之以經傳之以師與其牌位所書相合事理顯然無可疑者今後移三尊而加之師位則經中之說亦不可行臨壇亦不可如是存思蔣氏立成儀於存念之首亦引敷齊威儀經云先存太上三尊左經右師其餘位牌却以太上三尊加諸師位往往其宗𣲖必於大道位存三尊於師位又存三尊如此則衆人只存三尊而蔣氏存六尊可謂詳密若於師位存三尊則大道又無可想既以三尊移居師位在蔣氏所當除去威儀經存念一節庶幾與牌位相合不致自相背馳至當歸一惟理所在此非可執巳見而非他人亦不可引别經而飾僞妄豈有太上三尊而與玄中大法師同其位哉天上人間悉無此理况於牌位只如杜儀書之左以三十六部尊經右以玄中大法師又有何窒礙有何缺事有何非理有何失格何故贅其辭而增益之𠃔中亦非曲主杜廣成之書而力排諸家之說其如義理不通罔天誤世不可得而苟從不獲巳而辨析其非所樂為也𠃔中不願世人皆從此說不敢以蔣氏之論為未善𠃔中三師奏授既巳若此考之經典又以如此依按奉行不敢異此啓告上帝不敢越此所以陳其大略為同學共宗之士而言𥘉非勉彼以從此也非𠃔中同志之友不必用此說受蔣君宗緒之人不應由此途使彼别有所據在𠃔中以其於理未通尚不敢從况於詐稱杜儀所載則𠃔中萍梗之蹤遊歷稍廣所見杜儀善本甚多奉行杜儀亦久其中並無此說是以甚不以為然此心洞逹無疑雖天人相去之甚遙而監臨報應之至速若行此法者當併前來青黃白三氣之存用並合行奏聞上帝直言𠃔中傳付如此或有未當𠃔中甘當其責然𠃔中有所授而云固非巳見而增攺古人之書必無罰也焚符右法上香密呪之後不復行用今於三捻上香後則焚真文一道降真召靈符各一道此則見於靈寶大法矣真文則元始靈書中篇天篆之文刻梓硃印於輕黃𥿄上臨燒則存元始天尊在天寶臺中如黍米珠說經之時次燒真文吹散存十方無極無量品至真大神無鞅之衆浮空而至降真召靈符同燒散之存監齊直事三界真靈千乘萬騎環侍三尊御案御案則當上帝前中間一案又曰洞案洞者通也通真逹靈焚香之所也在道場中則居玉清前壇中則居三寶前散花詞云洞案爐烟起無為道德香是指此案近有遐方之人指科案為洞案非也本位香此科案也齊法之始朝奏為先恭對髙真恐語言失次故立科文端圭正立不可執卷故置科案居於髙功所立位次之前故曰本位宋朝以來諸方所用皆一橫几略可安科書而已是以於手爐中上香密呪者祝辭也意宣祝言而心存上帝者也蔣氏立成儀於科案則安香爐諸方並不能通行兼所至處科案亦不如此寬濶以香爐置於案之一邊又成非禮欲大造科案則壇㣣處下可容也本位香止從舊例以手爐上香為便呪曰空因色顯心以香傳心之所逹非火非煙令臣關啓徑御九天真靈歆格不假言宣又呪道由心學心假香傳香𤑔玉爐心存帝前真靈下盻仙斾臨軒令臣關告徑御九天師授常用前呪蓋密呪而不聞聲心存而朝上帝故曰不假言宣也禮師凡科中都講舉各禮師存念如法者髙功瞑目存太上三尊在天寶臺中左有三十六部尊經右有玄中大法師十真五帝群仙侍衛如玉京山衆真朝㑹之儀次思經師所在之方心拜三過曰願師得仙道我身升度廣成先生曰經者逺也經為逺師乃籍師之師因師授受不忘本也次思籍師所在之方心拜三過曰願師得飛仙為我開度七祖父毋早升天堂我得道真升入無形廣成先生曰籍者因也傳真學道師資相因乃經師弟子度師之師也次思度師所在之方心拜三過曰願師得升度上登髙仙為我開度五苦八難名入仙籙永為真人廣成先生曰度者進也度我凡身進登道品從凡至真莫不因師乃己之師也夫三師者經籍度三師蓋道不可無師下而至於一術一訣莫非師傳况身佩經籙行大法主領齊醮開度人天豈應無師而古者傳籙則以有籙者為師中古以後建立宗壇不容師度故傳經受籙合以宗壇為師若嗣行靈寶奏受齊法則合從所受之法存拜三師或於籙外而曽從人授持經者亦合兼用之儻以受經之故而遺去傳法之師則不可行經乃道之緒餘法乃經之施用真以經之傳授為宗而傳法者不為三師則亦有所偏矣夫法則出於經捨於經則非法正教之外而别習他書雜法者却不在臨壇存禮之數也五方衛靈呪每句皆四字東方之首曰九氣青天南方之首曰南方丹天西方之首曰七氣之天北方之首曰北方玄天中央之首曰黃中理氣近者見南與北皆有方字却於東西中三方皆𣸸方字以六字宣之此古經行文自有句法不同豈可自加增𣸸乎有識之士當革之可也然存思却是五方之正氣非三素雲矣夫三號合生九氣而其散也萬殊析其大為五氣在天為五星在地為五嶽在人為五臟在物為五行在事為五常今以所用呪而存降五方之正氣驅斥妖氛肅清壇墠夫東之氣則屬木其時則為春其帝則青帝也餘四方皆倣此例故有五方五帝兵馬則此神主之也存降之法想念於倐忽之間存各方之真氣隨其方色氣中各有兵吏隨呪應召翊衛齊壇近有衛靈五方之符者不係洞玄靈寶法中故不用之止遵先師所行衛靈呪出真文要解經亦見金籙簡文也鳴法鼓廣成先生曰法鼓者內正神氣外滅魔靈法事所先也左左叩齒為天鐘右右叩齒為天磬中中叩齒為法鼓叩之以八為節三八二十四通身中三部八景二十四神法鼓外滅魔靈內集身神二十四不為虛設法爐無上三尺玄元始三氣太上老君召出巨等身中三五功曹左右官使者左后捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓比間土地里域真官正神臣今正爾燒香行道奉為某為國為家修建黃籙大齊祈天永命福國裕民其諸誠悃具載章詞願得太上十方正真生氣下降流入臣等身中令臣所啓速逹徑御至真無極大道昊天玉皇上帝御前此陸簡寂杜廣成所定者也其間互有出處不同廣成先生雖本金籙簡文而參考三洞經誥不為不詳今此發爐之儀正屬洞玄本格難以再有更攺惟太上玄元五靈老君召出臣身中諸句為正一發爐屬洞神部與此不同近者有據已見恣行攺換如三十六人出出者嚴裝關啓此間土地乃攺云三十六人出當召此間土地速出關啓大失舊格所出三十六人皆身中之神悉皆嚴裝環列前後關啓土地效職傳誠不應攺作土地速出關啓蔣氏立成儀亦略疏出發爐有不同如金籙簡文三五功曹下無左右官使者又一本五帝直符下無直日香官四字其餘異同尚多今以廣成科為定者蓋差異之文及張萬福天師等科皆在廣成之前巳經廣成刪校露剌盟尺而行故當遵用如至真無極大道昊天玉皇上帝御前廣成考之盡矣無極大道者總玄元始三氣而言之三氣則三境天尊聚而為形散而為氣合而言之曰大道且氣乃萬氣之宗祖天地之根源至尊無上也及其形而上者謂之天天既有象天豈無主故昊天上帝天之主也齊誠所格宗本於大道而主宰於昊天故曰速逹徑御至真無極大道昊天玉皇上帝御前所謂並總根源莫不備盡近又有人增以無極大道三清上帝蔣氏立成儀亦略辨此謂近人增以三清上聖字乃拘於色相之間不合科式然未能條例科文分析義理以驅世惑且晉自陸簡寂唐自張清都其後則廣成編集科法至今數百年間無人攺易其語今輒於發爐正文亦尚竒怪襲而不革其罪惟學者所當深戒命魔髙功左旋於鬼户望西立都講至天門望東立髙功三叩齒咽液三過心存日月在已面上從鼻入洞房金華宫兩眉間却入三分為𩀱丹田更入骨際三分為臺闕正深入七分左有青户右有紫户眉間却入三寸為丹田宫亦名泥丸宫又却入四寸為流珠宫又却入五寸為玉帝宫當明堂直上一寸為天庭宫洞陽房直上一寸為極真宫丹田直上一寸為玄丹宫流珠直上一寸為太皇宫此乃大洞真經中之所列也務成子引九宫訣云五寸為玉帝宫又曰金華宫九宫皆辟方一寸金華在洞房之南也光明出頂後煥然作九色圎象薄入玉枕徹照十方隨我旋回而行密呪不得令耳聞聲違者有咎愼之密呪曰黃中䇿氣斬妖踪察制強精斷邪翁太上有命太上房急召北帝詣玉宫受承威令宣魔王五氣蓊鬱與命衝祕藏玉文方就隆三天運明六天運終賢者哉切謂命魔之格自古齊法已載陸簡寂至杜廣成諸君所編皆遵古科三朝命魔無可疑者蔣氏立成儀謂趙道升黃籙儀只於午朝命魔乃本於政和金籙悉古法也而宣和御製金籙道場斜儀其間次序乃是三朝皆命魔步虛設醮後方行散壇科此乃楊傑所撰者其餘科案上手爐香用空因色顯心以香傳一呪乃出此科中與手執玉爐心存九天一呪少異教門正盛考訂科法大為詳密故御製金籙科文多從古法蔣氏立成儀又引張清都曰天尊木說經之前諸天魔王遊觀太空行威縱毒天尊說經之後魔王從化故衆聖將遊先命魔王前驅也蔣氏曰經云魔王敬受事故能朝諸天所以步虛先存思命魔久中切謂此一節乃張清都釋說經之後魔王奉化神功受命普掃不祥凡天帝將遊則命魔先驅此箇一說也今直以此意而引證步虛之前命魔亦頗未盡其理若天帝將遊先當命魔前驅則上十方香已存三尊居臺中况於啓聖宣詞禮方懴悔悉當對上帝存諸壇中已久魔王當於上帝臨壇之𥘉清塵效職何獨將步虛而方命魔也其義蓋不如此且行朝之序先則髙功上香乃寓敬逹誠也繼以發爐乃關白齊意出身神召里社以宣謄也各稱法位則髙功與道衆自陳職位及姓名也同誠上啓則祈告列聖敷露髙功受詞行齊之由也登齊至此皆髙功之詞爾既列受詞之由則宣青詞以露齊官心愫也齊官心詞既以如此然朝修功德光當上祝帝王普福天下開度九祖以及見存是三捻上香之意也所請所祈悉寓於言辭矣薦拔亡靈則慮其生存積諸罪垢保安見存則恐其平昔作諸愆瑕雖勤勤於請福祈恩儻使眚結於十方三界之中罪列於天曹地府之內則玄澤何從而降惡籍何從而消於是禮十方天尊分方懴謝以至日月星辰山川河嶽皆乞原除愆犯削落罪書也凡此行用不出齊壇之中而三界有司關係考察不過預齊衆聖翊衛神祗而已次則取法玉清天中玄都玉京金闕七寶玄臺紫微上宫諸天衆聖一月三朝其上自清微天以下皆朝元始也見靈寶大法中廣成先生曰步虛十首出靈寶玄都玉京山經乃十天衆聖旋繞玉京山歌詠修真之詞經曰建齊行道四天帝王駕飛雲緑軿輦入景玉輿真人玉女手執花幡前導鳯歌後從鈞天白鶴獅子嘯歌雍雍燒香散花浮空而來瞻禮行道觀聽法青此則罪福考録關與不關文移請降及與不及皆當步虛旋繞之時天真大神不間遐邇無極無量浮空下臨故先當命魔澄清寰宇是不止於一壇之中也其法髙功密用神光恭宣道旨以太上令召北帝俾宣魔王察制強精斷絶邪源玉文就隆則三天運明正化流行仙道隆矣邪源閉塞鬼道消亡隂氣零墜六天運歇六合之內道氣盈充上極九霄旁周萬㝢無鞅衆聖悉可浮空觀聽法音所以能宣太上之令而致比感應者乃在髙功吐納內錬胎息靜神泥丸洞明於是一想而神光昭煥更籍太上呪令則魔王受事以至奉承帝令掃清字內遐邇澄肅衆聖浮空以聽步虛也是不上於一壇之內外不拘預齊之衆真而巳此其所以用於懴謝禮方之後而居散花步虛之前故也而科式之𥘉因經立教步虛旋繞巳畢義當禮經所以言天魔敬護世受大福乃因受經持戒念道遣欲而至此嘆其功而禮之次則言經道興行家國隆盛進修不已入于大乘既使七祖升遷身乃超舉於是再禮夫愛經而味道棲教以成仙終至於與道為徒固錬形質超三界之難度地獄之苦功之所自悉因於經故三禮以終之此禮經三啓之義也自齊而至經使我聞經而知道修真而佩符籙行教以度天人今齊官懴罪而禮十方祈恩於上境嘆功而禮經矣於是禮謝三寶然後重稱法位恭對天關普行懴謝非止於十方及嶽瀆靈司而巳故謂之大謝次方願念復爐其理暢然矣如趙道升輩以命魔為專意內景是太上不出泥丸矣衆真居於身內命魔作用於體中此其不逹經旨誤認本源亦猶默朝上帝啓告齊事於上丹田也差誤甚矣夫泥丸之有九宫身內備具萬神此豈期無之耶自洞真天寶之道以至靈寶神寶三乘之教莫不悉有身中修存有可專意於內者有內外相應者法師入室端坐內錬形神此內也登壇朝謁闡事敷齊此以凡誠而格上帝也拜表上章飛神謁帝此出身神而謁髙穹也朝真懴悔行道燒香降五氣以肅壇場合三素而存大道以致命魔王而清六合法玉京而詠步虛皆內外相應感激之道也豈得以命魔全用功於身中乎又有以陽生於子而終於午隂生於午而終於子隂陽交錯之際故午朝命魔此又全無經據亦以其執泥於身內而為此說果使玉帝三清不出我身千真萬靈悉歸我體則何須升壇建齊謄詞列款也只今齊官致詞於巳我知泥丸亦知矣章詞齊醮一切可罷與聖師垂科濟世之意大相反矣二十七品齊肆拾二等醮各有等差互分品格豈專力於內功而遺經籙齊修耶若夫比和金木匹配坎離永結鉛凝龍降虎伏此則在內而不外矣然却非可以弘科應世設醮修齊之事也學者於內修外錬當知其源流奉教行科合明其宗本庶免指南為西顚倒錯謬也若云命魔呪皆作內功魔王衆神悉在我體理誠難通如步虛經詞曰俯仰存太上華景秀丹田左顧提鬱儀右盻携結璘六度冠梵行道德隨日新此乃言常存太上而行日月之上法以至於道德日新亦功成於內而效見於外也至於天挺超世才樂誦希微篇此則言非超世之才則不足以知希微之篇能悉其章而洞逹妙理也又曰冲虛太和氣吐納流霞精胎息靜百關寥寥究三便泥丸洞明景遂成金華仙此則悟經誥之深機以吐納而施用行胎息致祕訣致泥丸洞明克成真仙與道為一此則言內錬以成真仙在我之身內而不外也自成功若此則天中魔王亦敬而受事豈止保舉哉遂得上朝諸天矣故曰魔王敬受事故能朝諸天也凡所以得致此者皆由齊戒纍功而成是以終之曰皆從齊戒起纍功結宿緣飛行凌太虛提携髙上仙也夫飛行於太空之中乃輕舉矣非止於身內者也若使魔王不離身中諸天止居頭上則魔王受事於身田朝謁天帝於泥丸以是成功而數盡之時乃一守尸之鬼爾非仙也此等朝泥丸之功用乃修存之始者終焉不如此也升陟空玄臣事三境方為真仙行功於身內輕舉於天中乃步虛經之意也今齊壇命魔而先存日月入鼻然後洞房之光煥者以泥丸之景未至自明故假存念以行事也我身尚未真仙未能遽使魔王受事故假太上之命以設之也其事與步虛一章理極相貫故步虛第十章又曰散花陳我願握節徵魔王亦此義也經中乃言成仙而自然者也臨壇則行事而假之者也儻胎息之道既就泥丸之景巳明則不存曰月而光映十方不宣密呪而魔王受事矣然得至乎此乃必不身踐齊壇名彰世俗此之科條乃齊法也故詳陳之上清靈寶大法卷之二十二
