front:
  text: 上清靈寶大法卷之二十七彩九
  hash: sha256:45525bd21a9c9a511832d90fc16999d4c5239aa1da80098ceceaa38aec6aa9cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_026-001a, image: hfl/0968/0968-124.png}
body:
  text: 洞𤣥靈寶法師南曹執法典者權童初府右翊治金允中編奏申文檄品神仙之門户不一而立功濟丗為首故法籙行持之士冝勉力於教科既未能通真逹靈凡有請祈須仗文檄然須言辭有理亦要典格無𧇊有如朝廷疏狀尚有定格髙天上帝無極至尊豈可妄亂褻瀆主領齊醮職在關宣通逹悃誠利濟幽顯既在練逹科教要在少通文辭况黃籙大齊人天所重全在髙功立意措辭不當隨順俗情鹵莾備奏於理窒礙决難感通科法之中事先關奏故以奏申文檄隨法應用而不敢略也奏狀式具法位臣姓某誠惶誠懼稽首再拜上言臣入意謹録狀上奏某帝尊玉陛下臣恭望天慈𠃔臣所奏特賜頒降施行臣干冒天威下情無任惶懼待罪之至謹奏年歲次月日具法位臣姓某奏此一奏式世人用之者少浙中尤不識此格𠃔中師傳一宗行之久逺仍只用於三清上帝昊天北極天帝而巳蓋以三清天尊即玄元始三氣也三氣為萬化之根源三界之宗祖生育天地肇造隂陽無形無名難思難議號為天尊蓋強名之也至于昊天上帝為萬天之主宰統御萬靈上應玄氣圵極大帝總録萬星為天之樞紐上應元氣天皇大帝現象則居句陳之下位亞紫微垣上應始氣三界之外六極之中莫尊於此矣故用此奏牘略如章首之文不敢於世間常禮瀆之也故其所乞亦不敢繁辭只乞頒降施行而巳至於請醮則於上帝之前只云欲望天恩鑒録可也奏狀前貼黃在銜位之右黃上之字行與狀字行踈密相同貼與上言字平行以單數狀後倚黃云乞付合屬真司頒降施行貼在年月之右通倚黃上用印如世間奏狀式也內封皮某天尊玉陛下具法位臣姓某謹封方函奏狀謹上詣三天門下天樞院進奏具法位臣姓某謹封方函上或云奏狀謹上詣三天門下天樞院投進亦可仍别狀申天樞院謂之引進狀單發一通則附奏狀函內如纍牘則開列申狀别函申天樞院此則猶世間奏狀别申門下省也申天樞院狀具法位臣姓某今為某事見行録狀上奏天闕須至申上者右謹具申三天門下天樞院主宰髙真欲望真慈特與通進施行某干冒真威不勝惶懼謹狀年歲次月日具法位臣姓某狀𠃔中考之教典而髙天主宰亦有可知者亦有不可窮者若非洞徹玉清面朝金闕固不宜𥝠見臆度妄撰名位也今於天曹省府只稱主宰髙真免犯禁忌正典不出而世間所傳呪之書難於據慿也上界諸天尊諸天帝道君元君天君若天尊天帝則正典位號如道君則紫微上宫明皇道君之類是也元君則萬氣祖母元君之類是也斯皆與諸天帝相同並用奏狀則如世間奏狀式近世傳受法書妄立上真名位不可備述並不在此例如天師而過呼天君追魂玉女而呼元君者其為紊亂典章尤甚斷不宜因迷蹈誤也戒之戒之奏式具法位臣姓某右臣謹據入意謹録狀上奏某帝尊陛下欲望天慈𠃔臣所奏特賜如何施行臣干冒天威下情無任惶懼戰栗之至謹狀歲次月日具法位臣姓某奏巳前後貼黃並同世法方函則隨所詣宫闕若非正典所載不得撰立宫闕名號本欲異於他人以誑世俗殊不知䙝瀆上象自貽天憲愚者襲之愈誤後學切冝遵古可也若世間奏狀亦有先具銜位次録事因後起右列者道家近用之全依世間格也世格奏狀具法位臣姓某凖格或據詞入意頌至奏聞者右所據已如何施行欲望真慈允臣所奏謹録狀奏聞伏候勑㫖年歲次月日具法位臣姓某狀世間格內又一式具法位臣姓某右臣入意謹録狀奏聞謹狀年歲次月日具法狀前後貼黃並如常式但世間之格式惟道家所奏帝尊位號不一難悉得其傳授近世多用此二式而添入聖位是又與世法大同而小異矣如章文之狀惟允中一𣲖用之從世俗者多止用此世間之格自從事冝也上界列真日宫月府五星四曜北斗三官四聖五師髙天上輔玉帝貴臣天曹主執上境諸司並用申狀嘗謂齊醮之儀關宣之典文移奏告利害不輕近世所行或於七元五師上界列真悉用奏牘甚至泰玄都省亦有用奏狀者且故依效近世朝廷名位自行注擬髙真隨意䙝瀆且如玄中法師雖為科教之宗然於天則臣也或者以為老君化身行教而正典未見出處設使果是老君分氣易形亦不可尊為帝也蓋始氣居於太清則為天尊也若化形而行教且曰玄中法師是三境之臣也老君先天立教歷劫度人不可備舉至周為柱下史隱名易號託質人寰志在度人無拘髙下當此之時不過周室之臣爾及其紫氣度關青牛返闕凝真霄極正位太清當此之時謂之天帝謂之上帝故分形下降臣事周室之時不以為卑氣返髙穹君臨上境之時不以為尊本於妙有妙無之間隨其化現而名之可也若為道德天尊則天中之君也合用章奏也若為玄中大法師則天上之臣也合用申狀也今欲徑指玄中為老君則不然也或者又稱玄中法師為靜老天尊尤其謬矣道經師三寶蓋道不可名因經立教教典既立非師不傳齊壇之中合崇宗本故自道而經自經而師非以其位列三寶而便為上帝舊有羅天醮位及宋朝再加編考當時道録院參稽典格而五師之位乃在三官四聖衆真之下爾至如正一天師尤不可誣之按天師以東漢光武之世生之於吳之天目山後世嘗立神仙觀是其所也漢末永壽二年飛升於蜀太上遣五帝使者授天師位為正一真人面朝九清臣事三境本傳并經籍昭然者齊醮之科師為宗本别立專幕者禮也文狀之間合用申牘降於天帝可也豈應君前亦奏臣前亦奏可乎升天師玉帝為一等可乎天師上升之日位方為真人宋朝方上號為正一靜應真君巳自穹於天爵矣或者又稱為天君夫天君則與天帝並也清微天寶禹餘靈寶大赤神寶即三氣天君也東方青靈始老天君暨西南北中則五方天君天師得同此位乎天師傳通經籍九流百家莫不精究功成行著拜命升天其於禮法名分之間其嚴也審矣茲覩世之愚夫貢諛獻佞上之奏狀呼為天君又安得不振怒哉第恐此等文狀未必可通上境無知之徒敢致如此良可驚也上真名位世莫得許詳遵依古典而用之則可若務過呼以真人為真君以真君為天君以使者為便則冒天禁甚矣上界男真極尊者稱道君女真極尊者稱元君亦諸天尊之類也今世但知杜撰過呼甚至以女君過呼道君者有矣及其經典不載之目人自云某真知某院某人為某主某人總天省唯其意之所欲輒將天曹上聖自加遷除且矜已之所用異衆吁世可罔也而天可罔乎天上之分司列職嚴於世間故神仙有上界足官府之語毫分不可冒越而庸人乃敢妄亂䙝瀆允中亦頗見此等行用之人不為無報應也而未知警省者尚多今於上界列真稱臣而用申狀或者以為既稱臣則當具奏既用申狀則不當稱臣允中𥨸謂三代之時陪臣於諸國之君皆稱臣其於天子亦稱臣後世廢封建而為郡邑天下一家故不見陪臣之禮人間奏申之格秦漢巳前無昭然之文可考但陪臣之上簡牘於其國必不敢與天子同禮也且君臣之分天地之大經也堯舜禹湯文武周公孔子作為教化詔天下後世其君臣之分父子之親夫婦之義亦應天而立也且以天文言之日月星辰燦然可覩者巳肇於開闢之𥘉聖人未出之前君臣之分在天者素定矣北極居於天中與南極相對為天之樞紐日月萬星隨天而轉惟兩極不動故天得以運也北極居於紫微垣中常現不隱晉天文志曰北極五星在紫微垣中北極北辰最尊者句陳口中一星曰天皇大帝居句陳之下今按天皇則位同北極則天象中之君也上則華蓋句陳覆之左右則上丞上衛諸星環之中斗魁𩲃𩵄䰢魓𩳐魒居其前為喉舌之司調理四時斟酌元氣出納帝命總録三界外則天巿垣太微垣紫微垣各有帝座乃紫微垣之分司爾周天萬象日月星辰悉總于北極北辰在象而衆星拱之則此也聖人仰觀天文以考玄度亦因其素定者而稽之豈非聖人未出上天巳有君臣耶且天巿太微兩垣帝座尚不得以並北極矧中斗之內暗曜二星乃斗中之帝座爾近世妄人以旁通圖武威經北斗籙諸書悉更變其名撰作璇璣法遂徑尊中斗七元及斗中帝座二星皆與天帝同列文移章奏一依玉帝之例其為不典可勝言哉古科固有斗醮夫醮者道家總祭之名非謂有醮法而便尊為上帝也以其事屬斗宫則總斗中衆真而專醮之以伸祈禱耳安可以有專醮之儀輒升中斗星真以為天帝乎法中有稱斗星為天之太尉者有為天之上帝者乃以其主宰而言如東嶽進號天齊功德可以齊天非直以東嶽之神為玉帝也古科有四十二醮其中如丁甲之將八史之神亦皆有醮儻牽於專醮之義則亦升丁甲之將為大帝可乎自星界而上九清十極之鄉非儒書所載無象度可窮然三洞正經四輔真典述之甚詳夫玄元始三氣聚而成形為三境至尊下則昊天北極天皇上應三氣宰御萬天為天之主允中今遵師授及參考事冝用第一等奏牘謂不敢以世間常禮而瀆天略體章格古人祈告率多拜章今章文既不可常行未免更用奏牘則章文之餘意耳而非正章式也此一式世多未知或止從常格而不用此亦從便也自此而下諸天尊天帝天君古科正典所載者並用第一等奏狀乃中古立教之後用世間奏狀格也而世間奏狀不用聖位以天下一君也若天尊上帝現象示形不可悉數今隨經科有名號者而奏位亦不一所以不得不入聖位於狀內若非正典所載而近世法中稱呼者皆不在此例如以玄中為天尊以天尊為天師為天君其類頗多皆不可慿據輕用自非天尊天帝道君元君者一例用申狀須位最貴如上境之真君權至要如紫微垣之中以至四聖上輔天省髙真三官五師日月星宿悉從甲例却復稱臣者謂行持之士恐未能過度三界之上徑為金闕之臣或得道成真不過受書洞府蛻質空玄而已故於上界衆真亦當稱臣猶古者陪臣之於國君也不用奏狀者猶陪臣不敢尊其君為天子也設若行持之士道尊德隆自揆他曰飛升輕舉徑陟九清臣事三境則於上界衆真不必稱臣不用陪臣之例此則存乎其人愚意恐地界法官似未冝遽當此品然不可謂世無其人是以允中不敢妄議也至於用表於師前以後世之禮君前方得用表今乃用表於師前於禮非便所當體效古者上太子以箋文選及古書皆有格故於師前以箋易表也若不分尊卑不問典格降三清玉帝與五師四聖三官七元皆為一等乃並用奏狀恐人間天上理皆不然如諸家法書或立格式令人用奏狀於五師七元者亦一時有失契勘不應因之而亂正理允中一介晚生幸陶真化罪緣深重未遇至人不練教科識見短淺非敢故為異論欺世溢名理之所在不忍甘心以從謬妄且大塊末判至道混融簡䇿不形無名可别中古以降科典宏敷因世定儀遂有關奏既立文字須按科條後世妄庸之徒或以為只據師傳或以為只循舊式然迷以傳迷而執夫師傳可乎俗格礙理而因夫舊式可乎而狂詐之言則云道以神㑹天以心通不專俟乎文字之間如此則果能出神面帝大定朝元矣其於奏申可停表章可罷苟事未免於形質之間神未超空玄之上乃大言誇張以文過飾非恐為昏迷之下鬼矣奏申之格名分所關不可輕也於人間而以臣為君是亂天下也於髙真而以臣為君豈非亂天上平亂天下平其罪不容於誅亂天上者為無罪乎天人一理幽明一致下俗而輕紊天規雖天上不可亂也然誅心之法其罪為如何哉人若以此而立身行巳為臣則不忠為子則不孝古者亂臣賊子專致擅權當時姦臣賣國之徒先期尊崇之以啓權臣之禍心則此等人也不恤謬妄不顧禮義詭詐為計諂佞存心其於冥間尚爾於人世可知矣行持之士叨受一籙獲傳一祛遽以不經之典納諂於天其於行事尚爾於為人可知矣蓋關奏之儀教科所重故允中不得不委曲而條列之允中此論可聞之於上帝可白之於衆真非𥝠意也非曲說也非是巳而抑人也非已衆而沽譽也千靈昭列萬象森羅實鑒允中之用心也上界申狀式具法位臣姓某右某謹據入意須至申聞者右謹具申某聖銜欲望真慈允兹申請特與施行臣干冒真威下情無任惶懼之至謹狀年歲次月日具法位臣姓某狀申界下界如酆都大帝扶桑大帝五嶽上卿五嶽聖帝晹谷神王洞天福地主宰九江水帝泰山府君地府六天十洞酆宫凡有司及纍經封爵貴典祀之類當用申狀前以司額年月下具銜位或狀前徑用銜位亦可中界下界申狀式靈寶大法司切照本司據某處入意須至申聞者右謹具申某聖銜恭望聖慈允從申請特與施行謹狀年歲次月日具法位姓某狀中界下界之神位次稍輕及酆宫泉曲諸府九州社令城隍祀典太歲官君神虎將吏皆用牒法官端楷僉名細謹押字不可輕慢無禮且如州縣城隍自來天心諸法並行公牒蓋法官濟人利物事皆公行兼中界有酆都大帝王嶽聖帝尊崇宜分髙下故也後丗行遣失中狂妄之人則大書押字言辭輕瀆無禮而退懦之士至有城隍亦有申狀者過與不及悉為失格今具二等牒式靈寶大法司牒上某神當司據某處入意須至移文者牒請詳前事理云云謹牒年歲次月日牒具法位姓押中界下界之神位稍輕或祀典得額而未受封爵或山川之正神未受封額及法中將吏之次者或尊貴典祀廟下分司之神並用次等牒則牒前不用上字後只云故牒於禮輕巳若祀典之神雖不受今朝之封號而是古之聖帝名王忠臣烈士生前位號尊崇至今廟食者自當用申狀不得一例行牒且如越中有大禹廟之類皆古之聖君豈可輕忽自冝酌量事體施行可也牒式靈寶大法司牒某神當司據入意須至移文者牒請詳事理云云故牒年歲月日牒具法位姓押中界下界神祇位次卑者及本司將吏如天心中於嶽下借到將兵之類並用帖三洞四輔法籙本有定品今世法書家數不一流𣲖散殊將吏名稱無限極不復在三洞四輔之內矣若其髙下位次既不出正典則在行其法者自加詳酌帖式靈寶大法司帖某神當司據入意須至移文者帖云云故帖年歲次月日帖具法位姓押功曹并本司吏兵用關應關引不可撰寫功曹姓名所冝叮嚀齎送關尾不得用如違等語法官行移全賴功曹傳逹古今齊醮壇儀皆以功曹為重法官既未能乘空馭氣非功曹何所倚仗儻輒加凌慢及寫如違自干壇律等語未審有違則法官欲如何懲治關後當云以時傳逹切勿稽停之類可也正緣近丗詭詐之徒好異之士𥝠見臆度杜撰法書是致更易古文增飾舊典或取他書中符呪𣸸减撰集妄置名額自造印文僞立天條詐作壇律千變萬化惑亂丗人典格乖踈行遣粗謬以致侮慢典祀慿忽正神不識重輕文移失當有不可勝言者髙逹之士當深考是非可也關式靈寶大法司關某神當司據入意須至關行者右關某神施行故關年歲次月日關具法位姓押凡人家司命土地神名位最小可以指揮者用劄靈寶大法司當司據入意須至指揮者右劄付某神仰詳事理特與遵凖施行故劄年歲次月日劄具法位姓押凡沿路土地發城隍牒或嶽下申狀不當關功曹者用引付土地傳遞前去靈寶大法司引當司今發某狀前去某處須至指揮右仰某處土地某處等土地神以次遞發云云年歲次月日引具法位姓押凡關申之式大槩如此古者符法則出於經誥若行移文狀則體丗法而為之然師尊付授其來久矣所冝稍遵舊典母越禮經輕重務得其中言詞不致礙理庶幾幽明可格誠悃能通若法職不合古儀行遣出於鄙俚以致上真名位亦加改更三界神物多換曹局無非好竒尚異以眩一時如北斗星宫却稱九晨玉闕之類則以意妄加尊崇者也如日宫稱鬱儀宫之類則以經中别號而用之似此尚多皆為失當所是黃籙之齊顯幽并濟古今之所重者今略撰述奏申關牒一宗文字以備修建若其事體之重輕行遣之詳略却乃在高功臨事自加裁度非取一定之規也預告以至散壇但干狀牒悉列于左凡應授黃籙投詞先期奏告奏昊天上帝具法位臣姓某右臣謹據某府州縣鄉貫某人等投詞擬就某處啓建無上黃籙大齊上資社稷尊靈升神霄漢今朝皇帝壽等乾坤海宇乂寧生靈昭泰三途五道俱冀升遷九地六天悉祈超濟集兹善果專為某人薦拔宗祖先亡保安五姻六族臣承兹精禱不敢抑違除已擇日開壇修建别行詳具上聞外謹先録狀上奏太上開天執符御曆含真體道昊天玉皇上帝玉陛下臣恭望天慈曲垂矜允容臣奉行仍乞告下三界合屬有司照應候開建齊壇文移所至悉與遵禀施行臣干冒天威下情無任惶懼激切之至謹狀年歲次月日具位臣姓某狀奏右用引進狀申天樞院具法位姓某今為某人修建無上黃籙大齊先期具奏昊天金闕須至申上者右謹具申三天門下天樞院主宰高真恭望聖慈特與通進施行謹狀年歲次月日具法位姓某狀預告申天省具法位臣姓某謹據入意除已擇日開壇謹先次録奏天闕外須至申聞者右謹具申三天門下泰玄都省主宰髙真欲望真慈特與敷奏天闕容臣奉行仍冀取㫖告下三界合屬真司照應候開壇建齊文移所及咸令遵禀施行臣干冒真威下情不勝惶懼謹狀年歲次月日具法位臣姓某狀預告申童𥘉府具法位臣姓某謹據入意須至申聞者右謹具申三天扶教輔玄大法天師正一靜應真君真武靈應佑聖真君翊聖儲慶保德真君天猷副元師真君天蓬都元師真君恭望真慈允今申請特與敷奏天廷取㫖行下三界合屬真司依格照應施行仍冀容臣書行符命給降靈寶官屬臣干冒真威不勝惶懼謹狀年歲次月日具法位臣姓某狀預告申三官具法位臣姓某謹據入意同前須至申聞者右謹具申下元水官帝君中元地官帝君上元天官帝君恭望真慈允從申請特與行下三元九府百二十曹十方三界應干合屬去處依格照應仍乞容臣奉行俾成齊事臣干冒真威臣下情不勝惶懼謹狀預告申五師具法位臣姓某謹據入意同前須至申聞者右謹具申靈寶度師真君靈寶籍師真君靈寶經師真君三天扶教輔元大法天師正一靜應真君玄中大法師恭望師慈同天省狀式預告牒九州社令靈寶大法司牒上某州社令所屬分野州名當司據鄉貫某人投詞伏為某人年月日時生於某年月日於某處身故今來乞行崇建無上靈寶黃籙大齊幾晝夜用薦超生本司據詞難抑除巳録奏天闕外須至移文者牒請詳前事理即與牒諸州社令關告天下名山大川城隍典祀古跡靈壇考録丗人罪福校量亡魂功過主掌魂魄宰制冥途應干合屬去處悉令依格照應凡遇文移所及並與遵守施行仍請前赴齊壇同力協贊俾遂善功牒至疾速依應施行謹牒年歲次月日牒具位姓押預告牒當處城隍靈寶大法司牒上某州城隍主者當司據同前入意須至移文者牒請詳事理即與行下管內名山大川及諸州縣城隍典祀同前結尾此黃籙預告大略如此或欲詳盡則别增申牒者臨時詳度而行但近世多牒天下都城隍司及遍考典故並無所出如宋朝建都之地亦止有本府城隍佑聖王而巳今駐䠋錢塘亦不過立臨安府城隍廟巳封顯正王夫城者州軍之城郭是也隍者城外之池是也蓋此神乃主城隍之事是一郡之所屬者也今若言都城隍則天下之大恐不可總以一城一池繞之雖秦始皇之長城東自臨洮北至遼水亦甫能繞東北之半而巳天下之大既不共成一池城則稱都城隍者未便夫城隍之稱因城池之建而有神以主者爾今無如是之城池實難置其神矣以朝廷言之今無都城隍之廟以道典言之又無所出故今牒九州社令隨其分野以布文移可也近者亦有人指冥中之他神以其意義相似者謂便是都城隍殊不知城隍二字難以言天下都作一城盡繞一池也儻自欲隨俗行牒亦可但𡨋中無此神丗間無此廟况黃籙科式嚴重考録功過神物司臨自預告之後一符一字不可妄用不考是非公然印押關告文檄豈冝不加謹審使其别有所據實有此神而不行文移却不致違背典格或無其神蹈非習妄以取美觀則𡨋譴可逃乎此說為博古髙識之士而言之愚陋俗夫不學小輩必加竊𥬇矣學者更加考訂而行之𥝠家專薦一名啓建即用此齊意具法位臣姓某右臣謹據某人投詞伏為亡過某年月日時生於某年月日時身故經今幾日未測升沉齎信效心攄誠列悃修建無上黃籙大齊幾晝夜上資邦國普福寰區開度五道三途保寧九州四海集茲善果專用薦拔亡過某超生度化臣據詞虔切不敢抑違除已擇日建壇次第修建外須至先次録狀上奏云云巳上申奏狀關上界功曹日時主者遞發上清靈寶太法卷之二十七
