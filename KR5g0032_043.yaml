front:
  text: 上清靈寶大法卷之四十四靈八
  hash: sha256:f1d19c67b9be8edacbb02e7bebfb3f31c5f46e4759d5aa5115c6710cb77e4ab6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_043-001a, image: hfl/0972/0972-186.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金𠃔中編錬度髙功先就上帝前密啓事次退身就道暘側東南敷座如法祝香夫香者禀資靈秀植質芬薰蓋將以寓誠敬之心故得上徹沖虛之境瑞靄騰而九清可格祥烟布而三界遙聞以今初捻上香供養無極大道上帝髙真以兹功德上資宗廟尊靈社稷先聖升神紫極流慶皇圖繼聖無疆卜年有永今朝皇帝壽均天地福等滄溟萬類昭蘇十方寧泰以今二捻上香供養日月星辰天曹主宰三洞經籙法中聖衆以兹功德奉為齊官某等各家九玄七祖五族六親近逝神儀先亡靈識及係薦某魂以至萬類幽靈五道孤爽伏願悟本知根出迷入覺冥關幽路咸遂昭明天上人間長居快樂以今三捻上香供養地水真靈嶽瀆主宰十方列聖三界職司以兹功德歸流齊官某等見在宗姻各家眷屬伏願福祥臻萃壽祿維新悉承涵育之恩俱被沖虛之化傍均動植普遂生成次啓聞上帝具法位臣姓某以今再拜奏啓虛無自然元始天尊太上道君太上老君昊天玉皇上帝紫微北極大帝紫微天皇上帝后土皇地祇太乙救苦天尊東華上相木公青童道君白玉龜臺九靈太真金毋元君九天上帝五老天君三十二天上帝日月星君北極四聖真君靈寶五師真君九州都仙太史髙明大使真君太極左宫仙翁沖應孚佑真君三洞四輔法籙中髙真上聖恭祈宸鑒俯録愚𠂻臣聞造化分形乾坤定位明則生人物幽則有鬼神死生不免於輪回報對遂分於升墜是以謫役列三途之異幽沉有六道之分或歷劫之不原或積年之未脫長夜冥冥之莫旦幽鄉杳杳之無窮儻非上帝之寬恩豈得隂靈而曲濟臣不量淺質叨綴靈班冒領齊修濫司典教以今齊官某等按科蕆事瀝志輸誠願夜壑之均休祈幽魂之俱度臣巳嘗録奏僥幸矜從是以整肅壇場輒欲普行錬化然而肇育庶彚陶冶萬生惟天之功豈人之力但以科教之設要當濟拔為先儻非玄造之哀矜豈得幽魂之超脫伏願道恩廣覆天造普矜特與告下東華上相宫西靈龜闕及南方丹天世界朱陵火府南昌上宫日月二宫錬度合屬去處亟令照應即賜施行降金木之神輝鍚乾坤之正氣蕩除隂翳整復魂神萬類四生悉被生成之澤三途六道咸離幽暗之鄉臣謹按科奉行拱俟天恩報應臣誠惶誠恐稽首頓首謹言焚降真召靈符就座召將吏靈寶本章追拔亡魂上品妙首十回度人中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君文人中有南上司命司録延壽益算度厄尊神回骸起死無量度人今曰錬度諸天臨軒傾光回駕監真度生諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天上帝有命萬神咸聽謹召南方丹天世界朱陵火府南昌上宫錬度衆真錬度大神木宫真陽生氣主執靈真曰宫炎光童子丹霞玉女日宫神仙火府玉童玉女火鈴童子火錬官君將吏金宫真隂正氣立執靈真月宫圓光童子散輝玉女月宫神仙水錬玉童玉女水錬官君將吏錬魂度𩲸聖衆靈寶官屬一切威靈速降壇所禀符奉行存將吏降臨次念五帝真諱功都成午切角鎮酉興生轉子可韓明卯獨𨽻遷中指中功都聚魂攝南方氣剔訣吹受錬亡魂再念焚真文紅杏持到卬默黑捷同子文磨針計刀酉文襪臘收成午靈寶萬物中指中文息利合通正一成法智益可真取驛令下攝右取五方五色氣見存諸局功曹乘五色真氣浮空而來各為係錬亡魂收召魂神澄其性識使之受錬自此至五芽真文止皆同正薦行持式此不重述舉幡出池至壇之中正立髙功白云到壇應受度三途十類五道四生等衆早纏世網夙昧真修九氣無歸五行蕩失三魂受譴萬劫飄流不假良因難回生理當職既依典格啓告真靈體乾坤造化之功法隂陽和合之數匹配水火濯錬形神降兩曜之精華結五行之沖秀立根受祖溟涬生精杳冥聚真恍愡有象蓋物有終而必有始理以變而乃通鬼復為人身當仙化除巳表聞九天上帝乞為流祥頒慶録本生神錫正氣於九關合胎圓於十月再資混沌重覩光明謹上請帝真胞命元元一黃演之氣無纏其胞使胞源宣通以生成焚第一章符諷章此九章髙功行持道衆諷誦與正薦同此不再述說戒於錬度後誦呪至逍遙上清訣畢即讀白文伏聞大道昭然無往而不在以至事物皆有正理不可紊也天地鬼神亦不能離大道越正理也夫日月煥耀星辰昭回寒暑之有常推移之有候潤之以雨露鼓之以風雷育萬物而不以為功調二氣而無爽其節運旋不息此天之道也天之正理也此其所以為天也山嶽之崇厚河海之宏深草木之芳榮榖粟之播殖載萬物而至靜奠六極以無垠此地之道也地之正理也此其所以為地也舒慘隂陽贊夫造化禍淫而福善嫉惡而害盈正直以不私聽明而晦迹神化罔測變通無窮此神之道也神之正理也此其所以為神也禀天地之氣乃隂陽之和雖結幻妄以成身實以清明而賦識為人主則代天之功保民而王澤被生靈恩流萬世盡君之道茂厥丕基以至為臣則忠為子則孝在民庶則守常而行信義立德而懷慈仁冨貴貧賤歸之分定死生榮達不易其本心此人之道也人之正理也此其所以為人也道者不可須㬰離也惟天地則法道而成故天地長存而不知其終窮若鬼神則有邪正之分升沉之别矣至於人之修為習尚禍福報對莫非以類而形不可槩論然天地尚不能離大道越正理況於人乎又況於鬼神乎至於萬物禀氣之不純𢌿質之或異或為畜獸或為禽蟲或能鳴而無知多有性而少慧此則不可責之以道正之以理也人為萬物之最靈所以天地之性人為貴也於是生則為人而生不可以無終未免死而為鬼儻一性不滅隂極則陽生故鬼復為人至此則輪回之說興焉所謂大道之昭然正理之不昧何間於天地何幽乎人物何拘乎鬼神天上地下無極無窮皆不外此乎若夫修齊行道燒香然燈祈告真靈懴謝愆過攝召鬼爽度化魂儀乃上帝髙真聖師前哲垂科立教利濟幽顯訓導將來開悟迷執者也今齊官歸真向道備禮陳儀願濟存亡請修齊直本職受詞關告不敢昧其心不敢違其格關宣將罄功德告成所是普召六合內外萬國之中六道三途四生萬類若凡若聖一切幽魂沐浴朝真聞經享供整聚神識懴滌愆瑕種種善緣皆巳周畢拘纏巳釋罪惡巳消所有度脫之階超騰之路却在巳而不在人在內而不在外一性悟徹萬慮驅除神自不淪何須他計更冀到壇衆等以賢者而訓昏愚以覺者而救迷著互相勸化深切省循上而神祇亦幸垂聽毋背大道毋越正理毋肆行威福毋侵暴生靈毋混雜邪魔毋擅作妖怪毋希求血食毋交通生人毋示現形儀毋障固王土翊天贊化康時保民將見漸陟崇階進登尊位人而為鬼者生前貴盛至此不必耽戀榮華生前富足至此不必執著財貨生前貧賤至此不必怨懼窮苦生前嫌隙至此不必隱蓄𡨚忿或修真而不就或學釋而未成至此當為後圖毋蹈舊跡百工九流士農商賈五姓之衆萬類之氏貴賤不同賢愚異致莫不身巳壞滅世事皆空所當盡捨情緣不須迷執惟有失德而纍過越理而積愆則當痛切悔懲深自警省非謂前事皆舍於此猶存蓋欲念過思愆不蹈覆轍以為將來之戒而作返生之計也豈應失德越理於生世之時乃復蹈過乘非歸隂之後哉故不當延注生人不可纏害親屬不必圖報𡨚隙不須留戀故居不得作為影響不冝希求祭祀凡此皆無益於鬼魂乃所以為超生纍爾所有惡殞橫終孕亡産死或零落肢體或斷首殘身或耳聾目盲或瘡痍潰爛應是被傷染穢形質不全而死者當知人以精血立形五榖養體一靈之性本自虛無及其命終血腐肉敗有質之物復歸于土所謂一性何緣有傷亦未嘗染穢故不必記將終之想不冝著垂死之形若鬼若人能悟此機亦正理也向之㗸刀帶索今巳不存昔日染穢受腥今巳清淨人間天上所至超然是果在我而不在人矣萬類之衆凡聖之靈既知大道不逺正理坦然則天不棄我地不拘我為神則能變化為鬼則不沉淪返生為人亦必髙逹𡨚讎執對不使之消而自消魂𩲸精神不使之復而自復由此言之天堂有必可升地獄終不復見儻得返生人世則正理根於本心忠孝出於天性在幽在顯永與道俱是以歸依三寶洞徹根宗凡聖鬼神各各諦聽按人各恭敬第一皈依無上道寶夫道寶者無形無名先天先地孕育離坎肇造乾坤渺漠長存希夷罔測或因時而出教或御運以開光羣生日用而不知萬劫恩流而無極人間天上處處皈依道寶讃第二皈依無上經寶夫經寶者九清真典三洞靈文八角垂芒五篇欎秀或妙氣飛空而結篆或皇人按筆以成章億萬劫中宏敷衆化三十六部訓育群生今古承休顯幽蒙惠人間天上處處皈依經寶讃第三皈依無上師寶夫師寶者玄中教主三洞宗師傳籙授經流科演法分身而行道極世以垂文為萬代之科模作十方之矜式提携後學接引迷途或返景於遙空或留形於象外人間天上處處皈依師寶讃向來歸依三寶巳徹根宗何拘聖几初無二理其間遷升有格返生待時未免暫駐隂冥亦須常循正理鬼神十戒先當受持及其再涉人倫結形陽世則以忠孝為本廉謹自將九真戒文次冝謹守聖凡有衆祗聽戒言智慧生戒根真道戒為主三寶由是興髙仙所崇授泛此不死舟焂歘濟大有當此說戒時諸天皆稽首鬼神十戒第一戒者不得非時出入衝突生人妄人人間通連作怪令人夢想顚倒衆和惟願隂靈第心受度第一戒者不得輒同外魔客鬼亂索飲食拋沙擲瓦恐嚇生人第三戒者不得輒引瘟疫入界侵暴良民令人疾病延纍親屬第四戒者不得禁護王土妨人種植强占林木花果隱蔽天租第五戒者不得輒動四方火精燒人宅舍損害資財敗人家業第六戒者不得邀求血食罪障轉深報對輪回無有休息第七戒者不得使諸妖怪鴉鵲狐狸犬鼠驚怕生人第八戒者不得傷人六畜後生報身永墮幽隂第九戒者不得縱逸車馬妨礙生人行往興禍害人自求私便第十戒者不得為人作禍取受情囑令人疾病追人生魂使人迷妄衆和惟願隂靈齊心受度九真妙戒第一戒者敬讓孝養父毋是名初真戒衆和惟願隂靈齊心聽受第二戒者克勤忠於君主是名念真戒第三戒者不殺慈救衆生是名持真戒第四戒者不淫正身處物是名守真戒第五戒者不盜推義損巳是名保真戒第六戒者不真凶怒淩人是名修真戒第七戒者不詐諂賊害善是名成真戒第八戒者不驕傲忽至真是名得真戒第九戒者不二奉戒專一是名登真戒舉奉戒頌上來戒法想巳欽承天上人間幽鄉人世心心不亂念念無違然而本來一性元自清明良心善意自然而然又何懼於升沉又何假於戒律惟其習而陷諸惡趣流而入於他岐戒律亦不得而施也尚悟本之根及證真之性為鬼則不沉不惑為人則無禍無愆一動一為無非大道一思一慮不背正理到此地位可不戒而自戒矣然在隂之日不冝戀著以至世間功名富貴華屋危樓錦鏽綺羅金珠璧玉珍羞異味大蓋髙軒聲色之娛車馬之樂奉養之物受用之資眷屬之情妻子之愛至於飢而欲食寒而欲衣得之則生失之則死是真不可闕者第無非有身之纍在世之事爾其如此身既不得長生凡此等亦不可長有冝知此身留不住萬有盡成空生死異途貪愛無益是豈非天地間之正理合當若是耶況人一死之後茫無形體陽間之食不可得而餐人世之衣不可得而服若飢若寒安能相纍故道德經云吾所以有大患者為吾有身及吾無身復有何患理甚昭然正緣情愛不忘事物在念貪求祭祀牽戀眷姻自離迷執之途遂生飢渴之想上來嚴陳淨供䖍置斛筵亦何是以浼諸鬼神蓋欲其間未能徹悟者遂其想念解其執迷而今而後洞察此理既無身矣何資飲食而世有奉先之禮祭𣏌之誠示人情不忘本也一性明矣豈待於享祀哉為鬼為人在幽在顯萬緣不著所至逍遙豈復有六道之分三途之役以至羽毛鱗甲鳥獸蟲魚悉反故根盡辭異趣永遂生生之樂咸沾蕩蕩之休今有太上長生靈符生天寶籙仙經寶誥功德牒文以為升遷之據謹用宣示讀符告簡關牒上來給牒傳符領薦受度善功已畢各各離壇悉登解脫之途盡陟清虛之界前程進步更莫遲延一切聖凡各惟珍重存孤魂隂靈皆端潔成人飛騰散去起身白云人身世纍本難除去世無身事巳非到此既能知此理湛然真性見天機髙功下座表白送魂度橋伏以巍巍至道蕩蕩神功開方便之門啓遷升之路大恩廣覆被幽昧之鄉玄澤普沾遍窮隂之府三途以兹而罷役六道由此以更生以今恭啓玄科修崇齊福悉資幽爽用薦冥途萬類鬼神九州魂識既巳朝真告道聽法聞經呪施淨筵宣傳妙戒闡揚妙典演誦靈文所建喜功普皆圓備莫不沉魂釋釁冥籍消除萬罪咸原一靈不昧各領齊功而善去咸登淨域以超生法橋大度天尊焚燎舉三清樂向來回向伏以誠可動天齊悃巳騰於三境教能濟物道恩下徹於九原遐邇蒙休顯幽同慶以今齊官備陳儀式崇建齊修上福君親普資存殁凡諸善果普遂圓成伏願係薦亡靈九光神識十方滯爽萬國幽魂六道三途四生萬類咸承利濟盡出幽隂濯質蕩形逍遙於三界明心見性朝謁於十天有識羣生同沾惠澤含情雜類盡沐靈休齊官蒙恩眷緣俱慶為上良緣念大聖元始天尊太上道君太上老君十方靈寶天尊不可思議功德切詳黃籙諸齊濟度為木顯則祝君康時普福羣生幽則拔鬼度魂廣資萬類庶幾遍及以成善功或超薦先靈亡者受福或禳解災厄則生人蒙休儻切切於一巳而旁無濟度之心則不足以為齊矣故施食普度不可不盡其心也古齊科中宿啓建壇朝真懴謝禮燈投簡設醮散壇古來所行之事科書並見廣成先生黃籙齊科內非後人所可增損至於普召六道三途孤魂全類則近世有廣召之文沐浴有科書呪食有白語惜乎撰述者不加考究多致礙理且如所傳六道儀至地獄道則云鎔銅灌口利鋸解形及皮膚焦爛等語猥陋甚矣此等事有無不可必何須如此形容外有傳用二十五類孤魂文亦有兩三本往往礙理極多如召娼優則有酒入香腮蓮臉長新等語其可褻其可顯宣於鬼神之前耶如雜類之魂皆力陳其惡深訐其短但欲一時成文近乎以資戲笑且呼爾而與之行道之人不屑也況於鬼神乎普度之筵齊中之大事當明指大義開其良心使鬼神啓遷善逺罪之情豈無覺悟者豈召之使來乃恣加毀罵極口詆辱誠非可行近時有吕雲編黃籙立成儀只為一晝夜之式昨來臨安府天慶觀即行所有雜科多取俗用之本如送孤魂一假其中有云蕩蕩愛河之上雪浪浮空沉沉欲海之中銀波溢目夫經中所謂流吹欲海飄浪愛河蓋人之愛與欲無有紀極如河海之深長隨欲而流逐愛而飄若河海不知其止理甚分明今乃言愛河之上則是河有其地而復有岸矣至如雪浪銀波之語尤其過矣說經如此豈不有悮幽冥邇來雜科類多如此況普召鬼神不拘髙下其中豈無髙達之魂辭㫖謬妄必取笑於鬼神矣今重撰六道之文召孤魂二十五類文沐浴科及諸白文等非敢自以為當且使言語平易章句可讀當不越於大義俾略切於事情免致訐持毀罵狎侮幽隂至於傳符度戒則世傳科文少有正當者宋朝建中靖國年間有士人辛澤為道士陳誠刋古本教戒鬼神儀大為淳正而其文頗多而三歸依之後又諷救苦經與清靜經至末假則全以二經之意告戒發遣蓋古來不行錬度繁文簡節是以可行今錬度之後巳是夜深難以久逺宣白兼其中戒士夫并僧道之類其辭切直古人朴厚不以為過行之今則發怒者多矣而古人之文不敢易其勢只得别撰傳戒一科續於錬度之後庶成一宗區區陋見勉强而成無文采之可觀無華麗之可喜然所可知者未至叛道而亂科必不越常而昧理豈敢追古人之萬一較之俗用鄙俚之言則頗為平整辭語不致怪僻庶幾臨壇易讀今自古齊科之外應干雜用科書自始及終盡行重撰並無闕事惟有童子科十王儀不可思議功德之類自古無之兼其典格乖踈言辭淺陋於理不當收用亦不應編入法內用並是遵古典所以措辭立意重述科書不敢背違師㫖若行此古法用此文移讀此科書則始終一理對越上帝感通鬼神此心無愧若不行此法移諸他所隱其來歷而用其言辭既不切事情亦失此本意此外只送魂度橋舊以水養魚於亭子下取其魚龍變化傳逹符命之意仍於亭子四門各吟偈一首方送魂度橋緣道家古來科法中未有吟偈之格而近來所用偈子太涉淺近既有草龍以備傳符之儀式則魚不必用是以並不編入法內天下後世髙人上士覩此書豈無興念者必能刪其冗瑣補其踈闕實至願也上清靈寶大法卷之四十四
