front:
  text: 上清靈寶大法卷之三十
  hash: sha256:91355cfa6fd41a82d32d247441bb71096dbd38303ef2ff277e770205a68e8868
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_029-001a, image: hfl/0969/0969-108.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編奏申文檄品五老上帝狀方函上詣餘四狀函東方青靈天君官並同式具法位臣姓某右臣輒瀝丹𠂻上干宸聽伏念臣久膺職任竟乏功勤冀贖愆瑕輒思利濟臣謹據入事同前謹録狀上奏東方青靈始老天君陛下恭望道慈允臣所奏持與流光壇席鑒録齊忱成就善功提携幽顯庶俾恩覃家國惠浹寰區仍乞密錫五氣之生津陶鑄萬途之滯爽咸令生化各遂昭蘇臣干冒道威下情無任不勝戰栗之至謹奏申師𥙷六職狀方函謹詣靈寶五師宫或稱門下具法位臣姓某臣不避褻瀆之誅荐冒至真之靈伏念臣措身濁境馳識靈途存念乖違朝修簡墮未能寡過苟活餘生尚荷寬恩特容𨽻職欲宏大教莫先度人臣比據入事來詞誠篤當濟幽明義合申謄理難抑絶臣自揆三掠之罪識難蘇九夜之迷魂非仗哀憐豈能就事臣謹按古儀齊法出於靈寶今得參佩洞玄部法籙之人方可臨壇𥙷職今來未能盡皆如格是以六職之內未免權用正一諸品法籙弟子備員任事切恐有虧成典謹具權冝𥙷列壇官法職姓名在前須至申聞者右謹具申靈寶度師真君靈寶籍師真君靈寶經師真君三天扶教輔元大法師正一靜應真君玄中大法師几前恭望真慈特加省録許以權冝備事庶幾幽顯蒙恩仍乞敷奏天廷請命頒下三官五帝合屬真司照應施行臣干冒師威下情無任不勝寒栗之至謹狀申五府祈晴狀方函上詣元應太皇府具法位臣姓某臣身居塵網名玷玄司徒佩靈文未逢真授纍干沖聽罪不容誅尚冀洪慈委曲原宥臣昨據某人等投詞取某日就某處啓建黃籙大齊福國康時拔幽濟顯而臣末學道淺仙品未充黽勉開壇事多違失下戾妖穢之未滌上恐風雨之無時以至今來建壇之所或境藏邪怪或地匿妖祥非仗師慈難全善果須至録狀申聞者右謹具申三天扶教輔元大法師正一靖應真君北極真武佑聖靈應真君翊聖保德儲慶真君天猷副元帥真君天蓬都元帥真君聖前恭望真慈俯垂矜允特與敷奏天闕取㫖告下雷霆霹靂風雨雲電合屬真司至期收斂雲霧止雨停風掃蕩妖氛肅清天地三光煥耀四氣澄清仍冀差降解穢應干將吏一合下降監勒某處里域社稷等神併力同心掃清塵垢祛蕩氛穢整肅齊壇鎮安境域如有妖精犯觸邪怪干侵即仰所差將吏以時收繫押赴天獄治罪施行庶使齊功成就魔障不生臣干冒師威不勝寒栗之至謹狀天省劃一申狀方函上詣三天門下泰玄都省右以正奏劃一申天省狀大略如此更冝臨期詳酌而行或有修建事體不同可以隨事增入具法位臣姓某臣不避再三之瀆上犯斧越之誅惟冀寬恩曲加矜宥臣比據某鄉貫某人投乞崇建無上靈寶黃籙大齊福國康時拔幽濟顯超度九先七祖廣資五道三途集兹善功追薦亡故某克遂超生保安見存眷屬除巳祗率法流恭為修建以今齊期巳定須至逐一申聞者一謹尅某日告齊始事宿啓建壇於當日某時進拜素車白馬章是夜某時進拜破酆都拔罪章告頒元始符命金籙白簡救苦真符太上破地獄真符太上拔幽魂真符太上敕赦生天寶籙靈寶本法元始符命混元神虎玉札告下諸天諸地隂陽主司三界十方冥關幽路天牢地獄應干合屬去處依準符命赦宥係薦亡魂及五道三途四生萬類一切沉靈滯爽風劫罪愆纍生執對咸從原釋遵禀玉札追攝赴壇報應受度施行一某日正齊三時朝真誦經行道是日午時進拜通天救苦朱表開通道路章靜夜破獄召攝係薦某人等魂及五道四生三途萬類一切孤魂沐浴朝真享食受供一某日正齊第二日三時朝真誦經行道是日某時進拜沐浴鍊度章當夜鍊度三途五道十類四生一切孤魂傳符受戒度化超生一某日正齊第三日三時朝真誦經行道當某日時進拜升度亡魂章是夜鍊度係薦某人等魂傳符受戒度化超生一某日進拜言功朱表修設三界髙真清醮三百六十分位昭答恩庥解壇散席投龍奠簡紀勒齊功右謹具申三天門下泰玄都省主宰髙真恭望真慈俯垂矜允特與敷奏天闕取旨告下諸天諸地日月星辰三界三元洞天海嶽冥關幽壤典祀神庭應干合屬去處疾速施行庶俾號令遍通精誠上徹更祈三光煥耀四氣朗清萬聖翼轅千真扈䠋即使天澤浹於寰宇齊福被於幽明六極均休四生咸泰臣干冒真威罪當萬坐謹狀申北斗狀方函謹詣中天北斗星宫具法位臣姓某臣輒罄愚𠂻上干真聽臣叨行大法徒歷歲時學未通幽無階自效敢勤利濟以報恩休臣謹據入事須至録狀申聞者右謹具申中天大聖北斗九皇真君恭望真慈允從所告特與敷奏天闕告下三界合屬真司依法照應施行庶使齊功成就澤被顯幽仍乞行下北魁玄範府差降神虎主吏何喬二使者侯魏張三部追魂使者七司玊女追攝合干官將吏兵一合下降赴臣行司齎持玊札遍詣冥關幽路應干合屬去處根攝所薦亡過某人等魂及五道三途四生萬類一切沉靈滯爽依時赴壇報應削除罪籍落滅惡根聽法聞經以時升度恭冀雲車俯降證録齊誠臣干冒真威不勝惶懼謹狀日宫狀方函上詣大陽日宫具法位臣姓某臣輒瀆重明願回淵鑒伏念臣受資塵陋冒忝班行自揆罪深敢思神過況承䖍訴敢不上聞臣謹據入事須至録狀申聞者右謹具申日宫太陽帝君恭望真慈特垂矜允暫迂仙仗俯盻齊壇監録禱祈曲全齊事庶使恩周寰宇澤被幽明臣以某日鍊度五道三途四生萬類以某日鍊度係薦某人等魂欲乞敷布靈芒降流真氣匹配水火和合隂陽各回性識以清明盡出幽沉而度化臣干冒真威不勝惶懼謹狀月宫狀方函上詣太隂月官月官太隂皇君狀同日宫式北斗九皇夫人狀方函謹詣北斗九皇夫人門下具法位臣姓某臣不揆誅夷冒干平省深知僣越尚冀寬容伏念某蕞爾微生叨行大法無功可録有罪足書願濟顯幽少圖補復凡有披告敢不上聞某謹據入事須至録狀申聞者右謹具申北斗九皇夫人恭望真慈特垂矜允俯賜差降神虎主吏何喬七司玉女三部追魂使者追攝合干官將吏兵赴某行司齎持玉札遍詣十方三界地獄冥關千真萬靈治職冥曹應干合屬去處追攝五道四生三途萬類一切孤魂滯𩲸及係薦某人等魂出離隂境悉赴玄壇顯見形儀昭示報應仍乞暫迂仙仗俯降齊壇成就善功證明修奉某干冒真威不勝惶懼謹狀五德星君狀如各一狀則方函詣東方木德星宮具法位姓某臣輒伸丹悃仰瀆髙明敢冀大慈曲垂恩佑臣謹據入意須至録狀申聞者右謹具申東方木德歲星真君恭望真慈俯垂矜允特迂仙仗暫降齊壇鑒録禱祈證明修奉庶使福周寰宇澤被乾坤臣以正齊某日夜鍊度五道三途四生萬類一切孤魂某日夜鍊度係薦某人等魂欲望大啓慈仁廣推巨澤布五行之正氣合二象之生津冶鍊亡魂復其性識領諸善果升入朱宫臣干冒真威不勝惶懼謹狀南方火德熒惑星真君西方金德太白星真君北方水德伺晨星真君中央土德鎮星真君巳上四狀並同東方狀式方函隨方言之二十八宿狀與五星狀同式右謹具申角宿星君恭望真慈俯垂矝允特迂仙仗暫降齊壇鑒録禱祈證明修奉庶使福周寰宇澤被乾坤願闡仁慈曲加拯濟悉度赴壇之魂爽盡承齊福以超生役罷三途獄開九地飛沉遂性動植昭蘇某干冒真威不勝惶懼謹狀巳上自角宿起止軫宿共二十八狀並同式方函詣角宿星宫餘並同隨宿名上詣外只斗宿一狀巳别具于後蓋斗宿在二十八宿則為斗宿又為之南斗道典有南斗六司星君即此是也正在東北之間欲知其詳自以渾天儀考之可見矣世人但知南斗又取與北斗相對竟不考此星在何所良可笑也若不能每宿專狀則皆除去亦可却專申斗宿而巳南斗狀方函詣斗宿星宫狀並同前式右謹具申南斗六司星君恭望真慈俯垂矜允特迂仙仗俯降齊壇成就善功證明修奉庶使福周寰宇澤被顯幽所有道場內錬度五道三途四生萬類一切沉魂滯𩲸及係薦某人等魂敢冀恢育物之深功垂錬魂之巨澤俱返久沉之性普全巳蕩之神再育隂陽重資造化悉升朱府俱陟仙鄉某干冒真威不勝惶懼謹狀玄師狀方函謹詣玄中大法師門下具法位臣姓某臣處露丹𠂻上干真聽載惟僣越懼速靈誅伏念臣染俗素深真心易昧力小任重德淺職崇日夕憂惶罔知所措是敢留心於濟度或可小贖於愆瑕蓋以黃籙科條事體嚴重非師尊之覆育豈愚陋之敢行全仗慈憐或能成就臣所據某人投詞乞建黃籙大齊除巳節次上聞外今以某日為始建壇蕆事具黃籙節次在前須至録狀申聞者右謹具申玄中大法師恭望師慈始終矜允荐行備詞敷奏請命頒下三界有司照應敢祈雲輿下邁暫駐齊壇俾章詞上徹於三清齊直圓成於七日幽明同慶寰宇霑恩仍乞申敕三洞四輔法籙中官將吏兵三界五嶽兵馬營衛齊事通逹悃誠布令頒符追魂攝𩲸拔萬類四生之滯爽釋三途九夜之罪魂即使係薦之靈咸陟沖虛之界臣干冒師威不勝惶懼謹狀三師狀共一狀與玄師狀同式靈寶經師真君靈寶籍師真君靈寶度師真君五府狀方函謹詣上清童𥘉府具法位臣姓某臣不避誅譴纍瀆靈慈伏念臣蒙陋行尸生逢道化叨恩覆育𨽻役真司誓畢此生共揚大教敢祈矜宥終始帡幪臣比據某人投詞請建黃籙大齊臣節次上聞外今以某日建壇始事臣以便冝書行洞玄靈寶本法應干符命及五元素府真符祕篆拔幽濟顯輔教康時役召神靈圓成齊事但臣性昏學淺德薄罪深非仗師恩難期通感須至録狀申聞者右謹具申元素元輝府三天扶教輔元大法天師正一靜應真君元和遷校府真武靈應佑聖真君元照靈虛府翊聖儲慶保德真君元景丹天府天猷副元帥真君元應太皇府天蓬都元帥真君恭望真慈矜憫後學特與照詳臣前後申請事理再與請命天闕頒告諸司依法照應敢冀雲車下邁暫駐齊壇容臣宣告符章頒行號令仍冀申敕三洞四輔經籙法中官童將吏三界十方五嶽四瀆兵馬衆靈監齊直事靈寶官屬直月五將十二時直主者五府合屬將兵臣所行法中官君將吏追魂攝𩲸等神應時感降隨召來臨營衛齊壇宣傳符檄謄詞章於九域布號令於諸司成就善功普福幽顯即使係薦亡魂某人等及五道四生三途萬類一切沉魂滯爽咸離隂境悉詣齊壇承領天恩登升善域飛沉遂性動植昭蘇臣干冒真威不勝惶懼謹狀右此狀非行五府正法之人自可攺易專狀申天師一狀共申北極四聖元帥府亦通葛仙翁狀方函前詣太極左仙翁門下具法位臣姓某臣久竊真庥獲聮法職未能寡過豈敢有言蓋以輔贊之勤利濟為首敢謄凡愫仰冒淵聰臣謹據入事除巳録奏天闕外緑臣資庸品下學淺行輕莫能通達於幽冥竊恐難期於感徹惟祈師尊之祐庶成濟度之功須至録狀申聞者右謹具申太極左仙翁沖應真君恭望師慈允從申請不違初誓益振玄風特與敷奏天廷申敕洞玄部經籙法中官君將吏靈寶官屬玉童玉女天將仙兵併力同心營衛壇墠謄詞布令錫命頒符成就齊功廣敷靈䕃庶使福霑寰宇澤被幽明拔度所薦亡魂某人等及九州分野五道三途四生萬類一切應度沉靈滯爽出離冥夜承領善功證性知根超生度化仍乞雲車俯降證録齊修臣干冒師嚴不勝惶懼謹狀許真君狀方函謹詣高明大使君門下宋政和年間上尊號曰神功妙濟真君既奉玉册又係徽宗上表稱臣若九州都仙大史髙明大使即天爵也具法位臣姓某臣顓蒙塵質久被陶成雖𨽻玄門未探真奧惟思自效以報殊恩臣謹據入事但以臣學不過人法非達妙謬當首職豈能動天非藉師恩難全齊