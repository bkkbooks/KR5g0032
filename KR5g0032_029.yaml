玄靈寶法籙中合干官將吏兵下赴齊壇輔佐行持營衛壇界謄章進表錫命頒符拔度係薦亡故某人等魂及五道三途四生萬類一切孤魂滯爽悉加保舉度品南宫幽爽承恩俾盡超於沉滯生靈蒙祐庶咸迪於壽康某干冒聖威不勝惶懼謹狀五帝魔王狀方函詣青天魔王宫並同三界魔王狀式右謹具申中央黃天魔王北方黑天魔王西方白天魔王南方赤天魔王東方青天魔王黃籙院狀方函詣下元黃籙院具法位姓某某濫以庸資久臂上法幸蒙覆育獲被職司敢賴優容輒伸披訴某比據入事須至録狀申聞者右謹具申下元黃籙院主宰髙真伏望真慈曲垂矜允特迂仙仗俯降齊壇成就善功保全末學仍乞敷奏天闕取㫖差降黃籙院合干官將吏兵下赴行司宣傳符命謄達章詞拔度係薦亡故某等魂及五道三途四生萬類一切幽魂滯爽出離隂境祗赴道場省悟沉迷蠲除報對返生善境永沐真休即使齊福被於幽顯玄澤周於動植十方清泰萬類昭蘇某干冒真威不勝惶懼謹狀南昌上宫狀具法位姓某某庸謬不才冒昧忝職功微過重𥙷復無階恬非輔贊真風豈能少酬素志輒披丹愫上瀆髙聰某比據入事除巳依科崇建外今以建齊第二日夜普行錬度三途五道萬類四生一切應度幽魂至第三日夜錬度係薦某等魂各遂超生咸祈度化某一體效誠不敢妄分輕重但以凡愚末學未能深洞靈機從籍符章慮難通感須至録狀申聞者右謹具申朱陵火府南昌上宫主宰髙真恭望真慈曲垂矜允特迂仙仗俯眄齊壇成就齊修普行濟度仍乞申命官童將吏合屬衆神布氣分靈依期下降將到壇係薦某等魂及五道三途四生萬類一切應度沉魂滯𩲸特加整育普賜陶鎔聚二氣以重和肇五行而再造知根復性返本還元永斷執迷成臻生化庶九野無幽沉之鬼三徒罷謫役之勞動植均休顯幽共慶臣干冒真威三元真君狀狀謹申上上元唐真君門下具法位姓某臣謹據入事今取某日某時進拜某章逐一開寫謄諸誠悃上祈玄應但以某早霑靈澤久綴法曹雖粗習於奉教行科未深明於飛神謁帝慮章文之難御致齊事之有虧爰𨽻司存理須禱請須至録狀申聞者右謹具申下元定志同真君中元護正葛真君上元道化唐真君伏望真慈允兹申請特迂仙仗俯降齊壇統率章奏衆神關告剛風上吏掃清雲路通達章文升某凡神上朝帝闕庶使齊誠母壅天貺廣覃萬類昭蘇六天清泰某干冒真威上清靈寶大法卷之三十
