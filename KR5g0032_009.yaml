front:
  text: 上清靈寶大法卷之九獸十
  hash: sha256:c3d3dbab9cc470a3163501a77904d962b3d02c53b8c16d48d5e7144223434a89
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_009-001a, image: hfl/0964/0964-140.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金𠃔中編齊直禁忌品三元正月十五日七月十五日十月十五日右天地水三官二十七府百二十曹凡三㑹日考校罪福三元日奏御上宫可以行道建齊修身謝過三㑹正月七日舉遷賞㑹七月七日慶生中㑹十月五日建生大㑹右三㑹上三官考核功過三魂攢送生人善惡又謂之三魂㑹日此是本命之日亦更有小攢㑹日台光以甲子日上詣爽靈以庚申日上詣幽精以本命日上詣亦言生人善惡其日冝受符籙齊戒呈章拜表以祈景福五臘正月一日天臘五月五日地臘七月七日道德臘十月一日民歲臘十二月臘王侯臘右五臘日為五帝攢㑹之日此日酆都北隂大帝皆引出生人久逺玄祖父母幽獄鬼魂責問住處隂司年代積罪結釁端由及子孫姓名墳墓所在如積劫未有追贖因此日皆延纍生人其日引問得子孫兄弟親姻九族姓名攢集校定以為生人罪狀正一道民之徒此日誠慿法力祭祀追贖幽途皆一一得福常日祭祀不可逹也出正一玉經每月十直齊日一日西北方北斗下八日北斗司殺君下十四日東北方太一使者下十五日東方天帝及三官下十八日東南方天一下二十三日南方太一八神使者下二十四日西南方北辰下二十八日西方太一下小盡於二十七日下二十九日下方中太一下三十日上方上太一下巳上出業報因緣經又别文云十方天尊下又云十方天君下節㑹日天節甲午地節甲申人節甲子天㑹丙午地㑹壬午人㑹壬子日㑹庚午星辰㑹辛酉月㑹庚申五行㑹甲辰四時㑹甲戌右節㑹及五臘宜修齊設醮祭祀先靈甲子太一簡閲神祇庚申日三尸言人罪過本命日計人功行又云甲寅庚申尸鬼競亂冝避房室又玉經云此三日為小攢㑹日凡三元考校未盡者於此重考校焉八節立春春分立夏夏至立秋秋分立冬冬至按真誥云八節之日皆當齊戒立靖謀諸善事以營於道之方也愼不可以其日忿爭喜怒及行威刑皆天人之大忌也午卯日凡午卯之日常當清齊入室東向心拜存神養氣期感神明亦適意所陳常如此者玉女降侍避忌日李少君口訣道士求仙者勿與女子三月九日六月二日九月六日十二月三日其日當入室不可見女子六尸亂則藏血擾潰飛越三魂失守神凋氣逝積以𦤺死所以忌此日者非但塞遏淫泆而已將安女宫女宫在申男宫在寅寅申相刑刑殺相加是日男女三尸出於目朱童之中女尸招男男尸招女禍害往來喪神𧇊正雖人不自覺而形容自損由三尸戰於眼中流血於泥丸也子至其日雖至寵之女子親愛之令婦固不可相對我先師但修此道而仙矣復不及至親無心者矣子其愼之此乃仙人劉綱妻女仙也出神仙傳又别條云凡甲寅庚申之日是尸鬼競亂精神躁穢之日也不可與夫妻同席及言語㑹面當清齊不寢其日遣諸可欲旦望每月初一日為旦十六日為望則以官曆逐月十四日十五日十六日考之並合朝修祈恩謝過月忌正月二日又庚申二月九日又辛亥三月十日又甲戌四月十一日又癸亥五月十一日又壬子六月十日又癸丑七月十二日又甲寅八月十三日又乙卯九月十三日又甲辰十月八日又丁巳十一月十五日又丙午十二月十三日又丁未巳上日忌燒香每日常行香火不拘帝煞日正月庚申二月辛卯三月庚戌四月癸亥五月壬子六月癸丑七月甲寅八月乙卯九月甲辰十月丁巳十一月丙午十二月乙未巳上忌燒香聖忌丙寅丁卯道父忌丙申丁酉道母忌壬辰壬戌北帝忌戊辰戊戌南帝忌絶命本命絶歲星行年到日六害本命對日月晦月窮之日歲破太歲對衝巳上日不冝行道燒香亦不冝殺冝正坐思心悔過聖自懸知祈懇日正月四日二月八日三月十五日四月八日五月九日六月六日七月七日八月八日九月九日十月五日十一月三日十二月十二日已上日乃太上大道君登玉霄琳房四盻天下有志節逺遊之心者至其日平旦日出時北向再拜亦可於靜中也自陳本懷所願畢咽液三十六過又云東海青童君常以丁卯日登方諸東華臺四望以此日常可向日出行乏可因此以服日精禁忌生蔥韭大蒜小蒜胡荽此為五辛五辛舊有其說多矣大概此等物辛臭烈甚食之經日尚臭出口中對人言語巳覺不可况於持誦神文朝真行事乎五辛之外更有薤藠似葱之屬皆不冝食不必細為之說鴈犬黑蠡魚鯉字非也此名三厭三厭之外更有鱉鱔之類皆腥穢之氣難退者並不冝食臨尸吊喪新産新刑殺所屠坊淫舍已上皆不可食李少君口訣法道士求仙不欲見死人尸損神壞氣之極人君師父親愛不得已而臨之爾所以道士逺世不事王侯是無君也塊然獨處是無友也惟父母師主不得不臨喪𦤺感極之哀不吝性命之傷苟以此故而傷是無傷也吾其祕文故口傳焉本命日常以其日向本命方叩齒三通心存再拜呪曰太一鎮生三氣合真室胎上景母玄父元生我五藏攝我精神下灌玉液上朝泥丸夕錬七𩲸朝和三魂左命玉華右嘯金晨令我神仙役靈使神常保利貞飛行十天呪畢心拜四方叩齒三通咽液三過此名為太上祝生隱朝胎元之道常能行之令魂𩲸保守長生神仙又法學道之士當先檢制魂𩲸消滅尸鬼常以晦朔之日庚申甲子之日清齊入室沐浴塵埃正席而坐得不眠者益善以真朱筆㸃左目下以雄黃筆㸃右鼻下令小半入谷裏㸃畢先叩齒三通微呪曰上景飛纒朱黃散烟氣攝虛邪尸穢沈泯和魂錬𩲸合體大神令我不死髙夀永寧聰明徹視長享利貞呪畢又叩齒三通咽液三過併右手第二指躡右鼻孔下左手第二指躡左目下各七過當盡隂穢按之勿舉於是都畢按此二處是七𩲸遊尸之門尸鉞精賊邪之津梁矣故受朱黃之精塞尸鬼之路引二景之勳遏淫亂之氣也此太極上法常能行之則魂𩲸和柔尸穢散絶長生神仙通氣徹視行之三年色念都泯矣此太靈真法淨穢太上九變十化易新經曰若履厭穢及諸不淨處當澡浴與解形以除之其法用竹葉十兩桃枝削去白四兩以清水一斛二斗於釜中煮之令一沸出適寒溫以浴形即萬厭消除也既以除厭又辟濕痺瘡癢之疾且竹葉虛素而內白桃即却邪而折穢故用此二物以消形中之滓濁也天人遊下世間既返則未嘗不用此水而自蕩也至於世間符水呪漱含之近術皆莫比於此方也若浴者益佳但不用此水以沐之耳錬尸之素漿正冝以浴耳真竒祕也紫微王夫人授解穢符又攝穢符𠃔中蒙師祕授今立願編校大法不敢隱惜其法以梓木作簡如尋常朝謁簡之狀只令微小爾書前符刻之簡上常護淨之遇食葷履厭之後或有急切行持不暇浴洗則先用茅香煎水七合以漱口罷㸃七㸃於左右手心內將兩手拭目呪曰積穢隨水行盡從神窗出急急如律令次於聖前焚香叩齒四十九通執簡以攝穢符向伸對口躬身呵氣於符上呪曰穢氣出正氣入正氣存穢氣去三十六厭三十六穢神符攝盡絳宫寧一朗清神户呪畢放簡回身掐斗訣步斗罡上吸氣一口拋訣以次行事此備急之法若登壇朝謁奏啓焚修事體稍重自從科浴沐也式假應行持之士身遭大喪及父母度師並具申三天門下移文將吏閉靖不可焚修如遇事變急切不及動狀則作關付功曹土地謄啓上玄大喪三年二十七箇月不計閏月此服制也道家惟忌厭穢尸既收掩穢氣已除百日式假聽解穢入靖朝修服制自終三年舊儀大喪一年既非服制之限不應廢缺朝修一歲之久如尸柩未殯寢處柩傍者不問日限自不合入靖也朞喪一月解穢申牒如式朞喪不臨尸大功以下不臨尸並三日式假解穢入靖㫷功之外尸不當臨避之可也吊不可廢隨即解穢矣非親雖厚並合避厭也大喪事畢解穢沐浴訖關申合屬真司收復將吏一如常儀生産穢道士出家自處琳官一切生産並合回避俗士修真惟生子義不容逺合終月之後方可解穢入靖悉如前儀此外並合固避違者考罰理髮呪泥丸玄華保精長存左為隱月右為日根六合清錬百神受恩呪畢咽液三過能常行之髮不墮落當數易櫛櫛之取多而不使痛亦可令侍者櫛取多也於是血液不滯髮根常堅冝向旺方澡浴呪天地開朗四大為常玄水澡穢辟除不祥雙童守門七真安房靈津錬灌萬氣混康內外利貞保茲黃裳急急如律令食呪百穀五味流入脾胃五藏安寧尸邪永墮七祖蒙恩長生久視脫衣呪受命太帝上升九官百神安位列侍神公魂𩲸和錬五藏華豐百骸玄注七液虛充火鈴交煥滅鬼除凶上願神仙常生無窮夜卧呪天有九皇地有九宫我身百節萬神相從三尸伏滅五藏流通三田四支動息守中龍虎八卦侍我瓊容鬼妖萬精勿干真宫登厠呪左德神左德神左司土本夫人除我死籍上我生名𠃔中按古科齊直之日禁忌之條散諸經誥不可備述但切於修用略出而巳設醮祈恩登壇啓事上章拜表首過謝愆皆可以其日行事若無禱請因此檢制行為去非寡過亦清修之一助有如不可親之事不當食之物昏亂神氣濁穢身形豈應不屏斥也若躬行於道德之域心宅於冲靜之鄉寢寐不忘造次母失當此之際無時非齊又何日分之拘耶儻身之不修行之不撿僣冒法籙違越禁忌則三官考罰五帝紏愆九祖同辜一身受罰非道不慈也天台法中第二十三品作齊戒節度內十戒係靈寶本科𠃔中從古法巳編入第一品此外齊直日分頗近科條但所引經典之名多是三洞品目古無者今雖傳行於世未冝憑據沐浴常以東井之日正月十日二月八日三月六曰四月四日五月一日六月二十七日七月十五日八月二十二日九月二十日十月十八日十一月十五日十二月十三日上清靈寶大法卷之九
