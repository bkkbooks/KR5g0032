front:
  text: 上清靈寶大法卷之二十三彩五
  hash: sha256:e4bf1ad40c62c33a98785549a8f91a19b1c99b41c49a9fb4bff3f013a17c2448
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_022-001a, image: hfl/0967/0967-174.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金𠃔中編章詞表牘品章乃古式也丗之法書隨時不同惟有章格不容以𥝠意更易也如黃籙齊則自來用五通章并朱表也曰素車白馬章破酆都拔罪章開通道路章沐浴錬度章升度亡魂章近有更易移動其格者矣師傳舊式非可移時故從古式也素車白馬章上清靈寶法籙職位臣某誠惶誠懼稽首頓首再拜上言臣聞薦資幽爽遷升實藉於玄庥頒告真符宣布必資於神吏敢伸下悃僭冒髙穹臣謹據某州府某縣某處居住奉道某官某姓名開列暨家眷等入事崇建太上黃籙大齊幾晝夜上資國祚普福羣生開度七祖靈魂廣拔九幽孤爽集資善果超度亡某早登道境臣據詞虔切難以抑違除巳備録奏箋冒聞穹壤恭依科式建立壇場行道轉經朝真懴謝以今告行元始符命金籙白簡救苦真符太上勑赦生天寶籙太上破地獄真符拔幽魂真符東極青宫九龍符命太一玄冥混元神虎玉劄拔度亡某等門中七祖父母及諸類孤魂悉赴齊壇於某月某日宿建皇壇攝召亡爽示見報應引朝真靈某日清旦正齊闡事三日普施斛食廣濟孤魂錬度靈識傳授戒符臣謹為上請素車白馬大將軍一人官君將吏一百二十人玄都茭龍驛吏飛天神人東極青宫九龍符命使者各一人宣傳符命告下三官九府百二十曹五帝考官六宫掾吏酆都宫府考罰職僚五嶽九幽河源泉界五道都府溟泠大神四瀆三河九江八海黃泉蒿里九州社令天牢地獄幽關𡨋路一切王者咸領符命原宥亡某等門中七祖父母姻親及九州分野三途五道萬類四生幽魂苦爽衆苦咸除出離地獄永辭長夜覩見光明蠲除罪戾落滅惡根承此功因受錬更生恩惟太上分别哀求臣謹因二官直使三五功曹左右官使者隂陽神决吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏等官操臣章上詣太上三天曹伏須告報臣某誠惶誠懼稽首頓首再拜以聞空三行臣姓某屬某州某治某處焚修空三行太上無形無名虛無自然至真大道七寶金闕玉陛下空三行年歲次月某朔某日某甲子某時章文於齊壇中拜上空三行結尾可陋虛無自然金闕七寶玉陛下具位姓名上奏謹封內函謹謹上詣太上三天曹請進具法職臣姓某謹內封外函章文謹謹上詣三天門下請進具法職臣姓某謹外封右素車白馬章舊格如此近世有於請官之後𣸸入解穢衛壇官將一併請降者又有易其名為解穢章者却除去素車白馬大將軍皆各遵師授或自有巳見今此法中乃師傳舊式也宗匠不同者自從其𣲖解穢乃有司之事解驅妖穢以候帝真降鑒不宜請上帝自遣法職解穢也酆都拔罪章上清靈寶法籙某職臣某誠惶誠恐稽首頓首再拜上言臣聞衆生積罪自罹𡨋憲之中大道流慈廣度泉扄之苦欲升沉滯須仗恩庥臣謹據某州府某縣某處住坐奉道某官某姓某名入事薦拔亡魂上登道境臣領詞䖍切理合關行除巳預録奏聞尅於某日宿啓建壇某日為始開建黃籙大齊幾晝夜朝真懴謝行道轉經請命頒符攝魂度化咸令幽顯俱沐生成臣謹為上請降真召靈符使降真召靈童子恭請太極真符頒下東極青宫大慈仁者太乙救苦天尊乞降慈光普照十方世界北隂酆都六天十洞五嶽溟泠泉曲考掠𡨋司一切天牢地獄悉承慈澤普得寧間差降救苦真人救苦童子青玄玉女遍下地獄𡨋曹幽扄夜府開關赦罪停苦即使劒刃摧鋒桎梏廢毀罪書沉滅過籍消鎔執對蠲平𡨚讎和解擔砂負石之衆漣汲溟波之徒驅雷役電之神運風掃山之鬼受報償辜之魄穿地引水之龍九先七祖之魂靈六合萬途之孤爽普停謫役大宥拘囚度品南宫超離圵府斷地逮役注上生名動植飛沉羽毛鱗甲各安本性咸遂昭蘇恩惟太上分别哀求臣謹因二官直使三五功曹左右官使者隂陽神决吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏等官操臣章文上詣太上三天曹伏須告報臣某誠惶誠恐稽首頓首再拜以聞空三行臣姓屬某治某州某處焚修空三行太上虛無自然至真大道七寶金闕玉陛下空三行年歲次月朔日某甲子某時於齊壇中拜上空三行結尾可陋虛無自然金闕玉陛下具位臣姓某上奏謹封內函謹謹上詣太上三天曹具位臣姓某謹內封外函章文謹謹上詣三天門下請進具位臣姓某謹外封開通道路章上清靈寶法籙職位臣姓某誠惶誠恐稽首頓首再拜上言臣聞幽途溟漠難逢超濟之緣妙道慈仁大啓遷升之典非仗玄穹之惠澤莫弘幽顯之津梁敢昧宸嚴僣伸下悃臣謹據某府某州某縣某處住坐奉道某官姓某列名家眷等投詞入事意修建太上黃籙大齊幾晝夜攝魂度化尚慮隂陽關隔魂魄拘沉謹為上請太上直符使者三界直符使者各一人齎持太上符命籙章告下三元九府百二十曹五帝考官四司主吏北隂酆都內外宫洞九幽萬曹無窮地獄泉曲河源溟泠水界五道都府九壘土皇地下土府九州社令五嶽名山洞天幽治考較曹僚山林孟長天下城隍壇廟神司今年太歲當境土地正神善惡二部長吏一百二十曹官天牢地獄𡨋關幽治一切主者敬聽上玄符命開關啓路拔罪釋囚係薦某魂附薦某等及門中宗親并九州分野五道四生萬類幽靈無極鬼爽各令解脫部衛形魂悉赴齊壇參朝三寶聞經聽法受戒傳符大昭長夜之途廣闢𡨋鄉之路功圎果滿進品仙階違滯之神𡨋曹降職恩惟太上分别哀求如前結尾方函可漏並依前式木函貼黃臣奏為某處崇建黃籙大齊請降將吏宣通告召事伏取進㫖謹按酆都拔罪章并開通道路章皆以廣度為主雖齊官追薦專為一人然普及幽冥係薦之魂自然蒙有兼地獄之多未易盡述考掠之具難以悉聞故廣成先生曰地獄者以其獄在地中故曰地獄考理罪魂或在城邑聚落之處有隂宫執而理之亦曰地獄業報因緣經云世人陽罪陽過則世官理之隂罪隂過則𡨋官主之謂有三十六獄又仙戒經謂有一十八獄正一經謂有八大地獄因緣經又謂酆都三官有二十四獄諸經所載既以難窮經文所不述者又何有限極至於金槌鐵杖劍樹刀山爐炭鑊湯火車糞穢之類亦經中略叙其可畏之狀以警戒世人使母造罪故也若拔罪章中有言銅柱鐵床成寶之具鑊湯爐炭成清凉之燈歷陳地獄之狀則言之終不能盡反使其意不廣如開通道路章告下大小鐵圍無間地獄等名亦為拘泥恐地獄之衆名稱尤未易盡知故𠃔中所行拔罪章則略言執對消平𡨚仇和解之意而巳不復歷數獄具之形開通道路章則總言酆都宫洞無窮地獄不復悉陳地獄之名庶使言簡而意深辭省而事廣蓋陳詞之語决不能盡而幽隂之境名不可殫故普其辭而總其事則凡有地獄之所咸被宸恩應罹獄具之刑悉蒙玄宥又何必指其名而後能消罪苦定其地而後可廣齊功耶儻蒙上帝垂慈則無所不度學者正當廣用其心固不宜執泥於淺近也此最為學道之第一事淺中狹量非開度天人之胸襟也沐浴錬度章上清靈寶法籙職位臣姓某誠惶誠恐稽首頓首再拜上言臣聞形神暫滅顧麈纍之猶纒魂識散馳乃靈根之未復非憑冶錬豈遂生遷輒叩天閽用攄凡愫臣謹據某府州縣某處居奉道某官某姓某名列名家眷等入事至資度亡魂超登道境臣據詞䖍切理合關行謹率法流尅以某日建壇某日修建太上黃籙大齊幾晝夜轉經行道懴謝朝真請命頒符攝魂度化普及三途滯爽萬類幽靈咸沐神津盡消鎔於塵垢皈依道化重假合於隂陽臣謹為上請五方五靈童子各五人解穢官將吏兵各一百二十人浣濯夫人黃華玉女各一人應時下降請取黃華神水錬尸素漿靈腴玉醴甘露金津灌注香湯之中即使受度亡魂幽爽蕩除隂穢湔濯塵勞表裏無罪債之根內外消熱惱之垢即令五方童子上請東方青靈始老真氣哺飴以九氣之青津南方丹靈真老真氣哺飴以三氣之丹華西方皓靈皇老真氣哺飴以七氣之素漿北方五靈玄老真氣哺飴以五氣之玄泉中央元靈元老真氣哺飴以一氣之黃華使係錬一切亡爽承哺飴之恩安鎮魂魄自生五神又請金剛百錬千和玉液太白流光元皇散液解除鬱結驅滌滓穢灌錬身心智慧洞明又為上請隂陽正氣金木靈津給降丹天世界朱陵火府南昌上宫冶錬官君將吏下臨壇墠錬度亡魂開明本性整復形神更生福鄉永承道廕恩惟太上分别哀求臣謹因空行結尾方函可漏並用前式𠃔中切聞人之生也血肉成形榮衛所及則有病痛癢痾道德經云吾有大患為吾有身蓋以身為神之纍也近世宋齊丘化書時我本無害而筋骨為之害我本無痛而血肉為之痛此言實幾乎道矣若一神既離百骸皆為腐土向之所謂肢體傷殘心腹疾患夫復何在一靈若滯或執對而拘纒或沉迷而自惑是以反生無期儻本性之既明則應時而度化所以太上垂科之意齊修之㫖乃因建立齊功轉經行道昭明幽翳開悟沉淪而巳沐浴錬度之章意謂亡魂身經太隂魂拘罪網故欲先消其塵垢然後聚凝神識假合隂陽重立根基反生人道其始也人而為鬼今經上玄度化則聚其神明乃鬼復為人託生之時方有帝君品命九氣生神再造肌膚矣但恐齊功不足以格天二氣未臨於亡爽而巳若舊來章書請降天醫神藥以療生前之疾患補續骸肉之傷損則去道逺矣非獨人之質壞而神不壞兼以天地隂陽之正氣錬化亡魂而反生又何慮其神之有患而不愈哉故今從先師之付傳不敢同俗而超世如所授不同者自從師法𠃔中則不敢越也升度亡魂章上清靈寶法籙職位臣姓某誠惶誠恐稽首頓首再拜上言臣聞教恩廣被拔沉滯之遷升齊福無邉拯幽冥而超濟願垂省録終賜慈憐臣謹據某府州某縣某處居住奉道某官某姓某列名家眷等入事意崇建太上黃籙大齊幾晝夜薦悼亡靈超登仙境臣已按科教依式宣行開度係薦魂儀祭錬本音宗親及以九幽滯爽既承道力更仗天恩臣謹為上請南昌上宫司命君司録君延壽君益算君度厄君上生君各一人升度亡魂上生南宫定算玉簡注名金文又為上請司馬大神衛房聖母洞陽童子奉為亡魂玉眸錬質黃華蕩形書紫䇿之生名應朱宫之品格仰依覆育永遂逍遙恩惟太上分别哀求臣謹因空行結尾方函可漏並依前式按正一指要每十二月分上章則分太上宫名每日則分宫曹此係正一科條自行遵用今此章法屬洞玄品格見於上經與正一異源是謂上清科式兼正一章舊來亦巳有不用宫曹者惟道門定制集乃今人定入宫曹爾用之未為深當况於靈寶弟子上章於太上道君自來上詣三天曹而巳𠃔中前後以此拜奏章文屢蒙玄應方敢編續於書非自不曽用而妄以惑世也學者深詳之章函長一尺二寸八分濶二寸八分用古尺黃絹作袋外封仍用黃羅帕袱包之章凡如香案狀腳曲用黃羅卓衣覆之四圍書章於靜室母令人往來預期掃潔臨事時以解穢符用醋炭薰之戒書章表之士必先沐浴更衣入室書寫應凡章文每行止十七字上空八分下通走蟻一說作不通走蟻但字近𥿄下邉則筆畫易致失落故令通走蟻為當每行濶一寸二分𥿄髙一尺二寸自首至尾行以單數法位前空二行法位至再拜字作一行上言字平闕臣字及人名與鬼字死字並不得居行頭生字不垂於行末以淨綵覆卓然後書之年月後空三行辭長者則續𥿄章裁𥿄剩下者隨即燒之不得飛落床席地上筆墨以新潔者不得雜用字涉凶穢者不得居行頭皆避於行中不得令人見不容婦人僧尼雞犬猫畜等入章室書章不得言語交亂寫未畢不得出室為字未成不得放筆㸃筆對章不得髙讀以聞低二字平前行告報下臣字以聞後空三行臣姓低二寸四分前具法位而無姓至臣姓處則云姓謂如臣姓某住某屬某處焚修之類是也蓋章之前無姓而章中亦止稱臣名而巳故於內間後言臣姓以終牘無姓而於此陳之也今於此而書臣姓名者失格者𠃔中先經師髙君章本云臣姓髙屬徽州祈門縣紫元庵焚修不係𠃔中之𣲖者自從便臣姓後空三行太上聖位後空三行年月結尾凡寫章不隔日填陛下不隔時拜章日向東夜向北應章文一幅十七行每行十七字惟黃素朱表每行二十四字餘如章式古法章官不用六十甲子神入章中書章以𥿄隔手不得令衣䄂拂章磨墨左轉四十九轉不以口吃筆不得出口氣於章上本法當口含香水焚香面北而書章表書士不得履穢若經涉生死厭穢觸汚者易其人𥿄不得破裂字不得漏㸃畫暑月不得單衣露體不得據案書字不得挑剔改抹書成不令人讀不得安于有人往來處太上聖位端謹作一行書不得拘以寸數古法取三寸長若排比其事不下反致不端陛下二字不細注只以謹楷為貴宣章副本仍敷露正章於御前以筆置聖位之右龍頭書刀置於聖位之左法師長跪於科案遣章畢香上度過緊卷入內封誦開函呪入函入腦子沉香以青絲三過繫之舊用蠟印實蠟不潔今止用糊粘印繫絲處封之次入外函以付侍香法師存伏行持如式章信鎮綵天子用匹數公侯以下用丈數庶人用四十九尺錢臺萬二千文祿米一石二斗油一斗二井香五兩𥿄一百幅筆大二枝小三枝墨三笏硯二枚金魚一枚玉鴈一枚龍頭書刀一口長六寸以銅鐵為刃銀半兩為龍頭鹽一斤豉一斤柴五十斤炭五十斤淨巾二條命信各隨年庚科曰拜章備信證質誠心若心希功德而吝惜財物即神明不納若為寒棲之士貧乏之家則師為代之章關靈寶大法司當司今為某崇建太上黃籙大齊幾晝夜祝國安邦濟幽利顯以今依科拜進某章一函謹謹上詣三天門下上奏須至關者右關齎章某官將同進章諸從事二官直使三五功曹左右官使者飛章從事五帝直符十二時直使者隂陽神决吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏等官千乘萬騎官君將吏請捧章文上詣天闕以時進奏母得稽延星火施行故關年歲次月日時關具法位章官獻狀齊官姓某謹備元始靈書中篇幾本雲馬金錢右謹具狀上獻三元唐葛周三將軍三天門下上章詞表靈官三天門下引進仙官法中飛章從事促氣靈官録章呈章齎章從事三五功曹左右官使者五帝直符十二時直使者隂陽神决吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏十二書佐小吏甲子諸官吏章中千乘萬騎將吏伏惟聖慈俯賜采鑒謹狀年歲次月日齊官姓某上狀黃素朱表廣成先生科中全文每行二十四字發表不用關文具位臣姓名誠惶誠恐稽首頓首再拜上言太上無極大道至真自然金闕七寶玉陛下臣等猥以下愚謬參大法功無塵露釁重丘山俯仰慚惶形魂罔措臣誠惶誠恐稽百頓首臣等實謂几微幸藉前福叨逢妙化欣荷過情既沗玄司職主救度雖禀性庸瞽參學昏蒙誓罄丹誠服膺妙訓見義思勇日夜切心因緣所值敢不以聞今有某州某府縣某豦住坐奉道某官姓某列名稽首列詞伏聞無上正法黃籙大齊解除生死先世今身心口意罪上資帝王下及羣品保國寧家禳災却害增延福壽解釋愆非拔度九玄七祖一切幽爽濟度存亡惠澤普加謹齎十方金龍鎮信本命紋繒香花油燭供養之具證質丹心奉詞以聞因臣等行道懴悔首謝宿世衆愆斷絶殃咎集兹善果濟度亡某超登道境言詞丹切理合申謄臣謹率道士一壇謹依下元黃籙簡文靈仙品格擇就某處建壇設玄科之式法天像地以某所齎金龍繒綵施鎮十方祈天請命救度存亡共相警勵洗心淨念歸命至真所祈所願修建無上黃籙大齊幾晝夜九時朝謁十遍轉經自某日為始立齊闡事至某日滿散修設謝思清醮三百六十分位謹即言功解壇將投龍於山水丹書槿劄以奏言於靈壇拜表上聞九天伏惟太上無極大道元始天尊大上道君太上老君太上丈人無上玄老十方自然靈寶天尊已得道大聖衆至真諸君丈人大帝天帝天師君玄中大法師曲鑒所奏垂憫丹心如蒙上御乞勑典者宣告十方五老上帝五嶽真仙三官九府十界真靈拔度亡某及本家九玄七祖有緣無緣冤親平等一切幽魂立令開度得出長夜九幽之中升入南宫冠帶枯骨反骸生華轉輪漏盡化生福門所在土地榮衛尸形精神返舊與景𡨋合齊主某前生今世一切罪咎並乞蕩除和釋冤對度厄消災延生保命存亡開泰眷屬安寧上願七曜玄明二儀永固六合清靜帝祚延長隂陽調和九榖豐稔疫毒永殄善瑞日臻國冨人安天下太平克保元吉永遇道恩謹遣所請天仙兵馬真人兵馬地仙兵馬日月兵馬星宿兵馬五帝兵馬三河四海兵馬五嶽四瀆兵馬各九億萬乘臣等身中各人所佩三洞四輔經籙法中真仙將吏靈寶官屬監齊直事三五功曹左右官使者侍香金童傳言玉女五帝直符傳言奏事飛龍騎吏飛章從事章中合屬官君將吏降真召靈符使降真召靈童子太上直符使者三界直符使者玄都茭龍金龍驛吏素車白馬大將軍官君將吏沐浴解穢官吏南昌上宫錬度官將神虎攝召將吏玉女神兵正法諸部同力追魂攝魄合干將吏城隍社今守宅將軍此間土地里域真官正神三界神祗監壇神將應係監臨衛護宣通召命營衛齊事有功勤者一切嚴裝隨臣表文上詣玄都列受功賞謁言仙宫進品上真加崇爵秩隨品署真髙下等級皆令增進一如太真之儀臣等學法未備俯仰失儀進止犯科不合儀格恐四司所紏五帝所執千愆萬罪乞蒙赦宥哀憐未悟不見罪罰臣等身中五體真官受功事訖各還臣等身中宫府使臣學道得道求仙得仙永為真人同三光煥耀與五氣長存恩惟太上衆尊分别哀憐臣謹因二官飛仙直使三五功曹左右官使者隂陽神决吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏天仙騎吏各二十四人操臣表文上詣太上三天曹伏須告報臣某誠惶誠恐稽首頓首再拜以聞空三行臣姓某屬某州某處焚修空三行太上無形無名虛無自然至真大道無上元尊金闕七寶玉陛下空三行年歲次月朔日甲子時表文於齊壇中拜上右朱表謹按廣成先生曰用細熟黃絹六尺取其末幅硃界硃書每行二十四字第一行名御至再拜盡一行至上言字平闕獨占一行生字不得居下鬼死字不得居行頭每行之終不得抽破人名臣字亦不得居行頭一如章法不得挑抹𡍼攺儳字𣸸注損汚等唯須精心且人間奏表尚須謹楷精細况奏於天真豈可輕忽乎若不然者但恐天司譴責拜表不逹反獲罪咎安能感通太上聖位臨時法師自書以二十四分內取盡蓋古人純質絹皆界行而書之𠃔中尚見前輩法師守古法界行也近世絹亦薄𥿄背過庶可操露先師只用十分厚潔黃𥿄書之尤便用絹固是古法但焚化之時反有絲縷之氣不復界行矣獨此表則官君將吏隨表上詣天廷故不用關文只於散壇科中就拜且黃素一表世人多欲遵用廣成先生成藁殊不知古人崇建大齊詞㫖必先祝君保國而後已身重於廣度而及亡靈故始終之意一貫則此表可用也近世建齊保安則惟切切於一巳不及福國而康時薦亡則惟汲汲於亡靈而不意於普度為髙功者亦隨順齊主之意切切乎慮齊福為人所分故黃籙五章近時絶無保國祝君之辭且輕於普度之㫖直至朱表而用廣成之格乃與前五章頗相背馳豈非欺天乎𠃔中所述章文則僅存古意故用此朱表可以相安若止於用趨時之章書順媚齊主之詞㫖則此朱表大不冝用兼髙功素無及物之懷及修齊之時惕惕驚懼惟恐稍拂齊主之意慮其續有齊修則不復見招趨承不暇又安敢喘氣於齊主之前也欲其辨析是非敷陳正典又其難矣古人齊修而施財散寶廣濟幽𡨋一則釋其鄙吝之心二則上不忘君中度九祖旁及𥠖庶普福寰區三則廣度五道四生三途十類至於鳥獸草木俱被齊功以此而保家保身則福壽無極以此而薦親度亡則超升可期為齊主者儻聞𠃔中之愚論亦必能少廣其善心惜乎主行之士每對齊主惟恐奉承之不暇未敢舉此意也𠃔中尋常備貟主行齊醮悉以此㫖而行之齊主亦未嘗固執𥝠意同學之士更能少安分義為教門自重毋被星粟施利所拘而極其折腰下禮亦教門之幸也大抵財物得失係乎宿緣貧富窮逹自有定分枉尋而直尺甘言而求用實徒然爾上清靈寶大法卷之二十三
