front:
  text: 上清靈寶大法卷之八獸九
  hash: sha256:dfedff94b664f466efc1a84fa73416bea895be82744dc8ddc84b338555bb318b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_008-001a, image: hfl/0964/0964-106.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金𠃔中編元始大定品七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜默山嶽藏雲天無浮翳四氣朗清一國地土山川林木緬平一等無復髙下土皆作碧玉無有異色一呼二至一吸二至一呼一吸四至共得六寸一呼二至一吸二至各得三寸一至得三寸一至得一十五分經緯天地縱橫十五故上帝付黃帝河圖也入室平坐以手診脈四動為一息量人平常出入漸漸加之不要大段費力放氣出自口勿使耳聞放於息勻之後再作如初積之力久氣住息平始著意在鼻凖頭乃鼻三腮二眉四息於是微微出氣為一遍續再作積至八十一遍四十九日外每遍加息自一時可至一日自一日可至七日然後以耳對肩以鼻對臍收其六根專意於目初則非內非外觀其神光三日之外於密室中見神光一㸃孜孜定神四日之外漸明漸大七日神光滿室定中百物皆為未然七七日外定中見一切真靈鬼物方入洞觀徹視之道也竊謂度人一經備有萬法元始大定為法之機要亦道之徑路始於定氣存神以致朝元登謁過此以往極道之域不可擬議七日七夜諸天日月星宿璇璣玉衡一時停輪此元始說經之時天中之事也薛幽棲注中略釋其義今即之人身日月停景目不瞬動也神風靜默息不出入也山嶽藏雲氣不升降然後孜神內視一志湛然習定出神升騰上境洞觀萬彚徹視十方訣巳詳疏于前矣天台編神光大定二十五品乃云璇璣玉衡脈不息也是則妄甚且習定大法目不可瞬動息不可出入氣不可升降神斯可出而脈豈得不動人巳就死却非出神又曰天尊空浮乃自元神居玉清宫又曰天尊雖逺妙近言泥丸宫又曰自巳有天尊何勞望上天所引並非也又曰威神妙化結成獅子天尊乘之下入丹田左青右白前赤後黑中黃故謂之五色却云七日七夜所見者皆未來之事彼不知出神洞視以𦤺脫質升玄豈可謂身中之五氣天尊止於泥丸而巳夫徹視十方通幽逹妙大而髙天厚地廣而萬聖千真皆可洞見與造物者遊今却只稱所見皆未來之事何其狹陋哉後世學者欲得修用之梯階當自習定洞觀百靈品本命日為始行定法七日之外定力有凖方行徹視定力未成不可行之息既定而神可出目駐萬里之外不顧面前之物又七日漸明漸有倣佛百日成功坐視三界徹見十天又云誦詠妙經得為九宫真人各主旺四十五日又各主一分紫度炎光內視中方曰常欲閉目而臥安身微氣使如臥狀令旁人不覺也乃內視逺聽四方令我耳目法萬里之外久行之亦自見萬里之外事精心為之乃見百萬外事也耳中常聞金玉之音絲竹之聲此妙法也四方者總其言耳當先起一方而內注視聽初為之實無髣佛久久誠自入妙𠃔中考之古書習定出神始可行洞視之道然謂息一事易知而難成始於一息四至久則一息而八至纍功不斷可至一時滿一時則可一日自一日則七日可期於是聚神如己之狀端立泥丸之中內外湛然一毫不著騰身直出頂門覺身外生身歷歷分明神離軀中如蟬脫殼馳於空逈馭氣穹玄謁列宿於天階朝元尊於閶闔衆真可覿萬氣齊仙終至於見玉清聖境第此乃出神之妙可以通真逹靈學者或際遇明師修存而至於洞觀之域更冝進步毋自退沮可也採錬祖氣品鳳曲頭㸃頂精息內潛龍升頭搐鼻其氣上升龜縮頭含息精氣下行蛇屈身不直元氣周旋鶴閉氣微息精㱕丹府仰惟元始祖氣無形無名劫運之初不可髣佛玄網既肇二象分形天禀此氣以為天地禀此氣以為地人禀此氣以為人以至動者植者立性卑形莫非祖氣化生也然人分此一氣而生未免失此一氣而死豈非情欲汨其內勢利役其外不知本源不徹正理神昏氣耗不覺大限之臨而終至迷亂無依斯為下鬼矣今焉採祖氣而錬結聖胎於身中聖胎就而身外生身也此一條大槩乃採錬身中之祖氣古書有其目而訣法未降不可以意料而為之說洞陽符火品亶薈丁丑豫戊寅隨已卯蠱庚辰臨辛巳觀壬午噬嗑癸未賁甲申剝乙酉復丙戌無妄丁亥大畜戊子頥巳丑大過庚寅坎辛卯離壬辰咸癸巳𢘆甲午遁乙未大壯丙申晉丁酉明夷戊戌家人已亥睽庚子蹇雲都解飛騫損辛丑益壬寅夬癸卯遘甲辰萃乙巳升丙午困丁未井戊申革己酉鼎庚戌震辛亥艮壬子漸癸丑㱕妹甲寅豐乙卯旅丙辰巽丁巳𠃔戊午渙己未節庚申中孚辛酉小過壬戌既濟癸亥未濟九日乾坤覆坤甲子屯乙丑䝉丙寅需丁卯訟戊辰師己巳比庚午小畜辛未履壬申泰癸酉否甲戌同人乙亥大有丙子謙脈為心色乃身內九鼎外合九色上應大梵契同卦氣合於太陽故或以為坤母東覆九日導乾二句顯其機然配卦與甲子於隱語古書以為洞陽符火開圖而訣法未降中間理未可通不合牽合也九氣色鼎大小腸小紅一作絳肺白膀胱蒼一作緑心赤脾黃腎黑胃紫肝青膽碧考詳度人經乃中洞之一卷而中篇又為一卷之樞要隱奧難窮不可理測大唐以後亦有為之訓𥼶者矣然終未易透徹也如中篇分𨽻六十四卦舊法謂乾坤兩卦見於坤母東覆九日導乾然此外六十二卦又以何據而定其說理巳難通兼元來條目止謂之洞陽符火開圖是上聖以成真人始悉其章也所可知者中篇萌於天地之先與後世之書契不相雜獨易之為義變通無窮卦之氣數密參造化伏羲雖畫卦天地已分之後而卦中之義實肇於爻象未畫之前故邵雍云誰信畫前元有易是存深意而人未洞其至理也易有六十四卦中篇有六十四句皆起於古初或卦自中篇而出或中篇與卦相須尚可言也如以一卦配一句若窮其理則不可強通既分屬則六十甲子亦隨之古法具其目而訣法未降是未見於用也至於九氣色鼎雖略解其意亦隱其訣期運不至而未降也天台法中却以中篇配卦之例編作三十三品改稱玄真隱諱又取屯卦為首於甲子而強為之說既不伏直言訣法未降又不能言配卦之義復於其法三十二品中以服三十二天氣謂之吐納正不知三十二天之內四天在種民世界四天在無色世界十八天在色界六天在欲界今欲步二十八宿之罡以引此氣也不其寥邈哉恐心愈勞而報應愈邈也彼既以中篇改作玄真隱諱而三十二品之未編祖道玄真烜赫正成鬱儀返質熒惑操形乃是玄真隱諱出於上經却稱玉音攝氣呪移前作後改東為西此何理哉五氣混合品上清華房太一含運其形自然太一居之如蓮花未開人身中蓮花之房者心也八景𡨋合者八𡨋之內身有八脈𡨋㑹之處盡總於心細微之中者萬物皆有細微之中通於大道元氣如芭蕉之脈人身內亦有血脈經絡之道路也五氣之中百神混合於內也乃大洞回風混合之道在上清禁經中明其道則不死壞行其道則為真仙矣玄中真人頌曰玉清天橋閉靈關緑室長延便清間靈風吹烟五氣住玉音攝氣三丹田又曰一神飛出上斗台風火回環再朝骸若不浩劫經一刻直待猿猴死更灰圖猿居中宫五位乃心也切詳經中自元綱流演三十二天至玄中太黃上帝髙真皆天之體而大梵之用也及夫下鎮人身泥丸絳宫中理五氣混合百神十轉回靈萬氣齊仙此則直言人身中之事也故其說以太一含蓮其形自然八脈𡨋㑹總於絳宫是能五氣混合其事與大洞回風混合之道相通惟其訣法未降雖有作用之目而無入手發足之門戶故爾天台法中第三十品作中理五氣以經中數章訓解於其前至出入華房八𡨋之內細微之中下鎮人身泥丸絳宫中理五氣混合百神一章初無訣法在其中只略叙云造化非身外根本此三天上皇無上髙真皆宗仰於紫微上宫如此而已非行用之妙也乃繼之云妄泄此道九祖沈於火毒之獄極口禁傳其末又云非上玄聖師下教天真小仙豈得明矣既如此則非可行之訣特法中條目爾又何妄泄之罰二圖於法中只小異天台不肯言訣法未降者欲存此等事以為賣竒之端也流精玉光品於四顧髙地上建一室方八尺上圓下方開三十二圓穴每穴圓九分塞其三十一穴留一穴令日光直注其中下以寶器貯東方井華水一器迎日光照水流轉一室十日外其五色流精水中結成丹砂五色五綵餌之通神徹視役使萬靈五藏生華返老還童積其玉光丹砂取月華水露水江水山泉河水井華水西流泉入寶器中依前流注日光三十日內有結成金砂再將前砂併入水再迎日光然後以辰砂三黃入金合中煆成神丹可以却疾回年㸃化變寶也詳考法中於四顧髙地建室置器以取日光久可成丹而訣法未降此無中生有之事豈容以意料為之天台法中編出三十六品名隂陽二丹其一章略云流精玉光者可以採錬餌之通真太空未有一物開三景普植神靈復採錬此氣錬而成丹以此而形容流精玉光理亦粗通其次為髙山懸崖人跡不及四顧日月通照之處營密室一所上圓下方面相去八尺四方一丈離地五尺穿三十二竅布二十八宿之形如窗牖使日光注照於內於日直角宿之日起首用七寶之器圓面五寸貯西流水令迎日光下降四十五日之外水中結成五色流精之砂取而餌之面生流精又曰於三十二竅之下置三十二器於直宿之日取其方水投以天華四泉使日月照耀其中四十五日面生浮砂光明嗇嗇然常須護淨勿令塵翳即安置壇爐八門進火以金十二兩作鼎以鐵二十四兩作釜陽燧取火晝夜煎之四十五曰一開開時以月華滌潤下凝白華取之及一斤即入藥用隂陽火煅錬飛於蓋上九年自然飛凝餌之仙化此乃古未降訣法之條天台法中所述雖詳而其說小異於古法然亦非可行之訣古書已疏未降訣之條矣又曰本命日吞日月之華而謂之柏空度仙則非也又採百花入衆藥合靈寶流光丹餌之立𦤺長生亦非也道典中服食之例甚多非本法故不應存用梵氣流行品人禀氣而生亦有數之始呼吸之息見於三部四至之脈一呼三寸一吸三寸以見尺丈於璣衡合於太陽一日一夜一百刻計六千分每一刻六十分每一時八刻二十分共計五百分晝夜一萬三千五百息每一刻三百六十息一呼一吸脈行六寸定太陽行六十里一晝一夜太陽行九十六萬一千五百里隨天周行照耀三百六十五度二十五分半一日得一度半周天一百八十二度六十二分七十五抄一度計一千四百六十四里六寸四分二十八宿行次𨇠度大道梵氣流演無窮旋斗歷箕回度五常每一刻太陽之真氣流行一萬八百里每一刻六十分三百六十息定太陽流光每一分六息太陽流光三百六十里每一時太陽行流光八萬六千四里每一時氣行六千七百五十寸十二時氣血行七十萬八百九十寸曰月交而隂陽交曰月行而營衛行而大藥成此元始上品至道三界真仙莫不因此而骨肉同飛得者晝夜大定中自明閉口奉行若泄一言而行則七祖九玄同受酆都之考玄都之令敢不奉行嘗聞聚而形成則真中有神流演無窮而周於十方此天真之大梵也人身之大梵上應於天度故呼吸息至氣行身中合於太陽積錬而成大藥斯實修真之路入道之階而訣法未降也天台法中第三十七品名大行梵氣乃云人自溟涬大梵而生却自溟涬大法而死此則非也人固自梵氣而生矣不修大梵之經常失大梵之氣而死乃云自此而死其可乎於其九鼎圖後叙金母居西龜之山取象於人身即元綱流演之事爾巳編入本品難以旁引而曲證非可用於此條也黍珠神變品陽爻三十六息隂爻二十四息一口氣出入三寸每一時氣長六千七百五十寸十二時通長八萬一千寸共計八千一百尺為八百一十丈真氣每一時八刻二十分十二時九十六刻內乾坤艮巽占四刻凡人一時定一千一百二十五息十二時共一萬三千五百息每一息定火一銖得祖氣之丹如黍米大重一銖二十四銖重一兩三百八十銖定火一斤一萬三千五百息計真火二十五斤二兩半八隂八陽依卦生焉為聖胎白日輕舉位登玉清也按此條雖訣法未降而理則與前品連續乃錬身中之梵氣合太陽而成功於是按隂陽出入審火候進退丹成藥就大如黍米則神變之丹是矣其餘丹經中論例相似者甚多而非元降之目理不應假彼以證此天台第二十九品名黍珠入妙乃以十遍周竟十方無極天真大神一時同至及元始懸一寶珠大如黍米一段悉取薛幽棲等注中之說委曲引諭又益之雜說却云以內言之即寶珠神化胎仙之法九轉十過功用既周從有入無名黍珠玄丹鎮黃庭之靈府丹成貫日立駕雲輿如此則以誦經而可成丹全不及於修用訣法理則不然矣天台之法四十九品終始並無訣法未降之條而七經人緯為法之要乃隱去七經之日改換八緯之名雖古法無訣者亦極辭牽合以文飾之今按道典自龍漢延康之劫赤明啓運之初傳降不常或隱或顯有因時而降者有因人而降者既降而傳行人世者有其人升真而書隱者三洞正典尚不能全如變化七十四萬之法藏天隱月之文八禀十訣天關三圖九赤班符胎精中記似此之名不計其數名存經告之中法不降行于世豈敢因其名而自撰其文哉蓋道運有其時至而靈文漏祕難以人力強求之也靈寶大法古有七經八緯除天台之外諸家編集皆不出此七經八緯一十五條內共有六條訣法未降即採錬祖氣洞陽符法五氣混合流精玉光梵氣流行黍珠神變是也安知後世無仙資靈質之士感聖師神授之詳是古書存其名例也而天台逐事曲為之說使成簡編或取而用豈不誤世今未免再三剖析其源流也上清靈寶大法卷之八
