鰥夫或隱逸之倫或文華之輩或娼優之部或屠宰之行或賦質而頑嚚或失身於盜賊或古來豪傑或近世英雄或公府吏胥或戎門兵卒或地獄幽關之罪爽或城隍里社之拘囚或蒿里黄泉或溟泠水界或九壘重隂之内或五嶽考對之司或證結未終或校量不盡或巳經考罰或未伏典刑或三途謫役之䰟或五苦償辜之𩲸或物精野怪或妖祟邪神或魍魎隂靈或魑魅幽爽或禽或獸或蟲或魚或走地飛空或沉淵浮水或居郊野或處山林或胎生卵生濕生化生或有情無情有識無識或展轉沉滯或返復輪廻杳杳乾坤滔滔今古無髙無下無極無窮品類未詳聲述不盡冥途夜府一切幽䰟悉行拘集前來詣壇受度須至移文牒神虎雄左雌右主吏何喬二大將主䰟七司玉女三部追䰟使者攝召合干宫將吏兵請詳事理疾速徧詣冥關幽路泉曲隂曹九地諸司三元主執山川嶽瀆分野神靈社令城隍典祀宫廟黄泉蒿里掌領幽䰟之司里域地祇典録亡人之所天上地下四海九州應干合屬去處咸令遵禀符命玉札赦宥前件三界十方四生萬類一切幽䰟滯爽並與疾除罪簿落滅惡根出離隂郷悉詣壇所以時並赴不請稽延庶玄澤之廣覃俾隂靈之俱慶十方昭泰萬㝢清寧事畢上聞叙勲如律牒至幸疾速依應施行謹牒右緫召牒自古舊有之蔣氏立成儀亦以常本編入蓋此牒不過欲普召孤䰟而巳非有他意亦不必逺引經文亦初無隱奥難解但其中云若非有色若非無色若非有相若非無相等語全同釋氏之門縱有所出亦不必宜用兼其立成儀中乃牒城隍里域神虎將吏令其放入前件孤䰟如比則是孤䰟並巳赴壇將吏不容其入大失普召之儀矣儻只欲放入赴壇之鬼似不必是行移之詳矣理之所在爾初非求異允中令從舊典考證畧加排整使語言有序庶其易讀仍牒神虎官將依準玉札普行攝召於理可通奉行蔣氏之儀式自從彼科今爲吾黨之士備用不須彼此混淆給散孤䰟錢籙關靈寳大法司當司今月某日爲某人崇建某齋普度五道三途四生萬𩔖一切幽䰟除巳沐浴朝眞享供受度聞經聽戒咸俾升遷今有太上生天寳籙酆都山眞形元始靈書中篇别有印經於此間開冩銀錢等物並不限數目合行給散須至專行右關六道功曹法官有平日所用得力將吏於此添入請同共監散當處里域土地等神引上到壇一切孤䰟將前件符籙經文等物恭承道力變化無窮逐一當壇盡行給散矜在周備毋使缺遺各令率領事畢並行發遣前詣合屬眞司證品超度施行故關遣發奏申文檄關齋壇多用三界文牒而巳此外行持符法祈告眞靈斗宫五府諸處關文以備緩急行持施行而用故併録于左功曹緫帖靈寳大法司當司據入意除巳録奏天廷關申三界外須至移文帖三界直符使者四直功曹十二時直主者六道功曹監齋直事某處里域土地齋壇内外干係等神各請照詳今來建齋事理即爲上開諸天宫闕普達三界靈司庶得萬聖鑒觀百神受軄進謄章表翻布符文通達關申宣傳號令上極太空之際下窮無底之淵所向必臻無逺弗届應聲受事隨召關靈俾齋直之圓成庶顯幽之利濟福覃無外澤被有情散席解壇叙勲遷賞録奏天關一如太眞之儀故帖發上界申奏關靈寳大法司當司恭膺法籙佩受符章𨽻役靈寳南曹分軄童初翊治遵行科典格許關申況有急切之懇祈合憑傳奏之曹局今有文狀上詣天廷須至專行關發者一奏狀幾方函封印全上詣某宫逐一開具右關某日某時當直功曹二使者請神馭雲飛使車電激瞬息而翺翔萬里呼吸而騰翥九霄文狀上通悃誠俓達如或邪魔邀截故炁干侵即請攝赴眞司擒解天獄仰遵大道垂科之意以廣上帝好生之恩亟切齋持斯須報應故關發中界文字關靈寳大法司當司受軄三天南曹𨽻名五元素府理合紏彈妖妄法當濟度顯幽事有關申格須曹局今有文狀前詣中界眞司須至關發者一申狀幾方函封印全詣某所申上右關中界功曹使者請乗飈亟往飛歩潜通遍詣眞司悉聞中界俾文移之速達庶報應之早彰或無道魑魅干侵或不正鬼神邀截即仰擒解就近嶽瀆束送所屬城隍研窮罪源上昭天憲立俟捷疾幸勿稽遲故關發下界文字當司恭受靈文獲膺大法普利人物緫治幽冥旣列司存合遵儀範有關申之急切當曹局之通傳今有文移前詣下界眞司須至關發者一申狀幾方函封全詣某所申上右關下界功曹使者請潜通鬱絶下徹重泉赴地界之幽宫入冥關之隂治咸隨所詣各與通陳疾速以即闡威靈亟切而明彰報應幸勿稽滯即使遵行故關發三界直符關靈寳大法司當司攝三天執法之任𨽻五府記室之班典格攸存關申合通於三界科儀昭著表文當徹於九霄今有急切詞陳須至緫行關發逐一開具右關三界傳奏功曹使者承差官將吏兵請分馳神騎各赴眞司上達三境九霄下徹十天六洞普遍入紘之外以及四維之中洞府嶽瀆之曹神靈宫廟之所逓文移之速達敷詞悃以急通疾作傳馳闡威靈於人世昭示報應叙功賞於天廷即邁雲程幸毋稽滯故關九皇土壘聖位第一壘色潤地土皇君第二壘剛色地土皇君第三壘石脂色澤地土皇君第四壘潤色澤地土皇君第五壘金色澤地土皇君第六壘金剛鐵色地土皇君第七壘水制澤地土皇君第八壘大風澤地土皇君第九壘洞淵無色綱維地土皇君上清靈寳大法卷之三十一
