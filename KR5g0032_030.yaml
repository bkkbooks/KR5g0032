body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金允中編奏申文檄品神王牒牒文似乎輕急可比三元用申亦好靈寳大法司牒上東方無極飛天神王當司據入事須至移文牒請詳事理即與關告靈寳官屬使者大神三五功曹左右官使者左右龍虎君侍香金童傳言玉女五帝直符飛章從事促炁功曹靈寳法中官將吏兵一合下降悉赴齋壇頒告符文通達章奏宣布號令衞䕶齋修庶使福被顯幽恩霑家國生靈蒙祐動植咸休事畢上聞叙功遷賞一如太眞之儀牒至幸疾速依應施行謹牒右神王或專牒則十方各一道牒若則用一牒則依法中直日請一方神王關告也將吏緫牒靈寳大法司牒當司據入事須至移文牒上請靈寳經籙法中仙官將吏執軄萬神童初府一炁都統大將軍直月五將十二時直主者五府仙兵將吏雷霆歘火律令大神五雷使者雷公電毋風伯雨師社令雷神追䰟攝𩲸合干將吏傳達章奏衞護經科符圖印訣中官將吏兵各請照詳事理㑹合本屬典祀正神監勒里域土地内外干係神靈併力同心自某日建齋掃除故炁不祥辟斥厭穢妖異整肅内外守衞壇場通達齋誠升進章表所有到壇係薦亡䰟及五道三途四生萬𩔖新亡往逝惡死横終有主無親含情抱識一切沉靈滯爽請爲開明性識省悟執迷毋令着體戀尸悉俾和𡨚釋恨使其自知形骸膏於土壤䰟𩲸屬於虚無昔時疾患損傷無身可慮往日情縁恩愛回首皆空復彼一眞釋諸外惱轉輪不㓕仙化成人然後齋福恢洪善功昭著恩普霑於動植澤廣浹於顯幽國安民豐欣樂太平散席解壇言功遷賞一如太眞之儀幸請疾速依應施行謹牒右件奏申牒文並關上界直符日時主者傳達所有奏申之數自可隨事增損酆都狀謹申上北隂酆都宫靈寳大法司當司先據入事須至録狀申聞者右謹具申北隂酆都大帝伏望聖慈特垂矜允暫迂法駕畧届齋壇證録精𠂻鑒瞻修奉庶使齋功成就靈滓普覃福被顯幽澤霑寰宇生靈蒙祐家國承休仍乞專降指揮行下北都羅酆洞隂鬱絶境界六天十洞幽獄冥司應干合屬去處依法照應咸令遵禀符命拔度亡故某人等䰟反五道四生三途萬𩔖運風掃山之鬼擔沙負石之徒穿地引水之龍受報償辜之軄一切沉靈滯爽並與疾除罪簿落滅惡根赦宥罪瑕蠲除執對隨兹召攝遣出重隂盡解沉迷俾膺齋福如所攝亡䰟考證未畢不應遽原亦乞差撥官將時暫引衞赴壇昭示報應敢祈早賜施行謹狀東嶽上卿状謹申上東嶽司命宫靈寳大法司當司據入事須至録狀申聞者右謹具申東嶽上卿司命眞君伏望眞慈曲垂矜允特迂仙馭俯降齋壇證録精𠂻鑒贍修奉仍乞眞旨行下五嶽宫曹天下名山洞府福地靈墟治化靖廬及茅山華陽良常洞天地肺福地神庭仙館中界治軄及九州分野城隍社令應干合屬去處依格照應咸令遵禀符命拔度亡過某人等䰟及五道三途四生萬𩔖以至運風掃山之鬼擔砂負石之徒受報償辜拘䰟未解一切沉靈滯爽並與削除執對赦宥罪瑕超出冥途俾膺齋薦悉行遣發隨召前來如所攝亡䰟未合遽行原釋仍乞指揮逐處主者差撥官將時暫押送赴壇昭示報應恭聽天㫖施行庶使善果圓成宸休普浹生靈蒙祐動植霑恩謹狀五嶽狀謹上申東嶽帝宫靈寳大法司當司據入事同前右謹具申東嶽天齊大生仁聖帝伏望聖慈曲垂矜允暫迂仙馭垂盻齋壇鑒録禱祈證明修奉庶使齋功成就天澤普霑家國蒙恩生靈均慶仍乞專降指揮行下所屬曹局冥獄幽牢及九州分野洞天福地名山大川祀典靈壇城隍里社應干合屬去處同上郷狀式南嶽司天大化昭聖帝西嶽金天大利順聖帝北嶽安天大貞元聖帝中嶽中天大寧崇聖帝右四狀並同東嶽狀式餘四嶽方函各詣某嶽帝宫凡東嶽狀不可稱泰山府君直云申上東嶽帝宫若申泰山府君方云申上東嶽泰山府泰山府君狀狀謹申上東嶽泰山府君靈寳大法司當司據入事云同前右謹具申東嶽泰山府君伏望神慈曲垂鑒録特迂雲馭俯降齋壇成就善功證明修奉庶使顯幽蒙祐家國霑恩仍乞行下嶽府所理冥獄隂曹及天下名山洞府福地靈壇治化靖廬神庭仙館及九州分野城隍社令應干合屬去處依格照應咸令遵禀符命拔度亡過某等䰟及五道三途四生萬𩔖以至運風掃山之鬼擔沙負石之徒受報償辜拘纏未解或因事候證或有犯自纏一切沉靈滯爽並與削除罪對原宥愆瑕超出冥途俾膺齋薦悉行遣發隨召前來如所攝亡䰟未合遽行縱釋亦請差撥官將時暫護送赴壇昭示報應庶使善果圓成宸休漙浹生靈蒙祐動植霑恩謹狀洞天福地狀謹申上某洞天靖治主録仙眞狀同式乾坤之内十洞天三十六小洞天七十二福地及漢天師依古跡興復二十四治嗣師増立四治晉許眞君鎭弭妖孽立三十六靖共一百七十八所若逐一申告則非獨文移繁冗又且醮位數過多或以十洞緫作一狀之𩔖則必無投下之司反就礙理今止以洞天福地與建齋之地同郡邑者當就近申之無則巳之蓋巳於狀内陳乞頒行矣更請酌詳而用靈寳大法司當司據入事同前右謹具申某洞天主録仙眞伏乞照詳申請特迂仙仗俯降齋壇成就善功證明修奉仍乞關吿所理仙曹靈域掌録隂𩲸校量功過應干合屬去處咸令遵禀符命拔度係薦某等䰟及五道四生三途萬𩔖一切沉靈滯爽並與疾除罪簿落滅惡根䟽理拘纏隨召遣發赴壇昭示報應即使謫役停於隂境考對罷於冥關慶浹顯幽福周寰宇立祈照應施行謹狀九壘狀謹申上第一壘土皇府九壘聖位在後第一壘有四位土皇君九壘共三十六位土皇君然每壘四位當共境界未免一壘共一狀也靈寳大法司當司據入事右謹具申第一壘土皇君伏望照詳申請特與關告九壘地司主執聖衆各迂神馭俯降齋壇成就善功證明修奉仍乞行下逐處土府冥曹主理罪福拘役亡䰟應干合屬去處依格遵禀符命拔度亡過某人等䰟餘同東嶽上卿狀酆都曹僚狀謹申上紂絶隂天宫共二十八狀同靈寳大法司當司據入事右謹具申紂絶隂天宫主宰眞靈伏望聖慈曲垂省録特迂神馭俯降齋壇成就善功證明修奉仍乞行下所理幽獄冥曹主掌死䰟罪福校量世人功過應干合屬去處咸令遵禀符命拔度係薦某人等䰟及五道三途四生萬𩔖一切沉靈滯爽並與疾除罪簿落滅惡根解釋𡨚讎罷停考對悉行䟽理應召赴壇如所攝亡䰟未應遽行原釋亦乞差撥官將吏卒時暫引衞前來昭示執應庶使玄恩普浹齋福廣覃幽顯同休生靈均慶拱祈照應施行謹狀酆都曹僚聖位紂絶隂天宫主宰眞靈大煞諒事宗天宫主宰眞靈明宸耐犯武成天宫主宰眞靈恬照罪炁天宫主宰眞靈宗靈七非天宫主宰眞靈敢司連宛屢天宫主宰眞靈泰素妙廣眞君隂德定休眞君洞明普靜眞君玄德五靈眞君最勝耀明眞君寳宿昭成眞君神變萬靈眞君無上正度眞君飛魔演慶眞君五化威靈眞君酆都髙明司直酆都東明眞公酆都南明眞公酆都西明眞公酆都北明眞公酆都鬼官北斗君酆都大禁晨酆都中禁晨酆都侍帝晨酆都鬼官司命宫酆都丈人宫主宰眞靈酆都北都宫主宰眞靈巳上二十八狀方函各詣其所酆都宫諸府八牒並同式酆都變生府主者酆都五道府主者酆都泉曲府主者酆都北天修門郎酆都南彈方侯酆都北彈方侯酆都溟泠大神酆都西明郎牒式靈寳大法司牒上某府主者當司據入事須至移文牒請詳事理疾速行下所管幽獄冥曹主掌亡䰟考録罪福應干合屬去處咸令遵禀符命拔度亡故某等䰟及五道三途四生萬𩔖並與疾除罪簿落滅惡根䟽理拘纏隨召遣發如所攝召亡䰟未應遽行原宥亦請差撥吏兵時暫引衞前來昭示報應仍冀神馭光臨證明修奉庶使玄恩廣浹齋福普覃寰宇清寧顯幽昭泰牒至幸火急依應施行謹牒九州社令牒靈寳大法司牒上揚州分野社令神君當司據入事須至移文牒請詳事理疾速行下當州分野名山大川城隍里域祀典靈壇治軄神司應干合屬去處咸令遵禀符命拔度亡過某等䰟及五道三途四生萬𩔖以至浮遊郊野留著坵墟有主無親新亡往化一切沉靈滯爽並與䟽理狗纏放停考執原除罪罰解釋𡨚尤隨召前來以時遣發如所攝亡䰟證結未終不應遽放亦請分遣屬吏部衞赴壇昭示報應仍乞神驂垂賁同證齋修庶使善果圓成天恩普博人世遂有生之樂冥途無不祀之䰟幽顯同休寰區均慶牒至幸星火依應施行謹牒揚州兖州青州徐州雍州豫州梁州荊州翼州右九州社令九牒並同式如或只用一牒則專委建齋處所屬之州社令請專牒關告牒後則云牒請詳事理即與轉牒關告某州開八州名各處社令一體行下逐處名山大川同前結尾本郡城隍牒本縣城隍牒同式靈寳大法司牒上某處城隍主者當司據入意須至移文牒請詳事理疾速行下管屬靈壇典祀社稷神司里域衆靈山林孟長應干合屬去處依法照應咸令遵禀符命遷拔係薦亡故某等䰟及五道三途四生萬𩔖新亡往化惡死善終有主無親迷眞惑性或拘留里域或執對牽纏或取㑹不圓或考證未畢以至魍魎隂魅山石精靈一切遊神飛爽沉䰟滯𩲸悉行部衞赴壇如所攝䰟儀或係未應原釋之數亦請時暫引衛前來恭聽天㫖仍冀神車早邁營衛壇場鎭肅方隅周旋齋事庶使善功成就宸貺普覃遍家國以霑休極顯幽而蒙祐生靈利樂動植昭蘇事畢叙勲一如玄律幸疾速依應施行謹牒太歳牒靈寳大法司牒上某太歳尊䄂當司據入意須至移文牒請詳事理疾速行下土府諸司及見今營建壇所土神並請時暫起離權行回避如其地有故炁伏尸潜妖匿穢並行收藏屏斥母致干侵應係土府百神治軄去處或有亡䰟因事執留並令遵禀符命遣發前來以時升度仍冀神車下降同證齋修即使善果圓成宸休普浹顯幽蒙祐家國霑恩牒至幸疾速依應施行謹牒蒿里牒靈寳大法司牒黄泉蒿里丈人當司據入意須至移文牒請詳前件事理即與關告黄泉幽境林莽隂郷掌領亡䰟主録鬼爽應干合屬去處根攝係薦某等䰟及五道三途四主萬𩔖新亡往逝惡死善終留滯坵墟浮遊郊野無親無祀失倚失依執對牽纏罪愆拘滯一切沉靈滯爽並與遵從符命疾除罪簿落滅惡根遣發前來恭承齋薦如所攝亡䰟或考證未終不應遽釋亦請逐處計㑹差借官吏引衞赴壇昭示報應仍冀神驂下邁同證齋功庶使家國蒙恩顯幽霑祐事畢具奏依格叙勲牒至幸疾速依應施行謹牒里域帖靈寳大法司帖當司據入意須至帖者帖請詳事理自某日開建爲始即與整肅壇界捍禦凶邪祛斥不祥消蕩厭穢營衛齋事通達文移庶使善果圓成顯幽利濟事畢具奏依格叙功幸疾速依應施行謹帖牒就近典祀正神監壇靈寳大法司牒某神當司據入意須至移文牒請詳事理自某日建壇爲始即希躬親統率吏兵徑赴壇所駐劄監勒里域土地干係等神守衛壇界祛斥妖氛應日前其地或有故炁伏尸須管秘藏毋令發露或停止下官故炁並令火急起離前去不得稽留自建壇一百二十歩内有太歳官君禁忌神煞亦請時暫回避不許衝妨事畢散壇各復元位庶使齋功成就魔障不生福被寰區恩覃幽顯叙功拜表用答神休幸疾速依應施行謹牒巳上申牒文字關中界直符并逐處沿路里域土地等神同共逓發水府狀狀謹申上水府扶桑官靈寳大法司當司據入意須至録狀申聞者右謹具申水府東霞槫桑大帝伏望聖慈曲垂矜允暫迂龍馭俯降齋壇證録精𠂻鑒瞻修奉庶使齋功成就靈䕃普覃福被顯幽澤周寰宇生靈蒙祐家國承休專降指揮行下水府有司江海河源溟泠泉曲應干合