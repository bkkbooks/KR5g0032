front:
  text: 上清靈寶大法卷之三十四仙七
  hash: sha256:453920ec3484393b9b2dd163d4feb73b8ecb3cc19d3a9411e2a431d2d058629d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_033-001a, image: hfl/0970/0970-124.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編受持䇿杖品凡造䇿杖須擇名山福地淨域靈墟用吉日取向南淨竹一枝長五尺五寸通有九節者奉安淨所選甲午丙午丁卯或三月三日五月五日七月七日九月九日將竹第一節左微曲一曲右微曲一曲於第三節下四面開四竅納以四嶽內名於頂中開一冗安中嶽內名又實以靈書中篇各以蠟封固或專意佩持修用者則用五帝符入杖中以黃紋之繒作袋用長短小大僅可容杖凡行事之時於第二節下懸小黃幡一首長七寸幡上書十方救苦天尊號及十方玄化符常行佩受則去幡子又一法杖不曲受禱之法坐卧起息常以自隨至不可隨身之地則置之潔淨處受持既久以杖指天天神設禮以杖指地地祇侍迎指東北方萬鬼束形久久精勤衣蓋竹隱以出入几施為當叩齒三十六通存五帝直符各一人隨方色之服五帝玉女各一人侍衛䇿杖有五色之光映流杖上微呪曰太陽之山元始上精開天張地甘竹通靈真符守吏部衛神兵五色流煥朱火金鈴輔翼上真出幽入冥召天天恭攝地地迎指鬼鬼滅妖魔束形靈符神杖威制百方與我俱成與我俱生萬劫之後以代我形制我五解神升上清承符告命靡不敬聽右呪畢引五方真氣三十六咽止或以三元八節本命生辰請氣行持焚香朝禮或旦旦行持誦呪精誠不倦神真現形杖則載人飛行功滿德就以杖假形倐忽之間巳成真人矣五嶽符東方青地丹書納杖東面南方赤地黃書納杖南面西方白地黑書納杖西面北方黑地青書納杖北面中央黃地白書納杖中央十天玄化符太乙救苦天尊尋聲救苦天尊九幽拔罪天尊朱陵度命天尊六轉念廣度沉淪天尊弘慈廣度天尊聖力無窮天尊轉輪聖王天尊隨願往生天尊大慈大悲大惠真人太慈大悲救苦真四極神靈禀受符命敕三官五帝人九府四司五嶽九幽六洞十宫酆都主者普行拔度一切亡魂出離地獄上生天堂合形東方青帝符青地紅書青帝歌東望重拜手蒼帝玉皇君靈風鼓槖籥育物布元春雲龍轡嚴駕玉樹擁瓊輪枯萌泛霑及大惠無不均萬仙歌以道委曲戒天人心根迷自固拱跽載洪仁南方赤帝符紅地黃書赤帝歌太景闓玉樞洞堂啓金除寒林䕃瑶砌丹鸞踏瓊株寶房名曲麗明璫神所凥飛遊豁雲道引目眄真都天日永不夕重烟鎖青廬太上敕印關帕几羅簡書禆風樹玄化殷勤諒有餘西方白帝符白地黑書白帝歌陸甲抱金闕㭍政守靈壇流鈴擲化火威劔巨龍蟠邈彼素靈真明憲孰敢干束制妖鬼魔凛落霄風寒冷氣既巳息萬天俄而安真儔荷大庇抵顙相歌歡北方黑帝符黑地青書黑帝歌無質統有物淵兮上帝心不啓不發道藴妙化機深恐爾漏未盡隂想忽浸淫輪轉無涯波苦道相迷尋萬年嘗謹約一旦自湮沉無沖落鬼境殃譴不可任中央黃帝符黃地白書此五符即五芽真文黃帝歌萬天拱中宸控駕玉池根翹機貫億曆洞明闢四門大有混黃真紏制星宿魂非帝道不運有方賴之存威忿即霜秋味豫為陽春地成握元紀仰荷戴無垠允中聞之師訓道法之修用多門䇿杖則託物寓靈者也如董真人以神尺而成功皆此類蓋於平居間暇之時受持不廢呪誦精勤則大而可以尸解託形中則可以救危拯厄行持齊醮用以破獄復假上帝靈符資杖之靈神庶幾可以感通溟漠昭煥幽扄近世多有不佩持臨用却於師前請杖用以破獄非格也正受中盟祕籙嗣行靈寶大法五靈䇿杖乃本籙本法之合用者故當擇日依格製就一如科法安置法院晨興朝修之際呪持如法臨事施用不復請降於師前非此法籙之階不當僣用或平居失於佩持則無於上帝之前啓祝乞行破獄真符願降十方生氣五嶽靈𦬊灌注䇿杖使幽關開泰亡爽超升行用一如常曰受持之訣此乃法師存念密行之事近世立科宣白以助觀美且使齊官喜其詳密不知理不應用科文者難以隨俗𥙷綴此等事顯行不若默行所以破獄當請道衆行科而髙功端默存念或有萬一之𥙷而常俗之論又以地獄淵深非可設像於地上而冀其應以形迹而言誠不可行也第科條所列本有此式為髙功者祗當精其念慮專誠告祈於大道乞上帝矜允則獄何患其不開故欲破獄須盡其心以告上帝也既用䇿杖破獄則破獄行用自可連續而古者䇿杖先以自修不專為齊醮而設故破獄之條别作一品上清靈寶大法卷之三十四
