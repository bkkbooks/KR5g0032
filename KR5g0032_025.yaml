front:
  text: 上清靈寶大法卷之二十六彩八
  hash: sha256:e129b5fb279a0c918c4c5113482d5328c25aa3c111a0b3cc082629668397d0d3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_025-001a, image: hfl/0968/0968-084.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金兊中編六幕啓謝品君前用表禮也太子諸王以至宰執大臣用箋用啓亦禮也此世法也道家古來立教之𥘉止有章詞中古以後體效世法遂有文檄表狀夫既參古典而約以禮經則六幕合用箋文舊格用表於師前戾乎禮法矣近者有用疏者及考漢唐朝臣論事皆用疏如宋之上殿劄子之類今師前之疏乃叙事於前而以排句四六之文作右語此又非古之疏體故止從古者上太子諸王之例用箋於禮不悖乃為適中謹按文選有晉梁箋九首內二首上太上箋則稱臣其首云臣某言其末云死罪死罪其餘與朝廷元輔并諸王皆不稱臣首末一同並無中謝若宋朝令格內箋式則與今之表相同只攺頓首為叩頭却不稱臣𠃔中從師傳止於天帝前用奏牘上表其餘列具並用箋通考古今之式則體太子之例用箋稱臣儻依晉梁舊體以散文為之或從今制則對偶排語亦從其便須更典則無𧇊不為致君臣一等其中言詞却以簡切而無䙝瀆為尚若務文詞華麗牽引故事如几世朝廷表箋體則於道典違科誠非以實應天之本意也𠃔中所述姑待一時之用非敢執為定式髙才慱學練逹科教之士自以雄深雅健之文而易之尤幸也啓六幕壇箋六式啓玄師臣某言臣今月某日為某人修建某齊為某事以今肅啓建壇者臣聞龍漢開圖包萬天之祖氣赤明啓運列三洞之明科既宏濟度之端遂有齊修之格輒遵師訓仰叩天閽臣不揆么微濫司教典舒壇闡事庸罄竭於齊盟列欵謄詞以敷陳於哀愫况奉精虔之懇恭攄朝奏之儀儻非仰賴於師慈豈獲上通於帝闕恭惟玄中教主大法師靜老天尊道均天地化並隂陽陶鎔萬象而自不以為功訓育三才而物皆被其澤俯察告齊之至願不違立教之𥘉心接引愚迷矜憐迫切冀章詞之上逹保齊直以無魔俾茲一念之忱上徹九重之聽謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋啓五帝臣某言臣今月某日為某人修建某齊為某事以今宿啓建壇者臣聞混茫資始分三氣以凝真浩蕩裁形列五方而作鎮典功過之録籍司懲勸之權綱將賴帡幪敢攄情懇伏念臣生身麈濁受性昏庸偶藉夙緣獲依冲廕既奉正真之教敢宏濟度之科肅壇襌以朝修列詞章而關啓非仰干於鑒録豈能遂於感通恭惟中央黃帝天君北方黑帝天君西方白帝天君南方赤帝天君東方青帝天君育妙劫𥘉融神化始佐乾坤而拱極秉造化以司方恩浹萬生利覃羣品專體精誠之禱俾成齊直之功悃誠上徹於九霄惠澤遐霑於六合百靈效職十地開光謹奉箋啓以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋啓三官臣某言臣今月某日為某人修建某齊為某事以今宿啓建壇者臣聞至仁闡教垂濟度之明科大道宣慈列齊修之教典人天同福幽顯均休輒録凡悰上陳淵鑒伏念臣蠢愚濁質瑣陋庸資夙際善因獲陶真化愧才能之謭薄念識見之昏蒙行道建齊乃謬當於首職濟生度死慮難格於髙穹匪賴成全曷能就事恭惟下元水官帝君中元地官帝君上元天官帝君斡旋萬化掌握三靈羣生悉𨽻於統臨衆善咸歸於校録况屬齊盟之始敢干考察之司所冀謄啓九清關聞三界赦愆宥過俾齊直以無魔錬魄陶魂庶幽沉之獲度曲停仙仗俯察齊功謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋啓天師臣某言臣今月某日為某人修建某齊為某事以今宿啓建壇者臣聞運偶真期播靈風而育物天開神化宏至道以垂文昭示典彛作成今古爰徼慈佑庸啓清場伏念臣宿藉善因早濡惠澤愧功能之未立念濟拔之當勤况承虔切之辭敢伸關告恭按典章之格用竭修崇實藉提携庶期感徹恭惟三天扶教輔元大法師正一靜度顯佑真君禀資道粹分氣魁靈功拯世於萬方職侍宸於三境陶鎔末學接引將來益恢立教之恩俯録告齊之悃伏願謄詞天闕頒命地司降法籙三洞之官君勑經科十方之將吏禀符受令啓道開關俾齊直之圓成庶幽顯之昭泰謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋啓三師臣某言臣今月某日為某人修建某齊為某事以今宿啓建壇者臣聞運肇重玄列萬途而布化祥開三洞總衆妙以流輝昭示典彛恢張矩範僭孚愚愫仰冒靈司伏念臣拯幽護明功莫先於齊福謄詞列𣢾事實𨽻於師垣况奉堅誠式稽舊典欲期感格須仗恩矜恭惟靈寶度師君靈寶籍師君靈寶經師君立教𥘉元垂科永劫惟經籍度之纍洽傳道法籙之羣書曲軫深仁俯憐後學伏願特迂真馭俯駐皇壇俾齊直之就成庶詞章之上御謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋啓監齊臣某言臣今月某日為某人修建某齊為某事以今宿啓建壇者臣聞道啓冲科遂列齊修之格教敷真䕃乃分典領之司事仰𨽻於玄曹誠用攄於凡悃尚祈淵鑒俯録齊盟伏念臣幻網結坯庸昏受質本無逹識冒玷玄班既承齊主之傾𠂻恭勵法流而孚告祈顯幽之共濟庶遐邇以霑休匪仗鑒觀豈容成就恭惟靈寶監齊大法師真君錬真纍劫宏化萬方恩普浹於迷途澤廣周於後學略停仙仗千靈翊衛於玄壇少振典儀三氣充盈於法界謹奉箋陳啓以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋謝六幕散壇六箋謝玄師臣某言臣今月某日昨為某人崇建某齊巳遂圓成者臣聞天覆萬有塵愚俱賴於陶成教出九清幽顯悉蒙於開度遂令末學獲畢齊修敢罄凡悰荐干冲聽伏念臣建壇行道須仰籍於教科思神念真實難全於典格臣等微行淺陋進止乖踈性愚識昏詞章䙝瀆幸關行之既畢念違戾之誠多拊已自慚捫心有慊恭惟玄中教主大法師功超十極位列三天綱紀隂陽恩普霑於六合扶持造化教廣被於萬方遂令草芥之微𥨸冒師尊之庇伏願大垂矜憫曲賜慈憐原貸深愆削五帝四司之籍鑒昭凡悃超三途九獄之魂澤被無窮恩霑有識謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋謝五帝臣某言臣今月某日為某人崇建某齊巳遂圓成者臣聞元𣑽萌輝靈機運化惟度人之無量故拯世之有經幸依典録之恩獲畢齊修之禮敢殫下悃荐瀆靈威伏念臣禀質卑微賦資愚鈍身濫膺於符籙學未逹於典章列款盟心難抑來誠之切謄詞展敬遂全法席之終慚無善之可書徒積愆之是懼非祈憫濟難冀原容恭惟中央黃帝君北方黑帝君西方白帝君南方赤帝君東方青帝君與道分真隨天肇粹校萬靈之升黜運五氣之循環塵凡悉在於矜包幽顯咸依於覆育願勒修齊之渺福曲寬戾格之深辜苦爽遷神昭六天而清泰含生遂性寧萬類以安平謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋謝三官臣某言臣今月某日為某人崇建某齊巳遂圓成者臣聞瑶壇崇啓既霑鑒應之恩玉節旋回敢罄禱祈之悃奉彛章而荐訴仰靈眷之再孚伏念臣季世凡資塵勞末學一念無統莫知修進之階百過未消豈錬齊修之典徒按儀而就事慮違式以成愆深知譴罰以難逃敢露忱誠而自訟恭惟下元水官帝君中元地官帝君上元天官帝君尊臨九府攝制三元神人悉𨽻於校量幽顯咸資於陶鑄憫兹蠢昧賜以寬容赦失格之深辜宥同齊之衆過恩覃三界願紀勒於齊功澤被十方普超升於滯爽謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年嵗次月日具法職臣姓某上箋謝天師臣某言臣今月某日為某人崇建某齊巳遂圎成者臣聞元綱啓藴開濟幽度世之科真教垂文列闡事修齊之品遂令末學獲畢善功伏念臣體未洞真才非格物誦經行道輒祗事於彛章犯禁失儀實有𧇊於成典惟籍師尊之宥庶寬凡陋之辜恭惟三天扶教輔元大法師正一靜應顯佑真君天目誕靈雲臺錬秀感玉局再臨之駕傳琅函千軸之書願憫凡才益恢洪誓扶持隱顯曲行紀善以頒恩原宥愆非免俾因齊而獲罪暨諸有識同證無為謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋謝三師臣某言臣今月某日為某人崇建某齊巳遂圎成者臣聞妙本無言隨機而設教元樞著式應物以宣慈爰因典則之恢宏俾迪齊修之成就不慚纍瀆再貢誠祈伏念臣猥以凡微叨承化育自顧謬庸之品僭班濟度之司建壇席而行香誦經奉章詞而濟幽度顯幸關宣之畢事愧終始之違科非仗師恩豈逃𡨋譴恭惟靈寶度師君靈寶籍師君靈寶經師君翊天典教宏道傳真振清化而不窮播神休而罔極曲矜末學削罪籍而宥愆非俯録齊忱紀善功而昭惠澤十方均慶九夜蒙休謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋謝監齊臣某言臣今月某日為某人崇建某齊巳遂圎成者臣聞立儀闡事爰遵齊直之規奉教行科實籍鑒觀之澤敢終愚悃荐冒靈慈伏念臣素之青才幸霑玄廕典章莫練濫居濟度之班存念未真謬列關謄之職雖勉強以事竟驚違戾之愆深輒賴矜容亟伸悔謝恭惟靈寶監齊大法師真君主權科範典録教綱巳蒙成就於善功尚冀原除於重譴伏願謄詞九極關告諸司勒齊福以無窮渙真休而普浹合壇法衆咸消紀過之編率土含靈盡迪有生之樂謹奉箋稱謝以聞臣某叩頭惶懼死罪謹言年歲次月日具法職臣姓某上箋𠃔中依按杜廣成齊科列六幕次序參酌古今典禮故用箋文惟五帝近世多以為五老上帝遂列位作東方青靈始老天君之類但五氣在天中則為五老上帝在天文則為五星在地則為五嶽在事則為五常在物則為五行在神則為五帝是東方青帝威靈仰之類是也在人則為五臟夫五氣無往而不在但五老上帝乃五氣之根宗天中之上帝若紏察凡人之功過典録世間罪福恐非天帝所當下臨故玄中法師主領教綱而三官五帝考察功過此五帝實三界之有司而巳若東方青帝靈威仰南方赤帝赤熛怒西方白帝白招矩北方黑帝叶光紀中央黃帝含樞紐蓋舊來有經中注解即以此五帝為五老巳恐不安而有青帝司春赤帝司夏之類乃五方帝也此則當與三官同為考察之司此外五帝之位尚不止此酌其事體則齊壇之位只用東方青帝南方赤帝西方白帝北方黑帝中央黃帝乃為通義不必指五老上帝以為定制况先儒論五帝古今未有酌義而司盟齊事乃三界有司之職故位在玄中之下而與三官同列是尤不可定為五老上帝也貫通經教之士更詳考之又重序于醮謝聖位內矣上清靈寶大法卷之二十六
