front:
  text: 上清靈寶大法卷之四十二靈六
  hash: sha256:e0aa68e1c620f9d4d9b8b5c7d1869cb47944230813f6770af24caf27afac6278
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_041-001a, image: hfl/0972/0972-106.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編傳度對齋品靈寶之道正屬洞玄然而貫三洞之樞機涵諸經之奧妙自徐來勒真人付葛仙翁而經教漸彰孝道明王授許旌陽而科法大備可以安鎮天地保國寧家度死濟生除邪輔正內錬形氣外集萬神坐致自然與道冥合是以得人乃授非才不傳經曰至士齎金寶效心盟天而傳又曰若有至人齎金寶質心依舊格告盟十天然後而付焉蓋齎信所以寓誠盟天所以堅誓師與弟子則飲丹以代歃血分環以示共盟夫以金寶可捨心亦隨之質信不可闕也富貴而吝財不當傳付寒棲而樂道豈在齎金但中古以降三洞宣行授受之規合分次第學則有序不可僣升須先佩洞神部諸階祕籙奉行正一諸法心志無惰利濟有功方詣宗壇受中盟之祕籙進洞玄之上品然後請保舉監度投師録奏上穹關申三界開壇傳授遷職奉行所謂告盟十天即啓告十方靈寶天尊對天自誓也分劵破環則與弟子對誓之條非與天尊分劵也故有三皇版䇿思微定志之劵既係宗壇總教此等儀物並合隨籙出給今更不編敘入法恐越傳法之科從靈寶經格分真劵五靈䇿杖合隨本法行用本法印劍給帖輔職不輕於授受之禮以崇乎經法之宗也故法以傳度終之嗣法弟子先請保舉監度師巳定然後齎香信詣師前投詞具法位姓某右某本命年月日時生本貫州縣坊郭居念某夙藉善因獲陶真化身膺符籙職列班行先曽投度師某人傳受某法奉行巳久曲荷保全深愧無功罔敢退惰謹齎法信恭瀝丹𠂻仰叩師垣願行嗣受上清靈寶大法一宗符圖印訣歸身修奉益勵素心共贊玄猷力揚大教得法之後倘有輕泄漏慢妄傳非人及不守正真混雜邪偽違盟負誓咎道怨師則一身受風刀之誅九祖同酆山之罰謹具狀申保舉師某君先生監度師某君先生度師某君先生伏望師慈特與録奏天關申牒三界合屬真司開壇傳度施行謹狀太歲年月日具法位姓某狀度師受詞即啓告上帝髙真録狀奏聞申牒三界申奏大略格式玉清聖境洞真元始天尊上清真境洞玄靈寶天尊太清仙境洞神道德天尊太上昊天玉皇上帝勾陳星宫天皇大帝中天紫微北極大帝后土皇地祇巳上七狀同式並詣天樞院奏牘式具法位臣姓某誠惶誠恐稽首頓首再拜上言臣待罪靈班久無善行所冝省巳豈應接人蓋以教在敷揚事難寢抑敢謄凡愫上冒髙穹臣謹據鄉貫參受某籙弟子法職姓某投詞伏為自已本命年月日時生行年幾歲昨曽投師傳受正法經今幾時幸沐生成時獲通感兹願進傳上清靈寶大法歸身修奉誓濟顯幽倘或泄於非人以正混諸邪偽酆山甘罪重罰無詞據此堅誠理冝付授臣擬遷輔某人充靈寶中盟弟子南曹執法典者為職須至昧死録狀上奏聖位玉陛下恭望天道睿慈允臣所奏容臣補授傳度施行臣干冒天宸威下情無任戰栗待罪激切屏營之至謹奏太歲年月日具法位臣姓某狀奏右七狀內可漏各僉聖位方函並詣天樞院請進南極長生大帝方函詣南極帝闕東極青宫太乙救苦天尊東極青宫十方靈寶天尊十狀九天帝九狀三十二天三十二狀木公一狀金母一狀奏狀式具法位臣姓某右臣謹據鄉貫云云同前狀至須至録狀上奏聖位陛下恭望道天睿慈允臣奏請容臣輔授傳度施行臣干冒道天宸威下情無任戰栗待罪之至謹奏太歲年月日具法位臣姓某狀奏右諸天尊天帝奏狀並同惟天尊作道慈天帝作天慈金母睿慈十方九天若不能專狀具奏則不可連作一狀大為不便木公金母聖號奏申文檄品內具載申上界狀具法位姓某右某謹據鄉貫云云同奏狀意所有本法合用印篆謹粘連式樣在前須至録狀申聞者右謹具申三天門下泰玄都省主宰髙真聖前恭望真慈允今申請特與敷奏天闕取旨先次原赦臣與嗣法弟子某人九玄七祖前世今生一切罪惡許容傳度仍乞頒告諸天諸地日月星辰三界三元十方世界應干合屬去處依法照應施行某干冒真威不勝惶懼之至謹狀太歲年月日具法位姓某狀中天大聖北斗九皇星君一狀上元天官帝君中元地官帝君下元水官帝君三狀天蓬天猷翊聖真武四聖一狀玄師天師經籍度師五師一狀日宫孝道仙王專狀月宫孝道明王專狀九州都仙太史專狀太極左仙翁專狀三界大魔王一狀五帝魔王一狀右十二狀並同式若專狀與連狀非有輕重蓋上真所治各有其局使其曹局共一所始可共狀如日月異宮三官分府是不得不專狀也外有十方飛天神王合用十牒專行一如狀意更不具式申狀式具位姓某右某謹據鄉貫云云並同奏狀意至須至録狀申聞者右謹具申中天大聖北斗九皇星君聖前恭望真慈允今申請特與敷奏上玄頒行三界各令依法照應施行仍乞恩矜許容傳度某干冒真威不勝惶懼之至謹狀太歲年月日時具位姓某狀申中界下界狀地府九隂酆都大帝水府東霞扶桑大帝東嶽天齊仁聖帝靈寶大法司當司據云云同前至須至申聞者右謹具申北隂酆都大帝聖前伏望聖慈允從申請特與行下九壘重隂六天十洞泉曲冥關應干合屬去處依法照應施行水府狀後攺云行下三河九江五湖四海川源溪洞下元水界應干合屬去處東嶽狀後攺云行下四嶽有司洞天福地靈域名山天下祀典正神城隍社令應干合屬牒式蒿里丈人一牒州縣城隍二牒九州社令九牒並請行下所屬分野應干典祀正神祠廟郡邑城隍社令應干合屬去處依法照應施行其餘欲加詳更自隨事增益或兼傳别法事屬他司者各自申牒可也發放功曹關應干帖式例見奏申文檄品兹不再録發奏巳畢則擇日開壇傳度修設謝恩清醮至期按科奉行上帝請醮狀式具法位臣姓某右臣先據嗣法弟子某人投詞乞傳上清靈寶大法巳於某日録狀聞奏訖謹取某月某日就某處開壇傳度修設清醮上謝天恩須至録狀上奏上清靈寶天尊玉陛下恭望道慈流光鑒映臣干冒道威下情無任惶懼待罪之至謹狀太歲年月日時具法位姓某狀上界髙真請醮狀式具位臣姓某右臣先據云云同前至天恩除巳再行具奏外須至申聞者右謹具申三天門下泰玄都省主宰聖前恭望真慈俯賜下臨證明傳度臣干冒真威下情無任惶懼待罪之至謹狀太歲年月日具法位臣姓某狀中下界請醮狀式靈寶大法司當司先據云云同前至設醮謝恩須至申聞者右謹具申東嶽天齊仁聖帝聖前伏望聖慈特賜降臨證明傳度謹狀城隍社令等神合用者並用牒請醮牒請照會幸垂臨賁歆納醮誠謹牒醮中進狀具嗣法弟子全函臣姓某龍車一乘右謹上進以聞謹進太歲年月日嗣法弟子全銜臣姓某狀進具度師法銜臣姓某上界列真獻狀具嗣法弟子銜臣姓某金錢一分雲馬一騎右謹貢獻以聞謹狀太歲年月日具嗣法弟子銜臣姓某狀度師御位臣姓某中下界列聖獻狀具嗣法弟子銜姓某金錢一分雲馬一騎右謹上獻伏惟聖慈俯賜鑒納謹狀太歲年月同前結右式之外或列位神祇及諸司官將曹局同所者連狀有遣發關引等並見奏申文檄品傳度合用法物銀環二徑二寸四分别無字只鑿度師花押在上銀龍頭書刀一鋼鐵為刃長六寸銀作龍頭黃絹劵文高九寸長七尺二寸鎮綵三丈六尺青九赤三白七皂五黃文二鎮壇米三斗六升鎮壇錢三千六伯文命綵一縑嗣法弟子本命所屬之色全縑則不論數或隨年靈書真劵式具度師銜位姓名押太歲年月日玄科律令會一如洞玄輔職受事訖存留本司照右分劵合同係某人嗣行靈寶大法進品朱篆靈書中篇真文向右反書篆文見玊文篆品須至給劵者詣天送迎已輔某人充具嗣法弟子新輔職衍為職永勤孝忠九祖蒙福靈章下處準格嗣行靈寶大法進品洞玄升秩仙官三天門下南曹三天門下南曹準格嗣行靈寶大法進品洞玄升秩仙官永勤孝忠九祖蒙福靈章下處諸天送迎巳輔某人充具嗣法弟子新輔職銜為職須至給劵者朱篆中篇真文右合同真劵付給弟子某人收執佩帶巳後五苦咸解三惡並原永滅罪籍度上生名劫劫長存與天齊年急急如太上勑令太歲年月日保舉師姓名押監度師姓名押度師姓名押此乃靈寶本法劵文對天分之將右劵度師收之左劵入袋付度嗣法弟子或度師不必留存徑將右劵用狀繳申上清天樞院照應以為弟子修仙學道之證落罪籍上生名則易右劵後語曰右分靈書真劵係法籙弟子某人嗣行上清靈寶大法進品洞玄輔職受事傳度禮畢畫劵示約為弟子落滅惡根消除過籍修仙學道所向圓成乞依玄科施行年月餘同前式環式環者所以昭信誓如古人投璧為盟之義環上本圓無字今宗壇則鑿師押字於上傳法亦然古人舍淳抱朴不事外飾凡事尚質素而已至路真官編天心正法則環上有字其文云天心正法萬神所宗監天而傳循環無終此亦用環之義然皆非古式若靈寶乃洞玄之上品不冝隨俗行事環以示信誓路君臨壇分劵而不剖環其意蓋謂既分劵合約矣不剖環亦可也環則弟子佩之不渝盟而巳髙識之士更冝詳酌而行書刀式右書刀並以鋼鐵為利刃却以銀為龍頭包其末之太半拜章亦同此式惟其有刃可用故備儀以俟削治差誤況分劵尤須刃也今人銀葉為之非也輔職帖式靈寶大法司當司契勘鄉貫居嗣法籙弟子某人投詞伏為自身本命年月日時生夙藉善因獲陶真化叨行正法濫綴靈班敢堅素誠荐攄丹悃先已具申宗壇遷受中監祕籙今願進傳上清靈寶大法一宗符圖印訣皈身崇奉期濟幽顯馘毒除妖輔道贊化如敢參雜邪偽混亂神文或妄傳非人輕泄天寶甘以身謝天地水府三官照得本人誓辭堅篤誠心不回格許宣宏理冝接引除已録奏三天帝闕申牒三界合屬真司依式開壇對天傳度合行輔職受事給付上清靈寶本法祕文合用印劍䇿杖須至逐一開具給帖者一其人巳佩中盟祕籙今來進傳靈寶大法依準科格合行遷輔靈寶中盟弟子南曹執法典者為職一給付上清靈寶大法一部一給付靈寶大法司印一顆通章印一顆越章印一顆黃神印一顆神虎印三顆一給付八景輝靈之劒長三尺六寸一給付五靈䇿杖隨身受持一如科法一準格洞玄弟子芙蓉冠紫帔三十二條黃裳黃褐明光玉圭玉珮赤舄一靈寶大法品屬洞玄總三洞之樞機乃中乘之上法尊貴崇重不同常科應有申告收治並合申三界五帝大魔王依法牒所屬飛天神王每遇給符呪水並關遣神王下使者吏兵施行給降靈寶受事如意大將軍隨行司領職一進拜章書入室修存謁帝朝真飛神啓事焚誦禱請召役神靈並合關召三五功曹左右官使者侍香金童傳言散華玉女五帝直符直日香官依法奉行隨印受事事畢復位應召即臨一追取幽魂攝召魂爽並準科移牒神虎何喬二大聖三部追魂使者七司玉女齎持符札照應施行一修齋設醮宣令傳符並隨事請降十方飛天神王降真召靈符使玄都金龍茭龍驛吏稟符受事宣傳事畢徑復元班一靈寶官屬玉童玉女天將仙兵𨽻屬上玄不同常職準依經格隨事請降輔佐行持法師毋得叱吒指呼其神不係凡世駐劄須當澄心定息誦呪焚符臨目存思密行召用行令已畢各復元班其餘經格外妄稱將吏名目擅置仙曹有司並不許隨俗混行違經雜用故爽誓盟天不爾私帖伏以皇人按筆真毋戒經觀四譯而成書為三洞之要典和天安地福國寧家千聖攸遵豈獨顯幽之俱利萬方取則實同今古以蒙休嗣法弟子某人職品洞玄法遷靈寶誓盟私著傳度巳終事體非輕職位甚重所冝永堅一志密練百神檢已修身毋違科而犯戒濟人利物當立德而建功五帝大魔察其勤惰三官都禁紏其愆非謹祕專精萬氣全而三天錫召輕泄漏慢一身落而九祖罹棄守而有常戒之無忽故帖太歲年月日帖保舉師具位姓名押監度師具位姓名押度師具位姓名押籍師具位姓名已羽化不押經師具位姓名傳度開壇建醮或有力之家宿啓則預行申發晚下敕水禁壇宿啓行科如齋法次日昧爽登壇開啓三時行道朝真懴悔謝恩有靈寶道場三朝科文可用晚下設醮傳度尤為盡善往往世人傳度多止於設醮而巳故今具敘傳度醮式即係受法傳度乃本法之事非黃籙之儀今列于左鋪設醮筵中列上帝兩廡設從聖或六十分或一百二十分中設三寶位置御按如齋壇式設五師幕於壇左神功妙濟真君太極沖應真人於壇右或以五師與二位共幕亦可排列請醮狀牒於師前次發牒道衆師前立班知磬舉法事髙功與弟子各上香致拜髙功長跪請牒道衆捧狀牒華夏至發牒所道職一員吟呪灑淨知磬舉法事髙功焚降真召靈符變神召將次宣白𥘉獻法事次再白亞獻法事次三白終獻法事宣關帖髙功遣發弟子灌酹焚燎向來回向念善晚下設醮如常式上清靈寶大法卷之四十二
