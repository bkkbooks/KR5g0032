壇之內光明洞煥照徹十方項生圎象如日月之明身作金色洞見內外此五嶽不在外也乃身中五臟所配丹經中有圖前假所謂五嶽兵馬則嶽瀆之神皆遣兵馬來護齋壇故自存天之青氣而便及兵馬此乃在外而不在內也凡此行用悉是內外相應而中間一假又言五方五帝則是四時氣候之神巳見於前矣此之所謂五帝者乃身中之氣氣靈則生神如大洞真經中有五帝見於存思者是也以洞經屬天寶而此以靈寶之法故不敢常引也五臟則見黃庭內景可詳考之登壇行齋未免從簡易之法不過思肝出青氣肺出白氣脾出黃氣心出赤氣腎出黑氣先盛於身中擁從鼻出如雲上騰五氣之中各有一帝皆冕旒之服服隨方色氣滿齋壇而我身隨氣之輕浮內外煥然不復血尸穢質光生項後狀若日輪照徹十方光映我身成金色也午朝存想思黃雲之氣匝滿齋堂麒麟獅子如前備守前後天仙地仙悉如清旦之式又思黃氣從脾出如雲之升五臟五嶽五帝真氣從鼻中出當於己時登壇至午時四刻後下壇蓋日景將中陽氣方盛脾土分旺四時而乘離而乃生於南方乃火生土也上應元氣之下孚不可過午時之中氣存思與時不合大為之夫格落景存思思白雲之氣匝滿齋堂白虎獅子如前又思白氣從肺中出如雲之升白虎獅子在白氣中皆如前式又思五臟五嶽五帝真氣從鼻出亦如清旦之法晚朝當於日未入時登壇使氣未全隂白氣方盛上應始氣以合存思也夫始氣在身則屬下丹田而肺乃水之毋肺氣盛於昏時是水將生也故肺出白氣上應而混合也允中竊覩廣成先生杜君編黃籙齋科中敘曰按金籙古儀及黃籙舊法宿啓之夜及言功之時皆先作自然朝然後行齋故啓齋儀云相率先行自然朝至三禮後即告齋輔職説戒宣禁此法自陸先生寇天師相傳至今頗歷年代皆以齋法出於靈寶自然朝為齋之祖宗故先行自然朝示不忘本也近有愚庸之士不逹古賢之情此乃張雲光之謬致使後人逐其波先於玄師前輔置六職定科授簡然後升壇乃云備簡寂先生齋法寡識無知一至於此尚有其黨相效行之不惟獲亂法之愆抑亦受謗賢之罪逹教君子宜共斥之舊法之中相傳錯誤者啓齋言功之時自然朝內合禮靈寶天尊不相傳禮玉寶皇上天尊號此稍失自然朝之本旨恐是年代綿逺書寫舛謬今於此儀巳為攺正非敢臆度惟禮所歸此杜君所敘也凡陸簡寂張清都科中有毫髮之異同莫不逐事考證𥘉非遺去舊文而杜君自為一家之論也論青黃白三色至如早朝存青氣午朝存黃氣晚朝存白氣又注釋曰此乃天地相源之始祖也故生神經云青黃白三氣為三境三宫乃萬代之本始則當時與陸簡寂科書别無差異是以明言三朝存青黃白三色之氣也近者陸君科書多零散不全允中須見數本亦頗相似獨至浙東有人餘傳者皆攺午朝作赤氣其利害甚重且青氣在天則屬玉清境在人則屬上丹田其氣根於肝也黃氣在天則屬上清境在人則屬中丹田其氣根於脾也白氣在天則屬太清境在人則屬下丹田其氣根於肺也此乃出於正經之中是以存身之氣合天之氣各以其時也世人自以傳得科書所載稍異便指為簡寂之定説恐於此理未安况杜廣成先生於陸科中有異同處非不具言是在唐時簡寂之書於此事未有易也後世傳録之久謬誤甚多非至一節兼元科小節不同廣成一暴白其源流所有午朝存氣之色乃是齋中重事若陸簡寂科中午朝存赤氣而廣成先生亦以黃氣當時安得不敘其同異之詳廣成之科奏啓上玄盟告天地後世行用昭昭報應非一蔣氏立成儀所謂考證經典過於廣成博覽古今復於前哲故其建壇散壇並九朝科書須用杜君之文而其典格事情或參用杜君之辭或不取杜君之論立成儀首尾類多如此因其恃髙出前輩超卓不羣然既逐事重行參究自加去取使成一家之學所冝並廣成科書文辭悉不必用盡行重撰使無駁雜不淳之弊自立垂世之規乃為盡善既是不用其説却用其文恐未免璧微瑕千慮一失矣今午朝存黃氣正出杜廣成建壇及九朝等科書中所載立成儀取其文以備用却於午朝自存赤氣易去一朝之存是杜説非也其説既非其文又豈應編入允中曽係度師奏授杜廣成科法故不敢易而允中諸師尊之説則曰混茫之首雜二象而莫形大道之源涵三氣而未肇及其一元既判三靈爰分所以陶育乾坤匠成萬彚道為之基實萬氣之祖自一分三斯為玄元始三氣合而言之謂之大道析而稱之謂之三氣形而名之謂之太上三尊且天失此氣則不能運地失此氣則不能奠人失此氣則不能生夫三氣者經中又曰三素雲也是為天地神靈萬有之祖六合內外皆道氣也道之所在三素居之虛極則靈至靈生神故齋壇中只立無極大道者是總三氣而言之一氣化三氣𥘉不可名亦不可形聚而成形故有太上三尊也教因經而立經以師而傳故列經與師也以致行事則禮師威儀經先存天寶臺中太上三尊左有三十六部尊經右有玄中大法師此經中之説也自經而師以至千真萬靈皆道氣也太上三尊氣之祖也齋科經法非師不傳故禮師也如此則我與彼道也經也了不相干於是以氣合氣以神召神交通之機感激之道也至此則術數生焉消息盈虛休囚生旺各應氣候人之身中亦有三氣而汨於一形不能自靈非先假道之氣不能神我之氣非澄巳之神不能感道之神故早午晚三時不差是成生氣使我身之氣充盈也青氣在人身則屬上丹田其氣根於肝木旺於寅卯之間故取未晨之際是乘木旺也齋壇則先存青雲之氣匝滿齋壇此則天中之玄氣也又思青氣從肝中出如雲之升則身中之玄氣也則是天之氣與身之氣混合然後諸仙兵馬千真萬神拱衛齋壇是感通之義也黃氣在人身則屬中丹田而其氣根於脾土則寄旺於四季本非專旺於子也五行之中惟土居中宫亦無正生之時其生則出於火火旺於午故土乘毋之生氣而盛也是以午朝先存黃雲之氣匝滿齋壇此則天中之元氣又思黃氣從脾中出如雲之升此則身中之元氣也則是天氣與人氣混合然後諸仙兵馬千真萬靈拱衛齋壇是感通之義也白氣在人身則屬下丹田而其氣根於肺也金旺於申酉間日入之時故乘金旺也晚朝則先存白雲之氣匝滿齋壇此則天中之始氣也又思白氣從肺中出如雲之升此則身中之始氣也則是天氣與人氣混合然後諸仙兵馬千真萬靈拱衛齋壇是感通之義也三氣之屬三田而三氣出於肝脾肺皆杜科引經格也肝脾肺者氣之根也上中下三田氣之舍也夫木與火皆陽也金與水皆隂也土則於五行之中主火為土之毋故借火以為生旺之候肝屬木木能生火三體皆為陽故青氣雖根於肝而屬上田者乃陽也肺屬金金能生水二體皆為隂故白氣雖根於肺而屬下田者乃隂也惟脾出黃氣以應土者天五與地十合於中宫而生土居天地之極數為隂陽之根基其源則在中田隨母而旺於已午也故旦以青午以黃晚以白上合玄元始之三氣以至鍊凡成聖證度通真亦本諸此非可以言辭盡端修用之法散在經中氣之象色不同者亦多則非此功法也齋壇所用青黃白三氣備存諸經衆典之內而杜廣成所編齋壇存念青黃白三氣則依據威儀自然經也外靈寶諸經甚廣惟度人一經總包萬法元始所授而道君敘傳為中乘之機要雖天地再造此經亦不可得而廢也齋法出於靈寶今古之所共知行齋則以靈寶大法為宗度人經曰入室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐于青黃白三色雲氣之中內外蓊冥有青龍白虎朱雀玄武獅子白鶴羅列左右此道君所敘之訣也誦經則總三而修存者以誦詠經文可以自早至暮本無定時故不得不備玄元始三氣所謂內外蓊𡨋者亦以人氣合天之氣人天感通之道氣中生象故有四靈之類也齋壇朝修則三時一定不可移易各乘生旺者以人身中之氣遇時而盈庶可上感然先存雲氣覆滿齋堂及思身中之氣如雲之升與經中感通之道一也氣盈成象故早存青龍獅子午存麒麟獅子晚存白虎獅子與經中所用一同也誦經則總而想之齋壇則分存之無二説也杜君本既諸威儀自然經而靈寶法中施用又宗太上道君之經格也主行之士可不深考之存念之法是平居之時冝修其所當修臨壇之際庶可感其所難感若午朝易赤氣出於心而午時火旺其説甚通但先存赤雲之氣覆擁齋堂者若是天中之氣自古衆經之中未常言三境之內有赤氣也與杜君所主皆不同近有妄自尊髙之人專談曠蕩虛無之禮欲效莊列而不至亦以欺世而盜名故於行齋設醮之間悉以大言髙論而覆護其短學者不究其淺深被其愚瞽者多矣至於玄元始三氣亦尋未分之始而言之自九氣而為三氣總三氣而為一氣元故不論玄元始之化三尊不究青黃白之分三色是又以誇談之説而罔人也三氣之為青黃白三色也亦見於三元品誡經中謂氣之始凝結青黃白三氣置在上元三宫中則青陽之氣也左則元黃之氣右則洞白之氣天官主之此皆𨽻玉清而總於上元也則玄元始三氣之分而結成也及其黃氣之下析則結元洞混靈之氣凝極黃之精遂立中元三宫地官主之白氣之下析則結混澤之氣凝神皓之精遂立下元三宫水宫主之乃三氣之分三元此經中之大略也若身中三氣居三田者非以人身直為天地蓋人法天地以成形身中備有三氣也夫天則純陽結輕清之氣以上凝為天天雖非木火之氣然五行之中火則炎上純陽而無疑火因木而生木乃火之母木之本體生於地則聳致之水則浮金水土皆實於木火位居東南安得不俱屬陽哉全陽則在上乃青氣居上田以象天也用其母而子從之是氣出於肝者則身中青氣之根矣天以青陽之氣結上元三宫身中青氣所以舍於上田也水則全隂稟至柔之資以俯潤五行之中水性就下致之於地則滲激之在髙則流萬變無窮終居土下水之純隂亦無疑以水因金而生金乃水之母金之本體出於土堅實沉墜土水火皆輕於金水而金水位居西北安得不俱屬隂哉全隂則在下乃白氣居下田以象水也水舍於下田不為黑氣而為白氣者亦用其母而子從之是氣出於肺也身中白氣之根矣水以神皓之氣結下元三宫身中白氣所以舍於下田也若地則濁厚其根鎮二儀之中地為坤而屬隂然地即土為之體正位於中宫黃氣居中田以象地也且中田乃絳宫也不出赤氣而出黃氣者蓋以氣出於脾而舍於所生之地亦子之隨母也猶青氣之不居肝而居上田白氣之不居肺而居下田是三田者皆三氣之舍也按大洞經黃庭經所載兩眉間却入三寸為上丹田心名絳宫為中丹田臍下三寸為氣海為下丹田存身中三田三氣取法三元三宫則道之絳氣之分而見於身中之體用也存天中青黃白三色之雲乃玄元始之三始則道之宗氣之源也若理五氣於身不捨五行之用金木相見水火降升必索黃婆媒合於中宫乃合四象為大藥是金水為隂木火為陽以土為基也所以青黃白之三氣為萬法之本始萬化之根源肇六極而奠八方生三才而育萬物大包天地細入毫芒何所往而非青黃白三氣耶歷代齋科所行既已悠久自古經典所載又皆明白若一旦以為黃為赤非獨正理難通恐天理亦不順也行齋而存青赤自三氣決不可指作玄元始三氣明矣在身中乃木火金之源而肝心肺生之也金木水火土五行皆一等而乃去水土而用木火金於理安乎心肝脾肺腎五臟同一體乃去脾腎而用肝心肺必有的説也儻以隂陽言之則木火屬陽金專屬隂三氣之中未免二陽而一隂又重輕不等既非上合三境又不通丹經內藥緣齋壇存用早朝先則思青雲之覆次思身中青氣如雲之升午朝以黃晚朝以白例皆如此乃身中三宫之氣上合天中三境之氣也次則繼之以兵馬仍降五方正氣也又明言思五臟五嶽五帝真氣從鼻中出周覆已身彌滿一壇是五臟配五行正用金木水火土五色之氣矣若前來有青黃白三氣出於身中者使不合玄元始三氣則身中五氣之用豈非各有所主乎除此數説之外或欲以天中玄元始三氣易以為青赤白三色雖辨證於元始天尊之前允中之論必不屈也古今正理決難亂也縱有𥝠家收藏經文所載亦難據也故允中不敢遵從其説陸簡寂科書近來被人更易頗不可考第陸君分三洞之源列四輔之目區别真偽考證是非髙絶古今非後世自眩自矜者之比凡前來二三説得理至甚必非出陸君之手其書自宋齊至今將歷千載傳録差誤不一杜廣成齋科於大唐既考三洞經科又參以陸儀為準使其元有此説杜君安得不敘其詳悉於書中其他末節異同尚且逐言之豈應於此略去是陸君之書在唐時尚未訛舛允中所覩者已互有不同今以此等事而未出於陸君則有成廣成之説非惟得亂教之愆亦獲謗賢之罪矣允中冒昧行用巳二十年一遵廣成定格凡從遊同學之士受此書而行之自可安心若是午朝存黃氣而有差謬則是杜廣成輕用威儀自然經而靈寶大法遵太上道君所敘度人經用青黃白三氣亦不當為非允中之罪也若是三寶之位太上無極大道不當存為三尊及玄中大法師之位當增太上三尊則禮師威儀經所載存念之法為不當矣尤非允中之罪也允中從經籍度三師所授而先師乃本杜廣成杜乃本於前諸經青黃白三氣最為度人經存念之本雖别經之中或有異同尤不應捨度人經之本源而行齋也飛天十部妙經總三十六卷其中大半係互相傳録抄寫之本亦有數卷雕印者乃是後世鏤版之書於內度人經一卷其來至古不容差謬靈寶大法以度人一經為宗本存念之要青黃白三色之氣為根源設醮修齋自背靈寶之宗本乃旁引曲證不可行也杜君齋科世間遵用已四五百年後人不可更易者乃以其卷帙尚全非若陸科歷時悠久篇帙零散而可以昏亂之也不為近人又偽入太上三尊之别號𣸸辭三寶之三章天下之衆本可考諸人之𥝠意姑混淆於一時事久而真偽自彰也同學之友奉行此書自可泰然無慮不妨奏告上帝直言所存青黃白三氣於三朝行用乃金允中今遵行杜先生齋科庶可不疑或有失當則非為杜君之誤後丗而三氣存思實出於太上道君經格也允中又何慮焉上清靈寶大法卷之二十一
