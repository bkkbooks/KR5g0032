  text: 上清靈寶大法卷之二十彩二
  hash: sha256:b249095f4f3879f0154ec164d8307e0ce7370fb8e7f6eaf53907253f11aba6ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_020-001a, image: hfl/0967/0967-048.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編登齋科範品表白開啓髙功齋官上香拜臣聞因言而宣意祈精禱之潛通寓物以將誠冀清熏而上格普聞三界上叩重霄道香德香無為香無為清淨香清淨自然香妙洞真香靈寶慧香超三界香三境真香恭謹焚香奏啓供養虛無自然元始天尊上清真境洞玄靈寶天尊太清仙境洞神道德天尊昊天玉皇上帝紫微北極大帝勾陳星宫天皇大帝后土皇地祇東極青宫太乙救苦天尊東華上相木公青童道君南極長生大帝白玉龜臺九靈太真金母元君九天上帝五老天君三十二天上帝五福十神太乙天君上清十一曜星君中天北斗九皇星君南斗六司星君四方二十八宿星君天地水三官大帝北極四聖真君玄中大法師正一靜應真君太極左宫仙翁沖應真君九州都仙大史神功妙濟真君靈寶經籍度三師真君三天門下泰玄都省主宰髙真上清天樞院聖衆三洞四輔經籙法中髙真上聖周天三百六十五𨇠度星真三元唐葛周三真君風雲雷雨電主執聖衆地府玄天北隂酆都大帝水府東霞扶桑大帝五嶽五天聖帝五嶽佐命真君地府玄天主者十宫真君鬼官聖衆四明真公酆都宫洞曹僚聖衆洞天福地名山靖治主録仙真水府暘谷神王九江水帝四海龍王三河主宰四瀆源王蓬萊都水使者十二溪女仙真隂境飛雷電吏國朝祀典聖衆州縣城隍主者九州社令神君黃泉蒿里丈人靈寶官屬法籙中靈官將吏三界官屬一切威靈悉仗真香普同供養香乃玉華散景九氣凝煙香雲密羅徑衝九天當願侍香金童傳言玉女傳臣啓奏上聞帝前令臣所啓咸乞如言以今開建道場恭崇法席奉為鄉貫某人伏為亡過某生於某年某月某日某時受生不幸於某年某月某日身亡今經幾時謹投靈寶法籙弟子某就某處崇建靈寶黃籙太齋幾日幾夜燒香然燈朝真行道告行符命攝召魂儀轉誦真經施食普度先伸上祝祖宗神御社稷尊靈騰景九清升神十極今上皇帝乘乾繼聖法道體天延壽曆以無疆綿皇圖而永奠寰區昭泰邉鄙謐寧兆民永樂豐登萬物不生疵癘三塗苦趣停謫役以清間十類沉魂脫拘迷而升度集兹善果無上良因專為齋主資薦亡過某湔滌愆非解除𡨚對超神北府錬魄南宫回保家門同增亨利以今玄壇崇建齋事將陳次第關行先伸啓告伏願萬靈垂鑒衆聖流光俾功德之圎成庶顯幽之利濟願頒報應拱俟感通拜手清場關行法事次分燈先然一燈於玉清天尊前或就壇上則於三寶前舊式並合用陽燧俟日正中取太陽之火以然玉清前燭髙功却以分燈慧光符撚作𥿄燈執在手中仍請道衆兩貟各執符燭於髙功本位左右侍立髙功長跪奏啓畢方進上帝前以𥿄燭請光在手回本位祝白却分與二侍者以次散點此所謂請光也近有人於道場內並不然燭髙功却先明一撚於手中方行奏啓乃以燈付侍者祝白詣上帝前點之如此則是進燈於帝所非自道前而請光矣理大不通其立説亦有礙兹故及之分燈儀髙功回本位長跪奏啓具位臣姓某再拜上啓虛無自然元始天尊上清真境洞玄靈寶天尊太清仙境洞神道德天尊恭望道慈俯垂省録臣聞九極雲霄之上昭融不間於晨昏二儀寰宇之中顯晦遂分於晝夜陽輝潛耀世尚溟濛隂氣凝根境尤幽昧是以繼明西日真科莫重於然燈接景北都流宥實先於破暗敢祈慈愍曲允奏陳伏念臣委靡凡資塵容陋品雖幸聮於班列久未積於功勤固當退自省循豈敢進而請禱蓋以法先濟物教在利人况受誠詞難抑來悃臣據入意已行録奏於髙穹兹合恭開於法席蘭膏繼夜先祈輝散於一壇靈耀燭幽所冀恩周於三界願頒生氣曲拯沉迷恭望道慈俯垂玄應臣干冒道威不勝戰栗待罪之至誠惶誠恐稽首頓首謹言表白舉十方靈寶天尊髙功進入三寶前如在道場內則入玉清元始天尊前臣聞道運莫窮隨機而示應天輝無外寓物以流光是敢仰叩重玄冒聞霄極恭望特攄大宥曲煥深仁矜此凡忱録兹丹切玉清宸闕鍚道氣以頒恩清微天中布生津而育物客臣請命許以分光煥六極而惠十方昭萬天而輝九地臣俯躬持念以俟流恩元始一氣演化敷光空洞混合幽寥延康苦魂九夜乘晨希陽惡根應化合精桃康萬真順諾生氣汪洋知磬舉三清無上天尊髙功存念如式以符撚於玉清前點之請光入手退本位執𥿄撚於左手道衆二貟各執一未然𥿄撚於髙功左手右立髙功再白臣聞混洞一元一生二而為體凝澄二氣二肇三以為宗天地萬形乃成乃立隂陽品物以育以生孕此靈樞莫非祖氣是用歸誠反本請氣分輝伏願自一分三並三晨之明耀由三及萬流九極之生津體大道生物之神功結元始開天之妙化天上地下永居不夜之鄉人世幽都悉變純陽之境存亡被福隱顯蒙恩髙功以燈分點左右二燭皆然三人執燭燈並立宣呪赤明開圖運度自然開明三景億劫之先今日大願沉魂受錬重昏幽暗永閉寒泉欲請慧光照燭𡨋關氷池溫和爐炭息熖刀山劒樹永斷攀緣回光十方照耀諸天和消五纍業除勾連三晨同輝永劫元元開光童子承恩上仙三光玉女請如斯言髙功密呪道生一一生二二生三三生萬物普燭幽沉臣請氣分輝曲承道廕流祥錫慶上煥天休清衆同誠遍然燈燭二侍者各持燭分與道衆遍點壇席周足却以諸燈聚於玉清前燒之臣謹按沖科仰祈玄佑請光布耀煥暗燭幽伏願大道髙尊玄穹上聖普覃靈廕大霈慈休昭映十方顯明三界人消疵癘魂脫幽沉十類遷升群生寧泰為上因緣念十方靈寶天尊不可思議功德分燈儀近世於上帝前請光之後再詣天師前啓祝宣飄飄帝師駕五列玄上門九光騰煥耀三界普光明金符書玉簡鎮響出虛間太微回黃旗無英命靈幡攝召長夜府開度受生魂此乃是路真官玉堂齋法所用之格洞神正一之崇應行事悉以天師為主與古齋靈寶本科不同後之洞玄法師奉行古法乃亦取此呪雜入其中或再詣師前分光悉為失格兼齋法自有宗本不可混同輕用兼靈寶舊法中只有赤明開圖運度自然呪一段而巳今於此呪外增入元始一氣演化敷光呪乃是祝請之辭巳出於詳密矣自上帝前而再回師前之禮誠不可增蔣氏立成儀分燈又添一呪曰九陽玉清三光道明洞玄靈寶古法中不用今合隨宗𣲖不敢泛取續增矣蓋請光之儀以陽燧對日火光然一燭於玉清前然後髙功致詞再拜進前請光在手回本位分與二侍者以次散點是請之於大道也而浙東有數郡却亦先點一燈在髙功手中長跪致詞道衆却受之以進入三清天尊前逐位宣白文點之方行分光如此則是髙功進燈光於上帝前非請慧光以燭三界也理大不通故今止從舊格金鐘玉磬儀臣聞真文隱妙藏萬化而莫形空洞生神肇一靈而有象是以五篇敷落三洞弘開道之教也既彰教之儀而大備惟典則之具列故制度之聿陳取法隂陽金主剛而玉貴潤配合天地鐘應上而磬徹幽况齋盟已逹於瑤宫衆聖將臨於寶席整嚴班列遙瞻仙馭於虛徐振肅規儀仰睇粹容於杳靄故即器而陳禮異以聲而感神虎躍龍騰瑞氣充盈於法界鸞翔鳯翥靈風鼓振於珂竒肸蠁交通斯須感格臣等東躬請命拜手投誠荐瀆靈威不勝寒栗振金鐘二十五聲伏以崇體弘聲範澤金而定質懸角隆篆振鉦鐩以成音配陽德而上昭肅玄綱而悉舉上極無上隨梵響以凌空真中之真浹靈輝而布祉召陽神呪恭對敷宣元範恢漠九霞映空丹靈顯著五緯交通真陽激切韻合玄宫元始徘徊群仙敬從萬氣齊仙隱微降𠂻道生自然變化無窮擊玉磬三十下伏以浮材潤質惟清緩以揚音廣古修端以倨方而示象法坤體鎮感隂會靈逸響琳琅密格四維之表精𠂻昭徹潛通六極之幽均五氣以𡨋和集五靈而允鑒召隂神呪恭對披宣髙上太虛瓊宫紫房玄壇制器玉磬琳琅霞霄振舉乾坤合張隂生梵唱流演元綱慶雲生門升度沉亡克成髙仙永處福鄉鐘磬交擊三十六下伏以隂召陽凝妙用潛於罔測金鐘玉磬清韻徹於無窮雖坎實以離虛乃水升而火降感激之道自然而然應和之功當舉而舉則剛柔而製器調音律以迎禧鳴厥磬鐘格于上下逹靈神呪恭對披宣混合二氣表隂著陽金和動瑞玉潤靜昌交感上下格于十方杳振玄宫環佩鏘揚靈符所告嚴肅壇場祕範重宣萬神開張振金鐘九聲擊玉磬六下伏以乾蓋上浮坤輿下奠森羅萬象杳冥莫接於形嚴周回十方磅礴難窮於境域然潔齋以事帝豈髙下之散殊惟至誠以感神宜天人之相際兹以壇場將肅鐘磬交鳴韻奏鈞天髣佛神遊於帝所音髙梵唱依稀境類於玄都益勵衆誠同行讃詠次舉法事旋繞出壇引髙功入靖勑水道衆在壇續之預請有威儀道士一人行禁壇法事禁壇儀存三師在西存絳衣真官乘斗而下水盂劔安于地户上上香啓白具位臣姓某誠惶誠恐稽首頓首再拜上啓聖位臣聞一氣之𥘉運隂陽而立極二儀之始肇清濁以開天既育群生爰彰衆化是以五篇敷落稟為經籍之宗三洞宣行大啓教科之緒保制劫運鎮奠乾坤福國康時下禳毒害拔幽濟顯普度天人臣等幻偽結形昏庸受質幸被正真之化獲聮道法之階未能斂巳以潛蹤僣欲宣勞而效職謄詞列款逹凡世之請祈設醮修齋闡虛皇之典格深知越分惟兾垂恩敢陳迫切之情上瀆穹髙之聽臣等謹據入意其諸誠悃具載章詞臣等祇按明科恭開法席九清道境祈一念之感通三界真司願衆靈之鑒映蓋以卑凡之域無非塵俗之區是恐厭汚之妄干或致凶邪之未斥惟假天輝之浹庶令妖祲之消伏願上帝髙尊俯矜奏啓天真大聖曲省辭陳特勑有司給遣官將注靈光於法水寓威耀於神鋒五氣氤氲水從呪而蕩祛氛穢七星煥爛劔隨罡而殄滅魔精十方肅清萬神侍衛號令頒而無逺弗屆詞章逹而有感皆通臣謹復簡存神拱俟天恩報應臣某誠惶誠恐稽首頓首再拜謹言次復簡瞑目左手上帝訣右手劔訣次握固於脅下存想三步九迹召四靈青帝分靈聚真震位修體千尋蒼鱗呈瑞質肇青龍降凶掃穢來立吾左赤帝分靈離宫聚氣晶熒丹彩璀璨赤趐形現朱雀焚滅妖異來立吾前白帝分靈凝真於兊皓姿素質吼動天籟厥狀白虎誅邪剪怪來立吾右黑帝分靈坎宫育質丹蛇蒼龜隂陽配合是名玄武鎮肅壇界來立吾後四靈將軍隨召速臨稟勑受命電掣風奔次近案前就水劔白仍取水劔在手夫劔乃宣威而布令水能蕩濁以流清况誦呪召靈存神請氣故得精邪滅迹厭穢消蹤恭按沖科顯宣天令次以劔橫水盂上取氣謹請東方青天魔王降真氣入臣水謹請南方赤天魔王降真氣入臣水謹請西方白天魔王降真氣入臣水謹請北方黑天魔王降真氣入臣水謹請中央黃天魔王降真氣入臣水五帝大魔萬神之宗麾幢鼓節遊觀太空自號赫奕諸天齊功各降真氣入臣水中臣某奉宣上帝勑吾之劔足濟水火體法乾坤堅剛勵百錬之鋒雪刃涵七星之象指天而妖星殞晦召雷而紫電飛騰吾今仗握叱妖氛三界鬼神皆指攝一揮萬里總澄清地境邪精俱絶滅噀水一口吾之水止流隨勢凝泮以時地六成潤下之功天一生至桑之性渙雨露而發生無外變霜雪而肅殺有常吾今用以滌壇場普召五天鐘正氣一噀六極俱無塵地土緬平成碧王噀水一口次念天蓬呪噀水一口次誦呪行至東方結界謹請東方無極靈寶官屬飛天神王使者吏兵浮空而來降臨壇所行神布氣搜索邪精驅除鬼賊有罪無赦吾從地户結界至東方急急如律令謹請南方無極靈寶官屬飛天神王使者吏兵浮空而來降臨壇所行神布氣搜索邪精焚燒鬼賊有罪無赦吾從東方結界