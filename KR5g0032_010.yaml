front:
  text: 上清靈寶大法卷之十畫一
  hash: sha256:d334a09714715c0771cf46816f4c5a5f8c2ec2e70374b0d24d8cee36d54079ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_010-001a, image: hfl/0965/0965-004.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編本法印篆品印者信也因也封物相付亦執政者所持信也漢官儀云王侯曰璽列侯至中二千石曰章其餘皆曰印此陽世之典格也隆古盛時人鬼各安其所隂陽不雜其倫故道之用唯見於修真錬本以致輕舉飛升中古以降慢真日益正道日晦邪偽交馳上下返覆於是出法以救其弊表章以逹其忱付降印篆以為信志故用印之義近同世俗亦道運因時損益者也但名稱近似世之官府者不可用字畫兼取世之凡篆者不當用曹治僣及天上真司者不應用本職之外而繁雜者不必用靈寶大法古來止用三天門下南曹印近世既缺真篆而三天門下四字不應用於人世除去此四字又為印不成故依本法止用靈寶大法司印其文則天章雲篆也六字之中雖近字體而不可皆識天台雖置此印於不用之地亦編入法中乃大其樣製如靈字寶字悉排此字畫使令端停多類凡篆行其教者印文與中元正𣲖亦不同今既進品洞玄佩中盟籙行靈寶法則職位已重除拜章外上而奏牘下而關申牒帖行移告文符籙三界十方之曹局九州四海之冥司九地重隂洞天仙治幽顯所𨽻並用靈寶大法司印實本職執法之信記也其可雜以他印耶申奏狀方函并上下一體施用惟章并章函通用章印而巳遣章關牒亦用本職印靈寶大法司印自周秦至本朝尺非一等有周尺有秦尺有漢官尺有後周尺至本朝有布帛尺有省尺江淮間有淮尺長短互有不同今本職執法之印合徑二寸五分周尺往往法書言印徑幾寸幾分多不辨尺之長短後有師古之士並從周尺可也周尺比宋浙尺止八寸三分為周一尺通章印洞真之品玉清之道出於晉永和間三茅二計楊郭七真傳降無章奏之格太清正一之道乃玄元後聖付正一天師有拜章之儀用九老仙都君印者以太清同生八老尊太上為師故弟子上聞於師以九老仙都君印洞玄之道靈寶之教自三皇之始赤明之劫其教巳出元有章奏之格出五錬生尸經五老本行經玉宸乃為元始之弟子故以此印通誠祖師也非此法籙不得僣用應而易以他印並受考於三官矣允中按此乃古法中所述宋朝有道之士王升卿重編靈寶法亦依古法敘陳諸家多遵用之其印文於神霄籙亦有之只去絃略以印章奏而不詳本末今此靈寶古法在宋朝之前而神霄之教盛於宣和之間非此法之條不得此而同之其籙中印無絃此既為中乘之重印章文之信記方經同執法印合應用絃如印式去絃則非印也若執法印用周尺則此印亦用周尺用布帛尺則此印亦布帛尺從古尺可也神虎總印七玉女之名也用以印召魂旙而巳神虎行移關牒止用本職印靈寶大法總中乘之要南昌上宫將吏北魁玄範府攝召官君皆所統攝也今人却以神虎總印印之神虎關牒豈有牒其將而用其名可乎神虎雌雄二印神虎本科用於召魂幡上下攝召之信爾有別法不須者自從所傳不用於文移亦可玉札亦止用本職印年月後具法位告行則亦合從執法用印亦可也黃神印越章印正一者旨要所載乃以一印總名黃神越章而徑闊稍大用於布氣治病之間而巳今徑闊一寸八分周尺依古文用二印緊切告祈奏啓上帝不拜正章者用之訣法别出允中恭聞靈寶之道出於無極之先靈寶大法起於中古之後東吳葛仙翁受經於徐來勒真人之時法猶未備晉許旌陽遇諶毋傳日中考道明王之教而科品始彰今稱淨明院非也靈寶無二道晉宋之末齋修方盛文檄漸繁故印篆尤不可缺也漢天師止以陽平治一印而至飛升許旌陽授銅符鐵劵金丹寶經孝道明王之教靈寶之道亦非印多也以致拔宅升舉位列髙穹修真得道上士高仙亦有不假印篆而濟世康時者豈在印之多寡以為法之輕重後世行法者玄奧不逮於古人印篆百倍於前輩近時撰造印記增改舊法為圖利之端者多矣然不過雷霆雜法考召諸書中以行其詐爾天台乃於科教中為異既行靈寶法却不用本職印奏牘乃以飛玄三氣玉章印發之靈寶古法中所無者也諸家編集靈寶法甚重自來不曽增入此印天台於符告中却用三天太上印且符文之降出於上玄今之書篆成於人手告天而行之可也未免列法師銜位於符後三天太上又何預焉三天之與太上非為印文之辭也又其法中有道君玉印則妄也天子王侯謂之璽以道君而稱印不可也以玉為璽謂之玉璽如天子古有八璽秦李斯篆傳國寶天師刻玉為印亦止稱陽平治都功印竟古及今未有於印文內自言玉印者也道君則天中之君如世間人君之璽臣下安敢用之臣上奏於君而復用君之璽可乎此外又有混洞赤文印靈書中篇印八威龍文印元始符命印自然靈章印勑制地祇印歷關諸天印招集群仙印普告三界印似此之類皆以經中四字為一印如嚴攝北酆印明檢鬼營印添一印字湊分三行似此之類則以經中八字為一印如此則世有天篆度人經自首至尾悉可為印不可勝計矣又新行青玄九司法亦古典所無之書其間創立印篆尤衆行持齋醮者又取而雜諸靈寶以用之非也宣和間寶籙宫有髙上神霄元一六陽璇璣祕籙一階即無法也南渡巳後宗壇所授止稱北斗籙而已矣天台而因璇璣之名而集諸書以為法遂製玄靈璇璣府印乃杜達真為之夫璇璣即中斗星宫爾既非下界行持之司又非人間所用之記上箋於斗宫而反用斗中之印豈不礙理如受天心而行北斗醮從本法合用驅邪院印遷靈寶而行北斗醮則用靈寶大法司印有何不可而故欲百計撰造何哉又詐稱玄靈通真靖靈寶玄壇非獨僣亂天儀亦且違冒陽憲金陵之三茅山大洞之宗壇也臨江之閣皂山靈寶之宗壇也信州之龍虎山正一宗壇也歷朝崇奉三洞聖師傳真弘化之地主領教綱之所若民間齋醮建壇於一時事畢撤之豈有私居輒立名號者乎如得通真之妙則天下大利大害分野之災祥數運終始皆能逆知然此等説世法所禁也功行未至固不必狂妄如此世有通真先生者朝廷封之爾非下民自稱也又有九靈飛步章奏司九靈飛步章奏印夫步罡以應九靈即章奏作用之事罡步之名爾天上無此司世間無此印法籙自正一而至洞玄皆可拜章並依本職而巳惟正一法籙用九老仙都印靈寶法籙用通章印古無異説豈待别補一銜特撰一印而可拜章乎且以世法言之宋朝守卒巳上皆得上章表於朝廷不過書所居官以為銜爾不應正銜之外别立章奏之階也天台又有交兵虎符乃朝廷發兵之信民間安可僣竊其名哉天台續編靈寶法新起璇璣法青玄左府法其類不一前後所撰印篆不計其數難以備言如天心法用驅邪院印乃正一之樞要也考召諸術千途萬𣲖莫不總乎驅邪院也世乃厭其稱名常俗多易考召院靈官院之類極多亦以其額為印若雷法名稱印篆邇來人其繁冗殊不知運雷霆於掌上致風兩於目前亦不必印多而後可行也靈寶却不應至此允中今按古書止用靈寶大法司印行也一切奏申符檄也通章印專以拜章也黃神越章印以備急切奏告也只四印而巳此外神虎印用於召魂幡或朱篆七玉女名於幡身不用亦可祈天告地設醮修齋禱雨請晴召魂攝鬼治病考祟拔亡救存二十七品之齋四十二等之醮應世間行持之用盡靈寶章奏之事止以前四印無可不可功成而洞觀徹視行髙而使鬼役神亦不必廣置印篆矣北斗除災醮即四十二等醮中之一也古來即無璇璣醮亦無玄靈府印安可逐時增置靈寶之外兼行别法者自從本科以其印用其符奏申合屬亦只用靈寶本職印可也蓋玉清洞真本無章奏文移靈寶為中乘之極品正一而下諸法不得跨越靈寶故也凡我法友幸謹其初籙階法職品三洞經籙慮運傳行洞真部有上清大洞回車畢道籙一階佩之者稱上清大洞弟子或不佩籙而入靖誦大洞經行大洞功用者止稱小兆臣其大洞經三十九章屬洞真部非是近世之人將度人經中章句指為洞經者也而大洞本品古無法職亦無章奏後世有編大洞法者矣然終非古書也洞神部盛於東漢盟威籙以下諸階雜籙悉總於正一壇天心正法五雷諸法考召之文書禁之術莫不𨽻焉此不詳述其用洞玄部有靈寶中盟祕籙一階紫虛陽光次之靈寶大法𨽻焉佩籙而不行法者止稱籙階既行靈寶法而齋法出於靈寶未免應世接物因事立儀遂出法職亦不得巳而強立名色應時行化者也進拜章詞而氣有所總濟拔幽顯而銜有所稱若法籙職與相皆違未免鬼神切笑林侍宸亦云故立仙階五品以備行用爾自兹而進修不巳積功鍊氣會道澄神善行徹於玄都仙名書於玉闕天界真職於人世俾之宣弘頒羽蓋於青霄召之升舉事符今古德至而然固非先冒崇階職而至也行靈寶經法而欲為異途者有行淨明法而補别職者皆非也並合佩中盟而補本職者也有以太上執法冠其銜者尤非也太上者虛無之神也又曰太者至大之名上者尊崇之義又曰至大無外窮髙而不測故謂之太上又曰無上可上是謂太上夫道則稱太上無極大道及太上道君太上老君宋朝真宗大中祥符八年上玉帝尊號曰太上開天執符御曆含真體道昊天玉皇上帝自此之外則太上二字不可施矣道典中或獨稱太上太上二字者指道君老君也天中君上之稱也猶世之稱皇帝之號也以君之號而為臣稱秦王并天下遂稱皇帝後世因之且世之官爵自一命以上皆出於君而階銜之首稱皇帝某官天子某職可乎宗壇之籙卷首皆稱太上某籙以籙中符篆皆出於太上也若行持之士給符禁治或告行符命皆稱太上某籙符可也是可施之符篆決不可施之職銜籙因出於太上而以籙為階不可以太上加諸銜首矧太上執法真士礙理甚矣太上何置於銜位之中耶人世奏牘有宗廟字皇帝字之類並合平闕人臣階位有帝御前及殿名者並空一字然終未嘗有帶皇帝及天子於階銜者太上二字猶世間皇帝之字也蓋直指君上之位號非御前及殿名指其傍稱也如有上清某籙弟子者則玉清上清太清三境天名三洞以此為别故籙階或冠其首亦非可置諸銜之中也太上二字冒以為銜於汝安乎階銜者巳所得之位也某籙弟千某法之職是佩得此籙傳得此法以為巳銜太上不可得也夫靈寶經法乃法之始也法曰益繁有二十卷者有十卷者有百二十卷者既分卷數仍有品名乃舊格也故今不敢廢也孝道明王之教傳付許旌陽初即靈寶也後世法書混雜而别為淨明法亦多非本文也其餘編集尚多互有所長不容棄置法中奧妙各遵師傳而籙階法職不可易也有謂南曹執法乃行經法之人所稱此外靈寶法不稱南曹不知經法乃本法也今齋醮中告行符命出給真劵典章行用悉出經法中不知源流者却云行齋應世所用靈寶法與經法不同何其淺陋之甚自靈寶以來初無太上執法之階此乃起於天台之謬説諸方有識之士未嘗用之邇來又有不用籙為階却專取經籍之名以為階者尤非也或者以謂南曹之名與靈寶大法司印亦是後世置立殊不知其來既逺而師尊所定大有典刑不悖於理以備應世而蒞法爾較之天台僣稱領教嗣師執法真宰等職以為銜及妄言光中見字偽置靖名以為額豈非妖妄耶近來經法中亦廣職位矣如仙階一等武職六條及排比品秩之類頗漸繁雜悉不當引用不可以為經法所載便行補受忽亂天儀有稱靈寶中盟弟子又曰行靈寶大法於天為不能曉而叮嚀之中盟則靈寶籙南曹執法為靈寶之職其來甚久髙天上帝非不知也佩是籙補是職則合行是事無疑矣豈待再三疏於銜位而後可行耶此執著不通知見允中此書巳行奏告不可忽也今典者一職他法有之靈寶法中舊尚未出因師尊以四階並帶仙字後學不敢當之遂啓告上玄特增典者為初品之職而四階不可除者以俟後之成真得道之士今列五職並以南曹執法冠其首云南曹執法典者南曹執法仙士南曹執法仙官南曹執法真士南曹執法真官允中對越天地啓告真靈重編靈寶大法而法職一事最關典格髙人上士祕訣靈文近者甚難際遇唯籙階法職不勝其崇天台法中第二十六品玄憲仙格中建置法職初職曰三天代筆伏魔持法使者數職之後有玉陛執法真官次列以卿監其終有赤明執法真宰等數職自有天地以來世間未嘗有此法職執法二字起於經法中本只四五職而巳天台竊以二字撰出數十職故加以太上字亦其欲排職位之多而為之爾神仙飛升之後尚有欲界色界之殊肉質凡尸敢下筆而當之耶三官四聖巳上天帝之貴臣可列玉階昔上真降言天帝常有紅雲擁蔽雖真仙亦罕覿面天台徒友恐未可執職於玉陛之間人世朝廷則踈逺之臣亦難升殿陛旡極之階未易至玉陛執法未易當也凡人自稱真宰理未安也道法三千餘年掌教於宗壇者亦以籙為階而法為職次稱天台乃僣稱上清領教嗣師既非籙之階又非法之職天下之大四海之廣洞玄之道悉總之矣斯為領教也自三皇五帝以至今曰三洞真典四輔靈文未嘗有此漢天師正一真人名髙玉籍師表天人至第二代則張隴西也深究天文博通經史考周天分度垂萬世典則實希世之竒才乃稱嗣師至第三代則張鎮南也功業亦盛巳降稱系師矣自兹而下垂二千年閲三十餘代悉稱嗣教天師言嗣傳其教繼襲其師位而巳巳不敢比張隴西直稱嗣師也洞真洞玄宗壇非本姓而以弟子傳教故稱宗師以時君許其傳籙身居宗壇主領傳度天下學士亦以宗壇為重故得稱而人不議此外不拘在家出家受籙行法者紛紛不一宗師嗣師豈可常稱浙西近多有僣稱宗師者矣皆教門之罪人也允中不敢立竒説不敢為髙論編一法則從古科行事則從經典受職於自巳者則從退遜施用於齋醮者則懼天憲一符一呪出處未詳者不敢用一階一職名位稍重者不敢當期天下行持之人早成正道願天下修真之士早遂飛升無他意也允中備見僣冒大職失格犯科者心切驚懼慮其遭譴而望其速攺也如許旌陽歷劫修真而功髙今古年一百三十六拜命飛升天書曰上詔學仙童子許云云辭多而不及具矣拔宅升舉之髙仙止稱學仙童子而巳上升之後方列真職宋朝王侍宸呼吸以致風雨指顧而起雷霆巳是神仙之資品矣有觀書雷神符刻石在饒州神運天慶觀至今存焉符後細書曰五雷小吏王文卿押每字不過三四分前輩其修德也厚其處巳也恭其取名也廉其臨事也懼必不肯自稱嗣師與真宰矣使其果當升舉位列髙仙在世之日尢宜退遜又何損於道德耶允中行法之後進品洞玄佩中盟籙所以止稱洞玄靈寶弟子者以允中先祖諱明於禮不應繫銜而洞玄部紫虛陽光籙之外極於中盟籙教門亦稱靈寶籙故可以回避家諱也他人自從籙階合稱靈寶中盟弟子南曹執法從古書也止補典者遵師訓而不敢當仙真字也唯童初五府正法屬洞神部而通於洞玄者也故可兼職於銜內自此以下諸法雖行而不應繫銜金陵三茅山華陽洞天之中有仙都內有童初府蕭間宫以處男仙得道之真易遷宫以處女仙得道之真非髙品之仙莫得入也上帝封四聖與天師為嗣教外臺卿出法以救世故稱五府府之外館有翊治所以掌其事為堂館中仙真尊崇也事見本法并真誥諸書五府法中仙班七品非世間諸法之比五府雖降法於人間而翊治乃洞天之仙局實有其處非真仙莫能執職其中地界法官未免稱其職而遵其事故曰權童初府右翊治不敢正受仙職也法中而列七職亦以俟真仙也靈寶大法雖崇而執法典者乃是地界行法之司也五府法雖次於靈寶而右翊治乃是仙班是以不得不帶權字也近者諸方有補至丹臺外記室者於心寧無愧乎今靈寶法職五品而初五品之後亦不宜妄行遷進以仙真之字未易當也世人未進洞玄而行升度者多兼南昌受錬司及黃籙事者亦非古格也黃籙院三官主之印記與院額難用於人世林侍宸靈素雷律許用黃籙院印以行齋修終不便也路真官時中立玉堂醮法以正一法籙銜位而行洞玄科品乃越一階而文移行用以天師與上帝同其輕重是其大失也天心法職驅邪院印非出於偽撰主行黃籙固為未當又大勝天台用詐妄法銜雜偽印篆以行之也謹飾之士務從古科方為盡善上清靈寶大法卷之十
