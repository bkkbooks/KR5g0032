  text: 上清靈寶大法卷之十三畫四
  hash: sha256:138adedd362c63fd52f82d5a1d14c5b56179551955f1c7ddf2cbae9b904b9b17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_013-001a, image: hfl/0965/0965-088.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金𠃔中編濟錬幽魂品謹按中乘之法洞玄九真之道乃太上大道君以延康劫初禹餘天上所出其經則洞玄一十一部至漢靈帝光和二年太極真人徐來勒以上清寶經三十六卷靈寶勸戒等經三十七卷授付仙翁葛玄後世稱太極左仙翁者是也洞玄之品靈寶之道至斯而大昭於世仙翁實為傳教之師真也而近者傳行祭錬之法皆稱葛仙翁祭鍊或者又去仙翁字而止稱太極祭錬者尤為礙理夫無極然後太極則天地之始非可以為法書之名若言太極真人則徐君也若言太極左仙翁則葛君也若無仙翁真人稱則太極二字決不可獨用於此及觀諸家所稱仙翁祭錬之文諸方皆以生天寶籙為主其言辭科法悉是今人之體格而徑以仙翁之古科則不然矣往往世人問仙翁嘗以祭鬼而立功遂採其名而編集成書殊不知仙翁生於東漢其文辭體格與今不侔然今之所存依法中典格敘述而用之有何不可又豈特立異名而後可以利濟哉人能澄清志慮整肅形神䖍恪奉行則隨誠報應或臨事慢易存念乖違雖親奉天尊之玉音亦難弘恩於幽壤前後記載所傳耳聞目覩因此書成功者甚衆學者可以究心允中所見祭錬之書不止數十本雖大體相類而其祝辭白語多駁雜其聲音不比臨事難讀今所編符呪行用皆出靈寶諸法中受天心正法以下皆可通行而啓祝行用之言辭則允中之撰集也乃所以廣其事而不至拘執若初行而欲奏聞上帝關告冥司則直辭具述欲發願祭錬孤魂而巳儻云奉行仙翁祭錬大法等語皆涉無根緣此乃法中一事爾行持之士散施符藥以濟生民祭錬鬼神以資幽爽所當為者唯在精專久而已近世行持此者甚多鋭於初而怠於終者皆是也或遇三元八節四赦庚申甲子生辰旦望上七等日為之者甚佳但萬一其間一二有不可免之事奪之則因此而敗美意亦有至期之夜鬼神守待於其地致人驚懼而廢初志者有之若欲持久而可常莫如不拘日分隨時修為或一月而行一次或二三次或有暇而併為之或偶遇良日亦為之並不為定格則在已無失期不滿之念在鬼無徯望待哺之期兩皆無拘其功愈重不執不滯乃可久行或者不以此說為然欲剋日候期者自可從便今每行而不用申奏文移貴其簡易應大建斛食普度沉魂合從本科非此例也造斛每用米一升或二升至數升皆隨力製為淨飯切忌葷穢乘熟裝成一小斛不必用麵食之類有力者自從其厚於其日晚間方造合用符三道降召符真文五幅酆都山形三五本靈書中篇十本生天籙十道紙錢三五貼淨水燭或燈隨力香已上合用之物愈多愈好若隨力建功當用前件也遇行祭錬須於其日晨興盥沐終日齊潔昧爽預行口奏先祝香道香德香無為香清淨自然香妙洞真香靈寶慧香超三界香三境真香滿瓊樓玉京遍周天法界以今恭謹焚香供養三清三境天尊昊天上帝北極大帝東極青宫慈悲太乙救苦天尊南極長生大帝東華木公上相青童道君白玉龜臺九靈金毋元君度人不死尊神九天好生韓君丈人真君九天司馬大神南上司命司録延壽益算度厄尊神靈寶五師真君南方丹天世界朱陵火府南昌上宫主宰髙真錬度官君將吏北魁玄範府神虎攝召官君玉女神將吏兵恭望天慈曲垂省録玉華散景九氣凝煙香雲鬱羅徑衝諸天侍香金童傳言玉女上聞帝前令臣關啓咸得如言具法位姓某輒伸凡愫上瀆天聰伏念臣濯質清時叨承道䕃無功及物有罪積躬僣欲濟度於幽明或可超升於沉滯謹於今日夜就某處備置淨食祭施三塗五道十類四生一切孤魂臣擬書行太上生天寶籙水火真符印給酆都山形普行錬化用濟沉魂但臣夙禀凡資未明真理仰祈矜貸庶可感通恭望天慈俯流生氣容臣書篆許以頒行仍乞天㫖告下城隍社令隂境𡨋關典祀神庭黃泉蒿里掌録魂魄應干神道主執曹僚悉令依應開扄啓閉放釋罪魂定於今日夜亥時來赴壇筵享祀受錬仰霑玄澤以返本真拱俟天恩特垂昭報臣誠惶誠恐稽首頓首謹言如行天心正法即除去神虎將吏却入太玄本際童子六甲開道使者統兵助法神將吏兵至夜起告亦同次白將吏靈寶大法司如行天心正法可云北極驅邪院以今關告執職萬神下元黃籙院開度官君將吏南昌受錬官君將吏北極玄範府何喬二大將七真玉女三部使者追攝吏兵當處里域土地社稷正神疾速赴壇有事啓白存將吏至諸司官將悉以來臨當職恭佩靈章奉行大法立功為本濟度當勤見取今日夜就某處備置食筵薦資孤爽除已啓聞上帝髙真告行符章外今請諸司官將衆神遍詣冥關幽獄夜府隂宫嶽瀆靈墟城隍社令黃泉蒿里主録亡魂應干合屬去處拘集三塗十類五道四生及郊野無歸遊魂飛爽有祀無祀善終惡終一切應度孤魂等衆剋於今日夜亥時悉赴某處伺候祭錬正品超生火急奉行亟切昭報澤覃鬼趣皆自神功急急奉行次書篆符太上生天寶籙此籙誥文式任意寫於後或於籙下開度五道四生孤魂滯魄出離幽暗隨果往生主者遵依符命奉行太歲年月日告下具法位臣姓某告行端坐存思救苦天尊在懸空之中大慈大悲大惠真人救苦真人左右侍立次想南斗蓋頂化身為真人狀然後見天尊遣玉女乘寶光持寶籙下至面前低聲誦中篇一遍便落筆書篆將唵吽吒唎四字重疊書之口念呪曰無上玄元太上道君教臣行符照破幽獄死魂出離急急如律令每用十道每道皆依式書篆之次書水火符各一道並畢再誦中篇三五遍以符篆香上熏過奉安淨所至夜用請真火符太陽氣離訣黃紙硃書日魂呪日魂珠景照韜緑映回霞赤童玄炎飊象急急如律令請真水符太隂氣坤訣黃紙黑書月魄呪月魄曖蕭芳艷翳寥婉虛靈蘭鬱華結翹晝四六淳金清瑩炅容臺標酆都山真形符巳見於錬度品中次持誦靈書中篇三十遍有暇多誦尤佳變食符淨夜行事於空逈處安斛食其斛食邊不用燈燭却安卓子於數丈之外有隙地稍逺尤善卓上却安香爐浮水燈燭行持蓋以食祭鬼不宜人氣及燈燭逼近今人多置閙隘燈燭之中大為非便次法師焚香臨案行事啓聖祝香啓聖位並如清旦式云恭望天慈證盟開度玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙執籙把籍齊到帝前令臣關啓咸得如言具法位臣姓某不避靈誅冒干宸聽願垂鑒映遙賜證盟伏念臣猥以凡資濫司至化輒忘微賤敢有披陳靖惟三途九地之中沉滯十類四生之衆善功罕遇玄澤難霑寂寂幽關欲自新而無路茫茫苦海念超脫以何由固其夙習之所招實在迷途而可憫自非皇天眷宥大道慈憐曷俾沉魂得離隂境臣謹依真教䖍備食筵告行超生錬化之符章持誦大梵靈書之祕典用資萬類普度四生聊輸勤懇之誠少拔幽沉之衆恭望道慈省録天造矜容特降兩曜之英華密布五行之正氣付臣冶錬許以宣行煥幽暗以開明拯沉淪而升度臣某下情無任祈恩俟報之至誠惶誠恐稽首頓首再拜退復本位次焚召符及真文變神召將存想行持靈寶大法司關告將吏如清旦式添五道大神當處土地里域社稷正神黃泉蒿里一切主者火急赴壇請詳照本司巳行啓奏上帝及先來關告事理即今拘集九州分野五道三途十類四生孤魂滯𩲸疾速赴壇祗受祭錬霑領天恩證品超生以時升度急急如上帝律令次變食用真文五道於斛之四畔隨力燒之存五方生氣下注斛食燒符望空吹散於斛上須早變成天廚異饌斛食廣博崇髙或不行靈寶法則用變食符代真文用之每方微聲誦中篇一遍法師逺立行攝召如自行則密吟太微回黃旗無英命靈幡攝召長夜府開度受生魂謹伸召請天道之衆神道之衆人道之衆地獄道之衆餓鬼道之衆畜生道之衆胎生之衆卵生之衆濕生之衆化生之衆普天之下六合之中有主無親合靈抱識三途九夜萬狀千形或男或女之身逺化近亡之衆沉靈滯爽一切孤魂普召來臨受兹薦拔伏聞妙道隱沉運隂陽而立極至神恍愡鼓造化以分形既奠兩儀而生萬物普出陶鎔之內或歸覆燾之中然而民物漸繁俗非朴厚洪荒巳逺世益澆漓冨貴貧賤之變遷為修異習禍福盛衰之倚伏奔走硃途為萌善惡之分遂有升沉之别今古遙遙而既隔幽莫寂寂以無窮倘未能隨業受生終不免任緣淪滯故登涉之流常少退墮之輩頗多是以貧賤異倫死生同等生兮既極於富貴殁也當脫於沉淪若非效職於仙曹則必返躋於貴胄其奈功分厚薄德有淺深或稽舊洛之遊尚駐幽都之駕若乃職分帥閫位列戎行惟知奮力於忠勤豈顧身膏於草野妻兒巳逺祭祀不聞形質無歸精魂何托或遺家就學或挾篋尋師干祿求名偶乖素志懷才抱藝未副初心豈知日月之流不覺限期之及間有身騰仕路位列朝班或功名已極而身危或爵祿未隆而數至或出使於他國或受任於異鄉偶致身命之難全或亦妻孥而莫保固有絶塵而披羽褐削髮而入空門以期玄籍之書欲冀性宗之悟其如進修有分安能一一俱成未免延駐無由又恐茫茫失托或棲巖隱谷晦迹消名避世以無求窮居而獨善豈謂年華易度光景難留蕙帳還空歎山人之巳往松窗既寂嗟處士之何歸幸有生于富貴之家出自膏粱之族貨財燔已聲色逼人事過成空回首悉非我有數窮必逝留形難假人謀有因身口相縈遂為貨財所役或商或賈忙忙毫髮之徒勤以病以亡寂寂鄉關之永隔惟人以食為命故農以耕為生沾體塗足之甚勞東作西成而粗給倘妻兒溫飽雖老死而葬祭以時偶骨肉孤寒因淪落而魂靈不祀以至功居一藝業在九流役役以度朝昏紛紛以歸輪轉棲遲故里或得正終飄泊異鄉多成客死或昧於擇術居屠宰之行或偶然失身於倡優之部及至今日之幻化寧知前路之升沉況林林而生總總而衣或鰥夫寡婦或獨老孤兒或足斷手殘或目昏耳聵或口啞而語言莫辨或性愚而菽麥不分或服毒不救而亡或生産未分而死或遭時疾或陷國刑或因殺鬪而客主遽傷或因呪詛而彼此不利或赴水赴火或自縊自刑或石壓樹摧或蛇傷虎噬生兮萬類死也百端丘隴森森前之朽者莫辨墳塋疊疊後之來者何多青山莾莾為誰家白日昭昭非我晝露冷月明之夜寂寞孤墳風悲雨暝之鄉淒涼空谷或巳焚尸柩散蕩遺骸未悟死生浮遊孤爽人世音容之巳逺泉鄉愁苦以無窮啾啾之聚哭何悲漠漠之幽沈未度與夫精怪魑魅魍魎隂靈鳥獸蟲魚胎卵濕化三途十類五道四生普天六合之中四海九州之內聲述不盡品類未詳一切孤魂萬類鬼爽伏願仰承道力恭仗真科整肅儀刑扶携而來就食精專念慮率勵以共朝真受兹祭錬之良緣赴此潔誠之法㑹普伸告召想巳來臨呪施食斛奉為孤魂上資雲路往生仙界念玉清惠命呪稽首明慧虛無尊稽首皈命重玄主裁成天地無德稱悉為衆生作恃怙慈悲五道轉輪回哀救三途地獄苦皈命金闕天中尊皈命六道慈悲父皈命玉清無上尊巳離生死長綿綿出有入虛無所待能令枯朽變成仙千劫萬劫難一遇為衆廣說業因緣回骸起死永長存使其形神無變遷破獄呪茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲輿定慧清蓮花上生神永安升天呪功德金色光微微開幽關華池流真香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寶㫖目在天堂遊咽喉呪浩晶生法氣氤氲凝天中兩曜共澄徹五緯交相通三光煥巳明寶氣盈三宫帝鄉㑹九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫壽無窮三光流精法食呪妙道生一氣氣中分隂陽凝化日月星燦然流三光九華合九道八色怡八房煥爛洞真體流晶歸大芒下生淵泉宫上列無何鄉縱體復非迹歘然都相忘七寶流精結混沌雜華房咽服九雲散此樂殊未央玉陽法食呪玉陽正真氣妙道三景分元和唱靈音八㑹敷瓊文五老咽丹澤飄飄乘景雲大聖諸天衆駕龍飲玉津三五定生籍遊戲太上京華晃朗無際携手朝玉宸加持法食呪回首仰元羅合景挹靈芒拘魂制七𩲸思臍定中央行住履虛無寢息宴玄房飢餐黃碧花渴飲瓊林漿神旌命大魔合體鍊真光復照觀太空長在空中遊圓通泯波際真花靡終期杳杳無終始行者當明知寂𡪹忘理教應運蕆弘規鑑道不自超要當先所施㑹歸無二處隨心自合離生魂育魄呪靈芝無根衆化之原中凝七魄上結三魂二十四真出入無門杳𡨋之內恍惚元精隨劫存亡逐氣而生外凝混朴內養七真五神植華三台敷榮紫霞素童返胎歸嬰騰雲而升跨霧浮空中有玉真號曰神功左挾無英右衛白元玄獸遏後丹禽擁前上浮翠蓋下擁金蓮香雲凝空甘露無窮用之無盡尋源不終髙功再白上來呪施法食演誦靈文想被殊恩悉皆飽滿今請澄清一念整聚本真各赴壇前受兹錬化次變火池焚真文符入香爐中可燒烈火豐香誦中篇一遍存身中絳宫赤氣騰出漸盛遍滿身外注入爐中化成真火密啓東華上相木公青童道君曰宫太陽帝君伏乞特降正真陽火下錬孤魂存絳宫自空而下注入爐中化成廣大火池烈炎竟天謹召南昌受錬司錬度官君將吏火池主者火錬神將吏兵一合下降引領到壇五道四生一切孤魂並入火池依法冶錬便存符使引魂入錬火錬呪炎神炎神火鈴火鈴上通紫微下徹黃冥却穢錬魂赤帝之靈炎精二神三台流光錬胎易質魄錬魂康穢氣殂落乘煙飛揚隂氣消息陽氣混康精神益滿洞入火鄉混合九氣總契虛皇昊天有勑流金振芒九元煥落利貞無疆須㬰見衆魂出火巳成全潔之身次變水池焚真水符入水盂中誦中篇一遍存下田黑氣騰出漸盛遍身注入盂中化成真水密啓白玉龜臺九靈太真金母元君月宫太隂皇君伏乞特降正真隂水下錬孤魂存真水自天而下徑入盂中化成廣大水池謹召錬度官君水池主者水鍊神將吏兵引領孤魂等衆並入水池如法濯錬存將吏引魂入錬念水錬呪龍漢蕩蕩無形無名渺渺億劫黃道開明神清朗耀九氣吐精玉虛澄輝太霞髙明玉皇開化溥度天人三元道飬二象攝生朽樹故根巳枯使榮蠢動蜎息長生化形懷胎含孕俱得生成亡者命過魂歸三清魄受錬度南宫飛升今曰大吉皆得光明五帝鑒映普告萬靈天神地祗及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大聖至真尊神無窮無極普監度生惡根斷絶玄都記名衆真班列咸聽帝言經是帝勑保誦持人至度道岸無使災侵我奉帝命一切咸聽須㬰見無數衆魂出水悉成玉質仙姿端淨瑩潔此乃先火後水從舊科法錬也或學者依師所授及别有經據或以先水後火各從其便無拘執水火之源一法用肝肺為金母之氣以應木公金母請降隂陽之正氣為水火也或心賢之氣於身中則請降曰精月華皆以應之並可行也允中不敢執為定式聽學者自擇理長之說而行之近有用南極北極以為水火之源則於理難通巳論其詳於錬度品內髙功再白孤魂等衆冶錬既畢仙化成人望闕謝恩皈依三寶第一皈依無上道第二皈依無上經第三皈依無上師孤魂等衆三皈依畢朝謝禮周自今巳後心歸正道母忘善念毋墮邪徑天上人間須持戒律謹當演說永久堅持九真妙戒一者敬讓孝飬父母二者克勤忠於君主三者不殺慈救衆生四者不淫正身處物五者不盜推義損已六者不嗔凶怒凌人七者不詐諂賊害善八者不驕傲忽至真九者不二奉戒專一孤魂等衆既承戒律沾被天恩今謹焚化生天寶籙酆都山形靈書中篇冥財等用各請當壇祗領執詣受生合屬曹局證品超生施行赴壇魂爽受錬鬼神遇此因緣當生警省盡悔昔時之失快登今日之雲便須脫離鬼群正好尋求道妙身為外物生存巳非本真神乃性根亡殁豈能壞滅惟了悟於本始又何礙於死生本性無時而不存至靈著物而自昧幻身有質貴賤總亦成空隂魄無形飢寒安能相纍良由貪戀祭祀是致自取愚迷儻明一性湛然幽路冥關而解脫萬緣不著人間天上以逍遙有遺者乃可成真自沮者多為下鬼令兹善念既發從前惡障咸消洗塵垢以皆空整形神而俱妙更在既悟者勸其未悟先知者覺於後知巳往之跡難追舊事不須回首方通之衢可涉前程切要留心對闕恭辭離筵好去若凡若聖以次前行奉送雲程伏惟珍重焚燎存孤魂皆成仙姿妙體騰空散去次端簡上香謝聖具法位臣姓名謹重誠奏啓三清三境天尊如清旦式恭望髙真俯垂省覽臣不量愚昧僣假符章祭錬孤魂關行事竟施為戾格念慮失真萬罪千愆悉祈原宥以今回兹淨供普施衆生胎卵濕化之倫飛動沉浮之類羽化鱗介畜獸蟲魚共沐天恩同霑道䕃或值網羅鈎餌永脫橫傷償逢陷穽弓刀自逃苦趣身辭異類氣返故根臣巳荷寬恩更祈終宥集兹微善先伸上資社稷尊靈祖宗神識翺翔瓊館遊宴王京今朝皇帝壽永萬春惠加四海禾稼登而人民樂邊境靜而兵甲寧瑞應自臻疪癘不作次冀臣等九玄七祖四友三師內族外姻昔亡往逝普超陽界俱陟仙鄉臣尚願身得道真學逢至士俗門眷屬凡世塵蹤盡依覆育之恩以迪安全之慶攝召官將錬度衆神委績勤勞乞行記録臣不勝感幸無任懷恩之至為此因緣念十方靈寶天尊不可思議功德次白云本司萬神攝召錬度官將有勞神力祭錬周圓功德漸隆進升真秩各還所部悉復元班後召須來一如故事允中撰集祭錬科文符呪出於諸法中但取其簡易可行之條爾施食諸呪年來頗多亦有異同今只取前件八假乃諸方皆用者庶可通行若彼有而無此言辭各别互以為是非者未免省去如其啓祝告遣之辭乃允中區區管見僣行撰述若欲詞章典麗文氣瑰竒則作者自更易之外有每日要出一掬之飯而祭祀者亦佳但旦旦為之頗不易行雖食葷後盥洗畢誦淨口呪亦可為或能勤力遇夜呪施不復啓奏如儀只行其捷徑科法今列于後先祝香具法位臣姓某以今焚香供養東極宫中慈悲太乙救苦天尊大慈大悲大惠真人大慈大悲救苦真人恭望道慈俯垂鑒念臣以今䖍抽淨食普施孤魂欲乞恩光特垂開度變茲凡饌普濟無窮臣下情無任祈恩激切之至次念中篇一遍存此食廣大豐足便召魂謹伸召請九州分野五道四生三途十類一切孤魂赴此食前享今淨供呪食諸呪品見前上來宣說靈章呪施法食三途五苦盡得沾濡十類四生悉皆飽滿即超隂境共陟仙鄉為此因緣念太乙救苦天尊不可思議功德允中不量猥陋冒綴此文蓋以祭錬之功誠為弘博所望同志永堅善心行之益厪造物者必録其功也但前後撰此科文者非不多皆未詳究蓋雖盡善兼其間又有減口施食之類語皆鄙俚以致效學釋典參雜混同悉誤後人舊有一本刋行者施食告戒發遣之後却令人誦天蓬呪一遍此尤不可行也蓋其意恐孤魂滯𩲸留因為妖異自古及今以美意而薦鬼神縱有𡨚對亦可由兹解釋豈應無故及我為讎天地亦不容之何須自起疑心不終善意故機心一萌鷗鳥翔而不下況於鬼神乎至念精純獲無涯之福慶意外之防正不足慮而今之所集非好沽名也務守教綱庶顯幽之俱利略通義理期道俗之共行察允中之用心者則不防備施用之萬一惡允中之正論者則未免招謗毀之百端有毫髮利濟於冥途雖遭紛紜是非於人世皆不恤也乾坤之廣生民之衆又安得人人皆不取之耶諸方祭錬以生天籙為主而浙東所傳祭錬諸科以黃氣陽精符為主又名丹陽錬度符參考上清靈寶古法內不載獨世稱仙翁祭錬者乃有之今來允中所編者專𨽻洞玄本部事屬靈寶合在法中之條乃立功之事故在濟生陽德之後也所有丹陽錬度一符近來法中雖已漸盛然而從古式不敢編入本法允中巳廣此靈寶祭錬一書與衆共之或專行祭錬自欲益此符者更請考詳從便增用也上清靈寶大法卷之十三
