front:
  text: 上清靈寶大法卷之三十三仙六
  hash: sha256:9cc57e1137f7d19aa0b4065ab4e299f4ebcfc2c5cd59901b936e16212ea44963
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_032-001a, image: hfl/0970/0970-112.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編升度符告品太上洞玄靈寶長生度命無上黃籙維國號年月朔日某甲子某州鄉貫某人伏為亡故某人齊意仍就黃籙齊壇乞傳授太上洞玄靈寶長生度命無上黃籙一階付亡某人靈魂齎執過度三界證品超升仍令受持金籙白簡九真妙戒長生靈符救苦真符當消九幽大罪標名九宫察命童子護戒威神五帝直符六宫掾吏自當隨逐簡文覆護受戒弟子天上人間常為身寶須至給籙者三皈依第一皈依無上道寶第二皈依無上經寶第三皈依無上師寶九真妙戒一者敬讓孝養父母二者克勤忠為君主三者不殺慈救衆生四者不淫正身處物五者不盜推義損巳六者不嗔凶怒淩人七者不詐諂賊害善八者不驕傲匆至真九者不二奉戒專一護戒威神察命童子救苦真符符篆元始符命金籙白簡救苦真符告下十方無極世界云云一如告命百二十曹官長生靈符符篆元始符命金籙白簡長生靈符告下南方丹天世界至一如告命回骸起死尊神監生大神帝君品命受度某人靈魂即日恭詣黃籙齊壇拜受太上洞玄靈寶長生度命無上黃籙一階如法受持永充濟拔人間天上敬信奉行一如玄科律令太歲年月日某州縣黃籙齊壇給度師法位姓名押保舉師法位姓名押監度師法位姓名押允中原夫道之始也本無形本無文故不可名不可覩及其析希夷之妙剖混沌之胎於是昭煥隂陽肇分清濁靈虛孕秀空洞生神或聚氣而成章或結玄而示象以致五篇敷落三洞宣行實自然而然應運降世大可以保制劫運翊贊元綱下可以陶鑄黎民昭蘇幽顯莫非出於萬道之祖元始天尊以時宣演立三乘而接物出九等以度人三洞之書因經而籙降自籙而法彰道法之行以符為首亦合之義也蓋符文生於天地之初而涵乎自然之妙施於世人可以輔正除邪驅災拯厄用於冥界則可以超脫九祖濟拔沉魂中古以後齊法興行洞玄之宗靈風䃽物遂使修齊設醮祈告髙穹請命頒符煥燭幽夜亦以符為先蓋符乃先天之妙氣自然之靈章奏告而行隂關開秦無所不禳又豈在於符篆之多名號之異而後可以通感哉近世執法行科之士類不深究此㫖其間所見不同用心失正臨壇行事求勝於人靈寶本法正屬洞玄部其為升度符告如長生靈符救苦真符破地獄拔幽魂符元始符命九龍符命登真度命符普告三界符歷關諸天敕制地祇符四鎮合同符升天三劵據古法符命如此而巳請行符命惟恐不蒙上帝許容奉行儻得一符可應則係薦之魂無不可度又豈可以符多為貴哉今編出靈寶符命不敢雜用他符亦不增添他法符命止用洞玄本科告行符命悉出靈寶正法以全教綱故也學者冝詳辨焉上清靈寶大法卷之三十三
