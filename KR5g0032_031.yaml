front:
  text: 上清靈寶大法卷之三十二仙五
  hash: sha256:7b92fbadfcddf5091687bc4fff201a8a31d5ba26ef742888029501bc886b8124
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_031-001a, image: hfl/0970/0970-064.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金允中編升度符誥品救苦簡符玉誕長桑柏空度仙丹華曜日照破九泉五嶽五帝紅杏墨黑磨針襪臘靈寶三官九府百二十曹幽都北府九幽地獄二十四地獄三十六皇獄五帝考官五嶽掾吏司功司殺司命司録四明真公三界大魔九億鬼王三界衆魂拔出地户九陽光曜照煥重泉萬罪蕩除𡨚仇和釋九祖同升億劫罪魂脫離三塗永辭長夜覩見光明九幽罷對黃簡白簡金光自然安鎮寒泉永劫長存魂升九天無拘天門急急如元始上帝律令聚形誥文元始符命黃籙白簡救苦真符告下十方無極世界三官九府百二十曹五帝考官巨天力士九幽地獄執罰神兵司録司命司功司殺牛頭獄卒三界大魔拔度亡故某人靈魂出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乘此九龍度命功德上生天堂一如告命風火驛傳太歲年月日於三寶前告下救苦符可漏式謹金籙白簡救苦真符告下十方無極世界具位臣姓某封長生簡符元始符命普告三界無極神鄉泉曲之府北都羅酆三官九府十二河源上解祖考億劫種親疾除罪簿落滅惡根上天度人嚴攝北鄷今日欣𢊤受度歷關請天請滅三惡斬絶地根飛度五户名列太玄魔王監舉無拘天門魂度朱陵受錬吏生普度無窮登真度命錬形濯質書名紫䇿隨品受生返生福堂天尊告命敢不敬聽急急如律令聚形誥文元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上宫長生大君韓君司馬司命司録延壽益算度厄尊神回骸起死監生大神超度亡過某人靈魂上登朱宫流火之庭玉眸錬質黃華蕩形書名紫䇿受化更生承此金籙度命功德時刻升遷一如告命太歲年月日於三寶前吉時告下長生符可漏式金籙白簡長生靈符告下謹南方丹天世界真位臣姓某封茭龍驛吏符按册命云茭龍驛吏馳送應謂不用文引只以符傳付也今之行者若未能感通玄虛可作請關符篆於尾庶克達命於玄司也或取新茭縛龍吏納其符於草人身中使負簡文亦須别疏狀告齋酆都不可不啓上真不召驛吏直以私意率易宣此符正猶人間赦命非臣下之敢專故須大醮天地方可告行也玄都茭龍驛吏一十二萬人傳命泉宫開光幽府凡告救苦真符當啓元尊玉帝召關此吏一人也凡書符時搯玉帝訣引北極星光黃紙黑書驛吏隨降篆符紙當以槐黃紙黑書驛吏屇前也北極星光非北斗第六武曲北極乃天皇之右北極乃天樞也救苦真符自非大醮天地不可告行也儻有投詞但當詠禮玄文散燈念道使回光九地輝破八冥所薦逝魂亦獲升度當先置一燈於天尊前拜跪焚香乞降晨光泛燭九夜乃執炬分燈令暉散一輪作一輪如車子大小三級上下三疊然燈四十九盞立十方洞靈天尊聖號開衆生五纍果門假此回光銷鎔五纍也金龍驛吏符世有救恤貧之濟度天人奉戒修齋供養三寶或錬真養神功未充足命窮滅度經遊太隂者方曲行赦命救苦真符外别以柏木簡作長生靈符告下南方丹天世界使擢簡帝堂錬神火府如罪魂無功於天人者不可濫受登真之籙但得覩神輝更生陽界則幸矣故於大醮之初不告長生靈符其符簡尺寸同救苦符式玄都金龍驛吏二十五萬人領符命啓魔道馳信令凡告長生靈符預關一人符用青紙丹書搯玉帝訣引太尊星芒繞筆拂簡畢同符命焚青煙中太尊星自南而望北斗則太尊星在中台下台分中微北向是也太尊星北有四星勢如軍井南有少微北是也少微在亢宿其星黃色而明要在天璇天璣二星正南以鼻引其芒繞簡筆也氣芒各類清濁異歸凡取三光五星之氣當以鼻引而口吐也生旺雲煙之氣當以口吸而隨吐也引吸之時勿使耳聞耳聞則氣芒不降又不可長引長引則喘息失度要在精傾注念御意合神於杳冥之間則吸隨念感降自然也若服御明暉行吐納之道則非此限也右符面朝正東思東極天中金樓玉殿之中見太一救苦天尊衣九色雲霞羽服乘九頭獅子玉蓮寶座左執甘露碧玉淨瓶右執空青枝從大惠救苦二真人青玄童子八十一靈官頂中出白毫相光如刀劒在赤日圓光中一一分明即密奏因依左右結三塗五嶽印吸慧光咽了心念聖號四十九遍再吹筆書不以多了再存取氣吹之變化此符則九州億萬窮魂俱獲升仙更生如度一二亡魂止可用此符靈感無極也九龍符告文東極青宫救苦九龍符命空符右符告下三官九署五嶽九州酆都六洞十宫九幽河源泉曲五道都府城隍社令冥關幽扃一切主者咸領符命救度亡過某人并係薦靈魂洎六道四生孤魂滯魄等衆徑出幽翳永離幽冥地獄消苦開泰泉扄火翳滅𤔵刃毒摧傾下明黑暗上生朱陵超度三塗宿對停輪一如告命風火驛傳太歲年月日吉時告下具法位臣姓某告行方函式東極青宫救苦九龍符命告下十方三界天牢地獄主者具法位臣姓某謹封玉清寶籙破地獄真符符告文普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得狗留逼合鬼群元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超淩三界逍遙上清一如告命風火驛傳年月日吉時告下具法位臣姓某告行內封式玉清寶籙破地獄真符具法位臣姓某謹封方函式玉清寶籙破地獄真符告下三界十方冥曹主者具法位臣姓某謹封玉清寶籙拔幽魂真符符告文元始符命時刻升遷同前至逍遙上清年月日吉時告下具法位臣姓某人告行右二符並以黃素丹書黑書告文內封外封通用黃素墨書造二十道以十道告下十方九道告下九州分野內各一道專用度有姓亡魂下元登真度命出離生死靈符符告文赤文玉清上通紫庭天慈赦宥亡過某及億曽萬祖苦爽遊精削除罪簿落滅惡根速赴生方氣識咸寧上登天堂澄神鍊質真心洞明蕩除隂翳入道登真一如告命風火驛傳年月日時告下具法位臣姓某告行可漏式謹登真度命出離生死靈符告下九幽十方三界主者具法位臣姓某封右符以柏木造長九寸九分闊三寸厚五分簡文背書五行歲月一行共六行為式拔度民庶用之太上敕赦生天寶籙式無上玄元太上生天寶籙敕勘鄉貫某人投詞伏為亡故某人元命年月日時受生於某年月日時命終以今崇建某齋用伸追薦除已録奏天闕請命施行須至出給符籙告下者書寶籙符形度人不死之神南極長生之君度世司馬大神好生韓君丈人右奉大上敕赦生天寶籙告下三界天曹地府山川河嶽泉曲冥關北都羅酆六洞十宫三官九府百二十曹鬱絶之鄉幽隂之境諸大地獄九州分野福地名山城隍社令神物司臨之所仙曹典録之墟校量罪福考察功過一切天牢地獄主者感領符命應亡魂纍劫宿世以至今身所作諸惡根衆罪一切𡨚愆承此太上慈恩並與疾除罪簿落滅惡根不得拘留徑出地府永離幽冥皆證妙果如擔沙負石連汲溟波之衆驅雷役電掃山穿地貫天引水之徒並與斷地逮役永使逍遙即令亡魂從今已去七氣成真六儀成體五靈續絶二曜扶衰旋綱躡空飛步靈宫胚胎有始塵劫無終金城錬質玉洞凝神真氣內養以成真人上入玉虛下洞幽泉雲宫寶闕中有真魂出入福鄉周旋生門咀嚼靈芝灌潄金泉甘露川流玄澍丹田紫霞朝映三氣凝煙瓊室化仙安座金蓮真容掩日塵劫為年一如告命年月日時告下如大齋可於此列六職位具髙功法位臣姓某告行右先望天門密奏訖即將墨筆書赦敕文畢望天門密呪曰無上玄元太上道君教臣行符照破諸嶽或言幽獄死魂出離急急如太上律令敕呪七遍用朱書南斗形寫真諱於其下存天門方有玉童一人乘金光持黃牒下降唵氣書四字了逐一字念四字四遍合形如法施用寶籙符篆並黃素黑書內外封並用黃紙可告二十道十道告下十方世界見道告下九州一道專度列位有姓名亡魂讀訖烈火焚化則得赦宥萬罪消釋千愆魂神內鍊自生徑得上升仙界內封式位同無上玄元太上敕赦生天寶籙告下具法位臣姓某謹封十方三界天牢地獄主者具法位臣姓某謹重封切謂告符命以拔幽靈所藉者符文出於科典及其臨壇行事則奏啓玄穹頒行九地此古法也而近世庸妄之徒專意誣罔世俗故符命不問重輕不究是非悉言自天而下至於印記亦多取二天太上道君玉印之類以印符告殊不知世間朱砂黃紙成於凡人之手而且欲欺詐矯稱天降其為巧計不亦踈乎生天寶籙者如世人宗壇之義符文呪訣出於太上齋盟奏告然後按行故於籙尾具高功位告行言告之於天而行也或者攺為承誥奉行則失本旨逺矣甚至於其間顯言手弒君父不孝二親此事其可赦哉既為人當知逆順殺父弒君豈忍形之言辭而欲免其罪則天地鬼神為之不容雖經科中有時載之今奉行科法不應顯書而行況世間罪目萬狀千條亦豈得一一盡述只略言諸惡衆罪使其符文可以免罪則不具罪目亦可升度若其符不可行則纍牘盈編詳書過咎悉成虛語爾年月之後妄立天相以擬朝廷赦命此於憲章巳自非使兼上天寥邈不可理測不可臆量乃自撰名位以人間朝班而品排上真以罔人求利恐未足贍其軀獲罪以殞軀多不得享其利近又有全取朝廷赦書以為告文者其間有巳發覺未發覺等語此又罪不容誅學者能捫心詳思之凡事近厚稍存正理從其平易可行之格非為一身免受禍於人間亦可使九祖獲逃罪於幽壤又不誤人於無窮之福報度六道四生籙式太上生天寶籙超度六道孤魂滯魄出離幽夜隨果往生主者遵依符命施行年月日時告下具法位臣姓某告行元始符命符告文元始符命時刻升遷北都寒池部衛亡過某人形魂制魔保舉至逍遙上清一如告命年月日時告下具法位臣姓某告行普告三界符符告文普告三界無極神鄉至逼合鬼群一如告命風火驛傳年月曰時告下具法位臣姓某告行歷關諸天符符告文歷關諸天請滅亡過某人三惡斬絶地根至無拘天門一如告命風火驛傳年月日時告下具法位臣姓某告行敕制地祇符符告文敕制地祇侍衛送迎至受錬更生一如告命年月日時告下具法位臣姓某告行右四符若薦度亡魂只專書其中一符只用簡書如救苦簡式若崇建大齋則諸符普告只用黃紙朱書方函如式用之允中嘗考元始符命歷關諸天敕制地祇四符皆出於靈寶度人經法中自古有之因經立法故符不外於經其説謂嗣受靈寶弟子合關升九祖過度一身是以傳度之式給告此符别有行用以之薦拔亡爽則以經中之辭為告文終不越違其本旨天台四十九品中既不修入此法書而其徒臨事却行施用或於本文之上加玉清等事或一符而稱靈寶告命或以一符而稱靈寶符命此語上多不知其意欲更攺其名以罔俗耶或不失出處而妄用耶皆不可續撰名稱也四鎮合同符升玄籙中本好此符又名金文玉劵東一分朱書黃素焚付天門吏南一分朱書白璧投名山福地巖穴洞天之中西一分朱書青繒付亡魂收執之北一分雕金魚之背流之水中並書刻齋意此乃天上人間證質齋功超升亡爽也允中恭按古科四鎮合同分為四分證質三界仍給付亡魂是承齋功出離幽境欲天上人間悉資善功所至逍遙其説甚長其格甚古近世所傳四鎮合同符將一角謂之靈寶符命用普告三界為告文取一角謂之元始符命用時刻升遷為告文取一角為玉清寶籙用歷關諸天為告文取一角謂之靈寶誥命用敕制地祇為告文乃於錬度之時焚於火池中且錬度之時存亡魂在前方行錬度既非追取亡魂又非超度亡魂水火與皆在壇而焚四片合同符何説也合同之義安在也其誑妄之源流波未泯台山且有文過之語云所度亡魂巳自升天不必合同於三界此禺弄俗人可也自古黃籙埋簡以告齋於三界使齋功無所不及也況亡殁罪魂一經薦度錬除隂翳得脫重泉之中或得隨品受化巳是大幸便欲使徑上九天可乎四鎮合同給一片付亡魂則髙功自揆巳之功德行業未能通逹幽冥縱使髙真垂憐悉可其奏尤未明能審亡瑰所詣故四鎮之符分詣三界俾亡魂所向合契升遷隨品受化免為罪魂斯其意也豈可以為亡魂上天去了不必分三界如此則亦不必焚之錬度所也大意其源流專以欺罔為事其行用誑妄毋足怪也升天大劵此劵以黃素方一尺六寸中絶夾合面書三界洞章背書告文盛卷以黃繒付亡魂佩之即得精氣魂魄神識全出地司受化更生天人告文今日欣慶歷關諸天至無拘天門太歲年月朔日時告下具法位臣姓某告行靈寶升天左劵亶婁阿薈無惒觀音須延明首法攬菩曇每行四句靈書共一十六行末尾書告文云元始靈書中篇升度亡故某人上登道境魂神受度更生自然一如告命風火驛傳太歲年月日同前具法位臣姓某告行三皇內文六十八字書於左劵背三皇內文不録在此自有别本凡升天左劵背文外書亡魂數目靈寶升天右劵面書三十二天帝背三皇內文於右朱書亡魂數目太皇黃曽天帝鬱藍玉明太明玉完天帝須阿那田每天二句八天計一十六句一方八天作四行書四方共三十二天共作一十六行書左劵偶數右劵竒數如上式末後書告文云無色之境天帝玉真𣑽行帝諱三界天名隱音隱韻天中空洞自然靈章天中之尊天中大魔天中之靈九和十合變化上清無量之奧深不可詳敷落神真普度天人亡魂某承此功德上登道境一如告命風火驛傳年月日時告下具法位臣姓某奉行背書文三皇內文不録在此左右劵並以青素丹書中央橫截一半用柏木匣盛密封付天門吏一半付男魂一半付女魂首領者密封如今執付天門驗契若無此劵地司土府不與全神而去五嶽不與名籍而去火官不與靈光全明而去天門遏不使進前若有此劵則得徑入天門上生福堂外函內函靈寶升天右劵具法位臣姓某謹封靈寶升天某劵告下天門守衛衆神具法位臣姓某謹重封允中切詳靈寶左右劵青素丹書中間橫截斷之一半用狀封付天門神吏一半給付亡魂之首某魂得此劵亡魂得之三界不復拘留可免沉滯非獨為升入天門而巳使其功行未該朝謁上帝則在中界亦為身寶度化更生而巳行教之士冝審用之可也上清靈寶大法卷之三十二
