front:
  text: 上清靈寶大法卷之十八晝九
  hash: sha256:1ad8d358e87ce65d030fa37461f523f8bb46c2f7b4297df2681b322563b608bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_018-001a, image: hfl/0966/0966-100.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童𥘉府右翊治金允中編玉文真篆品經曰赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劾運使天長存此乃是元始天尊大梵祖氣化生玉字出書度人也而靈書中篇在開圖之初謂之中者中和之氣融而成書故曰中篇孝道明王主之五氣分而列五位於是赤書玉字五篇敷落故五老上帝主之所以中篇著於末者取生物首下之義故赤書先之然而真文呪訣出於古書後之學者難可施行故髙上著筆以解曲滯開演古文微妙元辭諸天尊披誦玉音十方遙唱上帝設禮神魔降伏安天鎮地功用無窮其如季葉真道易潛至理用晦世俗之習溺於先見故多以先得者為貴世俗貴異又以常有者為賤偶得者為寶世俗貴難復以難得者為竒易得者為輕所以世師有得其妙者多不以及人盲師罔世各立異論迷迷相續遂誤後人今審夫仙經參之上法務為簡要少存玄網云東方青帝靈寶赤書玉篇真文東方九氣始皇青天碧霞鬱壘中有老人總校圖籙攝氣舉仙二十四字書九天元臺主召九天上帝校神仙圖籙歲星輔肝角亢鎮真氐房心尾日景回旋箕主七辰正斗明輪承氣捕非掃除災群三十二字書紫微宫東華殿主召星官正天分度東山神呪攝召九天赤書符命制會酆山束魔送鬼所誅無蠲悉詣木官敢有稽延三十二字書東華司靈之館主攝鬼魔正九天氣下制河源海水東神大劫洪災蛟龍負身水府開道通徑百千北帝赦文風火無間三十二字書于九天東北玉闕丹臺主攝東海水帝大劫洪災召蛟龍及水神事右合一百二十字皆元始自然之書一名生神寶真洞玄章一名東山神呪一名青帝八威策文東方安寶華林青靈始老帝君所掌也南方赤帝靈寶赤書玉篇真文南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三氣敕光神仙受命應運太陽三十二字書九天洞陽之館主九天神仙圖籍金名熒惑輔心井鬼守房柳星張翼統御四鄉軡總七宿回轉天常召運促會正道驛行赤文命靈三十六字書三氣丹臺主召星官明數正天分度北攝酆山東送魔宗符教所討明列罪源南山神咒威伏北方群妖滅爽萬試摧亡三十二字書於西南玉闕主制北酆以正鬼氣南河水帝太伯龍王神呪流行普掃不祥洪水飛災止召蛟龍開除水徑千道萬通敢有干訖攝送火宮赤書所告莫有不從四十八字書西南正陽玉闕主南海水帝大劫運交洪水四出主召蛟龍水神事右合一百四十八字皆元始自然之書一名南雲通天寶靈袊一名九天神呪一名赤帝八威策文南方梵寶昌陽丹靈真老帝君所掌也中央黃帝靈寶赤書玉篇真文中央總靈黃上天無始生五老中皇尚尊攝氣監真總領群仙興籙玄圖宿簡玉文催運上氣普告萬神四十字書太玄玉寶玄臺主神仙玉簡宿名總仙氣也鎮星輔脾回度北兀魁𩲃主非截邪斬根𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛傳四十字書玄都玉臺主攝星官正天度數勑攝北帝遏塞鬼門剪除不祥莫有當前一十六字書玄都玉臺主攝北帝正天氣檢鬼精中山神呪召龍上雲制會黃河九水河源不得怠從善惡悉分千妖萬姦上對帝君莫有子試太陽激燌赤書玉字宣告普聞四十八字書玄都玉臺主攝中海水帝四泉之水洪災湧溢之數召水蛟龍事右合一百四十四字皆元始自然之書一名寶劫洞清九天靈書一名黃神大呪一名黃帝威靈䇿文中央元靈元老帝君所掌也西方白帝靈寶赤書玉篇真文西方素天白帝七門金靈浩映太華流芬白石峩峩七氣氤氲上有始生皇老大神總領肺氣主校九天檢定圖籙制召上仙四十八字書九天素靈宫北軒之上主召仙氣舉仙道也太白檢肺奎婁保魂胃昴畢觜立制七七關參總斗魁受符北元畫九十二二十四字題金闕玄窗主攝白帝星官正明天度赤書玉字九天正又攝召萬氣普歸帝君一十六字題金闕三圖館主攝六天鬼氣行此法也西山神呪八威七傅符水上龍召山送雲在所校得同到帝門輔衛上真斬滅邪源若有不祥截以金關赤書符命風火驛傳四十八子題金闕三圖館主攝西海水帝及水中萬精召雲龍以防水災之事右合一百三十六字皆元始自然之龍書一名金真寶明洞微篇一名西山神呪一名八威召龍䇿文西方七寶金門皓靈皇老帝君所掌也北方黑帝靈寶赤書王篇真文北方玄天五氣徘徊中有黑帝雙皇太微總領符命仙錬八威青裙羽襡龍文鳯衣上帝所舉制到玉階四十字出鬱丹玄元紫微臺北軒之上主諸天真人神仙圖北辰輔腎斗牛衛扉女虛危室豁落四開壁總七星執凶紏非却災掃穢明道動輝三十二字是天北元玄斗中書也主北方星官正天氣北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅槯二十四字書北方朔單鬱絶之臺主攝天魔北帝萬鬼事九河傾訖鳥母群飛蛟龍通道水伯洞開赤文玉書驛龍風馳二十四字赤書北方朔單鬱絶之臺主北海水帝制水中萬精召蛟龍以負身右合一百二十字皆元始自然之書一名元神生真寶明文一名北山神呪一名八威制天䇿文北方洞隂朔單鬱絶五靈玄老帝君所掌也元始赤書五篇真文上清自然之靈書九天始生之玄𣑽空洞之靈章成天立地開張萬真安神鎮靈生成兆民匡御運度保天長存上制天機中檢五靈下策地祇嘯命河源運役隂陽召神使仙此至真之文妙應自然致天髙澄使地固安五嶽保鎮萬品存焉右法凡行赤書須先關告若不關告而便為之無所益也古者修真之士以五篇赤書鎮禳攝制或投之名嶽洞淵以削罪籍上名九天即此是也凡投簡如告水帝削除罪簿即硃書銀木簡上以青紙褁青線纏之負以金龍一輔以金紐九匣簡以投三河之淵如告五嶽靈山亦硃書銀木簡金龍金紐悉如前法埋於本命之嶽或福地名山若告九地土皇亦如斯式埋於所住之中宫簡上書法師位姓某年月日時生願神願仙長生不死如水府則續之曰九府水帝十二河源江海淮澤溟泠大神乞削罪名上聞九天謹詣水府金龍驛傳其首同式其末别作一行書太歲某年月日時於某處告下各以簡之背書真文却以簡之陽面書告文用本法印印之投簡之際發爐啓告宣呪投簡復爐如式或以文置之五方則五嶽仙官至若長齋百日精思不輟則天真下降但專佩此文亦得尸解硃書五色石上災殃自滅凶殘自消不及五嶽之山則所居之地取四方之山亦可備五嶽但本命之方則為命嶽取象以招靈氣神無所往而不在也然梵氣開煥出圖度世無文不光無文不明無文不成無文不度無文不生故百魔隱韻離合自然因時以治事隨事以用文故五書之赤文中篇之祕篆皆可離合而用之矣水府呪北向叩齒三通讀簡文訖法師執簡念呪元始五老上帝髙尊十方至真太華靈仙赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝溟泠大神今日上告萬願開陳謹投玉簡乞削罪名千曾萬祖九族種親罪相連纍及傳我身普蒙削除絶滅種根記名水府上言帝前七祖父母去離八難上登九天衣食自然我罪釋散萬神咸聞謹以金紐關盟水官請如所陳金龍驛傳嶽府呪東向叩齒九通讀簡畢法師奉簡念呪玄上開明元始監真上帝五老赤書丹文天地本始總領三元攝氣召會催促舉仙髙上符命普告十天日月星宿五嶽靈山天上地下𡨋靈大神監生主録南上三門開領玉簡勒名丹篇削落罪書上輔帝臣歸憑至道修立齋功拔贖九祖一切苦魂行道事竟謹依靈山請投玊簡乞削罪名皆蒙解脫無有𡨚親去離三惡魂升九天死生開度億劫長存今日上告萬神咸聞謹以金紐關盟地官請如所告金龍驛傳土府呪中庭向壬叩齒十二通讀簡畢法師奉簡念呪天地開張九氣分靈三元同符十方朗清五老上帝開真領生丹書赤文元始上精普告天地九土皇靈今日上告萬仙定生修齋行道普為存亡我願我仙請投玊名土府太皇削除罪形奏簡上宫刋簿華清身得飛騰天地同靈九祖種親腐骸更榮魂升南宫受化仙庭今日告命萬神咸聽謹以金紐表盟至誠請如所告金龍驛傳五嶽靈山投簡呪每遇本命日甲子日立春日寫東方赤書自東方起至舉仙凡二十四字立夏日寫南方赤書自南方起至太陽凡三十二字二分二至日寫中央赤書自中央起至萬神凡四十字立秋日寫西方赤書自西方起至上仙凡四十八字立冬日寫北方赤書自北方起至玉階凡四十字依方色書白剌上記姓名月日如投簡儀則九年五方仙官到使青腰赤圭黃素太素太玄玉女來皆見叩齒十二通呪曰玄上髙靈元始尊神大聖徘徊萬聖臨軒三景敷輝慶雲四陳上告較圖推算九天今日啓願投剌靈山丹書赤字自然真文上告五帝記名玉篇萬神監映日月明言願度願生願神願仙天地星宿互照我身三官九府五帝大神普告無窮削除罪根元始大開莫不納言九祖幽魂受福自然三途五苦永離八難得與三景同輝紫宸轉輪不滅身得飛仙宣呪畢讀剌了投於絶巖之頂便散花靈山之上又叩齒三通向本命方呪曰元始監映仙名巳書三官九府罪業蠲除散花五帝告盟太虛請如所陳萬劫常居安鎮星宿禳度天災法呪五方赤書主召其方星官天文分度及天災安鎮則方而息東方自歲星起寫至災群凡三十二字以青紙硃書露中庭九日九夜依法以火燒散灰於青煙之中并刻石書於青石上埋之南方自熒惑起至命靈凡三十六字以青紙硃書露中庭三日三夜依前法焚并刻石書赤石埋之中央自鎮星起至驛傳凡四十字以青紙硃書露中庭十二日夜依前法焚并刻石書黃石埋之西方自太白起至北元凡二十四字以青紙硃書露中庭七日七夜依前法焚并刻石書白石埋之北方自北辰起至輪輝凡三十二字以青紙硃書露中庭五日五夜依前法焚并刻石書黑石埋之皆東面散髮叩齒十二通呪曰元始上天三光髙明回景照耀四方朗清運度所衝激揚流星五分錯越三統失寧五斗總辰七宿明靈真君大魁厥諱玊精夫人皇妃字曰育嬰總御玄關回轉天常今日客災玄告不祥謹以真文赤書上呈散髮謝愆披露丹誠惟垂玄鑑回復天經氣不橫越災不橫生焚燒靈文散煙玉庭上景監明普告萬靈氣消三關災滅九𡨋隂陽調和國土太平謹以金龍風火驛程呪畢露真文於中庭各安方所以金龍鎮之隨日而焚之又依方色數刻石埋鎮用燈照及紋繒安鎮為信攝召法呪凡受上法宜先攝伏魔鬼魔精降伏神明自至東方即自東山至稽延凡三十字硃書青木剌南方即自北攝至摧亡凡三十二字黃書赤木剌中央自勑攝至當前凡一十六字白書黃木剌西方自赤書至帝君凡一十六字黑書白木剌北方自北山至滅摧凡二十四字青書黑木剌凡念呪皆向東北而東九次南三次中央十二次西七次北五次俱叩齒三十六通閉息氣九口而仰念呪曰三元閉明回轉天常運推數終百六乘剛大劫交會萬妖爭行北酆不拘放逸鬼宗群魔縱肆祅閉天光上帝有命普告十方演明天度法教開張正道治民掃除不祥有何小妖群聚為殤赤書玉文統攝鬼鄉北酆三官速明傳行千魔束爽萬鬼送形流鈴交煥激氣太陽金虎四邀天丁捕亡大小齊到不得匿藏元始所告列奏上蒼召龍天水神止水度水等法呪天地大劫之災洪水四出此符可以禳止或使蛟龍為通路開水徑以度身東方自下制至無間凡三十二字黃書青紙投水中南方自南河至不從凡四十八字中央自中山至普聞凡四十八字西方自西山至驛傳凡四十八字北方自九河至風馳凡二十四字皆如東方叩齒五通閉氣二十五息存巳身心中生火出頭頂燒四方山林草木及巳身都盡形體皆成灰塵一時飛翔入青煙之上無所復遺思大水浩蕩除天下巳身化為蛟龍隨水而流因又叩齒二十五通呪曰上氣回靈開明九元天推地轉三氣流傳五行相促運度機關隂陽否激結成災衝大劫傾訖蕩除妖氛九河受對洪流激川水毋徘徊鳥烏合群日月冥會三景停關上選種臣排較玉文棄惡貴善清濁永分我係帝簡名列九天大災四會赤書所蠲是日告命萬神咸聞日月五星照明我魂五嶽靈山浮度我身九河水府溟泠大神開深水徑通利河津蛟龍應符攝山送雲負我度我驚馳四奔丹書赤字元始真文金龍驛程時刻無停立須奏御上對帝君呪畢引氣二十五咽須臾自當有水神開道在山則山自浮在水則水自開可謂臨厄而自濟倏歘之頃也群國有水災之時亦可建齋精心行之矣天尊於億劫之始運元氣真精化生靈文以制御劫運保國安民宿有福慶與善因緣得值斯文上古之人淳和抱朴與道混同不俟齋戒行之立應代末時澆人心散壞宗正者寡違真者多欲行其法須依三元簡文立齋行道精心思念𡨋契玄聖乃致感通不爾者魔試所干徒為之耳可選精潔之士於絶塵之地名山靈迹以期通應以彰大道濟度之慈太上救物之澤弘化之士其勉之哉廣成先生論真文昔在元始天尊混元既判三氣開圖以大道元精真一之氣化為靈寶赤書凝結為文降於五方以鎮安天地招命真靈故云天地得之以安鎮日月得之以光明鬼神得之以開度人民得之以長生真文傳於世上消天災保鎮帝王下禳毒害以度兆民制伏神鬼拯拔沉淪無所不為也經云無文不明無文不光無文不立無文不成無文不度無文不生也又云赤書玉字八威龍文保制劫運使天長存此靈寶五篇真文之妙用也故能鎮天分度調和隂陽開度飛爽保衛帝王拯淪濟溺通幽達明和𡨚釋咎却死延生生死之苦無不救之當建齋之時以真文玉字安鎮五方解壇事畢收而焚之散灰青煙之中具如玉訣之法或學士修真自祈度世記名仙品永離鬼官當以三元八節甲子本命之日書文玊簡投諸名山除宿世罪簿言名上天事事三過諸天三官九府記其善功上天友别萬神敬護五帝侍衛三界司迎千魔萬精不敢妄干經曰志願堅固觸向咸成七祖父母上生天堂生死福慶影響相酬也廣成先生再敘中篇説黃籙齋拯救幽靈遷拔飛爽開度長夜升濟窮泉固其大旨也然驅災致福謝過希恩人天普修家國兼利功無不被矣所鎮靈寶五老赤書真文詳其所為祗通四種一則求仙受道自東方九氣下二十四字二則禳制星辰自歲星輔肝下三十二字三則摧伏鬼魔自東山神呪下三十二字四則蠲消九害自下制東河下三十二字五篇之用於期畢矣西京清都觀張萬福天師儀軌云諸天隱語八會玉文元始天尊於香林園中為上智童子所説下拔五苦遍濟九幽於遷神儀中刻石行用今則黃籙遷拔當用此文吉凶合儀銓量充當庶夫永劫可以流通呪祝焚燎與真文同其有成法共弘之焉靈書中篇大梵隱語又曰三十二天隱語東方八天南方八天西方八天北方八天中央本法無此中央符别本收入於此本上靈寶大羅之天自然玉字黃帝一氣天文散壇夜隨方讀文訖弟子捧文香煙上法師叩齒十二通呪曰晝九三十無上至尊大聖髙尊布化運氣三十二天八會九光自然成文安鎮天地保制劫年元始符命普告三元下勑九地上關諸天中告海嶽名山大川今日上告萬神咸聞修齋行道拔度幽魂三官九署削滅罪根永度三途五苦之源世世受福記名丹篇神生天堂錬化自然生死開度億劫長存九天告命風火驛傳允中恭惟元始天尊啓真機於劫運之先開靈圖於天地之始赤書玉字敷落五篇肇育乾坤主張造化因時而降世應運以流行故上可以調正天經協平氣候中可以綏寧邦國保鎮帝王下至學士求仙入道則驅滅魔試成就善功以之安鎮方隅則壇場淨肅投之山川河嶽則削罪記仙此乃玉訣中之元科上經中之本旨及夫齋法既興之後則以五書鎮壇而修齋立事功成事畢則投簡山川土府願其紀勤齋功削除過籍黃籙之投三簡蓋本諸此近世妄人更不考究源流乃多撰造符文書之簡背或又分時節而改易其符不經甚矣豈知五篇之妙靈書之功可以離合而用無所不禳無所不度也況赤書玉字合居靈寶大法之篇首至於齋科之中編入者庶俾行齋之士將知安鎮之儀投簡之式實本諸此固不宜隨俗撰符以妄用也若夫散齋投簡則全屬齋科詳見投龍送簡品矣散壇告簡投龍三呪宜熟味之其可用他符於簡後耶上清靈寶大法卷之十八
