  text: 上清靈寶大法卷之二十九仙二
  hash: sha256:e68262302fe5025e3ec0cdcd317a5ababf93b11010391cfabce9019d6f6d4596
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0032_HFL_028-001a, image: hfl/0969/0969-056.png}
body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金𠃔中編奏申文檄品青詞關靈寶大法司本司今月某曰夜為某人追薦某人開建道場所有齊官青詞合行謄進除望闕宣奏訖今逐一用方函封印全須至關發者右關某日某時當直功曹使者上界直符捧詣三天門下投進即請使騎星飛靈車速駕升無極之天闕赴合屬之宫曹火急傳馳以時奏進庶使精𠂻上逹詞悃亟通母致稽停早垂玄感故關發五府申狀關靈寶大法司關童初府時直使者當司𨽻名三天門下通籍重明上宫膺童初府之詞章攝翊治所之職任遵行教典合行科條事應上聞法許關告當憑時直主者徑達本屬真司今有緊切申牘須至關發者一申狀一方函封印金上詣上清童初府申上右關某日時當直主者請騰翔雲路軒翥天衢馳神騎於頃刻之間達至悃於呼吸之際詞陳速傳宫府即聞如有故氣之妄侵以致鬼邪而敢阻即須攝赴天獄速送冥曹究其罪源置之玄憲仍使箋牘之上逹早希報應之下臨立待感通幸毋稽延故關發北斗狀關靈寶大法司關日時當直功曹二使者當司執職玄曹嗣法天省攝濟顯拔幽之任備除邪立正之司法許申謄格當關告今有緊切文狀上詣中天北斗宫事應具聞合行關者一申狀一函封印全上詣中天北斗九皇星宫申上右關某日某時當直功曹二使者控轡雲衢騰身霄路入罡風而穿灝氣上徹星宫持封事而逹凡忱即聞斗極如鬼妖之敢侮或邪祟之妄干即擒解所屬真司攝赴就近天獄庶使詞陳不壅報應亟彰立待通傳切勿遲滯故關發嶽府狀引靈寶大法司本司嗣法靈寶南曹攝五元素府理冝濟度隱顯格當關告幽冥地界之神自應遵奉玄科之式所合按行今有急切公文前詣嶽宫申上特憑遞發須至專行一申狀一函重封印全謹上詣東嶽帝宫申上如申府即云東嶽泰山府申上右引某處里域土地至東嶽下沿路土地及地界合屬干係等神請承領公狀準此所行以次轉遞齎持逐處分明交度勿違時刻作急通傳如有故氣干侵以致下邪邀截即須擒解泰山曹局攝所屬城隍盡理窮研依律根治所有公狀仍與申聞毋輒稽延立須響應太歲年月日時引發城隍牒引靈寶大法司本司受命上穹分司玄職總録顯幽之不典督察妖異之亂常依按科條合移文牒今有公牒一角封印全前赴某處城隍司投下須至專行右仰某處里域土地正神仰承領引文齎持公牒前詣城隍主者神前即時分明投下急速傳達亟切通聞如有邪鬼干侵妖異阻截一就擒解攝行究治罪源置之天律須管公文即達不請頃刻稽延太歲年月日引告救苦符關靈寶大法司當司今為某人崇建某齊拔度係薦某魂及五道三塗四生萬類一切孤魂今有符命須至告下元始符命金籙白簡真符太上破地獄真符太上拔幽魂真符東極青宫救苦九龍符命此符若作專牒則於關內除去飛天神人右關十方飛天神人玄都茭龍驛吏六道功曹齎持符命遍詣三界十方冥關幽路天牢地獄嶽瀆靈司分野名山城隍里社應干合屬去處拔度亡故某人等魂及五道三塗四生萬類一切幽魂滯爽並與疾除罪簿落滅惡根出離冥關悉詣齊所領霑天澤證品超生不許稽違有妨開度故關太歲年月日時關告長生符關靈寶大法司當司今為某崇建某齊薦拔某人今有長生靈符須至告下右關金龍驛吏齎持符命遍詣南方丹天世界超度亡故某人等魂及五道三塗四生萬類一切幽魂滯魄錬神流火度𩲸朱陵火急奉行母得稽滯故關太歲年月日時關專發九龍符命關牒靈寶大法司當司今為某崇建某齊拔度亡故某人等魂今有東極青宫九龍符命須至告下右牒十方飛天神人九龍符命使者普詣三界十方冥關幽路黃泉夜府嶽瀆靈司分野名山城隍社令一切天牢地獄主者咸領符命拔度亡故某人等魂及五道三途四生萬類滯爽幽靈赦滌愆非解除考對拔出地户超脫重隂徑詣道場恭承齊薦請火急施行謹牒太歲年月日時牒正薦功德牒靈寶大法司當司先據某鄉云云投詞乞行崇建黃籙大齊薦拔某人超生善境除巳按科修崇並巳周圓須至給牒為據者一某月某日具奏一帝申聞三界真司預告齊事一某月某日第二次具奏天闕申聞上境真司關告地水合屬去處敷告齊事一拜奏素車白馬章一通開通道路章一通沐浴錬度章一通酆都拔罪章一通升度亡人章一通救苦表一通木公金毋錬度表一通九天上帝表一通啓師箋六通謝師箋六通青詞幾通言功朱表一齊壇告下救苦真符長生靈符九龍符命破地獄真拔幽魂真符神虎玉禮元始符命普告三界符歷關諸天符敕制地祇符出離生死符太上敕赦生天寶籙一請光破暗一宿啓建壇一敷露玉文一正齊三日幾時升壇轉經一關㸃九獄神燈破獄開關九巵神燈一攝召魂儀沐浴朝真一呪施雲㕑妙膳一普召五道三途幽魂沐浴朝真謁帝一恭行水火錬度一修設三界髙真清醮幾分位上謝天恩一投送三簡紀勒齊功一傳授靈寶上天黃籙一階一給付升天大劵升天左右劵四鎮合同符一分酆都山真形一建立遷神寶幡回黃寶幡一印給太上某經一焚化某經冥財牒前件功德並用資薦亡故某人承兹善果頓悟宿因蕩塵漏以俱空解沉迷而盡釋萬類不著一性自真永離幽夜之鄉早步逍遙之境人間天上執此為憑故牒太歲年月日牒齊事告終謝恩設醮乃召儀也謂勞動神靈召役將吏合行酬謝故於散壇之次三獻效禮與其餘醮設不同是以正奏狀內各請俯盻齊壇故今不用請醮狀矣凡文移所及之處並列醮位却逐一專狀獻謝今列獻狀于左右其餘醮告合專狀請降者自從事而行進獻狀具醮官臣姓某龍車一座右謹隨狀上進以聞謹進太歲年月日具醮官臣姓某上進具髙功臣姓某謄進上界列真獻狀具醮官臣姓某雲馬一騎金錢一分右謹貢獻以聞謹狀太歲年月日具醮官臣姓某狀具髙功臣姓某謄進中界下界獻狀具醮官臣姓某雲馬一騎金錢一分右謹上獻伏望聖慈俯賜鑒納謹狀太歲年月日具醮官臣姓某狀具髙功臣姓某發龍車狀關靈寶大法司今月某日為某修建某齊滿散設醮謝恩所有齊官進獻上帝龍車隨狀以聞須至關發者右關某日某時當直功曹上界直符使者請上詣天廷投進不請稽延故關太歲年月日時關三界醮儀關靈寶大法司當司今月某日為某人修建某齊滿散修設三界髙真清醮幾分位昭答天恩所有醮獻錢馬須至關發者逐一開具右關三界直符年月日時四直功曹里域等神即請分司逐一投達髙極三天之上旁周六合之中預醮真靈齊壇官屬咸通致悃各貢微儀希神騎之速馳庶醮誠之母壅幸遵真教上贊玄科故關天省謝過狀具法位臣姓某臣不避深譴再露微衷仰冀慈憐始終寬宥臣昨據云云投詞崇建某齊幾書夜設醮謝恩除巳祗率法流關行事畢竊慮臣等資品庸下性識昏蒙不練教科未能隱奧犯違禁戒謬度典章朝謁非儀奏申失格詞章繁黷符篆乖訛以致罪結天司名書黑簡闔壇戰懼無地措躬須至申聞者右謹具申三天門下泰玄都省主宰髙真伏望真慈曲垂省録特與敷奏天闕仰希原赦臣等自建齊至于滿散一切罪犯除過籍湔洗瑕愆庶齊福無𧇊生靈蒙祐臣干冒真威不勝惶懼之至謹狀太歲年月日具法位臣姓某狀童初府謝過狀具法位臣姓某臣不避深譴同前省狀式右謹具申三天扶教輔元大法師正一靜應真君列四聖位恭望真慈同前省式發狀關靈寶大法司今發緊切申狀二函上詣三天門下泰玄都省上清童初府須至關遣者右關某日某時當直功曹上界直符使者速邁雲程急馳飈馭俾誠悃亟通於上境庶詞章早徹於真司佇俊神㓛即昭玄應故關太歲年月日時關右謝過二狀以六幕諸真並有謝箋惟天省并五府合行首陳懲犯天師巳在六幕內今申聞五府又不容除去天師一位但不行此之士主行自冝除此一狀却專申天省而巳又榜文齊壇舊榜文舊科所有者不甚繁雜若隨俗增益恐徒費紙劄於事無備如近世有告諭將吏誓言傍又有約束將吏榜顯然重復此類尚多今擇其不可免者從舊式重撰于左如神虎壇榜合在神虎攝召品曉諭孤魂楴合在施食普度品蓋恐章表局書繕欲得檢式皆聚一處故以諸榜悉附文檄之品只章表自作一品也齊壇節次榜靈寶黃籙大齊壇本壇今月某日為某崇建無上靈寶黃籙大齊幾晝夜上資邦國普福生靈濟拔五道三塗開度四生萬類集兹善果專用追薦亡故某魂靈超生善境謹率同齊之士共宏無上之科冝立成規免違玄範法事節次遵此按行逐一開具詳細並見黃籙次序右榜壇所普用資聞各冝整服肅容循規合式常須進上有序母令關奏失儀共竭精誠上祈感格故榜太歲年月日榜具位髙功姓某押經榜黃籙齊壇本壇令月某日為某崇建無上黃籙大齊福國康時拔幽濟顯廣資萬類普度三塗集諸善功用薦亡故某人早遂超升除已具録奏聞尅期修建今先以某日看誦仙經講宣妙㫖上獻十方髙真開化萬類幽魂謹列品目于後太上洞玄靈寶無量度人上品妙經太上洞玄靈寶自然九天生神玉章元始靈書中篇大梵隱語太上老君說常清靜經巳上祝獻十方三界上聖髙真齊壇醮席一切聖衆太上洞玄靈寶無量度人上品妙經太上洞玄靈寶自然生神章經太上道德經元始靈書中篇大梵隱語黃庭內景玉經巳上開度係薦亡魂太上洞玄靈寶無量度人上品妙經太上洞玄靈寶自然生神章經太上道德經元始靈書中篇大梵隱語黃庭內景玉經巳上開度五道三塗四生萬類一切幽魂右伏以玉笈琅函發靈機於上境金書瓊札孚妙化於人寰保却運於無窮極顯幽而普濟以今齊期將屇經席宏開仗此善功用祈景貺尚冀同齊羽褐預職壇官誠意而精心俾毋差於想念肅容而端巳使勿越於禮儀所期感格於九清庶可保寧於萬彚皇圖延永社稷𠃔昌華夏和平顯幽全濟即使係薦亡某普度沉靈俱霑清靜之風咸逹希夷之妙旁均有識同證無為故榜年月日榜列六職位姓某具髙功職姓某右經榜乃欲看誦俱能見數故也每日晚誦經畢當榜內經文品目之下注云某人誦幾過日分足則併計而疏之庶不差疊亦不必預定過數恐數目多而誠心簡怠也今榜所叙諸品經目與近世所行頗不同蓋古來靈寶法中叙云黃籙前期三十六日預修誦經堂率同齊之士入靖對齊不交人事精誠看誦度人上品妙經九天生神章經道德二篇黃庭玉經近期則習儀演事此古法也所謂入靖者使塵俗不侵內外專一母人物往來言辭煩雜始可存神誦經思真念道𥘉非天台靈寶法中妄立靖名欺世罔人之比所以經書只稱四品而不及綴十不及一其間真僞錯綜邪正混淆自非高才未易分别惟度人一卷生神九章最為玄古故誦之致飛天下觀萬神朝禮蓋以天中之音而感格髙靈也及其攝召亡魂聞經聽法於道德五千文涵藴混元之祕內景琴心訣包藏造化之機倘誦之者深徹玄樞則亡魂豈不言下開悟餘雜經有妙義之文固衆然道德黃庭豈筆舌可殫上學髙逺之人自能意㑹淺近庸愚之輩因此榜興不如是不足謂之非常道也曉諭將吏榜無上黃籙大齊壇本壇切照黃籙科品實𨽻下元中宫䇿役萬靈權網九府上録三界下總六天齊福普覃無所不度靈光煥燭有感皆通天子以至庶人皆得修奉幽關暨于陽境咸被生成今齊主某人齎信祈恩束躬瀝悃請修齊直願濟存亡是以按格謄詞依科蕆事舒壇立纂備物陳儀設職修齊轉經行道盟天告地拜表上章追攝係薦亡靈普召含情幽爽廣度三塗五道旁資萬類四生除滌愆瑕脫離沉滯徑辭幽府悉赴齊壇聽法聞經享食受度上祝皇圖永固聖壽綿長六氣和平四民康樂烽烟罷警禾稼豐登集此善緑專申追薦亡某人等魂上及九祖七玄以致五音六族先亡靈識近逝神儀超出重隂解除宿垢度魂朱府鍊質舟天錬氣聚真返生澄性次保家門咸泰姻眷均休尚慮壇墠未嚴禁戒罔肅下官故氣厭穢妖塵濁混靈場昌登齊折違越禁忌敗亂紀綱或地界神祇奉承簡怠或傳奏官吏關告稽延或列職衆神失嚴守衛或里社主者不加專勤倘有玷於齊功實上違於玉律事體至重典格非輕事巳届期理難曉諭右榜壇前請靈寶官屬執職萬神五元素府天神將吏雷霆諸司主宰齊壇干繫衆神䖍遵黃籙之科共蕆下元之格部率將佐篤役吏兵㑹合當所城隍監勒合干里社衛護壇界鎮肅方隅驅却妖氛掃清厭穢倘有拒逆輒行干侵即請申收有司速送天獄依律研究治罪施行所有章表文移悉資導達符章命令咸藉宣通布九清十極之恩休度三界十方之沉滯祈帝真之鑒盻庶齊直之無魔率勵昭蘇普天全濟解壇散席拜表言功一如太真之儀用謝至神之貺故榜年月日榜具髙功姓某押神虎攝召壇榜黃籙大齊壇本壇今月某日為某崇建黃籙大齊恭按科儀合行攝召係薦衆魂各家宗祖及五道三塗四生萬類含情抱識滯爽沉靈附幡見形領薦受度切照瓊編紫笈大敷濟物之科玉札丹文顯著召魂之格開九泉之昏暗拯萬國之幽沉降九龍符命以頒恩仗七司玉女而宣令雄左雌右上三境而下六天陽耀隂靈追衆魂而集萬鬼召攝毋稽於頃刻報應立待於須㬰蕆大道之神功遂皇民之精禱即行拘集咸俾昭彰巳立靈壇須至曉諭右榜請北魁玄範府官吏七真玉女本司追攝合千官吏遵奉真符頒行玉札遍詣十方三界五嶽九幽十洞六天九州萬國名山福地江海河源典祀神庭城隍社令黃泉蒿里幽路冥關主宰魂𩲸之司校量罪福之所嚴行追攝速與根尋係薦亡靈萬類幽爽差撥官將部衛形魂出夜府以來臨附靈幡而報應功成事畢拜表叙勳故榜年月日榜具髙功法位姓押率勵壇官榜建齊設醮髙功之職首領一壇禮絶衆官乃齊法也但共壇之士不過同學之人為衆官所合共尊髙功而髙功亦冝自處謙退近者申嚴壇衆乃以榜約束衆官誠非可行之格今止作髙功僉名率勵壇官庶為允當某伏聞大道開先髙真憫物先天立教歷劫度人敷二十七品之齊列四十二等之醮和天安地保國寧家遂立法籙之班爰備關宣之職故奉教行科之士乃拔幽濟顯之司儻能隨事以殫誠自可積功而度世欲精誠而不替冝典格之無𧇊或形失禮儀心妄專薦則髙穹之蕩蕩未易感通兼玄憲之昭昭恐膺考罰眚結三官之府過標五帝之宫懼夫算減而福消甚至魂沉而身墮如某者山林下士江海塵蹤學矣徒勤未遇真師之𢌿付行之粗久幸蒙上帝之寬容然而事無間於重輕齊不拘於小大全藉壇官同志法衆協心贊助其行彌縫其闕左提右挈俾物墜於善功始敬終勤庶曲全於齊事從容登降和暢關宣舉措勿越於真科想念不離於大道正乃心而誠乃意恭其事而守其規若心怠而形恭將速欺天之罰苟意誠而理紊則貽失格之辜要當內外精專身心純篤間居親愛之友不應戲笑於壇中平時悲怨之儔安敢忿恨於齊次敷宏大化本是非輕對越上真勢須自檢幸垂清聽同鑒丹忱某禀聞曉諭孤魂榜靈寶大法司當司今月幾日為某人崇建無上黃籙大齊廣設斛食普度一切孤魂等衆或犯法赴刑身首異處或投河自縊非命而終或骨斷筋傷或陳亡兵死或沉痾久疾積滯腹心或腫痛瘡痍潰爛肢體或墮崖墜木或破質喪軀皆生世之時有形之際幻身淪沒失於正終迷執之情常為沉滯無歸之魄延注無窮但人之體軀假合而就百榖五味滋長肌膚手執足行耳聞目見飢寒飽暖千動百為豈期皮肌血肉自能為之乃禀兹一靈聚為神氣神凝氣注五味以生氣散神馳百骸莫駐所謂肢體傷壞皮肉不全蓋以重濁之資無非有質之物一靈之職本何所傷然而幽爽沉靈孤魂滯𩲸或銜刀帶索處於幽關或斷首殘身迷於鬼域病亡而未離痼疾産死而常帶血腥或恍惚而覩其形或夢寐而見其像固是尸骸損傷於人世豈得魂神零落於冥鄉四大百骸氣血之府血腥垢穢出於身中神已歸空身化塵土腥穢遺質之物沾汚巳往之神夫人生為有神死則為鬼若刀與索無識無情用於一時終歸杇壞豈有魂識尚隨鬼身蓋有質之物而傷有形之軀既死之魂安能持有形之物事實如此理極昭然良由執著形骸留戀尸體彼但記其命過之際所以惡終而兹在隂之靈復懷舊想志念著於體質之域故形儀如初死之時鬼迷執而成形人心疑而見像夫豈知有體則有全有闕有形則有病有安身常不存患將安在若於巳死之後尚念在世之損傷亦巳惑矣今為無體之魂復慮生前之疾苦不其愚哉雖則分有升沉多因自罹執著除巳關告靈寶官屬執職萬神曉悟孤魂開明正性亦在致壇之衆深悟此理應生前帶腥染穢橫死惡終之類當知巳壞之骸不須顧戀有靈之識自可升騰毋執惑情緣無留戀尸體一朝警覺如出昏衢以損傷而斃者今不見其損傷以濁穢而亡者今何嘗有濁穢以殘疾而困者今亦無殘疾以聾啞為人者今亦自開聰一性沖融群迷頓决恩愛豈能俱絶若戀著未有休期𡨚讎未易遽忘然償報則何解釋赴壇相㑹恩怨一空況於富貴功名豈能長久金珠財寶安能終隨身巳不存物猶難戀至此則貧賤何纍富貴非榮萬事忘情回心易慮收召靈識整聚神儀沐浴朝真享食受薦陶以太和之靈澤錬以丹霍之神輝返性復形超生度化福鄉可陟地獄成空為無上之因緣正好於兹而度脫須至曉示右榜曉諭到壇孤魂等衆各宜知悉故榜年月日榜具髙功位姓某押𠃔中竊詳建壇之式具存古典而行移關申所以寓形其辭而達其事然行之有經用之合冝則不在乎過繁儻德不足以動幽𡨋學未至於通教典縱使千辭萬幅亦為徒然散壇設醮則止具獻狀蓋建齊正奏巳行請降故不用請狀也若尋常非建大齊而專有醮設自合專請專獻各位具狀矣齊後之醮不用請狀乃廣成先生降神設醮之式非自為之也若其醮位合照奏申文移所及之司并齊內應干將吏並當酬謝近者奏申甚廣而醮位或六十分位而已更不參照元來申請去處理誠不通兼奏告上帝之外合申牒三界有司乞行下原釋罪魂而已冥牢幽獄狴犴之中非承受法官文檄之所今於地界止申牒酆都宫主宰冥曹僚屬使亡魂可拔則主宰行下所𨽻之獄無所不可倘使齊誠難達天命未頒雖移文陸續恐隂獄未必奉承況地獄之在中下界不可以數計經誥互有所載如仙戒經正一經業報因緣經諸書或云一十八獄又云三十六獄又三官二十四獄此其略也幽昧之鄉隂冥之境掌録愆犯考理罪魂報係之曹隨處建置官吏萬萬之衆無極無窮但其權綱則總于酆都北帝如六天主者十宫真君之類則其有司之大者四明真公鬼官北斗之類則其官僚之要者故逐一申聞矣此外諸獄既不可盡名所是地獄文移並不復用使其符命下逮申牒可聞彼主宰之司自能行下合屬幽牢矣行教之士欲張惶罪福聳動見聞者自别為之不必行此式也上清靈寶大法卷之二十九
