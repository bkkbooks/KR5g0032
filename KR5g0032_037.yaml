body:
  text: 洞玄靈寶法師南曹執法與者權童𥘉府右翊治金允中編施食普度品建齋之始先設茭廓於空地之上務令寬廣仍戒喧雜當普召則立香案髙功望天闕口奏次請道士一員普行攝請此是先移文三界及牒神虎將吏預行普召或臨事而髙功不欲再行啓告者亦從便也立香案茭廓前髙功上香望闕口奏具法位臣姓某謹拜手昧死奏啓虛無自然元始天尊太上道君太上老君昊天玉皇上帝紫微北極大帝勾陳星宫天皇大帝后土皇地祇十方靈寶天尊東極青宫太一救苦天尊恭望天慈曲垂鑒燭臣聞至道啓慈悲之教髙真宏濟度之科俾凡夫得攝於化權使晚學獲聮於法職蓋欲廣覃惠澤普浹宸恩動植咸歸化育之中幽昧悉在哀矜之內臣久承明訓未立殊勳領户化民敢忘本職拔幽濟顯少效微勤以今齋主某勵志修齋傾𠂻普度雖巳奏聞於天闕所當廣濟於冥途備置菲儀關宣祕典召六道之衆並赴齋筵攝萬類之魂咸沾淨供恭望特頒天命並下冥司宥罪赦愆開關啓閉庶三界之幽魂悉集俾六合之沉爽同臻許其遷升容臣開度敢期昭應下副懇祈臣冒犯天威下情無任祈恩俟命之至謹言道衆舉幡歌斗章太微回黃旗無英命靈幡攝召長夜府開度受生魂先召六道夫六道者則天道神道人道地獄道餓鬼道畜生道也關牒行移有普召六道三途也有召五道三途者三途則天途驅雷役電地途擔沙負石水途漣汲溟波五道則度人經中魔王歌曰其欲轉五道我當復奈何乃五苦之場所謂五道也行移之中用五道則本倣此或六道亦可然而濟拔苦爽或先於五惡道今臨召攝則聖凡普及髙下同沾是六道之文不可除去行移之中更自詳酌行之式説悉是自來有之非近世續為之説其餘無所經據者力加刪斥不敢為疑惑矣謹伸上請天道之衆夫天道者居三界之中列諸天之次宰制遂分於品秩稱呼莫得其後先蓋由生稟竒姿夙鍾靈氣功全道備藥就丹成或證品仙階或受書洞府以至升騰霄漢軒翥空玄佐理隂陽贊扶造化善功愈積尊位漸登於是神變之莫窮威靈之罔測伏願暫離天府略屆塵寰即馭氣以下臨悉浮空而俯降接引五道之衆開化十類之魂録此虔誠證明修奉天道之衆願賜降臨謹伸召請神道之衆夫神道者幽微不測變現無窮司禍福於人間定吉凶於世表掌握山嶽統轄鬼神調風雨於四時理隂陽於九土隨心應感遇物施恩居幽理明安民濟衆總權各異受職散殊或聖帝名王或忠臣烈士或鄉邦英俊或社稷明靈或立壇場或崇廟貌有功立祀受命為神鎮境域以垂休護生靈而布祉功歸正道德贊玄猷伏願神化須臾靈蹤頃刻來朝天闕悉赴齋壇鑒清淨之筵領塵凡之供神道之衆俯賜降臨謹伸召請人道之衆夫人道者受氣隂陽賦形天地得處五行之內故為萬物之靈分男分女則有妍蚩列尊列卑則殊性識或貴或賤或賢或愚或托蔭中華或投胎外土或以文華而受邦之爵秩或運智為謀而爪牙或塵途有凍餒之虞或蓬户有沉綿之厄顧兹等級實係修為民庶繁多品類衆雜均為人道共稟靈津其奈壽夭有期存亡係數形骸非巳有魂魄屬虛無陽世不得長生幽府豈宜久滯伏願澄清念慮整具形神悟道超凡知虛識幻來赴精誠之供仰沾開濟之恩聽法聞經朝真領薦人道之衆及諸眷屬各請來臨謹伸召請餓鬼道之衆夫餓鬼道者或拘幽夜或墮昏迷或因宿世之所修或以纍生之所作或罹報對或因徴呼或習性沉迷識見執著是致飄零魂魄散蕩神儀沉浮於六合之中困滯於九州之內薦資之罕及享祀之不沾超脫未期升騰乏路悽然何托邈爾無依若非識性而返真豈遂出迷而入覺伏願上依真蔭肅仗道恩相携而盡赴道場招集而同臻法會恭朝九清之上帝以離九地之拘纏聽宣三洞之靈章以滅三塗之障難餓鬼道之衆及諸眷屬各請來臨謹神召請四生道之衆夫四生道者胎中受命殼內分形冗處巢居林藏石隱或産于江海陂池之內或養于重淵積水之中或感氣而生或隨物而變雜名殊類萬狀千形飛走山源沉浮波浪雖稟氣之有異而貪生則本同或困於鈎餌網羅或傷於鋒刃弓矢固亦超利而避害甚則搦肉而強餐蠢蠢而生紛紛而逝雖為異類俱出至化陶鎔之中既忝貪情悉在上帝憫憐之數伏願俱承淨供同赴善緣灌濯靈津永捨禽蟲之趣沾濡法雨終離毛角之群悟本知根還源復性四生之衆及諸眷屬各請來臨次召孤魂伏以一元運而循環不息二象凝而變化無窮稟氣分靈衆形乃肇殊資雜品庶類以繁但成始必成終是有生固有死今古遙而時遷事異死生定而情均理同雖貴賤之不齊亦賢愚之各致生兮壽夭之莫測死也升墜之難知況厚朴之風漸離洪荒之世巳逺盛衰倚伏隆替相仍揖讓而君惟唐虞之莫繼戰爭而國自商周則攸同周末而兵革紛紜秦初而干戈繞擾漢魏以降南北屢分迭廢迭興或治或亂風俗由之而厚薄人物因之而盛衰或失正而見棄於明時或攄忠而不容於亂世或功成而釁起或貴極而身危以致握外閫之威秉出疆之命或偶然於陷陳或竟殞於遐荒或負藝懷材棲遲而不遇或守常抱道廢斥以無聊居民旅而遭亂離處軍戎而死鋒鏑近來非一昔者尤多及夫士農工商巫醫小祝千門萬類百家衆流處世之時榮枯不等亡身之後冥寂何殊有術至於長生其如得之者鮮無謀何以逭死未免視之為常賢愚俱化塜中塵富貴亦為泉下客眷言及此興悼何窮恭惟大道之垂慈特啓真科而廣度爰稽教典嚴列壇場式陳無礙之筵普供有情之衆請降九龍之敕命昭蘇六地之沉魂欲望幽顯真靈隂陽主宰逐處靈壇典祀天下郡邑城隍黃泉蒿里丈人地府溟泠主者水宫曹局嶽府職司五道大神九州社令山林里域土地衆神咸遵太上之符章共稟青宫之特命釋拘纏於萬獄罷謫役於三途疏理囚魂升遷罪爽以至浮遊郊野淪滯幽隂有主無歸含情抱識九州六極萬類四生一切孤魂無窮鬼趣悉行拘集盡遣來臨同沾勝妙之緣即度清寧之境俱賴至神之力以宏上帝之休攝召屆時立祈報應以今焚香先伸恭請歷代帝王前朝君主或揖遜而有天下或開拓以立基圖或興利除害而垂萬世之功或撥亂反正而創一時之業惠加海宇德被生靈或今廟食於人間或以升神於天闕終啓愛民之念不忘憫物之心接引迷途提携後世曲回睿鑒俯録凡忱以至繼體之君守成之主秉治安之政享太平之基纍洽重熙康時保祚然而數傳之後纍葉之餘未免泰極而否生運竒而變起或王綱之不振或太阿之倒持或權臣肆淩逼之虞或胡騎有冦攘之禍小而播遷郡邑大而傾覆邦家雖云德之或𧇊亦恐數之有定昔日鑾輿歸杳漠如今殿宇已丘墟儻英靈未陟於丹霄慮清蹕尚稽於黃壤伏望暫迂仗衛略盻壇筵鑒茲開度之齋修密悟希夷之隱奧當知富貴如夢成敗一空往事難追前途可勉仰祈宸慈俯賜降臨以今焚香奉請昔朝禁壼往古掖庭尊而后妃下而嬪御或望隆後苑或德重坤儀外佐聖明內間典則雖古今之既革必慈愛以如初仰冀在天之靈俯察由中之禱其或德分厚薄寵有盛衰雖金屋玉樓翻成寂寞長門邃宇徒困悲涼至如青塜之殯難歸馬嵬之變罔測或謝身於丹禁或白首於上陽遺恨未銷清魂無倚伏祈委鑒俯賜降臨當知富貴若風華榮華如石火徑登前路毋念舊蹤以今焚香奉請纍朝宰輔歷代廟堂負楝梁之材展經綸之手內而鎮安有度外而綏集四方或西掖判華或北門視草或分郡邑之寄或列鵷鷺之行助理化機共扶國計若大若小乃武乃文消禍亂於未萌致太平於無象及至數終壽夭身委寰塵或廟食於人間或職參於仙府伏願特迂騎從俯降旌旄鑒此凡誠賜之景福其間富貴之莫永榮祿之易終或降出於無聊或竄流而不返甚而傾家失族或至服藥罹辜幽恨無窮驚魂何托當知去蹤莫救覆轍難回不須懷既往之𡨚尚可為將來之計一聽清虛之典咸除鬱結之情普冀來臨即垂允赴以今焚香奉請千古英雄歷代將帥登壇授鉞拜命䇿勳或三箭而定天山或七擒而伏南虜或削平於僣亂或拯復於寰區嘉績濟時精忠貫日或盡節而沒於王事或退老而終於天年或守正而罹害於一時或深入而喪軀於萬里義之無失理則何傷或生不至於封侯或死于今而廟食伏願暫揚麾纛俯屇壇場享于克誠誕孚靈佑其有負可疑之勢挾不賞之功或自失於忠誠或偶生於嫌隙禍萌不測變起於形或放逐而終或誅鋤而逝或家門之廢墜或嗣息之凋零杳靄陳雲昔日之壯圖已謝沉昏夜府今朝之滯識猶迷願應召以來臨庶隨機而感悟不纏宿障咸濯生津以今焚香攝召戎門卒衆軍陳兵行歷代以來六合之內興廢不知其幾戰鬪莫計其時或寇盜猖獗於城中或夷虜腥羶於邦內不得已而征討終未免於殘傷身命殞於弓鎗血肉塗於草野或圍城而敗績或遇伏而喪功或失援而懸軍或輕敵而餌毒勝者未能全壁敗者必將陷師郡邑為之荒涼生靈遭於屠戮雖云天數之或定其亦人情之至哀然奮義以效勤盡忠而死節若非返生人世則猶𨽻役冥司伏願略駐劄於靈壇共贊扶於元化同沾利佑早遂升騰其間或缺於忠誠或失於疑二或陳未交而自潰或勢非急而就降或爽律而受誅或違伍而被罪恐一念之不正慮九地之尚留符命已頒拘纏必解所當悔懲昔咎灌洗前愆各承大宥之恩盡脫九沉之苦即希來赴同領善功以今焚香攝召文場秀士學海儒生博通百氏之書深造六經之奧聲譽髙於庠序行義冠於鄉閭以至身擢巍科名魁多士知顯逹之由分故出處以隨時以至未沾爵祿之榮自徹性命之理初不拘於得失亦何礙於死生千古英魂萬方靈爽伏願俯臨壇席即邁車輿華胥國內成名巳知夢覺白玉樓中作記即遂仙飛其有志徒切而天命乖學雖優而至理昧淩霄壯氣易以差池眩世辭華竟成委靡場屋屢困名器愈賖一息不流萬緣皆斷慮其未悟窮通之分莫明禍福之機生而事爽素心死恐魂稽泉曲伏願去離執著警省神情當知太上之真科即是聖人之大道自冝黜聰明而屏志慮味道德而達死生盡屇法筵即超淨域以今焚香召請真祠羽襡琳館黃冠委塵俗以出家悅沖虛而入道深悟浮生之夢幻仰探至理之希夷白簡黃壇交真靈之肹蠁青山緑水縱杖屨以徜徉或功髙而鍚召於玄都或丹就而受書於洞府伏願特矜晚學曲降飛車開化沉溺之幽魂或就齋功之善果其有宿因未厚美意徒勞其學罔際於真師內錬不逢於祕訣或修存而中輟或障難之橫生鸞鶴不來空有青霄之望虎龍難偶遂為黑壤之歸承今符命之招詣此薦資之會毋牽纏於宿念早湔濯於靈根一徹玄機即升仙籍以今焚香攝召山林逸士巖谷幽人視富貴若浮雲等功名為外物竒峯碧嶂滿目煙霞木履青笻賞心泉右王公莫友天子難臣或遁迹於郊園或放浪於湖海髙資邁俗清氣逼人生兮既能超羣死也自應無滯猿吟夜靜嗟蘭佩之難回鶴怨山空嘆蕙幃之巳寂瀟灑神識幸賜來臨清靜齋羞同垂享鑒其有身為隱逸惟切志於功名或致北山之移文或為仕途之捷徑不能堅美節依舊入麈緣以願不滿於人間恐恨益深於泉下當知進退乃在生之計眷茲功業亦處世之謀冷巳無生是為委世貴賤俱泯成敗兩忘承兹度化之休早遂返生之樂以今焚香攝召叢林大德列剎高僧秉智慧刀斷煩惱障方袍圓頂悟不空之空鐵心石腸修難修之果打透無生理深知不死機一性清靈雖久而不墜六根了絶有召即遙聞剖破藩籬何用拘於道釋飛馳杖錫即俯降於壇場鑒此良因用歆淨供其有禪心未寂覺性猶迷五藴非空六賊尚熾或隨時以飄蕩或混俗以浮沉及其天數之告終不覺色身之永巳茫茫幽域杳杳泉臺自憐超脫以何時適此遷升之有路昨非今是咸資曠蕩之恩捨舊從新即上清虛之岸以令焚香攝召宫觀女冠寺院尼衆或悟真而入道或因事而出家或歸西方寂滅之宗或慕太上沖虛之教緇袍素質巳祛脂粉之塵凡羽袂星冠不受鉛華之點汚禪心如止水還同佛性之圓明清氣薄浮雲終見仙蹤之超舉伏願俯從𢢽請不吝慈悲鑒此精修納兹薦獻其有道緣之尚淺宿慶之未深雖披出俗之冠裳莫竟脫塵之念慮或積功之易倦或見性之不明徒知世故之紛紜不覺大期之至止念幽都之寂寂慮飛爽之淒淒因此修崇悉祈來赴重資靈澤再作生涯以今焚香攝召纍代富豪之士積年貴盛之家承閥閲之餘襲膏梁之舊府庫充溢箱篚豐盈廣厦崇堂歷暄涼而罔覺髙軒大蓋雖風日以難侵悅目將厭於珠珍服御乃賤夫羅綺能於此檢身而育物庶可乎善始以全終未免經於太隂必亦生於貴胄其或流而不返盛而愈奢過嗜聲色以無窮廣畜車馬而自縱生兮為意之所欲死則盧魂之多迷伏望不耽世上之榮華毋念身前之玩習徑迂軒馭並造壇筵即悟靈機同臻善境以今焚香攝召九流之士雜藝之倫或通於易象壬占或達於天文地理或考五行而知貴賤或稽一貌而驗吉凶或習推側而有識氣之能或辨疾患而施活人之手倘臻一術於至奧或兼衆善以俱亡故窮通莫得以汨其真死生不足以纍其性蓋術乃察事物之變理則徹造化之機生則精明死亦了悟存亡不惑隱顯無拘仰冀昭昭之靈俯鑒勤勤之禱其有名同實異習矣而不精藝淺識卑鬻之而苟利或挾斯而遊謁或因此以飄零或宿留於異鄉偶成客死或羈棲於逆旅因至路亡惟其見理之不明深恐身亡而𩲸滯伏願收浮遊之識聚散蕩之魂屇此淨筵悟兹道妙一悛故性俱陟生鄉以令焚香攝召雲水髙人江湖達友單瓢隻笠遍遊於福地名山五氣三華暗聚於崑峯蓬頂或調金石以精煆錬或驅草木以救疾傷或施符以濟時或布氣而愈患或徉狂而混俗或托醉以全真或面壁以無為或行功而有作及其丹成而事竟故能脫殼以升神伏願提拔玄門主張大教曲全齋薦同拯迷津欽佇雲輿即臨法席其有山川徒歷未逢出世之師功法雖繁莫有成真之訣未免苟活於軀體蓋將空度於嵗時生而逐伴隨群死則飄神蕩識請回清慮早脫昏衢結兹無礙之緣再遂有生之樂以令焚香攝召街衢遊子市井間徒擁蓋驅車遍章臺之綺陌臂鷹挾彈衝上苑之紅塵籠畜珍禽醪傾玉斚銀燭呼盧嫌夜促玉簫催拍怕筵終情雖適於少年事恐𧇊於厚德及至吳霜點鬢方驚往景之非空思楚館遺蹤巳覺衰顔之迫交遊滿目誰為住世之謀情愛盈懷乃是喪生之本惟有殯宫之寂爾遙知冥路之茫然伏願捨舊從新歸根復命來沾薦拔前遂升遷母著相於空花不留心於外物盡捐故態速進前程以今焚香攝召江上漁人溪頭釣叟挂網垂餌幾翻秋月春風泛宅浮家到處雲濤雪浪千尺絲綸直下五湖煙水間遊西塞山前望白鷗之點點富春灘上擁翠岫之層層惟見物外之蹤多遇箇中之友或潛修於至道或默悟於真機卓兮獨存超然不泯伏願暫離仙府略降塵寰同開導於幽魂特圓成於齋事其有勤勤於網𦊙役役於鈎綸豈耽山水之清姑為口體之計勞亦至矣時可留乎兩曜相催百年𣊬息數焉有限命也必終短棹長竿至此時而難顧風巾雨帽嗟遺迹之空留岸邊之墓巋然舟上之人去矣伏願母拘昔習不著前緣徑出幽棲特臨齋次一聞妙道咸證生方以今焚香攝召耕稼之民農桑之衆為庶政之先務居四民之最勞負耒挾耰冒寒暑而同輟沾體塗足淩風日以惟勤仰輸府育之艱遇豐穰而徂給東作西成之望遭凶歉則罹憂或衰老而善終或飢荒而困斃或遺體骸之零散或孤塜之尚序林莽凄凄魂神何托歲時寂寂享祀莫沾願招集以來臨請提携而並赴識破浮生之夢幻不淪鬼趣之沉迷承此善緣陟諸仙界以今焚香攝召川陸經商江湖販鬻汨沒世緣之纍奔赴貿易之途駕槖馳車逐旅程於無際張帆轉舵泛波面以何窮多成異里之飄蓬乃至他鄉之寓迹或幸得資基之豐厚或終身世網之荒涼或抱患於遐方或委軀於孤館或巳老而未止或尚少而早亡或逢盜以傾囊或覆舟而喪命念遺骸之莫返痛逺魂以難招伏願來聽真詮共登道岸貨財即身外之物難隨泉下之魂鄉曲乃世上之居莫重生前之戀猛行棄捨必遂升騰以今焚香攝召伶人樂部徘客倡流語尚恢諧藝精絲竹曲折於舞群歌板豈其性之使然隨逐於馬迹車塵亦為勢之所逼將欲圖溫飽之計未免有迎送之勞然而聚苦浮雲散如流水年華向謝多非可托之人數限既終恐作無歸之侣伏願塵緑不染舊念皆忘即相率以來臨領薦修而度化以今焚香攝召路岐市藝南北雜能或教習禽蟲或藏壓花果或刻木牽絲而使舞或騰煙凝焰以從輝或橫索以步馳或環刃而飛度或以力角抵而分勝負或為象影燭以效折旋此等之儕類甚多近世之技能尤衆但窺溫飽亦人心之所同而身久道途乃其勢之不免豈皆樂為此計亦恐他無良謀因循虛度年華悠久難成基業生則聚散之不定死慮飄蕩之無歸伏願捨彼妄緣悟兹真理聞經聞法明性明心既沐玄津必生樂國以今焚香攝召今古有司係公胥吏奉行文墨助郡邑之承流遵守條章贊聖朝之宣化或能隨機而立善行或由𨽻役而積隂功家可保而嗣息繁昌身雖沒而魂神不墮伏願鑒兹修建同作證明濯此靈休益增善業或者嗜財黷貨倚勢而為姦縱暴行私侮文而致毒或入輕而出重或害物以傷時未免禍起於一朝或致身流於萬里或性命之不保或家業之敗亡雖陽罰之巳鍾慮隂愆之未脫承兹道澤普宥宿辜伏願悉詣道場均沾資薦投誠天闕悔巳往之非超識地關求再生之路以今焚香攝召割烹之衆宰屠之行或刲羊剌豕以為生或屠狗解牛而謀息或炮炙以精滋味或豢養以供鮮肥乃由身口之榮遂為衣食之計其事雖居世之難免而此業則擇術之良非慮殺意之云多恐慈心之終泯及其奄謝或致牽纏伏願洗滌舊懷發生善念來沾淨供即返人倫以今焚香攝召絶葷之衆喫菜之徒或傳二宗經或稱四果教或云白佛法或號金剛禪或歸二會子之師或習五來子之曲或雜聚男女或不祀祖宗或眩左道以為功或爇乳香以為禮日散其迹夜集其徒或即釋氏以為名或引道教而掩偽外託幻變內事邪魔夫民生而俱稟良心惟性流而習歸邪教中人之性可上可下不根之説乃惑乃滋陷其醜而欲脫無門殞其生而雖悔何及且斷葷而戒酒本是善基然叛道以遺親遂成惡果伏願絶其誑妄祛彼愚迷大回遷善之情毋啓好竒之想天地之內正理常存人鬼之中本真不滅赴此潔誠之會濯兹清淨之風何必行其所難行自合悟其所當悟俯仰無愧超脫可期以今焚香攝召産死婦人孕亡人子或因結胎而受患竟以傷生或由育子以成艱終於殞命或子母不分而死或血液未靜而亡在常情已可驚疑於死魂必生迷執伏願返其本性悟彼天真當知結穢濁以成身由清虛於稟識一靈越古今而不泯衆穢遂塵垢以俱消何拘産死孕亡亦受隂資陽錬滅諸障難往遂生成以今焚香攝召寇忀之輩劫掠之從或迫於飢寒或困於荒歉大則槌牛發冢小則穴壁踰墻閭里為之不安郡邑從而掩緝或陷誄殛或遭竄流或殞於狴犴之中或沒於道途之上或孤骸之暴露或遺體之摧殘豈其資性之皆然亦為習氣之所使生而不幸死也何歸承兹滂霈之恩悉悔牽仍之惡即超苦趣早出冥鄉以今焚香攝召犯刑徒衆法死傷魂或肢解而臠分或身殘而首斷或重杖而斃或久禁而終或流竄於要荒或誅夷於廛市或以殺人而抵罪或以不軌而伏辜陷此極刑豈非宿分然既已證結於陽案蓋將原免於隂曹幸被道恩必回本性宜知五體之雖壞當悟一靈之無傷悔艾前非沾濡大宥攺過而不復求度而可升舊屋宇不須回頭新根芽却須致念若得脫於六天九地宜不忘於三綱五常為鬼為人守禮守法永離惡道即度慈舟上來攝召三途之衆萬類之魂有識有情無依無倚具述不盡聲説難詳無極無窮無數無限無逺無近無姓無名或以壽終或以惡死或因癆瘵或被瘟癀或墜馬而覆車或溺江而赴水或自刑自害或自縊自殘或落澗墜崖或委溝陷井或中蠱而殞或服毒而傷或死於家鄉或終於道路或巳老而逝或尚少而亡或虎噬蛇傷或雷嗔電擊或受刀刃或被弓鎗或萬類人民或百工技藝或宫或吏或賢或愚或富或貴之流或貧或賤之輩或孤或寡或女或男或無資基或有家産或為奴婢或陷孤寒或患聾盲或困喑啞或腰身中疾或手足不全或少也奔馳或壯而遊蕩或久絶嗣息或尚存子孫或尸柩已焚或墳墓猶在或浮遊郊野或執滯丘墟或繫隂獄地司或在嶽宫水府或拘城隍社令或沉嵩里黃泉或抱𡨚讎或懷忿怒或巳經證結或未盡報償或役電驅雷或擔沙負石或縈閉幽夜或漣汲溟波或末得遷升或不經濟度或往劫沉滯或近世淪亡或土石精靈或山林鬼怪或魑魅而處潛隱之地或魍魎而在恍惚之中一切幽靈無邊鬼爽想皆祗赴盡巳來臨幸不拘於等倫召齊同而慈愛毋以貴而淩賤無懷恨而挾𡨚毋啓忿爭毋生喧雜靜其念慮整其神儀值此良因可為善遇將登齋次先就浴幃法衆稱揚前行引導舉大聖黃華蕩形天尊引至浴室宣沐浴斜髙功存變浴室請降生氣灌注身中伏以久辭人世荐處冥鄉或隨五濁以飄流或墮三途而謫役或浮遊而神不返或散蕩而魂未全方脫昏衢恐罹隂翳若非澄神而滌慮豈能謁帝以朝真是以廣闢清場嚴陳浴室仗髙玄之妙蔭資大道之神功變此凡區悉成妙域頃刻而大周六極恍惚而廣並二儀萬類鬼神悉能灌濯九州魂爽盡得清明衆慮俱清六塵咸淨欽承惠澤並浹玄津一切隂靈靜心就浴奉為孤魂上資往生仙界念沐浴蕩穢呪天氣澄清五色髙明日月吐輝濯錬身形神津內盥香湯錬精光景洞耀煥映上清氣不受塵五府納靈罪滅三塗禍消九冥身受開度升入帝庭奉為孤魂上資往生仙界念沐浴錬真呪太上髙真九靈之精使魂飛仙上登紫庭沐浴華池神身澄清精通太虛萬氣自生伏聞惟水可湔於根塵非呪莫消於宿障更須詳緩悉就蕩除再誦玄文以資濯錬奉為孤魂上資往生仙界念沐浴錬度呪龍漢蕩蕩無形無名渺渺億劫黃道開清神燈朗耀九魂吐精玉虛澄輝太霞髙明元始開化諸天齊靈三元導養二象攝生巳度者度未成者成已死即化巳枯即榮蠢動蜎飛一切冥靈懷胎含孕咸得受形亡靈命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天神地祇及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大道至真尊神無窮無極普監度生地根斷絶玄都記名衆神並映一切咸聽奉為孤魂上資往生仙界念沐浴東井呪天河灌東井石景水毋精圓光拂靈曜玄暉瑩髙明元始披重夜天人逐月生沐浴蘭池上龍負長庚瓶金童灑香花玉女流五星冠帶濯玉津錬度五仙形體香萬神降乘景登髙清伏以遊魂滯爽巳離幽昧之鄉塵念欲根復被沖虛之澤神明整聚性識昭融奉為孤魂上資往生仙界念録字回生呪天地同清五色髙明玄黃施化沐浴玄精三晨朗煥五緯交迎胞胎結節洗滌氛營光鮮萬氣靈漿自生玊樓金室祖氣流行惡對落滅寶梵雲征伏以冥識無依或稽留於隂境真科有格用濟拔於幽途既召來臨巳行就浴嚴裝冠帶恭詣道前給化仙衣再宣靈韻奉為孤魂上資往生仙界念金池冠帶呪金真降靈氣散玄黃沐浴丹池真氣芬芳二景冠帶天為隱藏左振玉佩右䇿金璫浣除詣穢遊行紫房雲霞鮮耀飛玄羽章九軿洞煥流金振芒伏以形神整復氣識開聰羽袂仙裳遂雲風而輕舉神章祕呪宏道蔭以廣覃更祈接引之恩便遂參朝之樂奉為孤魂上資往生仙界念清水度魂呪巍巍道德尊功德巳圓齊降身來接引師寶自相携慈悲惠法水用以洗愚迷永度三塗岸長辭五濁泥伏以諸塵既淨六欲皆空永辭幽暗之鄉髙陟光明之境所當識真返本悟過思愆振肅精神嚴存識想恭赴齋席虔詣靈壇瞻望金闕玄都朝禮玉京上聖祈天自列向道力陳是乃歸善之得門斯為自新之有路不冝慢易所合虔恭道衆諷經同行導引諷中篇伏以冥府幽都或未沾於玄澤沉魂滯魄恐難值於善緣今幸有此遭逢可謂非常慶會逺瞻玉闕拜手清都恭對齋壇馳神紫極衆等虔誠朝禮以盡歸誠臣等志心稽首禮太上無極大道臣等志心稽首禮三十六部尊經臣等志心稽首禮玄中大法師伏以參朝大道敬禮髙真巳遂投誠所冝堅志既知妙本且識根源毋得妄惑異端毋得輒信邪道巳流者至斯而返自執者於此而通念念無邪心心歸正陽境豈難托化隂府安得拘留退就斛筵相携受食引孤魂赴茭廓次第呪食如未呪食則云孤魂等衆朝真獲畢望闕巳終當退就清場伺候薦餉為此良因念十方靈寶天尊不可思議功德呪食文伏以真機妙用可以潛通至道神功端由誠格況玄科之素著大法之宏張玉篆煥如雲雷寶誥昭如日月變化於頃刻應感於斯須今齋官潔備斛筵嚴陳供禮普資五道以及三途廣設九幽旁沾萬類然非祕呪安能化兹凡饌非道力何以度彼衆生孤魂既巳悉臨法食當為呪施道衆呪食髙功執真文五道望天闕密啓上帝次存想各方真氣下灌斛筵每方燒真文逺立吹灰於空中存斛筵廣大可以遍逈無窮所是本法用真文及存變之詳巳别出奉為孤魂上資往生仙界念玉清惠命啓請呪稽首冥惠虛無尊稽首歸命重玄主栽成天地無德稱悉為衆生作恃怙慈濟五道轉輪魂哀救三魂地獄苦皈命金闕天中尊皈命六度慈悲父皈命玉清無上真以離生死長綿綿出有入虛無所待能令枯朽變成仙千劫萬劫難一遇為衆廣説業因緣回骸起死永長存使其形神無變遷奉為孤魂上資往生仙界念淨酆都呪茫茫酆都申重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲幡定慧青蓮花上生神永安奉為孤魂上資往生仙界念甘露法食呪功德金色光微微開幽關華池流真香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寶旨自在天堂遊奉為孤魂上資往生仙界念三光法氣法食呪浩晶生法氣氤氲凝玄中兩曜共澄徹五緯交相通三光煥巳明寶氣盈三宫帝鄉會九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫壽無窮奉為孤魂上資往生仙界念三光流精法食呪妙道分一氣氣中分隂陽凝化日月星燦然流三光九華含九道八色怡八方煥爛洞真體流精歸太茫下生淵泉宫上列無何鄉縱體復飛迹忽然都相忘七寶流精潔混沌雜華芒咽服九雲散此樂殊未央奉為孤魂上資往生仙界念三光陽玉法食呪陽玉正真氣妙真三景分玄和唱靈音八會敷瓊文五老宴丹宅飄飄乘景雲大聖諸天衆駕龍飲玉津三五定生籍遊戲太上賔華光朗無際携手朝帝宸奉為孤魂上資往生仙界念玉清甘露法食呪回首仰圓羅合景揖靈芒拘魂制七魄思審定中央行住禮虛無寢息宴玄房飢餐黃碧華渴飲瓊林漿神旌命大魔合體錬真光復照觀大無恆在空中遊圓通泯波濟真化靡中期窅眇無終始行者當明知寂寥忘理教應運闡宏規降道不自昭要當先所施會歸無二處隨心自合離奉為孤魂上資往生仙界念玉清雲宫梵昌生魂育魄呪靈芝無根衆化之原中凝七魄上結三魂二十四真出入無門杳冥之中恍惚元精隨劫存亡逐氣而生外凝混朴內養七經五神植華三台敷榮紫闕素童返形歸嬰騰雲而升騁霧浮空中有玉真號曰神公左挾無英右衛白元玄獸遏後丹禽擁前上浮翠蓋下湧金蓮香雲凝空甘露無窮用之無盡尋源不終次諷中篇以多為度右諸方呪食所用呪互有不同此特敘其通用者爾回向上來施陳法食宣演靈章並祀冥途廣資幽爽諒承道力必享淨筵兹當端肅於形神澄清於識想一心向道萬念皆真更兹濯錬之功前進登升之路為上因緣念生天得道天尊不可思議功德上清靈寶大法卷之三十八
