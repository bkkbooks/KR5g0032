body:
  text: 洞玄靈寳法師南曹執法典者權童初府右翊治金𠃔中編悔過謝愆品修眞之要寡過爲先過之不悛去道逺矣雖行持符法求至上道之階使爲行不檢亦豈足以攝伏鬼神況於進拜表章濟度幽顯哉功過之司毫分無失晉許逺遊遁跡山林勤心味道漸入眞品而三官都禁遣周魴等出丹簡罪簿以誥之曰夫欲學道慕生上𨽻眞人玄心棲邈恭誠髙靈者當得世功相及禍惡不侵隂德流根仁心下逮乃可歩眞索仙度名青府耳由此言之未及許逺遊者其可不知寡過自修耶奉法行持求仙學道所當悔懲巳徃之愆犯積累方來之功勤故玄綱論曰過惟攺而不復爲功惟立而不倦是謂日新其德自天祐之儻口行祈謝之科心之省愁之念首之前而作之後飾之外而敗之中然復苦巳勞形瞻星禮月持齋奉戒焚香誦經亦爲徒設矣有大言眩世則云罪之不積惡之不爲豈須懴悔斷棄教科此又矯激大過從容中道無過與不及所宜悔過於心知咎必省依經奉教按格行科削罪目於三官五帝之司上生名於十極九霄之境立功不怠舉形仙飛固有分焉亦無自阻有志者多成事也謝過儀毎歳除秋分一日外常以三元八節本命生辰甲子庚申及諸良日入靖室或宫觀山澤靜潔去處焚香專志省愆思咎先於壇側端黙而坐深念生世以來所行所作無故愆犯不善云多戰競自艾恨不剖心瀝膽誓母復爲今兹愧慚措身無地方振衣而起整肅形神登壇啓告無壇處立香案展壇布席行用入戸誦呪上香如法祈謝之儀早以東爲始午以南爲始夜以北爲始分五方懴念本合置立科法發爐循格至三上香方行禮方如自然朝儀但此等事以宻爲尚兼獨行朝修不宜繁瑣故今止編四方謝罪之文損益隨事之宜爾先祝香道香徳香無爲香清淨自然香妙洞眞香靈寳慧香超三界香三境眞香滿瓊樓玉京徧周天法界以今焚香供養虚無自然大道三境天尊昊天上帝北極紫微大帝紫微天皇大帝后土皇地祗三十二天帝君萬天上帝上清十一大曜星君中天北斗七元星君天地水三官帝君北極四聖元帥眞君靈寳五師真君四方二十八宿星君三界五帝大魔王十方無極飛天神王北隂酆都大帝東獲扶桑大帝五嶽五天聖帝洞天福地名山靖治主録仙眞聖衆三洞四輔法籙中靈官將吏三界官屬一切威靈仗此香雲普伸供養玉華散景九炁凝煙香雲鬱羅逕衝諸天侍香金童傳言玉女上聞帝前令臣關啓咸得如言具法位臣姓名以今良旦齋潔洗心祈真告道先伸上祝皇廟社稷宗廟先靈駕景九霄垂休萬葉今朝皇帝基圖永久祚業昌降聖壽並於乾坤德教均於造化萬方向善百榖咸豐有識有知悉悟至眞之道無邊無極共躋榮樂之郷大教興行正法流演敢伸凡願上冐宸嚴臣下情無任戰兢惶懼激切屏營之至臣某志心皈命東南西北四維上下十方靈寳天尊三十二天上帝周天二十八宿星君天眞上聖五嶽眞君山川河海洞天福地一切神仙諸靈官次三禮次向北方夜以北爲先三拜長跪具位臣姓名志心皈身皈神皈命北方東北方無極太上靈寳天尊北方八天帝君北方髙眞上聖斗牛女虚危室璧七宿星君北嶽恒山黒帝眞君北方洞天福地山川河海一切眞靈北郷神仙諸靈官臣聞大道垂慈啓悔愆之路髙眞垂化開謝罪之門若非請命以祈恩豈獲釋愆而逭譴伏念臣愚庸賤品蠢陋凡資幸浹眞風叨逢道運久膺法籙冒玷簮裳不能勉强以立功乃復因循而造罪莫知檢束罔謹修持所慮萬祖億曽昔亡徃逝曁臣千生累劫宿命先因爰至今身謀用之間舉室親姻之衆造諸元惡成彼深愆無量無邊難名難述結在天曹地司之内著於日月星辰之宫永劫不原终天無解懼其報至恐及禍萌以今皈命首陳盡祈湔洗伏願天垂恩宥道啓慈憐萬聖流祥衆眞錫慶赦臣九玄七祖以及巳身萬劫千生至于今日滔天重罪蓋世深愆消滅惡根削除過籍庶使臣早成正道獲際眞師身世安榮法徒寧泰在俗則云眷姻寧泰更祈祖宗神識師友䰟儀巳逝親姻先亡眷屬長居快樂永遂逍遥六道三途四生萬𩔖俱蒙拯度悉被陶成臣某下情無任懺悔禱祈之至三拜次向東方具位臣姓名志心皈身皈神皈命東方東南方無極太上靈寳天尊東方八天帝君東方髙眞上聖角亢氐房心尾箕七宿星君東嶽泰山青帝眞君東方洞天福地山川河海一切眞靈東郷神仙諸靈官臣聞云同前次向南方具位臣姓名志心皈身皈神皈命南方西南方无極太上靈寳天尊南方八天帝君南方髙眞上聖井鬼柳星張翼軫七宿星君南嶽衡山赤帝眞君南方洞天福地山川河海一切眞靈南郷神仙諸靈官臣聞云同前次向西方具位臣姓名志心皈身皈神皈命西方西北方无極太上靈寳天尊西方八天帝君西方髙眞上聖奎婁胃昴畢觜參七宿星君西嶽華山白帝眞君西方洞天福地山川河海一切眞靈西郷神仙諸靈官臣聞云同前次中央具法位臣姓名志心皈身皈神皈命上方下方无極太上靈寳天尊三景九霄大羅无極三十六天帝君五老上帝北斗七眞天曹主宰无鞅髙眞羅酆隂境十地眞靈三十六土皇君中嶽嵩山黄帝眞君中央洞天福地山川河海一切眞靈上郷下郷神仙諸靈官臣聞云同前次歸位對席臣等志心稽首禮太上无極大道臣等志心稽首禮三十六部尊經臣等志心稽首禮玄中大法師次啓白回向具位臣姓名某謹重誠上啓无極大道上帝髙眞三界威靈十方衆聖以今懴愆謝過入靖修眞獲遂陳情仰祈大宥伏願隂曹削罪仙府書名道遇至人學無魔試臣敢不益堅善念深悟前非願契道眞永依沖䕃十方共慶九祖蒙休爲上困縁念十方靈寳天尊无量不可思議功德次出户如常式靈寳自然朝先啓聖次禮十方次懴悔三禮次回向念善今五方謝過即靈寳自然朝之餘意止一五方者貴其簡而易行不舉玉音梵唱貴其精黙感格奉道修眞之士不問法籙髙下悉可按行久久行之内加痛省則罪滅福生成眞得道矣五品隂功品經云星宿錯度日月失昏四時失度隂陽不調國主有災兵革四興疫毒流行兆民死傷師友命過皆當修齋行香誦經此經中之本意五等之功用也其法當建靈寳之壇集同學之士取九方之清泉貯金玉之寳器九鼎也書九野之名九州分野之名埋三晨之象以金玉石英作日月五星之象埋壇上也㔶蓋行持驗災増減潔所建之壇墠備神明之好樂録五事之災咎奏所𨽻之髙眞心丹合天五功乃就克臻升舉是爲隂功洩語外知其功不注謂此事皆以宻行爲貴不可說與外人知也靈寳壇擇素無穢汚不雜砂礫之淨土非戰場刑獄屠宰畜産之地建壇三級下層方九尺髙一尺二寸中層八角廣七尺髙一尺二寸上層圓廣五尺髙九寸壇中三級排列聖位及諸好樂等物壇式星宿錯度日月失昏謂五星淩犯九曜差躔妖星吐輝孛彗舒耀次舍不順變亂經常日青無光月行失次薄蝕翳暈之𩔖上層壇中聖位從所主也天皇大帝太微帝君北斗七元星君五方五帝真君十一曜星君妙行眞人中層三台華蓋星君二十八宿星君三官帝君北極四聖眞君十方飛天神王下層八卦大神九州社令五獄大神十二月將十二時直四時失度隂陽不調謂春行秋令夏霜冬雷常雨常暘炁候差忒之類上層壇中聖位從所主也虚皇天尊五方五帝三元三宫四司榑桑大帝暘谷神王中層五嶽大帝九州社令四海龍王四瀆源王八卦大神下層風雲雷雨大神風伯雨師十二月將十二時直直壇土地國主有災兵革四興謂權臣專制姦佞擅威盜賊四興亂臣割據蠻戎逆化邊鄙不寧之𩔖上層壇中聖位從所主也昊天上帝北極大帝玉虚上帝十方靈寳天尊十神太乙眞君中層三十二天上帝十一列矅星君十方飛天神王九宫大神下層九壘土皇君五嶽大神九州社令太一諸神將十二時直直壇土地疫毒流行兆民死傷謂瘟疫之炁干時害民不祀之鬼乗炁爲癘以致野道蠱魅精怪鬼邪癆瘵傳尸復連延續行病肆毒使斯民天横非命死傷之𩔖上層昊天上帝十方靈寳天尊長生保命天尊妙行眞人三官四聖眞君中層三元將軍収瘟斬瘟大將軍三洞經法中度厄吏兵天醫大神下層五方天兵騎吏九州社令太歳尊神十二月將十二時直土地師友命過謂受一善之教皆爲師同一朝之學皆爲友傳道嗣法合志共門義等天親情無生死命過之後當謁追修隨事之宜合建黄籙壇其行事從本法升度之格巳見於後此不重敘三晨象日用金月用玉缺則以白銀代之各徑寸如其形五星用五色石英小如彈丸各埋於壇之上層土中深各九寸日左月右五星從本方上眞星宿好樂琵琶鳯管時花新果山泉潔飯或染五色五榖青木香甘松香茆香細茶大棗五色旛五色綵繡太一好樂此乃十神太一世俗爲孛星非也壇中當作十位列五福太一眞君君綦太一眞君大遊太一眞君小遊太一眞君天一太一眞君地一太一眞君四神太一眞君直符太一眞君臣綦太一眞君民綦太一眞君竹弓蘆矢印甲馬兵士無鞍馬木刀鎗劒㦸緋黒紙錢五色繒時花新果細茶山泉右諸好樂之物各宜精潔爲佳九鼎壇中寄於二官嘵荆二魁梁七寳雍六金揚九鼐豫五昴冀一銅徐四罡青三蒼兖八古者金玉銅鐵之鼎或不能辨當以新潔陶器畧鼎之可以貯水者上爲之蓋以硃書九鼎之名於器之外九州之名於器之内安於壇中層之八方依九宫布之只以第五宫中央之鼎寄安二宫之側先祈具奏所屬上帝申牒壇中三界眞靈次汲九方清泉入九鼎之内法師口奏事狀以蓋覆之仍别設淨筵各依好樂備置儀物時花新果燒香然燈供陳如法集同志同齋之士善行清修之人不拘人數恊力同心共修齋直禁壇淨穢移文所屬地祇等神守衞然後正心誠意精篤想念悉如古典誦詠度人上品妙經行香六時經周十過使丹𠂻徹於九極一念格於十方非若世俗常行讀誦之易也儻非其人不集善事心馳於塵坌之境口誦太上之篇雖積日累時數周十萬亦爲難矣功成德就啓視九鼎且以鼎貯水上又覆之清澄如初理之常也小有混濁或别見異狀則事之變化也反常者皆以爲妖則可以知其所屬之分野災危未能全解也此則古人淳誠之用心若區區分辨於毫髮之間或紅則主某事濁則主某災此則𩔖乎巫覡之小技非經中上消天災下禳毒害之大體也行香之儀通自有式壇中所設髙眞皆專位排列如十一曜分十一位之類若數位緫爲一而書之非古法也經曰修齋行香誦經則合從齋法欲少近古可行靈寳自然朝亦通即齋法之始也允中按經曰星宿錯度日月失昏又或四時失度隂陽不調又曰國主有災兵革四興又曰疫毒流行兆民死傷又曰師友命過皆曰亦當修齋行香誦經舊有一家靈寳法中毎一句作一章分爲九事切詳經㫖上四條皆兩句八字意義相聮毎二句之下皆曰行香誦經獨師友命過只一句亦曰行香誦經是九句而格分五條故允中師授之書共一靈寳壇而分五等聖位除師友命過一條合從升度本科外四等聖位䟽于前矣是爲五品從經㫖依師授之也李少微曰齋者謂黄籙等齋五文鎮謝非常俗之齋也三時啓奏所以感天動地降福禳災也此壇上圓中八角下方乃靈寳之壇古者靈寳别法建壇泥璧漬玉液以奏帝其壇亦同此式正合靈寳本法而其行事乃終歳修用非世俗可以常行與其消災禳變一時拯急之意不同不敢敘入此也天台法中載此禳鎭在度厄消災品中其始則載火鈴印文請炁禁治之事其訣未詳而本法𨽻童初玉册與此不聮次則八節之日誦經依九宫而保禳九州分野此乃古書中學士依節服符自錬之緒餘又以爲九宫誦經之後回南向東湊作十轉悉非本㫖甚矣以此靈寳壇稱三天總炁壇以黄籙三級方壇却稱靈寳壇恐其别有所據却不出靈寳本法且於下元之日建壇列九鼎取清泉爲沸湯以入鼎中此等事古未用湯者其餘行用多不同古科獨下元日建壇禳鎭而以九鼎中水之豐耗或見五色以占九野之有何災是占驗之術而行於災變未兆之前固下失爲美之意然别作一科行之可也殊不知經中言此五條皆當行香誦經而其次章則緫曰凡有是經能爲天地帝主兆民行是功德有災之日發心修齋燒香誦經十過皆諸天記名經中意謂天地運度亦有否終至聖神人亦有休否禍厄將興災變或肇所當隨事拯救按格解禳而此五等有九條乃災變之大者依其事之所𨽻建壇祈告則功德無量今若云防事於未然杜災於未兆善則善矣非爲其事反同常行而大違經中之本意則凡所修所用措辭立說皆與此異今所編者以本經爲主以古法爲定故不容叛經而言法也上清靈寳大法卷之十一
